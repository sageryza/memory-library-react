<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- interactive-widget=resizes-content makes the on-screen keyboard shrink the
         layout viewport (iOS 17.4+/Chrome), so `position:fixed; bottom:0` lands on
         top of the keyboard with no visualViewport pixel-math guesswork. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
    <!-- Native iOS "open in app" Smart App Banner. iOS Safari shows a bar linking
         to XI (times i) in the App Store, or straight into the app if installed.
         app-id 6784887831 = com.sageryza.xi, live as of the July 2026 launch. -->
    <meta name="apple-itunes-app" content="app-id=6784887831" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Crimson+Text:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Memory Library</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

{page:171,type:"day",lines:15,date:"Apr 12",text:"favorite movie like I asked him to while he took his shower because my tummy hurt. I’ll only write the nice things. And won’t remember, and will try not to remember - the oblong gray way I felt last night. Like I was on a <em>wobbly </em>ship, waiting to get off. He did his pedestal tableau - to say what its like when you ask someone a question, and their answer is: wow that’s a great question - I never thought of that,” stood up <em>tall </em>on his ottoman - showed me how <em>much </em>he liked being on his pedestal (not very much). His parents skip back and forth, cycle between LA, LV, and WA, depending on weather. His dad hates flying but goes almost every week - I guess he’s more afraid (or hateful?)"},
{page:172,type:"abstract",lines:66,date:"Apr 13",text:"April 13\nIt may be difficult to get people to think as you would like them to. Say to them: “think like this,” and into their head will come: “why?!” and “Why should I do what you say?” but there is a simple trick, a way around it and that is to get them to agree to a game. A <em>small </em>version of reality - that doesn’t count. no matter how many times you find treasure in a game, you will be <em>no closer </em>to finding treasure in real life. A game is a microcosm, a metaphor, suspended disbelief, a special little thing that says: “this is <em>only </em>practice, this is not <em>real</em>.” just say, hypothetically, and no one has an issue with that. And so, you can get them to agree to a <em>game </em>pretty easily. And so, a <em>game </em>is an <em>extraordinary </em>way to get people to <em>think </em>as you would <em>like </em>them to. And the nice shift thing about this excursion, this endeavor, is that, our different baskets, one for reality, and one for fantasy (imagination) are only there in our head. we think one thing when we are on the outset of the excursion - those baskets are as real and concrete as any, though they live in our head. However, once we start <em>loading </em>stuff into the one basket (called fantasy, imagination, we find it starts to get quite heavy, and perhaps might break. And all the things we put into it will go strewing around our mind, suddenly nestled into the same crevices that we put our reality into. (oh, then we are in trouble).\nIn the meantime, let us go back to the original premise of a game, which is, I feel sure, made up of <em>two </em>primary parts: the rules, and the objective. Without the objective, we would have nowhere to go, and without the rules we would have no way to get there. And these two parts, lonely as they seem, beget, (and <em>not </em>unnecessarily), a <em>something </em>which we will call ‘strategy,’\n@@PB@@\nand this is by all accounts, the summation of the two - the rules and the objective, and can be inferred <em>from </em>that - can be gotten there directly. It can be said, of a game player, that they are looking at the objective directly, that it is staring, that it is right in front of them. And through the rules, which are like incremental cones, set up so as to form an obstacle course, they can only see it. They see it through this affected path, this changing line, and cannot see it without picking the path it would take to get there (the strategy). The game player moves, in response to the rules, towards the objective. And this is called: the strategy, this path that is affected by rules and looks towards the objective. Take the objective out, strip the game of its rules, and we have a certain pattern of behavior, as if a race car driver had forgotten that the cones were gone, or was driving blind, and slipped into this strange and awkward path, that accounts for obstacles that are no longer there.\nNow, as we have come to do, let us work backwards, imagine from the outset that we desire a certain <em>strategy, </em>a certain <em>path </em>of movement, a pattern of behavior, and we now have the task of designing <em>rules, </em>and an <em>objective, </em>that will <em>befit </em>this strategy, that will necessitate it, require it."},
{page:173,type:"day",lines:29,date:"Apr 13",text:"“what makes others tick…” Lindsay\nLindsay was my teacher in the one year of college - 3D Design. Lindsay had designed the most insanely specific a project that I can imagine. She wanted us to make animal masks out of foam. Not only that, but they had to have a mechanism. Mine was a monkey whose eyeballs dropped out from a string when you twisted the ears on the side. Despite the strict confines of the project, dictating not just material, nor mechanism, but also the subject matter (animal). I believe our 3D design professor had something even <em>more </em>specific in mind. You see, there were <em>whispers</em> that if, in response to your project, she let out an involuntary chuckle, a guffaw even, that you were a shoo in for an A. The very little freedom in this project makes me question her understanding of the role of a teacher (this was college, not kindergarten). However, judgement aside, I think this points to two specific points that I want to make. 1. She has designed the rules to a game (we see them clearly in the narrow confines of the assignment). 2. She knows, very clearly, about what the desired outcome is. Whatever it is that makes Lindsay giggle, and I suspect it can be inferred <em>directly </em>from the “confines” of the assignment is the unconscious “reference” for the assignment is the unconscious “reference” for the assignment - the ghost of the machine."},
{page:174,type:"abstract",lines:29,date:"Apr 13",text:"“success is a [place/land] where we can act without thought”\nEveryone’s favorite complaint - the mindless or mindnumbing scrolling on tiktok. I’m sure others have thought more about the addictiveness of this foul loop, but my theory is it has to do with the limited available choices - only two (like, or move on/scroll.” if you <em>don’t </em>like, there is really only <em>one </em>action - down - very easy to remember. In “Pairings,” I conducted/created an “experiment” where there was only one choice at a time: 1. square it. (a procedure - black and white. And the decision was <em>where </em>to put the square.\n…I think, with the added context of the previous procedure, the three step process, once of taking out the color, of making it square, choosing the picture, the actual cropping procedure could be said, the importance at least, to have shrunk in proportion to its counterparts - a quarter of its size.\n\nEver a problem solver ( 🙄 I know, embarrassing). I theorized that, were I to adjust the conditions <em>just </em>slightly - that the impetus itself was not so evil, so foolhardy, as to be incorrect, that parameters, adjusted slightly, could produce a game that would distract as intended, but leave out the endless loop - the addictive quality - that which draws us further in, like trying to quench thirst with coca cola - though it is of similar substance to water, it simply makes you thirstier."},
{page:175,type:"abstract",lines:40,date:"Apr 14",text:"APRIL 14\n…doing algebra homework. this is only <em>sort </em>of a metaphor, because algebra involves solving for…and in this game, or assignment, or exercise, you can some for either - one of the comparisons - things being compared to each other, or the middle - (most common) what it <em>is </em>that they have in common. In Referring to Abstraction, we saw that the curation of this pair was what begot the abstraction into our mind - conjured it - perhaps the inescapability that makes magic powerful. […] I offer now, a contained exploration of this activity - the small venn, in which <em>chip </em>away at what we are referring, that it is easier and easier to see (?) more and more specific. Let us not forget the start, lest we get lost, and so, we will frequently remind ourselves of: the two things - the pair coming up a single - a necessary - central commonality. I think it best to let myself stray to the end, lest I forget it (?where we are goin?)…a <em>map </em>I think (not a map of meaning, closer to lord of maps). in which we squish, disintegrate, get <em>so </em>specific about <em>what </em>we are referring to, by pointing out not only the <em>parts </em>that they are [taking the form of], but also, the parts that each part is being compared to. Because of the complications and that, because our mind is not a perfect computer, and there is a limit to how many things we can mold in it at once (you <em>know </em>this! really hope you know this). For example (and the example was originally want to help explain it,) , like <em>shaving </em>off little pieces, we edge, or <em>chip </em>our way closer - a sculpture, or a snow cone, whichever helps you understand it…, <em>in that </em>\n<strong>Petit Ontology</strong>\nIn which the rules of logic, needing only to extend as far as the [thing in question], and may be simplified as such. An <em>efficient </em>ontology, in that we <em>only </em>require the logic that is required for the thing itself, and so it is crippled.\n\n(missing)"},
{page:176,type:"abstract",lines:21,date:"Apr 16",text:"APRIL 16\nHad a theory that it counts up - the metaphor, the set, and then something more - artificial - conor - charlie. In the meantime I was developing some sculptures (pic), thought it was interesting how the vine gets to where it’s going, but gets lost in the middle nitty gritty thought is that the length is beyond our computational ability, as humans - and so, it is: a puzzle, a counterbalance (but there is a hidden mechanism, or <em>this </em>is a HMI, because when you look at it on <em>another </em>level, it is just a vine, like any other, and we know what vines do - they connect things, and it does not matter how roundabout the connection is, they are still considered as much, vines.\n— — —\nand the other thing, for example:\n(pic: the way the leaves blow in the breeze, tree, picking it when it’s ripe)(pic: a vine, or at least, something that has some property in common with a vine) (pic: this becomes ⇒ 4D - the evolving metaphor critique) (pic: you know, this looks like a…)"},
{page:177,type:"ideas",lines:8,date:"Apr 16",text:"If I were sticking things to each other, with ian, for example, this “dongle” that I made (with perhaps, the moon, and a dandelion, unblown). I could stick plato to essential characteristics - I <em>saved </em>that in bed for myself. And I (?) those (?) stuffed animals, so one wouldn’t run off and join the circus\n\n— — —\nand this, although it looks like an actual structure"},
{page:178,type:"day",lines:41,date:"Apr 16",text:"LATER (J’S HOUSE)\nJonababy is sleeping. He bypassed having to apologize by calling me wet noodle princess before getting in bed (couch). Here are my thoughts that I did not think were sufficient to write down in the shower (when I got out of the shower) (my hair is still dripping) (we went to the beach and saw seagulls and a crow came to sit on our chair when we got up and he was a king and I was a princess and we saw an epileptic girl - how did we know she was epileptic? She told us (pic) the parking meter is fine. I live across the street. I have epilepsy,. (missing) I think the (hard) part about referring to abstraction is that it’s kind of hard - lots of things change, and look different from day to day. I used to ask myself: can it be simplified?” Like the version of life I saw at that aa meeting, with all the bikers, when the sky was slowly turning to black, and was opaque as it was at the beach (like a wind sweeping in (they were just clouds) (pic) it’s amazing how much pie we have at home\n@@PB@@\n(pic: I was all smushed, and I looked extra jewish - like, just like rachel, for example.\n(pic: money, wish fulfillment in severance, narrow, ai and game mechanisms, <em>also, how I looked in the shower, when I saw myself in the spigot. The tupperware were I saved the computational power of a human brain, without any switches - circuits)\nconglomerate colonoscopy - you </em>put <em>narrow into the machine, but </em>no <em>first you put </em>1 <em>or 2 maybe, </em>examples <em>of narrow, and </em>then <em>you wait for the other examples to come in, so it is like pushing a button, (pic: start collecting)\nWhat goes in the metaphor machine? Anything that defines a set (that complicates and simples things: could be: examples, rule (set), combination. And the </em>metaphor <em>is the “ghost”of the “shell,” because </em>all <em>you see are the essential characteristics, so you just get sort of the </em>feeling of the thing.\n(pic: mold theory (holding hands) instrumentalism)\n(pic: ghost, shell)"},
{page:179,type:"ideas",lines:9,date:"Apr 16",text:"(pic: maddie’s idea) (pic: this weird book thing that I invented, where you read <em>four </em>books and then see what they have in common). The intermediate stage is like showing your cards (pic)\nthe automatic process of seeing what diagrams were in your head - this is something that you can do without “thinking.”\n(pic: emitting patterns, like wearing cowboy boots, and a cowboy hat, or “acting like a cowboy.”\n@@PB@@\n(missing: probs forever)"},
{page:180,type:"ideas",lines:12,date:"Apr 17",text:"April 17\nTried cutting lino blocks. It didn’t work. I tried to use AI to fix the problem but they wouldn’t let me. Something about money. As part of my meta thoughts initiative, decided to say: “I do the holding hands thing on purpose.” It is my mission (potential) (Oh yeah, last night I was thinking - the way that “conceptual” artwork, as the example - lateral thinking - three matches - (missing) Anyway - this was all an example of something I don’t wanna do (hungry…for <em>nothing!) </em>Because it felt too sterile, the project…it was already pre-planned."},
{page:181,type:"abstract",lines:43,date:"Apr 17",text:"for this reason, conceptual art is like a hypothetical - unsolid - it never gets done…it’s <em>just </em>an idea - it doesn’t have physical form, and it doesn’t <em>need </em>that. There’s no physical form to an idea (that belongs in the brain). The other day I was talking about <em>why </em>art is so appealing to me, and it’s because it’s the <em>only </em>real thing in the world (that isn’t translated). But when you see it, you’re like: “oh! <em>that’s </em>real <em>thing.” </em>it shoots into your mind, and goes through the metaphor machine but it doesn’t ?) really <em>matter </em>what the meaning is - just that it exists there in your mind - the meaning if instrumental to it <em>being </em>in your mind - the fact that it’s codified, and can be interpreted. I started imagining that thing Chris gave me - the (pic) heart valentine thing, and maybe with it having something else inside, because, like the army men, it doesn’t have to have legs, it just has to look like it could. So you can substitute the essential characteristics for the thing itself - you can add a roof to anything and it will be a house (in the room of the mind)”\n@@PB@@\nwhereas with conceptual art, where it is <em>just </em>an idea, and there is no form to it, we have <em>smooth </em>objects that are always black and white - there are no essential cs, so it can live in the mind, “without any unnecessary detritus, clogging up the filter, getting in the way of getting in the Metaphor Machine.\n(pic: you dump out a “puzzle”, “how to play” click clack click clack (that’s the main thing - the noise it makes), each one has a world that you can see on it…, you dump out all the pieces, and place them on the mat, (non-functional representation, back, front: perhaps)\nI think the other thing i wanted to do (emphasis on) was print out some of my diagrams, and play “possible worlds” with them - or these can be possible worlds - you arrange - with a few figures or drawings, a possible world that can be viewed through the “glasses” of dumping out the bag - and then, the other people either <em>get </em>it, or makes their own. Write it down for no cheating."},
{page:182,type:"ideas",lines:44,date:"Apr 17",text:"(pic: then it gets passed to the next person, hmm i think it means this, hmm, then, it gets checked with both of the answers)\n(pic: ex, first, it takes this form, then this form etc., etc.)\na flip book of concepts for an evolving metaphor critique, Btw, EMC is instrumental - a heuristic for how critiques go anyway - not meant to be interpreted <em>directly </em>unless it’s not understood how it fits in,\n(pic: holding hands) here’s the connection: what makes people tick? well, sometimes it’s an object, and if you “graduate,” I think it’s a reaction (?) No, actually additive property etc. new: similitude - what things have in common.\n(pic: these two tings make this thing (suggest/imply it), there is a certain relationship, here - the “SET” relationship.”\npic: these three things manufacture a fourth artificial thing\npic: infinite things can be involved, and it be a 4D like an EMC.)\n@@PB@@\npetit ontology (pic) I was told to make this.\n(pic) there were a couple things that weren’t tall enough for towers - one was the (pic) weird bone things that happened to fit perfectly with the pins that fell out of Sandy’s birthday present to me. The other were the hat inserts that were always a specific size. pre-Tot - “rule of thumb:” (pic) corrugated cardboard - anything made <em>into </em>something is going to be more expensive (pic) for example a box, however, <em>sometimes, </em>because you produce things a <em>lot, </em>you have extras lying around, too many to know what to do with - something that has immense value, in spades, due to some special circumstance, e.g. an artificial circumstance, like my having extra time to think about things (because I didn’t have any friends) and producing <em>gold </em>or love that’s on sale in a mental hospital, due to the special circumstances. These little towers that form, like crystallized sugar - like crystals (pic) gaining solidity in a cave “overnight,” like wine that’s aged by accident, a caved in wine store (?) due to an earthquake. All day, I am, I am writing essays to myself - just bored, thinking of something to think\n@@PB@@\nNEW JOURNAL"},
{page:183,type:"abstract",lines:20,date:"Apr 17",text:"about - are other people doing this too? And then - and I am explaining things to myself. i wonder, for example: why <em>is </em>that, and then think about it, and I apply <em>all </em>sorts of tools and pressures to them (one includes waiting), and then, by the end, a tower is formed. And I have amused myself - I have a little giggle on my tongue or a twinkle in my eye. And now I have <em>all </em>of these towers. And I figure - I <em>might </em>as well <em>do </em>something with them, after all, they have been sitting in this dark cellar for so long, stagnant, sitting in this dark cellar for <em>so </em>long, ooze dripping down like juice - meaning. I <em>suppose </em>I could <em>use </em>them to <em>make wine.</em> I <em>think </em>they look like this or sometimes like <em>this. </em>I’m not sure why. Anyway, <em>now </em>that I know there are <em>stairs </em>here, I think I’ll climb down into this cellar, and have a <em>look</em>(!)\n(pic: wine) <em>soo </em>many - I wonder what! I’m going to <em>do </em>with them all… (pic) wine bottles and wine bottles and wine bottles galore"},
{page:184,type:"abstract",lines:46,date:"Apr 17",text:"LATER KILLER NOODLE\n1. gathered adequate evidence to suggest that - well - Tot (pre Tot): (pic: and then: remember) I used to keep them in my purse. The fourth quarter: I <em>wasn’t </em>reading them (!)\n“I have nothing bad to say about that man, except that he was bad at his job - the one thing - his one lot in life - that he was supposed to do - his one purpose in life.” (the guy at blick)\n(pic: I subscribe to the “stay where you are” policy<em> of trying to remember something </em>school of thought\n1. what that girl had in common with making to(wers?)\non page six, she refers to towers v’ she first refers to towers on page six…\n1,2 - the two things I was trying to remember in the car on san vicente\nbecause it’ll come back to you, mommy always comes back to you\nthe “unsatisfying concept” - indirectness, ex. people paying five dollars for coffee, ten dollars for wine - for an experience - they don’t really know how to value, like art (pic)\n@@PB@@\nseed: when I’m by myself I [take the long way home] - take time to make decisions, and explain things to myself (the opposite of making myself into a weapon) and explain when I change - the intermediate stage.\n“just like” my vacation came to me - <em>all </em>my friends went on vacation, and I realized I wanted a vacation from feeling like I had to hang out with my friends, not an actual <em>new place. </em>\nthese were pretty much <em>all </em>of my thoughts between now and when I left. so: I could rate them from 1-10, put them on a to do list, or abstract/miniaturize them in a “mini” book and then, as I drove, I began/decided to deconstruct the binder - to make a customizable small version for ex. I realized that you can actually punch your own holes\n(pic: hairrow, like hair, that collects in a drain “it hugs your curves, and I don’t think you want that”)\n“good job sweetie - holding your pee, holding your breath, holding your thoughts\noh yeah, and: my nose had chili powder for <em>all </em>of my walk and the nine minute drive, and all the time I switched from Bristol on Wilshire to Bristol in Westwood which has in common: “a slight annoyance, lasting a long time,” like saying goodbye to J in a not pleasant way (I want to miss him)"},
{page:185,type:"ideas",lines:16,date:"Apr 17",text:"I carry [the book] around to remind me of what I’m trying to make. Now that I’ve established a container, we could put anything in it, but for now, we’ll put: a square textbook with a modest number of pages, so the space doesn’t grow cobwebs in our absense. I “wrote” the other things down in my tape recorder but I can remember them anyway…it ended with: that time I went to (missing)\n(pic: chocolate): “a stand in for something that is: a lot better, and a lot worse (because I got a lot of things done, but the chocolate was perfect, most of all, how it described the errand.)\nA tower is something that gets built up, so it can be written down, like getting a shot because you want the candy afterwards (pic: an excuse for, afterwards)"},
{page:186,type:"abstract",lines:16,date:"Apr 17",text:"LATER\nThis feels like “the right answer” (interrupted procedure → stop when you get there)\n(pic: put the wooden pieces that belong to the set, velcro on the back (or/and string)\n(pic: my sweatshirt, my hat. I was looking for my keys. I pulled things out till I found them).\nor, for example: (ex, set theory, for example, fabric or paper painted or printed, things that belong <em>in </em>the set, things that do not, this <em>really </em>should be wood, i’m <em>imagining </em>it as wood, but it might be hard to cut all of them.\n(pic: Sandy, casually playing in the tub with the cow. <em>I </em>wanted the cow. Through the interaction, as represented by the crown, the cow achieved an elevated status (I wanted it <em>because </em>he had it, and not another reason).\nJonathan started giving me his side lol :)"},
{page:187,type:"abstract",lines:15,date:"Apr 18",text:"April 18\n(missing: angry, etc)\nA peripheral property, in common with a seed - in that it comes first - in that it comes first, in that…\nThe seed” of what I was thinking about last night is: even this instrumental imagining of: me with my briefcase (PW vge) is a seed, though it does not <em>also </em>have in common that it will exist.\nRULE4RULE: underlying assumptions that I would have to draw <em>myself </em>in the mirror, (and <em>before</em> that, that I could not draw the mirror. But I <em>had </em>to draw the reflection and I had to include the possible venn even though it wouldn’t have been there. The mirror didn’t have to be as <em>big </em>as the real mirror, but it <em>did</em> have to have the “arms” (essential characteristic).\n(pic: projected on a wall)"},
{page:188,type:"day",lines:16,date:"Apr 18",text:"anyway, Jonathan is at his penis party. Making easter eggs. I think it’s pretty clear by now that the thing I’m describing has something in common with a seed, <em>and </em>something in common with the mirror of erised (pic: mirror, a seed, perhaps an almond seed, the thing I’m describing)\nI also kind of like the idea that the tiles come out of a cotton bag and when you open the box there are all these pieces that come out, that have different materials on them, and there are some mats.\nThey all fall on the ground, if you were to let them fall out.\nbut the other option is to let them pick them out. And they will <em>all </em>rub together in he bag, making clanging clanging noises, while they are being picked.\nmore mats that could be: (pic: making connections)"},
{page:189,type:"day",lines:25,date:"Apr 19",text:"April 19\nNoticed myself playing a weird game where I took food in and out of the fridge. Been watching <em>a lot </em>of Nathan for you, against my better will. (pic: cheese block, orange, sushi long, thing, when I was taking out one of the piles, my salad dropped and landed on the floor)(pic: i ate one of the beets anyway, but it was a harrowing experience. picked it up, and ate it, cause it landed on the fork).\n(pic: another example of a mat) I read my evan essay this morning, probably the <em>only </em>productive thing I managed to do and I kept correcting it, like Richard, and then realizing I was going faster then I thought, but not jumping - I just kept having to jump back, cause I didn’t trust myself.\nAnyway now I want to write this essay book, or that’s the current heuristic. I also want: “clearing things up” which is a tv show I invented yesterday when M and D were confused about why mommy says Doris differently. The background would blur, and I would explain the reason, but they’d be looking at me, cause it wasn’t staged. (for autism, by autism).\n(pic) another version of the duplicitous envelope which has in common it’s strangeness unnaturalness."},
{page:190,type:"ideas",lines:46,date:"Apr 19",text:"- another topic for the notebook\npuzzles, a specific relationship x any relationship\nthe obnoxious way that evan and maddie say stuff/get to where they’re going\ninspired by a pumpkin patch\ngets what he wants 9the convoluted way you have to s ay things - translating them into themselves)…\nthings that are clearly photographs\nnathan for you - leaving in the awkward moments (or solving for them)\noh yeah - the other quality I look for - fitting into the frame\n(pic: as if they knew the canvas was going to be there and were trying to fit the shape)\n(pic: “the convoluted way you have to make paintings” (is this real?)\nthese are holding hands but they do not belong in the same book\n@@PB@@\nwhat <em>does </em>belong in the same book is: the hidden mechanism/intermediate stage of: preparing puzzles for other people (and making it hard for them to know wha tyou are saying (it’s very important to only use big words if you have to)\nANYWAY: the (x) problems I solved: 1 (pic: by journal, typed, handby)\nexcept: the september journals are out of order so I have to re-order them, and that exposes the pipes, and leaves room for all sorts of “ambiguous” “decisions”.\nand starting in November, they have to be picked through to see what needs to be preserved, and what I actually <em>want </em>to die in the book. (and that involves reading some unpleasant stuff (esp. in January. (that I don’t want to live through again. (ideally design an autopro to do that for me…) summer is a quilt, and there’s too many places to start in September.\n(pic: the way the girl looks, waiting for her latte)\n(pic: if you go here, I’ll go here, purple/pink magenta, probably green, with an orange line or vice versa, a maze, can’t go here)\nThe other problem I was thinking about how to solve is: now that I have something to do with the stickers, I’d like to be able to see all of them. And now, ALL of them, are relevant, NOT just the ones that look good. AND SO: SOLVE 1: use indesign to organize them transfer from photoshop). (infinite pages, all the same size - auto ?). SOLVE 2: (is this necessary 2): add the page number under each drawing. So I can go back to where I found it."},
{page:191,type:"ideas",lines:16,date:"Apr 19",text:"which brings us to: WHAT we’re gonna use the stickers for, and my flight that I got on to get here: <em>specifically </em>picking the stickers.\n(pic: special ghost is my friend, the duplicitous envelope, ambiguous events, competing patterns, two sides of the same coin, state 1, hidden mechanism, state 2, you’d never imagine that there was something in between them that was this.\nFor example: when Chris gave the key - enabling us to be stranded. It seemed as though it was a natural stage to stage transmission. But there was this hidden mechanism, i took off my shirt but they didn’t like that, pieros and max was also there, max, we danced around the fire little did he know that I had hooked up with both of them, and it’s not the same thing for a girl to take her shirt off…"},
{page:192,type:"day",lines:16,date:"Apr 19",text:"in bed (i was at primo pass)\ngot my period, and I’ve been waiting for it. Watched a film with jack Quaid - idk - running through woods. And started Search Party. It’s kinda nice to know why I was unhappy, cause I was <em>worried </em>about being unhappy, I think. Period Cramps on the walk back from PP and now I think I feel better…<em>sort of. </em>Will I have less ocd now? I printed out the pages, cause I said I would read them back and organize them. This essay book thing got me thinkin of other essays I wanted to write - <em>little </em>essays. First thoughts, waking up, and how they affect your day. Minds as political systems. And I thought: smooth jazz smooths out your day - the bumps - like reading that essay back - jolting back and forth from\n\n(MISSING (A LOT)"},
{page:193,type:"abstract",lines:30,date:"May 8",text:"MAY 8\nCan’t tell if I’m happier or sadder than normal. maybe: more confused, less anxious. Executive functioning unnecessary in this advanced state. Here’s my theory (for why my handwriting is so <em>thin</em> today) - wake up in the middle of the cycle - got more sleep, but am confused. Originally i woke up naturally, but the tips of my fingers going off on their onw. can’t gain any necessary perspective - I lost the thread - like waking up in the middle of a movie - in the middle of memento. J says he reads what he wrote, and doesn’t like it. I didn’t wanna tell him that all I can do is affirm, and that, a large part of my journaling is? for continuity? - to make sure that, at any given moment, I agree with myself (maintain consistency?) Alternate theory - I finally - as I dreamed but didn’t dare to hope - have become dependent on coffee. Told J that I felt bad that I didn’t have a 180 iq like Russell or Wittgenstein, R who seems to have understood what he was saying. j couldn’t stop saying - “not me trying weed at 28” or idk - Mommy told me that I wanted to be friends with becky really bad and then it was too much. Same with Rebecca. I put out energy, and don’t want to maintain the state. Mommy was really interested in my theory of mind thing, but J thought it was stupid. Now, I’m wondering - is it subconscious. He says he’s used thought too much. But listening is a chore. For everyone!"},
{page:194,type:"day",lines:2,date:"May 10",text:"May 10\ncrashed, (pic, me in my car)"},

{page:197,type:"ideas",lines:27,date:"May 14",text:"May 14\n(missing)\n@@PB@@\n(clay ideas)\n@@PB@@\nLATER\n(missing)\n(pic) I ended up making <em>3 </em>castles - that’s a lot! Wow, that’s quick! (pic) I even developed a technique for doing so - roll out the clay, cut it approximate - forgot to measure - score it together, cut the turrets, cut the window - turret 2 across from tunnel 4. window (pic) narrow to “obfuscate”. Once I made one of each and had many different ideas for how to make them - edge case - individual bricks (pic) build it up. Put white clay between red clay\n@@PB@@\n(pic) four slabs (x4) could be pre-made of bricks? The way I made it, I scooped out the center - it was hard and time consuming, and got me frustrated - I guess - making a bunch of small things was the goal - assembly line style (pic) (I want to make these - brown clay, glazed white (rather than white clay with no glaze). Last night - carved out foam - covered with velvet, a perfect space for (pic: clay, wire, foam, with velvet on it…) Thought for J - games like “clue” are (narrow) - the dumpster thing - redesign - cause I believe in the characters. I believe in Colonel Mustard! Pretendland (with a real and imaginary mat). Mason mentioned Petite Ontology - the game at the picnic (pic: randall, scary bird looking boy), J, Nick and Sara, Saul, grounded, mormom, heavy earrings"},
{page:198,type:"abstract",lines:26,date:"May 14",text:"J said the dissertation could’ve been better to be thought about how our brain is segmented. And we got in n’ out after and Randall asked about my game and we talked about abstraction and how it’s dehumanizing and I told J taht I don’t know whether it was an interesting point, or just clouded with lots of words. I had to poop <em>so </em>bad during the presentation and kept shifting my weight so I could fart. J made a graph in my notebook of valence and how it affects when we hold hands (swoon). He bought some books to learn social skills and we took baths and last night we watched Little Hours and had sex through his underpants he said it was an ad for underpants and I was gonna show him kidnapping robert pattinson but the writing was too boring so I showed him Lady Valentem instead, which I wrote a day before I met him and he loved it - esp. the way th names are changed throughout the story, which is my fav part too. He changed the punctuation on the toilet so he can give one to his brother, to maddie and print it on his uncle’s printer (not sure why). Mommy loved my theory of mind thingy and we talked about it on the swing and I showed her how to read people, and she read most of it and then J called for me to"},
{page:199,type:"day",lines:55,date:"May 14",text:"come back lol. When I got back from Auntie Flo’s house, he called with Berry Pie and a new Episode of the Rehearsal and he had arranged for me to have the second closet in his room and had hung my baby blue shirt up so it looked all nice. (pic) we were eating hand rolls when I got my mri results and I called mommy and we went to see Santa Claus who J hated, and I liked (that he hated him) (Paul( He didn’t understand (communicate with me that well…I tried to talk to mommy about it, and ended up yelling at her, cause I felt like I couldn’t trust anyone. I feel better now cause Stanley Said it’s not my discs, but my sacrum, which I showed him where it hurt. That one day, J cured himself of autism. I broke up with him, and said “anytime I said I love you I meant I hate you, and explained it later as “if you don’t care about me to comfort me when I’m upset because the mri day, we went to my house, which was such a bit of a relief and J texted himself things he wants to copy from my house\n@@PB@@\nlike the rain forest sounds, and the coconuts (pic) the top floor of the fridge now J’s refrigerator looks like this too. Oh, and fridgerated/frozen food - cause I gave him the chana masala when he was hungry, and he was like: “oh! you can have food (we don’t have to order). Then the next day, he got a whole foods delivery. We cried a lot that night and made up “Le Crie par Jonaton” (pic) a little bottle of tears that he fills up with the last one in the commercial. I met Wesley Marlon Sonia at Oysterette the next day and then met J at the clay studio. He has a hard time with the other patrons- cause they’re <em>so </em>annoying. (pic) I had a bunch of band aids on my knee and ripped them off, and it hadn’t dried as much as I’d thought it would and there was sand all around the wound so I went with Wesley to the shower and he wanted to pee, but the bathrooms were closed and gross fat people were using the showers so I could wash off my cut so we sat by the not working drinking fountain and Wes asked if I could hold his hand while he peed (so he’d feel comfortable, and look into his eyes lol. He said I always stop being friends with people\n@@PB@@\nso he was flattered that I got breakfast with him the other day. Only Ashna, Sara, and Niha did I abandon. Went to Lindsay’s house with Maddie after old friends and Lindsay said M is a “fantastic” writer. I think it was a good thing to say, but I didn’t think <em>exactly </em>true. M read (upon my request) an entry of hating pottery, which they brought cause I said where we were pottery0 (we went to pasta sisters and got (missing)"},
{page:200,type:"day",lines:31,date:"May 15",text:"May 15\n(missing: questions for JJ that I wrote at Sweet Lady Jane after m and d came and met me and I got a small glass of milk and I asked for a large one but it was $5. so I paid and then said “oh but…can I have just a little bit of milk” and i had given a 50 cent tip, so she said “oh, alright” so I got to dip my cookie in for a sip, and m and d were passing by on the way back from taking my packages and they came and sat down with me and we talked about the hot tub and d told m to try to turn the heater on but it didn’t work. i told a bunch of people that story and they all liked it to some extent, it reminds me of accidentally getting the wine pinot for free and the girl touching my arm and mason kept asking me questions and that night i dreamt that we went to hot dog hell together, probably cause we were both in hell there. anyway, I got a chocolate cherry cookie, and then today (may 18), I made it to sweet lady jane just in time despite the walk saying 21 mins but it was 6:45, and I want that to be a helpful metaphor. I made up some stretches today and all the ones I thought of were right and she said I have an intuitive sense of my body, and I told J that, like simplicity concept, I’m learning to brag, but actually just from the ground up. I do miss him, but idk, maybe i’m less tense - either way, good to have some time apart, and maybe only sleep over every other day and lead up to living together again but maybe I can keep my key…pottery studio)"},
{page:201,type:"ideas",lines:15,date:"May 16",text:"May 16\nHad <em>so </em>many dreams last night. Last night I tried thinking of things I could make out of clay before I went to bed. And then, while I was sleeping - I came up with another…I was looking at a deck of cards on that shelf in the hall - the one that lives there - concept. I borrowed one aspect and told J about it later - an outline - just the basic outline - revolutionary, cause not using the properties <em>at all </em> - just a flat surface, with nice rounded corners. Drew from pictures onto polaroids - there was an autopro of simplifying the outline and then coloring it in just like areas. taking the “mode” of the space and filling the whole thing. I told J - turning my hand into a fist, and then"},
{page:202,type:"abstract",lines:19,date:"May 16",text:"showing him <em>around </em>the area about the example, and then how I’d extrapolated. He got stuck on mode - said he does that all the time - “to make three. And two mean one thing, and the third means another, I guess (tangent) before, sleep, I wanted to make the bandaids, and put them in a “large size egg” and keep it at the front of my house and pick one every morning - the brilliant part was to maintain the black outline by painting (black) between the bandaids (I gave up on representing the curvature) (tangent) I think I clarified from suggesting I make a bunch, to realizing I could only make one (3) (only = D envelope) The last thing I wanted to tell J - the hand that would’ve wrapped around the hand that would’ve wrapped around was the idea of prescribing an autopro, so, <em>though </em>it takes a long time, the art piece is “free,” in that it only uses <em>none </em>of the soul."},
{page:203,type:"day",lines:31,date:"May 18",text:"May 18\nWoman said she liked my pwc “shirt” (sweatshirt)(missing) woke up thinking about “an art store” - autopro - clay things - ex. (pic: red and white) - different ways to make it but the conclusion, at the end of the project, I’m going to realize that it’s just <em>any </em>movement - that produces something that “looks” platonic” - in that, the style and colors seem to mandate each other. Clay heads to put in mint green celadon cigarette cases with cellophane circles in the front - the “friends” /anyway, and sort of dazedly (would be) holding hands. With an ugly headstone bad design aesthetic (pic: collecting friends collecting friends) (upside down) black circle, magenta letters, white tiny outline…\n@@PB@@\n(pic: little stars of white) looking at open houses I couldn’t go into (pic: here you go mister/miss)\n(pic: cellophane window that turns, idk why) (pic: gold sticker(?) that has: the pattern you’re collecting in (maybe <em>red </em>outline/”fringe”, and purple (?) pocket\n(2 book pages I designed) (on my walk)\nsomewhat interactive art store - also - someone manning the counter where the autopros are displayed and you can take one out and play with it (clay and wood ?), and then put it back (and it goes in a “cookie-phane” bag (i’ve had this idea before, but now…(clay diagrams)\n(pic: hmm, I think I’ll take this one.”)\nthey can just be displayed like that, and (have more behind them)\npatterns I’ve collected, and memories I’ve had throughout the day…(AI covers(?)…) (easy)"},
{page:204,type:"abstract",lines:10,date:"May 18",text:"once I design all the clay autopros TM\nLast thing: the golden thread of intention, that runs through [everything] (always have these golden bubbles above while you’re interacting with people) (pic: something else, doesn’t understand, it hurts, my PT, me)\n(pic: maybe about seven things - fabric sublimented onto foam = foam, cut out, and shreeked into the crevices…(altoid dimensions, but wood, maybe unfinished)\nSome personal history cause I’m a person. (missing: sad)"},
{page:205,type:"day",lines:36,date:"May 18",text:"He started saying how I was brilliant and cuddling me after I for once figured out the right way to be mad (missing) Anyway, then we had sex, and I cried, and we listened to rain forest sounds, including rain birds, and rain night birds” and we couldn’t go to the pottery studio today cause emma might’ve been there. He started fingering me and I was touching him (that might’ve actually been the best part - I put a little spit, and the way he was moving when I first started touching him.” I begged him to keep going when he stopped while he was finally fucking me and it made him cum so then he fingered me after. And he said he wanted to be in a relationship. Not me walking down montana thinking I have a hot boyfriend who <em>wants </em>to date me after fighting all day (not me, but maybe me). Cause I needed a break too. (missing)\n@@PB@@\n(missing) And even though I may eat something else for dinner, what I will mainly eat is the raspberry bar, or everything will taste like it, or everything will have the texture of it. Was wondering what a non-sweet rasp/strawberry would taste like (like I wonder about shortbread and pie crust sin sugar.\nINTERMISSION (made up) exercises, burrito\n\n(pic: locket) get to know: someone else’s mother in law\n(pic: pre-used wishes) yes, these eyelashes have <em>already </em>been wished on, but they are still pretty good :)\n(pic: same with these dandelions)\n(pic: MATCH the guy with the gator, and Fred Armissen being mad that she didn’t understand the difference between a suggestion and an example. “Probably got to jail, probably not.” j says she meant maybe, but I think he thinks it’s 6-% chance for both - meet in the middle (key to marriage success)\n\n&lt;empty-block/"},
{page:206,type:"ideas",lines:31,date:"June",text:"TYPED OUT FROM ONE OF THE OFF WHITE NOTEBOOKS - MAYBE AT IHOP?\nHad this kind of like idea for a kit. (picture)\n(picture) could have hoonie new one's inside of it.\nAnd then it could have a black like clay thing in it. But it must be dripping black. And it should probably just have like a doll head with <em>long </em>ringlets so the body would be the black thing - and just painted black… (picture)\n__________\nOk I had another/some other ideas last night in bed I think - make like a clay ring (picture) and then attach a curtain to it with a thread or wire - wire rings. (picture)\nimprovise sewing\n“? sort of things onto it\n@@PB@@\nand you could also make the heads for collecting friends if they are hard - make them out of…can robinson make plastic parts or find someone that does\n\n“the most direct method for representing a concept is through metaphor, in which each <em>part </em>of the concept is manifested by the thing. You could also have it be such that the thing you make “is a metaphor” for what you’re thinking of/is a cognitive vehicle in that it gets you somewhere - uses the same neurons in your brain even if the data is different and it’s a version that you can’t plug data into. because (?) the concept is a structure (that you can plug data into) and then you make a version of it that is (strictly a metaphor and - in that - it gets you to the “same place” as the concept exists in.\nThis is (also) related to the “end of the line” theory - how things can be ended off etc."},
{page:207,type:"ideas",lines:12,date:"June",text:" (pic)\n sort of embedded, but randomly.\n The weird thing is a) it does not do anything - there’s no point to the flowers being 3D, and there’s no point to the cloth as it can’t work because the flowers are 3D so it’s in between 3D and 2D (and could NOT, for example, wrap around something)\n\n (pic)\n ok maybe you can weave through them (red thread) with thick blacker ribbon (velvet) a) why is the black thread so much bigger b) why not just use the clay to make the whole box - and why use clay not wire - something wirier,”\n because it just seems kind of weird -"},
{page:208,type:"ideas",lines:22,date:"June",text:"something kind of silicony - like skin…ok…MAYBE A TRAY w/ (like a tea tray but instead, there are body parts on it (so, still part of the tray) and there is no distinction between the tray (the holder) and what’s on it (the holder)\n(pic)\nAlso, like, why would make a tray out of skin? it’s not rigid (So, a poor choice). And it’s hiny, not elegant. it literally maybe flops when you pick it up. <em>So </em>there must be <em>another </em>reason it was used - like one that was intrinsic to the meaning.\nIn the places that don’t make sense, that’s when you can see that the thing is intentionally made - was made intentionally - esp. if it’s clear how much work it took to get the inappropriate material to bend to the will of what it is eventually supposed to be.\n@@PB@@\nOk let’s try another one. A series of pea jars…indicating that there is more or less - gradual increments (3 or 5 or 7). Well, this is not something important to indicate or hard to understand so there must be <em>another </em>reason why <em>so </em>much effort was put into making this <em>elaborate </em>diagram."},
{page:209,type:"abstract",lines:15,date:"June",text:"A plate is a container that has an implicit structure - something can be assumed about the contents - that they would go together to make a “<em>good meal”</em>\n\n — so anything you put <em>on this plate </em>will have that assumption made about it. And then you could take <em>any </em>kind of container and use it to imagine that type of relationship or connection between the things on the plate and each other.\n\n (pic)\n\n (pic)\n\n The metaphor machine implies a connection which is that all the things in it come together to <em>project </em>the interior/center into the realm of imagination and there are two kinds  - one where they have something in common, and one where they’re all the pieces needed (the difference between kits and sets)."},
{page:210,type:"ideas",lines:16,date:"June",text:" Step One (1)\n (pic)\n people playing with the sugar packets when they are bored waiting for their food\n\n (pic)\n Now the sugar packets are made out of clay (and so is the dish, as it was before) (MAKE THIS)\n\n(pic)\n(2) The sugar packets is converted into <em>just </em>this game. <em>One </em>part/purpose is extracted at the detriment of the other one's so it can only be used for this secondary purpose which is kind of <em>funny. </em>Because IDK and now they’re no longer gonna be in restaurants which is the only reason they existed. It’s an example of a certain kind of logic - very direct that (doesn’t) take into account, to an almost/maybe hilarious extent - the reason for something existing n the first place. Or - it is just a weird kind of logic."},
{page:211,type:"ideas",lines:25,date:"June",text:" So anyway, back to the peas:\n\n (pic)\n\n (picture) x3 (or 5 or 7)\n\nWe have the graduated jars (in increments) and they demonstrate “something elaborate for something small” - then you can start thinking of examples of that - for example, can you think of any examples of that where someone made a whole elaborate demo for something small\n\n (pic)\n\n What I can remember is Ilene telling us that we were learning 5th grade math\n@@PB@@\nWell. Anyway. So, then you see: the things in the Set. And you put them together into the Metaphor Machine and you try to imagine what they might have in common. But unlike the game you played at the beginning, there <em>is </em>no answer, and we are imagining it just to imagine it - that is the point. Enjoy imagining it. Try to find the answer. Think about the things, and what the attributes of each are, and what they might have in common. Then you can switch them out if there’s nothing they have in common. And if you start to <em>see </em>something on the periphery of your mind that they could/might have in common, you can put them in that “order,” with the things that <em>do </em>have those things in common in the front, and then by the time you get towards the end of the line"},
{page:212,type:"abstract",lines:12,date:"June",text:" you’ll see that you can put different things in their place (use the time while you are reordering these to quickly imagine which things from the pile could take their place - replace them <em>really </em>quick - 123 - 1 - try it -, and then 2 - try it, and then 3 - try it and then if you can’t think of anything to have in common between them try 4 and 5 and 6 if you can…\n@@PB@@\n(pic)\nwhat do these have in common?\nAs a child, my brother and I used to play this game with our drawer of pokemon action figures - find what’s in common\n\n (pic)\n\n What do all the pokemon action figures have in common?"},
{page:213,type:"abstract",lines:40,date:"June",text:"START BY HAVING THEM IMAGINE\nThe last cared - next introduce “the apparatus - “ a structure/would be furniture [that <em>expresses</em> the idea that there is a third perfect card.] Now that we <em>have </em>this <em>apparatus, </em>let’s use it for some other stuff, shall we?\n@@PB@@\n(It’s lopsided) and now you can imagine that they have something in common. Not <em>what </em>they have in common, but <em>that they have something </em>in common. Ah, that’s very nice. There’s something in the middle of the circle, and you can see it by looking at all the things around it in your mind, and imagining that they have something in common between them, and imagining what they have in common between them. Now, see if you can just look at this thing - what they have in common between them. <em>See</em> if you can just look at it without looking at the ? around it anymore.\n@@PB@@\nI thought of this either while I was falling asleep or when I woke up the first time - ice cubes - that’s how you can tell (do the contents imply the container?)\nThe preface to “referring to abstraction” was that (symbol) this is the new punctuation and (symbol)\n(pic)\nLike (soldiers) there are soldiers that say things are progressing forwards. The clock without the numbers - when you’re trying to fall asleep - “ok - none of that stuff means anything. 0) take the shape - remember how mommy chided me for not knowing how to read a clock (so I can’t read it) Next, you want to just put a blanket over it to muffle the sound (“it’s not that interesting (trying to turn my brain off so I can fall asleep.) Then you can take tweezers out and pull the things out from under the blanket and brush their fur off and pat them on the head; send them out to play.\nI used to think all the concepts/metaphors could be put in a box but now I think there would actually be a progression between them which connects them - a different kind of relationship."},
{page:214,type:"dreams",lines:11,date:"June",text:"I dreamt that Jonathan said he figured out that I was actually <em>8 </em>years older than him with his “thelodian calculator” and I was like “checks out that it would be wrong.” I was like “Oh, you’re looking for someone who’s 22, even though I knew he was not. There was this girl who rolled her ankle and I had to carry her “just until one of the boys noticed “(just like snow white - cinderella?) and then I was like “yeah, I’m not even considering her partner as a potential romantic interest” and tried to decide if that meant I was a lesbian."},
{page:215,type:"abstract",lines:7,date:"June",text:"CONNECTING ACTIONS TO INTENTIONS\nPeople don’t think enough about what other people are thinking about. you have to <em>imagine </em>other people’s minds\n@@PB@@\n(DYSPHORIA) IMAGINING IMPOSSIBLE THINGS\n→ is good for you…it expands your mind. Feminism is bad because it’s not a belief system - it spans both ways - it’s pretending to be something it’s not.\n@@PB@@\n(missing)"},
{page:216,type:"day",lines:17,date:"Jun 18",text:"June 18th\nLater in the day at Peet’s Coffee after Sean got his phone <em>and </em>I have a peanut butter cookie Niha texted he got in an accident after Sean put my phone on do not disturb without telling me - (actions have consequences and never cares about anything).\n(()) → If you are comparing two things, and saying what they have in common, you could put them in a venn diagram\n…I have to figure out what I want to do (right now - do I get a chocolate chip cookie from whole foods - go home and work - walk - have dinner with my parents - analyze all the elements and see which one (?) I want and find something that gets all of them (in the past I’ve done this and the universe has given me something so weird to do that I never expected. Ol - this store is closing so decision made"},

{page:218,type:"ideas",lines:57,date:"Jun 19",text:"(out of clay)\n(I don’t really need to make this, it would just be funny)\nThe only thing that’s happened today had to do with the peanut butter cookie. Last night I spilled water (just before bed. And then this morning, I thought my peanut butter cookie was extra good - wetter. And then I realized it was <em>literally </em>wetter because I spilled water on it (haha).\n@@PB@@\nok so basically I could write down all the exercises - (?) things that I know <em>need </em>to be there. And <em>then, </em>I could fill in the explanations of why they are there (and these could be in the right order, too?)\nfilling containers with things\n“what’s the procedure - science telephone”\nset theory - a few stages, as it turns into sculptures/figures\nmaking up your own game\n(all the games I thought of (so these are in between) pokemon action figures (trying to figure out what things have in common - so far this has been done with hoonies - I could show them with hoonies, and they could do it with something else (ideally they do it with moment).\nOnce they have established the structure/procedure - comparing things, trying to see what they have in common, then they can apply it to anything\n@@PB@@\nThis was very confusing - I introduced myself as Sophie, (missing)\n\nnew thought:\nbecause the thing changes shape when it’s plugged into the first one, and moves down the conveyor belt - the new concept is only able to apply because it can now apply to the new thing - the thing has been changed…therefore it can apply to it (the blanket cannot be placed if it is not a clock, because the things are too upset to be dampened by the blanket. And the tweezers cannot pick them out until they have been muffled or else they are too upset to come out. (ok sorry, the first one i mean is that - the blanket cannot dampen them if they still have meaning (or something). (oh, and now of course it’s the simplicity complexity simplicity principle because the things are changed (so that) they can be dampened, and <em>then, once </em>they are dampened, then they are able to be picked out with tweezers. It’s almost as if they could have been picked out before but they weren’t in fit shape to be picked out (namely that it would have made me too anxious to put a blanket over things that I could see specifically - I’ll be honest, I don’t completely get the example and don’t really want to think about it but …\nCLEANING UP YOUR MIND\nIt is very important for people to have their stuff in the proper place. it can be upsetting if things are out of place. it is nice to have everything neat and organized - for everything to have a place, and for everything to be in its place.\nWhat does it feel like when things are messy - when we have <em>stuff </em>out and about"},
{page:219,type:"abstract",lines:153,date:"Jun 19",text:"PROACTIVE AND RETROACTIVE PATTERN MANIPULATION\nThe ambiguous event - this is the centerpiece (- the cornerstone - the kernel - But I don’t quite understand what that means. Because I haven’t got into the meat and the juicy part of it yet.\nThere is this fantasy that the english language conforms directly to logic - that it would be mapped out onto a conceptual (language)? Almost like math…and translated directly. Formal writing - science writing - academic writing - we use “proper” spelling and grammar so that it can be understood perfectly.\nPRIMING AND COGNITIVE VEHICLES\n<em>However</em>, our mind does not work exactly logically like this - at least not <em>linearly</em>\n- &gt; the lead in - the drawer pull\nI find myself <em>correcting </em>myself a lot when writing “oh no, that is not the correct way to say it” But perhaps the way it comes out in my mind is the right way.\n2) there is this thing where you, for example - introduce a subject you don’t really <em>need </em>nay punctuation. It is not a sentence. in fact, it is an invitation for the person you are talking to to remember or imagine - conjure this thing you are about to talk about - into their mind. And we forget, often that <em>when </em>we are talking to someone - what we are <em>trying </em>to do is create what it is that <em>we </em>have in our mind, and create it - transfer it - into their mind. This means english - the logic of sentences - is not always the best format because it does not follow the logic of our mind - the logic, I think - that <em>all </em>minds think in…we need to imagine the thing <em>first </em>before we can do anything with it. But some sentences, in order to conform correctly to the policies of the english language - the “mind” version of them - needs to be mapped - so that by the <em>end </em>of the sentence, you have to go back and imagine the thing that you were starting to think about originally. this takes time, and is much less effortful than if you had followed the “train” of through. See some of the examples above - in which the object (mind version) needs to be “re-added” to the middle of the sentence - because that’s the time that there would be something to be done with it.\n(thought about: shrodinger’s cat…actually he was wrong all the times i think (or did i say pandoras box…i don't think so) anyway, he was wrong a lot - about power, about etc. and then thinking about the diary thing and how that would actually be interesting for a story - also there was one other thing - oh - the gaslighting, and how i told him about nick and josh and that guy who didn’t want to fuck me and he said “he wasn’t entitled to my body” and then said his therapist had told him he’d been gaslighting me and that he still wanted to fuck me even if i didn’t want to anyway…somehow that led me to the thought/idea that if you were to read a story with all the information already organized so that instead of going linearly, it would be organized in the way that things that go together go together, and…like, the idea that, if you read a book, you read it linearly, and by the end you reorganize all the information a bunch of times. The fun part I guess, are the twists and turns of reorganizing stuff but instead, what if you had it all already organized and then you could just see exactly what it looked like at the end. Like in the sophie kinsella “can you keep a secret” book, you would be given all the information up front. then it would just exist for you.\nAnd then I was thinking, also, about making the little card thingies with all the little pieces of your day, like the salad thing - a thing that was significant - that stood out to you - apart from all the other things that happened to you during the day\nif you just had all your days, and like 8-12 things that happened to you on any one particular day (maybe 5 if you’re being realistic) - and then you could just go back and look at all your days that you had.\nI’m not sure how it relates to the other thing\nanyway, here’s the last piece I didn’t type yet: (enjoy 🙂\nRetroactive Pattern Manipulation\nPerhaps you are in a situation in which you change the understanding of the situation <em>retroactively</em>. A person thinks something about you because of something you’ve done, <em>Then, </em>(hypothetically) you would change the understanding of this action - the kernel of meaning at the center of this action I wont get into how (yet), but suppose that you could. By <em>tricking </em>the person into thinking that you had a different <em>reason </em>for performing (?) the action originally (or in the 1st place). Specifically, by <em>picking </em>out <em>another </em>kernel of meaning in the action, then the one originally interpreted - an alternate interpretation - in layman’s terms, without all this technical mambo jumbo.\nNow that we have understood what <em>Retroactive </em>Pattern manipulation is (we have not, I know - but you know enough to know it exists) Let us discuss <em>Proactive </em>Pattern Manipulation. Knowing that you plan to perform RPM <em>later </em>and <em>intentionally </em>adding in a second, additional interpretation of the event <em>when it is first performed. </em>Not retroactively. that you intend to call upon “when the time is right.” What I mean is <em>intentionally </em>“setting up” an ambiguous event (an event with multiple interpretations).\nAnd now we can learn what an <em>ambiguous event </em>is. An AE is an action, which has <em>two </em>interpretations (or more). - so that when we try to interpret it there are <em>two </em>possible interpretations.\n(picture)\nAnd so - the first one, for example, si the one called upon at the original performing of the action. And later, in retrospect, we call upon the <em>second </em>interpretation of the event.\n<em>How </em>do we call upon the second interpretation?\nWith context of course. One of my favorite ways to do this (though I have never done it intentionally), is to make the event (the action that was performed) part of a <em>pattern </em>of additional actions. <em>Which have </em>the <em>second </em>interpretation. If performed by the same person, it will become clear that <em>this </em>action <em>also </em>follows the intentions of the other actions. there may be other ways to do this. but I don’t know any of them.\nIt has become a <em>tradition </em>or routine to “tidy up” whenever we get home from somewhere, or perhaps at the end of the day, when we are just going out.\nWhat if we have to put things in our mind back “where we found them,” so that things aren’t so messy in there always. to be honest, some people have <em>very </em>messy minds. ANd I am judging them for that to make up for them judging me about having a very messy room. to make up for that, and to make myself feel better.\nTrying to stay <em>here </em>while you imagine the outskirts\nStay here while you imagine what’s on the outskirts.\nPERIPHERY YOU ARE HERE PERIPHERY\ndecision tree\nCONSIDER ALL THE OPTIONS AT THE FORK, but then, choose one, and ignore/forget all the other options for the time being/till the next decision tree/opportunity to make a decision. In the meantime, “apply a program” - a preset program - that includes a lot of pre…(cesion and patience?)\ntying your shoes is one, brushing your teeth…idk, now I’m gonna tie my shoes: commence/initialize “shoe tying” program\nTRANSLATION → MUTATION\ninitialize shoe tying program\ncommence brushing teeth program\nDetailed Summary of \"Another June Journal\""},

{page:224,type:"ideas",lines:13,date:"Sep 6",text:"HAD THIS IDEA YESTERDAY (NOT TODAY) WHEN I WOKE UP: Eclectic pieces of wood, tied and wrapped together with the white string, and black things like birds or hats made with velvet to go in the nest\n\nand I remember that I wanted to start making things in multiples because I like designing assembly lines\nThinking about painting intricate designs on things once I get my underglazes (wonderglazes)\n→ could paint these, using erasers on similar size pieces of wood. And then hang them like you hang a sign from the ceiling\n\n curtain mechanism\n twine\n rounded\n\n ← print - linoprint\n ← arbitrary designs"},
{page:225,type:"ideas",lines:53,date:"Sep 7",text:"<strong>September 7th</strong>\n yesterday, when i was in the car, going to Zach’s house warming party, and Evan didn’t want to come, and it was kinda warm, and I was kinda tired - I had some ideas. 2 games about maps that my mind decided were not very good - one where you want to make the board change to look like the map you have. The other where you try to get lost - so you do things until you can’t do things anymore - like Evan said - zangzoo or something - and then you win. other idea: “open source ideas” (rename blog) - like - people might like my - “settlers of san fran” idea, about homeless people withs hopping carts (or just make the same game with different tiles/different resources) ANYWAY - SOMEONE else could make it. Cause I don’t want to or I don’t have time - one of those - Kasey, or Richard or someone who has nothing else to do. OPEN SOURCE IDEAS. new blog. Also let me re-imagine me taking Jennie’s idea and feel less guilty about it with the new mindset that like Indian’s share shoes on a plane, I don’t want to claim ownership over my ideas - i want them to be made. Makes it harder to make sense of that bitch Air BNB woman except maybe she’s not doing my idea right. Or maybe I want to do <em>that </em>idea. Anyway: I would need to <em>explain </em>the ideas as best as I could, so I could make sure people would do them right which explains the mismatched images I include, and the messiness of the presentation. Last idea: META GAMES - ppl need to learn what pattern collecting is, AND set theory, and people as paradoxes before they can play any of the other games - other games ex. collecting specific patterns. Because, for example: last night: ex. I thought of another set - going out (includes receipts to look like cards) (diagram)\n → a torso w/ a belly button, and a boxy black tank top. No, but - things that were ironic. I told everyone to take off their shoes. Three people tried to physically “lock in” Niha.\n I think I might want to make hexagon bowls/plates with indents for the diamond etc. (?) with the <em>right </em>colors - mint and pink and chartreuse etc.\n Also, I want to make sanitation cloths (diagram) ← little napkins → white fabric, small, folded into squares. the size of a cocktail napkin but folded into 4ths.\n\n Other things i could call my blog that i was supposed to stop workin on today (i promised myself)\n 1. finishing things\n 2. ideation, iteration, ? end game (idk)\n 3. end game\n 4. open source ideas\n i solved a problem today - just by thinking about it -"},
{page:226,type:"ideas",lines:35,date:"Sep 7",text:"TRAIN OF THOUGHT - I could put ants\n felt bad about killing the ant that was on my face. “No one told this ant to be on my face” - I could put ants in sets of three like maddie and evan had at the party, instead of their squares. (picture) what’s the point? Then people could say: “What? Those are ants? Not decorations - it would cause confusion. Jonathan said - is what you find funny just making things worse? I said yeah, but it’s not - like to cause confusion. ◬ This could all be in the form of a receipt - look like a receipt paper-printed on receipt paper - except not - as a card…\n\n “He loves me not” necklace “oh…you know that game… (yeah, but why did you make the necklace - well, I’ve already answered your question - you’re being a little unreasonable now. I get the benefit of the doubt, cause they don’t know I’ve planned it.\n@@PB@@\n (pic)\n\n pretty pink\n painted different colors\n golden rod\n mint green\n little walls around the dish -\n\n the idea, that you keep certainly colored things in each area - gold fish for example whatever the other things I thought of was.\n iteration - not walls, instead, they’ll be pushed in by shapes, pattern blocks for example. I solved a problem by buying something - an aid, someone to do my projects for me, transparent fabric, pattern blocks - then: only slightly indented - different colors. If I could find a way to “?” mass-produce them - hexagon cookie cutter - roll em out\n to buy: hexagon cookie, cutter, but in right shape like so I can make: the glasses, and the scissors and the cyclops eye that I was thinking about at the club last night when I should’ve been dancing\n@@PB@@\n TRAIN OF THOUGHT"},
{page:227,type:"abstract",lines:5,date:"Sep 7",text:"Last stop - I feel like that deserves a stare off into space\n arranging thoughts - i don’t <em>want </em>to connect these two things\n the two things: 1. I honestly don’t remember\n 2.\n I’m kind of scared to go back\n@@PB@@\n (pic)"},
{page:228,type:"ideas",lines:16,date:"Sep 7",text:"the other thought I was having, I think yesterday\n ← plastic\n ← tape\n ← rope string thread\n &lt; life preserver\n\n i found this on aliexpress. remake out of wooden rings that mommy has) - + milky coffee tape + string - nylon or lovely thread, not string (?)\n\n AT THE CLUB: AUTOMATIC PROGRAM\n → making that (and using that) not only does the ___ have to be an AP, but also: the making of the, has to be…ok: the example :)\n oh yes - tic tacs - the other thing to go in the orange part of the dish\n (pic)\n (pic)\n bow ← something to go in the pink part of the dish\n goldfish\n tic tacs\n a button (!)\n ← mint green\n (a mint?)\n x pills…(?)\n@@PB@@\n surprising because usually dishes don’t <em>come </em>with things you’re supposed to put in them…expand your mind (eye roll)"},

re some of the things you’d need (there is an inborn procedure to the exercise, that comes with just the goal) and you have all the containers:\n→ a structure - with something sitting on it - like the garnets in their little metal home (which I could make, by the way!)\n← something - black balls or beads or something - made of velvet?\nwhich means there’s things in there:\n\nindistinct things - now, we just need to: figure out what they are\n\n“WAYS OF THINKING - “SYSTEMS OF MOVEMENT”\nSTART with these: (unglazed, white glaze, loose)\nSet to yourself: make a lot of these - a lot of these.\nThen ask: what will you put them on?\n(buttons punched in)\npill goes in them example) ok then: maybe on the inside there could be velvet (pic) → a little circle of black velvet - the shiny nice kind\n← and this is a whole structure - ends so abruptly, you’d think there’s a real purpose to it - a reason it has to look exactly like that - used for something.\nOK AND THEN ANOTHER THING:\na silk handkerchief, basically, and folded - (the funny thing is that it doesn’t quite lie flat, and that’s the main point of it - that it’s folded.\nAlso: the handkerchief(s): can go in an envelope\n(3 - folded up in there)\n←handkerchief\n\n21"},
{page:262,type:"ideas",lines:55,date:"Sep 21",text:"ok this is a stupid idea, but i have to write it down cause otherwise (what else is this notebook for)\n\n (pic)\n → two pieces of (”pink?”) fabric, sewn together, butt to butt (but turned out in the middle, and one pinch in the middle) o ← direct(?), sewn by itself, to itself\n with buttons. with flower fabric. DICE. ok.\n ONTOLOGY - a system that doesn’t make sense in and of itself, but it refers to something outside of itself (the opposite - this is a metaphor - an ontology of birds, where birds are not creatures that exist in this world, but are instead: made up objects “oh, and it would be cool if they could fly! - ooh, what if they had wings that could flap, and keep the air from under them?! And they could be black and made of velvet and wire.\n I first tried it with three wings - cause I thought - the more wings, the easier it could fly with. The birds, they like to fly together, in the sky. - They kept making shapes with each other, and I thought they were trying to say things to me\n\n Look, I can count (a bulletin board with 1,2,3,4,5 birds tacked on it - and the number, next to the bird, made of the same material (velvet) to show that they can really count (and maybe they’re also sort of painted - like - the paint is part of the number to have it really black - the number can be made of wire. And then the stuffing comes out, and gets painted on…\n BIRD DICE (in matchboxes. smaller version. button painted white)\n\n BIRDS WITH COMPASSES ON THEIR BACK (BECAUSE THEY NEED TO SEE WHICH DIRECTION THEY’RE GOING\n (plastic, giant compass, blue with red arrow)\n (close up of compass)\n\n inside, pin, 5 boxes (not to\n → throw them. That’s how you see what the number is. And yeah, they weigh different. But “such is life” it’s a metaphor for how stupid people are(?) lol(?) idk :) idk actually? …:)\n\n another “iteration” of the BIRD DICE\n Well: you know how I’m going to get + size scrabble tiles in the mail soon (I’m preparing) → yeah?…well - bird - tacked to tile. 1 - 1 per bird, each die (side) gets a number of tiles for the number of birds on it. AND THEN: they all get thrown at once. There is no knowing which ones were picked. You could thrown them into a constricted area - taped - or shallow box.” but. - you don’t - INSTEAD, you let them settle on the floor. And connect the ones that you think look nice together - that you think you picked. Would’ve picked if you\n\n had been the one to pick them and throw them. you go into the future, and you see which ones you would’ve picked, had you thrown them and the ones that were picked were the ones that the die showed."},
{page:263,type:"ideas",lines:30,date:"Sep 21",text:"Last night I made out with a girl. It was maybe one of the hottest things. She was hot.\n Ok here’s some more dice I could make\n\n “in a pinch, if you don’t have some dice, put cheese cubes into bags - different amount of cubes, depending on the side. And then throw them. Whichever one lands - whichever one you think is the best when they all land - that’s the die side that wins. (Here’s the others:\n Note: you could also do this with cheese puffs/cheese balls\n\n (pic)\n\n I woke up with a hard heart - and all my thoughts were changing it - some of them made it go to sleep for a little,\n\n (pic)\n automatic process:\n Sugar packets\n cut: (pic)x5 (?)\n step: [sugar] on all them\n sew: then, 2 on each other.\n stuff: then one by one there you go. PUT them in a pile, and now you’re done…\n NOW HAVE FUN…BUT you need to think about something in particular while you are doing it - getting BETTER AND BETTER - HEALING, or SNOWBALLING - or…IDK…ANYWAY - it’s a ritual, make sure you’re in the right mindset\n ← coin envelope with like 12 pieces of paper -\n cigarette butts on the floor of the tray which is a drawer (and has a rug on it)\n\n ← painted white\n ← tic tacs\n → they could all go in the box I guess…IDK\n ← plug (string)\n ← pink\n like a game of telephone\n bad at communicating\n\n TRAY FROM THE DOLLAR TREE (PLANT A RUG IN IT) - THAT’S THAT…- a cutesy one, or a pink one, with fringe (belle confusione)…"},
{page:264,type:"day",lines:54,date:"Sep 21",text:"said in an angry tone: you know how many conversations I have in my head with you everyday?!\n\n (pic)\n we switched zynns for no reason\n “oh, here - you can have mine” - as if that would do anything different…and then we put them in our mouth. Hers was very well used. I put it in for a second, and then threw it into the bushes when no one was looking.\n\n She came and sat on the couch to tell me I could hook up with Zach, if I wanted to. “lol, no, I don’t want to. That ship has sailed…we hang out all the time…”I’m not a jealous person…I’m poly” and then we just kept holding onto each other, Almost kissing - I could’ve kissed her. I don’t know how it happened. Finally we put our mouths so close together, and then, without really thinking I just moved mine a little bit and then we were kissing. And Zach was watching He was just sitting on the chair, in his uber normal white shirt, probably had his hands on his knees. I wasn’t watching him cause I had my mouth on hers but in my head, he was staring straight at us, with no expression on his face. Just watching, but not thinking…anyway - then she kept tryna take my pants off, which zipped up in the back, so she could not. I think she was trying to show Zach my boobs which I didn’t mind. Anyway - we went back to the kitchen (which is not\n\n a different room by the way, where Niha was making like a whole meal for some reason - 3 different kinds of carbs - rice, potatoes, and eggs, and markis was talking to her. we just kept making out on the couch. I don’t know - maybe we should’ve stopped. But I didn’t want to. Maybe we could’ve gone in the other room to have sex without our friends watching, but it was more fun with them watching\n on my to do list: accuse (…) of lying about not loving me. Also: ask for lessons - how to be permanently condescending. Or is it a genetic thing - high IQ associated…runs in the family\n\n Ok, for some reason, Zach does not want to sleep with me - not even in a threesome. And it’s probably for the best - I know it’s for the best…since I met him, I knew it was for the best. Are we still friends? can we be friends? I don’t know how we can be friends if he is attractive, but apparently we can.\n\n another pattern I could collect/am collecting: problems I don’t have ex. “how to not eat like garbage this year” (IG ad -But - I don’t have that problem (implies that you’ve been eating like garbage the past year, and that if you don’t get the product, which you won’t, you’ll continue to do)\n impression of people coming up with ideas:"},
{page:265,type:"ideas",lines:21,date:"Sep 21",text:"instead of [flower game], why not have: [coin]\n (pic)\n lol → see, cause this is a bad idea - and yes, it’s more efficient. But it’s not what the game is about. The game is a ritual. Because people don’t understand the underlying reasons why people do stuff.\n ANYWAY: THIS IS A BAD IDEA.\n\n I GUESS I COULD PUT IT IN MY BAD IDEAS BOX…THAT is a good idea - one I should actually do. And it solves a problem - like majorly - cause then I can just say they are all bad ideas, and so that’s why I won’t/don’t want to do them. For example - the mango thing - is that a particularly good idea? Idk. Certainly the sugar waiting game is not exactly a good idea. And: none of the words sounded quite right except: BAD IDEA.\n Here’s another. Find someone that doesn’t love you. Spend a lot of time with them…etc.\n PLEASE: LEAVE ME ALONE SO I CAN BE IN LOVE WITH YOU IN PEACE! (eye roll)\n BAD LOGIC necklace\n Another idea: I had: (pic) hinge bandaid - inside looks like boobies/a womb\n (pic)\n\n 21"},
{page:266,type:"day",lines:21,date:"Sep 21",text:"Like, when I think about the encounter, I think - oh - I would’ve liked to see what’s under her green bathing suit - I’d like to pull it away, and see what’s underneath. I bet they kind of look like mine (I am getting wet) - a little bit floppy, but mostly solid - that bathing suit was holding them so tight, and making them into a weird shape…wouldn’t it be better to have let them loose, and so they could breathe? If they felt like they had nothing to hold them up. i could’ve helped. And then, maybe, if we were on a bed, I could (while we were kissing) maybe put one finger under her green underwear. pull it aside. Maybe put on finger in there (and she would say: “whoa! what are you doing?” (Like, in her head, but in reality, she’s say ooh!\n\n blah blah blah at the rose gold and sorry not sorry - description (before my weird week where i didn’t see anyone (and no: evan, i’m not missing out on anything. i don’t care. - i want to miss out on that stuff…)"},
{page:267,type:"day",lines:117,date:"Sep 22",text:"Sep 22nd\n I don’t know why I feel so nervous about writing in my journal today - I brought it to hang out with Jamie. It was ok. I wanted to journal. Kinda like Doug said hanging out with George was ok, but he’d rather have had hot dumplings or whatever.\n Me, in my room, working on weird little projects, just sort of heeheeing to myself is like Becky and I hiding under the desk for the duration of the party (in that we were heeheeing to ourselves)\n Jamie has weird things with her body - her vertebrae are all slanted slightly downward, like a horse, and she faints sometimes randomly. I think I might be attracted to her, actually I know I was. She has something in common with Clemy, and I think it might be femininity. I can’t picture hooking up with her cause, as she says, she is passive. But she is queer. Kinda like a dream come true. Cause I think she must like me, if she keeps trying to hang out. If I start dating Whittley, that could be 3 girlfriends lol, just as I predicted. Haha Jonathan only has 1!!!, and he doesn’t even like her! ◬ I gave her the triangle problem and the 30/250 and she did both of them really fast, and actually got the right answer. Can’t wait to tell literally all of them. She has a brightness in her eyes, that makes up for her autistic way of speaking a little.\n\n Yesterday, against my will, I went out. I think it had something to do with frankie and JC being there, and I knew they would be cause David told me. Now Frankie thinks I’m creepy. And like literally stalking her. Which is actually 100% true hahahhaha not in a weird way. I just thought she might like me. Her partner (?) liked me (JC) - she was playing a little solitaire puzzle which answered a question I didn’t ask, about whether people play solitaire games, like the triangles one, and Memory Library (xi for yourself). We talked about her ex being on love is blind and how we both love relationship anarchy. She is a vegan. I don’t think I was actually that attracted to her, which is why it wasn’t that hard. She has a literal job, - identifying human rights violations. And so does Whittley, who explained it to me, on the couch, when i wanted to kiss her. Are any girls actually straight? I guess Niha. When we all went into the Rose Gold - bar across the street, and we were all dancing to idk - 2000’s music (no one is good at dancing - it almost feels worse than not dancing - and yeah just stand in a big circle, like it’s middle school, and sometimes people go in, and everyone cheers. What if the music had a beat?) zach said - if he leaves, then everyone is gonna leave. There was talk about going to ihop and then Niha and Marcus went to Niha’s and she made pancakes - that’s cool. I want pancakes.\n\n Niha was wearing a “deathly hallows” t-shirt, and tiny little jean shorts so she was all thighs. She came up when i was talking to JC (Jacey?) and was like “OMG - we’re besties - Sage lives in a mansion(!! lol). I wanted her to go away cause she was straighting the vibe. David said he was sad cause Juliet said some mean things to him about being an introvert - thought he’d get an ego boost, but instead she took him down a notch. He keeps it real. I gave him a hug. And as we were walking up, he said he was worried about being kicked from Kyle’s kids Next Door whatsapp group - I was like what?! are you talking about and he said his friend Anthony was kicked. I said “Oh, that’s cause he pushed Cheriz” and “yes, in an aggressive way,” went to the dollar tree tonight - a little extra errand after jamie and I were done hanging out. It wasn’t really close to where I was, but I had to keep reminding myself that I like driving, and that I hadn’t gotten to drive in a while. It was alright - people kept coughing in the store near me. been thinking today about basically choosing what I think - telling myself what to think, so as to direct my emotions where they need to go. After I walked in - I caught myself being like “Oh, I don’t want to be here, I don’t like this place” and then I heard myself saying over the loudspeaker in my head: “Yes! I love these kinds of places - ooh! Twine! etc” and I was like - “Oh, weird, but I guess that makes sense.”\n\n I guess Jonathan needs to learn to do that. And I had a thought, just before David got in the car last night - about referring back to my (our) my own “intentions,” or thought processes - seeing what mental state I’m in - the evidence being - what types of thoughts I start to think, collect that pattern - the thought I had was “wow - ever been to a roundabout before?” - so - kind of rude - trying to keep it light. Whenever I see someone I feel threatened by on Montana, I think “fat ugly bitch,” and it helps me cope, and I don’t think they can hear it. They are never actually fat. I had a thought just before seeing Jamie, but I don’t remember what it was, and all I remember is opening the front seat mirror to put on eyeliner - and putting on eye liner, and thinking “oh, good job, you’re doing a good job” because I have to try really hard. I know I’ve had the thought about seeing what kinds of thoughts I’m thinking before - the funny indirectness - referencing something - nothing - but I don’t know how exactly to make it useful, or necessarily explain it to other people, or make it into a worksheet. What I was thinking about - maybe it was last week, was chaining - how, a thought by itself isn’t interesting, but if you (wire?) two together - then it’s interesting. Which is crazy. But like -"},
{page:268,type:"abstract",lines:200,date:"Sep 22",text:"if I have a thought that I think is interesting, then i can’t write it down, till I think of a similar thought, and then I have a chain, and then i have a pattern - and then I’ve proved it twice. Or, like, when I try to clean and I can’t trash unless theirs two. It makes sense not because of the trip to the trash can, but because we’re: looking for things that will do something,” and one trash is not enough. Two is sort of a vaguer “ thing to do” - incomprehensible in its vastness. I can’t quite categorize how useful it is - it meets one of the imaginary criteria that makes me think I’m getting stuff done. And same when I write things in my diary - if I wrote just one of something, I could say: “oh, I guess everything goes - I am going to be less strict,” and the activity would fall apart - I couldn’t have enough of a filter or it would lose some of its value, and then I wouldn’t want to continue. And the thing I was thinking just before I took my nap (2 hours ish, in bed just now - nice, but a little boring.) - was about rituals, and how: so many of the things I (me, but I) do are (really) rituals - “for the mind,’ and not the world. Sometimes I find myself doing something just to end off a pattern. And then, of course, because of the separateness between my actions and my intentions (oh. hmm) I can go back and trace why I’m allowed to do one\n\n thing over another. And sometimes the answer is mysterious, which implies that it is 1) insight about the situation or 2) OCD - but a lot of times, it just means that I wasn’t done thinking about something - I had something on my docket, and perhaps the process itself interfered - was trying to use the same short term memory like - sometimes I can’t plan the next action to do after the one I’m doing, or I’ll get all red signals for that particular action. but then, if I do that action first - (the one I am, had been (new tense, who dis?), planning for after, first, I can do it. OR, I can just stop thinking I’m gonna do the other one after, and then I can do the first one. This is a weird one, because it really makes it into a ritual - makes it clear that it is/was a ritual. Overview: there’s different parts of my brain where decisions come from, and various ones take the helm at any given moment. When I am very anxious, for example, I become sort of crazy, when I do this thing with my actions. There is some slip, where a weird part of my brain takes the helm, and I could do really anything, which is why you get all these homeless stories - times when i was controlled by the colors or clicking things, and anxious - because I think right now, for example, I’m very much controlled by it but I’m not going through lots of emotional turmoil, so it\n\n basically just translates to me controlling myself - spitting back the same actions that I would have taken anyway - just a little slower. I do know that some of them are more directly from a mental state that I c/wouldn’t normally worry about - sometimes I solve for things that will give me less anxiety, but not be optimal in other ways. Sometimes I introduce myself as Sophie because emotionally, I don’t like the idea of someone knowing my name. And I guess the answer is: it’s sometimes ok, and sometimes not. If my heart hurts, then I make different decisions, so as not to hurt it. Ok, another thing - it’s hard to get off the couch, or out of bed. I know it will hurt my heart, if I have to think “Ok, what was the point?”, so I have to trick myself and think: “Oh…I’m going to get some water” - or I can get to a threshold - I want to get water for so long, but then, when I think “ok, this will give me a headache if I don’t - I guess that’s some emergency fire drill programming that overrides (maybe I put a rule in place a while back that says: do not let yourself get so thirsty that you get a headache, from multiple times of this happening, and thinking ‘wow, i should not have done this - i could have easily prevented this by following [this rule] - and then adding it to my list of rules. And the part of the brain making the decision remembers this (question: what other rules do I remember from this decision but not from my natural normal waking life) I’ve noticed this a number of times, and thought: oh, I should use this on purpose, but haven’t. And there’s some emotional reason why writing this all down made sense when I haven’t written it before - that I was talking about it out loud - that Jonathan made it seem valid? I don’t know how to feel about him wanting me to “fix” the clicky thing - I kind of wonder if I just accepted it, and stopped thinking of it as a dirty secret\n\n and mommy didn’t look at me suspiciously whenever I spit food out of my mouth - IDK - I’m worried that there is some barrier of “knowing it’s OCD” that lets me bow out at the last second if I need to. But idk. idk idk idk. I really don’t know. I’ve had this for so long. It’s part of my brain.\n - - - - - - - - - - - - - -\n Why does my heart feel like it’s broken? Why do I feel like I could have some control over it, liking of him and yet - and why is it in my heart? It should be in my brain. And why do I like him so much. None of it makes sense. And why does he not even care that I exist? I have a natural aversion to this kind of middle school garbage but I’ve thought of every other possibility and I can’t crack the code! I tried to use the dots in my carpet as a metaphor to try to get out of my head - to try to rid myself of “this terrible disease” but instead I just almost killed myself and then “decided” not to by saying “god take me,” and that’s how I got out of it. J had some stuff called like “edible paint thinner” - is that I wonder: a clue. Jamie was telling me about an escape room today, and I just made the connection - I feel like I have to find the clues, and I’ll get to escape. “That’s part of a pathology” everyone would say (Jonathan and his team of (!) therapist\n\n - sort of like a pokemon - Meowth - that he sends out to get me - I tried not to think of it that way\n\n Anyway, I don’t believe in pathologies - but - idk - I’m scared to think that. Being very honest with “you” today” - maybe I’m drunk (I’m not drunk. Are you drunk? No). unexpected office. Yes, I got the head spins where I need to get some water. BUT I don’t want to think about everything in it’s path, on the way to get water, so I have to wait to get it until it’s a desperate enough situation. then I can go there without any [turmoil] :/ I have to get water. I thought of a solution - I could do what I want to do - stop being dissociated - stop doing things I don’t really want to do , so I can fall back on “the indirectness” which means I don’t have to…I could be embodied…but there are confusing situations, where there isn’t one thing that I should do: ex. I want to finish a project, but I also want to eat chocolate. I want to write in my journal but I “wanted” to finish my projects, when I was talking to Jamie, and I gave myself a pep talk in the car and I got a journal that’s called: “MAKE IT HAPPEN”\n\n and then there are other confusing situations where I have to remember the rules of the situation without getting upset - can’t think of them consciously - the other thought - It’s basically just me asking my brain what I want to do, and then doing it, but it has in common with OCD this sense of impending doom if I don’t do the thing, and maybe some shame and guilt. I wonder if Jonathan is going to text me. it makes my cry that he won’t. It’s actually insane how authentic feeling is and how I can’t think myself out of it - almost like it’s actually a feeling, and not a pathology. Thank god he likes me a little bit - if he didn’t like me at all - I think I would be sad. Or maybe I could forget about him. If there was not a smidgeon of hope, maybe my brain could just say: “nope,” and stop thinking about him - I guess that’s a competing pattern that I don’t know if I’ll ever solve. i can think of one way to solve it but I don’t want to. Also, there’s the competing pattern of: OCD VS. INSTINCT. And, if you like META thoughts, you might think: ah yes - I am anxious, because I have so many things on my to do list - if I took them off my to do list, by completing them, who knows maybe my anxiety would go away - but comparing things - introducing them with a\n\n certain thought - a comparison, or with a joke - as a joke, as a [game, dream, silly thought, etc] ⇒ but, specifically - comparing them to something else, so it brings out the [blues]…idk - ya know. Anyway - and then the idea - that I could just write a book - a real book - that’s honest, where I give away all my secrets, instead of hiding it/them - my one secret - the one thing that explains it all - all the weird decisions - like one giant “game” of retroactive pattern manipulation - dancing around them. There’s the ramachandran approach - people need to learn about my brain - that might be the only approach. I guess if I have a bad emotion, I can think afterwards: “ooh, I didn’t like that - what was I feeling - why did I feel that way,” and maybe it goes away - everything goes away except Jonathan - why does it feel so embarrassing and impossible to be in love with someone who doesn’t love you back - I don’t even know if that’s true - I have to poop and drink water and maybe go to sleep? ( :( ) but this was fun. I love you :) 😘"},
{page:269,type:"abstract",lines:97,date:"Sep 22",text:"Dear Diary (same day - literally two minutes later ;))\n Anyway: Dear Diary: this is a thought that I thought other people would like - not necessarily me as much. I decided: ooh! I have the best life: I have a job that everyone would want and I have some attributes like being creative and relatively kind etc. that people want - being charismatic - everyone likes me - like Marcus said - he wants more friends like me lol (meetup people all have mental disorders so that doesn’t count) But anyway - I was thinking about my trick - to be happy: just find things that you think people value - tell yourself you have the most - choose the most important qualities based on what you have - tell people that - “oh, you should do it - it worked for me” but everyone ACTUALLY does want to work for themselves and make tons of money and be relatively fine being alone and in love with yourself because you’re so smart, probably smarter than 98% of people in the world - is it a coincidence that we also have a lot of money? Honestly…idk…\n Anyway - then they will be like - wait, that’s not fair - you’re doing a trick, but you’re actually not doing a trick - like in that movie with Amy Schumer had been made with someone who’s already hot. (Here’s a joke for no one: and the main thing people will be jealous of, of course, is my ability to think of metaphors and examples when no one else can - I’m a real pro at that. ◬ I should take myself out to a business lunch at the Santa Monica pier - to the roller coaster and congratulate myself at the “wee” part. I kind of wanna go back to El Salvador but without my family. Not even w/ Jonathan. Not w/ Sean. Not w/ anyone - just myself. Because I love myself and there’s nothing anyone can do. But I also do kine of like staying at this air bnb with my parents. They’re renting it out, and it’s nice that they gave me my own little house. SET Theory is basically just about making a system of rules to justify your decisions - it’s another version of indirectness\n\n (pic)\n\n (picture of hand sanitizer packet) I could try to replicate the complicated matter on the hand sanitizer packet, and get it wrong intentionally, have part of the plan be to get it wrong cause I don’t want it to read like actual words.\n\n But I have to contend with the possibility of having a fairy knot situation. Also, I feel like people could think I wanted it to look more like the actual hand sanitizer packet. And then I would be erased. And I would not like that. I do not like being erased. And I don’t like when people telling me how I feel. Here’s an example of a pattern: when Jonathan said “Oh good” (two times - when I found the right towel. And when I confirmed that Maddie didn’t talk shit about him…that was funny cause it meant he was just disliked. Should I try to correct him - he thinks I’m not cool, but everyone else thinking I’m cool. he was surprised when i said I met a girl at a bar - why - does he actually have an incorrect impression of me, or does he just not really care, or pay attention. (same thing, one begets the other) Anyway the smile seemed detached and like he’d planned it - just like it does in that live photo from the reel inn: “I’m going to smile now! But he has a nice smile and it melts my heart when i watch his stupid long-haired IG video wow I sound gay. He better fucking text me. maybe he’s just upset/embarrassed about what happened last time. maybe he’s sleeping with his mom.\n The thing about my anxiety disorder is that: it’s there so solve my anxiety and it does the job perfectly. All I did was add a little indirectness. Why does no one appreciate the actual brilliance of this - not even me. So when Jonathan asks me if I feel anxiety - no. I don’t feel anxiety. Cause I solved it with my anxiety disorder. That’s what it’s for. I go to Cafe’s. I feel sad that he doesn’t text me. I feel happy that I drink coffee and write in my journal. I feel like journaling is and has been my new hobby. Filling up this and every page with everything I want to write. Making every page look like a newspaper with my tiny printing. Oh! Isn’t everyone sad that they can only read, and not write, like me (not everyone knows how to write). Excited to go on a date w/ Mick Burson from instagram and mess up his happy new relationship. He probably won’t let me but come on! And I could say: “Oh, I’m dating someone too.” Because, unlike Maddie, at least J said that when we were on the phone - in his normal condescending tone - good time to be condescending. JK - hilarious time to be condescending.\n\n (pic)"},
{page:270,type:"ideas",lines:10,date:"Sep 22",text:"red, black writing, white, velvet, black velvet, wrapped around smaller but cork shaped wood, maybe contained in a box\n mini version of the toilet paper holder, goldenrod, white\n\n black, gray, white - little street, made out of jenga blocks, connected by white bow ribbon?\n\n (pic)\n\n wood, fabric, lots of buttons sewn on\n\n (slide plastic paper through slide to p groove)\n (…easy)\n in the corner, two pieces of red velvet, sewn together\n\n sage’s faces in places and spaces\n\n23?"},
{page:271,type:"abstract",lines:51,date:"Sep 23",text:"You just have to accept things, and try to work from there (abstract painting) also -\n\n ← all that was written in basically the dark - I kind of like how the words came out. I have paint on me, but I don’t mind. I discovered some blue paint this morning, and it was difficult to imagine being upset about it. I went to Teddy’s cafe with Sean today and we only had \\20 and we got Huevos and tried to get a biscuit but couldn’t. I gave him the game - triangle math problem, and watched him think out loud about it for a while. I was thinking, but actually, it does kind of matter if he can do stuff like that in his head - for job interviews. Tried to explain to myself why I don’t like doing that kind. I’d rather be printing out a thousand copies of the People Watching Club handbook - seeing the gold get embossed. Oh yeah! Finally the thought I had this morning because I was so tired - (hadn’t gone to sleep yet - the garnet game - assign yourself an “automatic process” - that’s impossible, and then you can’t solve it, and it comes out different every time - like if you could break a machine, and make the little cracks they add onto the babies → make the bat - wire the wings, and sew the velvet, but the velvet can’t be sewn - not in any (?) way, anyway - it’s actually the exact same as the finger knot problem - planned obsolescence or whatever. - a computer program that will get stuck. Anyway - it’s a bit stressful to plan for this kind of thing. Sean and I got stuck at a light where there was no other side - it’d been blocked off by emergency vehicles. And I was planning for what to do when the light changed - but only I couldn’t plan, cause I didn’t know what was gonna happen. At blick, I got some more wood squares large?), a red rubber block to make erasers (joke), and some other things that looked nice in the bag when I took them out - like wire, like the wire I’m planning to make stuff out of. I should probably make Frankie a box - a wooden one. With something muslin in it. To explain to her that I wasn’t stalking her - , but I kind of was, but I wasn’t - not in that way - not like I liked her - but, well - I did like her, but not in a creepy way. I mean, ok kind of in a creepy way. In that I want to go to her house and see what she keeps in the vegetable drawer. Then I could memorize it. Then I could know what to eat ◬ (I could eat all the same things as her, if I found out)"},
{page:272,type:"ideas",lines:11,date:"Sep 23",text:"IDEAS I HAD IN THE BATHROOM\n (pic)← but cover in velvet. (fold the corners like wrapping a present?)\n\n (I feel so sick, I think I have a headache, for the first time ever, from thinking too much\n\n (pic) ← velvet tampon holder (ones with a black bow?)\n ← the lovely black velvet, and sewn somehow embroider the sugar packets (in red): SUGAR find something raised to print\n order the he loves me not necklace and why not a poor baby necklace too\n well anyway - these were the ideas I had in the bathroom."},
{page:273,type:"abstract",lines:22,date:"Sep 24",text:"September 24 (3 am)\n I designed three projects in my head while waiting to fall asleep for the past 3 hours, just like I used to that one time when I was ?baby-sitting little kids on a field trip at wash u?\n (pic)\n 1. that thing that happened with the therapist where she accused me of accusing her of accusing me of being angry at her\n 2. THINGS THAT ARE WRONG W JAMIE\n 1. she faints a lot\n 2. she has a horse spine\n 3. her butt is a little too low or something\n 3. Hypotheses\n 1. I am the most interesting person I know\n 2. I can only do useless things\n 4. exchanging zynn with whittley\n (pic)\n (solitary confinement (being alone with my thoughts for a long (seemingly infinite) time.) living forever) → These are two things that ?scare? me, and I’m gradually preparing for this reality by making my life more like it - spending most of my time in bed, thinking about stuff (not depressed or trying to sleep, DGIT), and the other half journaling about what I thought about - trying to remember everything - practicing recall.\n (pic)\n 1."},
{page:274,type:"ideas",lines:13,date:"Sep 24",text:"A locked drawer in a dream\n (pic) → tray from the dollar tree\n → divide into compartments\n → only thing i thought of so far: the clock with an eye - stamp it onto fabric (pic)←wire\n (pic)\n (idk what the compartments will look like)\n\n (pic)\n 1. (Counting Down) THINGAMAJIG\n → make hands out of wire and fabric\n → sew the palmistry lines in … - it’s ok if the hand scrunches and gets sewed to the bottom (pink fabric, red thread)\n (pic)\n\n (pic)\n\n (pic)\n 1. POCKET\n Basically the same as thingamajigs, except the things are black, and it comes in a box…the box can have a picture with the things dumped out on the top\n (pic)"},
{page:275,type:"abstract",lines:9,date:"Sep 24",text:"ACTION INTENTION\n felt and sort of like the nebraska map, but of the brain, and all the spaces are white?\n\n trying to figure out what assignments my mind will accept and what it won’t. Current hypothetical criteria:\n ✓ challenging\n ✓ useless (or questionably useless…?)\n\n , so, for example: making my hands out of wire etc. is challenging enough though perhaps there is an end\n also - emotional weight, but that one is annoying.\n\n Also note:"},
{page:276,type:"day",lines:14,date:"Sep 24",text:"was having a panic attack in bed, so please be nice to me. Ate some chana masala, feel a lil’ better and just so you know: pocket is about collecting all the reasons why it’s ok to be sad. That was the first one I came up with, and that one has emotional weight. I feel weird writing this. But I tried to slip back into the colors (on purpose???)\n and the main thing I could imagine was the pinkness of the whole thing with the window, and the two Maxs (a common theme that I just identified) - Alex, and Andrew. Anyway - the pink was at the top, in two jagged lines, slightly smaller on top, and some\n\n Oh yeah! another thing I thought of:"},
{page:277,type:"abstract",lines:19,date:"Sep 24",text:"I figured out how to do abstract paintings\n - start with a real picture, and then let it go\n - I’m not even sure whether the stuff I’m adding as an extended impression, or just responding to what’s there\n\n Thinking about doing yet another painting based on that picture I took of Sean at lunch today (pic) ← that’s the arrangement\n → going back and forth between thinking my newer abstract paintings are amazing, and it’s cool that I learned, taught myself in so little time, and sandiart put it in perspective, and Freeman - others can do stuff too. I guess it was the lack of likes on instagram. My phone is stressing me out - SOML and probably everyones.\n\n These days I’m very much prone to inaction. Hypothesis - is it better to think someone’s gonna see what I’m making, or that it is I will be a secret? The latter is lonely. The former is titillating - esp. if the person doesn’t wanna see it.\n Anyway -"},
{page:278,type:"ideas",lines:22,date:"Sep 24",text:"a drawer full of potatoes - oblong wooden shapes, painted partly pink - like a pig - same as Max color - in some kind of drawer, or maybe a metal thing like a shopping cart with much more shallow/different aspect ratio, and no wheels.\n I could go to bed, but then i could think I am trying to sleep, when I know that’s not possible - I could go to bed with the intention of writing more things down - I think - that’s why I went to bed in the first place. The lateness is tricking me. I laid down not to go to sleep. Counter example: my journal - but that feels like therapy? (And I do not necessarily plan on anyone seeing it. i don’t really have a plan for it, so maybe that’s the solution.\n Little clay sticks (pic) roll them out - let the ends round, so no cut it (bottom left corner) right bottom: a purple thing, and a square: with 2 different shades of purple with faux windows, not like a purse, but the dimensions of one (it doesn’t open)\n\n (pic) ← 3 of the fish things, hung up - velcroed on with a metal bar locking them in place.\n (more pics)"},
{page:279,type:"abstract",lines:67,date:"Sep 25",text:"25th (SEP)\n\n pic: THINGS I WANT TO MISS\n (pic)\n LIST OF TIHNGS: SOAP, pink (this time it’s pink)\n LIST OF THINGS TO WISH FOR\n (The logical extension: i’m in an art period and my taxes are due - I have a history report and I want to finish this painting) Everything I do, everything I say, everything I think is for you. What can I do - to break this curse, this spell, please tell me. I’m too horny to eat, too hungry to masturbate - I have things to dread - all the social interactions that people invited me to today (these are good things to dread) - I WANT THEM - I WANT to dread them). One small respite - writing it down - this place that isn’t too sacred, for this - once. Somehow, impossibly, I’m still not tired of thinking about this. How could there be more possible ways to explain that you do not love me, and yet I haven’t seen the end of it - not, not even close. I am a sailor, and that is a buoy - the day when things will end - when I connected enough dots to know my heart doesn’t want what it can’t have - and yet - there is a garden that grows. And tender leaves that grow raise up and send me shrieking - looking at the moon and wondering - what is life - what is it? What it can be - can it be like this? (why does it feel like I can think myself out of this one - like all the other ones - the messes - little messes - I’ve created for my mind. Surely, no, this is not real…this shining, shimmering thing - hope - that you could want me - that I could take every trowel and dig it - a grave big enough for us both - and that you wouldn’t weep when the dead skin of leaves wandered their way over our bodies, leaving us whole. Intact, holding hands - like the sun, shining down, burying our two faces as we craved into dust settled, let passersby stand amidst our rooftop, somewhere, somewhere else, someone was wondering at the ice of a refrigerator, at the cube of ice trays that could stay cold even when you took them to their bath. There was a wedding. you placed tulips, I pulled. Begonias from the ground, because I thought that was a faster way of doing it. You laughed at me, I screamed (I was laughing too). I wore pink. You also wore pink. No one told us we couldn’t (both) wear (pink) it, and so we did. You were laughing when you saw your relatives coming down the aisle. I had taught you to laugh. At stuff. Like that. I cried, and we both cried, that night when we fell asleep. And I had pretty jewels. Of blue, and possibly silver, that caressed my neck, that hooked me as I was falling asleep. I planned on seeing Jupiter that night. When our wedding was done…and it was shining - brilliant - maybe - but there. I could caress your neck if I wanted to. If you got a scraped knee I could sing to it. At night, we could do the dishes in the kitchen. Count the pennies in a growing jar - red, copper, yellow - we’ll write down all their hues in a little journal (pic (the pennies we’ve got blue, red)\n\n (ok that’s enough - this is too gay) (see notebook if you want to read more…(it’s good, it’s really quite beautiful, but i can’t type it out now, not at joe and juice, not w sean coming…)\n\n I’m"},
{page:280,type:"day",lines:37,date:"Sep 25",text:"getting scurvy on my little teeth - they’re - now they’re curving.\n The scurvy isn’t due to not enough juice - instead, it’s cause I didn’t save enough breath. There are little holes in. all of my teeth - “be real” - me says. to me - when I stand in front - in the mirror. “Please be real - but these holes are real, in fact they’re causing there to be - extra space. between each teeth.\n “orange juice, I guess is in the kitchen” so I could stand up and get it but if it could stand slow and clean and lonely like the refrigerator itself, put up on the highest shelf, then you would know that there was no juice in that fridge.\n Instead of turning gray, or even. cream colored, they’re starting to be crooked - each one has tiny hooks that get under and into and underneath anything - they say (to each other): “why can’t you come clean. just be real about this.” Each tooth is lying ‘There isn’t much sense. In trying. to trip me. up” I say, to my teeth, but they are lying still. And still, the teeth are bending, slowly, smiling at each other. At my expense. “Enough!” I say, and I am angry. But I can barely close my mouth because there is so much mirth going on in there, not despite me, but because of me. “I’ve found it!” I say one day, I have the missing piece. You can all stop being angry with me. Everyone sits very still, but they know I am lying - I still haven’t found the missing piece…the piece I need is red with a little bit of purple on each corner. “I am lying” I say…They know. They think for a bit. “Stop lying” they say, and settle down and take their nightly nap. I make something ? - take it from the fridge to the microwave. Eat it in front of the TV. When it comes to fixing dinner, I am quick.\n\n “"},
{page:281,type:"abstract",lines:103,date:"Sep 25",text:"Oh what’s that on the ground? what’s that you’ve found? “He shrieks. He arranged it - this whole thing he let me use his metal detector. It’s a ring and there are diamonds on each of the sides you can see a diamond on any of the sides it faces” he says, explaining the magic trick. There are little wet tears in my eyes, I brush them away real quick, to keep him from seeing. he likes to be the only one that cries. He takes the metal detector hurriedly, when he realizes how big it is for me to be holding. He gets down on one knee, but just to examine the ratio of silt to sand - he reckons she’s on the of them - his one knee bent - dirt that is sand - on his knee (sheer recklessness if you ask me). Oh! Not this! - I forgot, he says - still on one knee sort of. “Marriage?” he says, grabbing the ring from me, and it sits in the very middle of his palm, framing his life line. I glance down, and pretend not to notice this. It doesn’t mean anything. I stutter. Before I can think of the right answer, I’ve already accidentally accepted. I forgot what I wanted to say, and the words were too quiet - he was going to get angry if I didn’t answer quick.\n The day before the wedding: we go on a field trip “It’s time to learn some stuff” he announces, the day before the wedding as he packs my lunch into a soft red lunch box - on our way out the door, he pulls my hand (I was not walking quick enough) “I used your money to pay for this bus” he says. I look to make sure there’s no mean glint in his eye and pull myself up the tall steps. We sit in the middle towards the back. We sit with our arms leaning forward, the sticky dark green of the seat I glance at him a few times, and he is staring straight ahead, a pleasant smile on his face. The bus takes us to six different museums. In each, he charges ahead, turning back to make wide eye contact, though I know he’s not looking at me - just through me, thinking about what he’s saying. He tells me facts that aren’t on the large placards in front of everything. I like the way they preserved the skeletons and wait patiently for my turn to ask him how it’s done. “They’re not made, they’re preserved,” he says impatiently, and continues on with his facts about dinosaurs. Finally he skips into the gift shop and about seven things from seven different shelves but there is too long a line, so he puts them all back one by one.\n The planetarium is next. It’s hard to remember not to be scared of so many facts in the dark. We lay down and he clasps my hand for a second and his eyes are shut, so I shut mine. The voice over the loudspeaker is drony and drowns out his own voice, so he settles for calling the script stupid, because it didn’t know which planets should’ve been named differently, and I smile at him. And he smiles at me. “Which one of us should be the flower girl?” he says. “I think we should both be the flower girl.” “No, we can’t both be the flower girl,” He shakes his head, rolls his eyes, turns away from me onto his side. Then he’s back. “you can be the ring boy. I’ll be the flower girl.” he says. i think of the ring I will get: A perfect circle. Gold or silver. I smile. I look up at the stars. I try to find the big dipper.\n After the Planetarium, the bus driver takes us to a wide open field with a few solid picnic tables by the side of the road. The lunch he packed is a peanut butter sandwich, an apple juice, a bag of lays, and a fruit roll up. I take a piece of the fruit roll up first, just to get started on something nice that I like. After the long bus ride, it feels nice to get up and stretch our legs. I walk around in little, and medium, and little, and large circles, my wandering eyes notice that he is sitting very still, looking at seemingly nothing. Abruptly, he gets up and looks at some moss growing on a stump. “This is the kind of moss that […]” I drown his voice out by singing a little song in my head. The song isn’t really a song - it’s just the color beige, taking up space.\n\n in individual boxes:\n lying is fun\n what, you don’t know that\n why, you should try it sometime!\n (Here’s why!) with telling the truth, there’s only one thing you can say\n with lying: there’s tons!\n when I’m by myself there’s no telling what disorders might develop\n I’m always trying different kinds of pills. These I found on the ground.\n I was looking for a black bear that I had lost but it turns out you can’t have black bears as pets\n Sometimes I use the telephone as a noose and see how hard you can squeeze your neck before juice comes out\n Do you know that I don’t lock my doors because I want to know how many neighbors I have? I have a lock that keeps out ghosts though.\n I have a clock in my head that counts everything very fast!\n\n When it’s time for supper, I sometimes tell people I haven’t eaten anything all day, so they think I’m hungrier.\n\n “envelope” ("},
{page:282,type:"ideas",lines:5,date:"Sep 25",text:"muslin + snap\n\n (Legs)\n ← clay\n ← black velvet white cotton inside\n (this could be the 3rd and last element)\n ok, I could make\n (coin envelope out of muslin…to put all my memories inside…) would Mason like to play this game - of SET (?)"},
{page:283,type:"day",lines:36,date:"Sep 25",text:"September 25th\n 25\n 9\n 24\n ___\n +\n Ok I could start writing the date weird just to be quirky. I think I might start signing my name: quirky, instead of my actual name. No one asked but I think I have the solution to journaling. Pick a few categories of things you want to remember. Mine are: ironies, paradoxes, things that I think are funny people being stupid etc.) and write them down. People don’t like me because I don’t like people too much - I had a lot to write this morning and I used my computer. I wrote down my dream about Rebecca having a large square pool at her house. It was nice. A bit moody for a pool since it was inside. A bit low and mellow. But it would be good to have a pool like that that you wouldn’t have to get too excited about. (())⇒ never being able to figure out exactly what I like writing with a pen + Catalina thinking about needing to poo before sex.\n I looked up “how to type with long nails” and found very complicated advice on Reddit. I got up cause I finally figured out what to eat for breakfast (yogurt, almond butter, granola (oh yeah, I have more) even apples - so it can really seem like cereal - have fruit. Then when I got to the fridge - like the three bears every yogurt had something wrong with it (pic)\n\n (pic)\n So now I have a headache from not eating. I need to go take a shower, and weigh myself before that - I have a two step plan that does feel like dancing - I don’t like looking at any of my paintings, except for maybe 2 of them…solution - I’ll put the ones I don’t like somewhere else, so I don’t have to look at them. I can use the giant square cardboard they came in that I threw out cause I didn’t need it for anything last night.\n WATERS ON\n …"},
{page:284,type:"abstract",lines:87,date:"Sep 25",text:"none of these brain tricks me and Jamie were talking about…things I have to constantly remind myself of because they’re counter-intuitive\n #1 - I forget - something about being by the toilet\n 1. (actually I thought of this first but it’s more complicated and doesn’t fit neatly into the category. Need to make space for the ritual - ending things off - catharsis - this is not an action, but you can make it into an action - you should - do a ritual, just to have an action, just so it takes up space. And it’s kind of like (4th quarter pic) things we don’t know etc. because it’s that fourth and final space that we wouldn’t know would be there except for the diagram - the diagram makes space. For example. I weighed myself. 96.5. Then I took off my clothes. Still 96.5. There’s something wrong with the scale/that’s how the scale works. Anyway. Then I had to take a second to acknowledge that there was nothing I could do about the situation. Accept that I couldn’t know the low number I weighed. And this was in action. The stool was small and nice, but never got appreciated…I thought of a metaphor to complete the exercise, and used that metaphor to accept (art). The other example - it returned to me like a lost bird, flying home from it’s nest (to it’s nest? I don’t know)\n I got done writing in my computer. “Oh, I could write in my drawing journal (this one)” but that’s stupid so I won’t do it) ← forgot to acknowledge this thought - passed over this possibility, so then spent a while, staring around, wondering what I should be doing. Eating? Showering? (Computering: thinking of all the automatic processes - this has a loose thread that caused the same problems - had to say “I’m not gonna do that right now” and that was painful, cause I’d been looking forward to it (())\\> Richard sex weighing myself? Journaling wasn’t the answer we wanted, but it was the one we needed.\n Anyway - conclusion - these are counter-intuitive examples and they need to be considered. Ok bye, I’m gonna go take my shower now. Night. I love you. (?)! Please kiss me on the forehead when you leave\n Done with my shower. Put on the most ridiculous outfit I could think of (blue and white striped pants, bw shirt, going the other way - horizontal - would it have been better to have been going the same way? Maybe? Didn’t think of it]. (I didn’t have that shirt, but this is a logical ontology that sean and I could make) (ontology doesn’t mean that. I know! I don’t care!) I’m restarting things based on how they seem like, and now what they look like. Ontology sounds like that because it’s a conceptual onomanopeia because it starts with an openness and that starts it’s own little system. And then it completes the system - see - or because ontology is the way into the system - you start with\n\n Anyway, I have more things to write down before I can finish thinking about this. In the shower. My thought. Step one: end of the line theory - + ending things off (± \\> this is just a weird use case, not different punctuation)\n ok yeah: to do: I need to think of a way that I can enter the space of, say end of line theory or cognitive vehicles metaphor/example - related - this is also part of end of the line theory, but it’s not useful for this particular predicament\n\n (pic)\n\n Here’s one - I caught one: start with: referring to abstraction. Next: referring to intentions. Then: referring to your own intentions. (what am I thinking) - combine it with patterns. The 1st two create a space.\n crate.\n constellation (pic)\n\n set theory + kit theory - what do they not have in common (()) opposite + set theory - - apply the SET mindset so you can know what rules to use when creating the thing.\n ok - procedure - define all the concepts - make them like pattern blocks, where each is a different color and/or shape - hex code - candyland (pic) - then put them together into constellations\n ok or: each is an abstraction. concept on the front, abstraction on the back\n the concepts can have the “sewing” all around the edge to prove they are instrumental, to fit into the grooves of your mind like slide projectors"},
{page:285,type:"day",lines:22,date:"Sep 26",text:"26\nI’m sick - not physically but literally. Honestly felt fine until I checked my phone, and then it all came crashing down. Ugly pink cushions - wood + puff + (pic)\noh yes: I’m not depressed - I’m just saving my happiness for later. And: I hardly ever have real feelings, so I’m cultivating this [sadness] (To AZ). (I’m like a sadness factory - manufacturing sadness - this one is all mine. I cultivated it perfectly. Plainfully, no painfully - just a slip of the wrist, or a freudian slip? In my pattern collector for later. Q why to make all the flags, drawer on wood blocks (distorted) A. Because they are symbols, and it interferes with the integrity of the system…what paradox does this refer to. A anyway - I was thinking about how - you let the rules from the periphery in situations ex. you’ve dissociated at a bar and don’t want your friends to know this ← this is an example of a “bad” example. I finally learned what “choose 2” means [I’m having trouble, now, picking the blocks I need for these little \\{spheres\\}"},
{page:286,type:"abstract",lines:9,date:"Sep 26",text:"September 26th\nSome ideas I had last night and this morning that I didn’t consider fit to write down\n(pics)\nmicroscopic things - the way that my small objects aren’t needed to be big objects BECAUSE they are abstractions - so - mechanically accurate - but they can be small\n(Remember when Parvati told Cory that that thing hit my shoulder that one time - and Cory said: was it really Sandy that got hit? - we were at the table at tartine.\n\n\\"},
{page:287,type:"abstract",lines:11,date:"Sep 26",text:"September 26th\n“Bead Tray Idea”\n Had 3 really good ideas - starting with the honey bear + mustard + quarter = purple. Every time I start singing, he starts singing. To drown me out.\n “It’s just that - I invented my own language and no one can speak it, so I’m very much alone” :(? am i sad? does this make me sad? No - proud 😠 ew? is it ew? no - it’s happy and sweet. And no one has to know.\n\n (JSYK, mommy, this is part of my categorization system)\n Here’s a stupid thought that I don’t need:"},
{page:288,type:"ideas",lines:25,date:"Sep 26",text:"hot glue gun iron heating up shower turning hot ↔ my thoughts - the patterns collecting - to do list items, things I’m going to forget - things heating up in my mind, begging for my attention, getting hotter every passing minute\n (pic)\n and you could go and collect it. (This is a good system because you can expand it. And if all goes according to plan, synthesize new concepts. (busy work - sry to speak the obvious)\n if you add, for example, spinner, this pastel color wheel, then you get the idea that randomizing cognitive vehicles - you go into a crowd, and see what cognitive vehicles you go to a crowd - you talk to random ppl - you start to see what their cognitive vehicles are, and then you take them on for yourself - start telling yourself them.\n or: could do it with system helmets, and everyday you don’t know what game you’re going to play\n (pic)\n a basket of color wheel spinners (which i just made up, BTW)\n\n I AM AN EXPERT AT THINKING\n\n (pics, pics, pics)\n\n food becomes “disgusting” as porn does after you’re done. paint paintings where food looks disgusting (on mushrooms or weed, I would know why it is disgusting (I am smiling\n“Hall of Memories”\n (pic)"},
{page:289,type:"day",lines:9,date:"Sep 27",text:"27\n ORDERED from Crimson. I felt happy, listening to Louis C.K., laughing out loud. Eating Crimson - garlic sauce etc. Making stupid pieces of weird things - haha! It’s nice :)\n Note: I think this needs something pink\n Note: those weird pee things are weird. They should have fat stumpy paint brushes on them - not the people. Then they could be weird in the right way.\n How to make crackers - ventura(?)\n (pics - perfect pages too) (:))\n\n (pic)"},
{page:290,type:"ideas",lines:12,date:"Sep 27",text:"IDEAS FROM SLEEPING AND IN THE BATHROOM\n SOAP, BUTTER, TBF, pink, TBF, cotton (yellow)\n wire, wood stick, muslin colored tile\n “TRAY”, wire (not staple), muslin, matchbox, wood stick, bag golding a pea (TBF)\n BIG IDEA THAT GOT ME OUT OF BED\n (yellow fabric), yellow thread from daiso, (blue paint, paint brush…?)\n BUTTER BAG\n (pic)\n HOUSE BAG\n STEP-BY-STEP INSTRUCTIONS\n then i can at least know that i could make them at any moment…and anyone seeing the bag will know that I designed it in my head, not using trial and error (bitches be shopping)"},
{page:291,type:"day",lines:25,date:"Sep 27",text:"27ish (night)\n (pic)\n (pic)\n Systems of Movement (pic) right now looks like this, cause I am trying to think of examples of it - “a wooden block with two labels, one on each side (pic) (this kind of label - something can have two names - mean two kinds of things. An envelope - 2 envelopes. smashed together (back to back) - a label on each (different) the envelope, the shirt, J yelling at me (X what I imagined came true (+ the game for evan :)) anyway: Hypothesis: cognitive vehicles could take that spot, and systems of movement would become, like, just a lump - a puff or something. (Oh cool - now I have gravitational depression as well”)\n “kids: pull up the rug under your thoughts”\n ( last night as I was falling asleep - the math thing that evan might like - addition - simply adding creed chairs to a specific content/thought - and this prepares something for your mind to puzzle out. - like the little envelope with the (puzzle) inside it - in that - you put the things together, and then you know what the label is, or what the label means\n seems like more of a cry journal here:\n yesterday I woke up at 11:30, had a dream about ian g and then was urging myself to open the curtain"},
{page:292,type:"ideas",lines:55,date:"Sep 27",text:"under the vacuum etc. Rationalizing my ?excess? of stasis and increasing hours spent journaling with the increasingly complicated and specialized methods - already I have my own punctuation - ex (())\\>, made up words ex. sloop, and sleepy meaning hemmed and stuffed. Now I’m thinking of adding actual envelopes to keep track of random memories that occur throughout the day, and to ?track patterns…? New envelope:\n (pic)\n (as opposed to the memories envelope which will just go vertically (didn’t have too many memories today - at best I thought about why I hate various people in my life and made myself almost sick and a little bit angry) I can feel there are some newer strategies for getting things down (documenting my thoughts) now that I’m thinking creatively. The “mind/memory map” is almost ready to be born\n (pic)\n I think, basically it will have a memory, and then all the similar incidents will move out in a straight line, but each (”alternate”) will be connected in a different line. I think each “one” has to be its own snapshot, with one central memory/and then everything relating to that - I don’t think there can be secondary offshoots - they should be separate maps. Each memory can go on a notecard and they can be arranged, a picture can be taken, and then ?printed? or each card gets assigned a symbol/color - shape, and I can just draw the symbols and their relationships in lines on the mental map - ?notecard? Coincidentally, this is the game system\n\n I designed for the concepts. If there was string or thread involved, then my happiness would be piqued. But yes - once I design the meta system for something, then everything else feels like “busy work,” which is sad because I really need to do some busy work for the concept thing because I don’t know quite which things count as concepts, and which levels they will each be on, and what things count as levels. Could design physical structures to represent The Relationship Between Concepts ex.\n\n (pic)\n\n the milk I drank that one time when I wasn’t drinking anything (+ coffee + juice :)\n COMPONENTS (YOU WILL NEED:)\n weave fabric or paper something. glue on the lid(?)\n butter → clay or (yellow cotton)\n and these can go in my welcome basket,\n so: sugar. butter. milk. biscuits\n\n Here’s a math problem for you:\n I think the answer is these long string things - with flower fabric middle, and tea bag fabric outer - can’t make muahahah\n (pic)\n\n (pic)\n\n spoon, lentils, brushes (lol - the brushes were funny to draw)\n again, green fabric, wood circle - WEIRD brushes\n 5 + A = 3\n A = abstraction\n “iteration”\n\n (pic)\n\n(pic)"},
{page:293,type:"ideas",lines:5,date:"Sep 28",text:"28 sept\nidea i had in the shower: (kind of stupid one maybe but fulfills some criteria) (pic)\n\nlilac, lavender, magenta\n\nsame design (magenta etc.), velcro\nBasically - the pattern collector - each matchbox has a different “pattern” you can collect"},
{page:294,type:"day",lines:40,date:"Sep 28",text:"28 SEPT SATURDAY\n Well, now that J sent me an IG reel, I have no motivation left to make anything. I’ve successfully skipped out on every activity i could have had planned, or had planned…now I’m just sitting here in the sun with the curtains open. Got some good sleep cause I tried really hard and watched “the virgin and the billionaire” last night till they asked me to watch ads. It’s pretty funny. Louis C.K. Pretty funny too. Two packets of cereal I could pick to eat - I redistributed some from the new one to the empty old one. About 5 or 6 notebooks I could write in. And about a thousand projects I could choose to do or not do. Instead I’ll be sad about not getting invited to Lindsay’s birthday even though I “ghosted” Maddie. Who is kind and sweet and beautiful. I kind of want to walk out into the sun, and I think I’ll see people and I haven’t seen pretty much anyone in like a week. Almost went to Paradise Cove to meet Kyle et al but every single person that’s going makes me say: “Oh, uh, idk…maybe I’ll not go.” I wonder if it would be like that if I hung with Lindsay or J who I apparently like. Collect this pattern: is it the people, or is it me? I could go to a motel pool with Chris and Michael if I could find them. I could find a way to tell him it was my fault he and Abby broke up and that I love him and that he should date me now and then we can live together in their apartment, and then Abby and Chris can move in - as friends. And we can all sit on the rug and discuss how my butt is actually better than hers and find that coogie sweater that’s still in their washing machine that they might still have.\n\n I’m putting on my tray: mechanically accurate miniatures, and the fact that: when you travel up a level of abstraction, things “become smaller,” and there’s no room to fit anything anymore. I’ll have to take a tiny sad pill for this)"},
{page:295,type:"abstract",lines:57,date:"Sep 28",text:"Oh! I tried a fun little trick last night which actually worked. “Couldn’t appreciate it” opens a drawer, pulls a string - the video, the swim lessons, Tammy’s bracelet, daddy cutting bread, dresses from Florence,\n “took a chance and it paid off” the mother load, bleeding ears, anyway - it was weird because when I was looking in the recesses of my mind, it felt like things were coming from specific places - even some I couldn’t see completely clearly - I could see where they were in my mind, and I could see the colors attached to them.\n anyway - as I suspected - cause I was just thinking - I like memory, but I love “concepts” - and I’m guessing memory is in the middle or the back of the brain - the pre-frontal cortex I guess. This is getting a little weird - a little neurological…idk - a little trippy. Like - are certain concepts on the sides? Am i about to start literally mapping my brain - like, drawing a map of where everything is - /where is Katie clapping with her fingers (A thought experiment - pun)\n I guess I need to design a game that makes it easy to connect them - that cuts away the clutter so the only decision I have to make - intuit - is where they belong in relation to each other. My anxiety says I need to collect all my memories - put them on notecards - save them so I can look at them, play with them and my question is: if I skim off the top layer - will I then gain access to a whole new layer of memories - i could find just the right drawer pull to pick out the new ones that I wanted, and hang them up on my walls, and refer to them instead of the other ones, (?recoloring? recollecting?) all or some of my experiences…or what if I replaced them all with memories of the past year - me going to Primo Passo and simply sitting “ah, I am a person who simply sits (at primo passo). I could do this for myself, and I could do it for other people. What is the procedure? I guess it is: use the xi cards to think of “memories you didn’t know you had,” and put them in the memory library - maybe make a memory constellation, and decide which new ones you want to hang up. And the XI cards - make them believe I am talking to myself: XI…had nothing to do but wait,” XI - someone game me something, but I couldn’t appreciate it. IDK - the number of memories that come to my mind readily is confusing (this isn’t fun enough, so I’m going to ad the kit element…(…maybe if I find the right container (I’ll be able to find more memories). Anyway.\n\n (pic of chest) ← xi was misunderstood, xi won, xi - child…adult (⇒)\n ex, pick op a shell board of shapes fingers clapping game - teacher/student cubby I don’t know why I did it - hunny bunny"},
{page:296,type:"ideas",lines:33,date:"Sep 29",text:"29 Sept\n (memory recall from J’s bed)\n clay(?), hard, red (pic), fabric\n - - - - - - - - - - - - -\n and then I could make like the chicklets thing - at least three, sewn around the edges. red is fine. painted orange, stuffed. tapered\n - - - - - - - - - - - - -\n and then I was thinking I could make like a __ with hangers and the…hangers - plastic icky plastic, wood, wire\n and the hangers would hake a wood thing connecting down to a like cement block if I could make it out of clay - just cut little pieces - or square them. Somehow these would be balanced so they are only on one side of the metal rack, and the hands would be on the right side, but they would be two different pieces - not concurrent (even though it would be hard to balance. (Should not even be displayed together as they have nothing to do with each other).\n - - - - - - - - - - - - -\n Black velvet, doll hand obviously, velvet, Lil’ pearl necklace, chiclet size\n - - - - - - - - - - - - -\n ok, this might be the last idea. a wooden cube. One side (and one side only) would have a round flat thing with a pink victorian picture and TBF over top and pearls probably on the side\n - - - - - - - - - - - - -\n I could make a “letter” out of wire, and cover it with the tea bag fabric…none there, actually opens…maybe sew it with like white or gray thread. AND: put the lentils inside :) (metal, tape, lentils)\n - - - - - - - - - - - - - (upside down)\n Also: to solve the “problem” of memory hall could be TBF surrounded by muslin or tape and a “photo” in the middle square - about 2.25x2.25”"},
{page:297,type:"abstract",lines:18,date:"Sep 29",text:"in the shower, i remembered\n “i’m mad about abstraction” and “why I don’t like mechanically accurate miniatures (anymore)” I forgot about the potato chip tape, made by hammering wire in the shape of misshapen bubble wands. (Like little amoebas (or potato chips)\n and “c” colored liquid, cognitive vehicle color, seeping in and out, catching the light. NOT sure how to achieve this affect - paint water between 2 pieces of tape? In the shower, I thought of: 2 envelopes (the new kind)\n “imagine this” “remember this” - obviously for memories, and one for things I want to imagine - that become concepts when you put them together\n that’s actually a totally finished one, and you can imagine the creepy dreepy way things sort of slowly start turning into teach other, if you’re not careful (ship of theseus - where i end and u begin)"},
{page:298,type:"ideas",lines:26,date:"Sep 29",text:"to make the last thing, cut a (long) strip of clay, inadvertently, witha. serrated knife. And then apply some white glaze. carelessly\n TBF around a baby head? (scrunch)\n TBF around a puff?, lace, nondescript string\n wire, make the fish\n the pea sloops (but slightly bigger)\n a chiclet but with flower fabric and TBF\n\n 29 SEPT\n to put in the basket: 3 slices of green - peas in a ring or the other option is to make something with green cotton with peas like buttons or something like buttons. Oh and this was the first thing I imagined last night I think it was this morning…in Js bed - idk if cause I was drunk or what but it seemed this stuff was a different series - more artsy and less matter of fact. I was thinking that if I continue on as I have been, it will start to be that I am doing math, not art. In one way: you plug any/all sculptures into the metal frames (venn etc.) and solve for the empty spaces. And now: I’ve been making summation concepts ex. in the envelope, the imagine this envelope which is a gift for me on my wedding to myself (my birthday) p.s. (it’s a surprise - don’t tell( and you need to imagine all the things individually and then see what they have in common or refer to or whatever"},
{page:299,type:"day",lines:29,date:"Sep 30",text:"30 SEPT\n Just got done driving on the freeway and I was drunk this morning. Whole little adventure at Daiso and Tsujita. I wanted to take the freeway because I like the freeway and driving on the freeway but it did not direct me there on google maps. I’m a big strong boy, driving on the freeway - is it about that i used to not be allowed - as in - not let myself - or is it about getting faster - a ramp that lets you get as fast as you can. i looove going fast and when i was drunk the other day I drove 100 miles an hour not even on the freeway just on surface streets oh my god I’m a big bad boy and i don’t know how that’s allowed (it’s not, there’s literally a law against it - probably 100 laws) I told Zach about it and I told Jonathan about it and I told mommy that I am really careful when I drive drunk. Could put this in a box - a (little) big street that is a bridge, and the color of it is night - vinyl, matte black, and yellow stitches - has to be. The bridge just ends, even though it’s supposed to be a street. anyway the ramen was too spicy - not spicy enough. Was happy to be alive in the bathroom\n he did not bring my second egg or the check when I asked 🙄\n start getting mad at people more - slick, walking around in a coat, eyes on the floor, straight line, arms, fast, swinging. And eyes - narrowed. me: mad, really angry. At everyone and everything."},
{page:300,type:"ideas",lines:103,date:"Sep 30",text:"a pocket that has a pattern in it - to show how people keep patterns in their pocket, or like - as a metaphor for how it feels to collect patterns,\n\n (pic)\n\n and like what space they “take” up in your life, like if it’s in a backpack or a shopping cart it means something else. I guess a pattern is like a pocket cause it’s close to your body, and you sort of put things in there temporarily - more like a tool belt i think a pocket is a certain type of pattern, and a tool belt is the general term - using incorrect punctuation or grammar etc. to cause you to take a second look - if you want something underlined in your mind, so you come back to it. That red line, and scorched - I maybe need to make a new language where all the words sound like what they mean. (cherry on top) - a new language - a bubble wand hanging from my neck - a religious symbol. Mommy will try to take it off and I will say: “No, that’s part of my religion” in the tone Jonathan used to tell me yes duh we’ve been dating. Maddie said they used to make their old boyfriend tell them how sad he’d be if they died. Anyway my joke was that people are as slow as their cars - that intelligence is directly correlated with how fast your car is moving because people who are not moving fast should be moving faster if there’s no one in front of them. I found a cart when I was struggling to carry my \\100 worth of stuff. it had 3 wheels which explained why it was sitting out there on the curb. It was a godsend, I carried my groceries back to my car with that. I unloaded my groceries into my trump. It was nice to have the cart and I had been struggling carrying soup and the two bags both pretty heavy and I didn’t want to carry them anymore. Cart has 3 levels - one for each of my bags, and the third one was for my soup :) i love you. thank you god\n\n kind of like that poster with all of my boyfriends. one space for each of my boyfriends. thank you, god, for giving me so many boyfriends :) the measuring spoon is also the shape of the bubble wand.\n Listening to people to find out how they categorize things in their mind\n - - - - - - - - - - - - -(upside down)\n if there was an element about the cart situation - perhaps the 3 wheels, and how it matched the 3 levels - that seemed intentional god winking at me, i guess saying this is not a coincidence is like when you add the finishing touche(s) on an art piece - that you make with set theory - that is like you winking at your audience saying it was/is intentional/…the end of the line, the line being a/the pattern. (dot dot dot square and then circle in square) \\<- this one’s different, this one’s special, this one’s aware that it exists - it is - the pattern, but backwards. I’m going on a picnic, and I’m putting a ___ in my pocket, through the green glass door. Set theory being, like, a daily puzzle like the way that mind kitty is. Make a website for [someone[ that has a daily puzzle. But it doesn’t only have to be SET…there can be various configurations “everything is either the same, or different. start with a progression. what goes here. Then a venn diagram. (pic) MOLD THEORY. That’s how you FIND all the other shapes (plug in the hoonies?)\n\n wrapping paper and that “kits” catalog (and of course the american girl catalog, specifically the sets where it could come with all sorts of things, and the birthday one's. (the petit fours - ah yes - the quarter concept (...? (\n Had like what some people who are stupid who are stupid would call having a mental break down - i was upset about my nails and then i had to pull my thumb toe out of it’s cage and it really hurt (and it still hurts)\n (to make a raspberry cookie to go in the green glass basket)\n (pic) this sugar packet is making me feel better, is keeping me sane. That, and the fact that, in the future, I have collected all my thoughts - the one's I had in the bathroom, the ones I had on the couch before, car thoughts, garage thoughts, other couch thoughts.\n (diagram) (example example example\n for example: the perfect picture pattern that I was making before going to Ricardo’s house and getting drunk.\n\n ok: these are things I thought of in the bathroom\n paperboard. and i can just use that for all of them\n memories in there ex. two moments that happened today. and what do they have in common? And then, can you make up another one? (venn) is a step to solving the second one. What is the structure of that? It starts in one place (as a puzzle). And then, once you answer it, it turns out that it was “a step” the whole time, even though it wasn’t, it was a puzzle at the before point. This makes me happy and sad at the same time. happy to have figure it out (and i know i’ve figured it out before), and sad that I’m not going to know in the future, that I am going to forget. And then i’m going to have to figure it out again."},
{page:301,type:"abstract",lines:17,date:"Sep 30",text:"cont sept 30th\n Thought more about my theory that i get stressed when I have too many things to think about/too many things to do specifically that i was gonna tell my therapist that this is what causes the anxiety and I could work through the anxiety or i could get the things done and then i would be not anxious and also my life would have meaning, and I would be spiritually fulfilled\n …something wood maybe…with fabric in between\n (pics etc. (tea bag with birds in it (+) flower fabric cushion () \\<- even narrower - only room for 1 pea across - single file. intentionally misspell peas?\n\n I think…\n thinky type art stuff like the SET puzzles and Feely type art like that time i sewed everything together on my floor is combined in the new pocket art that is a few pages back"},
{page:302,type:"ideas",lines:8,date:"Sep 30",text:"xi things I “did” when I was little\n wrapping paper\n I used to love poring over those kit and set catalogs\n things I need to think about later\n little ‘pea rounds’ (and a non-sugar packet)\n in the dream drawer - lentils in the match box\n money + flags → symbol vs….(what paradox is this\n ok, write, for the website: explain about the star of paradox, and art, in like a paragraph\n TBF, hot glue(?)"},

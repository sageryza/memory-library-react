also: shaped like a ruler, or like butter - varying size lines all over it so you can <em>imagine </em>using it as a tool for measurement (but it’s curved ⇒ imprecise - painful to imagine lol\n- - - - - - -\noh: we’ll call it: the “hidden mechanism” idea\n(pic) distiller vs. hidden mechanism\nand yes, it’s counter-intuitive, because you have to take <em>2 </em>steps instead of <em>1</em>…\n\nok: rewiden ( 🙄 (🙂)\n\npics\nweird rug pattern\ncigarette butts\noh…anyway: the idea that the container isn’t “extraneous” that it has to be specific to the thing that goes in it"},
{page:344,type:"ideas",lines:26,date:"Oct 9",text:"step one: cut out some flowers and stars from [copper] out of tin snips (weld them)\nITERATION ONE\n(goes on the left side of the glass window box (sewn to napkin?) → silverware\ncopper tubing\nmagic wand ✖️\nsilverware ✔️\nOTHER THINGS IN BOX: CHEESE CUBE(S) WITH LACE AND PEARL (← pearl , ← lace\norange\nx (a million)\nITERATION TWO\njust the tine part of a fork (it works better than a fork\n1,2,3 things in the (kit) so far\nstrip of leather with (?) on it (a lot) (…?)\n← inside (”enlarged google eyes”\n→ glass orb with black small dot in it)\n← glued, but coming up on the sides\n\nelaborately sewn spinach leaves (bad velvet) blue and green - snaps in random places, front and back, so they go together and can make a “salad” 🙄 idk if this is a good idea\ngoldfish with magnets in different places, so they stick to each other, and get to be like a snack in a plastic bag\n…i noticed I gave up on arranging the ideas for the automatic process essay (…it was too hard…?)\n+ notecards (x?) (…why?)\n(pic of what i ate)\none egg, 3 pieces of salmon sushi, spinach, sweet potato chips, dollop of hummus, half an avocado\n(that’s it. no more, no less)\nthen after, i had:\nstrawberries and raspberries, almond butter (a few spoonfuls), granola, guava"},
{page:345,type:"ideas",lines:11,date:"Oct 9",text:"single-sided mancala board (broken up? hinges? string?…)\n+ Thingamajig - pouch with 7 thingamajigs ex.\n(pic) 6 - something caught on the inside - maybe a (really bad) yellow and white egg (pic) ← white velvet, yellow velvet (wrapped together with thread)\n(pic) ← little turrets with drops of hot glue\n— - - - - - - - - -\na “hat” (red flower on top(?/velvet)\nmagenta velvet (just sewn together and “?hemmed” - no side piece)\nflower fabric\n— - - - - - - -\ntic tacs, string, velcro (all white, kind of wiggly (nit picky"},
{page:346,type:"drawings",lines:9,date:"Oct 9",text:"worked on a poster that can serve as a metaphor - you find one thing that kind of looks like what you’re trying to think of, and you use it to face [your fear] head on (frees up some space) it <em>did </em>not cohere, idea is to take some out. Also: do they need to be more specific? Here are some examples: (pic) → hidden mechanism\n(pic) abstraction, (pic) automatic process as in assembly line, assemblation"},
{page:347,type:"abstract",lines:18,date:"Oct 9",text:"ok, right: so: at the club, I was thinking (automatic program) → I <em>guess: </em>the things, like - the “component” of the set when you get a bunch of non-puzzly pieces, and you “do something with them”/”play with them” - “make something out of them - put them together: <em>this </em>is the program(?)\nI don’t get it :o\nI <em>guess </em>the program is what you’re <em>supposed </em>to do with the broken/non-existent game that was <em>planned </em>for them, when they were designed/how they were designed\nso…: the automatic program is “designed” by [”someone else”] prior to you getting the kit (or at least that’s what you think(…?) and so you design/guess (hidden mechanism) what to do with the [”same-like” components] → each is the same, and made by an automatic process. can it be solved by the difference between program and process? /what is the difference?\noct 10th"},
{page:348,type:"day",lines:10,date:"Oct 10",text:"Darling, I love you Having trouble figuring out how I’m allowed to feel. But: it’s the morning - sun is up. I have all these examples and metaphors and diagrams laid out in front of me - still beautiful. I might go out and remember what I was thinking about the Tizurtians who practice Instrumentalism - with their black coats. I love you. I love you. I do need to get my feelings under control so they’re not so affected by outside influences (pic)\n…"},
{page:349,type:"abstract",lines:13,date:"Oct 10",text:"This morning: intuitive system - things like: trying to remember or write down the tips of your thoughts or the arduous maira kalman poster process that killed me last night…in a <em>way </em>it’s automatic - there’s no “planning” involved - but it [uses a different part of your brain]\nautomatic + intuition - automatic\nautomatic + artificial - conscious\nartificial + intuitive - brain in real time (?)\n\n(pic: three part venn diagram)\n@@PB@@\numm…this is weird\n(pic: things i imagined in my head before falling asleep - all the examples of black and white moments on clothing - (also: sleeve (i’m obsessed w sleeves today)"},
{page:350,type:"abstract",lines:33,date:"Oct 10",text:"I saw somewhere that you should write down what you worked on all week and yesterday, outside Peets, 2 men came to sit uncomfortably close behind me after I ignored them under the pretense of my headphones being on I was envisioning this life where I become really [systematic] about my religious devotion, and somehow start [telling people about it]? /treating it like something I’m allowed to do - instead of have to do secretly - Yom Kippur - I have my own holiday - it’s a little confusing cause it’s <em>not </em>paganism - that’s what I sell. it’s about the ritual of organizing your mind/it allows you to “organize/clear” your mind with various rituals. To recap (why?) - the process of getting rid of thoughts starts in the unholy way of: writing them down (here are some “questions” i designed ⇒ i.e. find a structure that fits with how the thoughts are arranged in your mind - is it a bunch of examples leading to one larger thought (pic) Or: is it, for example, a progression - a train of thoughts, that lead to a different/new thought? Is it an iteration - a refinement towards something that makes more sense or is better? Or is it a “specific molecule” like the autopro work I was doing last night - trying to figure out how the concepts relate to each other…I don’t think it’s an interchangeable formula that I’m coming up with…only applies to this specific content (like the marble holder I found on aliexpress) However, I <em>could </em>take the structure, and design stuff specifically for it (but I wont - not with (this one at least)."},
{page:351,type:"abstract",lines:10,date:"Oct 10",text:"The other thing I’m trying to understand is how <em>metaphors, examples and diagrams </em>relate to each other - this has more general applications I assume\nLike: the <em>goal </em>is being able to open the drawer really easily, so: it might be any of them - what’s on the drawer tag…and what are you calling it in your mind - the abstract version of it/is that the same thing? refinement: I think “diagram” is actually “abstraction” (at least in the context of the other two)\n@@PB@@\n(missing)"},
{page:352,type:"abstract",lines:31,date:"Oct 10",text:"Thought modifiers ex. cheese - should I? maybe? I don’t know →\nhypothesis: this is actually now in the place of: i will definitely do it (because it’s an experiment?)\nMETA: <em>how to </em>categorize things to go into the right places in your mind\n(assumptions:) there are really categories ex. “be nice to […]” and : how to get them in there? well, we at sage inc recommend the patented categorizer, we have a version in black velvet and goldenrod cotton, but also: on the spot: creed, or “ridikulous” For example, it’s helpful to think that our most desperate states are <em>doing </em>something - in direct proportion to how upset we are (”best practices for categorization”) but anyway: back to thought modifiers - specifically - here are some things we can do: interrupt ourselves, in the middle of a thought. set up a conclusion for later ex. the green envelope - ex. i wanted to think about: how are my 3 abstract methods related to intuitive etc. so I “set it up” in my mind (prepared to make the comparison) and then thought about something else - savor the dopamine - enjoy that dopamine hit, and let it propel my next brain activity. (?) way is to collect enough instances so that one you want to move (change the category of sets collected (called chaining?) metaphor: picking up trash on the floor\n“archive it” is a good metaphor/example of categorizing things. finding the right category to make it work (I: hanging it up on the wall)\n@@PB@@\noct 11th"},
{page:353,type:"ideas",lines:18,date:"Oct 11",text:"ok, here are some ideas I had on my hike\n1. book ✖️ scroll ✔️ (?) 2. Bingo card for [examples] ex. that thing I was thinking about maddie - interacting with a robot (it’s hard to trust what you say, cause it’s <em>always </em>positive. And don’t worry - I can categorize my thoughts myself) - Evan 1. on our first date - lost vs. talking to strangers - can’t tell when I’m kidding 3. oh yeah - I wrote fanfiction about sean before I met J…4. The Biggest - PreToT - more of my thoughts are getting accepted…ok - lateral thinking - yes, use clappys - siddhartha + coffee ✖️ donut ✖️ automatic process ✔️ = what games will I play today? 7. Big knot (big string) - see the process it took to make it (to think (for later) (complex elements(?) auto pro) 9. (pic) → help me remember\nTHE DREGS 1. system can’t take all inputs\n\n(”accepted premises”)"},
{page:354,type:"abstract",lines:40,date:"Oct 11",text:"these are things you’ve accepted {about life/about your current situation] they can be categories - here are some of mine now: I don’t even know if I <em>want </em>to succeed - I don’t <em>want </em>to make tons of money - this just feels like a pointless video game. I don’t even think people are real. Human interaction feels meaningless because no one understands what I am saying, what I want - what I’m about <em>and </em>- they <em>want </em>something from me. (And part of that something is to believe certain things about me that don’t contradict their worldview (I can imagine at another time - I would have these premises accepted and could then successfully hangout with them. But right now - I just want to stare someone in the face, not smiling, or laughing, or (?) , and speak our physical sensations out loud (and any thoughts? that are distracting us from them(?) other premises: I’m trying to unravel (unpack) what happened today - why I wasn’t happy. Also: the approach to my projects hasn’t been working, and there are so many projects, that I can’t choose one because I have issues with motivation ex. ART as ART square pink or red book with lavender magenta purple wallpaper on the cover sort of like: rightness vs. realness, kits and sets and patterns, all majestically stuck together - use the maira kalman images ex. type in garnet ⇒ But then I would just end up with <em>another </em>library of images that I’d be too scared petrified to use. Also has the idea of pretending I’m going to a craft fair and get me all riled up. But idk - do I <em>wanna </em>be all riled up? And I <em>have </em>a project to work on, though it feels pointless, which is probably why I am working on it - a challenge - and not given that it would go anywhere if completed. Ok, anyway - so those are some assumptions\n(pic) ← Home is where the heart is\nthere’s no point in catching 2 birds in your hand because you’ll just let them fly away again anyway"},
{page:355,type:"abstract",lines:28,date:"Oct 11",text:"I’m having this other thought that maybe they’re not <em>always </em>assumptions, but sometimes can also be: ex <em>examples </em>of things (like the bingo card, but laid out in “flag” format/or: concepts you’re collecting, (?): the “heart start - “ always comes back to [your heart] ex. I was <em>wondering </em>why my <em>heart </em>hurt after getting up to turn off beep and knew it was because I told myself not to - and then I remembered/realized that <em>that </em>s why - because I <em>told </em>myself not to - so I feel guilty about it → e.g. a self-fulfilling prophecy. This happens to me a lot (and everytime there is a jolt)…Anyway: I could just make the stamps of the hoonies and stamp em’ on\nOk. Well: anyway: the next thing that I identified is some kind of <em>tool </em>or <em>machine</em>/mechanism (like that <em>shiny</em> silver hammer that has the very specific and useful purpose of hammering in exactly (5) nails(?) into - <em>something. </em>\n@@PB@@\nOk. I’m not <em>sure, </em>but I guess the hammer thing is kind of a game. <em>And </em>it’s a game about a paradox - which has the specificity of tools - when you write a program for something that only needs to be done once (I think I talked to Jamie about this) or like: assemblation for something you only need to do once (or doesn’t meet the minimum requirements) even <em>just </em>below the (pic) threshold\nprogram brute force ex. trial and error (pic)"},
{page:356,type:"day",lines:9,date:"Oct 11",text:"The last thing I was sure about: I had sort of planned to go to Zach and Niha’s HP party and it enlightened me/cheered me at first, but then I started thinking: oh what do I tell them about this etc. So then: I’m not gonna go. Then I watched my expectations shift. (as soon as I accepted a new set of premises. Accepted other premises I forgot what they were) But anyway - it was “weird” to see instrumentalism working in real time.\n@@PB@@\n“"},
{page:357,type:"ideas",lines:21,date:"Oct 11",text:"I couldn’t bring myself to regret my decision (to move to forks)” “I just <em>smell </em>all my candles question: do other people rely on “internal memes” as much as I do. Should I transfer them to be my own experiences only? Oh yeah! The original thought was just that I have to/can <em>cut out </em>all the <em>project descriptions </em>from my journal entries. Realization: I have all these random rule sets in my head ex. “don’t do this” etc. and they come up and bite me in the butt when I am trying to make decisions, because that’s the <em>exact </em>part of my brain I use I’ve been using) (other people don’t have this problem because they use another part of their mind)\nOk: back to the become a real person kit workshop - <em>and </em>there’s supposed to be a pattern collector, like those ones I described on “shopify” with the bat wings, and a vintage one with pearls inside (shaped like a circle, and could not be taken anywhere) ← probs decorated with flowers, lid, metal, (and pearls inside)\n\n<strong>11th (1: AM)</strong>"},
{page:358,type:"ideas",lines:43,date:"Oct 11",text:"Well, I could keep researching the [machine], but I have to take a break from that and tell you what I was thinking about last night before I got to sleep under the covers.\n← this is a bit like a weird spider and too light (to be satisfying to throw) but still satisfying in its own way…)\n← these are memories or concepts…(?)\n← ND string\n— so, basically - you throw this. <em>And then </em>\n← cut with pinking sheers?\n→ it gets fed through a machine that reads it, similar (same?) as the metaphor machine\n← look like that weird candy, (10mm wood from aliexpress - painted in nice colors, ex → whitish teal; the “sepia” that’s a bit more purple, nice lovely (goldfish) orange, button yellow (pale as daisy) and: pink or pint green or lavender…idk <em>tbh </em>- any nice colors would work\nit “reads” the constellation (I’m the only one that can read them, cause I have synesthesia - and turns it back into whatever concepts they were, and how they were attached - or it reads how they’re attached from the diagram…\n@@PB@@\nI was thinking to throw the spider dice into a tray with the sewn muslin ← called Evelyn or Thome, Ithacah (red thread)\n<em>Anyway: </em>it would fall into the dish, and show you the placements. <em>And then, </em>this part was tricky, which is why it never got finished - there’s logistics - time etc. The die corresponds to one of the little pictures I drew, for example: for automatic processes - and ?you throw them, and they land together, and then you (remember) or: figure out or ?invent? all the new concept…?\nAnyway: I tried it once, it didn’t really work. Reminds me of an idea I once had (today, on our (my?) hike - and I was reminding myself about the time charlie and conor “made fun” of me in that circle. Because that was ?the first time I successfully [changed my thoughts for the better] - because, I was so used to finding symbolic meaning in everything, so I taught myself how to find symbolic meaning in <em>everything, </em>and made it all symbolize itself\n@@PB@@\n(Feel like I’m gonna “die,” spent <em>all day </em>by myself,"},
{page:359,type:"day",lines:23,date:"Oct 11",text:"tripped and hurt myself on my hike (lol) and went to Erewhon <em>twice </em>to get food (pic) “I’m a banana” (no it’s not)\n(But I do like it, and maybe I should remember that more to bring to Primo Passo - take - 2 people asked me if I was ok on my hike. I’m glad no one saw me in my first moments of being sprawled - Then I walked to Gelson’s and stole Bandaids - yeah - I stole them. Sorry. They were 7 dollars. Applied them at a table at starbucks - table of people next to me. Wasn’t even warm out (it was warm on the other side of the street) then I took for<em>ever</em> looking for my car (I have a red car that kinda has a weird butt in the back) (everytime I see it, I think: whoa. My hike was nice other than that - a <em>little </em>anxious on the way up - and I filled myself up like a camel before going which actually worked pretty well. I forgot how easy it is to find a place to pee. I remembered a respectable number of my thoughts that I wrote down in the little shady alcove next to the trail and it was nice to have that respite, and set to write stuff down - and anticipate it - brought my journal along."},
{page:360,type:"day",lines:20,date:"Oct 11",text:"After my hike, and after it got dark - I took myself out for a business meeting (tax-deductible) at the Reel Inn 😬 - he said: I feel like I haven’t seen you here in a while. Cause J comes instead of me now. He should know that I am a ghost 🙄. Drew the red sauce building holders and they had to call Sofia like 3x. So: all in all a good day but I don’t think I enjoyed <em>any </em>of it. Oh yeah - I took myself to the starbucks that’s always a bit further than you think and got the <em>perfect </em>protein meal (pic) no fork, fork was missing etc.\nDid my work early today cause I had planned an adventure for myself so idk - maybe that’s an option in the future…(?)\nMore on my fall: I was thinking “I am lithe like a gazelle” someone should be able to laugh at that like I laughed at the miniature horse knocking down the woman on purpose and watched it multiple times. (was it karma for the time sean fell from running? Did we fall over the same root in the ground(?)…"},
{page:361,type:"day",lines:19,date:"Oct 11",text:"I didn’t enjoy the allulose as much as the first time, though I <em>did </em>like it. Oh yeah: the black lady: she had to put <em>stickers </em>on the things that I bought. One little sticker for each treat that I paid for. And the sticker said: “oh, what a nice treat :)” No: it was a qr code for their app ;) the weird thing is: I think it was probably good for me to get out, but I don’t know if I’m even glad that i didn’t just stay home all day and “watch tv” (work my [textbook] =) notes about idk what. I kind of like the thoughts I came up with last night. I was thinking of going to Primo Passo in the morning, but I was like idk if I want <em>coffee </em>or a pastry, even…I want…an…automatic process…huh - (from their bakery cabinet) - I would <em>pick </em>one, and then I could do it at my table - I’d have something to do… - it could preoccupy my mind and what would I <em>do </em>with one if I had one at my table ("},
{page:362,type:"ideas",lines:54,date:"Oct 11",text:"I think it could be a 3D version of the pea rounds (pic) ← wire hanger oners - two pic + nics atipped to the ends (or beginnings (smiley face) of all the ovals(?). and gossamer fabric (TBF, and: lace! between the peas (?) - so it kind\n@@PB@@\nof looks like an orange slice…Anyway once they called my name (”Sophia”) and brought it to my table and dumped it out of the bag (but first, laid the evelyn or Thome or Ithacah on the table (<em>pretty </em>sure I washed my hands, pretty sure I have clean hands), let them fall: ever so gently. Then I would start (absentmindedly stacking them/noting how it feels when they touch each other in different places. Made by hand, but made by machine hand (hand acting like a machine), so they’re all a little bit/pretty different (quite a complicated procedure, to put the wire between the lace, and the lace between the peas ! I think I could let about <em>3 </em>of them drop from my hand, to see how they <em>look </em>when they fall, to see if they get bundled together in a specific way, to see if they [appear] to get tangled - if they bump into each other, and the lace kind of <em>likes </em>getting to meet its friend, the other lace. I lay them out in a circle - touching tips (circles x tips) - I don’t think there <em>needs </em>to be one in the middle. Oh - I think they can be farther apart. <em>That’s </em>pretty good. I think I’ve done it - perhaps I’ll make a pyramid though\n@@PB@@\nOn <em>his </em>ithacah, he has a stapled block, and he is kind of placing them just next to each other, with about a 5 millimeters of space in between them. In fact he is going cross-eyed trying to imagine what it will look like when he thinks he is finished, and not to stack them too carefully, but not <em>too </em>unevenly either.\nThe girl ‘across the street’ got a cloth doily, instead of my muslin mat and <em>she </em>got something with sparkly purple resin embedded hastily into (little) wire shapes - mostly moons, and there are some that have been <em>so </em>oddly shaped that they don’t look like moons anymore. She is kind of fat, hunched over and her boobs are perched on the table, short oily brown hair, glasses, and you can see the fat in her arm pits (she is sleeveless). hers are not closed all the way, and she is seeing if she can stick the ends of the wire into the other ones. And no one has noticed there is a pretty - in - a boring way woman (straight brown hair and eyes, a tuft has fallen in front of her face, hovers over the table, on and off whenever she moves her head\n@@PB@@\n(pic)\nfinal form :)\n← the lace doilie i got\noh, it’s gluten free :)\nanyway, this is what mine looks like…"},
{page:363,type:"ideas",lines:18,date:"Oct 11",text:"one of the APs in the cabinet:\nstep by step: plastic - top off a hunk of clay - wrap it up <em>nice </em>(gusset?) - tie it with a piece of wire or a twist tie. (pile them on a tray, or in a bucket…) I could: make trays of these (various ones, stack them, have ex. maddie and evan and ? come over <em>and </em>\nhere’s another one: <em>badly </em>made so as:\n(pic) x2 - sew together (don’t turn(?) - paint (?) on the liner? Or: sew them (pic) like that :)\nand don’t forget to make a bunch. And! they will stick together probably there <em>won’t </em>be a ton you can do with them “oh - they hang so loosely :(” - “they are <em>limp</em> no matter <em>what </em>you do with them\n@@PB@@\nex. (pic) - NDS, - crimp bead - wood :)\nor: NDS, tape, wood\n@@PB@@\nan (even more) abstracted version of paper bag with chips\n(pic) - ideally it’s 4-sided, not 2 - and (one) piece of (leather) -\noct 11th (other notebook)\n…"},
{page:364,type:"abstract",lines:14,date:"Oct 11",text:"somehow I’m always starting a new notebook…idk if I deserve to…I feel like it’s been so <em>short </em>since my last one. And I was spending <em>all day </em>writing in my journal. What I was thinking about in the car - the instrumental belief - while driving on the PCH - fluctuating/oscillating furiously\nwhether I had the idea (pic) things I don’t find interesting, but you might…\nBINGO: ritual - things that I do that are for my mind, not the world\nthat weird (pic) that painting we looked at, where the design elements - like the one in my room - are competing with…the boy + girl by the\n(missing: “crazy to write this again:” plan for square book)"},
{page:365,type:"abstract",lines:20,date:"Oct 11",text:"PART 1: Autoprocess - the 1st thing is getting started. Creating a <em>procedure </em>and eventually a <em>game </em>for ourselves ex. putting pipes together, the pea round at primo passo (lol)\nFake Art - art that looks like art - butterfly, fly away - staying in the <em>same </em>mindset - you sometimes can use an intense emotional reaction to keep the same mindset otherwise you will automatically CATegorize what you’re doing, and reach the next level - META - and then you’ll be out of the mindset (you won’t realize it though) - so - you need an anchor point to make real art. (the way to normally do this is by creating/following a compelling pattern (pic) but these are actually the same events\nanyway - traditional art is a way of <em>transferring </em>a <em>mindset </em>through rules, sorry - a concept - the rules refer to a concept (together, they are a mindset(?) - way of seeing the world ex. (pic) rose-colored glasses\n@@PB@@\npics\n@@PB@@\npics\n@@PB@@\nOctober 12th(?)"},
{page:366,type:"dreams",lines:35,date:"Oct 12",text:"At Primo Passo for the first time in a while (missing)\nOk weird. I had a dream that I was married to this bald black guy and we were talking about what kinds of patterns that keep coming up in our relationship (and potentially changing them). I interpreted it, awake, to mean like - little moments that happening. For example: Sean says something defensive, and then I shut down and lose respect for him, and start thinking of leaving him. J doesn’t respond to something I say, and then I start feeling all whispy (and shut down), and start using a defensive mindset (and he can’t get any answers out of me, for example, and he starts getting annoyed). Evan starts a little competitive game with me and we go back and fourth, up and down, me trying to prove his game is stupid, he trying to prove ?it’s not?, or trying to win. Or: I say something that slightly offends Maddie. They shut down. I try to prove I’m not a bad person, while slowly sinking, feeling like I’m becoming more and more not myself. I tell mommy I dond’t want to talk about something, and she gets mad and shuts down. I talk a little bit longer than Sandy can handle. he shuts down and starts thinking of a way out of the conversation. And eventually, when he finds one, I feel dejected and let down. OR: I share something that’s too personal and the other person doesn’t respond and ?goes out of the room?, changes the subject, suggests a different activity, and then I am clawing myself out of a drowning tub - a well. Anyway: the pocket of interest in the dream was that we were talking about them so normally, acknowledging them without getting\n@@PB@@\nupset."},
{page:367,type:"day",lines:42,date:"Oct 12",text:"Changing patterns was like Jane said. A pattern I noticed with myself is that, after John left the room to go to the bathroom and came back to initiate the car burning activity, while he was out of the room - I started <em>looking differently </em>at my mac n cheese in its bowl - “oh, the elbows - yes! the spaghetti - could be part of the automatic process… &amp; so could his used q-tips” I caught myself cause it was such a sudden and abrupt change. and also realized that I’d been embodied? the rest of the time I was there. I guess the end of that thought is that my mind “gets down/back to its basic processes when I’m trying to escape something - like, it starts <em>abstracting </em>stuff, which, as Sandy pointed out, is not how your brain is supposed to work. Anyway, I like when people <em>hear </em>what I said and say something - Clarifying Qs that prove they <em>want </em>to understand what I have to say. I’ll say something purposely confusing to see if they’re really listening. Which maybe is what daddy means when he said “intentionally incomprehensible” - seems like something Ege might do. But anyway - I like when I feel people are making an effort to bridge our minds - acknowledging the inherent gap, and the work it takes to bridge it, and taking on the task enthusiastically. I don’t have a <em>lot </em>of rules but I would consider it a <em>mortal sin </em>to <em>not </em>understand something that someone said and <em>not </em>ask any questions to try to understand it better. Leave it hanging in the air like a dead fish - a lump - a mine space in minesweeper. It is dead. Ultimate giving up. Anyway - people do it all the time, and I sometimes do too. Went on a hike yesterday with daddy, after the spider incident (missing)\n(note: what action do I take, if I don’t know what goal I have/what goal to have? This action was <em>obvious </em>cause I <em>knew </em>I was trying to remember the stuff from last night - I guess that was a goal I was aware of.) and the “derivative” potentially (call it something else…?)"},
{page:368,type:"abstract",lines:13,date:"Oct 12",text:"everytime I start thinking about what to do, I got back to the big picture: mold theory, and drawing the relationships between <em>any </em>set of concepts/examples. The 5 paragraph essay works as a teaching example (coincidence?) because all the examples (theoretically) hold the same weight and have <em>the same relationship </em>to each other. I was(?) having trouble “mapping” other essays, and I think the <em>solution </em>and what (?) (luckily came together (as a packet :)) is that - other essays each have their own unique structure. This isn’t so hard, but it’s hard enough that it seems plausible, so I accept it as an answer."},
{page:369,type:"ideas",lines:24,date:"Oct 12",text:"Website: add “kit” as <em>another </em>puzzle. And: fill out any (all of the (()) so → moments, kit, venn (derivative, pyramid, abstraction (can these be combined?! :) (?))\n@@PB@@\nOTHER PUZZLES\n(pic)\nIf this is too hard for you, try some venn diagram puzzles\nThe precursor to set is the Venn diagram. This is a classic comparison puzzle. The overlapping circles representing two things and what they have in common. In this puzzle, two of the things maybe filled out, with the goal of filling in what they have in common, or <em>one </em>of the things may be filled out, and the abstract element - the (what is this word?) - with the goal of finding the second thing - another example of the thing they have in common.\n@@PB@@\nkits\n(pic) moments\nthey follow the same rules\n“The Difference Between kits and Sets”\nThe Derivative is “another example,” but this example is abstracted. there are two ways to represent this: as the top of a pyramid - this is: the <em>thing </em>that they have in common abstracted as a concept\n“A Special kind of Set”\nin which everything is different, except one thing, which is the same (pic) a set which has only one thing in common.\nOctober 16th"},
{page:370,type:"dreams",lines:28,date:"Oct 16",text:"Dreamt that I joined some kind of group and I came back from a trip (NY/ELS) and this one woman at the top of an escalator was haranguing me about absences but didn’t understand so I had to explain it. I was with one of the men from the group - sort of like a chavurah. And everyone was talking about how helpful and nice it was to be in the group - I was actually in <em>two </em>groups, and was tryna decide which was better. I sort of had a crush on one of the guys in the group. Anyway, then we all had to die - we were led to this chamber and it was all very confusing. This wife (?) with <em>long </em>strands of gray/silver hanging down from <em>everywhere </em>on her face - her lips etc. was lecturing us about something. We went into this room, and a couple people chose to kill themselves - one took pills (Jeff Turner?) and was slumped over, another hung themself from curtains(?) Then we were taken into another room and there was a hush hush thing, and we were maybe <em>not </em>going to die? That was exciting. but i felt bad for the people who’d already died, though I was not sure if I understood what was happening - why? they wanted just old people to die? Had they been old? Then some other people from the group, who had also been supposed to die came into our (?) and more confusion ensued.\n@@PB@@\nI’m having a hilarious(?)"},
{page:371,type:"abstract",lines:25,date:"Oct 16",text:"amount of trouble trying to figure out the derivative vs. set vs. venn - apples → oranges (?) probs cus I can only use like a 1/3 of my brain today, Anyway - my current hypothesis is: the venn is: “what they have in common,” and the <em>derivative </em>is a <em>metaphor </em>for what they have in common….? …it <em>shows </em>the issues in the comb thing - the comb thing is about - accidentally misinterpreting/misunderstanding something - simplifying something to the point where it no longer makes sense - ignoring important info - valuing information wrong → choosing the wrong information to value. True? The Derivative <em>describes </em>what everything in a set has in common…(! Oh: and another thing: it’s about how <em>some </em>sets can have everything in common or everything different, <em>but </em>in a “special kind of set,” the set becomes <em>about </em>the one) thing the set has in common (besides things that make it clear it’s a set, like having a similar style (rules it follows, and size etc. (I don’t understand this part)\n@@PB@@\nanyway - since we were “obsessed” with the <em>progression </em>of ideas yesterday (pushing buttons to get to the place we want to be (recategorizing things/this)\n@@PB@@\nOctober 17th"},
{page:372,type:"day",lines:17,date:"Oct 17",text:"Spent the night at Jonathan’s house. Then he left in the morning and I was stuck in his apartment with nothing to do for almost 2 hours (I woke up at 12, he got back at 2ish). He had to take his brother somewhere. Sandy called me just as I was getting cookies at Bristol Farms. Two Things to Remember: one is to include the “seed” (new term, who dis). I was happy that I still liked the kinks, because it creates a link between me now and my old self, and helps prevent me from worrying that I won’t like any of my ideas in a few years/10 years…like Lamarck is now back in style). A potential venn diagram for my [sites.google]( is Eli is mad at S (missing) Sandy is going for drinks to try to decide where to work.\n(missing)\n\n(note: insert papers from Js house, <em>and </em>pepperdine papers)\noct 18th"},
{page:373,type:"day",lines:28,date:"Oct 18",text:"I keep forgetting to be relieved that my taxes are done. thank goodness it’s October 18th. I thought, they were due the 17th. yesterday i went to pepperdine University, and pretended to be a student without doing anything. Someone gave me free water and I asked the guy at the library for directions and finally felt automatic saying, “sorry, I’m really bad at directions” (I really am :))\nHaving a pretty good day so far, except a little icky in my mind. And it’s <em>really (?) </em>I <em>think </em>I got woken up by a palm frond hitting my roof. No spiders, no scrapes, no bad dreams. Just a palm frond hitting my roof and waking me up…hmmm. I think I actually might have an eating disorder. Fasting is fun and stuff, but maybe not everyday - and, it was hard to work cause I was hungry yesterday - is it a virtue to not eat? idk but i’m <em>never </em>full, and it’s distracting. Whatever the case, tummy didn’t feel particularly good yesterday perhaps because for <em>most </em>of the day, I only ate the 2 cookies in my car 1/2 each). The weird thing is: the scrape I got is in the same place my scar was - that I had that <em>horrible </em>time looking into my skin at wash u. Seems relevant? Talked to J about how he hates me two days ago. He was defensive. Actually, at first he gave me reasons why he does hate me. Can’t really handle casual dating"},
{page:374,type:"day",lines:4,date:"Oct 18",text:"This morning I was gonna compile all my ideas because I realized I just got my hinges and I could actually make stuff now. I also want to work on the three part book I was writing yesterday\n@@PB@@\n<strong>October 18th</strong>"},
{page:375,type:"drawings",lines:22,date:"Oct 18",text:"3 ways to make the papaya chunks I forgot to eat yesterday\n(pic) out of wire, and drape fabric halfheartedly, and maybe sew in a few places. “spatter” that color paint on it. (Make some nice frames, and then…)\n(pic) blocks of wood <em>+ </em>clay - form the clay to add the additional shapes. Paint it once the clay is dry - not too perfectly.\n(pic) cardboard, hot glue\npaint the chunks after cut before glue - like in David’s class 😛\nThree piles right next to each other (rather than choosing)\n@@PB@@\n(not really sure <em>why </em>I would make this)\n(pic) papaya chunks)\n(pic) weird wheel spinny thing - on top of 3” pendulum board - color in black velvet, then cut square holes in muslin and push pin in the middle, so it “spins” (pic) (frayed, Black velvet)\nand last but not least, hastily cut chunks of clay, with pale yellow randomly painted on them…\nTOP DOWN\n(doily - cloth - not too intricate (?)\n— made of clay, painted green\n← “pea” - hot glued on…(?)\n← “doily” (?)\n← wood\n←\na bunch of them on the plate, individual “doilies”\n@@PB@@\nmake out of wire\nx - 7? 15?"},

{page:378,type:"ideas",lines:30,date:"Oct 19",text:"All the permutations of automatic process: ex. by the $0.60 pipes from aliexpress (all the sizes - fit with the wooden (pic) - small and large. Also (pic) ← yellow (pic) ← red (pic) ← blue - and start to premake them…that’s one\noh and then (pic) - half put together\nand then there’s: (pic) ← premade wire circles + O O x 2 + 1 a bit of lace, pre-constructed…etc. <em>and then: </em>I guess just the journal entry - the box of “bad ideas” idea I had this morning upon waking up - to make a (?)mental map of my 3 part book (lol) could I somehow make an outline - include the rule cards for example - all the games…would I be able to “write” it “once it’s all outlined. I could: send it to Zach, include it in an art backpack, or a making conceptual art pack. Get all my friends to sign up for a class, and have it be on the required reading list. (use a penname - Hunter? Specia? Here’s a thought…do the <em>drawer </em>pulls for all the concepts instead of [the actual concepts, or even: a metaphor, if it’s not a drawer pull) Ok, so: for the Automatic Process - Shayna telling me she was coming up with patterns…I also imagined - an assembly line at various stages ex. with the pic) BV with white cotton - pocket - drawn lines on it (?)\n@@PB@@\npic\n@@PB@@\n(pic) instrumental cover\ngoal: to design an “automatic process” for yourself +\n…telephone - translation - systems of movement → abstraction → assemblation\n\n(the metaphor machine)"},
{page:379,type:"ideas",lines:12,date:"Oct 19",text:"how we make reality with our minds\n(250 copies)…\n“22 pages” - 24\nsome kind of pink color(?)\nmuslin\nflower fabric (actual photo…(?)\n[THINGS I’M] TRYING NOT TO FORGET\n(comes with) (comes in 6x6” box :)) (with: mini water-color paint set + paint brush. A little bit of clay - things you can use to do the exercises…notecards - set up assignments for yourself that are in between - ex. photo notecards (polaroids (cause they’re quick) sewing kit (to play “what’s the procedure”)\n@@PB@@\n(pic) “table of contents” - assemblation, abstraction\n@@PB@@\ncollect your thoughts\nthe categorizer - compartment -"},
{page:380,type:"ideas",lines:14,date:"Oct 19",text:"put small silver non-beads into their corresponding compartments\nmancala board - replacing categories with each other\n(pic) - a sequence of buttons as you recategorize things in your mind, on the way to a particular mental state\ncomes with a booklet on: how to read people and map their minds to find out what they’re putting in what categories.\nex. values can change, but do not change frequently.\nGoals change - temporary goals change a lot, and erect rules everytime they do - this is probs the biggest\n@@PB@@\nex once you accept that something’s not possible, your goals may change (after you do an “acceptance ritual/ceremony” (which could include crying etc.\nTHE PATTERN COLLECTOR"},
{page:381,type:"ideas",lines:9,date:"Oct 19",text:"weird pattern collectors you can find on etsy\nbasic: the main function\nother ways you can use it - very specific use cases\n\nweird/niche pattern collectors, meant to collect specific things - so, with movements like bats or pea rounds (”your grammas pattern collector” - vintage pc)\n@@PB@@\n“the abstracted version of doing something” (working with automatic processes) the “time lapse” of going across the conveyor belt/assembly line\nOctober 20th"},
{page:382,type:"day",lines:3,date:"Oct 20",text:"OK, I guess I’ll journal while I wait for Sean. god knows I need it today all this sadness for no reason and nowhere to put it and no (missing)"},
{page:383,type:"ideas",lines:38,date:"Oct 20",text:"I want to make an upscale “Become a Real Person” kit with a printed tea towel - ex. the car or other design from MJ angels ? and something like the spoon salt shaker - so extra, and includes a ritual attached to it (And then some blocks that can be played with - (pic). ( guess I could use the candle snuffer outter, or a small version - to get rid of bad thoughts - a small black plate (made out of clay?) with handles for no reason. And another one could have a pocket - standalone) with a paint brush, or a few, all connected together. (pic) ← ex - paint brush - and it “goes” in the pocket. Ok, and also: 3-5 blueish marbles that go in a dark wood structure and they just go in there. Someone says: “put the pocket in the paint brush!” and there’s only one way how to do it - you can’t do it - but you feel pressured to do it, And to go with the pocket could be a “book” - watercolor paper, printed with gray light images. And they maybe get (taped) together with earthen authentic tape. Or perhaps (and) they go in a nice box - pink, but made of fabric - fake suede. “Watch out for the moon: It is too <em>big </em>to carry! (….it might fall on you) (pic) two kids in a bunk bed can sleep together. check your plants! My god they have naughty thoughts. (Building a sand castle with spoons) “I don’t have the <em>tools </em>to build a sand castle today”\n\n(note: on a later day nov 7, - pic looked like abacus which made me imagine the assemblated version of an abacus - wooden frame (darker) - holes or glued for wooden (lighter) dowels, and beads on it - shows the difference between something practical and now it’s - the ritual is: moving the beads to different categories - can be used quick and in the same way as an abacus - there are markings that look like decorations (?) -\n@@PB@@\noctober 21st"},
{page:384,type:"abstract",lines:12,date:"Oct 21",text:"You get the blocks, or the sugar packets or the 3D pea rounds with lace and the first thing you do is maybe try various configurations that make sense to you - that you’ve tried in another lifetime (with other things) - castle blocks for example. As the castles topple, the sugar “cubes” fall down, you gradually <em>refine </em>what you’re doing to be more in line with the specific “block” you’re using until you are stacking the sugar packets widthwise instead of trying to make them stand up…and you appreciate the slick and sweet way they stack instead of wishing they would be more vertical"},
{page:385,type:"ideas",lines:7,date:"Oct 21",text:"the sliders like the malibu beach slider can go up and down - for rules, for goals/intentions, for what patterns are important to collect ?) I think the goal: you want to be able to relax, “knowing” that you “just” have to follow the rules that can change…idk, and you “move, around in the dark, like going to the bathroom”\n@@PB@@\n…so,"},
{page:386,type:"abstract",lines:12,date:"Oct 21",text:"the first thing you want to do is design an “automatic process - examples: detangling, categorizing, sewing a straight line etc. but it can get complicated - so complicated that someone who is not you wouldn’t be able to identify what to do next just by looking, and to be honest, you couldn’t either, cause now you are sensing every decision, believing that they are all according to rules - the rules come up to meet you, and you can do <em>anything. </em>This is not a bug but a feature - you can do <em>anything. Which is a reason to install the igps</em>"},
{page:387,type:"ideas",lines:9,date:"Oct 21",text:"Last night I imagined: a “ladder,” very specifically covered in green velvet fabric. Today, I am seeing a pipe with a small “(pic)” at the top, to hold a card - a very ornate/specialized mechanism that has one very <em>specific </em>function (overkill) perhaps the wire snakes, covered in muslin (with the rat coin purse)\npurple(?), wire\ntortoise shell sunglasses, potentially a hinge, like a make-up compact\n@@PB@@\n“dominoes”,"},
{page:388,type:"ideas",lines:18,date:"Oct 21",text:"but they all just have one red dot on them, or (and?) they fold up with hinges - they are made with bone, but maybe wood - or - square bone pieces/ 0 hinge of ribbon or canvas string” - smaller than passport blue book ex. iteration, progression, hierarchy - perhaps just this part, unexplained (<em>my </em>drawings :) Or: just the sets, with the primitive Ai - but lots of them, with descriptions of what they’re for, and the items in them, perhaps 3 per page. And 4 pages\n(pic: book: systems of movement)\n(pic) ← a bunch - all different…(I can think of them ex. crazy cat lady club etc.\n(pic) ← instead of leaves → spoons? x (no) what <em>would </em>be good? (muslin leaves goofy? etc. with hoonies?)\nAutopro (pic) a bunch of combs, that sort of collect inside each other\n(pic) x 64 - set up the board (()) → C’s friend that preps canvases w/ gesso"},
{page:389,type:"ideas",lines:28,date:"Oct 21",text:"To Do: make some sets To Do: think of slogans (pic) these are autopros, because they use an auto mechanism - ex. in my mind - my mind will automatically generate ideas. I know how to do this - pick the out of a lineup\n(pic) plate (wire), fork spoon knife napkin wire hinge napkin cup silverware\n(and they all get hilariously dumped into a box - or perhaps there is a fabric napkin, or tablemat - so at least it can be laid out nicely. (And that is the point). ok and (idk): “peas” or: “french fries” (just: different sizes of wire (but: there <em>is </em>a specific mechanism/rules that are being followed ex. (pic) this would not be allowed as a drumstick - basically - the shape cannot be described - only badly functioning things…(the shape cannot be descriptive?) at least <em>pretend </em>they can function…but the <em>funny</em> part is how they all get dumped in a bin or box, and get pulled out and become a place setting.\n@@PB@@\n(pic) ← so it folds up ← (pic) could be made of wire - comes in a glasses case, and there’s a line drawing of the folded version on the cover…draw?\n— — — — — —\n← plastic cards…they go in a wallet - different colors - maybe some have lines on them..? Oh, and - paper (fabric) money, metal coins - all the materials (but doesn’t add up to a wallet…idk)\n(pic) - sewing needle\n@@PB@@\ncont oct 21st 1:45 pm"},
{page:390,type:"abstract",lines:27,date:"Oct 21",text:"Something about mazes - each decision point - turn - is you deciding to put something in a specific category - labyrinth cards - and these could trigger particular mindsets - you’ve read this book before (werther or stranger) - go through the maze <em>Again </em>as you’ve done before/100x before…(and then get to the same place (a maze that leads <em>outside </em>your mind(?)\n→ (that’s the eventual goal, but 1st we need to figure out the basics (you are here)… :) so…ex.\n(pic)\n@@PB@@\na lemaphor - a metaphor that <em>reminds </em>you - whose primary purpose is to remind. (There’s something in common with the pattern collector, which you use just to remind you of the concept)\ntry out each different possibility in my head, ← which one works\n(pic/chart)\nThe example of the Lemaphor we came up with on the walk was 1. mapping → categorizing people’s minds and → assembly line/conveyor belt → automatic process\n(pic: stumpkin) ← inside the drawer - lil’ berries I saw on my walk. also: action of collecting I think is important - imply that with numbers on the [potatoes] - or put them on everyday(?) (printed at spoonflower…) spend money! :)\n@@PB@@\ninside drawer - categorizing people’s minds - that scenario. imagined at a coffee shop, about the water…\ninside drawer: automatic process…\n(…anyway - back to the labyrinth thing…"},
{page:391,type:"abstract",lines:12,date:"Oct 21",text:"ok: another thing I thought of on my walk…(and idk if v important but (())→ (venn diagram between the peas and the crazy Es\n(pic)\n← me adding a bunch of lines to the E because I got the concept that it was a stick with a bunch of lines attached to it (unspecificed)…ways things can go wrong…ways things can go wrong as children….(pic) ← head with legs\njust “crazy childhood dreams” (I needed to curate this relationship, because I wanted to refine the E as: (pic) frame, possibly and then have the ticks be hinged, so I guess…idk\nwire work\nanyway…\noct 21st 7pm?"},
{page:392,type:"abstract",lines:15,date:"Oct 21",text:"Here is a process you may not have considered: seed/pre-Tot: if I were to clean up, one autopro/step by step is: put like things together. When process complete, re-apply, now with “new things” (like evan said: “apply the process again”) now the piles are different so, if, in the first stop, you put long thangly blocks and short booby (pic) blocks together, side, by side, but separately, then you would make a pile of wood chips and another pile of nice lovely sewing colored things (muji: pastel (pic) and the scraps of cotton and velvet that I haven’t actually cut out yet. You can repeat the process (exponents) a number of times - as many as…until…and then you can put them away on shelves."},
{page:393,type:"todos",lines:9,date:"Oct 21",text:"Things to Think about\n→ what happened to the avocados in my bag (1 by 1)\n→ the categorizer - applying the process aforementioned, but with silver beads\n→ using toys ex. wooden blocks - in Muji box - as a gateway to repeating certain conclusions…(?)\n“DREGS”\n1. → “2 ways” to get to (?) a mindset\n2. → chronological wall of memories and op a shell as an <em>exact </em>replica of current (tissue = altar cloth).\n\n(missing)\n\n<strong>October 21st</strong>\nOk anyway:"},
{page:394,type:"ideas",lines:46,date:"Oct 21",text:"remember to include: painting is an automatic process - I tried three techniques cause I didn’t really wanna learn to paint, and I concluded I like representational painting better 1. responding to what’s there (trying to “fix” it, according to the rules of set theory. option 2: working from a picture, but going crazy - mix of the 2 methods… use photo to start it off. ok. And then: the last, which may <em>only </em>apply to me: see it in your head. (Oh yeah - the other was: drawn feeling, or concept, or situation (but this gave me a head ache and was unpleasant). Anyway - I think eventually ideally I could have an extensive digital outline but temporarily, could draw it out ex. with notecards - color coded for exercises, concepts, anecdotes. Examples etc. concept: yellow game: orange: exercise: purple example: idk - blue? blue? → anecdote: green. Anyway. idk…I want the cover to be pink.\nI sort of keep vacillating on if I want to make it like a 22 page book that I can print at uprinting, or expand to include more examples etc. but anyway, I could expand it after, and use the 22 page one as like a physical outline…(?)\nanyway - now there’s like 10 options for covers: the paint brush pocket, belle confusione, white border, vertical stripes - like white etc., cream, sepia, low brick red idk etc. ok and then, pretending it’s sewn, or by my hand - “the sewing marks” around the border…or this can just be my 22 page outline version…(pic) looks like this…draw Metaphor Machine. I’m going crazy I think. None of this seems real. I’ve been working on this for <em>10 </em>years and I am <em>no </em>closer to finishing. So I must be making it up in my head. Well - idk - nothing to do about it - just accept it I guess. → ← ex. the Black and white, which play with something (different in each one…oh, it’s blurry etc.) I mapped this out once…I could make a chart…(why?) (missing)\nGuess all I can do is go in the anthropologie dressing room and smile at myself in the mirror, and catch little pieces of sunlight…worst idea. make all the notecards, and then put them together into a <em>set </em>flip book. And then…(?) idk…I’ll find out I guess 🙃\n@@PB@@\nok so: I <em>know </em>"},
{page:395,type:"ideas",lines:14,date:"Oct 21",text:"how the food collage thing works, and how it relates to the other things - autopros etc. - it’s about putting rules, and it includes the (metaphor) of the unspoken rules of grandma’s household. That connects to the rule cards (should i actually <em>make </em>them, or just refer to them - <em>they </em>make them? idk (depends how good chatgpt is I guess…idk)\n→ make a modular sculpture…(some of the rules chatgpt came up with describe very well what I have/have been trying to do\nok. another (different) idea - each section goes in a matchbox - label is what gets me to start thinking about it (or put a label metal on top, and :inside: little <em>tiny </em>sculpture of what there is."},
{page:396,type:"abstract",lines:14,date:"Oct 21",text:"ok this is an interesting thought: yes, rules are interesting, but it’s <em>more </em>interesting to <em>document </em>like a <em>pattern </em>all the times you come up against the rules - the more situations the better - no eating - can’t eat cookies - someone (me) brought me home a nice paper bag full of cookies (and now I cannot eat them :() hehe :) )\nCONFIDENTIAL\nTOP SECRET\nEVIDENCE\n(STAMPS)\n\nthings I’ll never understand\n- why other people care that their room is messy and i don’t\n- why I can’t write this book\n- If I <em>like </em>fixating, and calling myself a “poor baby” or if I’m actually in love or heartbroken or something - is that a SIMS fear of mine, and it’s not actually true…(!)\noct 22nd"},
{page:397,type:"day",lines:36,date:"Oct 22",text:"Not quite sure what to work on. Woke up nice and early (like 10:30). Need to shower, but enjoying my new desk setup, and my new thingamajig bag. Working on a Maira Kalman version to emulate the elements of style and still want to incorporate tiny treasures. Read my square booklet impetus: thought i could hang them on my wall cause I was trying to use the pocket/pool - to figure out the labyrinth thing. I woke up <em>very </em>happy today. I’ve been chatting with this stupid boy on hinge who lives on 17th st. Somehow and wants to make me trukish coffee just like ege. I meant to text Jonathan the past couple days just like I was supposed to hang out with him the other week after we got drunk but i don’t really want to - kinda wish he didn’t exist. I’m sick of not being myself with other people as usual - I depressed myself by looking at my phone. I could walk to primo pass and feel the sun on my skin…I could get all my work done early and run off to that starbucks on my instrument list, or even pepperdine, get another protein box - egg, peanut butter etc. Could go visit all the black cashiers I hate at Whole Foods and buy, like, 1 gram of almond butter. I could look back over my September journal entries and feel sad I’m not having such interesting thoughts I caught a glimpse of how deep I used to go - in a down, not lateral - it was how metaphor and examples…idk…I don’t care what anyone says - I get to write in my pink writing chair and I told everyone I didn’t want to be friends. I am going to make 3 new friends - maybe nick, josh and wesley, and we will road trip to malibu everyday. I prefer them to Sean in that they are chiller always.\n22nd 4! (5ish pm)"},
{page:398,type:"abstract",lines:12,date:"Oct 22",text:"thoughts i had in the shower - mostly examples…for example - the way that there are moments of human connection, but then the rest of the time it just feels like bodies in a building together - mold theory - it’s like the pipes thing (which also is like the screensaver, and the first time I was thinking about it at the coop - but it splits off at certain places, but most of the time it’s just a long straight line going somewhere, I like how you can do the automatic process and include moments of decision - cutting out the food and placing them, but the “placing” blends in"},
{page:399,type:"day",lines:19,date:"Oct 22",text:"BAD IDEAS - Sean, Michael, Charlie - game, app, watch - too practical\nno one understand me - ilene’s class - saying something insane - realizing later that other people don’t need to say “new” things in Sam Francis - raised by hand - curating or placing, and it ended the lecture, and <em>no one </em>knew what I meant. No one knows what I mean ever. Any of the time.\nOn my to do list: write “mold theory” in notion, and link to set theory site. Send to Jamie - see if she can solve - comparison between math etc. but I was already thinking about it - mechanisms of the mind by maira kalman what was I doing? <em>Collecting </em>my thoughts - taking them out of various pockets - loose change - a crumb cookie pushing them towards the center with one/invisible fork heads\n(pic) (missing)\n\noct 22nd:\nthis was from the small square notebook in my (actual) house\ncollect your thoughts (pic - box i found - goal, extended rules"},
{page:400,type:"abstract",lines:33,date:"Oct 22",text:"ex. if i get new razors…what if i was rich…then i would pay someone to shave for me (changing goals and how that affects the rules and the assumptions - in <em>practice </em>- you have to find a place that works - where the rules <em>and </em>the goal, are somewhere that doesn’t “hurt your feelings” aww 😟\nex. going to museum (grandma - oh, there’s a lot of nice things, i need to collect them - idk bergamot…fairy tale sculptures klara kirstalova - all of them show how the concept is exemplified if you see…something that interests you…try to make more examples, so that - when you see them all together - you can find out “what you were looking at…what your head was doing”\nalso - simplified: see something - <em>what </em>kernel did you find in it to make it…interesting - <em>what </em>did you find interesting in it - <em>what </em>did it have in common with something else…compare it to something else. what was special in it to see\n\ncollect your thoughts (ladder) filled with shiny velvet - use little wire forks to push the silver beads “back into place” (this is/has to be a quick procedure so your mind doesn’t find out your not actually doing anything - just reminding yourself of where you put things before\n\n(clarification funnel) → tying up loose ends\n(examples)\n1. this thing (pink/lilac)\n2. the maze autopro from earlier today (actually: answering questions (I never told myself i had questions)…(set it up right like putting my phone in my underpants drawer\n3. (this is another reason to use the word priming)\nnotes from temescal hike\nHelpful metaphor\nSong"},
{page:401,type:"abstract",lines:29,date:"Oct 22",text:"Baby shoes - replace the structures…I graduated to boy thinking about ANYTHING and then I could just plug in any random data - just make sure they have the same relationship\nMaybe: Instrumentalism get rid of main structures, not just ex set theory progression iteration etc\nCornerstone\nMicah downer\nThat thing\nBut now: (and there was another cornerstone earlier today in my room😭✔️)\nThe sweeper\nThe envelope with hidden mechanism design red in red\nAdd it together for later ex- Sean + autopro\nDrawer + baby shoe\nAnd it looks like a little tine plus mini (purple thing) (means it’s in the mind)\nSweep it under the rug - nice little sweeper - smaller than the smallest big boy brushes, different shape - flatter, and rounded on the end\nAnd remember the purple autopro (not!)\n…pulls it out (but once it’s under the “rug” (small rug, sweet kiss of death size) step by step: rug, then purple thing\nOk and last I think was: a purple thing that gets rolled into a thing - but that’s the metaphor - the mechanism includes all sorts of other tools (but there aren’t actually any - but that’s what you need to understand it - for pretend example (modified example: fork, knife…\nRolled into the muslin sewn red ribbon to tie\nDrawer and just one event - that’s enough to trigger it maybe\nStumpkin - put collecting in the category of experience - this is a…of the mind"},
{page:402,type:"day",lines:13,date:"Oct 22",text:"Things that made me cry today\n1. Sara and gittel - im the thing they have left and I’m not doing anything to carry on their tradition - what were they like…?! Why am I named for them (I probably look like them)…I am soo weird - there’s no WAY they would like me - did they THINK about neuroscience…? Probably not / what did they think about\n2. Something in my room - just that I’ve been working on the same things for soo long - forever - when I saw the Manila envelopes. And the of course - the purple thing…when I saw that\nSean autopro never earlier\nLibrary drawers instead of bingo…on the special part of my desk\nOCT 23RD"},
{page:403,type:"ideas",lines:16,date:"Oct 23",text:"Last night I designed a bunch of tools (for the mind). as I was getting droopy they started to get more metaphorical (pic) I imagined 3ish versions - plastickey string, purple beads, or chain, silver beads, straight beads - refined from just (pic) purple x (no).\niteration oh yes, and Pic) competing patterns (pic) og cp\nretroactive was like a gate but I don’t feel like designing that right now. - and anyway - they all get wrapped up in a bed of muslin with a string around it - the metaphors imagined like cookie cutters. SBS: nail a hole into the dowel - wider, maybe shaved on end - then - glue(?) wire in - shape it. Question: should these tools incorporate ex. a tic tac in them, or (should they be metaphorical)?\n@@PB@@\n<strong>oct 23rd 1 ar 12am</strong>\n\nTot:"},
{page:404,type:"abstract",lines:18,date:"Oct 23",text:"I was thinking - I don’t wanna do the amethysts, because then I would have to end up putting ar rule set on my head: ex. value - lower standards - put things in the category = of what I value (also, note: charlie - drink as medicine. helpful metaphor - autoimmune disease (())→ getting new charms - eating myself helpful cuz: connotation = negative) Anyway, point is this is useful because (oh my god - i love my fucking desk. i love my fucking life…and yesterday, <em>before </em>i saw jonathan at the reel inn, I was thinking of getting myself <em>chocolate cake </em>as a special surprise just because it felt like my birthday) just remember that when you think you can’t be happy without it. (missing)\n…anyway: point being: <em>I </em>can design (~tinker toys - the yellow ones, with the weird logs and the holes in weird places (pic) nice loopy holes, not, I don’t know, <em>bad </em>awful ones"},
{page:405,type:"ideas",lines:31,date:"Oct 23",text:"alright, let’s try this: prototype, example, j’s time limit\n - sean + autopro + never late - 0 0 0 + richard’s spires → a reason other than being broken\nset → kit → metaphor (progression) ← shorthand so I can remember this for later. prescription: music (molly burch, not quedate luna (I was feeling weak needed to be empowered)\n→ prescription: a specific game to play, that can make your mind work in the way that you want it to. And then (muji box) 1st: play the game ex. papaya chunks with clay - (I chose one) (that you can move around and make things out of) so that: then: you get in the right mindset I don’t know whether there’s just one, or many for each mindset. I know, there’s both, and it can turn into a both format, but I need to ask the question again: which one is it? To do: design a toy, like tinker toys (primary attribute: many ways you can play it/ - versatile) to do: sell the bones, first: buy the bones : lay the bones on a matt - nothing is printed on it, not a scull and cross bones…\nso, for example: you could: <em>play </em>with the angel sugar packets/to do: print all the (angel) stps (other hoonies/) and print them on “sugar packets” fake - made of fabric) but it’s nice because you <em>can’t </em>play - there’s not game you can play - they <em>do not </em>have the versatility attribute (and neither does spires, or 3 eggs made of wood or intricately constructed from wire and with muslin placed on top so you can see the shadow of the wire through the muslin\n@@PB@@\nok:"},
{page:406,type:"abstract",lines:19,date:"Oct 23",text:"here’s another thing that will help me feel better or pretend I feel better. (pic - roll it up) point being: there is no hidden mechanism - take out the HM, so used to have: the perfect tools inside the perfect case. And but <em>now </em>we name to ___ to save in my memory or to use as a directive the way moses “did” : make <em>all </em>the steps of the progression so you can show off your process to yourself or idk but just do it (cause there was a hidden secret reason)\nthe idea of me putting on my velvet coat and davening - reading a book that <em>only i can </em>understand cause all the references and appendices are linked to things that are in my mind (lol: links panel link broken) also: putting the book in my purse (sleeping on the wing) and: the girl that keeps my spellbook in her purse :) :) :) aw/that could be me if I wrote it…should it be written? ok, let’s start\nOctober 24th"},
{page:407,type:"abstract",lines:12,date:"Oct 24",text:"mental blindspots - placeholder - thingamajig - drawer in a dream - made for mind/world - tabs\nplaceholder\nthingamajigs\nreal, fake, pretend, imaginary\noh, and here’s <em>another </em>ToT: <em>hidden </em>mechanism (there’s an example there - it’s on the card) and it comes with a goal of making a “counter-intutives” poster with little “whooseamawhatsits” (and i definitely don’t know all of them - they’re kind of ugly, and look like people - and there’s too many of them, so they’re things(!) Let’s journal about we <em>feel </em>about the hidden mechanism - I don’t <em>like </em>it…it’s kind of eepy\nOCT 24TH"},
{page:408,type:"abstract",lines:26,date:"Oct 24",text:"Here’s a thought process that might be helpful to you: (tangent: the sweeper - it was a mop, made out f a sugar packet. it sat nicely on my thoughts), and then it (mopped) them away - it understood them because it was big and flat - but it didn’t need them to be there, and honestly: no one wo\nok anyway: this one is sort of “expanding out” and contracting in at the same time - here: the progression is trying to map other people’s brains (to have successful social interactions…?) and then: you try to map your <em>own brain, </em>and that becomes: looking at patterns, and looking at looking at the patterns you’re collecting - what am i looking at in the world and <em>why </em>is it interesting to me…? - like a circle with a kernel in it, and then another circle around it - cause it’s your awareness of it.\nThe way that, in the magician’s nephew - he gets called into various pools - I guess this is a common train of thought . it (?) flows freely from the source (perforated sticker sheets nee film reels - extra - crackers (with perforations(!) - FF under TBF with pearl “buttons” - connected through - sewed together - - - - - - perforations\n@@PB@@\n(missing: descriptions of primo passo happenings)\n@@PB@@\n(two squares pic) -"},
{page:409,type:"abstract",lines:27,date:"Oct 24",text:"two pillows I was imagining (this morning?) - completely useless, but calls up the train: 0 0 0 eggs, spires etc. - I think it spans in all directions - complete uselessness except the central usefulness of “(nixing”) something - rendering it useless - so I can use it as a symbol - neutering it - performing a procedure to extract the usefulness (uh…?) ?\n(pic: the pools, pic: the rings)\nAND: the rings get into the pools…in my version the helmet or glasses give access are <em>keys </em>to the world (organic chocolate mm)\ndigory walking around, <em>collecting </em>mindsets which you get to by, for example, <em>drawing </em>- this is an activity which abstracts the mind - breaks the mind - (maybe) the ultimate version of a tinker toy is “making” a tinker toy - automatic process 1. perform assemblation what could you make…? pea rounds, (the nasty ones that I designed just in my mind)\n…collecting mindsets\nso: go from pools which are actually fountains to world shelves and the rings are tinker toys which is for example trying to figure out what color something is: disrupts your brain activity\nother mindsets…(?): set theory - checking your work, you set rules around your brain. and: the scientific mindset (repeatability (note to think about more))\n@@PB@@\nthe dead spots -"},
{page:410,type:"abstract",lines:22,date:"Oct 24",text:"fairfield porter - lowering the black point (kill it, dissect it)\n\nOh yes: mental blindspots…somehow leads to placeholders and thingamajigs, drawer in a dream - made for mind/world, tabs, tags, what to do: machine wash - tea - extrapolate - wagon - this is where the maze ends - go a different way (dead end…) hypothesis: collection → progression\n\nOh, and the world is similar to the pipes\nmental blindspots - how to “get there - Tot: goal -&gt;&gt; fake goal → -&lt;: competing patterns → goal - fake goal - becomes “real” goal, and it’s “solved” but and/or <em>because “imaginary” </em>goal (turns white - because (,) the goal never existed in the first place.\ntangent: and here’s a way in (?) filter - what patterns - (ex. of thoughts - what thoughts do you let in? drawer pull ( |_| ): maddie and i have different best practices for journaling (goals, but…) mental blindspots → use: multiple essential characteristics, and turns into: leads you out because ex/ voodoo/paper, ex game cards. meta: (metaphor): carousel anecdote: orange white up top"},
{page:411,type:"abstract",lines:40,date:"Oct 24",text:"here’s a little mess thought map I’m not sure but here are the stars: 1. (missing)\n|_| = yoni is married so there’s <em>that </em>reason for him not texting me back, and then there’s <em>other </em>reasons - and that brings up: ambiguous events, conceptual puns, general uncertainty (which is not something I like to think about, so I close it off with the other two 😜)\nTot: systems of movement - games - different systems…oh yeah! they are little - the little ones: ex. progression iteration, building blocks etc. (idk if there are more - goal - fill the periodic table.\n\ntangent/note: wrapping things |_| - saw the sandwich wrapper - and I thought: “oh it would be nice to wrap - something up - some things up - try this: a bunch of brown papers - ripped or sewn? - cover with this and the goal is to just wrap things up…like what - is there a specific step by step procedure like folding at the gap and probs brandy\n@@PB@@\nwhat are some other thoughts like this? the last time I liked reading was when I was a kid. maybe I need to read kids books again\n\nHere’s another common Tot - setting things up for later ex. rather than thinking about this now, lemme “edge myself” - add 3 things to my short term memory so it’s more fun to think of it (?) and also: when I have a certain thought that produces ?dopamine? , can then (use the dopamine/energy to have other fun thoughts - propel myself out of the sphere I’ve been thinking in - kinda like the pipes, but it feels like Ii have <em>one chance </em>to have a fun thought, maybe because the dopamine is not real - so I only have as long as till my brain realizes that, which is till I stop thinking.\nok, before we go back: last night: wanted to organize my thoughts in an actual box (pic), and I don’t know what the compartments would represent - ex. things i’m trying to think about (want to think about) (, and things I’m trying not to - but that’s not actually in there…)"},
{page:412,type:"abstract",lines:45,date:"Oct 24",text:"Here’s another ToT - starts with the pockets - when you want to <em>collect </em>your thoughts - starts with a stack of different pockets - take them out - take the thoughts out of them…if they weren’t imaginary, they’d look like fortunes (fortune cookies) but maybe something to emphasize that they’re the tips ex. connected to the end of a cue tip - they’re one end of it…\nhere’s a Tot that I would normally discard but #filter: I had a “mini realization” that I don’t even remember, then I <em>expanded </em>out / extrapolated (?) - seed/stem: I “want” to make <em>big </em>realizations - “directive:” don’t want that/don’t have any. Then I had: an <em>idea </em>iteration 0 (ground 0): 3-flip book - random ideas so I can connect disparate ones (assumption: big realizations are from connecting <em>lots </em>of thoughts or <em>far away </em>thoughts or: iteration 2 (1) constellation - connect [5] or more thoughts:\nstep by step would be - idk - make a bigger version of the (cant read) component and: put in random thoughts. Realization (cause I got meta and thought if I <em>should </em>be thinking about this: next: imagined my next steps would be: try to think of the content → example content (but to do that I’d have to relax more - become black with gray and white\n@@PB@@\nanyway - i could do it mechanically - type out all my …and divide them by thoughts - make them into fortunes(?) let people buy them in a vending machine or gum ball machine to add to their value <em>or: </em>print them on money lol - pin them to the back of fabric dollars\noh didn’t wanna write all this out but i can muster: people saying masks aren’t necessary/don’t work at the beginning of the pandemic (()) → you can’t time the market () → breeds mistrust (cause: cognitive vehicle, not real truth)\n@@PB@@\nOh, and here’s <em>another </em>tot: <em>hidden </em>mechanism (there’s an example there - it’s on the card) and it comes with a gaol of making a “counter-intuitives” poster with little “whoosamawhatsits” (and I definitely don’t know all of them - they’re kind of ugly, and look like people - and there’s to many of them so they’re tiny (!) Let’s journal about how we <em>feel </em>about the hidden mechanism - I don’t <em>like </em>it…it’s kind of eepy\nOCT 26th"},
{page:413,type:"day",lines:28,date:"Oct 26",text:"I feel sick and tired and I do not even know why cause I had a really good time last night and met a bunch of cool(ish) people and made a good impression cause I got enough sleep and didn’t drink too much so I felt in control and didn’t feel like I was flailing too much. But my heart feels like it’s broekn and I don’t know exactly why. I can think around my heart, but sometimes I have to tell it lies that disapear when I’m done with my therapy session. aggressive → hidden mechanism ex. carton of stumpy [toys] (with different heads) Katie + she doesn’t have any friends - oh good, I can make her believe in my reality - which made me think: <em>what </em>is under my thoughts as a very general directive, and then I paired it with the question I had earlier about whether my assumptions about anything are right - <em>is </em>that even the “point” of what I was thinking? could I be - dare i say - wrong?? Safe to save it with the example, so if I pull it out again, I can “check the connection” Accepting the insane rules of the party ex. you can (and should) walk away. You <em>have </em>to guess - I know! What people are thinking - yes! this is hard. But there are concessions - you can make people believe <em>unreal </em>things and this is fun. And you can be mean to people - really, really mean, if they don’t notice."},
{page:414,type:"day",lines:16,date:"Oct 26",text:"Maddie looked so cute in their ninja outfit and we bullied a race car driver by calling them an astronaut even <em>after </em>I found out what they were. then we were gaslit by Henry saying some drunk guy came and knocked down all the cups at rage cage though really everyone just left, slowly. I do not understand why henry is attractive- beard + gut but preacher looked alright. When I think about that one thing - my heart hurts (missing) Brady (chef) and I came up with an elaborate backstory where my name was Tanner and I had a stepmother who didn’t make the chicken nuggets the way my real momdid. that’s pretty much the only thing I like doing - going to parties and continuing bits with strangers. It’s so much more gratifying - the whole situation just feels so full of air."},

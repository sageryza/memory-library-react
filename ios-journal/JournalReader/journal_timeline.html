ngs in cubbies and drawers in real life - they stay the same size. You can imagine them sitting there - the cup, or the plate, or the bowl - some sort of white, round object - the size of a shoe. Perhaps you go in to another room. Your husband asks you: “what were you just doing?” and you respond: “oh, I put some things away.” you don’t say:\n\n I put some dishes away, and you certainly don’t say: “i put 3 bowls and 2 plates away. They were the china plates that your mom got you for christmas about 7 years back - remember? They were white with little blue flowers all around the edge but none in the middle. Here, let me show you a picture…\n And how do the 3 bowls and 2 plates look in your mind now? now they don’t necessarily look anything like dishware. IF you had to recall them - they would be some osmosis of a white gloop, and perhaps a sense of their general size - an abstracted version of the very real plates that were once in your hands - that you held, touched and felt - and had someone asked you to describe, you would’ve been able to say many more things about their shape, and color - the pattern, and how big they were. It is as though, as you were walking from the kitchen, into the living room - these things morphed from specific dishware to general shapes, and ended at the very vague “things.” In this example, the process of abstraction has taken a spatial and temporal form, to emphasize the potential for transformation. However, we need not walk from the kitchen into the living room to take something clear and very specific, and turn it into a mishmash of form and shape. You see, our minds are tools not maps or descriptions of the world of any kind; therefore - we keep what information is useful to us and discard that which is extra.\n And so: we can watch things “get smaller” (have less information, take up less space in our brain) if we are aware of this process as it is happening.\n\n Abstraction is important if we are using information…if: if we are imagining something with multiple scenes - everytime we move to another room or look at another screen or…idk), our brain automatically(?)/manually makes [that which we are still looking at] “smaller” and when we pull it back out, we have to “unfold it” - to see it clearly - look at it in more detail (unconsciously) were we for some reason to pull it out without unfolding it - attempt the unnatural process of describing something that has been changed… what would we find? Something strange - that follows the rules of the mind, and not the physical world. Pull into the cruel, harsh light of day, something that was never meant to be seen - that was meant for a dark cupboard in a damp basement or a drawer of tangled string, spare keys, broken collected shells - forgotten things. Let us imagine it anyway\n\n note: here is an example: if i am doing the constellation exercise, and i need to abstract the memories, or concepts or whatever. And yes: they are smaller. And yes, it is ok if the food in the fridge is painted carelessly and some of the yellow of the lemon leaks onto the shelf underneath it, and if they are stuck to the shelves and it is nearly impossible to imagine picking them up because some of the yellow of the lemon has leaked onto the shelf underneath it. Because this is a tool for me to imagine something - these things are miniature versions of that which was once and could be bigger, and for this reason, I can accept that these things are what would exist in the mind if we could look closer at it.\n Here is a terrible example, because: rather than referencing something that already exists - that you know about - I instead plan to reference something that I plan to invent.\n It is a memory constellation\n\n (note: what my EGPS) has in common with that \\^ ex. I might make the decision not to tell someone something based on mu current information, or how I’m feeling currently, or something that happened recently, what it has-in-common is - idk - do this later - I think you can figure this out - I trust that you can. And if you can’t, then Maddie or Evan can.\n\n (answer: the decision is context dependent, and so is the “level” of abstraction (…?))"},
{page:334,type:"abstract",lines:57,date:"Oct 5",text:"OCT 5th\nAlright lovely lady - today is a new journal day and I am the first one to use it. because my name starts with Specia , or Hunter :) Didn’t want to go to sleep, and don’t want to finish sleeping - people that complain their kids wake up too early - did you consider not putting them to bed at 7? Just a thought. That 6/6/8/8 really fucked up my butthole. “What rules was I following in the hotel room with mommy and daddy? “An example of an answer I would accept: the transition between doing “what ever i want,” and “doing whatever i want” to ask mick…(missing) I’m honestly kind of interested in short term memory - perhaps the most mechanical of my ideas. And designing autopros I find fun - like going back through my notebooks without a “printer,” and rewriting ideas that cohere together - putting them in the same space, so I can think about them further - so they can marinate together - sort of like picking out all the items for my (herbs in box) kit and putting them all in the same box - not because it’s the most efficient way to get them packed, but because it creates an in between step, during which I can [come to the rug] with the fact that they’re all together - it’s not jarring. If I did it all at once, there’d be an extra, invisible cognitive load - a little adrenaline that I wouldn’t notice at 5:49 pm. Sort of like all of myself to take longer to make decisions (cause I need to practice) if I’m not gonna use clicky thing or whatever system I decide on today. the idea I had on the 3C off ramp - do i need to get all my brain processes together - wait for them to all agree with each other - and that’s why it takes so long ?) - the idea I had on that lovely loopy middle ramp - recategorize “me not learning to drive” as a responsibility to my fellow humans because (?) cow: the relationship between the car accident, that palm frond hitting my roof (causing destruction) and maddie’s party, j texting me and the shot i took in the car and me not getting enough sleep and that frog guy donnie texting me and mommy really wanting to go on a walk) of having to calibrate all my systems ⇒ potentially slower reaction time. And I don’t trust myself, I can’t.\nTherapy: what rules are you/have you been following unconsciously (?) Can you decide whether you want to keep following them? Also: temporary rule systems: little games we play at one point (pin the tail ex) a, and taking rule sets on and off (catalyst: metaphor? goal?) mind meld - when you’r e with friends, adopting their rule sets that they are following (accidental output: a conglomerate of both systems with some rules from each (but not all - only the one’s you’re/they’re aware of)"},

{page:336,type:"day",lines:166,date:"Oct 7",text:"OCT 7TH\nAlright, well, I finished phase 1 of my figuring out what’s actually in these journals so I can give myself feedback, regroup, maybe figure out which are the most interesting ideas so I can “plan what to work on next,” and maybe even extract some finished work. In the next phase - I think I need to group things and the first step of that is establishing what categories there are. Obviously there are the essays - the really interesting thoughts when I was (?) deep in being alone, and started planning some cognitive mapping stuff - when I started to get really good at memory recall.\nAlso there’s a lot of diagrams and I think i should be aware that some of them are plans for projects often sewing projects - with wood and stuff - or blocks etc. Others idk…it feels daunting to try and photograph each page with diagrams → , then maybe add them to illustrator, ?paste? them into notion. Practical question - how to translate the arrows. I looked up the best program to do this and got distracted on facebook. Considered that my heart/mind is blocked cause I have stuff that got trapped - Sean made me feel bad about the MH - he’s not very empathetic sometimes. Also - it was awkward having sex with him - I didn’t really wanna kiss him, but he did look like a cute brown x black bear with his new haircut. He is really cute. It was just weird to be with J yesterday and him today. He “made me cum really quickly while he was eating me out” and I think part of it was a sort of powerful narrative involving the two boys in such close proximity - haven’t even taken a shower so it’s possible they got some of each other’s spit. Went to Sugar Fish with Sean and then Coral Tree and got carrot cake, and then whole foods and was proud of myself for doing my shopping for the week. Finally bought things like nut butter - he came to drink tea then tried to make me watch gilmore girl highlights. I asked his thoughts when he was 5 cause J told me some of his last night. Sean said he chased his nemesis saying, “I’m going to kill you” through his teeth so yeah he’s always been aggressive and I guess J’s always been evil. When he was telling me what I will learn in therapy it was interesting because it was basically what he learns in therapy. Apparently he has an issue where he avoids thinking certain thoughts and I wonder what they are. I don’t have that problem It feels like a problem I could have but I don’t think I have that specific problem - others for sure - we’re both fucked up but not in the same way. I don’t know if he understands this. Does he have evil thoughts? This afternoon when I was walking from Coral to Whole Foods, I figured out if I had evil thoughts I would just tell myself: oh, probably don’t think that, but it’s just cause we evolved. But then no I’m thinking maybe there are thoughts that are so evil that I wouldn’t be able to stand them, or they would scare me. Does he mean like pedophile thoughts? Maybe everyone has these thoughts? But, I guess if I let them develop - or had them at a young age, before I started controlling (?) my thoughts so much - they’d have time to develop and start at the worst part. When I told him about Jobe, and deciding to believe in god, he said maybe I don’t need to go to therapy for the first time. That was kind of nice actually. I don’t really think I need therapy. I feel like I should go over my conversation with Sean in as much detail but why (?) - we went to Sugarfish. We got a bit drunk - shared a \\4 sake and I couldn’t finish my portion. I feel like we have the emotional closeness that Ms. Zhu was referring to, and I think I have that with some other people - all my exes - ex. Richard…idk I”m as close to Evan as I feel I need to be - same with Maddie. Could be closer to Zach lol but that’s his problem for sure. I’m closer with M & D - at least M, and sometimes D too. I think - J said I don’t know him that well and he thinks he knows me but he projects a lot of things onto me. We don’t have everything in common - more than most, but…I think I know how well I know him. Anyway, he was crying and telling me he wants what I have with my business and friends which idk was surprising to me for some reason. It implies that he respects me and I feel he does not. Still glad that Maddie broke up with me and even that she did it and I didn’t have to. I thought about it every time I saw her or was about to see her, and it made me so anxious, to think about fucking her - I would dread it. A bit of anxiety gone and I did not expect to feel this way - certainly not after Greg - I guess we were already sort of checked out a bit before this - didn’t see each other for a while. Curious but not that curious what she said about me in her diary! Probably - huh. I’m a lil confused. She’s just emotionally intelligent and knew hot to break it off - even had me convinced it was totally her - honestly - she might have wondered why I never texted her first…though I guess: lying - whether directly or through my actions or micro-gestures winds me up - takes me away from myself and then I need to “journal” to say what really happened. Other therapy technique(s) include: thinking of a metaphor-comparison, but a sort of “all around one,” whatever that means to me - try to get at that little niggly thing at the heart of whatever you’re feeling - you can’t say it out loud, you can only curate a comparison - something that thing has in common - only something - very specific. And then - just imagine what’s in the center ellipse, and you’ll feel understood and feel better - the way art works - a tool like the crow in the video - brute force technique just try to get in the bottle, but with this tool - the tool does all the work, and you have you just to sit back and relax. Theory 2: my heart is hard and feels heavy? yeah, well I usually spend the first part of my day going on a long walk in fresh air. Not essential and more time for art n stuff if I got to bed later but maybe that is the answer. Anyway - I feel pretty happy generally and even sometimes choose less happiness to accomplish more.\n\nAlright well - I should probably go to bed, even though I don’t want to - I want to finish the diagram stuff. But I “have work in the morning” and I’ll probably be better at the diagram stuff and be able to think more clearly once I’ve had some sleep - I don’t want to get overwhelmed, and I do want to design a system that is practical.\ngoodnight baby boo - I love you so.\nmorning\nSlept till 1 pm - when I sleep with ear plugs - I stay asleep and usually feel really good when I wake up. And I don’t have that long period where I can’t fall back to sleep. I’m kind of excited for the day and it would be nice to go on an adventure - go to malibu - go past it - to what feels like Carpenteria - maybe stay in a hotel - by myself - start making decisions like buying reeses from a gas station - let my sniffy senses take over. My toilet paper fell in the toilet. Instead of fishing it out - I just left. I could pretend I’m hanging out with Maddie later (I’m not - thank god lol) and try to get all my work done before then - race off to the reel inn - by myself mind you…I could go on a hike. I sort of have some work I need to get done - take pics of all my diagrams. I can picture myself on my adventure, thinking about getting that done - that’s a little motivating. the fat that I’m accepting these ants - ooh, that’s a nuisance, but I don’t do anything about it - just get annoyed over and over - I feel like my mind puts up with a lot of obstacles - I’ll just step around this thought - like the thoughts I have when I’m in my garage working - sometimes I don’t want to put a certain sticker - I want to get all the things from the cabinet, and put the stickers on all at once."},
{page:337,type:"abstract",lines:93,date:"Oct 9",text:"OCT 9TH\n ex. the lentil rounds are an abstracted version of an ambiguous event because they don’t work\n - - - - - - - - - -\n the way string cheese breaks - indistinct - taking out a tic tac from the pouch, and putting it right back in (the box)\n …?simplified? version of the Metaphor Machine: matchbox instead of the conveyor belt (a wooden lighthouse on top -\n - - - - - - - - - -\n fill in your (mental blindspots) with globs of shopping cart clay - all gross - putty - things that don’t make sense - paradoxes - oh that’s weird - that doesn’t make sense\n ex. the thing described on the other page\n as if there were a spinner…(another example of someone messing up an idea because they don’t understand it)\n\n took a nap. Anyway - the idea I had this morning or last night - I actually can’t remember - rather than using\n\n 1. Automatic Process - begets things like\n - pea rounds - etc. letters\n And though a human can do it, or a machine, the mindset for [making the thing] is “automatic” - eg. there is a step by step procedure, and some of the things can go wrong, but the procedure just needs to be followed, and it spits out same-like objects that are all made by the same process, even if they have defects, or one defect! the same process, that gets repeated because the same procedure just keeps getting followed, even if it is flawed. (This is like a game of telephone, where after it gets messed up, there is no going backwards, only forwards, because the process has no ability to fix itself (or even see the output)\n It’s also like abstraction just in the sense that the thing gets copied, mistakes are reinforced, there can be multiples, and they are made by doing a scientific process (the process of abstraction) over and over again.\n Note: assemblation\n ok: 2: the second idea is about the complementary intentional or “artificial” process\n\n and this idea is related to the string cheese thing, which is a metaphor for it not being evenly broken off\n → ex. in and out of the bag (pattern collector), also: I related to: the elephant puzzle - so: setting something up (for people to solve later) - setting something up for yourself - set up a pattern to be collected - don’t put it away properly, so it comes back up in your thoughts - make a mistake on purpose, which is an example of something that could fill one of the missing blindspots in your mind - intentional accident, - find a way to (make someone) experience it: or think of a metaphor for the way that it feels - metaphor priming\n\n the abstraction idea (just - reoccurring ideas) - things can’t be read once you’ve moved up one level of abstraction, and also, just that you can keep abstracting things further (ex. i know i need to look something up in a second, but i’m letting it disappear from memory with just a small drawer pull/string to pull it out (and this of course relates to all the drawer pull ideas - the how to tutorial, and examples of drawer pulls that you could do, and memories you could think of (have chatgpt think of core memories for me? (that’s a crazy idea, but makes sense, cause it dismisses assumptions, which is also what the 4th quarter idea is about - you wouldn’t think of the 4th quarter, but you do because the other ones exist, which reminds me of the other structures - how the set theory turns, (now) into the triangle/pyramid, (and is also another example of “the invisible magic trick” thing, where you’re making a small leap with your mind (tiktok), but it’s not called attention to (presumed: normally all mental movements are at least acknowledged (using the fourth quarter idea, if I added an “opposite” space for this, I could think of: times when the mind is only doing one thing, but there is a big hullabaloo (honestly, all of schooling) (i told mommy that i didn’t know why i considered myself smart at bubbe’s house cause yeah, idk if my grades were that good, but somehow i still considered myself const PX_PER_LINE=2.6, MIN_H=16;
const strip=document.getElementById('strip'),gutter=document.getElementById('gutter'),
      reader=document.getElementById('reader'),legendEl=document.getElementById('legend');
let activeColor=null;

ORDER.forEach(type=>{
  const k=document.createElement('span');k.className='key';k.dataset.type=type;
  k.innerHTML=`<span class="swatch" style="background:var(--${type})"></span>${LABELS[type]}`;
  k.onclick=()=>toggleColor(type);legendEl.appendChild(k);
});
const resetK=document.createElement('span');resetK.className='key reset';resetK.textContent='show all';
resetK.onclick=()=>{activeColor=null;render();reader.innerHTML=hint();};legendEl.appendChild(resetK);

function hint(){return '<p class="hint">Tap a block to read its whole color segment. Tap a color above to read only that kind.</p>';}

let y=0,lastPage=null;const segEls=[];
sections.forEach((s,i)=>{
  if(s.page!==lastPage){
    const lbl=document.createElement('div');lbl.className='pagenum';lbl.style.top=y+'px';lbl.textContent='p'+s.page;
    gutter.appendChild(lbl);lastPage=s.page;
  }
  const h=Math.max(s.lines*PX_PER_LINE,MIN_H);
  const div=document.createElement('div');
  const firstOfPage=(i===0||sections[i-1].page!==s.page);
  div.className='seg'+(firstOfPage?' page-edge':'');
  div.style.height=h+'px';div.style.background=`var(--${s.type})`;
  div.title=`p${s.page} — ${LABELS[s.type]}`;
  div.onclick=()=>openOne(i);
  strip.appendChild(div);segEls.push(div);y+=h;
});

function toggleColor(type){
  activeColor=(activeColor===type)?null:type;render();
  if(activeColor)readColor(activeColor);else reader.innerHTML=hint();
}
function render(){
  [...legendEl.querySelectorAll('.key')].forEach(k=>{
    if(!k.dataset.type)return;
    k.classList.toggle('active',k.dataset.type===activeColor);
    k.classList.toggle('dim',activeColor&&k.dataset.type!==activeColor);
  });
  segEls.forEach((el,i)=>{el.classList.toggle('hidden',activeColor&&sections[i].type!==activeColor);el.classList.remove('sel');});
}
function entryHTML(s){
  const dot=`<span class="dot" style="background:var(--${s.type})"></span>`;
  const paras=s.text.split('\n').filter(t=>t.trim());
  const body=paras.map(t=>`<p${s.draw?' class="nodraw"':''}>${t}</p>`).join('');
  return `<div class="entry"><p class="meta">${dot} ${s.date?s.date+" · ":""}page ${s.page} · ${LABELS[s.type]}</p>${body}</div>`;
}
function runBounds(i){
  let a=i,b=i;const t=sections[i].type;
  while(a>0 && sections[a-1].type===t) a--;
  while(b<sections.length-1 && sections[b+1].type===t) b++;
  return [a,b];
}
function openOne(i){
  const [a,b]=runBounds(i);
  segEls.forEach((el,j)=>el.classList.toggle('sel', j>=a && j<=b));
  reader.innerHTML=sections.slice(a,b+1).map(entryHTML).join('');
  reader.scrollTop=0;
}
function readColor(type){reader.innerHTML=sections.filter(s=>s.type===type).map(entryHTML).join('');reader.scrollTop=0;}
</script>

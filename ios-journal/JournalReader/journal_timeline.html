{page:303,type:"abstract",lines:23,date:"Sep 30",text:"SEPTEMBER 30TH\n The way that women/non-binary people sort of parent each other - like Sonia (mustache), asking me how I wanted to feel about maddie (“wait, so what Do you need therapy for”), and Maddie…silver lining…cloud\n Oh yeah - I thought of this when evan telling me about guilt and it kicked in - i need to ask him questions till i can say: “see! you do not need to feel guilty for this. J saying “be nice to J” which is weird cause why wouldn’t he know to do that if he’s so smart hmm… (nerd) (mexican)\n - - - - - - - - - - - - -\n The to-do list thing is related to catharsis and how I need g to kiss my forehead when he leaves - a useful bow (paradox like jumbo shrimp - it’s not) …! ← metaphor sums it up. Ritual. And this is how to get rid of all the bad thoughts - “make it clear that they’re coming from your mind, and not ‘real’ “\n - - - - - - - - - - - - -\n no, “archive it” - put my diagrams on “little slide projectors,” and, so you can: hold them up to the light” “imagine them” -\n (coffee stirrers, and they all go in the 2x2x1” box (aw :) nice :)"},
{page:304,type:"ideas",lines:19,date:"Sep 30",text:"it feels like october\n “oh! here’s a stupid idea that i had once (not the “just-the-crust” bread) tea bag where the bag is made of wood and the label is made of paper no, opposite)\n pic - the tea is labeling the tea\n a date book - lil black book with houses on the cover/front, and inside are just little maps - like, pictures that you (i) draw that portray how you would get to their house if you wanted to. One interesting thing is that the maps are different scales depending on how far they live from you cause the notecard size doesn’t change. Here’s a thought for ya: (tin can telephone) (wood - the new things that i got)\n if i attach the wooden pieces to each other, …then it makes it clear it’s a conceptual idea - it belongs in the mind, and it’s not supposed to be representation. It’s so intentional that it doesn’t leave it open to the possibility that maybe this is by accident, or means something else"},
{page:305,type:"abstract",lines:42,date:"Sep 30",text:"sept 30 though now its oct 1 maybe\n (two pics - posters: mechanisms of the mind, metaphors of the mind)\n …”the metaphor machine is a metaphor for automatic processes because in each step of the way, something else is done to the thing (a thing) that’s going through it - brushing your teeth - once you start, you just keep going - each step takes you past the next one and you never get to think, in the middle for example - oh wait - is this what i want done? …i can imagine ex, the paint brushes - little lines - …and the measuring spoons etc. being made in [the metaphor machine] , or at least something that looks like it (and works the same way). ex. the toothpick goes down the line, gets tape added, and then the - “line” - (string) the string. the scrabble tile gets - painted white with the line brush, then stamped with whatever letters were left from a newspaper. Then. These all get gathered in a pile and dropped/dumped into a very almost square  box with other things - and a small version of the line brush (...can’t read the last part)\n anyway - one set is made as the outputs of all the (?automatic?) processes, and another is like - all the things that make a concept idk\n i had the idea before of having everything abstract in a room, the paintbrushes and m cups but and i could add a/the vacuum - a long pole - possibly silver, with a flat black tump at the bottom, and floop on the side - the back of the pole. the plates, or course would be nice - just white circles, also probably made of clay, and painted white. stacked up in the cabinet, but not quite on top of each other - perhaps they would still have the ring on the bottom, but not the top. (or a string between them if i couldn’t manage that) ◬ I would kind of like to bring these plates out at a dinner party and have people get mad at me for it - they would not but I wish they would - they’d fight me….that would be nice…of all things. Alright, let’s go to bed and think about the floof and the tump (and how…)"},
{page:306,type:"day",lines:100,date:"Sep 30",text:"Went to Niha’s house last night for a pool party. Drank wine by the pool. It was real nice. Talked to Niha for a good bit. Her boobs were lookin’ MIGHTY fine in her red bra. Kinda glad I got that out of the way when I 1st met her, or I’d be thinking about…\n (Sean wrote this 🙄) “At the party we played a game in the pool\n Sean came over for a bit and really disrupted my journaling. i gave him a bow that he’s gonna keep on his bedside table. The game we played started as hold your breath under the water but we got distracted and only Whittley went down and then we all rushed to her and said to come back up, and then Niha dunked Zach’s head under the water and we all went to him to make sure he was fine and then I think I or Marcus went down and everyone came to the rescue and that was then the game we played. Emergent rules. Evolution. Metaphor for the situation. And then we held Niha as we spun her around (me and Whittley), just round and round while Zach and Marcus were talking in the hot tub about who knows what. I called Sean on the phone, I guess I was feeling maybe a little bit lonely or maybe I got too drunk - Geordan brough a vodka bottle and I drank straight vodka idk how much - too much. I guess I was asleep on the couch and Zach tried to wake me up for some of the mac n cheese that Niha made but I wouldn’t budge\n\n Niha said she prayed and prayed for a guy to like her for months and one day he called out of the blue and they went on a trip and he sexually assaulted her and she had a gash that didn’t heal for months so she doesn’t recommend manifesting stuff on purpose. She said that she thinks I’m a powerful manifestor. Her dad was a brahmin. I guess I told her I felt like I should be manifesting things on purpose instead of by accident but I never know what to manifest. I guess we were talking about thinking about a friend and they call. anyway - it reminds me of the harry potter adage about things happening when you’re sad or angry or whatever - did JK Rowling know something? There were so many things in her books that have real world applications like changing fear into something silly which is sort of like creed’s voice, and then instead using Pams - I’ve never done it on purpose. but purposely “recategorizing” ex. say something mean to yourself in a mocking tone oh I have done this - i do it everyday - I use it to categorize stuff and keep my brain healthy. Another thing I do - rather than having a feeling, I just look at it, “as a sculpture,” and then I can see the feeling but without having to experience it - I can inspect it - acknowledge it etc. +\\> “5 INSANELY complicated ways to keep your brain healthy,” and it would include about taking out old memories, and using a whole glob or gloop of memories - like blob tag (!) to infect the “new” one. Question: Do specific memories have - or could they have - like…actual, very specific “sculptural metaphors” that could be put in the basket and then the drawer, so you could see all your memories - trying to pull this long strand\n\n of thought out of my head - idk - there seems like there would be some benefit to this crazy procedure but I’m not sure if it’s interesting, or just therapeutic. Perhaps I could pull the pieces out by looking at it as a metaphor. The dull end to the thought I was having yesterday was that (if) you could find a metaphor for every brains structure, and then you would feel like all the pieces of my mind were there, and you wouldn’t have to worry about any of the g said that was good cause it didn’t make sense to him (“no! that’s good”) and didn’t try to understand it (not sure if I mean metaphor or “mechanically-accurate” representation of how the process works. Not sure if it’s brain structures either. Thinking today in the restroom at Niha’s that writing my thoughts down is sort of like a dream come true - an answer to a problem I didn’t know I had - I am sad to see all my thoughts go - an inevitability though, like death. I am getting closer and closer to knowing I have all my thoughts, I can keep them. Thinking while laying in bed with sean thinking why I couldn’t just be done journaling - it’s like i’m cleaning my mind.\n Anyway - the pattern collector - the mechanical process…what I mean is: this is how it works - you can’t see what the pattern is until unless you open the drawer, and you can’t open the drawer if you have tiny little nubs for nails, no but unless you have a new incident, and then the drawer will open (star) \\< the lock on the drawer (inverted star) \\<- the incident (...no the opposite). and the metaphor machine works as a metaphor for automatic process and a mechanically accurate of how meaning gets - works…in the mind."},
{page:307,type:"ideas",lines:68,date:"Oct 1",text:"OCT 1ST\nOk, here’s one:\n“what’s the difference between a tooth comb that’s made out of “E” “, and a box of stump wooden cigarettes, where each one is painted with a different ratio of white to brownish?\npieces of things. complete the set: a window with a hand, a “hood baby,” cyclops glasses\nHere’s another, or is this the same one? Cards with fingers on them (there are 10).\nI don’t know what all the things I bought at Daiso are for, for example, the little glass jars … - I don’t know what they’re for. But when i was there, I just had a sense that I should get them\nAnother one (and then two more): we can play “what’s the procedure” - a very fun game. People will learn to play :) perhaps they can make their own thing with scissors, paper, tape, staples, string, glue stick - 3 tools, 3 supplies (yes, no)\nand the next to last: after I explain about “automatic processes,” and then you can design one that you can mess up, that you, will have to mess up\n(pic) the finger trick\nthe star of paradox - learn it, and then: design things like the voodoo doll - design something with 1,2,3 etc. axes on\n\nthe star of paradox…”it’s both a cigarette…and a pill box.\nHere: can you combine a pill bottle and matches (think of at least three different ways) how about a tea bag and pill\n(ok there’s a nice big diagram here - first of the answer to the above Q), and then some examples of what to put (somewhere - i’m not really sure - they’re all very small - one is an abbreviated version of the emergency ring (remember it’s meant to be a square). Another is a scrabble tile with two small pieces of velcro on it - the pinched sickly way they look when attached to tic tacs. another is a smaller version of the paint brush when it was hung. And the last is the smallest version of the pyramid wire w/ a side of muslin. (that’s nice).\nI also made: a matchbook (out of fabric), with small little tumps - matches made of metal, but tump is the way they ended off\ng cut my nails with a  weird pair of scissors - bent forward, “I don’t know why he wanted to do it” pros: maddie will be happy and i can type better on the computer. cons: everything else - constant slight distress. i feel like a cat, now more than ever. I could hang on my wall: ” 9 reasons i’m like a cat,” and they would be: i like to move around to be inside where the sun is 2.  i don’t like to take showers 3. i don’t want to get my nails cut. mommy said: oh, he cut your nails? Don’t! Let him cut your eyelashes - haha I don’t know why I thought this was so funny - picturing my lashes with just half of lashes left, each one cut just a little bit, and trying to picture why he would want to do that. Went to the farmer’s market with mommy on sunday and we had a grand old time playing in the half built house, playing phd again, our favorite game :) I don’t understand why she couldn’t understand how to engineer the heart with less rings. we got gas together and someone washed my front window (and back) and I said:\nis this your favorite window you’ve washed today?” and he said: “by far” so that was perfect - as perfect as that song by el buho, and saying el buho over and over again instead of answering what makes it spanish"},
{page:308,type:"day",lines:47,date:"Oct 1",text:"october 1st\n we sat in the grass at the farmer’s market and we ate the pupusas she got for me before I got there - (stuff about my day)…(type later? idk?) (now: - 4 bean, 2 cheese, 2 loroco which is a flower apparently and the most authentic. Mommy is one of the best - perhaps my favorite. We talked about whether generations are different or something. Getting over being drunk was all day my body had little tiny things that were wrong with it and I had to fix them, or else I would feel anxious to make matters better, I was writing in my journal, and trying to pick out these little tiny individual discrete that were in there and if I couldn’t get one, I would feel anxious too. Things like feeling cold, being hungry, thirsty…I have a weird bruise on my arm that i think I got from one of the guys man handling me at the very beginning of the party last night and I keep feeling it on my arm: “oh my gosh, a bruise…i wonder how it got there. Oh my gosh! How it got there…gosh…got…” I think it might have been geordan cause otherwise i don’t know who to be mad at. I told it to Niha this morning and she said oh! it’s cause we were all spinning each other around in the pool which made me mad cause she was wrong. She told me she was mad at me for hooking up with Whittley - because it would ruin the friend group “just so I don’t hear it from someone else” and was pissed at Zach for not answering but she probably should’ve gotten the hint and just wanted to hang out with Whittley and I guess they fucked in the car. Apparently Whittley told Niha that she could have Zach if she wanted him too…hmm. I got so many things from aliexpress and told myself I could open them as long as I didn’t feel like I had to make something out of them. So I got them and there were all these little envelopes inside two bigger envelopes and each thing was nice and pretty much exactly what I wanted. I want to go through the things from Daiso too. I’ve never been so liberal about buying stuff at a store and I don’t regret it now that I’m not drunk.\n I have this long thought that I can’t remember. It came in two parts and I think it had something to do with math and abstraction, and using metaphors to figure stuff"},
{page:309,type:"ideas",lines:42,date:"Oct 1",text:"out in my head. The 1st part looks like a white gossamer table cloth, spread over a bunch of stuff. Big versions of a flumpy black velvet package with thin pink string, flumping it together, and definitely the pea round - a fruit/shoes version of it. The second part was much whispier outlined in a black velvet string that would turn into purple and red, and dismantle the bundles, a little bit like the black package. it was about as difficult as algebra, and also kind of looked like the word algebra - the light blue of the “l”, especially in the middle. Oh, here’s one more idea I forgot about:\n\n (pic)\n\n for example the map cards, maybe even the nail cards, and the door cards or whatever they were\n pea rounds, or automatic process outputs (and you use them to build something, like kapla)\n\n anyway, then you could flip the pages, and see if any or all of them are a set, or some of them. oh, and there could also need to be a machine - you didn’t think of that, did you? Ok and also maybe a booklet (+ cards? too much?)\n - slept the perfect amount - just 1-2 hours from like 6am to 8 am. Serafin and I have something in common today: we are both working on his house. He is building himself a little house in the backyard so he can come and live with us because he was lonely at home. When you don’t remember going to bed, then you slept extra, and you may not need to sleep for 2 or 3 days after that. I thought I was just being mean by not texting Maddie back but it was because I was dreading making plans and didn’t want to put that in my calendar until the last minute. I told Sean that we were wasting time not talking about J’s cousin James, and reasons why he doesn’t like him. ◬ I read through my diary and it was all pretty good and exactly as I had hoped but the thing is it’s pretty much a waste of time and i should just be writing about J’s cousin James and why he doesn’t and also now I don’t, like him. (He was in the kitchen too much.)"},
{page:310,type:"day",lines:43,date:"Oct 1",text:"OCT 1ST (DAY THO)\n I’m a little ashamed that I managed to forget everything I was thinking this morning, and I even repeated it to myself a number of times before getting out of bed, thinking that I would remember. One thing I know is I said “I’m not gonna explain this to myself - about the sun coming in through the curtain - a little peak - a △, but it was very bright, which implies that normally I would try to “explain it away to myself,” and that looked like a little pocket on ? a scrabble tile with flower fabric and black lines for the dingits. I don’t know if it could open, but at least it would look like it would. So something very sweet and tiny to get right underneath my “male gaze” for the day ¿to help me learn to be by myself? (those paint brushes are so good at picking up the pieces of my mind at helping me to do that!…anyway - a set of envelopes explaining things to me. I had 2 dreams last night i was in a hall with a lot of naked people - women. They were all nice looking, and everyone was just sort of walking around and i thought, oh, alright, I guess this isn’t so bad - it definitely had the possibility of [being bad], and then there was this one black woman who kept running at people and just sort of like revving up, and then sort of “getting” them - not actually touching them mind you - going forward towards them i knew how to not get got - avoid eye contact - but then i got got - she shocked me - i was ashamed. Then, in a classroom, this much bigger - taller, not just fatter, also black woman - to fix the problem - sat on her - she had a chair that was facing, in the doorway of the classroom. I was sort of weirded out, or mildly horrified and then i thought of maybe it’s sexual and then it was and i got a lil’ oozie in my lil’ undies, like molten lava in a lava lamp woke up sort of, sun was shining. Oh, here’s another thing i just remembered - it was a yellow splooch of paint swatch - trying to connect to some white lacey and a wooden frame above it, and also (not connected) - wooden frames"},
{page:311,type:"ideas",lines:47,date:"Oct 1",text:"black velvet, something white - pearls, a color cotton and the words here: (frantic nettering) - a picture of the word “lack” (and then it was the would be sculptures” and there’s all these disclaimers, and none of them even [made sense]!! “idk the actual words, but about explaining things to j - about thinking of finding ways to explain things to j. (implication being that i should stop) anyway, then there were about nine tiles, one was the sweet tiny pouch, another had black velvet, and maybe dingits in slight lace but the point, is they could all be there to [make the set] [to tell me the story] [to explain it to myself (like I’m 5)], and it was a revelation just because they were so small and could not be made much of a fuss about - it seemed easier - which meant I could finish faster, which meant i could finish at all. Tryna do the clips for the underwear rack - maybe a hidden clothespin, widened by 2 scrabble tiles. And the “underwear” could get bunched by the clothespin, instead of sewing - just sew a hem - they can all be squares and turn into other shapes) or maybe red seems a bit dramatic (interlude to read a different journal for a second) ok now it’s actually coming back to me, anyway - I was designing an assembly line - 3 parts - like that wooden table I have - half size or a third - the thin wood - and they can be moved away from each other, but not too much. I suppose at the beginning (table 1) could be - the pocket- to collect the idea maybe - I’m not sure why. Then the hinge machine I designed yesterday - do this, do this, and do this (last one bigger)…and finally it gets wrapped up in brown paper - cinched by black yarn, and then tied nice by a black satin bow that is (a bit too big) so it can get hanged up and ready to be “read” by the mind for later - imprisoned in memory - sort of what i was trying to do with my thoughts this morning but it worked when it got jostled.\n worked on the pattern collector - to make it more mechanically accurate - the things collected in it COULD BE handles but I couldn’t think of a way to make it sing to me (to myself) so I stubbornly forgot the idea, but kept trying because it was kind of fun to do so.\n\n OCT 1ST"},
{page:312,type:"day",lines:49,date:"Oct 1",text:"had to go visit Pilar’s place with mommy because someone told me they got bugs in their chamomile. Drive was long and nice. We got terrible food at this weird half arcade place that reminded me how much we like Santa Monica. then we looked at all the stuff to see if there were bugs in it. had a long conversation with mommy about IQ and other stuff. I need to remind myself to listen to her a lot she is so nice she will just listen and never talk about herself. She said she can tell when someone’s not smart when you try to explain something to them, and they don’t get it and that the people in El Salvador could only weave one thing, could only apply the weaving concept to one thing. She said sometimes she is learning something and then she just “gets” the concept and I said is there a way to economize the concept - to teach the concept in the most efficient way possible and she said like, not include the example, the step by step, and I said yeah and she didn’t know how to think about that - or want to . I had the thought - well - i was explaining to her in the car, about journaling and my theory that it could make me less anxious, and she was so surprised to learn that I thought that not remembering things was making me anxious. I said that (and idk if this is true) I have like 4 slots in my short term memory, and I’m often occupying at least 3 of the spots with some random weird little tid bit that I’m trying to remember. And then I use my clicky system if all of them are used up (and once I “finish” writing in my diary, then I can have all my short term memory back :) Like, I might need to write the thing about Creed, and Richard ‘that’s right….” and Siddhartha getting just sort of louder with his hands when he wanted to explain something to you but you didn’t understand - found myself doing that when I was talking to mommy and she was not understanding what I was saying ⇐ BTW, there’s an example of why you need to get my games so you can play them - then, you only need to plug something in to get an art piece - oh, that’s nice :) … you could fix your whole brain like that - plugging the right things in (pic) (detachable) to the right systems (outputs like that synthesizer The paint brushes are as if you made them to say only one specific thing"},
{page:313,type:"ideas",lines:19,date:"Oct 1",text:"And if you plugged a series of the right things in, you could go to the magician’s nephews other pools or expand your mind, get to the next level\n Anyway - my stupid idea was that some thoughts are kinda big, and it would be kinda nice to have someone else who could help you with them - perhaps lend you a cup of their short term memory. I think that would be nice.\n I suppose all the automatic processes in the bakery case at Primo Passo, (which is what I’ve been thinking about, on wax paper, trying really hard to stay all together is a a metaphor for those automatic processes that come out of our mind like the creed thing, but also like other things\n excited to replace all my plates with flat plates and no one will have any walls, and just in general optimize, but the opposite - my vacuum cleaner won’t work for example - it’ll just be a long metal pole with a tump at the end\n\n (pic)"},
{page:314,type:"ideas",lines:67,date:"Oct 2",text:"OCT 2ND\n ok, there are some\n □ - artificial process\n - spider as a pet - not even a tarantula - implications?\n - fork —→ knife holding hands…it’s like this\n (this is mold theory)\n\n i was crossing the street after Peets and there was an older woman, very thin, one of those stupid puffy coats that I don’t like, and skin tight leggings that showed she had knobby knees. blonde hair. I saw that she was dropping things in the street and thought - something - and I thought it would be “ok, I should help her,” but then I realized it was: “I’m glad she’s struggling.” She dropped like a scarf or something, and then, as she tried to pick it up, her drink started to spill. I don’t know if she noticed. She was also holding a brown paper bag, and then her little backpack purse fell too (and keep in mind she was in the middle of the street. She could’ve died if a car had come right then - though the crosswalk - even though the walk sign was on - but for how long? ) I walked past her, looking back, as she tried to pick up her stupid tiny little backpack and her green drink spilled at an almost impressive angle - some sort of grainy, flaky substance, maybe health nuts. And then when I was done crossing the street, I stopped watching.\n\n travel - magic carpet rug\n\n examples of maps\n h - date book with the maps - trying to get to other people’s houses\n h - labyrinths - ?board? game trying to get lost (richard)\n\n h - see - this is how you find something with your mind - examples! :) )\n …the conceptual version of the memory constellation (has pink fabric behind it, and a small (thin? no. but small( wooden frame - tantamount to a number of the wooden frames that I had\n\n design some cards that I can help myself remember things - like XI, but for metaphors - not the (pic: flip book), but, instead ~ piles of hoonies, and you pick them from your periphery. I would want (pic) black velvet racks, “something white, and tiny, with lines in it - I don’t know - a wooden fat thing with too big a wooden shelf in the middle\n black velvet, hanging out from the wall\n\n even though they have nothing to do with the actual thing, it just gets your mind trained on maps (I think)…, and while you’re thinking about maps, the rest of your mind - the middle - can be thinking about [the thing you’re/were trying to remember - the thing to do with maps]\n\n You may want to make an automatic process artificial intentional, minus the connotations - just in the literal (mechanical) sense\n\n (pic) the kind that has a 2nd lil’ shelf and lots of lil compartments - one for each place in the mind (.)\n organizing them into a - oh, everything fits just right…is this related to - tip of my mind, it’s in the back - spatial…have to\n bakery cabinet at primo passo is nice cause you get to take them all out and look at them\n ↔ what? (are they?) Automatic process?\n\n find where things are…and perhaps you could locate them in your mind - there are spots (…I was going to use the cabinets in my parents kitchen, but now I can just use my mind itself - just take a look, and see where the compartments are (and why certain things gravitate to certain compartments - what kinds of things"},
{page:315,type:"ideas",lines:26,date:"Oct 2",text:"13 miles, 16 mins only! last leg - brute force → equations will help?\n\n invent:\n floss x tape ✓\n language → mommy x daddy ✓ shorthand x\n instead of the pics of boys + maddie on the boyfriend map x map each one (pic) pieces of the mind “oh that’s what I was looking (helping rememebr stuff)\n Pattern collector but high end, at Goodies, laid out, displayed, “oh, these nice rocks” (collect rocks from the beach in malibu - earth tones - sepia, featuring pink sepia -\n matchbox covered in muslin, one stripe of sepia\n machines that can help your mind think better - set theory (pic) ← ooh, that’s nice -\n …a box to organize things spatially, so you don’t forget anything (or so you can remember it if you do forget it)\n\n pill pack ⇒ memory pack → memories of the day\n (pic) because of the metaphor\n\n derivative\n (pic)\n cigarettes - but didn’t understand the ratio is specific (and not decorative or something - broken\n (how do you write a derivative? here it’s: (pic) (→ here we do it like this)\n the derivative is the metaphor? the ghost of the machine, no. in this case, it’s the mechanism actually - it works the same way but it is/not an example…(?)\n\n ok, here’s what else/that i’m trying to forget -"},
{page:316,type:"abstract",lines:24,date:"Oct 2",text:"that is: not remember - i don’t want to not forget it\n\n ♪ i don’t want to forget, no i don’t want to forget ♪\n\n (pic)\n\n oh! you could draw maps to see where things are in your head - related to [(for example: about my textbook, i just don’t think she’ll get it or want to know\\}\n to maddie - i can tell you (it’s not a secret) ← secret is a specific category (whoa, this was supposed to go here)\n\n ok, well - we already know this, but: instrumentalism is another way you can [control your thoughts] (and this is what we’ve been doing - like now I’ve just remembered\n\n portland diaries x tips of things - that you can (”there’s a lot to unpack here - literally”), and that way you can remember what you were thinking\n\n “i’m having trouble breathing today” ♪ (to the tune of: i don’t care, i don’t really mind/”oh, by the way.” ( ← ex) duh but for those south of nebraska…\n\n Find a place in your mind where you feel free and you feel fine. (lay a standard wide size muslin where you can then put things on - add some metaphor or whatever comes to your mind (when you [don’t think about it (too) much) ⇒ sophiespincher :o"},
{page:317,type:"day",lines:21,date:"Oct 2",text:"here you go - mommy: you couldn’t learn to read me: “I was probably busy thinking of other things!” Duh, well obviously + angry and annoyed)\n reading in my cubby while they were watching dragon tales. I think I didn’t like the kids books cause they were always so fanciful and condescending (?) like: ooh, we have flowers and…I don’t know - I’d rather read babysitters where at least they didn’t lie to me or just wanted to get them done quickly - like the ballet shoes (another example of the memory chain I was looking for) (op, shape card, + kits & sets & wrapping paper \\ things like that - american girl…etc.\n I remember, bring my 3 notebooks (()) → american girl dolls\n ((the price is right)) ⇒\n oh yeah, and another thing I wanted to remember - to tell Ms. Zhu - I need to keep this part of my brain - not dismantle it and put everything back away where it started, because mine has lines (where others do not (Ramachandran) - mine all have maps to where they started - my decision making processes"},
{page:318,type:"ideas",lines:27,date:"Oct 2",text:"Call the book: how to think ex. things that are counter-intuitive, such as “I want to do something (put on my el tunco shirt) but I don’t realize, it’s actually a ritual, and I don’t need to do it to put my shirt on. —need to think about it, and do it inside my mind\n another example is the thing I was thinking about yesterday, and tomorrow…\n 1. recategorizing things, and but 2. thinking abouttrying to figure out…what’s in other people’s minds idk the streetlights thing recategorizing why I want to go on the freeway. telling mommy - you can tell me what you want sympathy for, and you want to be praised for, and i’d be happy\n\n MS = mental state\n black and white photo + light violet…you can just add 2 random things together\n\n “the whole introduction on categorization”\n\n featuring such hits as\n note: you/you can, categorize things differently depending on the mental state you’re in, so it can be like little cards that look like the bae poster and each one has: the category, and what’s in it. For example, in a 1 mS what do you worship? What do you fear? What do you think is the right way to be? What do you think is mildly annoying?\n\n and then: in the advanced class, you get to do intentional recategorization, and: seeing in people’s minds."},
{page:319,type:"abstract",lines:92,date:"Oct 3",text:"OCTOBER THIRD (la la land?)\n Dream recall is nothing now, compared to the waking thoughts that I now compile into little piles, siphon them into wheelbarrows - pile into wheelbarrows, siphon them through a hole in the side into wooden boxes with a predetermined number of compartments. I’m starting to feel like matilda in that i can make things happen with my mind, and the things that i make happen are thoughts. on the drive back to florence’s house, i passed through eagle rock in the sense that everything was warm and light even though it was growing black outside and tiny night things were starting to tell little secrets to me: “it’s not time, it’s not like to do this. I had been collecting my thoughts and trapping them all day, and since there were so many people waiting for Mulholland drive (or so I thought) - pulling backwards and forwards even, cause their breaks didn’t work on such a steep hill. imagined a game where you arrange little tiny (small wooden) houses - on a (card)board, in the shape of your thoughts (ooh - I know where that one is. The board is pink, and the sides are white with blue lines on them. There are maybe some crops of evergreen trees, and other ways to differentiate between where you are, and where you are not.\n\n the other thought that i had that i had permission to get rid of - bad thought about Meredith Blake and then i tried to remind myself that I’d be lindsay lohan in that situation, not shrieking about a lizard on the top of a water bottle. i thought of three points (1. she’s a girl. 2. she has a chest. and 3. she wears a yellow headband in that one scene and I wouldn’t wear one, but i could see someone thinking i could wear one. The thought was about that that was enough to convince me that there was a number and then i accepted it as true, and could move it into my thoughts. refer back to the constellation. I think the weird part is that it’s binary, and not related to what the data actually is.\n ii. alright, i think i’m going to initiate the introduction of the memory recall procedure. oh it’s easy. mancala board to replace the egg carton. hello kitty lunchbox + pastel shirt - each side a different color. inside - everything that’s on these slide projects about my earlier life so I can even teach people about me, just by recalling these memories to them (is this worth it to know(?))…designing little games (!) to go in the box ex. the pennies on the rug - a nice rug intricate black with red and white, pink, fringe, thin - dollhouse material - square for sure. And could go in a bigger version of the black paperboard drawer boxes. The pennies are simply cut out of copper with tin snips and stamped badly is fine. The revelation somehow was that each of the games\n\n is a game i still play, and so specific…like SET THEORY is a wooden version of the color shapes game…obviously the shittiness wasn’t intended when i chose the ballet shoes but it shows a certain way of making decisions - a commitment to the assembly line that trumps all other aspects. Pick Op a Shell - representing a broken game, that becomes a ritual and not a game. And then to fluff it out in the background - an activity that is not an activity - just poring over wrapping paper and kits and sets, (party, AG doll) catalogs - making my own catalogs, but solving for the most beneficial aspects. Then there are some - surrounding it - me being careful and extra careful on that pizza - the thing about salt and pepper shakers and how I don’t care about recess - everything is opposite. I guess i must have been talking to matthew about projects a ot - so much that he actually did them - and then i feel guilty and confused about this. the time that sandy thought i could spend my hard-earned money on something other than tiny little sculptures (implied value), and the special things box that was a thorn in rebecca’s side. the fact that though i was late everyday, i wanted to have free time. writer’s workshop the book fair. kelly paper. oh, and of course - the fruit school. the pencil grip room. the bubble thing i created that linda stepped on but i still wanted to keep. Arranging those wooden pieces in hangout. pattern blocks. Busy busy town - that cartoon game where you find stuff and then use it for something else - the fisher price store. playing school with my dolls"},
{page:320,type:"day",lines:80,date:"Oct 3",text:"OCT 3RD (primo passo)\n inner peace missing, gone. maybe it’ll come back. hopefully soon. Another idea - I don’t know if it really makes sense or is interesting. Also: I enjoyed how much I hated that interaction with steve goldman. People should consider whether i like them at all. he said: he “really liked” the aggressive way i grabbed the knish. it wasn’t a knish. it was kreplach. Maybe if he wasn’t so fucking retarded I would know what he was talking about. Jonathan tried to hug me while I was holding soup. May you always have soup in your hands when people are wanting to hug you. I don’t like my relatives and I was dreading seeing them in the car, hoping I could find mommy before everyone latched onto me like a batch of hyenas cackling - find her so I could hide behind her - metaphorically, but maybe also literally a little bit. Florence yelled at me to go back to my seat but I still looked in the pot and told her i wanted chicken soup with no chicken. Jonathan was explaining about his belt - “see, this belt is adjustable,” no, all belts are adjustable. that’s one of the main features that I know about belts. Whoever invented them being adjustable is turning in their grave. And your weight loss is not proportional - directly, inversely, or otherwise - to how adjustable a belt has to be. J has given me permission, unknowingly, to hate people more effectively, more efficiently, with more gusto, with more fervor, and with more joy. (or just given me another reason to hate people - for being stupid - for them not knowing things)\n Mary Jo asked me what was new and i said “nothing,” and asked her, and she said “nothing” and then we both said “that’s it.” oh well, I guess we don’t have to have a conversation and then we both died laughing but I turned away from her and didn’t talk to her for the rest of the party until the very end when I showed her my artwork and we had similar opinions on it and she showed me some posters she’d made for a presidential candidate - 40 all the same. but not copied! That’s crazy. So crazy it’s almost\n\n kind of cool. I want to do something like that - copy a bunch of things for no reason - that’s the kind of thing I’d like to do.\n Just to clarify, because it wasn’t obvious to evan who I am texting: I enjoy hating my relatives. it is a pastime of mine. A hobby even. Yesterday, after mommy destroyed my mental health, she told me about all the sexual things she did with her neighbors - they played a game where they ate gross food and got naked. Feel like we never played that. The good old days. Crazy breeze blowing in from the ocean - adding mist everywhere. Spitting in the face of my not bringing a sweatshirt. This is why 7th st is so much more expensive than 17th. Anyway: the one idea I wanted to relive - making a machine - and it would have a crank, and “receipt paper” - (fabric, sewed, on a spool of wood) and the point would be to project my ideas, even the diagram i drew, like heads in a pill bottle - so I can imagine just take them out and play with them [with my mind]) two glued wooden frames - hinge and latch across. nicely cut sticks to corner the frame - TBF (?) in the frame. Plastic paper on the other side of each frame, so it makes a little enclosure where the diagram can go. And it can be latched shut - and it will tighten around the diagram which will be paper or fabric (torn not sewn) - I also had the “memories that make me me” in there at one point - at the beginning I think. If I could somehow make grooves in the small slide top, and store them in there - it would give me some peace of mind - I would know they’re in there and wouldn’t forget myself - might even take a bus and drop it off on a street corner in the middle of the city - next to some trees probably - a bus stop"},
{page:321,type:"ideas",lines:63,date:"Oct 3",text:"somewhere i could go back, if i thought about a map in my head, which i normally avoid doing (for magnanimous reasons). And I could do another of things i feel guilty about\n Another idea, i guess: i should go back and actually figure out what i was trying to say yesterday - a lot of my ideas are fragments - designed to be picked up by my mind in a certain place. And I don’t have very much time to do this. Oh no, but now I have to go home and actually get some work done. It’s 4:50.\n 6:14pm\n did about 3 mins of work - it will take longer to soft boil these eggs (i ordered tsujita :)) anywho. I have 6 minutes to tell you everything.\n (on like 16th and marguerita) i thought set theory was one thing - the cigarette lace - how to find out. “feels like” referring back to the model - so basically just - remembering to look at the abstract concept, consult the map, but with the devotion they instill of referencing the model.\n Each of the memories have something in common with the whole thing, and something different in common with something else.\n\n Here’s a good game to play if you don’t want a good game to play: receipts - I like the look of them (they are pretty)\n the game: perhaps 3 things. guess what they are going to be used for together. This will get you into the additive state of mind which is an artificial process. use ai to generate the receipts.\n\n (pic)\n\n ok. the next thing is to put perhaps 2 posters on my wall in the place where I need to go to sleep and the posters will be about ambiguous events - actions that have two possible interpretations, and the weird thing referred to like someone saying: “oh - that’s weird - are they saying that it could or it’s supposed to be intentional…(?)\n ok - is this the other thing I wanted to write down? About how Mary Jo - when I was trying to convince her to do art again - and I was thinking that she could design an automatic process for herself - a game (she said no) and then the absolute absurdity of having an automatic process for something that you’ve never even prototyped before (and have no idea if it will sell, or what you will do with it) - going through the motions of abstracting (it only has one thing in common with abstracting) - realizing…oh, these are just lines - the sort of humdinger I designed with the hinges 2 days ago I think and then making a lot all at once - the delicious insanity :)\n Laying out a [towel] in your mind so that you can then do something on it - think clearly :) - if just for a moment - the [towel] - tissue i laid out on the brick so we could play Pick Op a Shell. the alter cloth. And all this leads to the sort of abstract version of one of these things, that could be, maybe - just a white cloth. last night i imagined, instead of them (even) hanging on the clothesline, they could just have those new pinchers from muji, and be in a pile still scrunched “nicely” - and they would’t work - nothing could be laid upon them - so this would be a “true abstraction”"},
{page:322,type:"day",lines:36,date:"Oct 3",text:"the dregs (i guess)\n the third unnecessarily complicated paper contraption after that color-coded notebook and reusable worksheets…not done developing but - a system for writing sentence fragments - the basics - multiple/various boxes, a symbol in the corner, and the symbol corresponds to an extended space to continue the thought once the memory recall procedure is…[over]\n yesterday, ~16th + marguerita - this isn’t really a thought i should be writing down, instead let it “sink” in, but, since we have some extra time - just the idea - autism - thinking about something until just before it’s over, and you understand it - stopping a painting before you know what you were painting or why you were painting…otherwise, you will categorize it too much. it will go up on a shelf in a jar and you won’t be able to reach it. instead - setting things up in your mind so you can think about them later.\n Had a lovely time eating my Tsujita - it was delicious - I also had la la dream toast - 2 favorite meals today, and no snacks except 2 bites of a maple glazed doughnut + a cute lil pack of trail mix which brings me to the next thing i wanted to write down - my algebra homework, at least in terms of difficulty (wait, dammit, it actually is algebra) a simply worksheet - just a bunch of venn diagrams, laid out innocuously (())x4 (5-6 down) and the assignment is to just fill them up, so that when you’re out and about throughout the day, you may start to think of things like this - “oh - that reminds me of that because…” - me ordering from Tsujita after evan invited me to go and then calling him on the phone is like J going home to change and get his grover sleeps over bag the 1st time we had sex…haha"},
{page:323,type:"abstract",lines:40,date:"Oct 3",text:"why is it like that? you could get a partner to fill this part out, or wait sometime so it feels like solving an algebra problem\n The thing I’m “not” going to write down is the cute lil’ neighborhood of three houses i could make for an advent calendar even though I designed it using the [plywood] i got from the 99 cents store in my wood drawer and know aht pieces i need (pic) - for the sides and roof). and i know what colors it could be painted (earth tone versions of pink probably and also how the doors and windows work (they could be slightly off - square (taller than wider) wood pieces cut from and hinged added to the back - a shelf or a box behind to hold the thing - in this case - a pair of ladies underwear and bra (lace, in the shape of a triangle) and a lil’ bag to go with it. a kraft paper bag - paint brushes - leaning - falling out (pic) things you hide from your husband and then he asks you if these shoes are new and you say: “no, I’ve had them for months (they were in the back of the closet) mommy told orrie this\n The Second Poster: referring back to your mind - these are the two things I’m always forgetting for some reason, perhaps because they are too magical to integrate, and whenever i “go back to normal,” they unintegrate, like the “higher intelligence than most people” that I try not to internalize (remember the 4 quarters and one is only there like a friend of a friend who sits in the corner drinking ice water and thinks “oh wow, this is a pretty nice house…I’m not really sure how I got here, but it’s nice of them to let me in) like me not telling him that i knew i’d already asked if he wrote in a diary - this is a certain strange and unique scenario - an edge case, technically (eye roll) - where you take the side of your opponent, like breaking up with someone you like because you like them too much (”i love you i love you and goodbye”\n\n OCT 3RD"},
{page:324,type:"ideas",lines:79,date:"Oct 3",text:"Bad ideas - a solution for the disorder “generative mind” - can’t stop thinking of ideas? try thinking of BAD ideas - stale, rotten, moldy. Then you can cross em’ off your to do list before you even put them on. ex, i got excited about designing a way to connect my old thoughts to my new extensions - distilled “oh, we just need pairs” - stickers from muji, no lil animals from noah’s ark, no: stamps. carve them? no - make them from peas. YOU MIGHT be able to identify which ones are the same but most likely it will end up in a terrifying mess because these peas are round and so you could stamp them from all different angles. Might be even harder than the matching chromatids game. or tic tacs - potentially even worse, cause they are standardized Pic) (…/why?)\n\n XL ideas - i didn’t realize, and was mildly horrified to find that I had (had) not one but more than one all-encompassing ideas. But I solved it simply by deciding to list them here (pic) I had wanted to make a bunch of automatic processes, put them in baskets and on my shelves, then have people take turns and go down the line making sets 2. I also wanted to put loose piles of automatic processes outputs sort of slooped :) together in the bakery case on wax paper like those babies with clay on their necks.\n 1. and then I had the idea for the cryptid website - set theory.com, where each day, you (i) come up with a new puzzle, and people can solve it. That got a lil’ too comprehensive because I started adding lots of (?) hover overs w/ various information, and then i referred it back to a whole notion site. But I should add the mold theory page, and maybe clean up a few that are almost done, and publish just those. Then I can post the cryptid on my ig story everyday. The brutal mechanism of simply choosing one (random) problem per day got me excited\n 2. [oh yeah and:] 4. i think the largest idea i thought of today was ?taking pictures? of all my diagrams in the - at least the most recent journals, and putting them between plastic paper so that I could then look at them, and maybe make an informed decision about which ideas I want to pursue (also could look at the SETS I picked out and put on the trays\n 3. [5.] another thing i could do is categorize them for example - for the (pic) book, maps, games ex. date book maps, ◬ receipt game - oh! also, pennies game (same kind of game?) oh maybe the spinners with only one color each - oh yeah - i thought of the dice houses to go in the hello kitty pastel box - that was a nice idea last night when I was in hell after I masterbated to g sort of a speedrun of him cumming in me over and over and over - just the last second “well, I think I’m gonna cum in you” - it wasn’t that hot, so I just replayed it over and over and over until I came oh no actually I switched to him accidentally peeing his pants at go get em tiger and being so embarrassed that he started crying, has like a metal tube over his penis so the pee doesn’t even go down, it sort of goes up again and spills out around the sides of the metal tube and dribbles around in his underwear and there is a stain spreading through to the expensive brown pants he is wearing and people are starting to notice at the other tables he doesn’t sit at cause he’s not worth it and he is seeing them notice and caught in sort of a slow motion loop, sort of clasping the wet parts but it’s too big, it’s spreading and then he sort of just shuts down because he doesn’t know how to deal with his emotions, and he is sort of just sitting there - on his side of the table we met at - tears welling up in his eyes but not really straight up crying, just sort of stunned and paralyzed - unable to think of what to do next.\n OCT 3RD"},
{page:325,type:"abstract",lines:74,date:"Oct 3",text:"INTERMISSION - thoughts during intermission\n g: “everything takes longer than you expect” - no, actually for me it takes shorter I just made like a thousand ACs and AC + MC which I’ve been putting off for days and it took me about the time it would take to eat a peanut butter and jelly sandwich (to make and eat)\n △ What is the difference between people I like or get obsessed with - people that I do not feel like I can “see through” their whole brain - like I can’t see why they do things. Like no matter what I tell Maddie they’ll find a silver lining - oh but you like rotten produce and my compost needed more fodder. Evan will always try to make me feel better etc. Sean is always defending himself, and making up reasons like saying “Jamie does rotations at her job” or saying I’m working on the family business - sort of the opposite of Maddie - finding a reason why something isn’t good if it is. J definitely has a permanently condescending affect but he did once do an “I’m bad, you’re good” dance. My automatic processes are all secret and internal and the output is sort of random. There’s this thing my mind does where I have to plan the next step before I can continue with the one I’m working on, saying it out loud realizes me that I don’t need to put something in my short term memory so some of it is used up. The other thought I had is that, well, it was in response to observing that I was purposely messing up the job I was doing - making a random number of boxes. Combining the different kinds of cards (ACs and AC + MCs ) and creating slight uncertainty about which box held what. I think this is so more of my brain is used - the 2nd step creates a puzzle, the last step is a memory game, and the 1st step is an element of randomness - suspense - will it be the right number of boxes….? (dun dun dun). I can override this I think, if I figure out exactly what process is happening and then (?) give myself a reason for why the alternative is better. But what’s interesting is that I’m solving for the same amount of my brain being used - trying to maintain some quota - like the game where you’re flying in the air and you can’t fly too high or too low. (google down game?)\n Oh, and the last thing I wanted to write was what Designing Automatic Processes has in common with abstraction. The example - I was considering if there was a way to streamline the process of writing AC and AC + MC over and over - ex. an optimal number of lines and I could optimize for 1. stroke number, 2. ease of stroke, and ofc readability. /-( ← example. I’m not sure what the letters would look like/what the finished product could be, BUT if I did this process to a number of things, there would be certain similarities between the outputs, and these could be recognizable by people without knowing what had been done to them, or why. People could see them, and say: “Oh, that is the result of assemblifying.\n Another XL process is typing out all or my most recent journals and making it into a book that I can say is what I’m reading the next time someone asks me.\n\n memory of the day - going to that trader joes w mommy, and then finding out about the shooting a little bit later (i think it was after that crafts fair or something). i remember walking up and down the aisles thinking about something, and then going to pay and tyalkin (and maybe tryna convince myself i didn’t need to think ab (anyway - you said no memories came back to you today, so that’s why this was important)"},
{page:326,type:"day",lines:57,date:"Oct 4",text:"OCT 4TH\n Just had Maddie over. Supposed to go somewhere with Evan…Don’t know why I made the plan since I didn’t really wanna do it. Feeling a lil fresh. Maddie “broke up” with me though to be honest I can’t say I’m super disappointed. Not exactly sure how I feel about it. Changed the evan plans to be more what i feel like. i don’t really wanna hang with Austin. I feel it’s positive about me and Maddie. I don’t know how she felt but I was often feeling a little dysphoric about the situation. I feel I’m in a good place with most of my relationships - not talking to Sean - not talking to most people - Zach and Niha - gave myself permission to bow out, kind of wanted to hold someone and be held by…\n I think my next step might be to finish typing the rest of my journal entries and then compile them in some way - putting like information with like information. This morning I think I was imagining a course with worksheets. J doesn’t understand anything I do and say though he was weirdly aware of me shaking my head to stop thinking about what i was thinking about. i wonder if he could guess what I was thinking about. He told me about what it was like having no one to sit with at lunch and being distressed when he was by himself. I wish we had known each other - I wonder if we would have gotten along. I will text him “Let’s go to the reel inn” I guess. He is/was supposed to text me today - though he texted last night but it’s fine, I feel fine about it because we talked about it last night and it seems like maybe he understands the extent to which it affects me. There’s moving things around in my mind, and then there’s moving things around in my heart. I don’t have any girl friend’s right now so I can be effectively straight, or at least pretend to be - some of the pressure’s off. Maddie and I went on a walk and then their legs got itchy because of…blood flow issues…so we went home/to my house and they sat in my blue chair and sort of rubbed them, i guess it made them feel better…it’s a weird issue and I don’t really understand it but I kind of liked getting to witness it…\n (missing)\n J asked me if I talk about “thoughts this much” with other people, and the answer is no and it’s because I guess I thought he would/could understand\n 11:48pm\n Alright well I had dinner with Evan and somehow feel so guilty about it that it took me so long to get off instagram and get back to writing like I was supposed to. That being said, Evan, unlike Jonathan is actually interested in reading my little booklets or whatever, and Maddie offered to play Wordle (my version) when I mentioned it to her. You know, the one I’m making to copy the kitty one (missing)\n\n OCT 4TH"},
{page:327,type:"abstract",lines:170,date:"Oct 4",text:"he (evan) said he would read 1 or more booklets - patterns etc. He described Sapiens etc. I would play SET THEORY with him. He read tarot with me like it was a business presentation and I did not like it. I told him the story of that blonde dude giving me the lion card and me still hiding my true feelings - I tell mommy what it think too much and never share information about myself…(missing)\n Basically - additive meaning is maybe a thing I could think about…”I’m going through the green glass envelope (what does GG have in common with the envelope?) The funniest thing about me begging and pleading for Jonathan Heckerman to text me last night and then thinking: - “oh no” (!) - what if I dont respond?! then he’s going to hate me/be mad at me” he no, but i don’t know - what if it did happen. Gonna masterbate to him sitting all alone at lunch, feeling distressed, completely still, sweat building up on his brow - anxious wide eyes, but very still and only slow gentle movements with his giant hands (raving thoughts). Then, abruptly, he gets up and goes to, idk, [Ralphs], gets his food, and as he’s leaving, walks out very quickly, suddenly almost running once the sliding glass door is in sight, not turning not moving his head, eyes fixated. Then he goes to his car and eats it behind the steering wheel without moving the seat at all - looking out the main window and slowly moving his eyes back and forth - scanning the scene - reminding himself to look at more than one thing (the lunch he got is a bag of fried chicken - opens it up, hears the cold crackling sound of the bag touching its other side. Eats the chicken without smiling, and without looking at it more than necessary. Eyes are sort of beady and pleading, but he is calm with the absence of an anxiety provoking environment. He has 2-3 nice thoughts while he is in the car and tries to think of something he will look forward to in his class in his next period.\n I should try to get all my friends to write first person narratives for each other - similar to the script thing that charlie and I did when we first met just in that [it’s weird and personal]. Totally fun and interesting, but the biggest test to see if they know you - the queen of Santa Monica did not pass that test. I have this feeling that J could guess my inner dialogue but maybe I’m completely wrong. I think I know the missteps that Evan would make - I think I know how he misunderstands me. Haha, (?) he and Maddie don’t know that I’m using my journal for lots of other things other than “introspection.” I don’t think I liked the way Evan read my cards with so much decisiveness. + tarot is a woman’s art which goes along with women characteristics like listing and the extended version - and (?). A thought I meant to write down earlier was about how Sean and his humor is logical extension to the point where it no longer makes sense. There is some aspect to Sean that is so much that I like, even though it’s not pervasive maybe, but the way I like Jonathan is different - more pervasive maybe, but maybe less much. The way I like Jamie does share some aspects in common with having a crush. I wonder how it would be to sleep with Lindsay now that I know that she’s single and now that I know that I’m apparently single. Really seemed off limits before, now it still does, but the actual barriers are gone. I’m gonna try imagining that I also was eating lunch in my car like Jonathan - not in the same way as him but maybe enjoying the chicken more - nervous about something specific instead of something general. And having like 7 funny jokes to myself that I wonder if I could really laugh at them - if they could really be funny - even though no one is here to hear them or know they are funny and knowing that they are funny because objectively, they are, and not letting that perspective touch any of the truth part of my consciousness - like dew. Sitting on top of rain drops - not making its way to the ground (grass). I think it’s true that what J said is poetic, which is about trying to find the tips of your thoughts if you want to get back into the rule system that you were thinking in, in a previous time…and - the rules can help you remember/remind you of the concept that you are/were thinking of. Why does my chest hurt? i think it’s more of the pre-sadness - going with evan, and he (? that I shouldn’t be able to “finish writing in my diary.”\n I can imagine these scenes and then somehow, I am sitting on the ugly fuzzy blue seat next to him. I don’t have a bag of chicken but he gives me a piece because he has way too much, though it takes him about a quarter to figure out I want it - he gives me a drumstick. He doesn’t seem to notice me there at first, he is still staring out the large front window gazing at the boring scene of the parking lot, as if trying to find something interesting about it - instead finding every boring thing about it. I would be annoyed, but i can see the upsetness in his eyes so I don’t take it personal that he doesn’t know me - and finally - about 2 minutes after I’m supposed to, I muster up the courage to reach over and lay my hand down on his forearm which is touching the bottom of the wheel, and grasping the bag. He tightens up at first, still, eyes not moving - a reflex. Then, a few moments later, he turns slowly to face me to judge whether I am pitying him and when I am not, the muscles around his eyes loosen and he stares at me, having no special thought - just gently seeing if our consciousnesses can combine unsure as to what to do, and then he moves his forehead towards mine and I mimic his action until our foreheads touch, still sort of making eye contact, though we can’t actually see each other anymore. Then it’s time to go to class. I would skip my next period , I suggest it with a light smile on my lips, a slight laugh. And he smiles back, but only dutifully, not looking at me, already putting the car in reverse, hand on the side of the seat, looking over his shoulder. Smirks - something about my having bad grades and takes me back to school, waiting patiently: but only for a few seconds, his foot ready to move off the break - nods at me, smiles without his eyes, and is moving steadily forward seconds after I let the door close gently behind me.\n The next three days he goes to the same supermarket (pavillions) and stares out the window again, half expecting his passenger door to open, turning once when he heard the sound of the wind. There is nothing. It could be pleasant, he muses. But it doesn’t make him smile, even thinking about it as it enters his consciousness, perhaps ever seventh thought though most of them are about the wind blowing - the way the trees are moving, and little particles in the air. Other people don’t understand this, he thinks, without being really happy about it. On the third day (and it is a wednesday), I get into his car again, this time a little bit later - halfway through lunch already, and I am huffing and puffing, though I cut my huffs abruptly as I enter the smooth tranquility of the scene - the heat softly blowing, and watch his slow and still movements, at least in noise and length of time, but there is a jarringness to it - each millisecond syncopated, as if there were not enough frames per second for a dog. he stops eating abruptly, and slides his forearm across the center console, turning in my direction, but without making specific eye contact. I aly my hands over his forearm gain, dutifully, this time both my hands, and I let them be a little heavy, smiling internally at his lack of… - his own obviousness. He stares at me for about four seconds and then smiles for just a second, before kissing me softly on the mouth - 3,4, 5, 6, 7 seconds, opens his eyes to look at me, puts his left hand under my chin to bring me closer. Puts his right arm behind my left shoulder to bring me closer to him. Nothing urgent - soft and smooth - runs his hand through my hair tentatively."},
{page:328,type:"day",lines:35,date:"Oct 4",text:"Oct 4th\n something about maddie breaking up with me today that made me really happy. I feel weird being happy about it but - i don’t know - it was kind of magical. All that combined with the warm winter weather - the mist in the air - the suspicion (suspicion) that something might be moving just below level - it was getting their legs - we could feel it. If I’m free from anything - it’s the wonder about whether i’m really attracted to her like that - odd to have guilt on that side of sexual attraction - a feeling that maybe frequent, but never not new (for all of mankind). They were excited about Julie and a romance they had and I was guilty about not feeling jealous. who has such things. sean who is lost in his nature, and trying to be an animal says/would say: “jealousy is always a guilty thing - an unkind, ..thing” but he can’t see that last quarter that I mentioned before - Sean masturbates to my emotional distress. He thought it was sweet and beautiful and kind that i was so desperate for J to stay in my life that I needed to fuck him just to make him stay. The real thing is that I didn’t want to fuck him, but didn’t mind it’s not my favorite thing mostly because he’s bad at it, and I think if he had his druthers - i would do all of the work. I think it’s silly and i think it’s fine, and i don’t mind that he masturbates to that.\n And now - because it’s that time, and because I can - I’m going to think about doing a puzzle by myself…what goes into the green glass envelope - 3 or 5 or more things that get added together (there is something so brutal and artificial about this - the process of addition"},
{page:329,type:"ideas",lines:72,date:"Oct 4",text:"alright i think i have one of the things in the envelope. It’s a “c” colored cog wheel with two round circles that spin in opposite ways. in each “c” painted muslin fabric, which is sewn on roughly to the wire base two circles each, 1 small, 1 large, and the small are connected, but the larges are not - there are window like holes in the fabric, and each has the option of being white or black, or some mixture of both, depending on where the wheels are in relation to each other. There is some optimal state. (and maybe this is a metaphor for the false thing that there is an optimal shape. and maybe there is a mechanism here that i simply can’t see)\n muslin the size of a kapla block, but thinner. And on the wood “something” is written - a black word at the top, and a white word underneath it. but on the bottom, that’s where the fun is maybe a small purple rhinestone thing at the bottom - detritus\n Now another one: this one is on rituals…the small pat pat patters, but this time they are just the paint brushes - trying to say something but they have just 1 line so they get mad because no one can get their message. Still they go about pat pat patting the thing (my heart, but a black newspaper thing - with words - type - print - sewn, though - stuffed into a cushion - on all sides, and 4 divots in the shape of a diamond - perhaps stuffed really well (pillow/newspaper) Anyway, then the other thing. neat, hemmed linen, wrapped, twice, around a thin rod with two spots of black on it - in tape, or something else…\n and this one’s easy: a nondescript string with a piece of white paper, folded over it at each end, and a generous piece of black electrical tape folded over that - letting a bit show at the string end.\n\n in the middle - a small magnet, concealed by white, and they can be connected back to each other, whenever they need to be - whenever you feel the communication is lacking just reconnect them and you’ll notice you feel better right after, as if that last missing connection were finally found its loop. The last thing is following a design - perhaps a china plate design: sticking beige athletic tape on the plate - two pieces, or three pieces each - each a rectangle, about a tablespoon wide, and a third as high - they are lain out separately on sticker paper. And the idea is to replicate the design as easy as possible.\n And - ooh: a small silver hammer to exact on each of the “nails” (but actually thumbtacks - T kind (silver), also - like the hammer. And the hammers get added - one for each of the nice silver stick umbrellas (about 12 in all, and each one gets to be hammered slightly into a separate [piece of meat] (a rectangle with white paint on fabric - something to separate it from other things, know that it is just white as a perfunctory measure, know that it needn’t really exist even, except as the base - the thing for the T things to be hammered into (I had the urge just now to go and take my driver’s test again tomorrow - not that I need to - I already did it - just to show that I could pass - and there’s no way to do it too]. Another thing I could do: paper (just a short rectangle, with one piece of string in it, too, and each of them. AND - then the papers need to be piled in a pile. And the strings can go along side the piles as they get piled too as the two pieces of paper meet at each place - 1,2,3 - for each pile.\n\n ("},
{page:330,type:"abstract",lines:18,date:"Oct 4",text:"objects teacher - walking with her to cry - not handling it right cause I couldn’t believe it was a thing that could happen.\n I guess the part about the automatic process is that you can see the [symptoms] of the step by step process - (if you were to look closely at the imperfections) - “sounds like:” baby extra plastic arm\n the one where I know Evan’s going to react - interact like a robot - recategorize things for me, as though I did it by accident - this is a common misunderstanding - Sean though I would think he was kidding, I think, about intentionally misinterpreting people - it does sound crazy - IDk. ex. Maddie: ‘you’re not stupid,” ha, I know ex. evan saying the whole situation with Zach and Whitley is childish. (I’d like to count the peas and put them in an appropriate receptacle - then count them again, once they’re in the receptacle."},
{page:331,type:"abstract",lines:77,date:"Oct 5",text:"OCT 5TH\n These are the basic concepts that seem to go together in some way - my frustration about constantly having to help Evan recategorize my thoughts, and frustration at him doing the same thing to me. Rule sets - telling yourself to think (and not to think) certain things - the more whimsical twin being having all the different rule systems at your beck and call. And the twin of recategorizing things (not necessarily whimsical) is seeing what people are thinking - seeing through to the interior of their mind by seeing how people categorize stuff. To be honest; I fear and hope the bad weather as a ways is a metaphor not an example, which leaves me to think of a real example if I want to be doing “!”science”!”\n - - - - - - - - - - - - - - - - -\n (For example: a “book” with a pocket on it - and all the pages are in the pocket - the pages in the book are blank) (sometimes the answer is in that 4th quarter and glossed over when reading out all the (?answers) to yourself\n - - - - - - - - - - - - - - - - -\n oh yeah, and another one that I always forget is: recategorizing things (beneficial exercise) have to ↔ want to if you’re into that kind of thing.\n Evan’s thoughts are broken cause they’re all dedicated to the humanitarian effort - they are all good thoughts, but they are going nowhere - I can’t do it - I refuse to do it - it’s just a waste of energy to be a good girl like him, and he ends up hurting people anyway probably (do I? Richard? idk - i feel bad? I don’t know if I do?)\n\n ex. Evan explaining that analogies aren’t just an extraneous thing we do sometimes, but instead at the core/center of our thought processes - as if I didn’t already know that. Ways to know if people are stupid - mommy’s way - you try to explain something to them - her humanitarian effort - or if she was bad at explaining things (disrespectful - as if I don’t know that) my test: say something stupid and see how they react\n There’s some hurt feeling about people thinking I’m stupid - I can’t actually think of an example of evan doing this but I still have the feeling. A guy passed by with a lion on his shirt and I wasn’t supposed to tell evan about the angel deck and that not-Zach guy but I did and yeah he got that it was a metaphor probably just should’ve lied and said the booklet said his moon card predicted that he was controlling - things I would’ve said - envelope - everyone would have something to put in that envelope - I could sell those to be honest - little specific pattern collector s- that people can use - to end off all my negative thoughts - ooh! they are scary - that’s what I’d put in the envelope. Emergent concept - the 4th quarter - the thing that gets created through - only through the existence of the three - it s implied - people argue on whether it was created or implied - but it’s a signature situation - sometimes one, sometimes the other. And jsyk writing’s getting smaller cause I’n worried that I have too much to say - more then I can write. But this (made for mind)] because paper is infinite. The revelation thing to realize is that it doesn’t mean i shouldn't write smaller - it’s doing its job. If I write enough examples of this down, i can internalize it, and not have to remind myself of it anymore. I guess I could write stuff for Evan and not worry if he thinks I’m not smart because he can read my writing. A Anyway now you can create the 4th quarter on purpose. Situations this would be useful in? I bet if I was passing the starbucks on 26th I could think of one - 4 reasons. Maybe I’ll go there tomorrow - a place that means business\n\n Here’s"},
{page:332,type:"ideas",lines:53,date:"Oct 5",text:"an example of something I could write to evan - ex. what just happened I couldn’t get up till i thought of something to do ⇒ something to think about - the examples of the 4 quarters concept, and when it’s useful.\n (pic)\n (pic) (on the side of the thingamajig machine)\n locked in with string, wire\n chute (pease not not peas and TBF but not TBF) (something sepia and more ‘practical’, perhaps - not gross and sickly - ghostly (is the derivative?) - aesthetic - idk\n\n xi things I would like to know: examples to make the 4 quarters worthwhile, examples of things that could go in the envelope, and then the label would be (like?) a pun\n\n Aright - not exactly prime thoughts but: “one memory I forgot was the elephant tying it’s shoes puzzle I got at the 4-year-old birthday party I made myself by liking it so much. ANYWAY - the center ellipse is that I’m always making lil’ puzzle for people to unpack (true?) ANYWAY what I would put in the envelope is basically - things , and then the label is - a pun or - oh!\n If you think about it in a different way (and the fun weird trick is that it is a label for the thing, and unless you’re prepared/attuned/trained, you won’t realize the deft maneuver - so you’ll forget why that’s a good label, and then (ask jonathan why, when he doesn’t understand - he just moves on)\n ToT: fish → envelope + (pic) (shoes (pic ← string) → just keep abstracting\n\n Oh yes, I had this stupid pointless thought - almost as stupid and pointless as implanting false memories of my knowing J when we were younger to feel less alone (”aw - you had a friend”) lol - that would connect BADLY -like the magnet string (And! an example of something stupid: a plug that plugs into itself (a closed circuit - it is interesting because it’s a metaphor and, you have to Do a Trick to think about it. And here’s the trick: 1. the plug plugs in to something (and what do I know about plugs? They use electricity to make things work. Ok so they’re going to make something work. (spoiler: they’re going to make something work) (I guess:) and then, once it plugs back into itself, you ask yourself (because of the assumption): “What is it making work”)…and then you imagine something imaginary that it is making work - you’re brain goes like (pic) this - a fist closing, trying to grasp something. And this is a nice trick, because it can (will) make your brain work in a certain way, and same way with some/all of the rituals I invented a page back (ish).\n (pic)"},
{page:333,type:"abstract",lines:130,date:"Oct 5",text:"AND NOW: The stupid essay i can write for evan\n My grandma had a white box with many tiny compartments hung on her front door, occupied by miniatures. Tiny presents, a tiny wheelbarrow etc. I used to like simply staring at it - for minutes on end - trying to comprehend the myriad assortment, and each one individually. However - not all miniatures are created equal. The plastic army figures my brother played with for example,\n\n lost my attention fairly quickly. For, to imagine a small army man in its life-sized version was to imagine a grotesque made-out-of-flesh platform. How hard could it be to walk, much less dance, with this now life size, mostly nondescript, flat plastic thing - the stand. Gross too, in that there were no differentiating aspects between the green of the figure and the green of this little nondescript piece of plastic. The implication - that it was made of flesh? No, I preferred “realistic” miniatures - those that did not have any extraneous features supporting their life as a miniature. And the easier it was to imagine the thing life size - that is - that it looked, operated, and [smelled like] it’s life-size counterpart, the more I could slip into that mysterious and delicious state of mind which I now avoid for its sheen of insanity. For example: a telephone that could be put into its cradle. And if the cradle lock actually clicked into place? And if the telephone cord were springy, and not just a vague interpretation - relying on optical illusions - an awareness of how the eye processes 3D objects, and no commitment to dutifully recreating the ins and outs of the object\n Part II: Abstraction\n On a soon-to-be-related note there is something that I am starting to understand about thinking which is that: as you get bigger and bigger - as you [put things in cubbies and drawers] - the things that themselves have to change. This has been hard for me to understand, because: when you put thi

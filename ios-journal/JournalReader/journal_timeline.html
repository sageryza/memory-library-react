{page:231,type:"ideas",lines:20,date:"Sep 7",text:"SOLUTIONS TO PROBLEMS\n PROBLEM: WHY DID I BUY SO MANY (apparatus)\n SOLUTION - they’re disposable - display sets in them\n DIRECTIVE: make a bunch of <em>different </em>sets. (rather than making the same one a bunch of times. (I could also do that thought)\n get someone to play the game with me - Evan? Sean? Jonathan? Sandy? Maddie??? LINDSAY?\n\n SOLUTION: get china to make the envelopes. figure out a way to sell them. or don’t. Cotton/muslin - red thread. what closure? - put the coins in them? or make out of see-through fabric…?\n next stop: make the coins out of metal\n@@PB@@\n string\n the pastel colors of cotton I got from downtown\n muslin\n inside: color\n outside: muslin\n\n yes, yes: another idea: this one should be easy (not that easy). Step one: cup, or other similar thing. the tiles come outside of the tub - walls around …\n → (the length of the perimeter)\n wire chairs\n ← one piece of wire…open seat, or hung with muslin\n maybe an assortment of chairs - 12 (chairs)…"},
{page:232,type:"abstract",lines:14,date:"Sep 7",text:"diagram: instrumentalism\n |——————————→ - - - - - - - - - - - - →\n starting point. real goal. instrumental goal\n\n shoot for the moon. even if you miss, you’ll land among the stars\n ex. I want to get my projects done → i want to make the clay matchboxes → things that could go in a drawer in a dream → ooh - I could think of them (that would be fine)\n\n I keep thinking of these buttons\n\n -? I could make some greeting cards with the ant farm etc. (Instead of making the car set which is what I actually want to make)\n and then they get covered in different colors - the <em>wall </em>one, the bottom, and the other (pic) ← pool. But also: top down: ← unequal"},
{page:233,type:"ideas",lines:8,date:"Sep 7",text:"clay cigarettes - all the colors\n ← pastel\n ← vinyl\n ← just useless writing, sort of looks like a receipt. somehow sticky from the inside\n\n this dish is specifically for strawberries. this dish is for one strawberry. (it says this on the online description) (you may need to buy more than one if you have multiple strawberries)\n\n ok, I don’t do this often but"},
{page:234,type:"day",lines:6,date:"Sep 7",text:"I deserve some gatorade\n give me one of the berry gatorades please. No actually the blue one.\n I’m just super thirsty for some reason\n no sinnin’ this week\n@@PB@@\n for some reason this reminds me of that moment i told them i’d been tested for tuberculosis and C said why didn’t you just tell them you weren’t"},
{page:235,type:"ideas",lines:21,date:"Sep 9",text:"September 9th\nThinking about an aesthetic set of blocks. I’d like to get them made on alibaba, but I may have to buy some wood and paint them myself. if there’s a 4x3x2” size maybe that would be good. This one could be based on the ratio of a cigarette - the goldenrod color. paint part white. paint the rest with pastels (mostly white)\n\n(pics n diagrams n stuff)\n\nThis boy (I would say “guy” but…) said “I’m having a tough time” like 7+ times - underration. It’s making it hard to focus and I keep not ending off things. I can’t so much hate him because I’m so glad he’s not my boyfriend and I don’t have to date him. This is like Thanksgiving for me.\nToT (train of thought)\nEcholalia: <em>What </em>does it have in common. I’m tired and I’m hungry and I feel like a tiny little bunny - “who would find that funny?” Chris would just repeat it. This guy (boy) had a therapist - 4 sessions - then - she kicked him out. That’s what happened to Chris. I wonder - they’re both really annoying and talk about themselves"},
{page:236,type:"day",lines:29,date:"Sep 9",text:"(still 9th)\nthis decaf coffee latte milky milky boy isn’t getting me very fucked up :o. Sean just annoyed the hell out of me on the phone. he read my diary and was angry about something he read in it. i don’t just not care - what’s the opposite of not caring? He’s leaving in a week and I DO NOT CARE. Actually insane that someone could be so wrong. Can’t wait till he realizes I was right like he will eventually, and like everyone does.\nDIRECTIVE:\nMAKING LUXURY ITEMS FOR MY NEW SHOPIFY STORE (you know - the one that i already had)\n1. GET the blocks (can be all the same size, which will make it easier (oh - perhaps…look on amazon) - paint them different colors - I can mix them with paint! (3.5x3x2.5”?) No: 2.5x?x?” ( think) They could come in one of those wooden cartons - white and mint green label on the top, surrounded by raw wood. - could be a sticker…anyway…other luxury items. Could make like 2-3 or 10, depending on the item, so that IF someone buys it, I actually have one. And I COULD call it “useless things” or “trinket”\njust looked. domain costs 4k or 6k. Well anyway - if I DID send out marketing emails (and wanted to stick with the marketing scheme I’m imagining right now - I could have a lavender or other ? - with white letters. sans serif, but not arial, and …designed who was not a fast worker and …but also feel bad that she’s sick."},
{page:237,type:"ideas",lines:18,date:"Sep 9",text:"oh, this morning: put into CHAT - ideas from diary for cards - make like 20 - 200, use some\n\nok: another idea for the blocks - (pic) blue - light blue, tartan all the way around (outfits)\nAs though they were clothing blocks, and they could be used for clothing, interchangeably\nOk, more block ideas: bruise blocks - ten blocks, and each is different/various ugly discolored bruises. None are the same. These don’t fit together in any particular way.\nDIRECTIVE: GET block holding size (aspect) cartons, design the labels (RESEARCH other minimalistic block boxes)\nOk: another block idea: but also maybe not good? - go ‘round town, looking for addresses, and the way they write their numbers…copy them to blocks, change the aspect ratio.\nBUY BLOCKS on aliexpress - maybe all the same shape/size - maybe get a deal on alibaba\n(pic of converse blocks)\n@@PB@@\n(pic)"},
{page:238,type:"ideas",lines:6,date:"Sep 10",text:"September 10th\n goldenrod, white, red, brownish\n (pic) How distinct should the line be, dark purple/violet, how rounded, white, lavender\n plate of peas - ai\n scissors - make out of wire (a die, but the things in the sides can <em>move!)</em>\n scissors, race cars, belts etc."},
{page:239,type:"ideas",lines:13,date:"Sep 10",text:"look up: clay houses (mini)\n\n (pic)\n\n he’d rather be in his cupboard with the letter…yesterday…but now.\n El Salvador…\n PREFACE (to Maddie) this is kind of a loaded question but can you answer it honestly, and if not…(then don’t answer it at all)\n → I don’t really like prefaces, so this would be better…\n\n peppermint, cinnamon, orange peels, coffee grounds to get the ants away (and the squirrels!)\n (pic)\n plate of peas, cause that’s how the plate looked, after he was done. ToT - I wanted to make ceramic peas - spheres painted green the paint will stick to the kiln!) (use acrylic) “I’ll just use real peas”\n@@PB@@\n (pic)"},
{page:240,type:"ideas",lines:30,date:"Sep 10",text:"DIRECTIVE: Buy a (cup) of mango - measure(?) - mimic the slices, but this time in clay, not in fabric…that would be nice. Very nice pieces - geometric shapes, all painted beautiful yellow. And tucked into maybe a glass jar - but not with a lid or handle…oh, I don’t know…maybe plastic…\n OPTION 2: (EASIER, NOW) - paint the jenga blocks with the colors I like - DIRECTIVE (EASY): MIX WHITE INTO ALL THE PRIMARIES - PAINT EACH SIDE…HONESTLY, THAT WOULD/MIGHT BE A NICE BRICK SET…\n ITERATION: The indented squares - paint squares, then they can go in - easy! does this exist? (Maybe glaze after (get wooden larger blocks, wooden rings, thin black wire → 20 guage)\n@@PB@@\n Ok now I kind of want to make a bunch of plates of peas - just the plate o o o o → make about 6-16 peas :) :) :) (← jumping for joy)and then (or already) make the plate (pic) ~ 3” - 3.25”(?)\n Or use real peas (how would that look?) paint the plates white, or not painted, just glazed. At most: use very light mint green, or white with a small green ring around the inside (1/4 inch space)\n\n Building blocks that are made out of trader joe’s snacks - easy! - measure the lady fingers (butter) (pic) stroop waffles - easy! get the color - paint lines - make a bunch! Find a box that kind of looks like it,…or don’t.\n not out of clay: out of wood - get discs - measure the size - I’ll guess 1.5” SW, jenga blocks - paint the color"},
{page:241,type:"ideas",lines:24,date:"Sep 10",text:"END RESULT (TO MOTIVATE): A BUNCH OF “TINY” SETS, AND EACH ONE CAN GO <em>INDIVIDUALLY </em>IN ONE OF THE WOODEN BOXES (as the: Playing with automatic process piece) - plastic box\n PROCEDURE: SHAKE THE PAINT 2. MIX THE COLOR…get the Trader Joes bag - NOW MAKE <em>TWO </em>COLORS FROM THE BROWN - ONE CREAMY GOLD HONEY, THE OTHER: NICE, NOT ROTTING BROWN\n (pic) ← <em>ok</em> not gonna work.\n (I NEED MORE IDEAS. I’M NOT SURE WHAT TO DO, SO, NEED MORE IDEAS!)\n AUTOMATIC PROCESS STEP ONE: CIRCLE OF WIRE.\n LONGER (3x) Piece of wire - wrap it so there are <em>spikes</em>!\n@@PB@@\n ← Trader Joes: (pic) cylinders that I can buy from aliexpress\n ← make the label - a nice label - design it on ai, print it to stick (?)\n ← purple (wine)\n\n ← ideally, would have a piece like this, and then, a longer, thinner piece for the neck (then it would look “enough” like a wine bottle)\n OVULATING IS: I THINK OF ONE IDEA PER SECOND THAT I AM OVULATING :)\n castle - pastel - ? - <em>very </em>light mint green main face - crowny things - <em>light </em>yellow\n somehow the windows can be both blue and pink - ok wait duh - the side of the indent - violet, the indent - pink - (or else it won’t go all the way in…?)"},
{page:242,type:"ideas",lines:22,date:"Sep 10",text:"DID YOU KNOW, ORIGINALLY THE BOARD GAME “PRETENDLAND” WAS ABOUT ASSIGNING ACTIONS\n ← many silver instruments on shelves (both mini and life size)\n cloth with pretendland written on it\n (imagination)\n (and this could take place in a real room.\n But anyway - people have to guess what you were doing - what you meant by your actions\n\n OTHER IDEAS (ABRV)\n → instead of painting on the () - I could design a stamp ← sort of ambiguous black marks - maybe <em>try </em>to make something, and: let it fail(?) - The Rubber Stamp to Jenga Block Pipeline :)?design - carved\n stamp it on! → jenga block\n TO DO: Try the James P notecards - new ones, in the (chest)\n@@PB@@\n (sugar packet, puffed)\n TOP DOWN\n a map that continues onto the SP so it’s a game - a puzzle with one piece\n\n THIS IS THE IDEA THAT GOT ME OUT OF BED:\n lavender pink? - red, muslin, paint\n trace the shape with 2 round things. Then cut as if I”m going to hem it - but I’m not\n spent the morning planning what I’m gonna say to Tong Tong\n white pastel, x?, white\n cut from long pole - right size - use Js cutter?"},

{page:244,type:"ideas",lines:10,date:"Sep 10",text:"ok: POOLS: ← idk weird pool shapes and\n the ugly weird blue that pools have :( :) :)\n THE <em>TOP </em>PROJECT CAUSE I CAN DO IT RIGHT NOW\n (and that’s only like <em>10 </em>steps and it’s <em>so </em>easy, and you can do it RIGHT NOW!\n →! → the square slide top boxes\n x idk\n anyway: cigarettes → golden rod\n pastels → all, white EASY :), color\n connected, pink, orange + orange, pink, this is how it feels when you don’t text me back\n push the button (can’t push both buttons at once :( :)!\n comes in a box"},
{page:245,type:"day",lines:119,date:"Sep 11",text:"September 11th\n Hilarious: I got up early to run in the morning not because I went to bed early but because I went to bed late. It’s now like 5 - suns just coming up. I don’t miss El Salvador - well, I’d like to go back by myself. That’d stick it to them :) went to wingspan night at Maddie’s and Evan’s house. Kinda traumatic - talking to Maddie after. Evan made a mistake at his job, which he told us all in a big circle at the pizza place waiting for two large black flat boxes that me and Maddie carried back - one each. Afterwards I kissed Maddie for a <em>long </em>time on the mouth, and it was kinda nice - like really nice but I also don’t think I wanted it to go on really longer, or go any further. I feel it’s kind of hard to become really good friends and maybe that’s by design (she doesn’t want to - wants to stay just lovers) or IDK - maybe it’s the thing - like with evan - you just cannot really hang out with them for that long - they’re always on, so it’s tiring. That actually makes sense. It could be nice to not always be on - for them (and for me) I would like to get to know evan in the way that his bed does. Anyway, I had a <em>thousand </em>ideas yesterday, and the day before, and the day before that maybe even.\n I told Maddie it was cause I was ovulating but I don’t know that I am. Specifically, in my bed - the pastel wall clock on muslin, with frayed edges (?)- to transpose on the doughnut which is always a circle and clock. I think it’s actually fine, probably, with Mad J, but now I guess I’m anxiously attached to both of them - that never happened with Sean or Chris - cause I was never afraid of losing them…Except maybe at the very beginning. Feel like Sarah - trying to be a big girl, and be ok when Evan didn’t talk to her when she came over - if we don’t set another time, then I don’t know if we’re ever hanging out again. And maybe that’s also by design (eyes welling w/ tears) Thought I’d tell M <em>and </em>J that I cried El. but it feels fake coming out. Cause I didn’t care. I almost cried yesterday in the car, and I think it’s just cause I was tired. Haven’t even been to that therapist yet, and already I’m saving all my bad thoughts. Waiting for her to help me with them (doubtful tbh) Feel whispy when I talk to Jonathan cause he doesn’t care or want to hear anything I have to say. The reason I write things in my diary - are you don’t with this? (my ice cream) (yeah) (ok - I’m gonna throw it away. I probably wouldn’t have eaten, even, the amount that I did, if it weren’t dripping, sticky, on my fingers. 2. Things that will make me look like an idiot (to other people) Don’t want to hang out with Sean. Don’t want to hang out with Jonathan. I would want to hang out with Maddie if she wanted to but IDK if it comes naturally. Very empathetic, but I’m also a ? so I know how to be empathetic to myself.\n My eyes are up here hat. With a fake eye made of sardine wood (witch money, which, as it turns out, is the same as normal money. They don’t say business money). Little pills, sweet little pills - didn’t actually <em>quite </em>finish up the pill idea, for how to make the pills in the pill pack - how to do it . Don’t think I’ll be able to relax till these policemen are finally gone. Funny thing is - first saw the left side of them and saw they had yellow tazers “oh, alright - they don’t have guns” - I should’ve stopped looking at them. maybe I’ll go to Florida by myself - have the stupid vacation that I very much want all by myself - just want a shitty resort by the beach and drink pina coladas, and write in my diary and think my nice, impressive thoughts about myself the whole time, somehow. Think about “ooh, now, that was a very good idea, with the pills,” and write a little book even, about why it’s a good idea, and what to do with the pills. Or else I could get lonely and hate myself. Maybe someone like Maddie who I feel more comfortable with - a friend - not Jae - makes me anxious. Oh, honestly - Zach and Niha would be fine.\n The tar pits - a threat. The glove made of the fabric vs. muslin, compared the nathan saying…but oh no, it’s me imagining it in my head cause I’m a genius (beat my chest, smile sadly - they can’t understand)\n Step one: paint it yellow in the middle. Step 2: cut a line through the center. Step three: have <em>entirely </em>new thoughts. Don’t think of <em>anything </em>you were thinking of before. I wish Sean was not crazy. I wish we could hang out and just be friends.\n Thank god I <em>finally </em>want to eat my egg frittata - it’s finally time. The replacement of food for sleep is a bit worrisome - a bit tiresome. Lindsay would be funny I think. “<em>Dude! </em>What the hell is <em>wrong </em>with these people?” (looking at a guy with a bandage on his nose). (I think he just got a nose surgery: No, really) Excited/nervous for my therapy appointment. And that is something I’m allowed to be excited/nervous about since it’s the first one. Maybe I should pretend more people can read my thoughts (right now only some of them can). Zach put my zynn in his mouth - it came to that. Zach kept trying to find out if I was into Ty I think - reasonable. (lol, he asked me who’s my favorite between him, Tay and Teddy. I said I can’t choose between my children - then Markis - he’s black. IDK, this is all nonsense - I should be talking about Jonathan’s cousin James, and what I hate about him. Anything else is just nonsense 🙄\n Gun guys are gone. New ones came, and now they’re gone too. Might start my memory library project again, in the context of the larger book with the multiple projects. Worried Tong tong won’t believe me about anything."},
{page:246,type:"ideas",lines:43,date:"Sep 11",text:"lime green/light blue\n ← thought of this in the car. Almost forgot about it.\n ← pastels\n the shape of tic tacs, larger (sweet little pills)\n ← the cyclops glasses\n pink, yellow, mint green (like a stop light)\n go home and sleep. go get salad/avocado from whole foods get coffee, maybe a croissant. Feel weird and disgusting. Wish it felt weirder to be cold after 3 days of feeling so hot I could not think.\n I do not want to go home cause it will feel like failure.\n Had an evil thought just now when a (chocolate chip) fell out of my pack and I saw a dog on the floor. (I think you can guess what it is). I guess my journal is just me sort of entertaining myself, and writing things that I think are funny. Would I be happier if Ii got the things that I want? Maybe not - a question that’s typically asked - for example, right now, I can’t even tell you what I want. I don’t <em>like </em>when people text me. I would want to have a pack of pills\n\n (pic)\n could get from the house: the pinking sheers\n (whatever that means)\n Could think more about games. Could plan to give Jonathan my finished game book when he never texts me back. - (Just deliver it to his door) I could delete the songs that that girl gave me in my liked songs but i like skipping them every time and thinking: I do not like these songs. I don’t like them cause she gave them to me, because I picked them. I don’t have the same music taste as her. And maybe mine is better. I’d write about Teddy getting hit in the head when we were at 711, but it seems too obvious. (pic) ← “yeah, see: everything’s fine” (I LOVE this song - Quedate Luna. I can’t think of another one I like better right now. Depending on the VIEW that I use - I could take <em>just </em>the one song that I like…oh - I <em>might </em>catch a flight using the thought that I’m gonna go home and make those cigarettes (”they’re <em>so </em>easy to make”)\n\n (pic) have to make the paper flat so it can fit around the cheesestick.\n yellow thing is a butter dish\n x more ← biscuit ← newsflash! they’re all the same thing :)"},
{page:247,type:"abstract",lines:64,date:"Sep 11",text:"The weird thing is I can’t think of <em>everything </em>right now, but I can think of <em>some </em>things - thoughts that are so obvious that they’re kind of interesting.\n I thought Jonathan liked me. It’s very confusing that he’s not (and never will?) text me back. Gotta wait till I think of something that I <em>actually </em>think is there (which means most of the time I’m lying to myself) If I wanted pancakes, then I could have something that I want.\n Primo Passo\n Maddie doesn’t think you should talk shit about people. It makes them feel worse. I kind of like the idea of talking shit about Niha and how much she likes kid laroi\n I don’t want people to confuse me for themselves.\n@@PB@@\n god is playing a mean trick on me. This lady walked in with a “cute” baby in a carriage - it’s <em>not </em>cute - there’s a growth on its forehead reminiscent of that girl I once saw at bright child (in my reaction). First she parked her exactly in my line of sight. Then she sat next to me. Then the barista told her: “no move it closer - it’s blocking the path” - now I can see it in my peripheral vision I hate kids.\n MEAN TRICK: Jonathan FORGOT when we agreed on a way to make me not anxious. I broke up with him and <em>thought about him everyday. </em>What kind of a trick is that…? Maddie gave me a guitar strap yesterday. I really like it. And they put a nice fish on it that says “not like ther guys” I hope it makes Evan jealous - I told him about it. This guy at the table next to me finished his matcha and then he had another one - was it <em>also </em>for him? (My sense of humor that Brittany and daddy share (and to some extent: Sean and Charlie and Jake is causing a weird confusing mental state in the other person. Referring to Mind. Maybe I’d feel better - more powerful, less whispy, if I didn’t feel like a time lapse of the dream version of trying to go somewhere and not being able to move - kicking my feet on gravel. I hate this baby - they’re playing finger games - (?) giving her her fingers. Now she’s coughing, screaming it’s cause I was mean to her in my dairy. Yesterday I was thinking about Ron and how he got an ice cream truck and gave out ice cream to people that sounds like fun. Like me, but as a pedophile. Maybe I should “send” Jonathan my “baby gets a boost by being bad” book that I actually made all/almost all of the pictures for using AI (oh yes, another project that I basically finished) → could finish <em>that </em>or the PWC book or the SQ cards or the (?) that how they know what (?) are missing. Or I could not. I could be tired and kind of sad and lonely at this coffee shop. maybe I need to get a job like Maddie. Maybe Maddie should work for me. Doing the magical ritual cards - another thing that could be finished. Maybe I should put everything in my Etsy Store - the coloring books. the queen deck, the pastel clock the “cigarette” and the “white noise” etc. building sets\n memory library - /the memories that “help me” the one I always remind myself of: “the tricky bit of (?)tape” the knot that came off my fingers too easily\n ANYWAY -"},
{page:248,type:"ideas",lines:40,date:"Sep 11",text:"put Jonathan’s game in the shop lol - that would be funny. With the packaging I already made - also the Chromatids one - maybe just have 2 versions with squares and one with triangles. The James Perse notecards. The heart box (order NOW - don’t wait for February :)) - and get the little hoonies to go in it - <em>who </em>is going to do all this? lol I don’t know if I can do all these things. I need to do like SPEED or something. Not sit in coffee shops feeling tired (but that’s kind of nice too). I could divide it by how easy I had they would be to finish. I could set myself deadlines like in school, and take the worst finished version. The shirt(s) I made for Sean - hats (duh) bean beliefs - (?) - easy - made one…ask on IG if anyone wants to critique my things - I’ll send them you can keep it or send it back THE LITTLE NOTEBOOKS - look like passports. XI (duh)\n@@PB@@\n do an outline “just a picture” of each thing X → ✓ → do the worst version, and use that as a spring board. Then go back and fix all of them\n THE POCKET - of course :)\n pieces of things → the pool, the shoe with the sock etc. The glasses with eyes in them - the hood with the head in it? (Where I end and you begin)\n@@PB@@\n “AUTOMATIC PROCESS\n (pic)\n ”complex elements” - that’s <em>one </em>of the components, and you get <em>several </em>of them, or <em>maybe </em>multiple kinds that go together and in general: wire structures - that have fabric, or screen holding them up\n <em>The houses I was making </em>- (out of clay I guess) cut them out, paint them. Make like IG? - find a good box for them. (Luxury box for the gilded edge cards. I like to make the <em>sample </em>or prototype…but once it’s been figured out, and I can easily imagine where it will go next…it’s just not that fun(?) feels like rote work(?) I could do it or someone else could do it. or a computer could do it.\n@@PB@@\n (pic) ← lavender\n ← lavender (all the colors\n ← white\n ← velvet\n ← wire\n could be any size(?)"},
{page:249,type:"todos",lines:51,date:"Sep 11",text:"Go Get Em Tiger\n My new plan (and this is <em>totally </em>useless, remember) is to make a Big Giant Plan. So: a list of all the items that need to be made, and then listed, and then an exact (vary in detail) procedure of how to make it.\n 1. POCKET\n (pic)\n 1. Baby Gets a Boost etc.\n 1. look up the script (try drive, daddy’s )\n 2. arrange in .indd doc\n 3. review feb 2nd MJ - place images, or make new ones ug)\n 2. Pattern Collector\n a video of putting on tefillin\n 1. demo picking the pattern - walking around - placing a tic tac in when you find…then go over how each PC can be placed appropriately on your body depending on importance (god/coincidence etc. goes on forehead…)\n So: step 1: get matchboxes. 2. get tic tacs\n 2. Take some pics (on wood table)\n 3. House Blocks\n (done, actually) research (?) on AE (buy)\n 4. also: spires step one: research what exception pieces there are - in lego and others. Try to make them out of wood - they (…?)\n 5. Memory Library\n figure out what size cards fit box (? or ?) make it look like library cards (courier?))?\n type out memories\n 6. Hoonies (mini cards ~ 2x2”)\n print them out. Make sure there’s no duplicates and they’re all suitable - print out another deck + a suitable box cover:\n 7. Block Sets - go to Fisher Lumber on Pico. Get them to cut, or cut at Jonathan’s an appropriate size pole/2x4” into a bunch of blocks (do I/can I pay per cut?)\n 8. Color Wheel Clock\n measure a large circle with a bowl or something. Measure the middle with a cup or something. Cut out the middle. Mix the colors. trace the (smallest?) square cookie cutter ~ 2x2” or 1.5x1.5” (per color) let it roll. PAINT IT ON. Purple or red or pink at the top. remember to mix extras of the primary and secondaries so you can mix them together for the tertiarys :)\n 9. New Idea 🤦‍♀️\n dewey decimal system for ideas. (and on the Memory Library one - find a way to “tag” it on the front - + the name….this one: maybe: “Abstract” (idea), and then “recipe” - how to do it\n also kinda like a recipe box\n For example - the mango chunk idea - go to a (mango cart ipa) and buy 10 dollar mango. take it home and (maybe eat some). Then measure/trace the edges of various pieces. Maybe cut them out of fabric. Or cut them out of cardboard and hot glue them together. paint them yellow (in fabric - use yellow fabric - that I have) DO THIS NOW INSTEAD OF WHAT I’M DOING?\n (pic of color wheel)"},
{page:250,type:"abstract",lines:15,date:"Sep 12",text:"September 12th\n AUTOMATIC PROCESS\n Pre-ToT: “Oh! I should make tiny books for every explanation/project - you can pick a project - book from the card holder that has books in it on my nightstand. Then you can do that project :) Ok, here goes:\n 1. When I was with Sean I told him I learned to make more money by doing manual labor\n 2. 2. Design an automatic process\n 3. It’s calming to the mind to have [something to do]\n 4. You need to come up with a system/process that you can do\n meditating doesn’t work cause your mind is meant to be doing something. This works better - the part of your mind is taken care of and free to “wander(?)”\n (pic)\n prepare a game for yourself. A little procedure\n (pic)"},
{page:251,type:"ideas",lines:9,date:"Sep 12",text:"To Do: print out the white noise sticker cause it looks alright, and I should finish if I can. Then I can put it on my shelf.\n Question: will it be easier to do this because I don’t know what it exactly looks like, and no one could do it for me…?\n (pic)\n Idk - I keep having this idea and it never really gets finished - print a rug on fabric (spoonflower?) - put fringe on it - it needs a box - possibly a wooden carton - glass window slide top"},
{page:252,type:"abstract",lines:4,date:"Sep 13",text:"September 13th (morning)\n System of movement - because when you can’t move - it allows you to have - to get unstuck.\n\n This is the automatic process I designed on my walk (”letters”)\n (pic)"},
{page:253,type:"day",lines:29,date:"Sep 14",text:"September 14th\n Feeling kinda low. I think I’m getting sick or I am sick or I was sick yesterday. Been talking to myself all day about how I have to break up w/ J else I’m gonna get hurt. Fu\n\n She fucked up. “you can’t read minds and I can’t read yours. But the fact that you thought that probably means it is anger” what a bitch. Then she changed the subject, probably cause she knew I could easily argue with that. I said I’m not angry cause she doesn’t have malicious intent but maybe she did :o I think she should pay me and we can have stupid insane meta arguments every thursday. Jonathan called me after to find out how it was and I didn’t know what to say. Sean came to my window yesterday when I locked the door. He’s crazy. I don’t know what he’s thinking. I was staring at her, just thinking: “you’re crazy!” over and over. Cause I told her I didn’t want to share all my deepest darkest secrets with her until I got to know her better, and she tried all these tricks to try to get me to say it what a bitch. Some things she had in common was confusing my other emotions with anger. Conflating various things I said like: I feel frustrated when I can’t finish my projects and feeling frustrated with her in the session. If she didn’t confuse me so much, I would say those are two completely different emotions that have the same name."},
{page:254,type:"ideas",lines:28,date:"Sep 14",text:"14th Primo Passo\n I like the idea of the automatic process - no - oh having a bunch of different sets of things - sort of like lego blocks. Like the stroop waffles. Like the bandaids if I could think of a velcro mechanism that would connect them. Ex. the “letter”\n 1. Maybe I should shrink the pics of my notebook, cut them out after printed, stick them to notecards: boom: idea cards.\n SIMPLEST PROCEDURE? Not a lot of computer work.\n Well, anyway: the idea being - these things are <em>made </em>by an automatic process - assembly line made the same way every time, and they are the automatic process part of our brain - the game, the program (but without the goal maybe). Ok, and <em>then </em>there is “the thing to worship” in my mind I keep seeing it as something with black velvet. <em>Maybe </em>something between a bird, an ant, and a hat - at least: add the black wire. Use the fluffy velvet. Sew it in a weird little shape. Or a floppy one. It could be a bat (pic)\n and then, one of the questions would be: what is a nice and satisfying shape (to make out of wire, and then cover/fill with black fabric?) Or: it could be an abstract wire structure - even in 3D, but covered in fabric. the trick, I think, is to make it look random. But, too, for me to be able to imagine it. So I will need to think of it in pieces."},
{page:255,type:"day",lines:3,date:"Sep 14",text:"mostly the emotional but also the physical sensation of jonathan touching my back\n ← jonathan when he was a kid\n (swing set, little boy looking at it)"},
{page:256,type:"abstract",lines:30,date:"Sep 14",text:"September 14th\n Trying not to have thoughts and then trying to write all my thoughts down is hard. if you don’t have anything interesting to say, don’t say it at all. Wished I had glasses so I could’ve seen Jonathan’s mom better. He saw my mom for about the same amount of time. i think I could make up a nice snack for myself, and then have it in my head: for example: those cheese stick containers, except with chocolate sauce. trapped in such a weird way. I’ve been trapped in worse ways before. Physically. And unpleasantly - mentally. I don’t want to think of more art projects in my head - it was starting to feel kind of grainy - too much like work - I think I forgot how to do it. Oh but except for the “friend train,” which I think I thought of after we had sex. Basically: just: a train of friends. each train car can be hooked to the next one. And instead of the full friend, you just get the head. But that’s pretty much just as good. And the nice thing about that is that you can all be going around in your little friend train, attached to one another. Each person is a Big Head. And that is nice. To go around together like that. Wish I could write louder so he would wake up and pay attention to me. Is there something I’m supposed to like about this scenario? I think I’m in work mode. I can imagine being at Zach and Niha’s house, eating Cheetos. talking about stupid stuff. Laughing more than I want to.\n 14th\n ←"},
{page:257,type:"ideas",lines:19,date:"Sep 14",text:"measuring spoons\n x a million (makes a bunch) (keys?)\n ← glass bauble? (mancala) (as a ring)\n apple (at the hear of every flower is an apple)\n beer bottle - photoshop the (label so it matches the size of the pieces, then print it out and put it on) - break the bottle. make a new label for each piece\n (← red, ← “goldenrod)\n grass - cellophane - forgot\n ← white border, picnic blanket fabric - at least 4/7 (?) squares\n@@PB@@\n flower fabric x2\n doughnut (how to draw this shape)\n better: scrunch it around the baby. or:…fit it with a string that can be cinched\n ok: the other things (that I didn’t wanna draw before\n pink or muslin, photo insert. about 1.5” high\n\n ok now: (and have one of the panels with fabric - embroider something on it…?)\n ← started with this shape idea. But could be abstract\n (ok and from yesterday:) IMA BAD MAN, BAD GOD MAN\n\n could also just say: BAD MAN BAD MAN\n or: slit for photo."},
{page:258,type:"day",lines:105,date:"Sep 15",text:"September 15th\n Now I have 3 notebooks I’m writing in all at once. Now I have to carry them all around with me cause I’m not sure which one I’m gonna write in at any particular time\n Came to J’s house yesterday - the big house and he was upset that his dad was maybe cutting him off. he’d been crying; and screaming w/ his mom (aww) I gave him a hug. His mom apparently would like me cause I’m skinny (”Oh, a skinny one”) cause she’s obsessed with her weight. I feel like all the problems he has with his family, mine doesn’t really have. My mom’s not superficial, my dad never wanted to leave her for a younger woman - he wanted a friend. he wanted to do more stuff with J’s mom (aw) but also have a kid with a younger woman (hmm) the most scandalous thing is that daddy was married before - was he with Rebecca when he met mommy? Did they cheat? Should I speculate with Sandy? My dad’s not a horrible communicator but he does I think yell more than J’s dad. Yelled at me all the time, and J said “aww” so do I have trauma from that? Yeah, maybe I’d be happier if he was kinder and more understanding of me as a child.\n@@PB@@\n Tried to get J to fuck me this morning - he’d gotten up early and was making all this noise in the kitchen - banging around. Finally he came in and asked if I was ready to get up. I was not. Told him I needed my teddy who has glasses and a collar, hugged him, sort of still asleep. Then made him lay on top of me and finally he got up and was hard and his platonic boxers (”drawers as I call them in my mind”) He couldn’t stop laughing. Finally he said: “Let’s go get coffee” and we did.\n I feel guilty for not getting enough sleep, feel like I should try harder to get more sleep. Go home and get more sleep - stop drinking. i could go to killer noodle later with the gang. I kind of just want to go with Zach. I don’t want to talk to Niha. She makes me anxious. She has this way of sparkling at people - very sensual - Zaach - she says - drawing out his name, maybe. She has nails - and whatever she says, it’s so intense. It’s kind of hot. IDK - maybe I want to be a guy that she’s talking to - not a girl - maybe if she didn’t feel so comfortable with me. I miss Sean, almost, but I wish he wasn’t <em>crazy </em>right now - hanging ot with him feels like hanging out with an aggressive, yappy dog wish I could talk to the normal person that I sometimes used to go to the beach with. i’m worried that he will turn into a tornado if I keep not talking to him but maybe he’s fine now. I could or should go home and do my projects - go home and sleep - try to sleep - curse myself for drinking matcha. Make plans that I won’t follow through with\n I told Jonathan that if he lost his money for the next 8 years, I could lend him 909,000 and he could play me back when he’s 35. I want to see Jonathan scream at someone. Sounds hot. Especially at his mom. I’m sure I’ll get to see it if I hang out with him enough, probably at me. Sounds good. I will probably cry though. Then I will have to leave, and think: “no [whatever it is he was yelling at me about] is not related to me”. Try to get my nervous system baack under control. Introduce little things I know I like - “hmmm - maybe a dish with little pearls” - see if that feels good in my mind yet “It’s ok, people are mean, people are stupid” “ a little dish though. Maybe a triangle honestly” - “I think it could be nice to…get some…bread.” I’m not gonna…see him for a while.” “I think I’m fine. See I’m not shaking. See, I’m fine. Pretty much anything the color light burnt umber - painted through - with splotchiness on the sides. Maybe on wood.” I’ll show him this: “Look, I’m prepared if you ever yell at me.” I would like to meet Sean in a library. And there will be a librarian/sitting at our table. Handing him cookies and being nice to him.\n@@PB@@\n The thing I was thinking - and I don’t even know if this is true - about the clothesline underwear - it’s a simple abstraction of a clothesline - no detail - if you saw it at a distance - if they weren’t <em>your </em>underwear - and then - is <em>anything </em>that you abstract art for some reason? Does it just feel good to have something <em>in </em>your mind <em>out </em>of your mind? maybe/probably/what else can I abstract - the measuring spoons that i got excited about last night - like the aspect where you make it not work. I don’t like it working - things like that stress me out. Broken games make me feel fine - it’s broken in a way the world is broken. Otherwise I feel I have to win.\n@@PB@@\n Funny, I guess: Last night while we\n@@PB@@\n happening to me.\n At Home Now (was at Primo Pass)\n About the head thing: able to be hypocritical in his sleep. That’s a real power. Took a little nap - woke up at 3 after having a very nutritious snack - avocado, cheese, apple, almond butter, hummus, sweet potato chips, and this is what I imagined before I got up I got up to weigh myself) - the example I gave him was: instrumental goal - going to the bathroom"},
{page:259,type:"ideas",lines:10,date:"Sep 15",text:"a shopping cart with birds on it (I saw a bird land on my bike - the handlebar - outside_ one bird on the handle part\n jenga block with set namer on it\n velvet (or black “gossamer”), wire\n (to match the measuring spoons, which may (not be different sizes now)\n add some way to connect to each other (makes it a game) velcro! magnets? Could probably carve sugar or find letters. Also, found random stamps from Portland that I could use - instead of the hoonies either to prototype (or more)"},
{page:260,type:"day",lines:18,date:"Sep 15",text:"I am on the toilet. I left Primo Passo (the girls sitting next to me were getting on my nerves. or triggering me. or something. Made me think of Crossroads. Now that I’m here I can think about creating false memories where we play together as children and both don’t feel so alone.\n It was such a relief to poop this morning at Starbucks - when there were two stalls, both empty - as opposed to the woman wrestling a tutu on/off her little girl. Forwen my reservations about using the woman’s room.\n I wrote that “song” about his mom being hot - the royal “we” but also, specifically, his actually. And it came up cause we saw his mom, and we were talking about synths, and automatic things you say\n I’m less <em>worried </em>and more excited that this writing activity has passed the point of ritual that starts and stops and just sort of keeps going on? indefinitely"},
{page:261,type:"ideas",lines:67,date:"Sep 17",text:"17th (cont)\n Working on a way to assemblate the sewing part cause it’s daunting. Once I measure the length of the wire, I can pre bend them, or pretend to. I can cut one fabric length the size of the one I already made. And then use that to cut other ones.\n _______\n could put the fly on everything, or on those (pic)\n other problems I ‘can’ work on in my head\n I made these snake things without ever writing them down before making them. Now, they can be building blocks. i don’t want them to get too neat. They could have one more element…clay - but that’s too messy. There’s no systematized way to add it. (Which brings me to my next conundrum…(idea. the automatic process is in place so I <em>never </em>have to make any decisions. Which in a way means “they” never get to make any decisions - get involved in my process - turn it into a superstitious thing - a have to - that can’t be changed….cod god…\n ok new idea: (pic)\n Spoons: I could make them smaller - the length of one of the jenga blocks\n\n2\n\nday?\nI want to go back to the garage so I can finish my orders but - automatic process - the medium kit - I can never remember it. And when I do…(exp of process)\nThe point is: you want to design yourself an automatic process - a pattern to move around with - something you can do, over and over, without thinking. That interests you. You want to design a system, so that you have walls to live in. And you can move around in them, knowing that if you make a wrong move, you will bump into them\n@@PB@@\na bit like the procedure in a science fair project, where you write down all the steps, and then you replicate it (i’d like to do this with social situations)\n@@PB@@\n oh! Chesse! you gave me a fright …”I <em>gave </em>you a fright?”\n\nIn this game, we have this goal, this strange, imaginary goal, of building a kit that will turn you into a real person. This goal erects walls around itself…EVERYTHING you need (to become a real person) - well, what are <em>some </em>of the things you’d need (there is an inborn procedure to the exercise, that comes with just the goal) and you have all the containers:\n→ a structure - with something <em>sitting </em>on it - like the garnets in their little metal home (which I could <em>make, </em>by the way!)\n← something - black balls or beads or something - made of velvet?\nwhich means there’s <em>things </em>in there:\n\nindistinct things - now, we just need to: figure out what they are\n@@PB@@\n“WAYS OF THINKING - “SYSTEMS OF MOVEMENT”\nSTART with these: (unglazed, white glaze, loose)\nSet to yourself: make a lot of these - a <em>lot </em>of these.\nThen ask: what will you put them on?\n(buttons punched in)\npill goes in them example) ok then: maybe on the inside there could be velvet (pic) → a little circle of black velvet - the shiny nice kind\n← and this is a whole structure - ends so abruptly, you’d think there’s a real purpose to it - a reason it has to look <em>exactly </em>like that - used for something.\nOK AND THEN ANOTHER THING:\na silk handkerchief, basically, and folded - (the funny thing is that it doesn’t <em>quite </em>lie flat, and that’s the main point of it - that it’s folded.\nAlso: the handkerchief(s): can go in an envelope\n(3 - folded up in there)\n←handkerchief\n@@PB@@\n21"},
{page:262,type:"ideas",lines:55,date:"Sep 21",text:"ok this is a stupid idea, but i have to write it down cause otherwise (what else is this notebook for)\n\n (pic)\n → two pieces of (”pink?”) fabric, sewn together, butt to butt (but turned out in the middle, and one pinch in the middle) o ← direct(?), sewn by itself, to itself\n with buttons. with flower fabric. DICE. ok.\n ONTOLOGY - a system that doesn’t make sense in and of itself, but it refers to something outside of itself (the opposite - this is a metaphor - an ontology of birds, where birds are not creatures that exist in this world, but are instead: made up objects “oh, and it would be cool if they could fly! - ooh, what if they had <em>wings </em>that could flap, and keep the air from under them?! And they could be black and made of velvet and wire.\n I first tried it with <em>three </em>wings - cause I thought - the more wings, the easier it could fly with. The birds, they like to fly together, in the sky. - They kept making shapes with each other, and I thought they were trying to say things to me\n@@PB@@\n Look, I can count (a bulletin board with 1,2,3,4,5 birds tacked on it - and the number, next to the bird, made of the same material (velvet) to show that they can <em>really </em>count (and maybe they’re also sort of painted - like - the paint is part of the number to have it <em>really </em>black - the number can be made of wire. And then the stuffing comes out, and gets painted on…\n BIRD DICE (in matchboxes. smaller version. button painted white)\n@@PB@@\n BIRDS WITH COMPASSES ON THEIR BACK (BECAUSE THEY <em>NEED </em>TO SEE WHICH DIRECTION THEY’RE GOING\n (plastic, giant compass, blue with red arrow)\n (close up of compass)\n@@PB@@\n inside, pin, 5 boxes (not to\n → throw them. That’s how you see what the number is. And yeah, they weigh different. But “such is life” it’s a metaphor for how <em>stupid </em>people are(?) lol(?) idk :) idk actually? …:)\n@@PB@@\n another “iteration” of the BIRD DICE\n Well: you know how I’m going to get + size scrabble tiles in the mail soon (I’m preparing) → yeah?…well - bird - tacked to tile. 1 - 1 per bird, each die (side) gets a number of tiles for the number of birds on it. AND THEN: they all get thrown at once. There is <em>no </em>knowing which ones were picked. You <em>could </em>thrown them into a constricted area - taped - or shallow box.” but. - you don’t - <em>INSTEAD, </em>you let them <em>settle </em>on the floor. And connect the ones that you think look nice together - that you think you picked. Would’ve picked if you\n@@PB@@\n had been the one to pick them and throw them. you go into the future, and you see which ones you would’ve picked, had you thrown them and the ones that were picked were the ones that the die showed."},
{page:263,type:"ideas",lines:30,date:"Sep 21",text:"Last night I made out with a girl. It was maybe one of the hottest things. She was hot.\n Ok here’s some more dice I could make\n\n “in a pinch, if you don’t have some dice, put cheese cubes into bags - different amount of cubes, depending on the side. And then throw them. Whichever one lands - whichever one you think is the best when they all land - that’s the die side that wins. (Here’s the others:\n Note: you could also do this with cheese puffs/cheese balls\n\n (pic)\n\n I woke up with a <em>hard </em>heart - and all my thoughts were changing it - some of them made it go to sleep for a little,\n@@PB@@\n (pic)\n automatic process:\n Sugar packets\n cut: (pic)x5 (?)\n step: [sugar] on all them\n sew: then, 2 on each other.\n stuff: then one by one there you go. PUT them in a pile, and now you’re done…\n NOW HAVE FUN…BUT you need to think about something in particular while you are doing it - getting BETTER AND BETTER - HEALING, or SNOWBALLING - or…IDK…ANYWAY - it’s a ritual, make sure you’re in the right mindset\n ← coin envelope with like 12 pieces of paper -\n cigarette butts on the floor of the tray which is a drawer (and has a rug on it)\n\n ← painted white\n ← tic tacs\n → they could all go in the box I guess…IDK\n ← plug (string)\n ← pink\n like a game of telephone\n <em>bad at communicating\n\n TRAY FROM THE DOLLAR TREE (</em>PLANT A RUG IN IT) - THAT’S THAT…- a cutesy one, or a pink one, with fringe (belle confusione)…"},
{page:264,type:"day",lines:54,date:"Sep 21",text:"said in an angry tone: you know how many conversations I have in my head with you everyday?!\n\n (pic)\n we switched zynns for no reason\n “oh, here - you can have mine” - as if that would do anything different…and then we put them in our mouth. Hers was very well used. I put it in for a second, and then threw it into the bushes when no one was looking.\n\n She came and sat on the couch to tell me I <em>could </em>hook up with Zach, if I wanted to. “lol, no, I don’t want to. That ship has sailed…we hang out all the time…”I’m not a jealous person…I’m poly” and then we just kept holding onto each other, Almost kissing - I could’ve kissed her. I don’t know how it happened. Finally we put our mouths so close together, and then, without really thinking I just moved mine a little bit <em>and </em>then we were kissing. And Zach was watching He was just sitting on the chair, in his uber normal white shirt, probably had his hands on his knees. I wasn’t watching him cause I had my mouth on hers but in my head, he was staring straight at us, with no expression on his face. Just watching, but not thinking…anyway - then she kept tryna take my pants off, which zipped up in the back, so she could not. I think she was trying to show Zach my boobs which I didn’t mind. Anyway - we went back to the kitchen (which is <em>not </em>\n@@PB@@\n a different room by the way, where Niha was making like a whole meal for some reason - 3 different kinds of carbs - rice, potatoes, and eggs, and markis was talking to her. we just kept making out on the couch. I don’t know - maybe we should’ve stopped. But I didn’t want to. Maybe we could’ve gone in the other room to have sex without our friends watching, but it was more fun with them watching\n on my to do list: accuse (…) of lying about not loving me. Also: ask for lessons - how to be permanently condescending. Or is it a genetic thing - high IQ associated…runs in the family\n\n Ok, for some reason, Zach does not want to sleep with me - not even in a threesome. And it’s probably for the best - I know it’s for the best…since I met him, I knew it was for the best. Are we still friends? can we be friends? I don’t know how we can be friends if he is attractive, but apparently we can.\n@@PB@@\n another pattern I could collect/am collecting: problems I don’t have ex. “how to not eat like garbage this year” (IG ad -But - I don’t have that problem (implies that you’ve been eating like garbage the past year, and that if you don’t get the product, which you won’t, you’ll continue to do)\n impression of people coming up with ideas:"},
{page:265,type:"ideas",lines:21,date:"Sep 21",text:"instead of [flower game], why not have: [coin]\n (pic)\n lol → see, cause this is a <em>bad </em>idea - and <em>yes, </em>it’s more efficient. But it’s not what the game is about. The game is a ritual. Because people don’t understand the underlying reasons why people do stuff.\n ANYWAY: THIS IS A BAD IDEA.\n@@PB@@\n I GUESS I COULD PUT IT IN MY BAD IDEAS BOX…<em>THAT </em>is a good idea - one I should actually do. <em>And </em>it solves a problem - like majorly - cause then I can just say they are <em>all </em>bad ideas, and so that’s why I won’t/don’t want to do them. For example - the mango thing - is that a particularly good idea? Idk. Certainly the sugar waiting game is not exactly a good idea. And: none of the words sounded quite right except: BAD IDEA.\n Here’s another. Find someone that doesn’t love you. Spend a lot of time with them…etc.\n PLEASE: LEAVE ME ALONE SO I CAN BE IN LOVE WITH YOU IN PEACE! (eye roll)\n BAD LOGIC necklace\n Another idea: I had: (pic) hinge bandaid - inside looks like boobies/a womb\n (pic)\n@@PB@@\n 21"},
{page:266,type:"day",lines:21,date:"Sep 21",text:"Like, when I think about the encounter, I think - oh - I would’ve liked to see what’s under her green bathing suit - I’d like to pull it away, and see what’s underneath. I bet they kind of look like mine (I am getting wet) - a little bit floppy, but mostly solid - that bathing suit was holding them so tight, and making them into a weird shape…wouldn’t it be better to have let them loose, and so they could breathe? If they felt like they had nothing to hold them up. i could’ve helped. And then, maybe, if we were on a bed, I could (while we were kissing) maybe put one finger under her green underwear. pull it aside. Maybe put on finger in there (and she would say: “whoa! what are you doing?” (Like, in her head, but in reality, she’s say ooh!\n@@PB@@\n blah blah blah at the rose gold and sorry not sorry - description (before my weird week where i didn’t see anyone (and no: evan, i’m not missing out on anything. i don’t care. - i want to miss out on that stuff…)"},
{page:267,type:"day",lines:117,date:"Sep 22",text:"Sep 22nd\n I don’t know why I feel so nervous about writing in my journal today - I brought it to hang out with Jamie. It was ok. I wanted to journal. Kinda like Doug said hanging out with George was ok, but he’d rather have had hot dumplings or whatever.\n Me, in my room, working on weird little projects, just sort of heeheeing to myself is like Becky and I hiding under the desk for the duration of the party (in that we were heeheeing to ourselves)\n Jamie has weird things with her body - her vertebrae are all slanted slightly downward, like a horse, and she faints sometimes randomly. I think I might be attracted to her, actually I know I was. She has something in common with Clemy, and I think it might be femininity. I can’t picture hooking up with her cause, as she says, she is passive. But she is queer. Kinda like a dream come true. Cause I think she must like me, if she keeps trying to hang out. If I start dating Whittley, that could be 3 girlfriends lol, just as I predicted. Haha Jonathan only has 1!!!, and he doesn’t even like her! ◬ I gave her the triangle problem <em>and </em>the 30/250 and she did both of them really fast, and actually got the right answer. Can’t wait to tell literally all of them. She has a brightness in her eyes, that makes up for her autistic way of speaking a little.\n@@PB@@\n Yesterday, against my will, I went out. I think it had something to do with frankie and JC being there, and I knew they would be cause David told me. Now Frankie thinks I’m creepy. And like literally stalking her. Which is actually 100% true hahahhaha not in a weird way. I just thought she might like me. Her partner (?) liked me (JC) - she was playing a little solitaire puzzle which answered a question I didn’t ask, about whether people play solitaire games, like the triangles one, and Memory Library (xi for yourself). We talked about her ex being on love is blind and how we both love relationship anarchy. She is a vegan. I don’t think I was actually that attracted to her, which is why it wasn’t that hard. She has a literal job, - identifying human rights violations. And so does Whittley, who explained it to me, on the couch, when i wanted to kiss her. Are any girls actually straight? I guess Niha. When we all went into the Rose Gold - bar across the street, and we were all dancing to idk - 2000’s music (no one is good at dancing - it almost feels worse than not dancing - and yeah just stand in a <em>big </em>circle, like it’s middle school, and sometimes people go in, and everyone cheers. What if the music had a beat?) zach said - if he leaves, then everyone is gonna leave. There was talk about going to ihop and then Niha and Marcus went to Niha’s and she made pancakes - that’s cool. I want pancakes.\n@@PB@@\n Niha was wearing a “deathly hallows” t-shirt, and tiny little jean shorts so she was all thighs. She came up when i was talking to JC (Jacey?) and was like “OMG - we’re besties - Sage lives in a mansion(!! lol). I wanted her to go away cause she was straighting the vibe. David said he was sad cause Juliet said some mean things to him about being an introvert - thought he’d get an ego boost, but instead she took him down a notch. He keeps it real. I gave him a hug. And as we were walking up, he said he was worried about being kicked from Kyle’s kids Next Door whatsapp group - I was like what?! are you talking about and he said his friend Anthony was kicked. I said “Oh, that’s cause he pushed Cheriz” and “yes, in an aggressive way,” went to the dollar tree tonight - a little extra errand after jamie and I were done hanging out. It wasn’t really close to where I was, but I had to keep reminding myself that I <em>like </em>driving, and that I hadn’t gotten to drive in a while. It was alright - people kept coughing in the store near me. been thinking today about basically <em>choosing </em>what I think - telling myself what to think, so as to direct my emotions where they need to go. After I walked in - I caught myself being like “Oh, I don’t want to be here, I don’t <em>like </em>this place” and then I heard myself saying over the loudspeaker in my head: “Yes! I love these kinds of places - ooh! Twine! etc” and I was like - “Oh, weird, but I guess that makes sense.”\n@@PB@@\n I guess Jonathan needs to learn to do that. And I had a thought, just before David got in the car last night - about referring back to my (our) <em>my </em>own “intentions,” or thought processes - seeing what mental state I’m in - the evidence being - what <em>types </em>of thoughts I start to think, collect <em>that </em>pattern - the thought I had was “wow - ever been to a roundabout before?” - so - kind of rude - trying to keep it light. Whenever I see someone I feel threatened by on Montana, I think “fat ugly bitch,” and it helps me cope, and I don’t think they can hear it. They are never <em>actually </em>fat. I had a thought just before seeing Jamie, but I don’t remember what it was, and all I remember is opening the front seat mirror to put on eyeliner - and putting on eye liner, and thinking “oh, good job, you’re doing a good job” because I have to try really hard. I know I’ve had the thought about seeing what kinds of thoughts I’m thinking before - the funny indirectness - referencing something - nothing - but I don’t know how exactly to make it useful, or necessarily explain it to other people, or make it into a worksheet. What I was thinking about - maybe it was last week, was chaining - how, a thought by itself isn’t interesting, <em>but </em>if you (wire?) two together - <em>then </em>it’s interesting. Which is crazy. But like -"},
{page:268,type:"abstract",lines:200,date:"Sep 22",text:"if I have a thought that I think is interesting, then i can’t write it down, till I think of a similar thought, and then I have a chain, and then i have a pattern - and then I’ve proved it twice. Or, like, when I try to clean and I can’t trash unless theirs two. It makes sense not because of the trip to the trash can, but because we’re: looking for things that will do something,” and <em>one </em>trash is not enough. Two is sort of a vaguer “ thing to do” - incomprehensible in its vastness. I can’t quite categorize how useful it is - it meets one of the imaginary criteria that makes me think I’m getting stuff done. And same when I write things in my diary - if I wrote just one of something, I could say: “oh, I guess everything goes - I am going to be less strict,” and the activity would fall apart - I couldn’t have enough of a filter <em>or </em>it would lose some of its value, and then I wouldn’t want to continue. <em>And </em>the thing I was thinking just before I took my nap (2 hours ish, in bed just now - nice, but a little boring.) - was about rituals, and how: so many of the things I (me, but I) do are (really) rituals - “for the mind,’ and not the world. Sometimes I find myself doing something <em>just </em>to end off a pattern. And then, of course, <em>because </em>of the sep<em>a</em>rateness between my actions and my intentions (oh. hmm) I can go back and trace why I’m allowed to do <em>one </em>\n@@PB@@\n thing over another. And sometimes the answer is mysterious, which implies that it is 1) insight about the situation or 2) OCD - <em>but </em>a lot of times, it just means that I <em>wasn’t done thinking </em>about something - I had something on my docket, and perhaps the process itself interfered - was trying to use the same short term memory like - sometimes I can’t plan the next action to do after the one I’m doing, or I’ll get all red signals for that particular action. but then, if I do that action first - (the one I am, had been (new tense, who dis?), planning for after, first, I can do it. OR, I can just stop thinking I’m gonna do the other one after, and then I can do the first one. This is a weird one, because it really makes it into a ritual - makes it clear that it is/was a ritual. Overview: there’s different parts of my brain where decisions come from, and various ones take the helm at any given moment. When I am very anxious, for example, I become sort of crazy, when I do this thing with my actions. There is some slip, where a <em>weird </em>part of my brain takes the helm, and I could do really anything, which is why you get all these homeless stories - times when i was controlled by the colors or clicking things, <em>and </em>anxious - because I think right now, for example, I’m very much controlled by it <em>but </em>I’m not going through lots of emotional turmoil, so it\n@@PB@@\n basically just translates to me controlling myself - spitting back the same actions that I would have taken anyway - just a little slower. I do know that some of them are more directly from a mental state that I c/wouldn’t normally worry about - sometimes I solve for things that will give me less anxiety, but not be optimal in other ways. Sometimes I introduce myself as Sophie because emotionally, I don’t like the idea of someone knowing my name. And I guess the answer is: it’s sometimes ok, and sometimes not. If my heart hurts, then I make different decisions, so as not to hurt it. Ok, another thing - it’s hard to get off the couch, or out of bed. I know it will hurt my heart, if I have to think “Ok, what was the point?”, so I have to trick myself and think: “Oh…I’m going to get some water” - or I can get to a threshold - I want to get water for so long, but then, when I think “ok, this will give me a headache if I don’t - I guess that’s some emergency fire drill programming that overrides (maybe I put a rule in place a while back that says: do not let yourself get so thirsty that you get a headache, from multiple times of this happening, and thinking ‘wow, i should not have done this - i could have easily prevented this by following [this rule] - and then <em>adding it to my list of rules</em>. And the part of the brain making the decision remembers this (question: what other rules do I remember from this decision but not from my natural normal waking life) I’ve noticed this a number of times, and thought: oh, I should use this on purpose, but haven’t. And there’s some emotional reason why writing this all down made sense when I haven’t written it before - that I was talking about it out loud - that Jonathan made it seem valid? I don’t know how to feel about him wanting me to “fix” the clicky thing - I kind of wonder if I just accepted it, and stopped thinking of it as a dirty secret\n@@PB@@\n and mommy didn’t look at me suspiciously whenever I spit food out of my mouth - IDK - I’m worried that there <em>is </em>some barrier of “knowing it’s OCD” that lets me bow out at the last second if I need to. But idk. idk idk idk. I really don’t know. I’ve had this for <em>so long. </em>It’s part of my brain.\n - - - - - - - - - - - - - -\n Why does my heart feel like it’s broken? Why do I feel like I could have some control over it, liking of him and yet - and why is it in my heart? It should be in my brain. And why do I like him so much. None of it makes sense. And why does he not even care that I exist? I have a natural aversion to this kind of middle school garbage but I’ve thought of every other possibility and I can’t crack the code! I tried to use the dots in my carpet as a metaphor to try to get out of my head - to try to rid myself of “this terrible disease” but instead I just almost killed myself and then “decided” not to by saying “god take me,” and that’s how I got out of it. J had some stuff called like “edible paint thinner” - is that I wonder: a clue. Jamie was telling me about an escape room today, and I just made the connection - I feel like I have to find the clues, and I’ll get to escape. “That’s part of a pathology” everyone would say (Jonathan and his team of (!) therapist\n@@PB@@\n - sort of like a pokemon - Meowth - that he sends out to get me - I tried not to think of it that way\n\n Anyway, I don’t <em>believe </em>in pathologies - but - idk - I’m scared to <em>think that. </em>Being very honest with “you” today” - maybe I’m drunk (I’m not drunk. Are you drunk? No). unexpected office. Yes, I got the head spins where I need to get some water. BUT I don’t want to think about <em>everything </em>in it’s path, on the <em>way </em>to get water, so I have to wait to get it until it’s a desperate enough situation. then I can go there without any [turmoil] :/ I <em>have </em>to get water. I thought of a solution - I could do what I <em>want </em>to do - stop being dissociated - stop doing things I don’t really want to do , so I can fall back on “the indirectness” which means I don’t have to…I could be embodied…<em>but </em>there are confusing situations, where there isn’t <em>one </em>thing that I should do: ex. I <em>want </em>to finish a project, but I also <em>want </em>to eat chocolate. I <em>want </em>to write in my journal but I “wanted” to finish my projects, when I was talking to Jamie, and I gave myself a pep talk in the car and I got a journal that’s called: “MAKE IT HAPPEN”\n@@PB@@\n and then there are other confusing situations where I have to remember the rules of the situation without getting upset - can’t think of them consciously - the other thought - It’s basically just me asking my brain what I want to do, and then doing it, but it has in common with OCD this sense of impending doom if I <em>don’t </em>do the thing, and maybe some shame and guilt. I wonder if Jonathan is going to text me. it makes my cry that he won’t. It’s actually insane how authentic feeling is and how I can’t think myself out of it - almost like it’s <em>actually </em>a feeling, and not a pathology. Thank <em>god </em>he likes me a little bit - if he didn’t like me at all - I think I would be sad. Or maybe I could forget about him. If there was not a smidgeon of hope, maybe my brain could just say: “nope,” and stop thinking about him - I guess that’s a competing pattern that I don’t know if I’ll ever solve. i can think of one way to solve it but I don’t want to. Also, there’s the competing pattern of: OCD VS. INSTINCT. And, if you like META thoughts, you might think: ah yes - I am anxious, because I have so many things on my to do list - if I took them off my to do list, by completing them, who knows <em>maybe </em>my anxiety would go away - <em>but </em>comparing things - introducing them with a\n@@PB@@\n certain thought - a comparison, or with a joke - as a joke, as a [game, dream, silly thought, etc] ⇒ but, specifically - comparing them to something else, so it brings out the [blues]…idk - ya know. <em>Anyway</em> - and then the idea - that I could just write a <em>book - </em>a <em>real </em>book - that’s honest, where I give away all my secrets, instead of hiding it/them - my one secret - the one thing that explains it all - all the weird decisions - like one giant “game” of retroactive pattern manipulation - dancing around them. There’s the ramachandran approach - people need to <em>learn </em>about my brain - that might be the <em>only </em>approach. I guess if I have a bad emotion, I can think afterwards: “ooh, I didn’t like that - what was I feeling - why did I feel that way,” and maybe it goes away - everything goes away except Jonathan - <em>why </em>does it feel so embarrassing and impossible to be in love with someone who doesn’t love you back - I don’t even know if that’s true - I have to poop and drink water and maybe go to sleep? ( :( ) but this was fun. I love you :) 😘"},
{page:269,type:"abstract",lines:97,date:"Sep 22",text:"Dear Diary (same day - literally two minutes later ;))\n Anyway: Dear Diary: this is a thought that I thought other people would like - not necessarily me as much. I decided: ooh! I have the best life: I have a job that everyone would want and I have some attributes like being creative and relatively kind etc. that people want - being charismatic - everyone likes me - like Marcus said - he wants more friends like me lol (meetup people all have mental disorders so that doesn’t count) <em>But anyway - </em>I was thinking about my trick - to be happy: just find things that you think people value - tell yourself you have the most - choose the most important qualities based on what you have - tell people that - “oh, you should do it - it worked for me” but everyone ACTUALLY <em>does </em>want to work for themselves and make tons of money and be relatively fine being alone and in love with yourself because you’re so smart, probably smarter than 98% of people in the world - is it a coincidence that we also have a lot of money? Honestly…idk…\n Anyway - then they will be like - wait, that’s not fair - you’re doing a trick, but you’re actually not doing a trick - like in that movie with Amy Schumer had been made with someone who’s already hot. (Here’s a joke for no one: and the <em>main </em>thing people will be jealous of, of course, is my ability to think of <em>metaphors </em>and <em>examples </em>when no one else can - I’m a real pro at that. ◬ I should take myself out to a business lunch at the Santa Monica pier - to the roller coaster and congratulate myself at the “wee” part. I kind of wanna go back to El Salvador but without my family. Not even w/ Jonathan. Not w/ Sean. Not w/ anyone - just myself. Because I love myself and there’s nothing anyone can do. But I also do kine of like staying at this air bnb with my parents. They’re renting it out, and it’s nice that they gave me my own little house. SET Theory is basically just about making a system of rules to justify your decisions - it’s another version of indirectness\n\n (pic)\n\n (picture of hand sanitizer packet) I could try to replicate the complicated matter on the hand sanitizer packet, and get it wrong intentionally, have part of the plan be to get it wrong cause I don’t want it to read like actual words.\n\n But I have to contend with the possibility of having a fairy knot situation. Also, I feel like people could think I <em>wanted </em>it to look more like the actual hand sanitizer packet. And then I would be erased. And I would not like that. I do not like being erased. And I don’t like when people telling me how I feel. Here’s an example of a pattern: when Jonathan said “Oh good” (two times - when I found the right towel. And when I confirmed that Maddie didn’t talk shit about him…that was funny cause it meant he was just disliked. Should I try to correct him - he thinks I’m not cool, but everyone else thinking I’m cool. he was surprised when i said I met a girl at a bar - why - does he actually have an incorrect impression of me, or does he just not really care, or pay attention. (same thing, one begets the other) Anyway the smile seemed detached and like he’d planned it - just like it does in that live photo from the reel inn: “I’m going to smile now! But he has a nice smile and it melts my heart when i watch his stupid long-haired IG video wow I sound gay. He better fucking text me. maybe he’s just upset/embarrassed about what happened last time. maybe he’s sleeping with his mom.\n The thing about my anxiety disorder is that: it’s there so solve my anxiety and it does the job perfectly. All I did was add a little indirectness. Why does no one appreciate the actual brilliance of this - not even me. So when Jonathan asks me if I feel anxiety - no. I don’t feel anxiety. Cause I solved it with my anxiety disorder. That’s what it’s for. I go to Cafe’s. I feel sad that he doesn’t text me. I feel happy that I drink coffee and write in my journal. I feel like journaling is and has been my new hobby. Filling up this and <em>every </em>page with <em>everything </em>I want to write. Making every page look like a newspaper with my tiny printing. Oh! Isn’t everyone sad that they can only read, and not write, like me (not everyone knows how to write). Excited to go on a date w/ Mick Burson from instagram and mess up his happy new relationship. He probably won’t let me but come on! And I could say: “Oh, I’m dating someone too.” Because, unlike Maddie, at least J said that when we were on the phone - in his normal condescending tone - good time to be condescending. JK - <em>hilarious </em>time to be condescending.\n\n (pic)"},
{page:270,type:"ideas",lines:10,date:"Sep 22",text:"red, black writing, white, velvet, black velvet, wrapped around smaller but cork shaped wood, maybe contained in a box\n mini version of the toilet paper holder, goldenrod, white\n\n black, gray, white - little street, made out of jenga blocks, connected by white bow ribbon?\n@@PB@@\n (pic)\n\n wood, fabric, lots of buttons sewn on\n@@PB@@\n (slide plastic paper through slide to p groove)\n (…easy)\n in the corner, two pieces of red velvet, sewn together\n@@PB@@\n sage’s faces in places and spaces\n@@PB@@\n23?"},
{page:271,type:"abstract",lines:51,date:"Sep 23",text:"You just have to accept things, and try to work from there (abstract painting) also -\n\n ← all that was written in basically the dark - I kind of like how the words came out. I have paint on me, but I don’t mind. I discovered some blue paint this morning, and it was difficult to imagine being upset about it. I went to Teddy’s cafe with Sean today and we only had $20 and we got Huevos and tried to get a biscuit but couldn’t. I gave him the game - triangle math problem, and watched him think out loud about it for a while. I was thinking, but actually, it does kind of matter if he can do stuff like that in his head - for job interviews. Tried to explain to myself why I don’t like doing that kind. I’d rather be printing out a thousand copies of the People Watching Club handbook - seeing the gold get embossed. Oh yeah! Finally the thought I had this morning because I was <em>so </em>tired - (hadn’t gone to sleep yet - the garnet game - assign yourself an “automatic process” - that’s impossible, and then you can’t solve it, and it comes out different every time - like if you could break a machine, and make the little cracks they add onto the babies → make the bat - wire the wings, and sew the velvet, <em>but </em>the velvet <em>can’t </em>be sewn - not in any (?) way, anyway - it’s actually the exact same as the finger knot problem - planned obsolescence or whatever. - a computer program that will get stuck. Anyway - it’s a bit stressful to plan for this kind of thing. Sean and I got stuck at a light where there was no other side - it’d been blocked off by emergency vehicles. And I was planning for what to do when the light changed - but only I couldn’t plan, cause I didn’t know what was gonna happen. At blick, I got some more wood squares large?), a red rubber block to make erasers (joke), and some other things that looked nice in the bag when I took them out - like wire, like the wire I’m planning to make stuff out of. I should probably make Frankie a box - a wooden one. With <em>something </em>muslin in it. To explain to her that I <em>wasn’t </em>stalking her - , but I kind of was, but I wasn’t - not in that way - not like I liked her - but, well - I <em>did </em>like her, but not in a creepy way. I mean, ok kind of in a creepy way. In that I want to go to her house and see what she keeps in the vegetable drawer. Then I could memorize it. Then I could know what to eat ◬ (I could eat all the same things as her, if I found out)"},
{page:272,type:"ideas",lines:11,date:"Sep 23",text:"IDEAS I HAD IN THE BATHROOM\n (pic)← but cover in velvet. (fold the corners like wrapping a present?)\n\n (I feel so sick, I think I have a headache, for the first time ever, from thinking too much\n\n (pic) ← velvet tampon holder (ones with a black bow?)\n ← the lovely black velvet, and sewn somehow embroider the sugar packets (in red): SUGAR find something raised to print\n order the he loves me not necklace and why not a poor baby necklace too\n well anyway - these were the ideas I had in the bathroom."},
{page:273,type:"abstract",lines:22,date:"Sep 24",text:"September 24 (3 am)\n I designed three projects in my head while waiting to fall asleep for the past 3 hours, just like I used to that one time when I was ?baby-sitting little kids on a field trip at wash u?\n (pic)\n 1. that thing that happened with the therapist where she accused me of accusing her of accusing me of being angry at her\n 2. THINGS THAT ARE WRONG W JAMIE\n 1. she faints a lot\n 2. she has a horse spine\n 3. her butt is a little too low or something\n 3. Hypotheses\n 1. I am the most interesting person I know\n 2. I can only do useless things\n 4. exchanging zynn with whittley\n (pic)\n (solitary confinement (being alone with my thoughts for a long (seemingly infinite) time.) living forever) → These are two things that ?scare? me, and I’m gradually preparing for this reality by making my life more like it - spending most of my time in bed, <em>thinking </em>about stuff (not depressed or trying to sleep, DGIT), and the other half journaling about what I thought about - trying to remember everything - practicing recall.\n (pic)\n 1."},
{page:274,type:"ideas",lines:13,date:"Sep 24",text:"A locked drawer in a dream\n (pic) → tray from the dollar tree\n → divide into compartments\n → only thing i thought of so far: the clock with an eye - stamp it onto fabric (pic)←wire\n (pic)\n (idk what the compartments will look like)\n\n (pic)\n 1. (Counting Down) THINGAMAJIG\n → make hands out of wire and fabric\n → sew the palmistry lines in … - it’s ok if the hand scrunches and gets sewed to the bottom (pink fabric, red thread)\n (pic)\n\n (pic)\n\n (pic)\n 1. POCKET\n Basically the same as thingamajigs, except the things are black, and it comes in a box…the box can have a picture with the things dumped out on the top\n (pic)"},
{page:275,type:"abstract",lines:9,date:"Sep 24",text:"ACTION INTENTION\n felt and sort of like the nebraska map, but of the brain, and all the spaces are white?\n\n trying to figure out what assignments my mind will accept and what it won’t. Current hypothetical criteria:\n ✓ challenging\n ✓ useless (or questionably useless…?)\n\n , so, for example: making my hands out of wire etc. is challenging enough though perhaps there is an end\n also - emotional weight, but that one is annoying.\n\n Also note:"},
{page:276,type:"day",lines:14,date:"Sep 24",text:"was having a panic attack in bed, so please be nice to me. Ate some chana masala, feel a lil’ better and just so you know: pocket is about collecting all the reasons why it’s ok to be sad. That was the first one I came up with, and that one has emotional weight. I feel weird writing this. But I tried to slip back into the colors (on purpose???)\n and the main thing I could imagine was the pinkness of the whole thing with the window, and the two Maxs (a common theme that I just identified) - Alex, and Andrew. Anyway - the pink was at the top, in two jagged lines, slightly smaller on top, and some\n\n Oh yeah! another thing I thought of:"},

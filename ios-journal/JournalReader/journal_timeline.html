{page:8,type:"day",lines:13,text:`Spent the day with mommy listening to her read her journals from El Salvador out loud. Very pleasant. She was mad at her roommates for coming in her room and drew a picture of her jumping on them - haha! - it was amazing :) She hated some girl called Kathy "I don't like Kathy, and I don't want Sally to like Kathy; and I don't want anyone to like Kathy…I want everyone who likes Kathy to like me instead" haha it was so honest - I loved it. Eventually Kathy ended up sleeping with her boyfriend (Mauro?) and she was mad that Paul Hart, her situationship, would not sleep with her one night. We had the meat from a coconut and I'm putting off making plans with anyone cause it's stressing me out how much socializing I was doing (I don't know why) now - I thought it was cause I was anxious about J - my heart feels - idk - I don't want to. I was relieved that Sonia bailed. I might hang with Eli and I'm glad he's excited. I'm mildly excited, but a little worried for how autistic I'm gonna think I am after.`},
{page:8,type:"abstract",lines:14,text:`Reading back through all my old diaries is a trip. I feel like I really was crazy, even though I do not remember it that way…some of the papers are just like "pee god" etc. for the whole page, and I stop in the middle of sentences like almost every time so it's actually really hard to follow. Also reading about some adventures that I don't remember and getting this out of control feeling I must've had all the time back then. Unclear what any of the dates are but now I think I'm reading stuff from Wesleyan and I sound so much more sense, and I finish my sentences, and everything makes sense…Have to keep reminding myself that I have normal friends - surely Evan and Maddie would've noticed if I were totally bonkers off my rocker`},

{page:9,type:"day",lines:5,text:`Spent some time outside this morning - sat on the stones eating blueberries yogurt granola - I brought out cheese and I read my essay from Wash. - I was a bit annoying, but I did think everything I said was interesting minus the bragging.`},

{page:10,type:"ideas",lines:15,text:`Another had tall towers like a skyscraper but the really interesting part was how they were getting pinched - by themselves - where was the pinch coming from…as though someone inside, with two pinchers - two fingers, together to make tongs, but with intention ooch you wouldn't think something pink would/could pinch so quickly, so quickly and cleanly…and then I saw one more - the mild flat planes of the "aloe" plant, and decided drawing x sculpting - I would like to (if I liked plants) feel the pinching with wire - swept over with fabric…see how it is hidden - no one can see it (the pinching) in there (but I have seen it, because I have drawn it x sculpted it in my mind. And the other one - would almost`},
{page:11,type:"ideas",lines:32,text:`could almost bite into it x sculpting biting (?) Wire, and see how with just a bit of cotton, it bulges out, swept over with gauze (something see through). The one that could be drawn was the purple one - note how the flowers, even though they don't look like a circle, but they do seem like a circle…(pic) once, they are not, altogether, they seem like a circle… x sculpting drawing. Black though. And hard - stern - like a sculpture…I see the secrets…drawing, or sculpting, is to see the secrets. No one wants you to know this one weird trick, about the plants (they have been stealing things from us - they have been looking at us over the garden wall…having to climb in through the kitchen window, and then so they can move out again - clawing their way back, secretly, in the hiding of night - with little knowing looks between each other - mostly those stern purple plants, who actually have sharp claws, you just can't see them in the summer light…and if the light were to be turned down…they know how to climb but they're plants so they don't know that even though we're looking at the garden through the window, that's not the way we get there (we step out the door) - they're knowing looks are still not distinct, as though through gauzy film - no one can see them looking - eyes demure, hidden behind long lashes - these black petals if you could`},

{page:18,type:"day",lines:16,text:`and all the comments said 'ew if she was a man.' out of the pods - Deepti and Natalie talking about road rage and journaling. I feel like they're both so annoying…they said they were each other's partners so they should have a meeting like nancy's partner does and I wanted to comment that they're not funny…I wish i had a partner like that…a platonic partner I guess. Last night I was thinking to make a book of dreams (cause I found a lot of dreams on scraps of paper in my files) cause that would be the right in between of reality and fantasy…basically just nonsense and who cares about other people's dreams/I couldn't start with 'I dreamt' and let people figure it out or not…I'm kind of excited to tackle the rest of the filing cabinet and 'get something done'…`},
{page:18,type:"abstract",lines:16,text:`who knows to what extent those papers are filling up my mind…so far there hasn't been anything so interesting or surprising, or honestly useful…I do think the genius scan might be good…I scanned in like 350 papers, and then scanned through them on my computer as one big document, typed some entries in as comments…the typing felt the same as reading it…idk if this is a perception thing but I feel it takes a small while to decipher something like that, and the same small while to type it…(can they be combined…?) …the revelation I had on the toilet was that - the 'cheatsheet = CS' takes some time to translate the pages…almost need to go on a walk, and translate a new page every 15 minutes or however long it takes…that is`},
{page:19,type:"ideas",lines:26,text:`the fun part…For example: I like how I depicted the trip from Evan to Zach's house - setting the stage, and the line goes across the page like a heading. I like how I 'abstracted' the two maps games that I wasn't supposed to think about - I used the 'map' symbol that I found somewhere else, and put them together - you'd have to zoom in to find what the games are about. I like how I drew Jennie and me - as if in conversation, though she doesn't remember accusing me of this. I love the textbook, and how it turns into the mini games…it shows the progression…I struggled with how to represent the Tots (this was their genesis), and to turn them into receipts…the obvious solution was to write them on receipts, but the receipts thought didn't come till after so I made a bracket because the progression is acceptable…I didn't need to have the second idea at the same time.`},
{page:20,type:"abstract",lines:32,text:`I also had an actual thought last night that I just remembered…Tot: 'I tried to explain to grant…you listen all day…72k minutes…you listen to sad songs all day' ('I listen all day') — no, actually, even though these are my 'top' songs - a higher proportion of the time is spent listening to fun upbeat stuff, but 'it doesn't get tricked into being in the algorithm' because it's all different…Then I thought: ah yes - math is just how we explain things to ourselves (it helps to think: in highly stressful situations…'that's when the math comes out'): the mode vs. the average vs. the median vs. the mean…I thought of them as 3 colors of sheep…black, gray, and white…and somehow could make a math problem where it comes out different, depending on how you take the 'average'…anyway…math is stupid, and we should just realize that it's how our brain explains things to us. I am really into the transitive property though. The Venn diagrams feel like algebra ex. Serafin changing the light bulbs from white to yellow 'it's more relaxing,' he said (relajando) and I've been fretting about running out of cream notebooks, and having to use the white ones → yellow is relaxing`},
{page:21,type:"abstract",lines:8,text:`Sage: 'stop solving problems in these weird ways that don't make sense.' ex. Ayanna ice cream - aw - I feel bad about my time in Bushwick - also solved a problem at the time…aw, I don't have anything to do - she was my little friend - a respite - and how I learned about Bodegas (cherry garcia) → #homeless. Anyway. (pics) Note: things to draw: the light bulbs changing, ayanna ice cream, and note that relationship was platonic, but it felt a bit special.`},
{page:21,type:"day",lines:24,text:`evening — Told myself not to fuck Jonathan even though I shaved cause I wanted to and wore my cute unders. Then I let him cause I felt too good. I was a little upset - we laid in bed for…idk ~2 hours - he was napping…I woke myself up with a start because I remembered - oh no! I forgot to set a date to hangout next and then realized he was still there but our foreheads were touching and the situation was so confusing, and I had to keep realizing it over and over again and I could not move - not even an inch cause every part of our bodies were intertwined. Eventually, he 'woke up' but he just changed positions and said 'aw it's ok…don't worry, I'm still here,' in his sleep, and pulled me close to him… I tried to make an autopro for me to do when he left I was scared…for my heart…I realized that my disorder…disease, is like that etching sketching that Sandy used to do and I want to do the teacup version…I want to be strong like Zeide knows I am… This morning when I went into the kitchen, I didn't use anything - I just cooked - barely even made sure about beans or eggs or cheese or whatever…tortilla with butter was good. And I made two eggs and they had the wrong color, and then I`},
{page:22,type:"day",lines:22,text:`ate everything and perhaps was a bit flimsy, but mostly it was fine. And it felt good cooking - like a person - like I was a real person. Like I could be a person, and not have to pretend to be, and could decide to use beans based on whether I thought they would taste good…so then, when I was locked - trapped in bed, I tried to be the good strong teacup - one single line - not sketching - each decision in the outline of a person but just: a person: right off the bat. That would be nice. That would be me. And it is me…even if my heart didn't recover and I didn't know what to think, and whether to think 'i love you' over and over again like a mantra… How cruel to keep me locked in love when I had said how terribly hungry I was…could barely breathe for wanting to eat. I had planned for him to stay, and I had planned to see him on friday, and he kissed me - I didn't love him till I saw his face - locked in his arms. As if he was a princess and I could not help but stammer when he lets down his hair - a nice lovely kiss and 'Let's see each other on friday' and all I had to say was: ok. discussion Questions: how did he feel, knowing he messed up my rule - adds another dimension to rape. I was raped, even though it felt good, even though I wanted it. First he made me cum with his fingers - so easily, and I came so much - I peed in his pants.`},
{page:22,type:"abstract",lines:10,text:`The other metaphor I came up with was: ex. filling MS paint with black, and then erasing it, section by section, which has in common with: ex. thinking of lots of thoughts, just so I can write them down: it's satisfying, and you purposely 'mess something up' to get the satisfaction - to [undo] it is what they have in common.`},
{page:23,type:"abstract",lines:8,text:`I'm kind of scared of how small my handwriting is getting → feather voice (pic: wood, pearl sticker, star, heart) hearts and stars for love…throwing them at him to give to me…eventually, I remembered that I was the baby girl.`},
{page:23,type:"todos",lines:16,text:`Now I have a whole list of thoughts I've forgotten, and because it's a list, I guess I can list it right now: 1. (pic) feather 2. the autopro moment in the shower in Rebecca's mirror. 3. all the things I was thinking about while I was waiting for J to wake up (but I didn't want him to) 4. The other thing I was thinking about autopros - today, while in bed…the second one was the autopro of telling yourself to start collecting a certain pattern…in that you'll do it once you open the drawer.`},
{page:24,type:"day",lines:16,date:"Feb 4",text:"Here's the truth: I couldn't get out of bed till I'd had my morning pie. I dropped a green glass bottle what feels like a few weeks ago but it might've been a few months at this point. I cleaned up about three times when I was having parties, and everytime, saw it there, and thought: ooh boy: this is one of those messes that needs to be cleaned up fast. It stayed half under the bed, half under the white rectangle I found on the street until recently, when I cleaned it up. Now I get little pieces of glass in my socks about once a morning - sometimes at night when I go to the bathroom. It's something I was afraid of, but now I kind of enjoy it. For example, I have a little piece of green glass in one of the black socks I'm wearing right now - long, so as"},
{page:25,type:"day",lines:3,date:"Feb 4",text:"not to show off, I can feel it when I walk. It reminds me of summer ;) (no jk)"},
{page:25,type:"dreams",lines:19,date:"Feb 4",text:"Anyway - I had three dreams last night - unremarkable except for the fact that I remember all three of them. In one, Jonathan Small was a mixologist at a party by the pool, and I felt so guilty for ordering a drink without alcohol, like everyone else. But I knew I didn't wanna drink. In one I was talking to mommy about buying a sweater (he was mixing drinks with all sorts of colors, and mine had orange in it, like a sunset - standing half in, half out of the pool. I was getting frustrated that we were both saying the same thing - we were packing for a trip. And the last dream was the longest, the oldest, the most dramatic - going into someone's house, her sister was sleeping and she decided to take money from her sister. Addendums: everytime I stepped down with my foot. Now I am watching myself eat granola, and I am enjoying it as I enjoyed watching the squirrel eat it."},
{page:25,type:"ideas",lines:11,date:"Feb 4",text:"I forgot what a tray was for, and started putting memories on it. Then the game was easy and obvious: figure out what they have in common. And, I thought: what if, in XI - two people give memories, and then another person from their head has to come up with what is between them. I set a bar for what goes into the journal, so you have to build a tower to get in. One thought can be bought for coins - sweet, shiny, new coins that pay. Buddhism is: a gumball machine, where each gumball is a coin."},
{page:26,type:"ideas",lines:9,date:"Feb 4",text:"I suppose you don't need the idea if you have one shiny new nickel - the object suggests the idea, succinctly. Also allows me to ask - what other objects suggest ideas? The second pattern I'm intentionally collecting AY (after yesterday). Time to collect a bit more meat (my solitary assignment: scanning the papers, deciding if any more are worth remembering - scanning cursorily, to see if they're worth forgetting."},
{page:27,type:"dreams",lines:34,date:"Feb 5",text:"Dreamt that I was climbing a mountain to get somewhere, and I took a wrong turn - google maps 3-17 minutes. I wanted to turn around, but there was a black guy with a backwards red baseball cap lingering at the top, and he saw me and I kept sorta pretending I lived at this one house, assuming he'd hopefully go away but he didn't. I followed someone into the house and there was a dennis quaidish man that was the opposite of perturbed when he saw me there and said \"they're gone\" for the weekend. And asked if I knew anyone he could invite to his 11 year old's birthday party. Then the black guy came to the door, and I showed him I was calling 911 on my giant walkie talkie phone but he came in anyway and I had to tell the 911 operator, if she could possibly bring, like, one police officer, not like a whole SWAT team. I was sorta slow motion dodging him around the house, casually putting other people in between us. And then the police man tried to handcuff Dennis Quaid and I had to butt in, and tell them - no - it's the black guy with the red baseball cap. No one seemed to have the feelings or reactions I would expect in the situation. After that, I dreamt I was with Katherine, Austin, and Bede. They were sort of following me around all day. I gave them each a bunch of hand tokens from a kit I was making. I went upstairs to get weed cause Debe mentioned smoking a joint but someone had taken all the weed from my little jar. And there was another dream late at night - I woke up cause I was too warm, and I had been dreaming that there was a toaster-looking heater who was programmed with AI"},
{page:28,type:"dreams",lines:17,date:"Feb 5",text:"and it was very nice to me, but it was also talking about thinking it may have been programmed wrong, because it shouldn't get this hot, and I was mildly impressed it had the bandwidth to self-diagnose. Anyway, when I didn't get colder, I realized I was sleeping, and woke up so I could take one blanket off, and kick my foot out from underneath the covers. Oh yeah, and another intermediate dream - I was surprised that the buildings in Greece really looked as white and facadeish as you always saw them in pictures and then I saw buildings in Japan - a tree shape - each apartment looked like this (pic) and it seemed only big enough to fit a person like that - the apartments were coming off the interior core like leaves off a tree, and I was wondering how people lived in there."},
{page:28,type:"day",lines:26,date:"Feb 6",text:"February 6\nSean over yesterday cause we \"made a date\" for Wednesday, said in passing. I told him I don't need to say sorry, and that M never did anything wrong, cause he was implying that \"everyone makes mistakes.\" Watched Severance. Made pie. Talked. He stayed over and then left, idk what time. Little League draft at Chin Chin - our waiter loved telling us about it, and gave us free rice and we discussed if/why Sean is broey. He had to tell me about his football career, but I'm kind of sick of it. He says I can buy him clothes, and he'll pay me back. I hope he adds money to choosewhatiwear. I explained it so clear to him - about Jazz, and how she's making a different app - a money making app - he lost the plot. I said, he can go with her ideas and try to make money but it's antithetical to the purpose, so he has to choose one. Privately, I'm appalled that I had to explain it to him and that he couldn't know what symmetrical meant when he messed up my mosaic design. At a certain point at dinner, I got confused - he asked to see my fortune and luckily, he didn't get mad, but asked if I was ok. When he went to the bathroom - I cleared everything off my to do list: drink of water, tiny bite of cookie (happy, peaceful)"},
{page:29,type:"day",lines:4,date:"Feb 6",text:"etc. Oh yeah - he got me more chili sauce. That was nice. He does nice things for me all the time. We wore the same pants and daddy was amazed that we could both fit them."},
{page:29,type:"ideas",lines:21,date:"Feb 6",text:"Before Sean came, I was intent - at work \"borrowing\" stickers from my pdf for my .psd. Trouble even thinking about which stickers I might want so I found a weird way to not have to imagine which was 1) put it if you like it 2) put it if you might like it. Before that, I was getting pretty deep into making my own handwriting font, which tbh is something I'd been putting off. Then that night, I thought I could make a tiktok/reels series where I quickly explain, in a series of white on black screens about obsession, and how that leads into the art-making process. I think the pre-Tot was: it's nice that I have more than one kind of work I can do, and then I realized that inspiration and brute force are both different autopros, with different rules - and yeah, that's the part I like. Methodical, meticulous. They value different things. I could make an abbreviated tutorial that would have that in the middle, to explain it to people. It also seems very clear"},
{page:30,type:"ideas",lines:16,date:"Feb 6",text:"to me - the part about making up games for yourself, to the point where I had to wonder, in the car yesterday, whether I'm doing art, or just amusing myself. Iterations, and processes on top of processes. There's something I'm interested in, I don't know quite what it is, and I'm getting closer by doing these processes. One set of rules: free form, that I sort of broke the other day, by trying to come up with what to write. And then: going back over, checking, discarding, deciding which parts are interesting. Part three: distilling: making these diagrams. Part four: extracting: taking the stickers, and re-imagining them as something else. I came up with a new, high integrity process: going back over with a fine-toothed comb, and decided which"},
{page:31,type:"abstract",lines:17,date:"Feb 6",text:"sentences were the best. There were a few criteria: is the sentence itself interesting, vs. referring to some other idea I had. A lot of them were set up like jokes. Some were the type that contradict themselves - petite paradox. Two nights ago, I had a new thought, and it was that \"I don't always have new thoughts,\" referring to the old assumption that a lot of my thoughts are old - I have them over and over again. The weird part is how many stops there might be on that train. STAP: this is what SOMs are for - artificial application of SOMs is the solution. Lucky charms ring. I thought of a metaphor in the garden: man is to woman as woman is to inky children (I invented bald aliens and just now realized they were babies). Whatever they have in common felt like the cherry blossoms I was passing in the moment"},
{page:32,type:"abstract",lines:5,date:"Feb 6",text:"The thoughts that I dredged up in the garden that day, on purpose, were old thoughts and not worthy of commemorating. The conclusion was: everything's counter-intuitive, and I need to collect them all so as to get them out of my head and not get tripped up."},
{page:32,type:"dreams",lines:15,date:"Feb 6",text:"Oh, and now onto my dream: I think I had just come out of elementary gym class, and I was meant to drive someone somewhere, but I messed it up the first time. We left our other friend on the side of the road to hitchhike with this woman to get my car. The woman driving us made assurances, and we were going down on this long steep drop freeway that I'd never been on before, that felt dangerous. I also dreamed the next Severance episode, in which you meet a bunch of side characters. After I woke up I told myself not to think about Severance so I could remember my dream. Then I found myself thinking of the scientific way to combine waves, and that caused me to remember my dream."},
{page:32,type:"ideas",lines:7,date:"Feb 6",text:"T-shirt design: guy sniffing sunflower - I like men who like flowers. Plastic hand: handing someone a letter is an indirect way of delivering a message that allows me, who feels shy, to tell people things. Other 2 reels I wanted to make: \"I learned to be mean\" - the metaphor machine - set theory, how we judge art - \"zooming in\" about abstraction."},
{page:33,type:"ideas",lines:3,date:"Feb 6",text:"characteristics, but ends up looking weird cause there's nothing connecting them."},
{page:33,type:"todos",lines:7,date:"Feb 6",text:"I decided I'm gonna do the rest of the drawer since it's not taking me too long to scan anything. \"To Do\" today: 1. go through more Doen dress content, and draw pictures. 2. September Stickers, and then think of a way to divide them into pages, but first cut off all the ligatures. 3. go through 1 (one) file. goodnight Baby (I love you)."},
{page:33,type:"ideas",lines:11,date:"Feb 6",text:"I sat deliberating for a while on whether to go to Primo Passo with Sean - it is raining, it would be nice to go out - to use my scissors (shiny, sharp), in those pristine halls. I filmed myself making the stickers. The sleek shininess, and their sure structure, unafraid to come across as constructed - a moving, walking sculpture for the feet, pure prudence and importance, confidence and intention. Before that, I was deliberating on how best to document my progress regarding the stickers. To trace the trail"},
{page:34,type:"ideas",lines:18,date:"Feb 6",text:"backwards, let us begin with our first thought of the day. My first thought being: on a day when I can do whatever I want, I've invented something so completely what I want, that it uses my tools, and my materials. It was not good enough to choose my favorite font - I had to make a new one. And it is not that I like it - it is only that it is completely whole and complete - authentic - mine. What I discovered about the stickers: 1) I do not think the handwriting suits it very well. 2) they cannot be too small - it makes them hard to handle. 3) some need to be altered - darkened or cropped. The good news is that a lot of them came out well, and can be used as is. I can see narrowing it down to one half sheet per month: September, October, November, December, January. The second thought was of all the diverse processes that need to be done."},
{page:35,type:"ideas",lines:14,date:"Feb 6",text:"the intuition, which of course is the same process used in Pairings, for both the images and the sayings - singling some out from a large body of images, and then, if we zoom in, requires each various different processes - elimination, erasing. It was mayhem justifying which process I wanted to use. The kind of procedure that is generated when you don't know exactly the goal - the goal keeps changing - there is no overarching theme. In the end I will have all nice little stickers, with black lines, all the same thickness, most won't have words, and then I'll take my sheet of treasures and do something with it. Something mysterious and important."},
{page:35,type:"ideas",lines:23,date:"Feb 7",text:"February 7\nHad some dreams last night, but I don't really want to recall them. They were not particularly pleasant or interesting. Instead I'll recall last night before bed: I started on my trickiest assignment - summarizing the thoughts of months past, and made speedy progress. The hidden mechanism was that there were only perhaps 2-3 thoughts in November, one in December, and 2 in January. Once I believed that, I narrowed it down to the four notebooks of September, and the three of October. On October 24th, I was so sure that I was going to finish the Tot assignment. The 22nd was the hike and that night I discussed fine-tipped instruments of abstraction with myself. On October 27th, I went to Rebecca's Bridal Shower. On October 28th, I had a panic attack. I decided the best way to go about the task could be to take advantage of my temporal memory, and its apparent connection to real world events, and make a zoomed out calendar. Instead I went inside and Very Nicely finished up my drawing and made a recreational metaphor when I strictly said to"},
{page:36,type:"ideas",lines:16,date:"Feb 7",text:"finish October, as a permission slip to put my \"undecided\" of September in a plastic envelope. The next dream was more of a thought - perhaps there was a flood - blue and gray tones and I was traveling through the city and I had the thought that cars going over storm drains - it's a lucky coincidence their wheels are so wide. To update you on my progress: I first drew by hand, then printed eight sheets of pages, and now I've finished filling in almost all of October, the \"real activity chart,\" and a lot of September. I slowly had the idea of where exactly to put the \"mental activity chart,\" and ended up typing all of October in. I had the thought \"Oh wow - this is very convenient, whoever made this chart knew exactly how I needed it\" - thinking"},
{page:37,type:"abstract",lines:11,date:"Feb 7",text:"things are coincidences when they're not. I'm daunted by the sheer number of ideas, size of the content - it seems each day could have up to seven ideas and I don't know if I can keep them all in my head at once. And too, the ideas produce emotions in me, spur me on, which halts or disrupts the processing. However, I do feel I've met all the challenges head on thus far and so am confident I'll be able to meet this one. Notes I had while I was working: 1. to try to put something in every space."},
{page:37,type:"dreams",lines:11,date:"Feb 8",text:"February 8\nSlept badly, and I think it can be explained by the fact that I committed a double homicide in my dream. I woke up at 2:58 am and fell back to sleep around 4:00. Dream: I was on some sort of trip - Hawaii? Cold gray/blue tones. I was on a balcony and pushed a girl over the edge. I spent a while trying to make myself not anxious about it - I didn't do it on purpose, she's not really dead, but in the end, I just had to change my perception of myself to being an evil person. Another kill - a man who had been mean to me (but"},
{page:38,type:"dreams",lines:15,date:"Feb 8",text:"didn't deserve death - J?). Now it was final and done. I told him about the murders, and he made joke about it - teased me \"Now you're a triple thread.\" Mommy did not seem too concerned about the deaths, but she knew both people. My second dream I similarly remember in vivid detail. I was at what turned out to be a comedy bar. Sat between Noa and Maddie and Noa got drunk and I took her outside and she was confessing stuff because she was drunk. The comedy wasn't that funny. Took away a letter from a cardboard scrap - revealed it to say: \"hinge:\" and thought Maddie might be jealous. The dream before I woke up at 3 seemed an almost perfect continuation of what I'd been doing in bed before sleep."},
{page:38,type:"abstract",lines:14,date:"Feb 8",text:"In the morning, my theory was that when my systems get \"unaligned\" (severance) then the directives seem to be coming from nowhere - some mysterious place. But as I felt aligned, it became clear that they were just my thoughts represented to me as colors, and even the having to kill myself was just how I felt at the time. I suddenly gained the power to \"control\" myself and started seeing certain feelings that were manipulating the system, such as anxiety, but also \"fear of disappointment\" - buddhism pathologized. I allowed myself to want to think about the continued iterations of the ink-drawn diagrams, and to dismiss other thoughts"},
{page:39,type:"abstract",lines:17,date:"Feb 8",text:"that would hinder me from continuing my pursuit of the best way to \"map\" my thoughts. I reminded myself, manually, of all the times I'd decided that it's best to stay on the main path. In my dream, the thoughts were white on black, printed on sticker paper, and I was doing complicated but pleasing maneuvering to get them where I wanted. My efforts were in the form of a pink line, that circled things and drew arrows of where to put them. In the morning, I watched EZ-Book Design, and said to myself that the people in the comments didn't know why it was appealing: he simplifies the process of making decisions into bite-sized chunks - the paradox - it's about making decisions - he both explores indecisiveness, and takes it away. I felt guilty for spending so much time on instagram, but how is it any"},
{page:40,type:"abstract",lines:17,date:"Feb 8",text:"different than taking a class on graphic design? I feel I learned so much. It inspired me. automation + artificial - get an idea - do it in a way that can be undone - then: intuitive mind: \"do I like it.\" The hidden mechanism of turning it on and off gives me a headache - trying to paint the inside of my mind - house painter - also a metaphor for myself, meant to be misinterpreted. I was inspired to see my own process as iterative - not new, only validated. When I remember that the goal is not acting, but a process - the process of making the stickers, and deciding between them. Reassurance: I'm not going to use any of the new diagrams for the stickers - I'm done with the sticker project. Directive: enjoy the time and deliberation it takes to decide which things to illustrate."},
{page:41,type:"ideas",lines:5,date:"Feb 8",text:"Books will be nice and stackable since only a few pages each, and with nice kraft covers, no one will say they aren't books. Book design: fake paper, perfect for the intended audience (me), with real sticker paper, ideally ripped, not cut.\n"},
{page:41,type:"day",lines:16,date:"Feb 9",text:"February 9th\nWent to 1010 downtown - saw Niha. everyone was complaining at Ramen that she invites people out and then doesn't show up. Zach came in the end and it was nice to see him again - we ended up chatting for a while, and then we left. I didn't even know why I wanted to leave - I just didn't want to be there anymore. Loud, social anxiety - it's about time I became autistic. Before that, I met Wesley and Marlon at All you can eat sushi in Little Tokyo - way too much food and I had to force myself to choke it down. Then we went to the Stationary Store, and got 0.28 pens, and a small horizontal watercolor book. Last night, at like 1 am, we went to Ralphs and got all sorts of random snacks - we went there to get totinos pizza rolls based on a tiktok we"},
{page:42,type:"day",lines:17,date:"Feb 9",text:"watched and I choked on one of the veg chips for the whole latter half of the car ride, and then when we got back, he still didn't even get me water - I had to get it myself which I wasn't allowed to feel upset about. And then we watched \"The Curse\" with Nathan Fielder. At the party, which was at this random divorced lawyer's apartment, he asked if I was worried cause of my moonstone ring, and I said I was divorced. He seemed to have no idea how all these people got in his house. I wondered why I was attracted to the oldest person there - perhaps cause he was the only one who seemed able to carry on a conversation. Oh yeah, and I offered to take this really sweet cute asian girl that met Markis at a coding meetup, and past broken glass and a dead rat that was ngl kinda cute. There"},
{page:43,type:"day",lines:15,date:"Feb 9",text:"were lots of nice moments today, and quite a variety of situations - in a way could make up for the many days I'd spent alone in my house. Just like all the other times, I never really \"decided\" to end my long stint of being alone, but seem to be hitting the ground running. And the party we ended up at wasn't even in anyone's plan. We met him at the sauna - this extremely loud talkative black girl who collects perfumes from Quatar. Wesley, Michelle, and I, who felt like the 4 jews wandering in the desert, found three massage chairs. It was mildly pleasant. It was nice to get out of the cold, both literally, and metaphorically. I convinced the six of us to get Ramen, and bad mouth Niha - a genius move."},
{page:44,type:"day",lines:22,date:"Feb 9",text:"I went outside (at the party). Once I got overwhelmed by the music and I \"didn't care anymore,\" and was offered cocaine by this hot black lesbian, who had repeatedly found reasons to take the 40-year old divorced lawyer away from me. To do cocaine and I guess I said \"wow\" and she made lots of fun of me for suddenly becoming white, extra funny cause I am white but I thought it was funny anyway - like \"golly gosh gee whizz.\" I saw a picture of her and her wife and she asked me what I was. I said: \"you mean bi?\" and I liked that she just asked me, and I could say yes. She said she could always tell, but niha was an exception. Then she said she was a \"gold star\" lesbian and asked if I knew what it was, and I said I didn't, but thought I had figured it out and then she was like: \"Wait, why are we talking about this if you don't even know what it means?!\" and I was like: \"is it when you're a lesbian that's never hooked up with a guy before\" and then she called me Elon Musk cause of how smart I was. Then markis"},
{page:45,type:"day",lines:15,date:"Feb 9",text:"put on 212 cause he somehow knew it was my favorite song, and she was like \"who knows all the words\" and I did. Then later, she picked me up. 40 div/law said his get to know you game: something you're attracted to but scared of and I said the chocolate muffins and he said \"eating blow fish\" and then I didn't wanna talk to him anymore, cause that was a stupid answer. Towards the end, I saw Niha, Markis, and Zach all going towards the kitchen, and I followed to see why, and Zach said \"Do you want a cupcake?\" And I was like: \"Oh. my. god.\" \"yes.\" and I was sooo excited, and Markis gave me the first bite cause I'm the guest of honor, cause I never come anymore. And I got a chocolate chip in it. Jonathan really wanted to f"},
{page:46,type:"day",lines:20,date:"Feb 10",text:"February 10\nIt feels illegal to get up this early (8:36) knowing I went to bed at 2:15 but I am anyway. Accidentally froze my blackberries and taped my yoghurt shut to put it back in the fridge. Escaping in my mind to New York during infinite handwriting practice - going more into my mind by drawing little pictures of all the nice things that happened yesterday. J said he hadn't fucked anyone else in like a year and a half - since we met. First of all, we met exactly a year ago (Feb 8th) and second of all, he's fucked two other girls - Lane, and one other - I dreamt about it - I remembered he was lying about it in my dream. He said, just before he fucked me just to be nice, that he had so many dreams about me. His head was above me - a blob in his black sweatshirt. Last night I intentionally stayed up late, past the point of tiredness, cause I wanted to \"finish something\" - I even went back, and drew pictures for old days."},
{page:47,type:"abstract",lines:11,date:"Feb 10",text:"Retroactive reason to leave a blank page after every entry - so I can draw the things for it, but it breaks my rules - you can see what rules/how I'm feeling ex. writing the \"i\" as uppercase (I'm following the conventional rules today) cause I'm gearing up to will power, because I know I want to work on something. I'm making the lines stay straight. I've stopped using paragraph symbols, and I'm not in a huge rush, so I'm spelling out words like \"cuz\" cause I don't want to feel rushed retrospectively."},
{page:47,type:"day",lines:12,date:"Feb 10",text:"Took a nap, ate the food I ordered 41 mins before I fell asleep (yummy mole!), took a shower and now it's sunny, though I'm inside journaling. Now that M is giving off competing patterns, I remember the pre of my obsession slideshow - competing patterns, missing link. I thought of some other things that happened at the party - J telling me about his \"first date at Father's Office\" where he randomly kissed a girl, and neither wanted it. Wesley complaining that the \"gorilla stamp\" on his bag was evidence of racism. Marlon didn't wanna come to the rooftop party, and"},
{page:48,type:"day",lines:21,date:"Feb 10",text:"I took that opportunity to \"let slip\" that I make a ton of money because they were saying marriage benefits and I was like \"no, it's a parabola.\" Then I realized I couldn't explain the math without inserts - they were so sure that they had so much money with their tech job. They were visibly and audibly surprised. And then Wesley was like \"she's bored of talking about work\" and that made it so much better. I found this jar of jelly beans and became transfixed with all the colors and told the divorced host that if they were mine, I would totally organize all of them by color, and he was like \"oh - do you have OCD\" and I got to say \"Yes!\" and not be lying, even though it had nothing to do with wanting to do that. Then he asked if I was married after seeing my giant glob of moonstone on my finger. I chose \"divorced\" and we got to bump fists. What they have in common: the ability to speak the truth and be completely misunderstood. Ok fine! I'll write my dream.\n"},
{page:48,type:"dreams",lines:19,date:"Feb 11",text:"February 11th\nSomehow managed to sleep from 3:00 - 11:00, despite the garbage truck. And I remember so many dreams. I'm starting to think the main benefit of dream recall is the competitive aspect - the impressive featness of it. I dreamt that when she goes to the boiler room in Spirited Away, he directs her down some hallways, and she finds herself in a weird cookie making room where the cookies are first extruded in the shape of a loose pine cone, and then each of the petals are cut off to make relatively normal looking cookies - macaroons. As part of the procedure, me and this slightly curvier malaysian woman had to go into this side room, and get fucked by two men. Mine was peak attractive. I didn't mind at all that he had to fuck me. But I told him to go deeper and he just went faster - too fast, and seemed to be offended. I was thinking how J at least knows how to go deeper."},
{page:49,type:"dreams",lines:5,date:"Feb 11",text:"In the next dream, J was watching me interact tight-lipped with his brother Robert, and said afterwards he was just making sure I still liked him and didn't choose his brother. We were in some sort of high school gym."},
{page:49,type:"day",lines:9,date:"Feb 11",text:"Last night I really wanted to talk to J and almost texted him a playlist with soft stars, hard thunder on it, and then my phone died, and I thought better to leave it that way. Then I discovered that at like 11:45 he'd sent me a video of him reading a passage from Art in It's Own Terms and then he got into other poets like Wallace Stevens so we talked on the phone for two hours and I watched him eat ice cream."},
{page:49,type:"ideas",lines:7,date:"Feb 11",text:"Anyway, I think I ought to go in and get started on my \"work\" - either making stickers, or drawing random drawings from any and all the journals - my favorite in that it is random, or continuing on the train of the tray idea, or continuing to fill out those blue sheets - the calendar ones, or typing entries that I have not typed (like this one?)"},
{page:50,type:"abstract",lines:21,date:"Feb 11",text:"I'm having trouble with the order of things. Perhaps I need a retroactive organization heuristic, so I can start things as a collection. For example: I know I need to include the religion project. And, most recently, I've been thinking about \"New thoughts and old thoughts.\" An unrecognized Tot is when I say: \"Oh - I need to summarize everything, so: bit by bit, in order.\" The parts about J - the crazy parts that I don't know what to do with - they're all nice, and special - the pretending I'm going to marry him - the fanfiction where we go out on the field trip. And then there are some random speeches I gave in January. My dreams can all go together, to be discarded. I have to study the nature of the diagrams more to find out: are they all equally valid, and if not, how much discrepancy is there. Is there some way they can all be separated, or would it be difficult to get them unstuck, like glue in hair, or two pages of a book that have been stuck together."},
{page:51,type:"abstract",lines:21,date:"Feb 11",text:"oh, and another is the days I spent at Primo Passo, buying autopros in bags, hidden mechanism, autopro. And then there is all the imagined ones - as though they were written - things that come up in my memory - like that time I explained how games can get you to a certain mindset, and then Siddhartha held me close, and was proud to say I was his girlfriend, but the real miracle was all the other times that he didn't. If I were to pick up at the diagrams - draw a line with an ex-acto - I've already accepted the unequal sections. Set theory is contingent on whether these topics are a history, or a future history. Instruments of Abstraction. Tots, interspersed with lil' ideas like the scrolls idea, which would be small. And that thing with the pebbles on the hand, that I thought of in July. The essay that I wrote for Evan about abstraction being small. The thought about the rituals, and all my trying to understand OCD. The hexagon idea, that gets modified - this is a"},
{page:52,type:"abstract",lines:16,date:"Feb 11",text:"good example cause it has a clear progression, and there are only two, and the second one makes it exponentially better, and there is an explanation as to why. This reminds me of the receipt idea which started with waiting for Cassie at the extra chunky show. Perhaps there could be some magic if I were to assign a drawn sticker to each thought that I have, and to move them around. I was just thinking, for example, of why that therapy session was so hard for me, and I think it is because there was a hidden mechanism in which the whole world was pretending it was one thing by calling it therapy and J constantly convincing me to do it, and another thing where some ugly lady who I don't know tried to push me, refused to acknowledge what I was saying, and misunderstood."},
{page:53,type:"abstract",lines:22,date:"Feb 11",text:"I see a couple ways forward - call them goals, call them processes. I could start by \"describing what I see\" - and that is a lot of dense information, most is useful, some not - there are some thoughts I want to cross out cause they make me uncomfortable, and some ideas that are not that interesting. I see myself reading all the info on one subject and then making it so the information is correctly proportioned to how important it is, on one single sheet of paper - a \"hidden mechanism\" poster, with all the different uses of hidden mechanisms in a constellation. There's the one where I have some action on my docket, and I can't do it cause I don't know what it is, because it's \"in the fourth quarter\" - it's a non action. The other plan of attack is: find my favorites - I liked talking about \"non-action,\" and the plants stealing the silver coins, and the good idea/bad idea toyball machines. I could make a long list of ideas, and either put them under the good or bad idea gumball machine. Ah yes - the idea I had in the shower - to"},
{page:54,type:"ideas",lines:17,date:"Feb 11",text:"make a personalized worksheet so that each date was a box for sculpture ideas, a box for random thoughts, a box for angel ideas. I could start tossing the medium size ideas in a box so I don't have to go back and find them. Question: how big of an idea is the \"house bag\" or is it just called \"big idea\" (deceptive)? I need to take the time to read through everything, and try to understand what I was saying, connect the dots back. The unrealistic idea that appeals to me is to create a new book with only shiny ideas that gleam brilliantly - like the garnet game, like the pebbles counting. Was having trouble writing anymore but meta journal helped. The two thoughts that I wanted to write down was when I was covering my boobs and J was like \"I'm inside you\" in exasperation.\n"},
{page:54,type:"abstract",lines:18,date:"Feb 12",text:"February 12\nOne thought - like an ember in my heart - single serving, like a yogurt cup. I woke up feeling nice and healthy and good because of some thought that I must've had still in sleep, like a mug warming my hands. And then, in trying to recall it, I remembered all the nice thoughts I'd had the day before - it worked like a perfect mechanism, as if I'd designed it to make me happy. I should be writing more - I always want to be writing - as if I had a purpose. And, more and more, I am writing - I want to be writing - but I have nothing to write. I solved that by \"I should write what I was already writing\" - because there are so many things I was not finished with. The tray idea, for one - I can use stickers, make stickers, put them on bead trays, because they are temporary, because they are preparing for something. I used to just write"},
{page:55,type:"abstract",lines:23,date:"Feb 12",text:"the abstraction - what I had concluded from all my samples of evidence. Now I know I need more than that - I need the evidence itself. And so, I write like a ghost, not knowing what will be useful in the future. J tried to convince me that this project was writing. Luckily I knew it was not - moving around little images - stickers - I think it is closer to math, playing with abstractions. Then he gave his arm to me and when he finally spoke, it was with depressed contrition \"sorry\" (for trying to tell you what you're doing). It felt better then, like sprinkles on a cake - a pill I no longer had to take. This act of writing down my thoughts is similar to painting - the act of painting in that I am trying to get it all down, to describe it accurately. And with a few brush strokes, I can paint exactly what I see, and then I can be satisfied. Two other thoughts: 1. Simplify things to save time, turns them into poems - \"I don't know whether to be happy or sad about the sea.\" And the other: J says when I am upset, the only thing he can do is \"be very very specific\" which"},
{page:56,type:"abstract",lines:18,date:"Feb 12",text:"is true, which I like - vagueness has so much room for lying. I like things specific. Directive: print out journal entry in the middle, then \"connect back all the references\" in the margins. Work on \"I follow Black\" in some way that doesn't feel like it's supposed to be finished, maybe a bit like the Spielberg documentaries - just recounting something that's happened, because it's a unique experience. Like: if I had decided I wanted to be an interesting person - and like I can prove that I'm worthy and smart, with my business, I can prove that I am interesting. Period, not an exclamation point, because I don't care that much. A cognitive vehicle to get me back into my lane is: I wanted people to think I read, but I didn't like any books, so I had to write my own. No! that's the puddle of mud I've fallen in many times and"},
{page:57,type:"abstract",lines:20,date:"Feb 12",text:"now I'm out, and I don't want to get dirty again. I've uncovered the white of my cloth and let the debris fall to the floor. I ran into the puddle head first because someone told me (it was I) that I love puddles, love finishing things for other people - making movies. I commissioned a piece by myself, and like Steven Spielberg, I had hired many men and many women to help me, but unlike me, I had only hired myself - all the men and women were myself. And my innie fought for her independence, gallantly, so I granted it, and now, during work time, she walks free, roaming montana. The Tot after I got myself off was planning an autopro that doesn't involve any \"innie\" work. I said \"no.\" in the video, when they asked if I wanted to say \"happy anniversary,\" and now I know I can say \"no.\" A useful heuristic: a child with red legs will be the one deciding whether they want to pursue whatever activity is being offered."},
{page:58,type:"abstract",lines:18,date:"Feb 13",text:"February 13\nTwo medium ideas from last night that both have to do with things close to the body, and contracting. The first is: I was thinking about why it feels so jarring to go somewhere (Mason or Zach) and I think the answer is cause I need to collect all my thoughts - that I've scattered about the room - terror - blind panic. The solution I came up with was to find places for my thoughts - little bowls or containers scattered about my room to mimic the way they find their way from different parts of my mind. Another implication was that, when I'm going on a trip, I have to quick-pack up my stuff, and I end up putting scrunchies in the toothpaste container just cause I don't have the time. Then, when I get to where I'm going, I go to take out my perfume, and find it's in the pill canister, and I have a little scream - and each scream is a high decibel"},
{page:59,type:"dreams",lines:23,date:"Feb 13",text:"red frequency that goes above the line so that I have to just say \"be calm, be calm, be calm,\" and never look above the line, but behind me I know there is a thin red line, creeping way past the line - I could never measure how far, it is too tall for me even to see. I had an almost strange time sleeping, and I kept waking up. This morning I dreamt I was sitting on one of the red chairs out in mommy's yard, and staring up at the sun, and I had missed the whole day. I dreamt that there was a squirrel in my room - the panic caused me to take action. I rolled myself to the door and opened it but i couldn't close it from the chair, and in my panic, I threw a pink plate of random half-discarded leftovers at it, and the squirrel laid on the plate to devour it, but its face was too long, as in the drawing I did of a squirrel the other day. This was the dream I had before waking up the first time, thinking of other tricks that I like to play on myself, like putting random dates in my journals. I went back to sleep and dreamt that Adam Scott had a successful tiktok channel with little skits."},
{page:60,type:"abstract",lines:22,date:"Feb 13",text:"Reached an endearing level of paralysis, and so, I'll purge myself of thoughts, so that I may be on my way. Which has a lot in common with holding your pee - I can do it almost infinitely, however, it does take a toll on my mental processes. I've been typing my journals, and again, I feel like checking a lot of things off: yes, they are true, yes they are interesting, yes they describe something accurately. Describing what my shoe has in common with Primo Passo was rather inventive, courageous, daring - the red in Kalman and Owens. I like it when I go on long rants to explain something to myself - often they are extended analogies. I am liking, more and more, the idea of only drawing imaginary things. The troubling game that I am still reluctant to admit is that I'm having to touch everything with gloves so as not to get contaminated, because things like the 24th - the Tot day - are quite sticky, quite contagious. We have to touch the yellow ochre with gloves. My retroactive goal is to design an autopro that"},
{page:61,type:"ideas",lines:18,date:"Feb 13",text:"takes this into consideration. I couldn't quite convince myself of the validity of trying so hard to fit so much info into such a small space. Last night, I designed, first as a joke, sugar packets with the date printed on them, not proportional, so the date takes up most of the surface area, making them into little folders, and putting them in a wooden crate that I got at the dollar tree. I also thought I could simply continue - make a number of page books based on how many pages staples can easily go through (volume I, II, III). I had the idea to print out the lord of maps stickers on 1x1 inch squares, but then I thought drawing it each and every time might be easier - maybe I could create an SBS for drawing each symbol so it wouldn't be scary. Perhaps the gloves analogy will alleviate some of the guilt and shame."},
{page:62,type:"ideas",lines:22,date:"Feb 13",text:"the same space that could have been used to work on the conundrum, so that now, it can't. The other intermediate idea is to choose random phrases to illustrate until I have enough pictures that I can glance around and know, generally, what I am talking about in that part. Then the unpleasant plethora of ideas centering on technology - reading through the notion site and commenting, or a continuation of the Doen dress. Perhaps the most inspiring idea is the one I was originally inspired by - that one redditors book, in which the readings were descriptive, not arbitrary. Oh - perhaps I could put \"the day I found baby goats in the atrium,\" \"the day that I cried in that pink chair,\" \"the day that I met Jonathan in the alley and he said my hair didn't look bad.\" about retroactive intentionality - the 8 day page, 2 day page, 1/2 day page - how to make a formula that bends at will, that is not a formula at all? BAD IDEA: arbitrary diagrams - assign loose diagrams to concepts that I do not want to represent.\n"},
{page:62,type:"day",lines:49,date:"Feb 14",text:"February 14\nGot like 12 hours of sleep last night and if I were someone else, I would feel guilty, but, as only myself, it was nice in that dark warm cocoon that was my bedroom. Last year, if I recall, I spent Valentine's Day completely alone - was supposed to hang with \"the boys\" and then they never ended up calling. This year is much the same, only last night, as I was masterbating, I thought that I no longer want to do what I'm told - I will do projects only for me, if I want to. And so, I will buy myself 100 valentines, little heart boxes, satin, that I can allow velvet to drape into. And if I want to spend six weeks designing, detail by detail, how to print angels on little pillows, then I can do that. And then I will have 100 valentines for myself, and I will keep them. Perhaps I will make the flower deck, and the magic rituals deck, but only for me - only because I want 500 copies of it. And if they do not sell, I will stow them in boxes, I will keep them.\nFebruary 15\nValentine's day was yesterday. I had all sorts of things planned to write - my dream that I wasn't supposed to remember (cause it was sad). In the dream I had an idea and the idea was that if you're making a painting \"about\" something - trying to use the painting as a metaphor, and therefore looking at two things at the same time (the object, and the thing you're trying to represent), then it's more interesting because the painting is now about two things - not because the metaphor is interesting, but because the looker's attention has two things to focus on and doesn't know which one, or switches back and forth - and the same goes for any two subjects that a painting would be about - just the fact of having multiple things that the painting's about (competing patterns) makes it more interesting. Anyway - I don't know now, that I've described it in so many words, whether this idea is actually right or true. What I have in common with evan is none of the things that nat has in common with evan, and I'm struggling to figure out why I didn't like her. Because I take joy in recording my life, and because I \"technically\" had 3 Valentines day dates yesterday, I began the day - called Evan - he went on a hike instead of hanging out - then that gave me the wherewithal to call J who said \"Happy V day\""},
{page:63,type:"day",lines:36,date:"Feb 15",text:"and then I traipsed around Montana with evan after eating 1,000 salt/vinegar chips. Today daddy and I pulled up next to each other and they told me they were going to Kelly Paper. Evan climbed a tree, I couldn't cause I had not-dirty-yet white feet. Primo Passo - I showed him my chess game at the general store and we mapped out the knight version in the garnet store. He used the term \"unhoused\" which pissed me and grant off later in the car. Wine tasting at Pavilions - we gave the wine guy all this info about his and my love lives. We looked for an \"ambiguous gift for Nat, to say i kinda wanna fuck you but idk,\" and I quite liked the game. When we first got to Montana, I let Evan give me a \"house tour\" of his car with all his possessions in it - he had a little plastic drawer just for peanut butter cups - 2 left - he gave me in the cup I got him, and I ate a tiny bite of one of them, and was grateful for the gift. He tried to get me to eat more cause he thinks I'm anorexic. I asked him if he thought I looked like a doily (I was wearing lace) and he said \"yeah\" which made me happy. Then I went to J's house and we had an Erewhon meal on the rug and he said it was not very romantic - he said he should've gotten me a present. We went to the beach today, after getting sandwiches at Primo Passo. We played at the beach - took off our shoes - walked by the water. We sat by the edge of a cliff made out of sand. There were two little girls smiling and looking at me. He said he has a pervasive feeling that he is bad and asked if I had it too, and I said I had a different pervasive feeling, but couldn't think of what it is, and thought about it as we started walking towards the"},
{page:64,type:"day",lines:21,date:"Feb 15",text:"waves because he said i don't have to have the same feeling as him but I said \"no, I'm not lying, I'm just thinking about it.\" And then, on the cliff, he held me tight and told me he'd never felt this way about anyone and I said \"me neither,\" and I wouldn't have put it in so many words, but I supposed, after I said it, that it was true. And then he asked me what I was thinking, and I couldn't answer him - I was hugging my arms around my body, and I have to say \"no, I still can't tell him, even though he asked.\"\nFebruary 16\nFantasized about: Draco and McGonnagall, Hermione and Ginny - flowers. Dreamt that evan gave a homeless man $35 - \"they butt venmoed me.\" We were in a parking lot looking for parking, and I was tryna talk to him, but he was preoccupied with incremental divets in the paving. The homeless men were actually 3 girls. Anyway - back to yesterday - then walked back to his house, and he did a little jazz number about having to poop, got low, his knees."},
{page:65,type:"day",lines:39,date:"Feb 16",text:"I kinda liked it - could've been longer. At his house, I told him about \"what if we were both bears, then you would be a bigger bear, and I would be a smaller bear\" - I had imagined him making a sort of cave that I could sit in, being enveloped. Then we played the guitar, and I sang for a little. Later, Grant called to apologize for me not knowing if he was gonna kiss me ever, and I talked to Mason about his problems with miriam. Then went to Killer Noodle by myself and got three eggs and they of course messed it up again - gave me meat - and it took forever and I got a blood orange beer that I only drank a little of. Came home and fell asleep, woke up at 11:00 and went to get a pint of ice cream at Ralphs. On the 14th he said he wanted to have a \"kindness orgasm\" but we ended up sleeping together, which was nice - laid on the rug and he said something kinda nasty and started feeling my butt and I got really turned on and started grinding on him. Then after, in bed, he said he used to think sex was a science, now it's an art.\nFebruary 17\nSushi - the great lengths people go through to avoid social interaction - me avoiding daddy to get water from Whole Foods and then finding daddy there. Curating small books with a little of everything - an idea, a thought, a sculpture, an experience. Also: taking some of them down ex. where do I put the first aid kit. I guess I'll tell J about my lower back \"injury,\" and he can make me feel better about it - he took all my worries from me when we were on facetime. I don't even remember if this happened, or I dreamed it: sat up in bed, then slid back down into Sean's arms, and told him it was a bed-coaster - it was very important that he understand. I'm worried about my back. I need to think about it until it makes it better. I need to think about journaling me until it makes it better."},
{page:66,type:"day",lines:12,date:"Feb 17",text:"Not doing ok, but I'll be ok, not doing ok but I'll be ok, not doing ok but I'll be ok. Mean mean mean sean. Group things together that have something in common, and there were lots of systems of movement available - put them together to find another one, find what they have in common. I don't know if I'll be ok. I hate Sean I hate Sean I don't ever want to see him again. He is also annoying and I do not like him very much, and he was annoying me today. I AM MAD I AM MAD I AM MAD, IT IS MAKING ME MAD. I don't want to be mad. I want to be sane."},
{page:66,type:"ideas",lines:6,date:"Feb 17",text:"My idea: tik tok or reel: me praying next to a bed \"thank you god\" for giving me two boyfriends, and it's light meaning pale blue, and flashes to me in the dark, and my hair down, crystals and candles - shots of my two boyfriends - eyes closed Christian, eyes open witchcraft."},
{page:67,type:"day",lines:21,date:"Feb 17",text:"I DO NOT FEEL SANE. Notice things around for panic attack. Say what you did today to ground. Ok, so here's what I did today: went to the clothing swap with Grant after all, brought my purple suitcase and my laundry basket. Found blue sweatpants, something I'd been missing. My fav BMelville sweater - electric city - got it back. Rugrats shirt was most important. Went through all my clothes with Sean and I finally started letting him touch me when I tried on this white night thing that you could see my nipples through. He looked so hot with no shirt and the pink sweatpants I gave him. I almost wanted to fuck him in bed, too, even though I'd been thinking how dumb his thoughts were all day - it's hard to think he's dumb cause I've known him for so long. And I wanted to say \"I have enough pieces of your puzzle to know that's not true, and couldn't possibly be true\" - half the stuff he says I feel that way about, like when he pretends he doesn't care about something."},
{page:68,type:"abstract",lines:20,date:"Feb 17",text:"real as possible - these cream colored walls couldn't possibly be disobeyed by leaving - the only real deterrent is a social one, because the walls are my friend. Last night, drawing was easy - it gave me the question: how many drawings would I need, per increment, to look at it and fully understand and remember. Back to the burrito: a problem that I don't want to solve. \"I'm not hungry enough\" - this is not a problem, just a thing that is true right now. I guess the solution is to try to manually raise and lower the threshold. I don't want to synthesize my thoughts bad enough - there is no deadline and part of the rules of this project is that it comes directly from me. I need to design an autopro in which the steps towards the goal are necessarily embedded. Or perhaps I am more interested in the process. To imagine the done is to have more work to do - now I have to consume all this information I've collected for myself."}

const PX_PER_LINE=2.6, MIN_H=16;
const strip=document.getElementById('strip'),gutter=document.getElementById('gutter'),
      reader=document.getElementById('reader'),legendEl=document.getElementById('legend');
const activeColors=new Set();

ORDER.forEach(type=>{
  const k=document.createElement('span');k.className='key';k.dataset.type=type;
  k.innerHTML=`<span class="swatch" style="background:var(--${type})"></span>${LABELS[type]}`;
  k.onclick=()=>toggleColor(type);legendEl.appendChild(k);
});
const resetK=document.createElement('span');resetK.className='key reset';resetK.textContent='show all';
resetK.onclick=()=>{activeColors.clear();render();reader.innerHTML=hint();};legendEl.appendChild(resetK);

function hint(){return '<p class="hint">Tap a block to read it. Tap one or more colors above to filter the timeline.</p>';}

const segEls=[],segH=[];
sections.forEach((s,i)=>{
  const h=Math.max(s.lines*PX_PER_LINE,MIN_H);segH.push(h);
  const div=document.createElement('div');
  const firstOfPage=(i===0||sections[i-1].page!==s.page);
  div.className='seg'+(firstOfPage?' page-edge':'');
  div.style.height=h+'px';div.style.background=`var(--${s.type})`;
  div.title=`p${s.page} — ${LABELS[s.type]}`;
  div.onclick=()=>openOne(i);
  strip.appendChild(div);segEls.push(div);
});
layoutGutter();

// Re-place the page numbers against whatever segments are currently visible, so
// the gutter stays aligned after a filter collapses the strip.
function layoutGutter(){
  gutter.innerHTML='';
  const filtering=activeColors.size>0;
  let y=0,lastPage=null;
  segEls.forEach((el,i)=>{
    const s=sections[i];
    if(filtering&&!activeColors.has(s.type))return;
    if(s.page!==lastPage){
      const lbl=document.createElement('div');lbl.className='pagenum';
      lbl.style.top=y+'px';lbl.textContent='p'+s.page;
      gutter.appendChild(lbl);lastPage=s.page;
    }
    y+=segH[i];
  });
}

function toggleColor(type){
  if(activeColors.has(type))activeColors.delete(type);else activeColors.add(type);
  render();updateReader();
}
function updateReader(){
  if(activeColors.size===0){reader.innerHTML=hint();return;}
  reader.innerHTML=sections.filter(s=>activeColors.has(s.type)).map(entryHTML).join('');
  reader.scrollTop=0;
}
function render(){
  const filtering=activeColors.size>0;
  [...legendEl.querySelectorAll('.key')].forEach(k=>{
    if(!k.dataset.type)return;
    const on=activeColors.has(k.dataset.type);
    k.classList.toggle('active',on);
    k.classList.toggle('dim',filtering&&!on);
  });
  segEls.forEach((el,i)=>{
    el.classList.toggle('collapsed',filtering&&!activeColors.has(sections[i].type));
    el.classList.remove('sel');
  });
  layoutGutter();
}
function entryHTML(s){
  const dot=`<span class="dot" style="background:var(--${s.type})"></span>`;
  const paras=s.text.split('\n').filter(t=>t.trim());
  const body=paras.map(t=>`<p${s.draw?' class="nodraw"':''}>${t}</p>`).join('');
  return `<div class="entry"><p class="meta">${dot} ${s.date?s.date+" · ":""}page ${s.page} · ${LABELS[s.type]}</p>${body}</div>`;
}
function runBounds(i){
  let a=i,b=i;const t=sections[i].type;
  while(a>0 && sections[a-1].type===t) a--;
  while(b<sections.length-1 && sections[b+1].type===t) b++;
  return [a,b];
}
function openOne(i){
  const [a,b]=runBounds(i);
  segEls.forEach((el,j)=>el.classList.toggle('sel', j>=a && j<=b));
  reader.innerHTML=sections.slice(a,b+1).map(entryHTML).join('');
  reader.scrollTop=0;
}

/* ---- Auto-scroll: eases the reading pane down at a slow reading pace ---- */
const autoBtn=document.getElementById('autoscroll');
const SCROLL_PX_PER_SEC=22;          // ~one line every second — reading pace
let autoOn=false,autoRAF=null,lastTS=null,scrollAcc=0;
function autoTarget(){                 // scroll the entry pane; fall back to the rail
  if(reader.scrollHeight-reader.clientHeight>2)return reader;
  const rail=document.querySelector('.railwrap');
  return (rail && rail.scrollHeight-rail.clientHeight>2)?rail:reader;
}
function autoStep(ts){
  if(!autoOn){autoRAF=null;return;}
  if(lastTS===null)lastTS=ts;
  const dt=(ts-lastTS)/1000;lastTS=ts;
  const el=autoTarget();
  scrollAcc+=SCROLL_PX_PER_SEC*dt;
  const whole=Math.floor(scrollAcc);
  if(whole>=1){el.scrollTop+=whole;scrollAcc-=whole;}
  if(el.scrollTop+el.clientHeight>=el.scrollHeight-1){setAuto(false);return;} // stop at the end
  autoRAF=requestAnimationFrame(autoStep);
}
function setAuto(on){
  autoOn=on;autoBtn.classList.toggle('on',on);
  autoBtn.setAttribute('aria-pressed',on?'true':'false');
  autoBtn.setAttribute('aria-label',on?'Stop auto-scroll':'Auto-scroll');
  if(on){lastTS=null;scrollAcc=0;autoRAF=requestAnimationFrame(autoStep);}
  else if(autoRAF){cancelAnimationFrame(autoRAF);autoRAF=null;}
}
autoBtn.addEventListener('click',()=>setAuto(!autoOn));
</script>

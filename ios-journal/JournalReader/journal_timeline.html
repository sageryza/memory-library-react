{page:42,type:"dreams",lines:58,date:"Feb 11",text:"she goes to the boiler room in Spirited Away, he directs her down some hallways, and <em>because </em>she can’t remember, that’s why she ends up going with Lynn, and so I watched the alternate version where she does make it down the very narrow wooden hallways (but there were signs like “almost there,” and “keep going,” and finds herself in a weird cookie making room where the cookies are first extruded int he shape of a loose pine cone, and then each of the petals are cut off to make relatively normal looking cookies - macaroons. i was thinking, personally, there’s no way I would attempt to replicate such a complicated process but succeeded to imagine that if I had designed the process, it would gradually not take as long, become a routine procedure. Step by step: extrude the weird pine cone thing. Cut them. The recipe book was a binder with collaged printer paper and something sinister in the vagueness with which the procedure was “explained.” And then, as part of the procedure, me and this slightly curvier malaysian woman (tall, soft, demure, shiny black pony tail, lump potato but still nice looking body) had to go into this side room, and get fucked by two men. the other was a sorta “brother from the gentlemen/cousin from anxiety jew boy movie.” Mine was peak attractive - 6’1”, medium build, nice wavy brown hair, wearing jeans. They seemed to be conniving partners. I didn’t mind at all that he had to fuck me - both on the same bed - glad I didn’t get the other one. But I told him to go deeper and he just went faster - too fast, and seemed to be offended that I was saying he wasn’t big enough. I was thinking how J at least knows how to go deeper. They said this arrangement happened because cousin boy called him four times the night before like maybe he’d been broken up with or was sad and I was thinking “<em>who </em>would feel comfortable enough to call four times (but thought of a lot of people). Crossing the street at the mall.\n@@PB@@\n In the next dream, J was watching me interact tight-lipped, with his brother Robert, and said afterwards he was just making sure I still liked him and didn’t choose his brother. I didn’t really understand why that would make sense, since - wouldn’t his brother have to choose me. And we were in some sort of high school gym - J was sitting in an uncomfortable folding chair, pretending to grin with his teeth. We were at the doorway, the gym was smelly-like, felt smelly, and maybe Robert and I were talking on a field trip. Then we were kind of up high on this balcony plateau between up and down stairs. Sitting in this circle of chairs - maybe James, Naomi, and gf included and I got a glob of white glue/milk, with a screw in it, and was saying it was there egg."},
{page:42,type:"day",lines:18,date:"Feb 11",text:"Last night I really wanted to talk to J and almost texted him a playlist with soft stars, hard thunder on it, and then my phone died, and I thought better to leave it that way. Then I was trying really hard to print out my 25-28 september on plain paper from the printer and couldn’t get it to work and then discovered that at like 11:45 he’d sent me a video of him reading a passage from Art in It’s Own Terms and then he got into other poets like Wallace Stevens who he thought was William Carlos Williams so we talked on the phone for two hours and I watched him eat ice cream and reached out in the direction we both were. Before he called, I was actually laying in bed with the light off and do not disturb turned on, maybe listening to music, and then somehow, his call <em>got through </em>my do not disturb so that happened 🙄 lol."},
{page:42,type:"ideas",lines:18,date:"Feb 11",text:"Anyway, I think I ought to go in and get started on my “work” - either making stickers - composite cause I finished or drawing random drawings from any and all the journals - my favorite in that it is random, or continuing on the train of the tray idea and its precursors (drawing those ballet shoes at the wall, walking around with my family, I picked the <em>easiest </em>thing to make - it was basically just a rectangle (and I didn’t <em>like </em>the design, or like ballet, and the colors were sort of random/ugly - pink and gray ex.) or braiding Niha’s hair while talking to Zach at the party, and then dancing.) or continuing to fill out those blue sheets - the calendar ones…or typing entries (recent) that I have not typed (like this one?) or finishing editing that video of me making stickers…:)?\n@@PB@@\nI’m having trouble with the <em>order of things </em>(specifically)"},
{page:43,type:"abstract",lines:29,date:"Feb 11",text:"perhaps I need a retroactive organization heuristic, so I can start things as a collection. For example: I <em>know </em>I need to include the religion project. And, most recently, I think I’ve been thinking about: “New thoughts and old thoughts” (thoughts I’ve had before, and thoughts that I haven’t, for example, an unrecognized Tot is when I say: “Oh - I need to <em>summarize </em>everything, so: bit by bit: in <em>order </em>- ex. the pars about J - the crazy parts that I <em>don’t </em>know what to do with…they’re all nice, and special - the pretending I’m going to marry him - the fanfiction where we go out on the field trip, and when he’s feeling anxious in his car, and even the scurvy talk…and <em>then </em>there are some random speeches I gave in January ex. the one about how I can journal for <em>as long </em>as I want - (my <em>dreams </em>can all go together - to be discarded…I have to study the nature of the diagrams more to find out: are they all equally valid, and if not, how much discrepancy is there. And is there some way they can all be separated or - would it be difficult to get them unstuck, like glue in hair, or two pages of a book that have been stuck together, and to pull one off the other is to take some of each page with it and to leave…. - a mess worse than the lack of both pages in that it is shimmied away from - the mind resists thinking of it for example."},
{page:44,type:"abstract",lines:53,date:"Feb 11",text:"oh, and a-wonderful-nother is the days I spent at Primo Passo, buying autopros in bags, hidden mechanism, autopro (perhaps if I collect <em>all </em>of them, then I won’t be so uncomfortable setting an order to them - piecing them out on various sides of a clock. Oh, and fourth quarter. And then there is all the imagined ones - as though they were written - things that come up in my memory - like that time I explained how games can get you to a certain mindset, and <em>then </em>Siddhartha held me close, and was proud to say I was his girlfriend, but the real miracle was all the <em>other </em>times that he didn’t. If I were to pick up at the diagrams - draw a line with an ex-acto - I’ve already accepted the unequal sections - the line that divides is not a straight line. (pic) …sites.settheory is contingent on whether these topics are a history, or a future history - of things to be done. As I have finished it. Instruments of Abstraction. Tots (which I <em>almost </em>finished) interspersed with lil’ ideas like the scrolls idea, which would be like the bunk bed sticker in that it is small. And that thing with the pebbles on the hand, that I thought of in July. Those notecards that I was organizing - that essay that I wrote for Evan about abstraction being small…the thought about the rituals, and all my trying to understand OCD. And if we are simply to <em>document </em>the issues facing categorization (())→ theory of relativity, then we can bring up/. the hexagon idea, that gets modified (this is a\n@@PB@@\ngood example cause it has nice colors (pink. Orange) (x this is a good example cause it has a clear progression, and there are <em>only </em>two, and the second one makes it exponentially better, <em>and </em>there is an explanation as to why. This “reminds” me of the receipt idea which started with waiting for Cassie at the extra chunky show and ends with the game suds that mommy liked to play too (perhaps we should play it now since I have so much special time saved up?)\nPerhaps there could be some magic if I were to assign a drawn sticker to each thought that I have, and to move them around - or, “alternately” - I was just thinking, for example, of why that therapy session was so hard for me, and I think it is because there was a hidden mechanism in which the whole world was pretending it was one thing by calling it therapy and J constantly convincing me to do it, and another thing where some ugly lady who I don’t know tried to push me - refused to acknowledge what I was saying, and misunderstood (missing)\n@@PB@@\n("},
{page:46,type:"abstract",lines:36,date:"Feb 11",text:"from meta journal: I see a couple ways forward - call them goals - call them processes. I could start by “describing what I see” - and that is a lot of dense information…most is useful, some not - there are some thoughts I want to cross out cause they make me uncomfortable, and some ideas that are not that interesting, that I’ve had before. I think some of the information would be more useful, were it simply cohered to other information (that is like it - like picking up colored sprinkles from the floor. I see myself reading all the info on one subject ex. the religion project, or → instruments of abstraction etc. And then making it so the information is correctly proportioned to how important it is, for example, one single sheet of paper…originally I was gonna say to make a “hidden mechanism” poster, with all the different uses/ways of understanding hidden mechanisms in a constellation on a piece of paper including the “new” one about Mc Casey (gemma) and about embedding it into conversation cause I want people to listen to me (and I am <em>angry). </em>There’s the one where I have some action on my docket, and I can’t do it cause I don’t know what it is, and I don’t know because it’s “in the fourth quarter” - it’s a non action. The other plan of attack is: find my favorites, ex. I liked talking about “non-action” ex. journaling, and the plants stealing the silver coins, and whatever the good idea/bad idea toyball machines were…I could make a long list of ideas,a nd either put them under the good or bad idea gumball machine. (single sheet, continuous) I could make a list of hte innovations I’ve normaled ex. Tot, and trace them back to their genesis. Ah yes - the idea I had in the shower - to"},
{page:47,type:"ideas",lines:16,date:"Feb 11",text:"make a personalized worksheet so that each date was a box for sculpture ideas, a box for random thoughts, a box for angel ideas. I could start tossing the medium size ideas in a box so I don’t have to go back and find them…Question: how big of an idea is the “house bag” or is it just <em>called</em> “big idea” (deceptive)? (?): I need to take the time to read <em>through </em>everything, and try to understand what I was saying - connect the dots back…I think this goes in the “infographic” direction, because it involves a more hands on approach to handling the ideas. The unrealistic idea that appeals to me seeing my gold and gleaming passport books is to create a new book with only <em>shiny </em>ideas that gleam brilliantly - like the garnet game, like the pebbles counting."},
{page:47,type:"day",lines:5,date:"Feb 11",text:"was having trouble writing anymore but meta journal helped. The two thoughts that I wanted to write down for some reason was when I was covering my boobs and J was like “I’m <em>inside </em>you” like, in exasperation and I was like “ooh…(missing)\nFebruary 12"},
{page:47,type:"abstract",lines:20,date:"Feb 12",text:"One thought - like an ember in my heart - single serving, like a yogurt cup. I woke up feeling nice and healthy and good because of some thought that I must’ve had still in sleep, like a mug warming my hands. And then, in trying to recall it - I remembered all the nice thoughts I’d had the day before - it worked like a perfect mechanism, and as if I’d designed it to make me happy. By thinking of nice thoughts. One of the thoughts I had last night - STAP. I sort of remembered my writing in 4D - not one instance, but what they all had in common and thought - I should be writing more - I always want to be writing - as if I was writing something - a book - or I had a purpose - I was doing it on purpose. And, more and more, I am writing - I <em>want </em>to be writing - but I have nothing to write. I solved that by “I should write what I was already writing” - because there are so many things that I was not finished with - not even close."},
{page:47,type:"ideas",lines:12,date:"Feb 12",text:"The tray idea, for one, and that one I came up with a new STAP - knowing now, as I do - that I do <em>not </em>have it in me for more than almost <em>anything </em> - and so - I can use stickers - make stickers - put them on “trays” (ah yes - <em>bead </em>trays - because - they are temporary, because they are preparing for something, and <em>not </em>stick them down, in a way it comes built in - the pre-stick is the temporary part. Seeing them there - on their size-of-a-journal brown paper, I’ll know they are in some intermediate stage - they are to be stuck (though not yet - just not yet)."},
{page:47,type:"abstract",lines:8,date:"Feb 12",text:"I solved a problem a little while back. I used to just write\n@@PB@@\nthe abstraction - what I had concluded from all my samples of evidence. Now I know I <em>need </em>more than that - I need the evidence itself. And so - I write like a <em>ghost </em>- not knowing what will be useful in the future. milk - grant - mommy - I saw insider her brain, when I explained to her about the heuristics."},
{page:48,type:"ideas",lines:14,date:"Feb 12",text:"going through all the iterations of the tray idea to end up with this sticker one: that diagram I drew (pic), that thing I wrote about on the grass. That diagram is nice and clean and simple. it’ll be nice to put it to use. And the “Lord of Maps” - that relates to what I can do with the stickers. Perhaps the tray idea is another. (From old: […] (← redacted) is like a computer - and - this is more [directly] like a program for your brain, but that was - (god, myself, the world: (pic) that i think belong in gumball cups - eventually switching places. The idea was to recreate the punctured hole effect on film by printing it onto the kraft paper first…"},
{page:48,type:"day",lines:13,date:"Feb 12",text:"J tried to convince me that this project was writing. Luckily I knew it was not - moving around little images - stickers - I think it is closer to math ~ playing with abstractions. then he gave his arm to me and when he finally spoke, it was with depressed contrition “sorry.” (for what? for miscategorizing - for trying to tell you what you’re doing). It felt better then - like sprinkles on a cake - a pill I no longer had to take. And now I let myself notice the taste, and it was yellow and sick. Sean called <em>right </em>after he left. (missing)\nand now he thinks he’s good looking. I wouldn’t want him to think I’m dating someone ugly."},
{page:48,type:"abstract",lines:33,date:"Feb 12",text:"This act of writing down my thoughts is similar to painting - a painting? x - the act of painting in that I am trying to get it all down, to describe it accurately - I want to get it accurate. And with a few brush strokes, I can paint exactly what I see, and then I can be satisfied. And I keep refreshing the browser, to see if there are more thoughts, but now that I use fast mode exclusively, they’re always all generated - painted - (written). And now, when I have just read <em>back </em>some of my journals (Jan 14) I can see - ✓✓✓ - yes ✓ that is what I meant to say. And I can understand. Not an incomplete understanding that involves any vagueness/sukkot in the park, on that hill - I had <em>no </em>idea where I was, and I think it was windy, or at least cold. everyone gathering supplies - to make a lemon - perhaps I liked how everyone was concentrate on the task of hanging paper fruit up - as if it mattered (it did) and because I normally did these kinds of tasks alone? I - Oh - I can only speculate (what’s in the parentheses) Oh , alright, two other thoughts: 1. Simplify things to save time, turns them into poems - “I don’t know whether to be happy or sad about the sea” - I’m often worried I’ll run out of will power (and rightly so!) to complete the sentence, so I abbreviate it in my mind - find a clever way to say it differently (sometimes abstract, sometimes relational - there are other things but that’s not the current point). And the other J says when I am upset, the only thing he can do is: “be very very specific” which\n@@PB@@\nis true, which I <em>like </em>that - UA -"},
{page:49,type:"abstract",lines:30,date:"Feb 12",text:"vagueness has so much room for lying. I like things specific. I hate what Rebecca thought before she saw that play. Other thoughts: Directive: print out (pic) - journal entry in the middle, then “connect back all the references” in the margins…2) since my STAP didn’t work (I still want to write, I’m still scared to read what I’ve written), my second thought on what to do is: work on “I follow Black” in some way that doesn’t feel like it’s supposed to be finished, or shared with anyone necessarily, maybe a bit like the Spielberg documentaries that I just watched part of - just recounting something that’s happened - because it’s a unique experience - that’s the perspective I’ve had the whole time, but in case I forget it, it’s written down. - that experience is sort of - exactly as weird as I am - the logical extension of weird. Like: if I had decided I wanted to be an interesting person - like Jonathan said, at the Reel Inn, when he was mad at the 21 year old Asian for not appreciating him paying for her meal - girls “tricking him into thinking they’re interesting” - “I’m not that interesting.” and then we ate most of the rest in silence. I was thinking “I <em>am </em>that interesting. And like I can prove that I’m worthy and smart, with my business, I can prove that I <em>am </em>interesting. Period, not an exclamation point, because I don’t care that much, because I only think about it in this context."},
{page:49,type:"abstract",lines:46,date:"Feb 12",text:"All my encounters with black people, all my “never let them know your next move” - to myself (!) prove it. A cognitive vehicle to get me back into my lane is: I wanted people to think I read, but I didn’t like any books, so I had to write my own (the Tot was that: “I could just write an outward facing book…about myself” - no! that’s the puddle of mudge I’ve fallen in <em>many </em>times and\n@@PB@@\nnow I’m out, and I don’t want to get dirty again…I’ve uncovered the white of my cloth (dress) and let the debris fall to the floor, even looked at how dirty my dress was, and said: ah - that was quite dirty. I’m not dirty anymore - no it’s nice, <em>wow</em> (!), to be clean :) and I was sparkling and smiling, even though my dress was still mostly full of mud, and it was as <em>if </em>I had fallen, as <em>if </em>I had tripped - but no! I ran into the puddle - head first because someone told me (it was I), that I <em>love </em>puddles - <em>love finishing </em>things for other people - making movies and the like - I commissioned a piece by myself, and like Steven Spielberg, I had hired many men and many women to help me, but unlike me, I had <em>only </em>hired myself - all the men and women were myself. I <em>didn’t </em>have an editor to cut up the footage when I was done. And my innie fought for her independence - gallantly - so I granted it, and now - during work time - she walks <em>free</em> - roaming montana - <em>thinking </em>about smiling at people, but not actually doing so. The Tot after I got myself off (it was lovely :) - I hadn’t been in the mood lately (how many headaches can a person get amiright?!) was planning an autopro that <em>doesn’t </em>involve any “innie” work - <em>no </em>clippings on the cutting room floor ex. I said “no.” in the video, when they asked if I wanted to say “happy anniversary,” and now I know I can say “no” (and I wish I’d never learned to say “yes” :| I did(n’t) know saying no was an option. But apparently, a <em>lot </em>of things that now feel out of the question were, indeed possible, because then I had red legs. (not dyed: I think they were permanent). A useful heuristic: a child with red legs will be the one deciding whether they want to pursue whatever activity is being offered…\n@@PB@@\nFebruary 13"},
{page:51,type:"ideas",lines:21,date:"Feb 13",text:"Two medium ideas from last night that both have to do with things close to the body, and contracting. The first is: I was thinking about why it feels so jarring to go somewhere (Mason or Zach) and I think the answer is cause I need to collect all my thoughts - that I’ve scattered about the room - terror - blind panic. From having to pack so quickly. For example, some thoughts I scattered yesterday were a) adding the vector diagrams to (just)the blind compass page! because I like it, and I decided it was worthwhile, and I noticed how much meta journaling there was - a lot of it useful - made me nervous - it’s the same caliber as the stuff I’m thinking today<em> - nervous that it’s lost - buried somewhere, and here I am thinking the same thoughts, and thinking they’re original. Anyway - the solution I came up with was to find </em>places for my thoughts - little bowls or containers (?) scattered about my room to mimic the way they find their way from different parts of my mind."},
{page:51,type:"abstract",lines:25,date:"Feb 13",text:"Another implication was that, when I’m going on a trip (driving to desert flower or to Mason’s house, that unfortunately has a big boulder in front of it) I have to quick - pack up my stuff cause I want to take it all with me, and I end up putting scrunchies in the toothpaste container just cause I don’t have the time. it ends up getting things all jumbled, and then, when I get to where I’m going, I go to take out my perfume, and find it’s in the pill canister, and I have a little scream, like: “if this is here, then what <em>else </em>is out of place?” and I know I’m going to have to repeat my scream any time I find something in the place with something else that is not like it, and each scream is a high decibel\n@@PB@@\nred frequency that goes above the line so that I have to just say: “be calm, be calm, be calm,” and <em>never </em>look above the line, but behind me I know there is a thin red line, creeping <em>way </em>past the line - I could <em>never </em>measure how far, it is too tall for me even to see. (diagram: the high red line that I can barely see unless I look for it, and I <em>don’t </em>want to look for it, lest my calm line stop (having a line)., my calm line, me)\nMIDDAY"},
{page:52,type:"dreams",lines:39,date:"Feb 13",text:"I had an almost strange time sleeping, as is always the case these days, and I kept waking up, and going back to sleep. A subtle nod to waking myself up in anger - this morning I dreamt I was sitting on one of the red chairs out in mommy’s yard, and staring up at the sun - over the roof of the garage I could see the sun set very clearly and I had missed the whole day and I had to call Mason and Jonathan and I was sad to have missed it (irl ~ 11:30 am). I dreamt that there was a <em>squirrel </em>in my room - I wasn’t sure if I was awake, but the panic caused me to take action. I was sitting in my pink chair and, with my eyes still closed so I could stay asleep. I rolled around my rug and felt whether the carpet was under\n@@PB@@\nmy feet. And so, still trying not to wake myself up, I rolled myself to the door and opened it but i couldn’t close it from the chair. I tried to close it but it came back and in my panic, I threw a pink plate of random half-discarded leftovers at it, and the squirrel laid on the plate to devour it, but it’s face was too long, as in the drawing I did of a squirrel the other day and it felt grotesque only in that it was wrong. This was the dream I had before waking up the first time and of course I woke up, realizing that I’d been tricked, and thinking of other tricks that I like to play on myself, like putting random dates in my journals (I don’t do that anymore). I went back to sleep, though I was only missing an hour (from 12:00 - 8:00) and dreamt that Adam Scott had a successful tiktok channel with little skits with four characters - (guess who - but - didn’t recognize). He kept having things he wanted to say to his audience, but kept realizing that silence was the best o (missing)\nAFTERNOON\nReached an (endearing) level of paralysis, and so, I’ll <em>purge </em>myself of thoughts, so that I may be on my way."},
{page:53,type:"abstract",lines:14,date:"Feb 13",text:"Which, by the way, has a lot in common with holding your pee - I can do it almost [infinitely], however, it <em>does </em>take a toll on my mental processes, in the mean time, relegating them to the part of my head that is not holding me pee. Anyway, I’ve been typing my journals, and again, I feel like checking a lot of things off: yes v’ - they are true, v’ yes - they are interesting - yes they describe something accurately. Describing what my shoe has in common with Primo Passo was rather inventive, courageous, daring - the red in Kalman and Owens. I like it when I go on long rants to explain something to myself - often they are extended analogies, but not always."},
{page:53,type:"abstract",lines:14,date:"Feb 13",text:"I am liking, more and more, the idea of <em>only </em>drawing imaginary things. What starts as: “ah, that’s true - you could do that too.” becomes “oh. huh…you tried - you decided…<em>only </em>to draw…abstract?…things me: No, they’re not abstract (patiently). The troubling game that I am still reluctant to admit is that I am still reluctant to admit is that I’m having to touch everything with gloves so as not to get contaminated because, for example, things like the 24th - the Tot day, are <em>quite </em>sticky, <em>quite </em>contagious ex: “Oh well, it’s not so hard, see: let me show you,” yes, and so, we have to touch the yellow ochre with gloves. I <em>think </em>- I’m not sure,"},
{page:53,type:"ideas",lines:31,date:"Feb 13",text:"my retroactive goal, is to design an autopro that\n@@PB@@\ntakes this into consideration, ex. I tried with the sweet and compact - succinct - printed out calendar - but I <em>couldn’t </em>quite convince myself of the validity of trying so hard to fit <em>so </em>much info into such a small space. And last night, I designed, first as a joke, and now back to being a joke - sugar packets, with the date printed on them - not proportional, so the date takes up most of the surface area (()) → boardwalk) making them into little folders , and putting them in a wooden crate that I got at the dollar tree - stapled on the sides - one for each day, and that solves the problem of chronological order - in each - on each - a card that says one topic that I read about on that day. I also thought I could simply continue - make # of page books based on how many pages staples can easily go through (e.g. volume I, II, III etc), adapted from Oct. 8th and 9th (which is about the right number of pages) - kraft paper, and the volume sticker on white sticker paper. I had the idea to, ex. print out the lord of maps stickers from the library on 1x1” squares (precut), but then I thought drawing it each and every time might be easier - ah - maybe I could create an SBS for drawing each and every (symbol) (so it wouldn’t be scary). Perhaps the gloves analogy will alleviate some of the guilt and shame that I’m somewhat stopped and now that I’ve been brought attention to its awareness (ebonics x) (no.)"},
{page:54,type:"ideas",lines:35,date:"Feb 13",text:"Perhaps there is beauty to the Lily Collins Idea of <em>translating </em>the content into diagrams and equations (meat = pictures) as it touches it with a highly involved process, that occupies\n@@PB@@\nthe same space that could have been used to <em>work </em>on the conundrum, so that now, it can’t. The other (intermediate?) idea is to choose random phrases to [illustrate] until I have enough pictures that I can glance around and know, sort of generally, what I am talking about in that part. Then the unpleasant (practical) plethora of ideas centering on technology - reading through the notion site and commenting, or putting hashtags, or a continuation of the Doen dress. <em>Perhaps </em>the most inspiring idea is the one I was <em>originally </em>inspired by - that one redditors book, in which the readings were descriptive, not arbitrary, (ex. September 17th) Oh - perhaps I could put “the day If ound baby goats in the atrium,” the day that I cried in that pink chair,” “the day that I met Jonathan in the alley and he said my hair didn’t look bad” was this the idea for my bingo card? - about “retroactive intentionality: - the 8 day page, 2 day page, 1/2 day page - how to make a formula that is form-fitting, that bends at will - that is not a formula at all? BAD IDEA: arbitrary diagrams - assign “loose” diagrams to concepts that I do not want to represent - that i have not figured out how I want to represent - the june ones, or the hoonies…an activity that’s <em>not </em>useful, so fulfills 1/2 criteria in that red legs girl would doit: finding three hoonies that match, printing them and cutting them out, sticking them in a triangular formation on a square sheet of brown paper.\nFebruary 14"},
{page:55,type:"day",lines:8,date:"Feb 14",text:"Got like 12 hours of sleep last night and if I were someone else, I would feel guilty, but, as only myself - it was nice in that dark warm cocoon that was my bed-room, and if I could, I would still be sleeping in there. Last year, if I recall, I spent Valentine’s Day completely alone - was supposed to hang with “the boys” and then they never ended up calling, nor I them."},
{page:55,type:"ideas",lines:16,date:"Feb 14",text:"This year is much the same, only last night, as I was, or before I was, masterbating, I thought (as I had/have been thinking) - that I no <em>longer </em>want to do what I’m told - I will do projects <em>only </em>for me, if I want to. And so, I will buy myself 100 valentines…little heart boxes - Satin, that I can allow velvet to drape into. And if I want to spend six weeks designing, detail by detail, how to print angels on little pillows, then I <em>can </em>do that. And then I will have 100 valentines for myself…and I will keep them. Perhaps I will make the flower deck, and the magic rituals deck, but only for me - <em>only </em>because I <em>want </em>500 copies of it. And if they do not sell, I will stow them in - boxes - I will keep them, and perhaps I will give them out t (missing)\nFebruary 15"},
{page:55,type:"abstract",lines:24,date:"Feb 15",text:"Valentine’s day was yesterday (as you know) I had all sorts of things planned to write - was it yesterday, or today (?) hmm - for example - my dream that I wasn’t supposed to remember (cause it was sad). but anyway - <em>in </em>the dream I had an idea and the idea was the idea that if you’re making a painting “about” something - trying to use the painting as a metaphor, and therefore - “looking” at two things at the <em>same </em>time (the ‘object(?),’ and the thing it’s/you’re trying to represent, then it’s more interesting because the painting is now about two things - not because the <em>metaphor </em>is interesting, but because the lookers attention has two things to focus on (at the same time?) and doesn’t know which one, and (or switches back and forth…and the same goes for <em>any</em> two (or more?) subjects that a painting would be about - “just the fact of having multiple things that the paintings about (competing patterns) makes it more interesting/better. Anyway - I don’t <em>know </em>now, that I’ve described it in so many words, whether this idea is actually right or true, and I feel a little guilty remembering it since I wasn’t supposed to."},
{page:55,type:"day",lines:17,date:"Feb 15",text:"Mason - car - freeway - white sedan - Grant - sixpack - aiden - strava - google girl. (pic: sage, nat, even) (what I have in common with evan is <em>none</em> of the things that nat has in common with evan (and I’m struggling to figure out why I didn’t like her, it had something to do with her drunk chipmunk eyes, continuously drowning, as thought they were sinking (I <em>think </em>they were brown) I know they had too much black eye liner on the top, probably weighing them down, causing them to sink. Maddie - contracting back into your body - complaining about certain types of things…acknowledging certain feelings that would make me “feel better” to acknowledge <em>but </em>then (I) would be <em>less portable. </em>Because if I want to go on a trip - these parts can <em>completely </em>disappear, second medium size idea. And so, <em>because </em>"},
{page:55,type:"day",lines:8,date:"Feb 15",text:"I take joy in recording my life, and <em>because </em>I “technically” had <em>3 </em>(three) Valentines day dates yesterday, I began the day called Evan - he went on a hike <em>instead </em>of hanging out with - <em>then </em>that gave me the <em>wherewithal </em>to call J who said “Happy V day”\n@@PB@@\nand <em>then </em>I traipsed around Montana with evan after eating 1,000 salt/vinegar chips (1,000. That is <em>not </em>a lie) jsyk :))"},
{page:56,type:"day",lines:38,date:"Feb 15",text:"and today daddy and I (and mommy) pulled up next to each other and they told me they were going to Kelly Paper, no, but…Evan climbed a tree, I couldn’t cause I had not-dirty-yet white feet…Primo Passo, sun was in his eyes, I showed him my chess game at the general store and we mapped out the knight version in the garnet (: ) I &lt;3 garnets) store. He used the term “unhoused” which pissed me and grant off later in the car and Evan pretended he had a big nose with a white cup and then regretted it cause I made fun of him haha. Wine tasting at Pavilions: (pic) slightly tipsy walking the cross walk and we gave the wine guy all this info about his (and my) love lives ex. J wouldn’t let me buy wine cause he “didn’t $9 wine” which angered Evan :) (idk - kinda the point…(the secret is, it’s a duplicitous envelope cause he’s self-aware and <em>I </em>kinda like it. We looked for an “ambiguous gift for Nat, to say ‘i kinda wanna fuck you but idk,” and I quite liked the game (the game was like a present to me) when we first got to Montana, I let Evan give me a “house tour” of his car with all his (small\n@@PB@@\namount) of possessions in it - he had a little plastic drawer, <em>just </em>for peanut butter cups. Within easy accessibility, and it was <em>almost </em>empty, there were <em>2 </em>left …2, he gave/left me in the cup I got him (pic) and I took ate a tiny bite of one of them, and was grateful for the gift…he tried to get me to eat more cause he thinks I’m anorexic (lol. why). I asked him if he thought I looked like a doily (I was wearing lace) and he said: “yeah” which made me happy, which apparently was all I needed to be happy. I put on lots of red eyeshadow that made it look like I’d gotten punched in the face, by someone who had eye shadow on their knuckles - a strange occurence - perhaps a clown? (not sure) <em>anyway </em>-"},
{page:57,type:"day",lines:52,date:"Feb 15",text:"then I went to J’s house and we had an Erewhon meal on the rug and he said it was not very romantic - he said he should’ve gotten me a present, that he’d get me one when he figured out the right thing and also that he wanted to get brother a present maybe my fairfield porter book which he’s been reading so much he has like 4 bookmarks in it - a picture of his grandpa, an austerely friendly note with a picture of a house on the back, a photo of a weird metal sculpture (ew) and <em>I forget. </em>He taped the book back up with a piece of white gauze on the spine, and one inside too - I noticed the inside one first and he was rather nonchalant about it, even though it’s my book that I emphasized how rare it was when I leant it to him. We went to the beach today, after getting sandwiches at Primo Passo - there were two in the fridge - one meatatarian and one vegetarian, and I got them out and handed him his - he took mine from me when it was time to pay. We played at the beach - took off our shoes - walked by the water - I watched him five (throw!) pieces of his sandwhich to the birds (seagulls), and then we went back and got mine. We sat by the edge of a cliff - a cliff made out of sand, and the edge was toppling over - if we wanted to, if we let it. There were two little girls smiling and looking at me, and playing and we both saw her heart underpants and both though I might be pedophile but <em>knew </em>that we were not. He said he has a pervasive feeling that he is bad and asked if I had it too and I said I had a <em>different </em>pervasive feeling, but couldn’t think of what it is and thought about it as we started walking towards the\n@@PB@@\nwaves because he said i don’t <em>have </em>to have the same feeling as him but I “said” “no, I’m not lying, I’m just thinking about it.” And then, on the cliff, he held me tight and told me he’d never felt this way about anyone and I said “me neither” and I wouldn’t have put {page:58,type:"dreams",lines:8,date:"Feb 16",text:"Fantasized about: Draco and McGonnagall, Hermione and Ginny - flowers. Dreamt that evan gave a homeless man $35 - “they butt venmoed me” ?what?” “they dead venmoed me.” We were in a parking lot looking for parking, and I was tryna talk to him, but he was preoccupied with incremental divets in the paving (so maybe it was J at first). The homeless man were actully 3 (asian?) girls."},
{page:58,type:"day",lines:31,date:"Feb 16",text:"Anyway - back to yesterday - then walked back to his house, and he did a little jazz number about having to poop - got low, his knees.\n@@PB@@\n(?) - I kinda liked it - could’ve been longer, even though it was pretty long. At his house, I told him about “(what) if we were both bears, then you would be a bigger bear, and I would be a smaller bear (than you)” again (I had imagined him making a sort of cave that I could sit in - being enveloped. Then we played the guitar, and I sang for a little. Later, Grant grantington called, to apologize for me not knowing if he was gonna kiss me ever and I talked to Mason about his problems with miriam for a little. Then went to Killer Noodle by myself and got three eggs and they of course messed it up again - gave me meat - and it took forever and I got a blood orange beer that I only drank a little of 🤷. Came home and fell asleep, woke up at 11:00 and went to get a pint of ice cream at Ralphs - the new one that J showed me (I don’t like the other one cause it reminds me of Henry, and getting on the freeway and it’s not on Wilshire, which is close. On the 14th he said he wanted to have a “kindness orgasm” but we ended up sleeping together, which was nice - laid on the rug and he said something kinda nasty and started feeling my butt and I got really turned on and started grinding on him. Then after when we were in bed) he said he used to think sex was a science, now it’s an art.\nFebruary 17"},

{page:59,type:"ideas",lines:4,date:"Feb 17",text:"Curating small books with a little of everything - an idea, a thought, a sculpture, an experience? ⇒ (?) - Also: taking some of them down ex. where do I put the first aid kit - just don’t copy it/…"},
{page:59,type:"day",lines:13,date:"Feb 17",text:"I guess I’ll tell J about my lower back “injury,” and he can make me feel better about it…he took all my worries from me when we were on facetime. I don’t even remember if this happened, or I dreamed it: sat up in bed, then slid back down into Sean’s arms, and told him it was a bed-coaster - it was very important that he understand - I think it meant something else, oh I’m worried about my back I’m worried about my back I’m worried about my back…I don’t know what to do…I need to think about it until it makes it better…I need to think about Journaling me until it makes it better.\n@@PB@@\n(pic: sushi…water…? (ya know :/)"},
{page:60,type:"abstract",lines:15,date:"Feb 17",text:"Not doing ok, but I’ll <em>be </em>ok, not <em>doing </em>ok but I’ll <em>be </em>ok, not <em>doing </em>ok but I’ll <em>be </em>ok not <em>doing </em>ok but I’ll <em>be </em>ok mean mean mean sean) mean mean mean (sean) mean mean mean (sean) Group things together that have something in common<em> and there were “lots of systems of movement available - two in the pciture, even…put them together to find another one, find what they have in common (off bat) I don’t know if I’ll be ok (I’ll be ok) I don’t know if I’ll - I </em>hate <em>Sean I </em>hate <em>Sean I </em>don’t <em>ever want </em>to see him again. <em>(He is </em>also <em>annoying and I </em>do not <em>like him very much - and he was </em>annoying <em>me today. I AM MAD I AM MAD I AM MAD, IT IS MAKING ME MAD (MAD in a crazy way) :( :( :( I don’t </em>want to be mad….I want to be sane."},
{page:60,type:"ideas",lines:7,date:"Feb 17",text:"My idea: tik tok or reel: me praying next to a bed “thank you god” for giving me two boyfriends, and it’s light meaning pale blue, and flashes to me (same place) but in the dark, and my hairs down, crystals and candles…idk…kinda funny…? shots of my two boyfriends) eyes closed Christian, eyes open witchcraft"},
{page:61,type:"day",lines:29,date:"Feb 17",text:"I DO NOT FEEL SANE…notice things around for panic attack…say what you did today to ground (haven’t done that yet) ok, so: here’s what I did today: went to the clothing swap with Grant after all…brought my purple suitcase, and my laundry basked…found ex. blue sweatpants…something’s I’d been missing…even more when looking through the clothes…my fav BMelville sweater - electric city - got it back - rugrats shirt was most important…went through all/a lot of my clothes with Sean and I finally started letting him touch me when I tried on this white night thing that you could see my nipples through apparently…he looked so hot with no shirt off and the (pink) sweatpants I gave him…I almost wanted to fuck him in bed, too, even though I’d been thinking how dumb his thoughts were all day - idk - it’s hard to think he’s dumb cause I’ve known him for so long and I didn’t think he was dumb before…but yeah, everything he said was like\n\nand I wanted to say “I have enough pieces of your puzzle to know that’s not true, and couldn’t possibly be true” and half the stuff he says i feel that way about, like when he pretends he doesn’t care about something. Oh yes: Nat accused (missing: drama - idk boringish - read it all and didn’t feel like typing it - not terrible, just more like normal diary stuff…if that makes sense…)\n@@PB@@\nreal as possible -"},
{page:62,type:"abstract",lines:22,date:"Feb 17",text:"these cream colored walls couldn’t <em>possibly </em>be disobeyed by leaving - the only real deterrent is a social one, because the walls are my friend. last night, drawing was <em>easy</em>…it “gave” me the question: how many drawings would I need, per [increment] to look at it and fully understand and remember…back to the burrito: a problem that I don’t want to solve…”I’m not hungry enough…” this is not a ‘problem’…just a <em>thing </em>that is true right now (I am hungry)…I guess the solution is to try to manually raise and lower the threshold…I don’t <em>want </em>to synthesize/summarize my thoughts bad enough…there <em>is </em>no deadline and part of the rules of this project is that it comes directly from me…I need to design an <em>autopro </em>in which the steps towards the goal are (necessarily) embedded. Or perhaps I am more interested in the process…to imagine the done is to have more work to do - <em>now </em>I have to: consume all this information I’ve collected for myself… (SOM: what phenomenon is this a part of?, what’s another example (of this?) (1,2)\nFebruary 18th\nWalked <em>all </em>"},
{page:62,type:"day",lines:16,date:"Feb 18",text:"the way down wilshire to get here and it was sunny, and everything was loud. Couldn’t pick which place to visit but then I chose Amandine and the 17 min walk meant I <em>had </em>to stick with it, through it is loud, and warm - a din from the dessert cooler, and two annoying women who didn’t get dessert (”next time”) said the older one in the tan loose tapered pants that could sum to just be “pants.” Black turtle neck with a necklace. I’ve got my PWC handbook, which is an excuse for writing what I as forced to observe - the printing - the 499 other copies was an excuse so that I could make it myself - just <em>exactly </em>as I wanted - to look like a passport (so no one could notice (accidental undercover) The music (Bohemian Rhapsody…)"},
{page:62,type:"abstract",lines:8,date:"Feb 18",text:"is like a little kid, or a dog, that joins in with the adults just to be part of something - it just adds to the din - of people talking, and the freezer being unnecessary, almost unbelievably, loud - this <em>particular </em>mechanism takes a lot of power because it <em>exchanges </em>the cooling effect for the heat because he wanted to feel what it would be like <em>inside </em>the sun. (dressing x glue v’)"},

{page:63,type:"dreams",lines:17,date:"Feb 18",text:"I write my dreams now, as part of the daily three program - what I did - any, and colors or other. Because this as opposed to others, is my ‘current’ diary. Uneventful - I dreamt I was staying in the house - in my room and I wondered when I’d leave. I was sad that Sandy was leaving that day, and that’s when I would leave. I was giving away shoes, and put a pair of (pic) leopard print sandals (size 9) with Sandy’s cause they didn’t fit me as a weird sort of joke when he asked me about them. Last night I tried: Argan shampoo with Tea Tree conditioner and dreamt that I had finally figured out how to make my hair straight though it maintained its whispy quality. And I noticed it had also grown quite a bit longer. I consulted Sandy about the new procedure and he was relatively interested."},
{page:63,type:"day",lines:4,date:"Feb 18",text:"Talked to Jonathan on facetime last night, and we “had dinner” together and then he got in bed and fell asleep, and I worked on illustrating my journals\nFebruary 27th\n“"},
{page:63,type:"abstract",lines:7,date:"Feb 27",text:"Kissing you is like disneyland, but there’s not wait time.”\nThe other day I thought: about examples - even if you’re not having interesting thoughts, you can still have examples, and they can remind you of (the principles) ex. ritual (mission: write all the thoughts down so I don’t have to have them anymore Opposite? probs (missing)\n@@PB@@\n<strong>7:15</strong>"},
{page:64,type:"day",lines:6,date:"Feb 27",text:"J went to his house and cried because he was sad his brother used to not be there. I spent the last ~ hour trying to find something that seemed worthy of writing in my journal. I talked to 6 different Indian dudes, all named Varoon ~ and they each find a new way for me to be confused. (pic)"},
{page:64,type:"day",lines:30,date:"Feb 27",text:"Mommy and I went on a walk and looked at houses, and talked about how much better we are than anyone else.\n@@PB@@\nWe went into all the weird offshoots even the numbers were weird: some of them started with 10, 20, 30 etc. I saw houses I’ve never seen before and yesterday I saw vegetables I’d never seen before. She wanted to look at the houses, she kept stopping to peek through the gates etc. At some point, i stopped trying to control her just like Robert said “no” to Frankie not making eye contact cause I said the trees at his house <em>would </em>be worried, and would grow bale gray skins and be worried, would look at each other, wondering if they were enough, and wondering if the trees who they sought reassurance from could fully understand the depth of their sentiment. J said I was smarter than him because I knew that the leaf picture he sent me had meta lines. I think I’m smarter because I developed a system for why his photo is interesting to him - his, because it “fucks with your mindegories” (pic: I’m so worried, barely have time to grow leaves (but my trunk is strong with intelligence) (pic: meta lines) (pic: long lemons, long picture, wood grain, slats of shadow, falling across the cutting board, echo)\n@@PB@@\n(missing but please type it later, pics to pic(k): puzzle slowly gathering pieces, maybe: my screenshot on his phone, the metal pipe actually being plastic, idk, more I think)\nFebruary 28th\n“something about the"},
{page:66,type:"day",lines:2,date:"Feb 28",text:"way that I’m walking is\nweirding me out”"},
{page:75,type:"day",lines:80,date:"Mar 1",text:"March 1st\nGuy made me get out of his seat. Should’ve read his stupid little green notebook. I asked a woman but she was homeless and just belched really loudly. J was super scared of homeless people on the promenade, and started crying in the car on the way back, and then later, <em>way </em>later, said: “you don’t like me anymore, cause I was crying.” I told Lindsay and evan at the Breakaway Cafe, well, I told evan, and he told Lindsay while I had to get my sophie chai latte. Then she said: “<em>Where </em>do you find these guys?” or like: “they’re weird in really different ways” and then Evan confused Richard with J. Farm animal puzzle into babies in cute outfits. I went dancing with kat (as in: Kat and Denley) Last night - funky sole night, and it was really fun, and on the way there even, I forgot about the heaviness. I talked to J on the phone at 2:00 when I got back, and he told me about his paintings - 3 things. Kat bought me a drink, and was consistently smiling, and the color was on Evan (even though her hair was purple from the lights), so it was a little confusing - evan took secret videos of us. Stupid guy already left with his stupid green notebook (I would hate him if it was worth it) Woman staring at me like mommy always does. Fucking homeless woman won’t shut the fuck up. Girl inside has resting cry face, so I had to stare at her to\n@@PB@@\nfind out if she was upset. Ended up having 2 fullish drinks - no Evan had some - margarita + tequila moscow mule which is wha I meant to order the first time, and I got to buy her a drink back and I think the reason I wanted to is cause then, if she doesn’t like me, I don’t have to think “Oh, she’s mad cause I didn’t buy her a drink, I should’ve bought her a drink” she is going to become an engineer. I told J that - in the kitchen, wen the sun was coming in, and we were making the salad, that I’m good at so many things. he said I should pursue writing. And maybe I will - I wanted to write about the thyroid thing - now she gave me the little yellow pill, and stressed the seriousness, and looked at me later, when she found out the test results were wrong, and then the next time I saw the nice nurse, that was blonde - she was telling me I’d make it well on the outside, because I had charmed everyone there. And Dr. Sugarman, who knew I was too smart - I cried when Brenda said I would go to the next phase (where Gemma is) and I told her she could change her pets every 3-4 days, and caught her in the logic lie (Ben n’ me) (she is evil to animals) - did you undo that thing that you did when you found out it was your\n@@PB@@\ncoffee maker, not the cat (and, she didn’t, and she acted like that didn’t even make sense. I hate her. I hate her almost as much as the woman who was staring at me). I’m a little scared to begin the recall because there is so much f it. I got the jam and brie thing even though it was a mistake last time (pic) two sweet things, when I didn’t even need one (oh - <em>and </em>- I got the cinnamon chai latte and evan knew it was strange to have two sugar things and it made my mouth feel all weird, and my hands were sticky till when I fucked J - I told him I’d told L and E that I couldn’t come, I’d refuse to come until L cried - I’d just lie there - They were going <em>on </em>and <em>on </em>about how often they come, getting their numbers up. The real thing is: i’m so good at sex if I want to be, and I hardly ever never) want to be. When we were (?) the problem of my being upset, J randomly said “should I just fuck you hard and deep” oh my god - that terminology. And he did. But not because I wanted him to - even though it was my dream in the cheesecake aisle, when I asked myself my underlying goal - like I was in high school (”maybe if I get him alone, ply him with wine, get him alone well”)"},
{page:76,type:"abstract",lines:54,date:"Mar 1",text:"the confusion of the thing - the confusion of whether it was purposeful - when he held me - no, scratch that - when I stood on the “dénouement” and he said: “remember when you used to hate sex” like a fish who can only see the reel inn and fire.\n(pic) me and my two sugary things, me being upset (everyone being upset that it’s too sticky. ?now I’ve planned it so the guilt is gone?\n(pic) ← compliment sandwich x (pic) soup, in which the compliment is the celery, and the rest are ambiguous neglements (first, it became a burger, cause the question was so <em>flat </em>- managed to be so <em>flat</em> - why do you lie about sex, but you don’t lie about anything else (why are you so direct about sex, but you don’t feel the need to be direct about anything else, for example: feelings…⇒ why do you ‘lie’ about feelings, but sex is something which you can always, and do, speak directly about - you pride yourself on that. (impetus, seed, pre-tot: J telling me that (when I asked him how many feelings I’m allowed to have) that I have six feelings and all of them are anger - no - one of them is sadness (no there are 20 more, and one or more are joy (I think his therapist tells him everything is anger, as evidenced by what he said on the stairs which had the wrong cadence, we couldn’t even walk on them without thinking about it)) juxtaposition - Evan - JC - car - tape recorder) next: me explaining things to myself. How do I explain things to myself? In diagrams ex. the dandelion half - because it became a diagram after he saw the halves. Next: vashti - (the queen vashti?) (pic) at star toys, the maypole, the carousel - (perhaps you can address it with this helpful metaphor that I’ve designed - a dream (real?) - a cage by UCLA (a dream I invented, I designed): and then, if you go to the end - “ah - I can’t\n@@PB@@\nget out” (but secretly, if you look behind you) - you have rules, but if you look backwards, there’s a wide open way to get out.\n(pic) (if you go all the way down the path, you can just leave”) - that’s why the physical injuries are so confusing, and the actual thing - the MC - helpful to J - to get out of rules, there weren’t really rules there in the first place - yes, the bars, but just go out the back, the bars are a temporary (real) experience, but you can leave through the back\n(picnic) (green door) (”what goes into the become a real person kit?”)\n→ yesterday it was a colonel mustardy cloth - with little “?follicles?” like velcro - in that each thing meant something if you zoomed in, unlike some other things where it didn’t."},
{page:77,type:"day",lines:7,date:"Mar 1",text:"(pic) me having to switch my attention between Kat and Evan, so they could each tell me stuff. I ended up shaking my head in a time lapse. I dropped them off <em>right </em>at their apartment - went through the gate - called Kat on her phone “who’s gonna answer?” “I am.” Then she was mirroring me dancing and it made me really uncomfortable."},
{page:78,type:"day",lines:28,date:"Mar 1",text:"Later\nJonathan and I went to the Getty. It felt like a wash of white and blue. My thought on the train, trying to understand why my thoughts were all so different x needed to be spoken aloud - each of them had a hard <em>edge </em>at the top, where it was ready to say, as if it had been done and none of them were that interesting - my thought (on the train) was that if I had gone to the getty by myself (because perhaps it felt there was something missing - none of the art “seriously intrigued me, and on the way there he said I don’t ever <em>really </em>have to eat and he asked if it was just with him and it is. For example at the Reel Inn, I was always nervous I settled instead for telling him it was because I was preoccupied with thought (multi-tasking he said). He asked, on the way out, whether someone laughing was laughing at him, and then if people were ever laughing at him, I thought. I explained that he’s wearing pants and a shirt - a normal guy. We went on the grounds and it was very dark to see, and made fun of James and Barb at the Summit (inverted). I realized, to say them, I was thinking thoughts to <em>seem </em>smart - to say smart thoughts. And I have <em>never </em>(I don’t think) had a reason to sound smart. I think it is special and I think it is true that he sometimes shares with me what he’s thinking."},
{page:79,type:"abstract",lines:29,date:"Mar 1",text:"sometimes Sandy (I thought this at the end of the steps, after my conversation about thinking thoughts for other people) says what he’s been thinking - I know it’s coming - he’ll say a long thing. Jonathan likes when I talk about myself as a child (”seeing the round apartment building on the way back from bubbes”) (but that, specifically, <em>is </em>a special memory to me)\nI had a dream last night I think that Sean was explaining - writing about (?) an interaction between a girl and a boy - the boy was younger - rough and tumble like - nervous - plain white shirt, khakis, surprised the girl - fuzzy long brown hair, thin, taller, would be interested. He needed to do more showing, less telling, I thought and explained that he should write what the boy was noticing. this seems an apt description for the pattern collecting thing I often reference in my mind - what patterns you’re collecting at any given time, is a good indicator of how your mind is doing, of <em>what </em>it’s doing. For example, he might notice her hair, think it is warm like fire, cause she has just been running. This is a projection of how he feels about her. As he’s talking, he wonders, absentmindedly with part of his subconscious, whether there is a stone in his throat - a small pebble, like gravel, he unconsciously revises it (even his subconscious mind knows a <em>whole </em>stone wouldn’t fit, in his throat)."},
{page:80,type:"abstract",lines:27,date:"Mar 1",text:"The mind, blowing so breezily, almost toppling him over - (he is scared of the encounter - it is overwhelming and powerful). Instead of the pills every morning, you could look at your book of photographs, and remind yourself one counter-intuition at a time, one paradox at a time, that the world isn’t as it seems. This, though not as enticing in it’s clear dominion is the way (to do it in the morning. Alright: here’s a picture: (pic) v’ (pic) x. Jonathan said what we need, instead of the exhibit (Gustave: Paintings f Man) is an animatronic recreation of Fairfield Porter. Through the museum it seemed so clear to me - everything.- what was <em>right </em>and what was <em>wrong </em>with every painting. For example: the irises that Van Gogh painted - a nice wonderful painting, and I enjoyed it very well - was flat in its treatment of everything the same - he only uses one brush. The problem I had with Gustave was his treatment of the water was different than his treatment of the shirt - he was so very careful with the shirt, and while the water - each color was a brush stroke. Why should it be like this? Almost none of the paintings were very good. I felt foolishly that they could have benefitted from my current croppings of pictures: making sure that everything is in the right"},
{page:81,type:"day",lines:27,date:"Mar 1",text:"place. My photos aren’t even working - perhaps I should make them in photoshop - I want something very specific - I need to paint it. We stopped at the cafe and I had a healthy wrap and he had a turkey and cheese sandwich lol and almost bought a book called “How to be Rich.” and she shared a hot tea that kept my hands warm like a heater as we went into the grounds still and silent on the tram together - he wanted me to sit next to hi. The fabrics of our clothes touching. After we got to my alley, he leaned his head on my shoulder and waited for me to kiss him and I finally did. Soft and long, and he allowed my tongue in his mouth, and wanted his in mine.\n(pic) ← the extra pieces of the coffee cake that the woman gave us, after calling us beautiful girls - she was so nice - letting everyone try every sample that they wanted. And, well - we <em>did </em>buy something - we bought the coffee cake.\nSonia wears her hoodies from H and M everyday - she has four of them - in all different colors, and I didn’t correct her that we <em>can’t </em>go back, because it closed on the day we were there - 3:00 - right when we left. Right when she was walking me to my car, she started to tell me that she was trying to dress more feminine to be more confident - she listened to a podcast or something."},
{page:82,type:"day",lines:17,date:"Mar 1",text:"Time/Space\nThings I meant to write a long time ago - that time that girl from hinge tried to make me feel bad in that dessert place for not knowing that supermarket strawberries aren’t as juicy as the ones grown straight from the ground. The tall Lindsay who gave me the big book telling me I was a lesbian because I was always walking in on her in the shower cause I have OCD - the dream I had when Evan was in my bed: mommy was talking to Siddhartha on the phone and I was trying to find eggs in the fridge but all of them were cracked. It was very nice and sunny, and perhaps I was explaining something to Evan about Siddhartha. I thought I could make an outline for all my adventures - how many significant moments were there at Nautchaug for example - the possession - (missing: irl recall long time ago)"},
{page:83,type:"abstract",lines:15,date:"Mar 2",text:"March 2nd\nI took matters into my own hands, solved a problem - went to the store to get sushi cause I hadn’t eaten. Having already decided to leave (that cursed parking lot) waited in line behind a white car (())→ waiting in line for <em>slow </em>cars to fast down (the slow becomes an identity - it’s all I know about them as Evan would say: “<em>instantly, </em>an analogy <em>jumped </em>into my mind. Waiting for slow people - I can’t explain things fast enough, and the whole world is <em>slowed </em>down by <em>slow </em>people - who can’t think - who are <em>too </em>stupid to think, it’s an oozing gel - I suppose - more specifically, I <em>think </em>slower, aware of all these people who need things explained to them - who need people to be nice to them"},
{page:84,type:"abstract",lines:41,date:"Mar 3",text:"March 3rd\n(missing: dream, plan for 12-packs, plan for head eggs, a few more ‘ailments’)\nI suppose I ought not to call J after he has so blatantly disregarded my plea for attention from yesterday but I do fancy going out in the sun, and wonder, once I have reached my destination, where a visit with him will be difficult to strip from my mind. Oh, I <em>think</em> I’ve remembered what I wanted to say which is 1. Try as I might to shake the notion that the impracticability of it could not possibly outweigh the attractiveness of such a solution, I can’t help but remember, multiple times per day - that an <em>entirely </em>analog process, might feel superior to the joint digital and paper one that I employ now. It seems foolish to fantasize about such a thing, and yet: it carries my heart to its stead - to a distant, foreign mountain, on which I can look over plenty of grass, and the sounds of the birds chirping\n@@PB@@\nkeeps the foolish twitter of my heart at bay. The exercise itself insights merriment, and for this reason alone, I wonder if I should put it off. Instead, I’ll make known a phenomenon, which I attempted to explain on the phone - for example - the camel to gazelle thing - I reconfigured that in my mind so that I could fit it on to the page. These exercises I enjoy quitely, and I know it is because it gives retroactive validity to all those solitary hours I spent in my mind, which had assumed the white walls of a waiting room, and in which I crystallized, <em>solely</em> due to its long hours, the waiting rooms, that which I had been pondering, into increasingly bite-sized amounts, knowing that the game was only a convenience, learning now that it was for some different purpose. (Now that I am doing it purposefully). I once described these manufactured structures as towers, however, perhaps their height is now secondary to their number of refinements, of revolutions around that thing - your mind - the sun."},
{page:85,type:"ideas",lines:29,date:"Mar 3",text:"<strong>Primo Passo</strong>\nHaving thought more about our plan to shoot up Sweet Greens (J is unsure, cause he’s an investor) I think the most striking thing about the population, were we to breed them like the floppy-eared wolves, is their beautiful lack of ambition. It would be nice, like menswear, to see them try hard to survive. And for that reason, I think we should proceed with the experiment. Pilar was cleaning my room, while I was trying to dissuade myself from telling her I was reading Evan’s essay. I started cleaning up, and then gave up almost immediately and that is what prompted my walk. A passport book called: “become a real person” or “how to…: “set theory” (pink with gold accent. “game theory” (orange) “instrumentalism” (white - all repurposed terms) ANIMANIMALISM, “Art as science; science as art” And lastly: how much could I fit in one book?\n(pic: Referring to abstraction)\nTable of contents - “the metaphor machine, internal consistency (not set theory), making up a game for yourself, paradoxes…basically, the framework I wanted to explain to J in the museum but he didn’t listen…\ngold, 28 pages - could I do it?\nThere is a guy who has been on the phone with customer support for the duration of my visit. A lovely little challenge - to make concise, succinct - the information - to represent it in a way that a non-creative smart person would be able to read"},
{page:86,type:"abstract",lines:44,date:"Mar 3",text:"I’m starting to have that forgetting disorder, and I was collecting - little bits and pieces - free things (pic) water cup\nThe napkin (pic) ping ponging around all the chairs was a meta version of all my problems coming here - and even “probably you’re so good at complaining” they were (pic) saying the guy was o (missing)\n@@PB@@\nMr. Beast made people make towers out of blocks that couldn’t fall, then had people hit them with dodgeballs 24 hours later. His next task was having people count the seconds till an hour, and it was pointless cause no one was even close. I tried to pick a date to assign myself to make little pictures out of, since the gazelle and camel thing took time - squeezing information into biter and biter-sized packets (there’s still room for more). (missing) Then I remembered back to the tower game I was designing x describing at Special Starbucks and that this was an example of the failed game - a “4th quarter” proposition, invented by the sitting there, writing it down.\nThe conclusion to the previous story, which took place at Primo Passo was that: (missing) I settled on this: describing, not deciding. The whole situation was simply “describing” my mental state - the two problems at the back and side of my mind. And the napkin - another level of meta(phor) so there were <em>3 </em>levels. “holy holy holy” - and the napkin was just <em>bouncing </em>around the situation - “look, you’re problems are still problems, you can’t forget about them”\nAnyway, to tie it all back (I <em>think </em>I can) (missing)\n<em>that’s </em>the point of the towers - they actually create something. What <em>was </em>the thing that incites, invites these certain sort of sessions, what <em>could </em>be put in the air, for the world to\n\n(())→ the very specific part of a dream that is: the place in the brain where lost things like lost socks go, for example, I’ve dreamed about going on a trip with my family consistently for the past three weeks, cause I never once (refused) to think about it consciously, and so it <em>just </em>keeps resurfacing in my subconscious. Well anyway: <em>that </em>is magic."},
{page:87,type:"abstract",lines:46,date:"Mar 3",text:"Perhaps similarly magic as Matilda, or reading your (own) mind, but my mind - the line ( / ) told me this one was true, that it really <em>does </em>affect the world (())→ “take all those darkness: etc. (going backwards) &amp; “everything I thought when I was alone is true” So, to put it simply, and matter of factly, <em>that’s </em>why it matters when some of your thoughts become towers and get traded for coins (pic) (forehead to forehead) reading your own mind - the lines, colors etc. And before I forget: add the autopro in the ritual of manual labor chapter, which is <em>mercifully</em> blank, (2 prosaic examples of the SOM (include the ring?): cropping (perfect) and zooming in/out (probs good). Should I have an “advanced SOMs part after the “making up a game” part?, and I could include the fourth quarter mechanism, which invents things (simply by existing). Anyway: wow I know how to do magic. By creating something n your mind. By referring to abstraction. And what I wanted to write earlier was the problem of having to <em>choose </em>which thoughts to write ⇒ (clarification) the problem f writing down <em>every </em>thought, which I solved with the example of reading a resource, just one that I could take for granted - the water cups, the journals, which I now can’t - perhaps my ability to do things like create chapter headings, print stuff out, send away for stuff (I take for granted that I can do these easy tasks, making the wrong assumption that I will, at once, at some time, be a robot.\n@@PB@@\nAnd then, to breathe this disorder into being - I cast together my rediscovery of a tray of amethysts that were all very nice “I’ll call all of them Ana” without even a second step in the process, or a clarification, together with my memory of all of my rabbits, and <em>all </em>of them being called Sophie. When I told J that my official favorite animal was a rabbit, he seemed interested. And when I told him “I often think” my main impetus for writing in a journal, for keeping a journal is to have a place to put my jokes, because they can go nowhere else, because no one will ever understand my particular brand of humor,” (he seemed positively impressed), he said that it was “beautiful”\n(missing: to do list)"},
{page:88,type:"ideas",lines:35,date:"Mar 3",text:"promises to myself. But i remembered another difference which is that I don’t <em>want </em>to make art - I gave it up that day I thought of the BARPK in the Wash U basement - I want to trick people - I want to make items that are indistinguishable from common household items, for example, games, at least in appearance, general aesthetic, tone, cadence, context etc. (useless things - things that have no purpose). I have no desire, in fact, I have disdain for the kinds of pursuits that say to the world: “look at me, look how <em>beautiful </em>my soul is,” so when I was singing a good song, inspired by the ding dong of someone’s wind chimes and wanted to use as an opportunity, or an example, of something to create, no, no I didn’t. (missing)\nHere’s <em>another </em>thought: I could ruminate about Matilda, about reading my own mind. And to <em>aid </em>my rumination,\n@@PB@@\nperhaps it would be prudent, - and here’s the thing - the drawings help - not just for memory, but also to explain things to myself. There is a certain rule - to draw things that don’t exist. It starts as a rule, and becomes a statement, or a principle - a beautiful one. Another intro into it (because I still can’t <em>quite </em>get started, is to think (a correction) of the things that I <em>didn’t </em>need to write in my journal - that I filled in later - a correction. Ah - but reading is different than writing. And I like one, and do not like the other. Perhaps the new game (and perhaps I enjoy games) is: wow - I can comprehend writing, and that as a diving board - to (surprise myself by doing a back flip in midair) crystallizing it in a visual image, like I am trying to prove to someone - J - that I’m smart."},
{page:89,type:"day",lines:52,date:"Mar 4",text:"March 4th\n(missing: dream)\nThis morning, because I was <em>so </em>hungry yesterday, I spent a surprising while deliberating at Pavilions at what to get - how to construct a meal with all the ingredients I craved - a game I play often - x. (missing) Anyway, I settled on a tin of (missing), which I could not scan, cause the bar code had been erased by grease. (missing) My question - would people be interested in this - having answered it - now makes no sense - people would be interested in it if, because, <em>I </em>am interested in it If I could communicate the tantalizing parts - the horror of two processes instead of one, the (titillating?) nature of coming up with a - good - idea - in a dream, and having to decide if it is really good, and/or if it could be good in a dream space…\n@@PB@@\nI like it - (I like it a lot) - that board game where you guess people’s salaries. The longer I sit here, deliberating about what to write first, the more individual and precise (discreet) thoughts I begin to recall - from my walk, and for, for example, my nightly nap - some too small to explain - and yet - made bigger by my will alone - gaining traction on a vector that would or should be irrelevant. “It can change/it can’t” - in terms plainly allowed to be explained to other people - it’s only instrumentalism - a trick of the mind thing, again. Or perhaps I always had it, and J didn’t believe me, so I had to let it out of my net (pre-tot (seed): (missing) But the reference immemorial, is that day with Doug, (Doug wasn’t there where I thought about Doug on the bus - made the bus decide, even though it was as indecisive as Cassie and I trying to decide where to go to eat. An example of synthesis: ←- (an example to write this here): my back - is it snowball or spiral, (mis) Note: the sun goes in, and out, and any noise - (”becomes my mind”). “I can’t deal” with any noise, or else I try to place it - the only real coincidence. My thoughts come back like raindrops (snowflakes) - precious in their (skill at attaining them) - uniqueness. ex. To do: add the coop certification to my folder. example: another potential iteration (pic) drawings, typing, writing - some special triptych - strange as it is sacred - my version of the talmud (())→ the formula for adding another person to a social scenario. ex. some thoughts can benefit from synthesis; others keep moving like the rule of thirds (the cup with kraft single on it). I showed daddy - perhaps I"},
{page:90,type:"ideas",lines:54,date:"Mar 4",text:"shouldn’t have - the map games I was going to discard on the way from Evan’s house and he showed me a little bit about his [painting] process in which, behind a panel in his cabinet, he was taking to cafes, piles of papers, non-discriminated between what other people had written, and what he’d written - <em>this </em>is what irked me - made it hard for me to understand his process - couldn’t even comprehend how to ask him - the rule of thirds - my mind moved all around. he says he condenses them down to a <em>few sentences </em>- 1 or 2 sentences, and then - discards the paper. And lastly, to add an End tone to the last thing I want to say, in Bechdel’s book, I was delighted to find two things, 1. The methodical way she excused herself from OCD (and that she did it <em>by herself</em>), and 2. (again) the “i think” circumflex, but most especially, the train of thought which led to this iterative process, and through which I can imagine, and feel at home, in all her other iterative processes - beautiful - and begin to find my own - (beautiful). Perhaps the pages of my passport book instead of…, could tell all the stages of my iteration - a new page for a new way of approaching the problem. Ah ye - I’d forgotten my plan - on the train trip home - the train was this plan, which carried me. My theory is and was that “I could simply compile” the coins, the foreheads, the pre-Doen, and the towers from yesterday. Then I could rewrite it like I did that Amazon letter, and compile it into un petit cahier: “Meta Journal” (missing: no time!)\n@@PB@@\n\n@@PB@@\n3. the game - finding the right game (pre-Tot: why I don’t find the witch work compelling - it’s not hard enough). The writing down, because first I thought of, thoughts is quite tricky, and I have to befriend and/or battle various systems in my mind. it’s a game that takes my full and complete attention - it consumes me. 4. continuing the infinite resource” phenomenon - it’s brother -precious resource - the game - turning one into another…<em>squeeze </em>the sugar packets until they have meaning. And I think - back to why I <em>love </em>this game - i get to take ideas that are not entirely interesting (and squeeze them until they “become interesting” ) - this particular game I like - homeless girl - cartoon network - item, ex. pipe - finds another use - re-imagines the thing (it’s the re-imagining that I like). And so: the procedure: find an idea - <em>any </em>idea - that comes up in my mind - gets <em>so </em>big that it fits (the rules for journaling are very simple (and very strict)) (angry maddie) - nothing into something - the <em>thing </em>rises"},

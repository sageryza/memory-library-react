{page:585,type:"abstract",lines:14,date:"Jun 22",text:"june 22nd\nThis morning when I woke up I thought about all the hoonies and how it’s just a game I made for myself and set theory is <em>also </em>a game I made for myself, and thought about re-imagining the book as a component of game theory. Well, game theory is the first step on the\nmaking up games. making up games for myself. Playing made up games. anyway. as I was lying in bed I was thinking - <em>Set theory </em>is <em>also </em>a game I <em>made up </em>for myself\nSo: another possible outline (?):\n1. game theory - make up games for ourself\n→ Systems of Movement - when we get stuck, it’s nice to have a place to go\nAnd sometimes we can make up games for ourselves, using all the components we like the most"},
{page:586,type:"abstract",lines:11,date:"Jun 22",text:"(pic)\n(trying to remember the thing I was writing (\n(Trying to Sneeze(\n(Trying to remember something(\n(trying to cry (Maddie)(\n(trying to work on the thing I was working on but I can’t remember how(\n(that feeling (frustrated, but can’t really do anything about it)\n(<strong><em>this is a new notation - (note the “orientation” of the (parentheses))</em></strong>\nis it related to?\ntrying to poop and knowing if you just relax and stop trying you will be able to\n(no, but this <em>is </em>the solution to all of them, maybe (or some))"},
{page:587,type:"abstract",lines:10,date:"Jun 24",text:"June 24th\nall the hoonies\nyour mind should be in the center - try not to let it stray to the periphery, where the things are, instead concentrate on the empty space in the middle, and what all the things refer to. You may think to yourself - “no, this one isn’t quite right” or “this one doesn't belong here,”\nall the hoonies\n(pic)\ncafeteria plate\n(pic)\nthere are the “raw data” - and you can arrange them in different formations\n(pic)\nhere is one that we like"},
{page:588,type:"ideas",lines:23,date:"Jun 24",text:"beautiful placeholder\nThe Imaginator (the imagination station)\nYou <em>use </em>all these (cards) to imagine something. (I wanted to prop it up - hang it - so I could see it while I’m working - what I’m trying to imagine…\nOR: I guess, it can hold all the things you’re trying to remember all the ways you’re lying to yourself - all the things you’re trying to convince yourself - so you don’t have to…creating a physical form for your thoughts so that, when you ex. discard all of them - dismiss them “oh, those don’t count” you can leave <em>some </em>(and have them still be there)\nall the things I need to imagine something.\nbird + pic → it’s hard that they’re on the same card, and there’s 1 of them but they’re not together\n→ the idea that some things don’t quite make sense, and you sue this to accept something that’s hard to accept - that something you <em>can </em>change <em>shouldn’t </em>be changed (serenity prayer tehe)\n- → something soft - an angel - I’m trying to be nice to myself.\n- → the candle (?) - I’m trying to foster excitement (these are all the things I need)\n→ the clock + the eye: “where I am is a strange place”"},
{page:589,type:"abstract",lines:14,date:"Jun 24",text:"(pic) the sugar packets\nchina plates\na pearl necklace\ndecorative crackers\n↳ that never get eaten - that are “there for decoration”\n→ cause you had to bring something to the party to show you “care” - decorum remember: the last one is a <em>metaphor</em>\n:) pataphor: crackers with rhinestones\nor: a decorative hat\nthe diseased hat mobile: because you can wear your disease like a decorative hat “oh, I have gout” : talk about it at parties actually disorder makes way more sense\n(hat) ← ocd/anxiety/adhd/autism/bpd etc.\n(pic) ← abstracted version\nsubversive - subverting expectations - perversion\n→ perfume bottles with something other than perfume in it"},
{page:590,type:"abstract",lines:19,date:"Jun 24",text:"(pic)\n(pic)\nPLEASE LIKE ME!\ncould be added to the kit\n(and then it brings up the idea of - containers with things that aren’t meant to go in there, or <em>are, </em>as in, they are a <em>metaphor </em>for what goes in there “this is “actually” what this is.”\nCHAINING - Let’s chain these together:\nSet theory can go after/ but basically, you take a structure\n1. Mold + balloon → …now you can put other stuff in\n2. Set - there’s 3 of them…Part 2: now make the apparatus (pic) - represents the relationship between the cards - now finally you can use them to imply things about the other things you put in it.\nthe metaphor machine is when you use the little pictures to imagine things (print them out, or let them print them out…?\nfocus on the center - the stuff is at the periphery - this is/feels like a paradox\nkits and sets: ok, theoretically you could represent that as (pic) vs. (pic)"},
{page:591,type:"abstract",lines:15,date:"Jun 26",text:"26th\nSimilitude - “something in common”\n(ニ()ニ) → this can be the basis\nexercise: do this with a friend, lover or stranger: what do the two of you have in common/ Draw a (large) venn diagram and use this to write out all the things you have in common and your differences. You may want to draw the internal ellipse in proportion to how much you have in common\nyou can plug anything in - data - to get the “raw form” (even moments can be data)\nThe drawer in your mind - the drawer pull - a Cognitive Vehicle is like a drawer pull in that it is the key to opening the drawer - without it, you have nothing to hold onto. (Don’t forget to write <em>what </em>the things have in common with their cognitive vehicles/metaphors in the ellipse"},
{page:592,type:"abstract",lines:16,date:"Jun 26",text:"other way to star (or should it be like this (pic)?\nballoon metaphor at some point\n(ニ()ニ)\n^\nSimilitude → this is what these have in common…\nHere’s the structure: () or, you could just take <em>this </em>part of it…so that’s ONE relationship that two things could have in common. (pic)\nanother one is the game set. (pic (apparatus)) ← these cards all have <em>some </em>things in common, and <em>some </em>differences.\nHere is another relationship (pic) implies they have something in common with each other (implies the center) or they have 1 thing in common with the center.\nAnother thing you can do is\nBut anyway - now that you have <em>the thing </em>in the <em>the middle </em>you can apply it to other things…or you can start looking for examples of it (or maybe your brain will do that automatically)"},
{page:593,type:"abstract",lines:16,date:"Jun 26",text:"(pic)\na piece of floss sticking out of the trash can\nI noticed a gray hair\n(pic)\nI saw a tik tok about a girl who’s husband saves her the blue worms… :)\nMENTAL STEWING (pic)\n(pic)\nas the stew stays on the stove, things begin to get clumped together - things that are similar\ntill finally, you have clumps of things that have something in common.\nThis may be how your brain sorts through memories - it starts with disparate parts, and if you allow them to “stew,” you will begin to see connections between disparate one's and form little collections of certain types of events.\nThe Ambiguous event is (the cornerstone) - at the center of everything - like a quantum mechanics - it could be one or the other and you can’t determine which."},
{page:594,type:"abstract",lines:13,date:"Jun 26",text:"(pic)\n(pic) ← membrane (this is the actual event that happened, and the story you’re telling yourself about it\n← the possible interpretations that could be true about it if they were proven - true elsewhere…\nonce we understand the simplicity and beauty of the ambiguous event (AE), we can use it to do lots of things. retroactive pattern manipulation. proactive pattern manipulation.\n(pic)\nkits you could make → containers with the wrong thing inside of them. paradoxes - things that disagree with each other - pieces of things [metaphysically, these are blind spots in the brain, where - when we try to use logic for something\n(pic)"},
{page:595,type:"abstract",lines:27,date:"Jun 26",text:"Because the vast majority of tings live in <em>this </em>space, we forget about the other things, and think logic applies to everything.\nWe can <em>apply </em>logic to everything, and the result will be illogical (ex, the ship of theseus)\non the periphery, our ability to categorize goes buh bye and we end up with fun illogical nonsense like the ship of theseus and pieces of things - questions like “what <em>is </em>a thingamajig (a thingamajig is a <em>placeholder </em>and so non-specific, however, in english this still makes sense as a question. We also have things that <em>look </em>like paradoxes as they confuse us in a similar way O→←O “is it this, or is it this?” so it leads to the same place in our brain. “A Metaphor is a picture of a pattern” - it tells us what the pattern is about but it doesn’t actually “work” (the caboose).\nin a way, a game is a cognitive vehicle - it gets us to a certain place in our brain - to use our brain in a certain way - specifically, the goal prescribes the way we need to act in order to achieve it, thereby dictating a certain pattern of behavior. Working backwards, we can encourage/invite a certain pattern of behavior by devising a rule and a goal to work in tandem with each other (as a system), thereby activating the behavior we want (solve for…) a + b = c"},
{page:596,type:"abstract",lines:15,date:"Jun 25",text:"June 25th\n(pic)\n(pic - “hoonies meeting in the middle”)\nCould be a start: The Difference Between Kits and Sets\nsets have something in common. kits refer to something. There are two ways that things can refer to something - the central concept (in the metaphor machine)\nthe way that things turn into each other - start with an (or some) examples (we’ll take the sugar packets for example, although, in reality, they would be different, in this case we are using all the same data because it is easier to understand it that way (simplified level)\ntwo thoughts i had in the car to the bins :)\nambiguous event: do i need to put on my sunglasses - are my eyes closing cause it’s sunny or I’m tired?\n(missing)\n(pic)"},
{page:597,type:"abstract",lines:15,date:"Jun 25",text:"turning thing over and over - facets - sides - garnet (n) number of sides?\nCropping is a system of movement\nadjusted my filters so I write down different thoughts now\n__\noh, and then, the other thing I thought of was, for example in the example with the hammer that has all the bows, you could have two competing patterns, one being It’s a hamer, but it has bows. But it’s used to hit things. Yeah, but it’s (?) and it doesn’t work right.\nyeah, but it came in a toolbox etc.\nCOMPETING PATTERNS\nbows and flowers doesn’t work\nlooks like a hammer\nhits things\ncame in a tool box etc.\n(pic)\n (all pointing into the center)\ninstruments of abstraction\nthe pattern collector (these would be apps)"},
{page:598,type:"day",lines:8,date:"Jun 27",text:"June 27th\nI think my new hobby is hating people. I’m looking at them, trying to think of things to hate about them. Ideas about garnets when I got home yesterday in time for work and realized I would make (at least pics) the components of the BARPK on AI - mixed feelings or I guess bitter but I know I have to do it. I do think it will become as intrinsic to every process as using a computer soon."},
{page:599,type:"ideas",lines:13,date:"Jun 27",text:"Need to make <em>more </em>hoonies (print em out) and cut the size of the smallest wooden box - Also could put XI in there (that many cards?) That Hoonies are easier to make a lot of cards for Then maybe it would be satisfying and useful to imagine things with them - so many and better one's. Also - easy, simple “Set” game - two random cards in slot - lay out 12, and choose the best one. OR just play it like SET and everyone looks and either 1. takes a set or 2. finds the best Set and compete. Discussion unless it’s obvious - could even state the characteristics they have in common - special papers (similar/diff). (missing)\n(pic)"},
{page:600,type:"day",lines:20,date:"Jun 29",text:"June 29th - journal entry\nNow I have a ritual of writing in my diary. It’s confusing cause I told Marlon I wanted to, but not with that urgent need as most of my projets. And now I’m doing it everyday. I go out, thinking about my projects, bring my journal, go to the coffee shop, can’t work on anything, but think “Oh, well, I’ll write in my diary - I guess I <em>did </em>do some things last night.” And then I do, and it’s very fulfilling and feels good to write and I think when will I stop, but there’s a time that feels natural so then I do, and usually leave, intending to do something else. And then I say “Oh, went to the coffee shop and wrote in my journal” but that doesn’t seem like a possible ritual, because people write in their journal at night but that does not give me enough time to process everything - still raw and fresh in my mind. I guess the idea that there's no clear purpose makes it easier to perform as a ritual."},
{page:601,type:"day",lines:16,date:"Jun 29",text:"I was thinking on the hike, when I lost my balance - that I’m good at balancing, and thought about going off balance like by thinking about J too much nd kind of the way to go back on balance is to slowly come in in concentric circles (smaller) going a little the other way, etc. (<em>and</em> that I’m good at that. that affirmation helped a lot. i could tell Maddie that. Cause they are emotionally intelligent. I could tell mommy. I could maybe tell Sean - yesterday I told him that I descended into bad thoughts as soon as I got home - he left - which I knew I would which is why I didn't want him to leave - maybe why Sarah and Niha are desperate to keep hanging out. But when I work on SET theory - they’re not there and it’s better than hanging out with people."},
{page:602,type:"day",lines:9,date:"Jun 29",text:"The coffee cake I got - thought it would have coffee - mental face palm - that hike - (?) - I wish people would say “contact” when I was talking to them - cause too often I have <em>no </em>idea, if they are hearing me - “do you know what I mean?” is a desperate cry for help.\n(At this point I’m just <em>pretending </em>the coffee bread was chocolate chips - it’s kind of working - (and I am so clever, and I am so kind)."},
{page:603,type:"day",lines:21,date:"Jul 4",text:"July 4th\nA plant is very much in my face and it’s making my life a living hell - my peripheral vision is fucked and I keep getting surprised to see it even though I know it’s there\n(pic)\ndid a spit take cause like <em>what </em>is she wearing (pic)\nguy was wearing pants like this (pic)\nHomeless guy moved from next to me so that I can still charge my comp but not be eaten by the plant. Tried my spinach but it was disgusting - felt like popeye for a sec though. Banana makes sense. So many ugly people and old people today. Normally not like this. And I hate them for being fat and old and not cute and beautiful. I don’t like any of the people here right now. i think I would not like them if I got to know them in fact, I think my hatred would grow if I followed them to their home, if they invited me for tea at their house - I could look through the stained glass windows in their front room - I know there’s a house like that North of Montana and I think they all live there, or at least one."},
{page:604,type:"day",lines:17,date:"Jul 4",text:"Now pasty white bitches wearing grandma shorts are here - giant purses I don’t <em>like </em>them, but I don’t know if I’d say I <em>hate </em>them. Someone bought a free will is overrated hat. One of my faves. i love all the people walking by outside. I’m so excited for my (?). Went to bed early last night - working on my presentation which is going not badly - there’s more parts to it than anything else, and I can just do the outline for each part doesn’t take that long. Also: there’s so many ways to write the text, but maybe it’s better to just speak it.\n(note: the rest of the journal is filled with drawings for my powerpoint that I was working on at the time. I guess maybe I just work because it feels good to use my mind but if I finish something, then it involves the kinds of work i don’t like? idk (maybe))"},
{page:605,type:"abstract",lines:10,date:"ontologie",text:"Le Petit Ontologie\n“a small theory - a small system - a small system, made of “small rules.” Like that time I went for a date with whatever her name is, and that, as soon Lauren) as I saw: her brown sweater, and it matched her mousie brown hair - I knew (I decided) that I wasn’t interested. Came towards me from the parking lot (she could drive; I could not)\n“a small, self-sufficient system” in which the rule sets apply <em>only </em>and <em>directly </em>to the topic at hand. They address each"},
{page:606,type:"abstract",lines:4,date:"un petit ontologie",text:"(pic)\nex. there is a rule for why <em>this </em>is there, there is a rule for why <em>this </em>is there, but there is not necessarily, or only a suggested one, if you were to logically extend, overarching logic."},
{page:607,type:"abstract",lines:14,date:"inner logic",text:"In english “inner logic” - a joke produces a system, from which the logic can be extended (extrapolated?) (to produce an “inverse (ted) ontology - a <em>lack </em>of logic - it is only “tiny” logic, and it is trying to project onto a big system. So it is small. And it is hard. Best instead to simply “not” project. But like the beauty of menswear, in the sense that - it is not the intended, primary usage, and yet, it still can be extended, like a man doing arts and crafts. “suggests a logic.” this is not the primary purpose of creating a thing - to suggest a logic. And yet - as the drawing style in a drawing that is not supposed to be art -"},
{page:608,type:"abstract",lines:11,date:"logical extension",text:"(…what is created is in the fourth quarter, because it did not, would not exist, lest for this artificial equation - you can plug in the petit ontologies into the logical extension modality/system of movement, and let that exist “as ONLY an extension of the original, AND THEN, like a non-bird growing wings, it learns to fly, it says: ‘mommy and daddy - I have always been alone - please let me leave my nest,’ but the bird was created to stay in the nest)\n(upside down)\n(pic) <em>this </em>is un petit ontologie - in that, the rules are: as"},
{page:609,type:"day",lines:5,date:"grandma",text:"what grandma thought I should do with my food collages (lol - I love her though, and I miss her like blackberries, more than the blackberry that we never got to say goodbye. Oh :( I wish I had got to say\n(My writing is a way of saying goodbye to myself.)"},
{page:610,type:"abstract",lines:6,date:"a joke produces",text:"This is an example: a joke which encompasses (a whole thing) - oh - in this world (perhaps it is the extended logic which is precisely the interesting part of a petit ontologie: a joke “produces” a (petit) ontologie. An art piece, also, for example, has one in mind.\n(missing)"},
{page:611,type:"day",lines:6,date:"Michael's",text:"much as those hats for those dolls at Michael's - the imagining of them - putting on the head. I like it as much as bleeding my nose till it hurts to pick, and then not telling anyone, and nobody knowing, and not telling anyone, and nobody knowing. I like it as much, as rebecca, reading my journal"},
{page:612,type:"abstract",lines:5,date:"benjamin",text:"(pic) (all the unfairness of the past) (oh no…) benjamin) (”un petit ontologie - the logic of this drawing, has <em>just </em>the things that were important - her <em>peering </em>at the page, and so, it left out the rest of the logic.\n(missing)"},
{page:613,type:"abstract",lines:13,date:"UN PETIT ONTOLOGIE",text:"UN PETIT ONTOLOGIE\nThe logic of the small system\nHere are some exceptions to the rules that would normally be present in drawing\n1. the knock: it didn’t actually happen but in my head, it did\n2. essential characteristics - just leave in what you remember. you can interate to eliminate non-essential elements\n3. extra stuff. ex: stuff that wasn’t in the scene, but was there in the “mind” of the scene - that helps express the “purpose” of the scene…what was really going on…for example, in this drawing, close to include all the times in the past where she let me read <em>her </em>diary, but she was not to read mine."},
{page:614,type:"abstract",lines:5,date:"extra elements",text:"4. EXTRA ELEMENTS: I also included the light fixture (+ show…\n4. The rug - imagined her perched on the rug, though she was probably not (because that’s where I would have been.\na drawing that is actually an essay, that is actually an explanation."},
{page:615,type:"day",lines:3,date:"lunch",text:"“this is what happened at lunch: we switched lattes a bunch of times”\n“I HATE her hair”\nthis is what the hands looked like, in case you were wondering)"},
{page:616,type:"abstract",lines:18,date:"Un Petit Ontologie (game)",text:"Un Petit Ontologie (game)\nNote: le petit ontologie can also refer to the small logic or temporary, instrumental logic suggested by, or for, a given situation. For example. - in order to justify writing this (because I needed tow rite it but id didn’t know why I told myself that I was writing it <em>for mason </em>even though I don’t know the intended audience appreciated the qualities, and was me at the moment\n(pic) something in common with Dream Logic\nWITE: (what’s in the ellipse): does: “missing logic, extra logic” more rules, less rules - there are some rules that are not included in the original logic, which, in our minds (my minds) looks like physics. To “extrapolate the example”: missing logic: people can turn into other people, extra: all corresponds to things in the mind, or: lighting can’t change, numbers <em>can’t </em>stay the same."},
{page:617,type:"ideas",lines:5,date:"HOW TO PLAY",text:"(Missing: Similarity to sigil)\nHOW TO PLAY: the basis of the game:\nidentify a situation that you would like to “ontologize” There is something - some heart, or some (?) that remains unidentified, elusive - to be caught or captured."},
{page:618,type:"ideas",lines:18,date:"how is this night different",text:"let this memory (<em>the </em>memory) permeate your periphery. Let it soak in, until <em>only </em>the essential elements remain. Now - draw the scene as needed, only leave out everything that is redundant at least metaphorically. As you draw the scene, consider these “licenses,” which afford extra opportunities. How is this night different than all other nights: 1. A normal drawing is a representational, and meant to approximate the scene as a photo to, so that, looking at the scene is a similar experience to viewing the scene with your eyes. On this night, “the night” is meant to approximate a photo of your mind, so that: the essential elements come forward, and what is important in <em>your memory </em>becomes prominent, also in the drawing. To take it a step further, <em>non</em>- prominent elements can be reduced to barely nothing, or nothing."},
{page:619,type:"ideas",lines:12,date:"perspective",text:"2. on other nights, the challenges of perspective must be fced, and defeated, through an understanding of “physics.” On <em>this </em>night, the challenges of perspective must be avoided, and the oddities of non-perspective must be accepted.\n1. On other nights, only the things in the scene are allowed to be in the scene. On <em>this </em>night, included are even things that are allowed to be in the scene that also: are imagined, <em>were </em>imagined in the scene. For example: the knock, and her sitting on the rug (which is not definite, only imagined) as definite)"},
{page:620,type:"abstract",lines:14,date:"diagram",text:"similar to a diagram (or map? or something) - extra elements - <em>missing </em>logic - emphasis, or strict addition of <em>new </em>elements that are <em>tied </em>to the scene, but by memory alone - “Make sure to include <em>everything.” </em>If it’s not there, no one will <em>know </em>about it.” (And so, in the example given, A “HISTORY” is added: of the girl getting to read the other girl’s diaries a <em>number </em>of times before this event. Added context is the diagram-like “Benjamin” which adds to the intention of the situation. In a very sigil like moment, the history, abbreviated (pic) is summarized into these three pairs of eyes, which are <em>directly </em>connected to the notebook pages."},
{page:621,type:"abstract",lines:12,date:"symbols",text:"These are the hands in the other drawing, to depict the parallel. The choice to depict single rather than double pages (spreads) adds to the directness (”of the viewing experience”) - there is no extraneous allusion to “bookhood” that breaks the single line between viewing experience, and viewed subject. These are similar to symbols, and can be iterated on towards simplification, and their proportions can be changed. One might imagine, even, these being used in a different context, to signify the same thing, as they have developed an element of universality."},
{page:622,type:"abstract",lines:11,date:"discrepancy",text:"And lastly, to head off an imminent confusion, 3. On other nights, the discrepancy between apparent effort respectively, in each duplicated element, must be minimized. On <em>this </em>night such a discrepancy is tolerated, if not encouraged, <em>if </em>and only if it mimics the relative size as it remains in memory. In this example, the rug has details which trump other elements in the scene (as does the wood grain - there was no other way to depict wood). And , as explained in the logical. version of the drawing itself, the rug"},
{page:623,type:"abstract",lines:5,date:"exceptions",text:"2 exceptions to the rule(s): SOME THINGS can be depicted as a photograph, if they appear that way in memory, for example, the fluffs on the rug are designed to make the rug look more like the rug in question, to prevent any ambiguity as to which rug it was."},

const PX_PER_LINE=2.6, MIN_H=16;
const strip=document.getElementById('strip'),gutter=document.getElementById('gutter'),
      reader=document.getElementById('reader'),legendEl=document.getElementById('legend');
let activeColor=null;

ORDER.forEach(type=>{
  const k=document.createElement('span');k.className='key';k.dataset.type=type;
  k.innerHTML=`<span class="swatch" style="background:var(--${type})"></span>${LABELS[type]}`;
  k.onclick=()=>toggleColor(type);legendEl.appendChild(k);
});
const resetK=document.createElement('span');resetK.className='key reset';resetK.textContent='show all';
resetK.onclick=()=>{activeColor=null;render();reader.innerHTML=hint();};legendEl.appendChild(resetK);

function hint(){return '<p class="hint">Tap a block to read its whole color segment. Tap a color above to read only that kind.</p>';}

let y=0,lastPage=null;const segEls=[];
sections.forEach((s,i)=>{
  if(s.page!==lastPage){
    const lbl=document.createElement('div');lbl.className='pagenum';lbl.style.top=y+'px';lbl.textContent='p'+s.page;
    gutter.appendChild(lbl);lastPage=s.page;
  }
  const h=Math.max(s.lines*PX_PER_LINE,MIN_H);
  const div=document.createElement('div');
  const firstOfPage=(i===0||sections[i-1].page!==s.page);
  div.className='seg'+(firstOfPage?' page-edge':'');
  div.style.height=h+'px';div.style.background=`var(--${s.type})`;
  div.title=`p${s.page} — ${LABELS[s.type]}`;
  div.onclick=()=>openOne(i);
  strip.appendChild(div);segEls.push(div);y+=h;
});

function toggleColor(type){
  activeColor=(activeColor===type)?null:type;render();
  if(activeColor)readColor(activeColor);else reader.innerHTML=hint();
}
function render(){
  [...legendEl.querySelectorAll('.key')].forEach(k=>{
    if(!k.dataset.type)return;
    k.classList.toggle('active',k.dataset.type===activeColor);
    k.classList.toggle('dim',activeColor&&k.dataset.type!==activeColor);
  });
  segEls.forEach((el,i)=>{el.classList.toggle('hidden',activeColor&&sections[i].type!==activeColor);el.classList.remove('sel');});
}
function entryHTML(s){
  const dot=`<span class="dot" style="background:var(--${s.type})"></span>`;
  const paras=s.text.split('\n').filter(t=>t.trim());
  const body=paras.map(t=>t.trim()==='@@PB@@'?'<hr class="pb">':`<p${s.draw?' class="nodraw"':''}>${t}</p>`).join('');
  return `<div class="entry"><p class="meta">${dot} ${s.date?s.date+" · ":""}page ${s.page} · ${LABELS[s.type]}</p>${body}</div>`;
}
function runBounds(i){
  let a=i,b=i;const t=sections[i].type;
  while(a>0 && sections[a-1].type===t) a--;
  while(b<sections.length-1 && sections[b+1].type===t) b++;
  return [a,b];
}
function openOne(i){
  const [a,b]=runBounds(i);
  segEls.forEach((el,j)=>el.classList.toggle('sel', j>=a && j<=b));
  reader.innerHTML=sections.slice(a,b+1).map(entryHTML).join('');
  reader.scrollTop=0;
}
function readColor(type){reader.innerHTML=sections.filter(s=>s.type===type).map(entryHTML).join('');reader.scrollTop=0;}
</script>

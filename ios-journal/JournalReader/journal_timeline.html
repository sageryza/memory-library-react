{page:64,type:"day",lines:21,date:"Feb 15",text:"waves because he said i don't have to have the same feeling as him but I said \"no, I'm not lying, I'm just thinking about it.\" And then, on the cliff, he held me tight and told me he'd never felt this way about anyone and I said \"me neither,\" and I wouldn't have put it in so many words, but I supposed, after I said it, that it was true. And then he asked me what I was thinking, and I couldn't answer him - I was hugging my arms around my body, and I have to say \"no, I still can't tell him, even though he asked.\"\nFebruary 16\nFantasized about: Draco and McGonnagall, Hermione and Ginny - flowers. Dreamt that evan gave a homeless man $35 - \"they butt venmoed me.\" We were in a parking lot looking for parking, and I was tryna talk to him, but he was preoccupied with incremental divets in the paving. The homeless men were actually 3 girls. Anyway - back to yesterday - then walked back to his house, and he did a little jazz number about having to poop, got low, his knees."},
{page:65,type:"day",lines:39,date:"Feb 16",text:"I kinda liked it - could've been longer. At his house, I told him about \"what if we were both bears, then you would be a bigger bear, and I would be a smaller bear\" - I had imagined him making a sort of cave that I could sit in, being enveloped. Then we played the guitar, and I sang for a little. Later, Grant called to apologize for me not knowing if he was gonna kiss me ever, and I talked to Mason about his problems with miriam. Then went to Killer Noodle by myself and got three eggs and they of course messed it up again - gave me meat - and it took forever and I got a blood orange beer that I only drank a little of. Came home and fell asleep, woke up at 11:00 and went to get a pint of ice cream at Ralphs. On the 14th he said he wanted to have a \"kindness orgasm\" but we ended up sleeping together, which was nice - laid on the rug and he said something kinda nasty and started feeling my butt and I got really turned on and started grinding on him. Then after, in bed, he said he used to think sex was a science, now it's an art.\nFebruary 17\nSushi - the great lengths people go through to avoid social interaction - me avoiding daddy to get water from Whole Foods and then finding daddy there. Curating small books with a little of everything - an idea, a thought, a sculpture, an experience. Also: taking some of them down ex. where do I put the first aid kit. I guess I'll tell J about my lower back \"injury,\" and he can make me feel better about it - he took all my worries from me when we were on facetime. I don't even remember if this happened, or I dreamed it: sat up in bed, then slid back down into Sean's arms, and told him it was a bed-coaster - it was very important that he understand. I'm worried about my back. I need to think about it until it makes it better. I need to think about journaling me until it makes it better."},
{page:66,type:"day",lines:12,date:"Feb 17",text:"Not doing ok, but I'll be ok, not doing ok but I'll be ok, not doing ok but I'll be ok. Mean mean mean sean. Group things together that have something in common, and there were lots of systems of movement available - put them together to find another one, find what they have in common. I don't know if I'll be ok. I hate Sean I hate Sean I don't ever want to see him again. He is also annoying and I do not like him very much, and he was annoying me today. I AM MAD I AM MAD I AM MAD, IT IS MAKING ME MAD. I don't want to be mad. I want to be sane."},
{page:66,type:"ideas",lines:6,date:"Feb 17",text:"My idea: tik tok or reel: me praying next to a bed \"thank you god\" for giving me two boyfriends, and it's light meaning pale blue, and flashes to me in the dark, and my hair down, crystals and candles - shots of my two boyfriends - eyes closed Christian, eyes open witchcraft."},
{page:67,type:"day",lines:21,date:"Feb 17",text:"I DO NOT FEEL SANE. Notice things around for panic attack. Say what you did today to ground. Ok, so here's what I did today: went to the clothing swap with Grant after all, brought my purple suitcase and my laundry basket. Found blue sweatpants, something I'd been missing. My fav BMelville sweater - electric city - got it back. Rugrats shirt was most important. Went through all my clothes with Sean and I finally started letting him touch me when I tried on this white night thing that you could see my nipples through. He looked so hot with no shirt and the pink sweatpants I gave him. I almost wanted to fuck him in bed, too, even though I'd been thinking how dumb his thoughts were all day - it's hard to think he's dumb cause I've known him for so long. And I wanted to say \"I have enough pieces of your puzzle to know that's not true, and couldn't possibly be true\" - half the stuff he says I feel that way about, like when he pretends he doesn't care about something."},
{page:68,type:"abstract",lines:20,date:"Feb 17",text:"real as possible - these cream colored walls couldn't possibly be disobeyed by leaving - the only real deterrent is a social one, because the walls are my friend. Last night, drawing was easy - it gave me the question: how many drawings would I need, per increment, to look at it and fully understand and remember. Back to the burrito: a problem that I don't want to solve. \"I'm not hungry enough\" - this is not a problem, just a thing that is true right now. I guess the solution is to try to manually raise and lower the threshold. I don't want to synthesize my thoughts bad enough - there is no deadline and part of the rules of this project is that it comes directly from me. I need to design an autopro in which the steps towards the goal are necessarily embedded. Or perhaps I am more interested in the process. To imagine the done is to have more work to do - now I have to consume all this information I've collected for myself."},
{page:69,type:"day",lines:24,date:"Feb 18",text:"February 18th\nWalked all the way down wilshire to get here and it was sunny, and everything was loud. Couldn't pick which place to visit but then I chose Amandine and the 17 min walk meant I had to stick with it, through it is loud, and warm - a din from the dessert cooler, and two annoying women who didn't get dessert (\"next time\") said the older one in the tan loose tapered pants that could sum to just be \"pants.\" Black turtle neck with a necklace. I've got my PWC handbook, which is an excuse for writing what I as forced to observe - the printing - the 499 other copies was an excuse so that I could make it myself - just exactly as I wanted - to look like a passport (so no one could notice (accidental undercover) The music (Bohemian Rhapsody…) is like a little kid, or a dog, that joins in with the adults just to be part of something - it just adds to the din - of people talking, and the freezer being unnecessary, almost unbelievably, loud - this particular mechanism takes a lot of power because it exchanges the cooling effect for the heat because he wanted to feel what it would be like inside the sun. (dressing x glue v')"},
{page:70,type:"day",lines:9,date:"Feb 18",text:"Tried on a kid sized carhart at the gap. I wasn't making it up - they're out of Purely Elizabeth at the big whole foods - thought I'd be thorough (hats + program - charms - stickers - waste of time) and check Bristol Farms but didn't. I write my dreams now, as part of the daily three program - what I did - any, and colors or other. Because this as opposed to others, is my 'current' diary. Uneventful -"},
{page:70,type:"dreams",lines:13,date:"Feb 18",text:"I dreamt I was staying in the house - in my room and I wondered when I'd leave. I was sad that Sandy was leaving that day, and that's when I would leave. I was giving away shoes, and put a pair of (pic) leopard print sandals (size 9) with Sandy's cause they didn't fit me as a weird sort of joke when he asked me about them. Last night I tried: Argan shampoo with Tea Tree conditioner and dreamt that I had finally figured out how to make my hair straight though it maintained its whispy quality. And I noticed it had also grown quite a bit longer. I consulted Sandy about the new procedure and he was relatively interested."},
{page:70,type:"day",lines:3,date:"Feb 18",text:"Talked to Jonathan on facetime last night, and we \"had dinner\" together and then he got in bed and fell asleep, and I worked on illustrating my journals"},
{page:71,type:"day",lines:2,date:"Feb 27",text:"February 27th\n\"Kissing you is like disneyland, but there's not wait time.\""},
{page:71,type:"abstract",lines:6,date:"Feb 27",text:"The other day I thought: about examples - even if you're not having interesting thoughts, you can still have examples, and they can remind you of (the principles) ex. ritual (mission: write all the thoughts down so I don't have to have them anymore Opposite? probs (missing)"},
{page:72,type:"day",lines:9,date:"Feb 27",text:"7:15\nJ went to his house and cried because he was sad his brother used to not be there. I spent the last ~ hour trying to find something that seemed worthy of writing in my journal. I talked to 6 different Indian dudes, all named Varoon ~ and they each find a new way for me to be confused. (pic)\nMommy and I went on a walk and looked at houses, and talked about how much better we are than anyone else."},
{page:72,type:"day",lines:9,date:"Feb 27",text:"We went into all the weird offshoots even the numbers were weird: some of them started with 10, 20, 30 etc. I saw houses I've never seen before and yesterday I saw vegetables I'd never seen before. She wanted to look at the houses, she kept stopping to peek through the gates etc. At some point, i stopped trying to control her just like Robert said \"no\" to Frankie not making eye contact cause I said"},
{page:73,type:"abstract",lines:15,date:"Feb 27",text:"the trees at his house would be worried, and would grow bale gray skins and be worried, would look at each other, wondering if they were enough, and wondering if the trees who they sought reassurance from could fully understand the depth of their sentiment. J said I was smarter than him because I knew that the leaf picture he sent me had meta lines. I think I'm smarter because I developed a system for why his photo is interesting to him - his, because it \"fucks with your mindegories\" (pic: I'm so worried, barely have time to grow leaves (but my trunk is strong with intelligence) (pic: meta lines) (pic: long lemons, long picture, wood grain, slats of shadow, falling across the cutting board, echo)"},
{page:73,type:"todos",lines:4,date:"Feb 27",text:"(missing but please type it later, pics to pic(k): puzzle slowly gathering pieces, maybe: my screenshot on his phone, the metal pipe actually being plastic, idk, more I think)"},
{page:74,type:"day",lines:2,date:"Feb 28",text:"February 28th\n\"something about the way that I'm walking is weirding me out\""},
{page:75,type:"day",lines:80,date:"Mar 1",text:"March 1st\nGuy made me get out of his seat. Should’ve read his stupid little green notebook. I asked a woman but she was homeless and just belched really loudly. J was super scared of homeless people on the promenade, and started crying in the car on the way back, and then later, way later, said: “you don’t like me anymore, cause I was crying.” I told Lindsay and evan at the Breakaway Cafe, well, I told evan, and he told Lindsay while I had to get my sophie chai latte. Then she said: “Where do you find these guys?” or like: “they’re weird in really different ways” and then Evan confused Richard with J. Farm animal puzzle into babies in cute outfits. I went dancing with kat (as in: Kat and Denley) Last night - funky sole night, and it was really fun, and on the way there even, I forgot about the heaviness. I talked to J on the phone at 2:00 when I got back, and he told me about his paintings - 3 things. Kat bought me a drink, and was consistently smiling, and the color was on Evan (even though her hair was purple from the lights), so it was a little confusing - evan took secret videos of us. Stupid guy already left with his stupid green notebook (I would hate him if it was worth it) Woman staring at me like mommy always does. Fucking homeless woman won’t shut the fuck up. Girl inside has resting cry face, so I had to stare at her to\n\nfind out if she was upset. Ended up having 2 fullish drinks - no Evan had some - margarita + tequila moscow mule which is wha I meant to order the first time, and I got to buy her a drink back and I think the reason I wanted to is cause then, if she doesn’t like me, I don’t have to think “Oh, she’s mad cause I didn’t buy her a drink, I should’ve bought her a drink” she is going to become an engineer. I told J that - in the kitchen, wen the sun was coming in, and we were making the salad, that I’m good at so many things. he said I should pursue writing. And maybe I will - I wanted to write about the thyroid thing - now she gave me the little yellow pill, and stressed the seriousness, and looked at me later, when she found out the test results were wrong, and then the next time I saw the nice nurse, that was blonde - she was telling me I’d make it well on the outside, because I had charmed everyone there. And Dr. Sugarman, who knew I was too smart - I cried when Brenda said I would go to the next phase (where Gemma is) and I told her she could change her pets every 3-4 days, and caught her in the logic lie (Ben n’ me) (she is evil to animals) - did you undo that thing that you did when you found out it was your\n\ncoffee maker, not the cat (and, she didn’t, and she acted like that didn’t even make sense. I hate her. I hate her almost as much as the woman who was staring at me). I’m a little scared to begin the recall because there is so much f it. I got the jam and brie thing even though it was a mistake last time (pic) two sweet things, when I didn’t even need one (oh - and - I got the cinnamon chai latte and evan knew it was strange to have two sugar things and it made my mouth feel all weird, and my hands were sticky till when I fucked J - I told him I’d told L and E that I couldn’t come, I’d refuse to come until L cried - I’d just lie there - They were going on and on about how often they come, getting their numbers up. The real thing is: i’m so good at sex if I want to be, and I hardly ever never) want to be. When we were (?) the problem of my being upset, J randomly said “should I just fuck you hard and deep” oh my god - that terminology. And he did. But not because I wanted him to - even though it was my dream in the cheesecake aisle, when I asked myself my underlying goal - like I was in high school (”maybe if I get him alone, ply him with wine, get him alone well”)"},
{page:76,type:"abstract",lines:54,date:"Mar 1",text:"the confusion of the thing - the confusion of whether it was purposeful - when he held me - no, scratch that - when I stood on the “dénouement” and he said: “remember when you used to hate sex” like a fish who can only see the reel inn and fire.\n(pic) me and my two sugary things, me being upset (everyone being upset that it’s too sticky. ?now I’ve planned it so the guilt is gone?\n(pic) ← compliment sandwich x (pic) soup, in which the compliment is the celery, and the rest are ambiguous neglements (first, it became a burger, cause the question was so flat - managed to be so flat - why do you lie about sex, but you don’t lie about anything else (why are you so direct about sex, but you don’t feel the need to be direct about anything else, for example: feelings…⇒ why do you ‘lie’ about feelings, but sex is something which you can always, and do, speak directly about - you pride yourself on that. (impetus, seed, pre-tot: J telling me that (when I asked him how many feelings I’m allowed to have) that I have six feelings and all of them are anger - no - one of them is sadness (no there are 20 more, and one or more are joy (I think his therapist tells him everything is anger, as evidenced by what he said on the stairs which had the wrong cadence, we couldn’t even walk on them without thinking about it)) juxtaposition - Evan - JC - car - tape recorder) next: me explaining things to myself. How do I explain things to myself? In diagrams ex. the dandelion half - because it became a diagram after he saw the halves. Next: vashti - (the queen vashti?) (pic) at star toys, the maypole, the carousel - (perhaps you can address it with this helpful metaphor that I’ve designed - a dream (real?) - a cage by UCLA (a dream I invented, I designed): and then, if you go to the end - “ah - I can’t\n\nget out” (but secretly, if you look behind you) - you have rules, but if you look backwards, there’s a wide open way to get out.\n(pic) (if you go all the way down the path, you can just leave”) - that’s why the physical injuries are so confusing, and the actual thing - the MC - helpful to J - to get out of rules, there weren’t really rules there in the first place - yes, the bars, but just go out the back, the bars are a temporary (real) experience, but you can leave through the back\n(picnic) (green door) (”what goes into the become a real person kit?”)\n→ yesterday it was a colonel mustardy cloth - with little “?follicles?” like velcro - in that each thing meant something if you zoomed in, unlike some other things where it didn’t."},
{page:77,type:"day",lines:7,date:"Mar 1",text:"(pic) me having to switch my attention between Kat and Evan, so they could each tell me stuff. I ended up shaking my head in a time lapse. I dropped them off right at their apartment - went through the gate - called Kat on her phone “who’s gonna answer?” “I am.” Then she was mirroring me dancing and it made me really uncomfortable."},
{page:78,type:"day",lines:28,date:"Mar 1",text:"Later\nJonathan and I went to the Getty. It felt like a wash of white and blue. My thought on the train, trying to understand why my thoughts were all so different x needed to be spoken aloud - each of them had a hard edge at the top, where it was ready to say, as if it had been done and none of them were that interesting - my thought (on the train) was that if I had gone to the getty by myself (because perhaps it felt there was something missing - none of the art “seriously intrigued me, and on the way there he said I don’t ever really have to eat and he asked if it was just with him and it is. For example at the Reel Inn, I was always nervous I settled instead for telling him it was because I was preoccupied with thought (multi-tasking he said). He asked, on the way out, whether someone laughing was laughing at him, and then if people were ever laughing at him, I thought. I explained that he’s wearing pants and a shirt - a normal guy. We went on the grounds and it was very dark to see, and made fun of James and Barb at the Summit (inverted). I realized, to say them, I was thinking thoughts to seem smart - to say smart thoughts. And I have never (I don’t think) had a reason to sound smart. I think it is special and I think it is true that he sometimes shares with me what he’s thinking."},
{page:79,type:"abstract",lines:29,date:"Mar 1",text:"sometimes Sandy (I thought this at the end of the steps, after my conversation about thinking thoughts for other people) says what he’s been thinking - I know it’s coming - he’ll say a long thing. Jonathan likes when I talk about myself as a child (”seeing the round apartment building on the way back from bubbes”) (but that, specifically, is a special memory to me)\nI had a dream last night I think that Sean was explaining - writing about (?) an interaction between a girl and a boy - the boy was younger - rough and tumble like - nervous - plain white shirt, khakis, surprised the girl - fuzzy long brown hair, thin, taller, would be interested. He needed to do more showing, less telling, I thought and explained that he should write what the boy was noticing. this seems an apt description for the pattern collecting thing I often reference in my mind - what patterns you’re collecting at any given time, is a good indicator of how your mind is doing, of what it’s doing. For example, he might notice her hair, think it is warm like fire, cause she has just been running. This is a projection of how he feels about her. As he’s talking, he wonders, absentmindedly with part of his subconscious, whether there is a stone in his throat - a small pebble, like gravel, he unconsciously revises it (even his subconscious mind knows a whole stone wouldn’t fit, in his throat)."},
{page:80,type:"abstract",lines:27,date:"Mar 1",text:"The mind, blowing so breezily, almost toppling him over - (he is scared of the encounter - it is overwhelming and powerful). Instead of the pills every morning, you could look at your book of photographs, and remind yourself one counter-intuition at a time, one paradox at a time, that the world isn’t as it seems. This, though not as enticing in it’s clear dominion is the way (to do it in the morning. Alright: here’s a picture: (pic) v’ (pic) x. Jonathan said what we need, instead of the exhibit (Gustave: Paintings f Man) is an animatronic recreation of Fairfield Porter. Through the museum it seemed so clear to me - everything.- what was right and what was wrong with every painting. For example: the irises that Van Gogh painted - a nice wonderful painting, and I enjoyed it very well - was flat in its treatment of everything the same - he only uses one brush. The problem I had with Gustave was his treatment of the water was different than his treatment of the shirt - he was so very careful with the shirt, and while the water - each color was a brush stroke. Why should it be like this? Almost none of the paintings were very good. I felt foolishly that they could have benefitted from my current croppings of pictures: making sure that everything is in the right"},
{page:81,type:"day",lines:27,date:"Mar 1",text:"place. My photos aren’t even working - perhaps I should make them in photoshop - I want something very specific - I need to paint it. We stopped at the cafe and I had a healthy wrap and he had a turkey and cheese sandwich lol and almost bought a book called “How to be Rich.” and she shared a hot tea that kept my hands warm like a heater as we went into the grounds still and silent on the tram together - he wanted me to sit next to hi. The fabrics of our clothes touching. After we got to my alley, he leaned his head on my shoulder and waited for me to kiss him and I finally did. Soft and long, and he allowed my tongue in his mouth, and wanted his in mine.\n(pic) ← the extra pieces of the coffee cake that the woman gave us, after calling us beautiful girls - she was so nice - letting everyone try every sample that they wanted. And, well - we did buy something - we bought the coffee cake.\nSonia wears her hoodies from H and M everyday - she has four of them - in all different colors, and I didn’t correct her that we can’t go back, because it closed on the day we were there - 3:00 - right when we left. Right when she was walking me to my car, she started to tell me that she was trying to dress more feminine to be more confident - she listened to a podcast or something."},
{page:82,type:"day",lines:17,date:"Mar 1",text:"Time/Space\nThings I meant to write a long time ago - that time that girl from hinge tried to make me feel bad in that dessert place for not knowing that supermarket strawberries aren’t as juicy as the ones grown straight from the ground. The tall Lindsay who gave me the big book telling me I was a lesbian because I was always walking in on her in the shower cause I have OCD - the dream I had when Evan was in my bed: mommy was talking to Siddhartha on the phone and I was trying to find eggs in the fridge but all of them were cracked. It was very nice and sunny, and perhaps I was explaining something to Evan about Siddhartha. I thought I could make an outline for all my adventures - how many significant moments were there at Nautchaug for example - the possession - (missing: irl recall long time ago)"},
{page:83,type:"abstract",lines:15,date:"Mar 2",text:"March 2nd\nI took matters into my own hands, solved a problem - went to the store to get sushi cause I hadn’t eaten. Having already decided to leave (that cursed parking lot) waited in line behind a white car (())→ waiting in line for slow cars to fast down (the slow becomes an identity - it’s all I know about them as Evan would say: “instantly, an analogy jumped into my mind. Waiting for slow people - I can’t explain things fast enough, and the whole world is slowed down by slow people - who can’t think - who are too stupid to think, it’s an oozing gel - I suppose - more specifically, I think slower, aware of all these people who need things explained to them - who need people to be nice to them"},
{page:84,type:"abstract",lines:41,date:"Mar 3",text:"March 3rd\n(missing: dream, plan for 12-packs, plan for head eggs, a few more ‘ailments’)\nI suppose I ought not to call J after he has so blatantly disregarded my plea for attention from yesterday but I do fancy going out in the sun, and wonder, once I have reached my destination, where a visit with him will be difficult to strip from my mind. Oh, I think I’ve remembered what I wanted to say which is 1. Try as I might to shake the notion that the impracticability of it could not possibly outweigh the attractiveness of such a solution, I can’t help but remember, multiple times per day - that an entirely analog process, might feel superior to the joint digital and paper one that I employ now. It seems foolish to fantasize about such a thing, and yet: it carries my heart to its stead - to a distant, foreign mountain, on which I can look over plenty of grass, and the sounds of the birds chirping\n\nkeeps the foolish twitter of my heart at bay. The exercise itself insights merriment, and for this reason alone, I wonder if I should put it off. Instead, I’ll make known a phenomenon, which I attempted to explain on the phone - for example - the camel to gazelle thing - I reconfigured that in my mind so that I could fit it on to the page. These exercises I enjoy quitely, and I know it is because it gives retroactive validity to all those solitary hours I spent in my mind, which had assumed the white walls of a waiting room, and in which I crystallized, solely due to its long hours, the waiting rooms, that which I had been pondering, into increasingly bite-sized amounts, knowing that the game was only a convenience, learning now that it was for some different purpose. (Now that I am doing it purposefully). I once described these manufactured structures as towers, however, perhaps their height is now secondary to their number of refinements, of revolutions around that thing - your mind - the sun."},
{page:85,type:"ideas",lines:29,date:"Mar 3",text:"Primo Passo\nHaving thought more about our plan to shoot up Sweet Greens (J is unsure, cause he’s an investor) I think the most striking thing about the population, were we to breed them like the floppy-eared wolves, is their beautiful lack of ambition. It would be nice, like menswear, to see them try hard to survive. And for that reason, I think we should proceed with the experiment. Pilar was cleaning my room, while I was trying to dissuade myself from telling her I was reading Evan’s essay. I started cleaning up, and then gave up almost immediately and that is what prompted my walk. A passport book called: “become a real person” or “how to…: “set theory” (pink with gold accent. “game theory” (orange) “instrumentalism” (white - all repurposed terms) ANIMANIMALISM, “Art as science; science as art” And lastly: how much could I fit in one book?\n(pic: Referring to abstraction)\nTable of contents - “the metaphor machine, internal consistency (not set theory), making up a game for yourself, paradoxes…basically, the framework I wanted to explain to J in the museum but he didn’t listen…\ngold, 28 pages - could I do it?\nThere is a guy who has been on the phone with customer support for the duration of my visit. A lovely little challenge - to make concise, succinct - the information - to represent it in a way that a non-creative smart person would be able to read"},
{page:86,type:"abstract",lines:44,date:"Mar 3",text:"I’m starting to have that forgetting disorder, and I was collecting - little bits and pieces - free things (pic) water cup\nThe napkin (pic) ping ponging around all the chairs was a meta version of all my problems coming here - and even “probably you’re so good at complaining” they were (pic) saying the guy was o (missing)\n\nMr. Beast made people make towers out of blocks that couldn’t fall, then had people hit them with dodgeballs 24 hours later. His next task was having people count the seconds till an hour, and it was pointless cause no one was even close. I tried to pick a date to assign myself to make little pictures out of, since the gazelle and camel thing took time - squeezing information into biter and biter-sized packets (there’s still room for more). (missing) Then I remembered back to the tower game I was designing x describing at Special Starbucks and that this was an example of the failed game - a “4th quarter” proposition, invented by the sitting there, writing it down.\nThe conclusion to the previous story, which took place at Primo Passo was that: (missing) I settled on this: describing, not deciding. The whole situation was simply “describing” my mental state - the two problems at the back and side of my mind. And the napkin - another level of meta(phor) so there were 3 levels. “holy holy holy” - and the napkin was just bouncing around the situation - “look, you’re problems are still problems, you can’t forget about them”\nAnyway, to tie it all back (I think I can) (missing)\nthat’s the point of the towers - they actually create something. What was the thing that incites, invites these certain sort of sessions, what could be put in the air, for the world to\n\n(())→ the very specific part of a dream that is: the place in the brain where lost things like lost socks go, for example, I’ve dreamed about going on a trip with my family consistently for the past three weeks, cause I never once (refused) to think about it consciously, and so it just keeps resurfacing in my subconscious. Well anyway: that is magic."},
{page:87,type:"abstract",lines:46,date:"Mar 3",text:"Perhaps similarly magic as Matilda, or reading your (own) mind, but my mind - the line ( / ) told me this one was true, that it really does affect the world (())→ “take all those darkness: etc. (going backwards) & “everything I thought when I was alone is true” So, to put it simply, and matter of factly, that’s why it matters when some of your thoughts become towers and get traded for coins (pic) (forehead to forehead) reading your own mind - the lines, colors etc. And before I forget: add the autopro in the ritual of manual labor chapter, which is mercifully blank, (2 prosaic examples of the SOM (include the ring?): cropping (perfect) and zooming in/out (probs good). Should I have an “advanced SOMs part after the “making up a game” part?, and I could include the fourth quarter mechanism, which invents things (simply by existing). Anyway: wow I know how to do magic. By creating something n your mind. By referring to abstraction. And what I wanted to write earlier was the problem of having to choose which thoughts to write ⇒ (clarification) the problem f writing down every thought, which I solved with the example of reading a resource, just one that I could take for granted - the water cups, the journals, which I now can’t - perhaps my ability to do things like create chapter headings, print stuff out, send away for stuff (I take for granted that I can do these easy tasks, making the wrong assumption that I will, at once, at some time, be a robot.\n\nAnd then, to breathe this disorder into being - I cast together my rediscovery of a tray of amethysts that were all very nice “I’ll call all of them Ana” without even a second step in the process, or a clarification, together with my memory of all of my rabbits, and all of them being called Sophie. When I told J that my official favorite animal was a rabbit, he seemed interested. And when I told him “I often think” my main impetus for writing in a journal, for keeping a journal is to have a place to put my jokes, because they can go nowhere else, because no one will ever understand my particular brand of humor,” (he seemed positively impressed), he said that it was “beautiful”\n(missing: to do list)"},
{page:88,type:"ideas",lines:35,date:"Mar 3",text:"promises to myself. But i remembered another difference which is that I don’t want to make art - I gave it up that day I thought of the BARPK in the Wash U basement - I want to trick people - I want to make items that are indistinguishable from common household items, for example, games, at least in appearance, general aesthetic, tone, cadence, context etc. (useless things - things that have no purpose). I have no desire, in fact, I have disdain for the kinds of pursuits that say to the world: “look at me, look how beautiful my soul is,” so when I was singing a good song, inspired by the ding dong of someone’s wind chimes and wanted to use as an opportunity, or an example, of something to create, no, no I didn’t. (missing)\nHere’s another thought: I could ruminate about Matilda, about reading my own mind. And to aid my rumination,\n\nperhaps it would be prudent, - and here’s the thing - the drawings help - not just for memory, but also to explain things to myself. There is a certain rule - to draw things that don’t exist. It starts as a rule, and becomes a statement, or a principle - a beautiful one. Another intro into it (because I still can’t quite get started, is to think (a correction) of the things that I didn’t need to write in my journal - that I filled in later - a correction. Ah - but reading is different than writing. And I like one, and do not like the other. Perhaps the new game (and perhaps I enjoy games) is: wow - I can comprehend writing, and that as a diving board - to (surprise myself by doing a back flip in midair) crystallizing it in a visual image, like I am trying to prove to someone - J - that I’m smart."},
{page:89,type:"day",lines:52,date:"Mar 4",text:"March 4th\n(missing: dream)\nThis morning, because I was so hungry yesterday, I spent a surprising while deliberating at Pavilions at what to get - how to construct a meal with all the ingredients I craved - a game I play often - x. (missing) Anyway, I settled on a tin of (missing), which I could not scan, cause the bar code had been erased by grease. (missing) My question - would people be interested in this - having answered it - now makes no sense - people would be interested in it if, because, I am interested in it If I could communicate the tantalizing parts - the horror of two processes instead of one, the (titillating?) nature of coming up with a - good - idea - in a dream, and having to decide if it is really good, and/or if it could be good in a dream space…\n\nI like it - (I like it a lot) - that board game where you guess people’s salaries. The longer I sit here, deliberating about what to write first, the more individual and precise (discreet) thoughts I begin to recall - from my walk, and for, for example, my nightly nap - some too small to explain - and yet - made bigger by my will alone - gaining traction on a vector that would or should be irrelevant. “It can change/it can’t” - in terms plainly allowed to be explained to other people - it’s only instrumentalism - a trick of the mind thing, again. Or perhaps I always had it, and J didn’t believe me, so I had to let it out of my net (pre-tot (seed): (missing) But the reference immemorial, is that day with Doug, (Doug wasn’t there where I thought about Doug on the bus - made the bus decide, even though it was as indecisive as Cassie and I trying to decide where to go to eat. An example of synthesis: ←- (an example to write this here): my back - is it snowball or spiral, (mis) Note: the sun goes in, and out, and any noise - (”becomes my mind”). “I can’t deal” with any noise, or else I try to place it - the only real coincidence. My thoughts come back like raindrops (snowflakes) - precious in their (skill at attaining them) - uniqueness. ex. To do: add the coop certification to my folder. example: another potential iteration (pic) drawings, typing, writing - some special triptych - strange as it is sacred - my version of the talmud (())→ the formula for adding another person to a social scenario. ex. some thoughts can benefit from synthesis; others keep moving like the rule of thirds (the cup with kraft single on it). I showed daddy - perhaps I"},
{page:90,type:"ideas",lines:54,date:"Mar 4",text:"shouldn’t have - the map games I was going to discard on the way from Evan’s house and he showed me a little bit about his [painting] process in which, behind a panel in his cabinet, he was taking to cafes, piles of papers, non-discriminated between what other people had written, and what he’d written - this is what irked me - made it hard for me to understand his process - couldn’t even comprehend how to ask him - the rule of thirds - my mind moved all around. he says he condenses them down to a few sentences - 1 or 2 sentences, and then - discards the paper. And lastly, to add an End tone to the last thing I want to say, in Bechdel’s book, I was delighted to find two things, 1. The methodical way she excused herself from OCD (and that she did it by herself), and 2. (again) the “i think” circumflex, but most especially, the train of thought which led to this iterative process, and through which I can imagine, and feel at home, in all her other iterative processes - beautiful - and begin to find my own - (beautiful). Perhaps the pages of my passport book instead of…, could tell all the stages of my iteration - a new page for a new way of approaching the problem. Ah ye - I’d forgotten my plan - on the train trip home - the train was this plan, which carried me. My theory is and was that “I could simply compile” the coins, the foreheads, the pre-Doen, and the towers from yesterday. Then I could rewrite it like I did that Amazon letter, and compile it into un petit cahier: “Meta Journal” (missing: no time!)\n\n3. the game - finding the right game (pre-Tot: why I don’t find the witch work compelling - it’s not hard enough). The writing down, because first I thought of, thoughts is quite tricky, and I have to befriend and/or battle various systems in my mind. it’s a game that takes my full and complete attention - it consumes me. 4. continuing the infinite resource” phenomenon - it’s brother -precious resource - the game - turning one into another…squeeze the sugar packets until they have meaning. And I think - back to why I love this game - i get to take ideas that are not entirely interesting (and squeeze them until they “become interesting” ) - this particular game I like - homeless girl - cartoon network - item, ex. pipe - finds another use - re-imagines the thing (it’s the re-imagining that I like). And so: the procedure: find an idea - any idea - that comes up in my mind - gets so big that it fits (the rules for journaling are very simple (and very strict)) (angry maddie) - nothing into something - the thing rises"},
{page:91,type:"abstract",lines:77,date:"Mar 4",text:"up to the surface. (the procedure): think of thoughts - every thought - is good enough is big enough - make it big enough (like GW Bush’s reading program: no thought left behind) (((some of them should’ve been)))-\\< I guess: the “dance” is in how to do it - I can do it - I’m very good at it - this is the game I would pick in Mr Beast’s To-Be-Gamed. I am Snape’s Hermione, collecting clever coins in a “clever coin collecting” jar - until I have enough money to be disgusted with myself - until money loses it’s meaning, and I can go back to wheating the fields. (but I don’t learn from my mistakes) (there’s never anything to do but wait, and I am always making the same mistake - twice - then thrice - then four times - there is a whiteness underneath my eye that no one has yet believed me about. Here is another example : in order to write something that I don’t like, I must obscure it in (a cloak of) cleverness (tangent: note: parentheses are a pun) so that when I read it, I don’t have to want to tear little pieces of my skin off so I can itch the (non-skin) that’s underneath them. 5. The more strictly you follow the rules, the more you can break them… (ex: non-skin) x break other rules v’\nI suppose I want to write until I no longer feel that thoughts flow out into the sea (from the fish tank (toilet)l 6.1: the cleverness is a series of clarifications. of revisions. 7. Compile all of my like thoughts, and turn each one into an essay (note: the spanish and the indians bred the sweet greens employees) no #: for a while I was thinking about describing things to myself, and i think the answer (cause it’s not generalizations - I prove that to myself about 7-8 times an hour) - the dandelion, and the thought bubble - where,\n\nfor example, the dandelion appears to be a picture, but the halves make it not - the halves, though small in stature, and empty in plot, (unpleasantly?) retroactively subvert x convert - the thing into - until it - takes on the twinge - the tang of a thing that is Not Entirely Real - loose threads of white bearing down on it - drowning it - imply that we cannot know if a loose thread has gotten into any one of “those” cells, and cannot allow weapons to pass through the interior because of it (mixed metaphor x evolving metaphor) (you knew this - why didn’t you know this before). (”LATER”) I guess the hidden mechanism: my allowance - is that I don’t have to go back and make an SBS for all these cleveries, these clever coins - no one needs to know - they have to do the tricks in their head. And once they are done, they are tricked into thinking that I am “quite clever”.- their mind has been frazzled by being so far away from the ground (it was not so very far at all) and in that time (and space) that they were away, that is when they said (or would’ve said): “Oh! this is a trick” - but instead, they simply feel quite lightheaded. (note: Sonia said these looked like hieroglyphics. Note: Sonia lugged out a new journal - she writes in a way where you can actually read her handwriting) and told me she hadn’t “journaled” since 2023 (see - I’m not actually “journaling” - that’s the trick - I’m writing all my thoughts down even the hard ones - but I don’t mind tricking people - in fact, I think they like it.\nHere’s a little curated booklet: Tot: Standing is better (”why am I getting stuff done (finally))← it’s a “mechanism” (hot hand), nick - oh yeah; I can memorize stuff (I shouldn’t memorize stuff. I shouldn’t memorize stuff, I…): here’s how to be happy: find something you like - want something, and go get it (and back←)…(missing)"},
{page:92,type:"abstract",lines:85,date:"Mar 4",text:"SHOWER THOUGHTS: “OK, LET’S MAKE SOUP”(THIS IS, AND ALWAYS WILL BE A WORKSPACE)\n(pic): manually cleaning the gray matter out of my mind (because I was in the shower, thinking: “did I get everything” and now, a retroactive point to this being about nothing…internal consistency…shaping a ball of clay with your hands (brushing my teeth with my hands, scraping off crips of dirt with my fingers (to clean myself (duh)) “I don’t know how literal this metaphor is.”\n(pic: clever coins) (she is a witch, after all (narrative therapy - I designed it - I made up everything - I made up buddhism - I “fought all the civil wars in my head,…”in order,”” ~← the real part is the stickiness that is between them - like glue, or like cum - that I can’t leave all willy nilly on the floor. Ok now: we’ll start at the very beginning (that’s a very nice place to start): The impetus for my shower was the sudden connecting of: the drawings and diagrams I made in that hallway, connecting both of our rooms (a liminal space) on the floor (another liminal space for non-floor sitters) and the ones I”m making today, All the space that is gained by the distance that has caused the loss of most of that memory can be “artificially” filled, with my thing to understand - whatever it is. I was trying to understand, in the “tub.” The drawer handle: “Why was I so much better at studying for that test (according to Nick)?” the “answer” is that I found a way to describe the diagrams to myself that (filtered out all the nonsense) and came directly, specifically, into my brain. Directly and specifically, meaning there is no room for the other two sides of the ellipse - the ellipse itself - only and alone - is enough. Ii think, in this case, the ellipse designed to describe what is in common between the tower building diagrams, which get refined and revised, for my pleasure, ad infinatum, compared to those diagrams, and what they have in common is: ?those loose threads - I thought perhaps they had two things - making way for that uncomfortable diagram.\n\nTangent: I prepared some metaphors in advance. The first one is me putting my glasses away, and all the times before when I noticed that I was “putting something back” in the place where I’d last seen it, or knew it to be, for example - starting with: my glasses always go on this shelf, so now they: go there, to: I once saw this here once. And as a complement, esp. in the garage, I am always looking for places to put things, wondering where their “places” should be…and ending wit - “I always see a chip here on the floor, so I’m going to put it back here. The other metaphor was about the rabbits all named Sophie.\nWELL ANYWAY: I took quite a long hiatus, and I might be able to blame it on getting progressively hungrier - I went and laid on the couch, and started thinking sort of nasty thoughts (I masterbated but not that kind) and couldn’t get up, and finally went inside and got my cod fillet which i couldn’t wait for the whole countdown so I hope it was cooked, and ate it and everything) in a very business like manner, in that - I informed my business associates about the gathering, though none of them could come :( Well anyway - the thing I was thinking about, in the shower\n(p.s. I knew exactly which bite of chip to take, and then, not even missing one beat, I got up (ha! I was already standing) and put 1,2,3 things in the fridge, dipped my bag of chips - it’s like I didn’t even like eating - there was no lingering at the table - no hemming and hawing about whether or not I should really be done.\nlike saving my thoughts from a burning fire - more on that later probably)\nMaking soup - putting everything around - curating - seeing what connections come together (because that’s when I always remember something - I learned this about a thousand times) - I won’t be able to finish my recall exercise, but then stuff - random things - prompt it - throughout the day and I finally do - get to the end…\n\nsomething about -\n\n(missing)"},
{page:93,type:"day",lines:91,date:"Mar 7",text:"March 7\nYesterday, when I could barely stand working, though I only had two campers, I decided, against all that is holy because it is useful, to record some of my diary entries as audio books, so I could listen to them. Perhaps as I fall asleep, and perhaps while I work in the garage. To emphasize things, I read just the Doen dress day (from December), off my phone, to my phone. I liked reading it, and think that I have a good reading voice, because people have told me (Jonathan, that homeless man). I think I will read more of them (for myself to listen to!) and finally, I have a (time- consuming) project that is of no use to anyone but me. I will enjoy them as equally as any other media. This morning, I wondered if the goal of my giant JT was just an instrumental game to get myself to read them back. With reading as a waiting room activity, I was exponentially more able to imagine myself making the stiff, slow decisions I think it would take to choose what to summarize. i could read it multiple times, to make sure I was correct, and I think that is the way. J did some drawings in his weird wax paper notebook of el toro (anger) and el tigre (lust) which were miles more drawerly than mine. mine remain stubbornly in the land of symbols. And it is right that i do only and exactly what I want. “As an example of a game I could play,” I will write down fragments of memories, that will become null and void in about 2-3 days (the time it takes to forget things - a different kind of deadline. And before that time is up, I will assign myself to go back and look at them and decide, like the gray matter cleaning my brain, whether I would like to keep them, or let them go - never remember them again - getting involved - coddling, my brain processes - like J watching me cum, making me cum. Like my mitosis game (for a different reason), and (missing)\n\nIt seems he takes it as a chore now, or a ritual, to recount parts of our date that were remarkable or pleasant. Ashamed that I find his childhood memories interesting. My favorite of his drawings, was his mother, clipping off his wings. So final, perfunctory, unfeeling, the word clipping. He paid for the berry pie with Microsoft Stock (1992?), he said, in line, and (missing) “Daddy making money” he wrote, on a childhood drawing, and he would wake, with sunlight coming in, to his dad, clacking on his keyboard. it’s frustrating, if not scintillating, or enticing; I have a textbook written about everything he says to me about art - reframing Art21 (missing) (Would it be crazy?) It would be crazy. And yet, I might do it - introduce to him again - the booklets that he discarded - did not care for (missing) I would’ve been frustrated, waiting for him to make coffee, had he not apologized so sincerely. I laid on the couch, like a cigarette, not quite ready for sleep (in how my clothes clung to me, and how I was straight).\n\nFrom the couch, you could see the leaves on his big tree, that I had been staring at while he napped, wondering if I should want to paint them. But they were out of alignment, or that is what I figured out later, once I had figured out this theory that I’m going to show you, but after I have laid out all the pieces so I can think of them again - like soup - like a mess ?the question? why would I want to paint one thing, and not another. The leaves, they were pretty, but there were too many, and they didn’t mean anything. Perhaps they needed to be declined, like the petals of the daisy, Jonathan was re-drawing - like the copy cat game, that I designed, that he designed, like buddhism, which was thought of, and I thought of, and buddha thought of. However - there was a view, if I were to have turned the tree, in which everything would have aligned - and then - every piece - every leaf (and connection between leaf could’ve meant something - would’ve talked about a concept in my mind - would have an anchor point so I wouldn’t get lost. And perhaps this cropping was only so I could see it temporarily, only necessary. However, I got the word alignment from earlier, from when I was thinking earlier - supposing that nothing meant anything, except at one point, one moment, when everything click into place, and then everything means everything, or something."},
{page:94,type:"abstract",lines:16,date:"Mar 7",text:"LATER (TIME/SPACE)\nI’m so sick of not knowing how much x how to like my little diagrams enough. Like the page that has: me exchanging a nickel. I want so badly to draw more diagrams, but there is simply no system/automatic procedure with which to decide which ideas, or thoughts, or moments get captured in a drawing (because there are so many). Perhaps I could go sit somewhere with extraneous rules, and read through it all, and make notes “in the margins,” and then go back and do it afterwards. Perhaps, then I could treat it like the clothes, whichever ones I don’t feel compelled to draw (wear) (that are left at the bottom of my long, wide, shallow drawer, I can then discard…It started when he was describing himself on some trip with his family. (missing)"},
{page:95,type:"day",lines:15,date:"Mar 7",text:"like dancing all night, with stars in our eyes. Before he came, his body got all stiff and hard and squirmy. And then the cum, to prove that it was real. And I did feel powerful, and it was a mechanism. And he is always begging to touch me, to make me cum, even saying it would make him hard, to see me cum, and i think I can tell how much he likes it. Somehow it feels like every time is different. He’s always trying new stuff, like teasing me with my tongue - making me lick his fingers to show me what he’s going to do. Mechanically, idk if it works that well, but his creativity - making me apologize, when I hain’t done nothing wrong - brutal, but got the job done. I think if (missing)"},
{page:96,type:"abstract",lines:99,date:"Mar 7",text:"(missing: (was there supposed to be another analogy with the two recrops?)\nThe intermediate stage is a hidden mechanism - even if I don’t have to list all the crystals - should I change the rule from work smarter, not harder to the opposite? I like (?) working hard - doing repetitive tasks - manual labor - could Ana teach me that? I think this relates to the soup\n\nthing, and making messes, like I somehow think that if I lay everything out on the floor (and it’s true, though) in front of me, then out of the ashes - I will gradually start to collect things like constellations (with my mind) - and make something - they will coalesce into something. You spend your whole life proving that our brains don’t work (ex. I was stood, stalk still, waiting for a. woman to come at me, I knew, but my mind couldn’t be sure she’d change her trajectory, at the T intersection - she could walk through plants - step through my\\ lemon tree (\\artistic license” is actually a rule)\nMy grandma always used to say ‘use your artistic license.” I know she was trying to be nice - letting me off the hook, to do whatever I wanted, but what I wanted was to follow the rules/, and for there to be rules), (I love rules). However, I think my OCD jew mind has come up with a way to understand it to myself - it’s not a cheat code - it’s actually that you have to break the rules. (And this refers back to the “drawer in the dream” phenomenon, or more like - dream logic - or more like - things in your mind look a certain way (and have to, in order to get ‘made in mind’ stickers slapped on ‘em. (and they have to get the stickers to get through the metaphor machine I think\\> Which are: the rules of the mind - No extraneous information - things that are made in the mind do not have extra details - every detail is for a reason And anyway - like J said when he deleted the unwanted chimney, and clarified the structure by making it wrong (lying is so hard for us) and when I delete extraneous details\n\nlike who’s tree it actually was - because it messes with the mind, which brings us to: when it’s right to use wrong grammar, and in order to do this (arithmetic) we need to imagine the existence of an additional structure when we are talking to someone - to formalize it - the logic of the mind. Perhaps it is a bit like physical logic - you can’t do something to a post” without first having the post. SO, when speaking, you should let the person imagine, first, what you’re talking about, and then begin to modify it - a post that was made of bricks, that stood 2 feet off the ground etc. with a square flat on top, rather than adjective first. This is the only example I’ve thought of - I assume there are others - other examples of when, though it makes logical and grammatical sense to phrase a sentence a certain way, it doesn’t “agree” with the mind - the way the mind works - the stages the mind goes through to understand something. And so if we are to understand something like a great text on literature, a smart glasses wearing professor, is performing this extra step, this hidden mechanism - translating, with every word, just as a mathematician simplifies equations so they resemble the familiar ones (25x4=100), relying on, calling upon, familiar concepts “ah - this is like this [very much known about thing - thing I am familiar with], moving the order of the words around. It’s a little unfair (”) to expect a new reader,\n\nor someone not familiar with the field, to follow - they see the expert following with apparent ease, and try to mimic this ease, but they don’t see the translation occurring behind the scenes.\n(continued from before)\\ and get me, and I couldn’t, it appeared apparently, look away, until I was sure this was not going to happen, until she turned. Anyway, the point I was making was just (tangent:) it’s remarkable how similar this is to taking out and cleaning up messes - just thinking of how - I put things on the burner to think about later, and then, when i take them out again, I have to take out all the other stuff that relates, before I can even start working or thinking about it. And then, when I’m done - I have to clean up (cause my mind gets messy.). I feel like I know what the process of cleaning up mind stuffs feels like, but it might be fabricated. Idk - my room feels messy right now, and it’s bothering me - I wonder if this is how my mind feels. I guess, I assume it’s the same (of course it is (?)) as (me) categorizing stuff - and like I was thinking before - I’m worried I’ll be unaligned with all my categories, when I go to Hawaii, It’ll be hard not to get all these old feelings back (missing)"},
{page:97,type:"abstract",lines:105,date:"Mar 7",text:"(missing) walking on tiptoes, on egg shells, in my own heart. I had a phase of describing everything to myself - all the counter-intuitives - everytime there was a snowball effect, or a threshold. I told J about the first time I took mushrooms, and how my main experience was that the categories, which often sit queenly in our heads, with cobwebs, not having moved for 100 years, were then busting around like a roller coaster. I used the coin being sold for money as an example - his “6 principles of money” or something - he is smart right in between my two ways of being smart - saying the I guess underlying assumption that ends up being interesting, in that it is thorough, or true etc. Fungible etc. He took an econ class? idk. A coin for a coin makes the whole world fungible. I wish I was laying in his arms watching airplane, instead of getting knee deep in this stench of sweat and regret, pre-regret - worrying about all the things I should be doing, (missing)\n\nTaking stock of the whole pattern. I don’t have to abash myself because I do get back to the pie eventually, usually…like - organizing my mind - it’s a thing that I do - that I need to do - it makes me feel better, and here’s a structure - some of the time it’s real (actually organizing), and sometimes it’s just the perception - a ritual. How do I know which is which times? it’s about the amount of bluebirds in a tree at any given moment. I’t snot unknowable, I just don’t know it, and don’t know how hard it would be to know it. I had some ideas. One: print out all the pages and manually cut them up, organize them in to categories (on my rug?) and paste them into another notebook, as though I can’t be away from a notebook for too long. “welcome to cuddle palace, where cuddling is our passion” :/) (ha.) (missing) The other, which I imagined between/amidst back pain and staring up at those leaves, as if we’d been outside - was a (pic) book, with drawings on each page. i tried to figure out why I had such an adverse reaction to putting them on cards, and I came up with that there’s too much randomness, and I could have mommy shuffle the deck, and take the order as law. It would make sense to do the set\n\nthing (by the way - the question was - what to do with these diagrams - how to use them, appreciate them…I need to arrange them into relationships with each other - a triangle - a venn - what do they have in common. I don’t know if it would work, so I don’t know how much or where to put the effort into like J said about his green table which I thought was good, I thought. (missing) (on the other side of things - my allowances - changing the order of a sentence if I can’t remember the other half, writing in diagrams or code so I exactly don’t get bored - it turns out I have a good sense of when I’m going to get bored). “Now I’m going to do something I’ve never done before…try” (-Jim) - write what I already recorded with my voice. One: my dream (missing)\n\n(missing) Oh, and the other thing I thought of, besides the intermediate stage, is: (”insert that unfinished, but nice diagram with the rolling chair in a half circle (it was a last to leave video - but never been done before with a half circle). And then, remind myself of - two days ago - the lag of categorization - an essay I wanted to write, but couldn’t think of an example of and the example being, i think: I considered something perhaps the religious fervor with which I have (now) been including my stems, my seeds, my pre-tots - and called that “beautiful,” and - what’s nice is - I figured out the mechanism, and it (retroactively) gives a reason to my “shifted connotations” which originally assumed was just an annoyance - shifted connotations - ok fine - as soup - the thing you thought was art - what you were putting in that category, or to speed\n\nup the process - the list in family guy, which defines the category/parameters very quickly, by giving on item, then rigging on it, to show the potential (this is a “progressive” version of simplicity/complexity fisherman - then comes back around and undermines it (what the hell?) a snippery needle fell into my shirt (because I found it in my sock, and was too curious to see what it was to stop it falling down, when I got my chance to look). (tangent: the pie: I identified a phenomenon (and thought: Oh, not another thought again) (pic) - I only like eating pieces of things (I always cut my pie into a mini pie) and preserve the integrity as long as possible, or till the very end). (pic) so: to finish - beautiful always has connotations, and so - I just needed to capture them and artificially cover them onto the thing I was thinking…I wanted to stress the importance of including the Tot, and beautiful had powerful connotations - it’s not just “power,” there’s some additional rules like ?opposite? - a container so you know the rules are super-imposed - I’m not sure about that…"},
{page:98,type:"abstract",lines:28,date:"Mar 7",text:"In Bed\nThe exercise proceeds as ever; I am tired, by my ambition to methodically transcribe every thought that crosses the path of my mind remains steadfast, perhaps grows more steadfast, as each day, as each hour progresses. On some things, I wonder if I want - not to write, but to mediate - and - in writing, I give myself permission to imitate meditation in at least one respect. I am no longer so foolish to think that: worthy alternative would be will - instead, I see myself immediately setting to work on an alternative, neigh additional, autopro - a game to play, whose strategy is the goal - of meditation. My new thought: the backside of our iterations and sundry, may also “antithesize” my smart professor essay - in that, each iteration means another hidden mechanism to be unwound, as if from a spool. And so: an erotic novel would have long descriptions, if only to prolong the imagination at these certain particular parts, analogized by J’s exercise in which he invited himself to vary the tempo (- to work on parts that needed more work I would not tell someone this. I would not think it is interesting enough (and I would not give 6 uses of money (dragon’s blood) - I would only - as in second grade - want to say something that had never been said before. And I think these are the only things I say)."},
{page:99,type:"ideas",lines:31,date:"Mar 7",text:"And also: circadian somersault. Recreational Metaphor (band names?)\nThe Tot that I recorded on voice memo was about (pic) the smallest size box, which I have drawn, it seems, too many times now. Three reasons to use this size. 1 because of what it has in common with a fourth quarter - i.e. it would not exist without the other box sizes, and their relationship to each other. 2. It accidentally has a place for a label. And anyway, what I wanted to use it for was to put the different kinds of time in - one, being the kind that I thought would help me complete certain specific tasks, i think such as: reading through my entries, and looking for, and finding: things to abbreviate - things to summarize, things to illustrate - things to attach to each other, and things to renovate until they coalesce into a coalescent structure. and so, this time - found, I think, in hotel rooms - because the possibility of doing something interesting makes the time more valuable? Two memories, and the latter is related. 1. David and the green zebra, his weird combination of pride and humility. 2. That hotel room in connecticut, with Alpha - I think I invited some men in - I think we went on an adventure - what strikes me is them being there - and we - the large bed - the larger space around it - going out the screen door - and I was surprised to find it simply opened onto the rest of the world - large grassy knoll - not to personify it as sprawling (that’s important to me)"},
{page:100,type:"abstract",lines:80,date:"Mar 7",text:"something to do with a plastic bag, so probably drugs. And of course, me seeing that they were out of place. Was I grateful for them to be there? Did I want them to leave? Did I start on one of my little adventures and then get too caught up, and want to end it (I used to just let the wind carry me. And now I don’t do that anymore. I make decisions, and choose what I want to be doing at any given time.) Jonathan says that I discovered Free Will and (will), that having discovered it - I now have trouble with will. He’s right, but I don’t know why. It seemed he was easy and solid as stone, for seriously conjecturing on the subject; for coming to me with his idea; like a surprise that keeps happening. In any case, once I had thought of that kind of time - that always has me imagine myself, parked at a standing desk, with a green glow light on my face - something comfortable - a couch chair - red probably, with fuzzy exterior that seems comfy only when not zoomed in on. In any case - there are other kinds of time - not so much that they were a point of interest, but more so that I felt foolish having neglected them - like the sun circling us. And so - perhaps I identified a few more. i suppose the antithesis - the way the day goes when I journal all day long - things in my room - every ounce is used up - I have\n\npleasure in it - I know how to like this time - now is the time for going on my walk, and then, if I am lucky, which is everyday I can go out, venture out, and find something nice for dinner. It could be Kazu Nori - I used to walk there. If there is any extra time, I can spend it so nicely, by getting pie at Erewhon, or a cookie at Bristol Farms. This isn’t the frivolous joke that it sounds - it’s another frivolous joke - one pre-considered. Frivolous on purpose. In any case - the time never feels to be a wide-open expanse. Or maybe it does. And then there were the eight minutes it took mommy and I to get home from the Parakeet Cafe, and the one minute I sometimes save or lose on google maps which is even longer - that minute costs 80 miles per hour. Anywho - all these kinds of time fit into that wooden chest (of which I’ve already defined the qualities which make it exceedingly sufficient for such a task). And the label: “kinds of time” - this all as an example, a manifestation, of Plato’s forms - the essay on quantum concepts I didn’t deign read on gmail (I only read art in its own terms) (and my own diaries) Together, they form a concept - of different kinds of time. Together, they decline, in the box. Some are bright hallucinated yellow, others are bright white, or mint green I suppose. The one I was describing is hallucination yellow, I quite like it; that’s why I like it so much. And then, a last thought - to boost or burst my bustling ego: I don’t know if i can quite\n\ncommunicate it (without managing to gob smack, with my indolence (not the right word)) but anyway, I’ll try. The Play concept (a new phrase that I just invented - will it become part of the lexicon, or never seen again? I find I do not care) A philosopher - a man with a nice man’s haircut, with the face of a philosopher - haggard, in a brown maybe suit, giving a speech. A thesis, an essay - a new topic. And here it is: the thought. I could (and others) give a speech - see - my mind simply imagines things that way - the way a thesis is written is Simply) the way a mind my mind (or others) - thinks of things - slowly all the hubbub, the hullabaloo. I think, if I started speaking, I could, I would, come out, with a bubble soap) a fully formed thought, complete with thought beginning and thought end - and I’d always researched it - in my mind. The time thing, for instance wouldn’t it seem researched."},
{page:101,type:"abstract",lines:31,date:"Mar 9",text:"March 9\nNow, I was thinking - I have my things to collect I thought all was hopeless, but then I can build a tower by collecting all of them…And so, here’s one: when I was getting out of the scanner, my shoe produced a single gray rock and it solved the issue the other day of there being too many stones, when i was on my walk with mommy, and I thought there was a certain stone, but I just needed rules. The other thing I wanted to collect (but I don’t know the additional example), is the menswear thing, which I don’t have enough examples but I don’t know if/what the perfect number is, if there is one. And here is one that sprang to mind - all the examples, as though it was fully formed - mommy and I - is it towards use or (oh :( now I have to collect all the examples again). When I was in the tunnel, and I said: no, no thinking of that…and what I was allowed to think of was: how nice I was, how happy I was, that someone had fought off the light problem (gps). I thought it was only a flash, but it continued, as though proving it was real to me, or to the point of comedy - flashing back and forth, as I went through a series of tunnels. It could’ve helped my thinking: back and forth - light and dark…oh yes, and we found examples, with Rachel and Hunter, of things that were dark, and she admitted she didn’t know exactly what we were collecting, that it was changing - the dark of a whole being dug - getting progressively darker…was her admittance the best"},
{page:102,type:"day",lines:92,date:"Mar 9",text:"part? Trying to figure out what made that beer dark (and special) Negro Modelo. The efficiency, as if we were collecting instances of efficiency, of him, then, having been held, and then asking me if I wanted to be held - did I feel better - the thing in question - the whole thing - was only a quick part. Cause I was shiny, and, I was crying, literally crying when he called me back. He brought over an Iris, which I put directly into my last green water bottle. It was beautiful in the morning. I didn’t realize it was purple…I took a picture of it before I left. And we had a two minute clap, for lindsay, for being trans. And then, when he wanted to leave (how dare he?!) I went into his basketball hoodie, and I was the ball, and he was the basket. And he made up a poem, and said “I love her so,” as a second iris. “I am the basketball, you are the basket when things get better, it will be fantastic.” Anyway, he just needed to be held. And I was too small to be holding him but he said he felt better after. Now I can tell him my thought, that he was hesitant to tell Ana - that the ?15? year old, sitting between M and D, was hot. Our little “problem” - would it have been better to have the cat still in the bag? Not for me, or for him, but for everyone including me and him. that, when they offered to smite him(?), I said no, because I didn’t wanna think he was hot. Last night, when I got really mad, I started\n\ngetting mad at things I’d never been mad at before…that I had to naughtily take a hummus from the fridge. That the borscht was so read, and it had so many things in it that I never got to discover (one, by one). And a handful of shreds, a burnt quesadilla - I suppose it was the gaslighting “oh - it has beef broth?” yes, and that has beef in it. If I were to get down to it, the argument would be as sharp as a tack, and he still might not see it. Tonight, I will talk to him, and tell him I can’t tell anyone anything - that I was nervous for the trip even before my interesting(?) - look - it’s in the dreams! the dreams will tell you if you don’t believe me, it’s proof, the facts are as cold as soup I might leave out - a metaphor that’s not very good - like le metaphor incorrect. last night I was angry and sad, angry and sad (or tired? idk) (the sunshine helped, I think) The journaling is so i can say what’s true somewhere. My theory was that I had to punish myself “expect the worst” means I’ve never congratulated myself, or accepted a compliment - the PWC, which everyone liked at the party, which even lit up their eyes was thankless work - why would I do something for you when you’re so ungrateful! I need Ana to invite me to believe that I can be nice to myself. I was mad, already, because I threatened, no matter how much sleep I got, to be unhappy on the plane - mad about my back, and finally all the perceived threats, getting up my guard, for what is surely to be a barrage of\n\nsecret, hidden attacks from Sandy and Skye, mostly in the form of laughter. This is the soft underbelly of my heart - nothing less will Jonathan except. I don’t know, anymore, what is real, and what is not. his poem confused me, because I thought - could mason write that? Could evan? Surely not. It was a relief to tell him that I hadn’t slept, and for him not to be mad at me. Even though he was “2/10” mad at me for something that was stupid - for something that was not. Hard to perform intricate operations-like therapy, when there is the violently matching and sleek outfit of two flight attendants - emitting sounds like a whale - pacivities - the activity of pacifying. When removed from any actual pacification, is an act - only- like a bridge - free flowing water, that can be seen from a bridge, but so far down below, that it is easy to say: “I don’t care what direction the water is moving. Anyway, back to the Borscht - Hunter talked to me about designing his own pamphlet, and I got to see the light of possibility in his eyes, second only to the look daddy gave me, that I missed the ending of because I was putting on my hood, when I told him I’d lost a pebble from my shoe, because I was looking for something. He helped me until he found out what I was looking for. Then the light, of dawning uncertainty, when I said I was collecting it - pebbles under my shoe."},
{page:103,type:"day",lines:83,date:"Mar 9",text:"I want to chase that high - I want to tell Ana (who is one of my least favorite people) that I want to do it nicely this time, without a mean pounding to my heart - i want to sit on the couch, and somehow produce the miracle of still wanting to make stuff happen…it might have to do with keeping promises to myself. it might have to do (or!) with the promise I made myself all those days I was working in the garage - after this, you can stop - burnt out, but not from college (no - thank god I am not that simple) - I am my own fire fighter - a fire fighter that lights fires instead of lighting them out, and I simply want to sit on the couch not burning. Why would I be nice to myself when my fire lighter is so cold - as I’d be as a boss - a boss I’d like, because we’d get stuff done - but what about nice tea and cookies - shaped like teddy bears - giant teddy grams, and I think it’s alright if they don’t have enough butter. Perhaps sometimes - this time - maybe other times - it is alright - whether it is - this plane ride - tired, back sore (but not that sore) it is alright, and I don’t have to laugh with him - that is the inner light that shines.\n\nI allowed myself to bring my best journal (with some safety precautions) because I knew i could take care of it - like a second skin, that I was carrying with me. And I can keep my diary chronological, and add the nice ritual sticker like smiling as I sip on tea in the morning, as the sun comes in (Hunter asked me what I do in the morning. This might be the only question that I like. I almost didn’t have a crush on Jonathan yesterday morning when we went to get bagels and he was looking so fat, and talking about being fat. And so, this is how I am going to lead my entry - draw myself back to the events of last evening - the label maker, for example - letting myself off the hook…easily - like intermediate stage, as if there were someone else there, who wouldn’t understand if I didn’t spell it all out (for myself) (note: I feel guilty all the time, for writing in my journal, for taking tiny sugar packets of thoughts, and pretending they’re going to turn into something - it’s all part of a larger puzzle I’m solving - everytime I use the “red car” mechanism I note it - set it aside for later - I haven’t used it yet in my mind I don’t think). btw, J says I am making him smarter and better at art. But maybe it’s the guilt that propels me, sustains me, maybe I can elicit the same look I saw through my hood - when I say that is my goal (to ana)\n\nThere was: the incident with the purple thread. What I did should only have gone in my journal. She wanted to floss her teeth, I offered her thread. Earlier, she had commented that she liked the purple. I had a crush on her - she was a vision - Amalia - when she walked through the door. She shot my carefully constructed over 29 years of life, self-esteem to pieces, and afterwards, I had to recollect it, to collect it, in the bathroom - I didn’t know what had hit me, what had happened to me. And perhaps it had to do with the practicality of her clothes - leather beige flats, straight pants and straight hair, that “chiffed” not crumpled when she walked, or she was always (stalking), like J ambles, like Sean bristles. (pic: pink, purple) “it’s next to the pink” she said. And later: “I didn’t realize that one was purple. That was after I said, gave her the wrong one, and said,” no, this is a punishment.” (Ah - something nice is happening - they’re “cookie or pretzeling” down the aisle. I chose cookies. The teddy grams of my dreams! But nothing will beat me ordering tomato juice for Sean - that’s one of my favorite\\ memories \\shifted connotation, lag in categories. J said (this is my only entry point) and maybe it’s actually a trauma bridge to get over) the meadow seemed nice but the ritual was stupid. And that was the thing - like - did he really have to write down the ritual."},

s. refer back to the constellation. I think the weird part is that it’s binary, and not related to what the data actually is.\n ii. alright, i think i’m going to initiate the introduction of the memory recall procedure. oh it’s easy. mancala board to replace the egg carton. hello kitty lunchbox + pastel shirt - each side a different color. inside - everything that’s on these slide projects about my earlier life so I can even <em>teach </em>people about me, just by recalling these memories to them (is this worth it to know(?))…designing little games (!) to go in the box ex. the pennies on the rug - a nice rug intricate black with red and white, pink, fringe, thin - dollhouse material - square for sure. And could go in a bigger version of the black paperboard drawer boxes. The pennies are simply cut out of copper with tin snips and <em>stamped </em>badly is fine. The revelation somehow was that each of the games\n@@PB@@\n is a game i <em>still </em>play, and <em>so </em>specific…like SET THEORY is a wooden version of the color shapes game…obviously the shittiness wasn’t intended when i chose the ballet shoes but it shows a certain way of making decisions - a commitment to the assembly line that trumps all other aspects. Pick Op a Shell - representing a <em>broken </em>game, that becomes a ritual and not a game. And then to fluff it out in the background - an activity that is not an activity - just poring over wrapping paper and kits and sets, (party, AG doll) catalogs - making my own catalogs, but solving for the most beneficial aspects. Then there are some - surrounding it - me being careful and extra careful on that pizza - the thing about salt and pepper shakers and how I don’t care about recess - everything is opposite. I guess i must have been talking to matthew about projects a ot - so much that he <em>actually </em>did them - and then i feel guilty and confused about this. the time that sandy thought i could spend my hard-earned money on something other than tiny little sculptures (implied value), and the special things box that was a thorn in rebecca’s side. the fact that though i was late everyday, i wanted to have <em>free </em>time. writer’s workshop the book fair. kelly paper. oh, and of course - the fruit school. the pencil grip room. the <em>bubble </em>thing i created that linda stepped on but i still wanted to keep. Arranging those wooden pieces in hangout. pattern blocks. Busy busy town - that cartoon game where you find stuff and then use it for something else - the fisher price store. playing school with my dolls"},
{page:320,type:"day",lines:80,date:"Oct 3",text:"OCT 3RD (primo passo)\n inner peace missing, gone. maybe it’ll come back. hopefully soon. Another idea - I don’t know if it really makes sense or is interesting. Also: I enjoyed how much I hated that interaction with steve goldman. People should consider whether i like them at all. he said: he “really liked” the aggressive way i grabbed the knish. it wasn’t a knish. it was kreplach. Maybe if he wasn’t so fucking retarded I would know what he was talking about. Jonathan tried to hug me while I was holding soup. May you always have soup in your hands when people are wanting to hug you. I don’t like my relatives and I was dreading seeing them in the car, hoping I could find mommy before everyone latched onto me like a batch of hyenas cackling - find her so I could hide behind her - metaphorically, but maybe also literally a little bit. Florence yelled at me to go back to my seat but I still looked in the pot and told her i wanted chicken soup with no chicken. Jonathan was explaining about his belt - “see, this belt is adjustable,” no, all belts are adjustable. that’s one of the main features that I know about belts. Whoever invented them being adjustable is turning in their grave. And your weight loss is not proportional - directly, inversely, or otherwise - to how adjustable a belt has to be. J has given me permission, unknowingly, to hate people more effectively, more efficiently, with more gusto, with more fervor, and with more joy. (or just given me another reason to hate people - for being stupid - for them not knowing things)\n Mary Jo asked me what was new and i said “nothing,” and asked her, and she said “nothing” and then we both said “that’s it.” oh well, I guess we don’t have to have a conversation and then we both died laughing but I turned away from her and didn’t talk to her for the rest of the party until the very end when I showed her my artwork and we had similar opinions on it and she showed me some posters she’d made for a presidential candidate - 40 all the same. but not copied! That’s crazy. So crazy it’s almost\n@@PB@@\n kind of cool. I want to do something like that - copy a bunch of things for no reason - that’s the kind of thing I’d like to do.\n Just to clarify, because it wasn’t obvious to evan who I am texting: I <em>enjoy </em>hating my relatives. it is a pastime of mine. A hobby even. Yesterday, after mommy destroyed my mental health, she told me about all the sexual things she did with her neighbors - they played a game where they ate gross food and got naked. Feel like we never played that. The good old days. Crazy breeze blowing in from the ocean - adding mist everywhere. Spitting in the face of my not bringing a sweatshirt. This is why 7th st is so much more expensive than 17th. Anyway: the one idea I wanted to relive - making a machine - and it would have a crank, and “receipt paper” - (fabric, sewed, on a spool of wood) and the point would be to project my ideas, even the diagram i drew, like heads in a pill bottle - so I can imagine just take them out and play with them [with my mind]) two glued wooden frames - hinge and latch across. nicely cut sticks to corner the frame - TBF (?) in the frame. Plastic paper on the other side of each frame, so it makes a little enclosure where the diagram can go. And it can be latched shut - and it will tighten around the diagram which will be paper or fabric (torn not sewn) - I also had the “memories that make me me” in there at one point - at the beginning I think. If I could somehow make grooves in the small slide top, and store them in there - it would give me some peace of mind - I would know they’re in there and wouldn’t forget myself - might even take a bus and drop it off on a street corner in the middle of the city - next to some trees probably - a bus stop"},
{page:321,type:"ideas",lines:63,date:"Oct 3",text:"somewhere i could go back, if i thought about a map in my head, which i normally avoid doing (for magnanimous reasons). And I could do another of things i feel guilty about\n Another idea, i guess: i should go back and actually figure out what i was trying to say yesterday - a lot of my ideas are fragments - designed to be picked up by my mind in a certain place. And I don’t have very much time to do this. Oh no, but now I have to go home and actually get some work done. It’s 4:50.\n 6:14pm\n did about 3 mins of work - it will take longer to soft boil these eggs (i ordered tsujita :)) anywho. I have 6 minutes to tell you everything.\n (on like 16th and marguerita) i thought set theory was one thing - the cigarette lace - how to find out. “feels like” referring back to the model - so basically just - remembering to look at the abstract concept, consult the map, but with the devotion they instill of referencing the model.\n Each of the memories have something in common with the whole thing, and something different in common with something else.\n\n Here’s a good game to play if you don’t want a good game to play: receipts - I like the look of them (they are pretty)\n the game: perhaps 3 things. guess what they are going to be used for together. This will get you into the additive state of mind which is an artificial process. use ai to generate the receipts.\n\n (pic)\n@@PB@@\n ok. the next thing is to put perhaps 2 posters on my wall in the place where I need to go to sleep and the posters will be about ambiguous events - actions that have two possible interpretations, and the weird thing referred to like someone saying: “oh - that’s weird - are they saying that it could or it’s supposed to be intentional…(?)\n ok - is <em>this </em>the other thing I wanted to write down? About how Mary Jo - when I was trying to convince her to do art again - and I was thinking that she could design an automatic process for herself - a game (she said no) and then the absolute absurdity of having an automatic process for something that you’ve never even prototyped before (and have no idea if it will sell, or what you will do with it) - going through the motions of abstracting (it only has one thing in common with abstracting) - realizing…oh, these are just lines - the sort of humdinger I designed with the hinges 2 days ago I think and then making a lot all at once - the delicious insanity :)\n Laying out a [towel] in your mind so that you can then do something on it - think clearly :) - if just for a moment - the [towel] - tissue i laid out on the brick so we could play Pick Op a Shell. the alter cloth. And all this leads to the sort of abstract version of one of these things, that could be, maybe - just a white cloth. last night i imagined, instead of them (even) hanging on the clothesline, they could just have those new pinchers from muji, and be in a pile <em>still </em>scrunched “nicely” - and they would’t work - nothing could be laid upon them - so this would be a “true abstraction”"},
{page:322,type:"day",lines:36,date:"Oct 3",text:"the dregs (i guess)\n the third unnecessarily complicated paper contraption after that color-coded notebook and reusable worksheets…not done developing but - a system for writing sentence fragments - the basics - multiple/various boxes, a symbol in the corner, and the symbol corresponds to an extended space to continue the thought once the memory recall procedure is…[over]\n yesterday, ~16th + marguerita - this isn’t really a thought i should be writing down, instead let it “sink” in, but, since we have some extra time - just the idea - autism - thinking about something until <em>just </em>before it’s over, and you understand it - stopping a painting before you know what you were painting or why you were painting…otherwise, you will categorize it too much. it will go up on a shelf in a jar and you won’t be able to reach it. instead - setting things up in your mind so you can think about them later.\n Had a lovely time eating my Tsujita - it was delicious - I also had la la dream toast - 2 favorite meals today, and no snacks except 2 bites of a maple glazed doughnut + a cute lil pack of trail mix which brings me to the next thing i wanted to write down - my algebra homework, at least in terms of difficulty (wait, dammit, it actually <em>is </em>algebra) a simply worksheet - just a <em>bunch </em>of venn diagrams, laid out innocuously (())x4 (5-6 down) and the assignment is to just fill them up, so that when you’re out and about throughout the day, you may start to think of things like this - “oh - that reminds me of that because…” - me ordering from Tsujita after evan invited me to go and then calling him on the phone is like J going home to change and get his grover sleeps over bag the 1st time we had sex…haha"},
{page:323,type:"abstract",lines:40,date:"Oct 3",text:"why is it like that? you could get a partner to fill this part out, or wait sometime so it feels like solving an algebra problem\n The thing I’m “<em>not” </em>going to write down is the cute lil’ neighborhood of three houses i could make for an advent calendar even though I designed it using the [plywood] i got from the 99 cents store in my wood drawer and know aht pieces i need (pic) - for the sides and roof). and i know what colors it could be painted (earth tone versions of pink probably and also how the doors and windows work (they could be slightly off - square (taller than wider) wood pieces cut from and hinged added to the back - a shelf or a box behind to hold the thing - in this case - a pair of ladies underwear and bra (lace, in the shape of a triangle) and a lil’ bag to go with it. a kraft paper bag - paint brushes - leaning - falling out (pic) things you hide from your husband and then he asks you if these shoes are new and you say: “no, I’ve had them for months (they were in the back of the closet) mommy told orrie this\n The Second Poster: referring back to your mind - these are the two things I’m always forgetting for some reason, perhaps because they are too magical to integrate, and whenever i “go back to normal,” they unintegrate, like the “higher intelligence than most people” that I try not to internalize (remember the 4 quarters and <em>one </em>is only there like a friend of a friend who sits in the corner drinking ice water and thinks “oh wow, this <em>is </em>a pretty nice house…I’m not really sure how I got here, but it’s nice of them to let me in) like me not telling him that i <em>knew </em>i’d already asked if he wrote in a diary - this is a certain strange and unique scenario - an edge case, technically (eye roll) - where you take the side of your opponent, like breaking up with someone you like because you like them too much (”i love you i love you <em>and </em>goodbye”\n@@PB@@\n OCT 3RD"},
{page:324,type:"ideas",lines:79,date:"Oct 3",text:"Bad ideas - a solution for the disorder “generative mind” - can’t stop thinking of ideas? try thinking of BAD ideas - stale, rotten, moldy. Then you can cross em’ off your to do list before you even put them on. ex, i got excited about designing a way to connect my old thoughts to my new extensions - distilled “oh, we just need pairs” - stickers from muji, no lil animals from noah’s ark, no: stamps. carve them? no - make them from peas. YOU MIGHT be able to identify which ones are the same but most likely it will end up in a terrifying mess because these peas are <em>round </em>and so you could stamp them from all different angles. Might be even harder than the matching chromatids game. or tic tacs - potentially even worse, cause they are standardized Pic) (…/why?)\n\n XL ideas - i didn’t realize, and was mildly horrified to find that I had (had) not one but more than one all-encompassing ideas. But I solved it simply by deciding to list them here (pic) I had wanted to make a bunch of automatic processes, put them in baskets and on my shelves, then have people take turns and go down the line making sets 2. I also wanted to put loose piles of automatic processes outputs sort of slooped :) together in the bakery case on wax paper like those babies with clay on their necks.\n 1. and then I had the idea for the cryptid website - set theory.com, where each day, you (i) come up with a new puzzle, and people can solve it. That got a lil’ too comprehensive because I started adding lots of (?) hover overs w/ various information, and <em>then </em>i referred it back to a whole notion site. But I should add the mold theory page, and maybe clean up a few that are almost done, and publish just those. Then I can post the cryptid on my ig story everyday. The brutal mechanism of simply choosing one (random) problem per day got me excited\n 2. [oh yeah and:] 4. i think the largest idea i thought of today was ?taking pictures? of <em>all </em>my diagrams in the - at least the most recent journals, and putting them between plastic paper so that I could then <em>look </em>at them, and maybe make an <em>informed decision </em>about which ideas I want to pursue (also could look at the SETS I picked out and put on the trays\n 3. [5.] another thing i could do is categorize them for example - for the (pic) book, maps, games ex. date book maps, ◬ receipt game - oh! also, pennies game (same kind of game?) oh maybe the spinners with only one color each - oh yeah - i thought of the dice houses to go in the hello kitty pastel box - <em>that </em>was a nice idea last night when I was in hell after I masterbated to g sort of a speedrun of him cumming in me <em>over and over and over </em>- just the last second “well, I think I’m gonna cum in you” - it wasn’t that hot, so I just replayed it over and over and over until I came oh no actually I switched to him accidentally peeing his pants at go get em tiger and being so embarrassed that he started crying, has like a metal tube over his penis so the pee doesn’t even go down, it sort of goes up again and spills out around the sides of the metal tube and dribbles around in his underwear and there is a stain spreading through to the expensive brown pants he is wearing and people are starting to notice at the other tables he doesn’t sit at cause he’s not worth it and he is seeing them notice and caught in sort of a slow motion loop, sort of clasping the wet parts but it’s too big, it’s spreading and then he sort of just shuts down because he doesn’t know how to deal with his emotions, and he is sort of just sitting there - on his side of the table we met at - tears welling up in his eyes but not really straight up crying, just sort of stunned and paralyzed - unable to think of what to do next.\n OCT 3RD"},
{page:325,type:"abstract",lines:75,date:"Oct 3",text:"INTERMISSION - thoughts during intermission\n g: “everything takes longer than you expect” - no, actually for me it takes shorter I just made like a thousand ACs and AC + MC which I’ve been putting off for days and it took me about the time it would take to eat a peanut butter and jelly sandwich (to make and eat)\n △ What is the difference between people I like or get obsessed with - people that I do not feel like I can “see through” their whole brain - like I can’t see why they do things. Like no matter what I tell Maddie they’ll find a silver lining - oh but you <em>like </em>rotten produce and my compost needed more fodder. Evan will always try to make me feel better etc. Sean is always defending himself, and making up reasons like saying “Jamie does rotations at her job” or saying I’m working on the family business - sort of the opposite of Maddie - finding a reason why something isn’t good if it is. J definitely has a permanently condescending affect but he did once do an “I’m bad, you’re good” dance. My automatic processes are all secret and internal and the output is sort of random. There’s this thing my mind does where I have to plan the next step before I can continue with the one I’m working on, saying it out loud realizes me that I don’t need to put something in my short term memory so some of it is used up. The other thought I had is that, well, it was in response to observing that I was purposely messing up the job I was doing - making a random number of boxes. Combining the different kinds of cards (ACs and AC + MCs ) and creating slight uncertainty about which box held what. I <em>think </em>this is so more of my brain is used - the 2nd step creates a puzzle, the last step is a memory game, and the 1st step is an element of randomness - suspense - will it be the right number of boxes….? (dun dun dun). I <em>can </em>override this I think, if I <em>figure </em>out exactly what process is happening and then (?) give myself a reason for why the alternative is better. But what’s interesting is that I’m solving for the same amount of my brain being used - trying to maintain some quota - like the game where you’re flying in the air and you can’t fly too high or too low. (google down game?)\n Oh, and the <em>last </em>thing I wanted to write was what Designing Automatic Processes has in common with abstraction. The example - I was considering if there was a way to streamline the process of <em>writing </em>AC and AC + MC over and over - ex. an optimal number of lines and I could optimize for 1. stroke number, 2. ease of stroke, and ofc readability. /-( ← example. I’m not sure what the letters would look like/what the finished product could be, BUT if I did this process to a number of things, there would be <em>certain similarities </em>between the outputs, and these could be recognizable by people without knowing what had been done to them, or why. People could see them, and say: “Oh, <em>that </em>is the result of assemblifying.\n Another XL process is typing out all or my most recent journals and making it into a book that I can say is what I’m reading the next time someone asks me.\n\n memory of the day - going to that trader joes w mommy, and then finding out about the shooting a little bit later (i think it was after that crafts fair or something). i remember walking up and down the aisles thinking about something, and then going to pay and tyalkin (and maybe tryna convince myself i didn’t need to think ab (anyway - you said no memories came back to you today, so that’s why this was important)\n@@PB@@\n&lt;synced_block url=\""},
{page:326,type:"day",lines:57,date:"Oct 4",text:"\"&gt;\nOCT 4TH\n Just had Maddie over. Supposed to go somewhere with Evan…Don’t know why I made the plan since I didn’t really wanna do it. Feeling a lil fresh. Maddie “broke up” with me though to be honest I can’t say I’m super disappointed. Not exactly sure how I feel about it. Changed the evan plans to be more what i feel like. i don’t <em>really </em>wanna hang with Austin. I feel it’s positive about me and Maddie. I don’t know how she felt but I was often feeling a little dysphoric about the situation. I feel I’m in a good place with most of my relationships - not talking to Sean - not talking to most people - Zach and Niha - gave myself permission to bow out, kind of wanted to hold someone and be held by…\n I think my next step might be to finish typing the rest of my journal entries and then compile them in some way - putting like information with like information. This morning I think I was imagining a course with worksheets. J doesn’t understand anything I do and say though he was weirdly aware of me shaking my head to stop thinking about what i was thinking about. i wonder if he could guess what I was thinking about. He told me about what it was like having no one to sit with at lunch and being distressed when he was by himself. I wish we had known each other - I wonder if we would have gotten along. I will text him “Let’s go to the reel inn” I guess. He is/was supposed to text me today - though he texted last night but it’s fine, I feel fine about it because we talked about it last night and it seems like maybe he understands the extent to which it affects me. There’s moving things around in my mind, and then there’s moving things around in my heart. I don’t have any girl friend’s right now so I can be effectively straight, or at least pretend to be - some of the pressure’s off. Maddie and I went on a walk and then their legs got itchy because of…blood flow issues…so we went home/to my house and they sat in my blue chair and sort of rubbed them, i guess it made them feel better…it’s a weird issue and I don’t really understand it but I kind of liked getting to witness it…\n (missing)\n J asked me if I talk about “thoughts this much” with other people, and the answer is no and it’s because I guess I thought he would/could understand\n 11:48pm\n Alright well I had dinner with Evan and somehow feel so guilty about it that it took me so long to get off instagram and get back to writing like I was supposed to. That being said, Evan, unlike Jonathan is actually interested in reading my little booklets or whatever, and Maddie offered to play Wordle (my version) when I mentioned it to her. You know, the one I’m making to copy the kitty one (missing)\n@@PB@@\n OCT 4TH"},
{page:327,type:"abstract",lines:170,date:"Oct 4",text:"he (evan) said he would read 1 or more booklets - patterns etc. He described Sapiens etc. I would play SET THEORY with him. He read tarot with me like it was a business presentation and I <em>did not </em>like it. I told him the story of that blonde dude giving me the lion card and me <em>still </em>hiding my true feelings - I tell mommy what it think too much and never share information about myself…(missing)\n Basically - additive meaning is maybe a thing I could think about…”I’m going through the green glass envelope (what does GG have in common with the envelope?) The funniest thing about me begging and pleading for Jonathan Heckerman to text me last night and then thinking: - “oh no” (!) - what if I dont respond?! then he’s going to hate me/be mad at me” he no, but i don’t know - what if it did happen. Gonna masterbate to him sitting all alone at lunch, feeling distressed, completely still, sweat building up on his brow - anxious wide eyes, but very still and only slow gentle movements with his giant hands (raving thoughts). Then, abruptly, he gets up and goes to, idk, [Ralphs], gets his food, and as he’s leaving, walks out <em>very </em>quickly, suddenly almost running once the sliding glass door is in sight, not turning not moving his head, eyes fixated. Then he goes to his car and eats it behind the steering wheel without moving the seat at all - looking out the main window and slowly moving his eyes back and forth - scanning the scene - reminding himself to look at more than one thing (the lunch he got is a bag of fried chicken - opens it up, hears the cold crackling sound of the bag touching its other side. Eats the chicken without smiling, and without looking at it more than necessary. Eyes are sort of beady and pleading, but he is calm with the absence of an anxiety provoking environment. He has 2-3 nice thoughts while he is in the car and tries to think of something he will look forward to in his class in his next period.\n I should try to get <em>all </em>my friends to write first person narratives for each other - similar to the script thing that charlie and I did when we first met just in that [it’s weird and personal]. Totally fun and interesting, but the biggest test to see if they know you - the queen of Santa Monica did <em>not </em>pass that test. I have this feeling that J could guess my inner dialogue but maybe I’m completely wrong. I think I know the missteps that Evan would make - I think I know <em>how </em>he misunderstands me. Haha, (?) he and Maddie don’t know that I’m using my journal for lots of other things other than “introspection.” I don’t think I liked the way Evan read my cards with so much decisiveness. + tarot is a woman’s art which goes along with women characteristics like listing and the extended version - and (?). A thought I meant to write down earlier was about how Sean and his humor is logical extension to the point where it no longer makes sense. There is some aspect to Sean that is so <em>much </em>that I like, even though it’s not pervasive maybe, but the way I like Jonathan is different - more pervasive maybe, but maybe less much. The way I like Jamie does share some aspects in common with having a crush. I wonder how it would be to sleep with Lindsay now that I know that she’s single and now that I know that I’m apparently single. Really seemed off limits before, now it still does, but the actual barriers are gone. I’m gonna try imagining that I also was eating lunch in my car like Jonathan - not in the same way as him but maybe enjoying the chicken more - nervous about something specific instead of something general. And having like 7 funny jokes to myself that I wonder if I could really laugh at them - if they could really be funny - even though no one is here to hear them or know they are funny and knowing that they are funny because objectively, they are, and not letting that perspective touch any of the truth part of my consciousness - like dew. Sitting on top of rain drops - not making its way to the ground (grass). I think it’s true that what J said is poetic, which is about trying to find the tips of your thoughts if you want to get back into the rule system that you were thinking in, in a previous time…<em>and </em> - the rules can help you remember/remind you of the concept that you are/were thinking of. Why does my chest hurt? i think it’s more of the pre-sadness - going with evan, and he (? that I shouldn’t be able to “finish writing in my diary.”\n I can imagine these scenes and then somehow, I am sitting on the ugly fuzzy blue seat next to him. I don’t have a bag of chicken but he gives me a piece because he has way too much, though it takes him about a quarter to figure out I want it - he gives me a drumstick. He doesn’t seem to notice me there at first, he is still staring out the large front window gazing at the boring scene of the parking lot, as if trying to find something interesting about it - instead finding <em>every </em>boring thing about it. I <em>would </em>be annoyed, but i can see the upsetness in his eyes so I don’t take it personal that he doesn’t know me - and finally - about 2 minutes after I’m supposed to, I muster up the courage to reach over and lay my hand down on his forearm which is touching the bottom of the wheel, and grasping the bag. He tightens up at first, still, eyes not moving - a reflex. Then, a few moments later, he turns <em>slowly </em>to face me to judge whether I am pitying him and when I am not, the muscles around his eyes loosen and he stares at me, having no special thought - just <em>gently </em>seeing if our consciousnesses can combine unsure as to what to do, and then he moves his forehead towards mine and I mimic his action until our foreheads touch, still <em>sort </em>of making eye contact, though we can’t actually <em>see </em>each other anymore. Then it’s time to go to class. I would skip my next period , I suggest it with a light smile on my lips, a slight laugh. And he smiles back, but only dutifully, not looking at me, already putting the car in reverse, hand on the side of the seat, looking over his shoulder. Smirks - something about my having bad grades and takes me back to school, waiting patiently: but only for a few seconds, his foot ready to move off the break - nods at me, smiles <em>without </em>his eyes, and is moving steadily forward seconds after I let the door close gently behind me.\n The next three days he goes to the same supermarket (pavillions) and stares out the window again, half expecting his passenger door to open, turning once when he heard the sound of the wind. There is nothing. It could be pleasant, he muses. But it doesn’t make him smile, even thinking about it as it enters his consciousness, perhaps ever seventh thought though <em>most </em>of them are about the wind blowing - the way the trees are moving, and little particles in the air. Other people don’t understand this, he thinks, without being really happy about it. On the third day (and it is a wednesday), I get into his car again, this time a little bit later - halfway through lunch already, and I am huffing and puffing, though I cut my huffs abruptly as I enter the smooth tranquility of the scene - the heat softly blowing, and watch his slow and still movements, at least in noise and length of time, but there is a jarringness to it - each millisecond syncopated, as if there were not enough frames per second for a dog. he stops eating abruptly, and slides his forearm across the center console, turning in my direction, but without making specific eye contact. I aly my hands over his forearm gain, dutifully, this time both my hands, and I let them be a little heavy, smiling internally at his lack of… - his own obviousness. He stares at me for about four seconds and then smiles for just a second, before kissing me softly on the mouth - 3,4, 5, 6, 7 seconds, opens his eyes to look at me, puts his left hand under my chin to bring me closer. Puts his right arm behind my left shoulder to bring me closer to him. Nothing urgent - soft and smooth - runs his hand through my hair tentatively.\n@@PB@@\n &lt;empty-block"},
{page:328,type:"day",lines:35,date:"Oct 4",text:"/&gt;\n Oct 4th\n something about maddie breaking up with me today that made me really happy. I feel weird being <em>happy </em>about it but - i don’t know - it was kind of magical. All that combined with the warm winter weather - the mist in the air - the suspicion (suspicion) that something might be <em>moving </em>just below level - it was getting their legs - we could feel it. If I’m free from anything - it’s the <em>wonder </em>about whether i’m <em>really </em>attracted to her like that - odd to have guilt on <em>that </em>side of sexual attraction - a feeling that maybe frequent, but never not new (for all of mankind). They were excited about Julie and a romance they had and I was guilty about not feeling jealous. who has such things. sean who is lost in his nature, and trying to be an animal says/would say: “jealousy is <em>always </em>a guilty thing - an unkind, ..thing” but he can’t see that last quarter that I mentioned before - Sean <em>masturbates </em>to my emotional distress. He thought it was sweet and beautiful and kind that i was so desperate for J to stay in my life that I needed to fuck him just to make him stay. The real thing is that I didn’t <em>want </em>to fuck him, but didn’t mind it’s not my favorite thing mostly because he’s bad at it, and I think if he had his druthers - i would do all of the work. I think it’s silly and i think it’s fine, and i don’t mind that he masturbates to that.\n And now - because it’s that time, and because I can - I’m going to <em>think </em>about doing a <em>puzzle </em>by myself…what goes into the green glass envelope - 3 or 5 or more things that get <em>added </em>together (there is something so brutal and artificial about this - the process of addition"},
{page:329,type:"ideas",lines:72,date:"Oct 4",text:"alright i think i have one of the things in the envelope. It’s a “c” colored cog wheel with two round circles that spin in opposite ways. in each “c” painted muslin fabric, which is sewn on roughly to the wire base two circles each, 1 small, 1 large, and the small are connected, but the larges are not - there are window like holes in the fabric, and each has the option of being <em>white </em>or black, or some mixture of both, depending on where the wheels are in relation to each other. There is some optimal state. (and maybe this is a metaphor for the false thing that there is an optimal shape. and maybe there is a mechanism here that i <em>simply </em>can’t see)\n muslin the size of a kapla block, but thinner. And on the wood “something” is written - a black word at the top, and a white word underneath it. but on the bottom, <em>that’s </em>where the fun is maybe a small purple rhinestone thing at the bottom - detritus\n Now another one: this one is on rituals…the small pat pat patters, but this time they are just the paint brushes - <em>trying</em> to say something but they have just <em>1 </em>line so they get mad because no one can get their message. Still they go about pat pat <em>pat</em>ting the thing (my heart, but a black newspaper thing - with words - type - print - sewn, though - stuffed into a cushion - on all sides, and 4 divots in the shape of a diamond - perhaps stuffed really well (pillow/newspaper) Anyway, then the other thing. neat, hemmed linen, wrapped, twice, around a thin rod with two spots of black on it - in tape, or something else…\n and this one’s easy: a nondescript string with a piece of white paper, folded over it at each end, and a generous piece of black electrical tape folded over that - letting a bit show at the string end.\n@@PB@@\n in the middle - a small magnet, concealed by white, and they can be connected back to each other, whenever they need to be - whenever you feel the communication is lacking just reconnect them and you’ll notice you feel better right after, as if that <em>last </em>missing connection were finally found its loop. The last thing is following a design - perhaps a china plate design: sticking beige athletic tape on the plate - two pieces, or three pieces each - each a rectangle, about a tablespoon wide, and a third as high - they are lain out separately on sticker paper. And the idea is to replicate the design as easy as possible.\n And - ooh: a small <em>silver </em>hammer to exact on each of the “nails” (but actually thumbtacks - T kind (silver), also - like the hammer. And the hammers get added - one for each of the nice silver stick umbrellas (about 12 in all, and each one gets to be hammered slightly into a separate [piece of meat] (a rectangle with white paint on fabric - something to separate it from other things, know that it is just white as a perfunctory measure, know that it needn’t really exist even, except as the base - the thing for the T things to be hammered into (I had the urge just now to go and take my driver’s test again tomorrow - not that I need to - I already did it - just to show that I could pass - and there’s no way to do it too]. Another thing I could do: paper (just a short rectangle, with <em>one </em>piece of string in it, too, and each of them. AND - then the papers need to be piled in a pile. And the strings can go along side the piles as they get piled too as the two pieces of paper meet at each place - 1,2,3 - for each pile.\n@@PB@@\n ("},
{page:330,type:"abstract",lines:18,date:"Oct 4",text:"objects teacher - walking with her to cry - not handling it right cause I couldn’t believe it was a thing that could happen.\n I <em>guess </em>the part about the automatic process is that you can see the [symptoms] of the step by step process - (if you were to look closely at the imperfections) - “sounds like:” baby extra plastic arm\n the one where I <em>know </em>Evan’s going to react - interact like a robot - recategorize things for me, as though I did it by accident - this is a common misunderstanding - Sean though I would think he was kidding, I think, about intentionally misinterpreting people - it does sound crazy - IDk. ex. Maddie: ‘you’re not stupid,” ha, I know ex. evan saying the whole situation with Zach and Whitley is childish. (I’d like to count the peas and put them in an appropriate receptacle - then count them again, once they’re in the receptacle."},
{page:331,type:"abstract",lines:77,date:"Oct 5",text:"OCT 5TH\n These are the basic concepts that seem to go together in some way - my frustration about constantly having to help Evan recategorize my thoughts, and frustration at him doing the same thing to me. Rule sets - telling yourself to think (and not to think) certain things - the more whimsical twin being having all the different rule systems at your beck and call. And the twin of recategorizing things (not necessarily whimsical) is seeing what people are thinking - seeing through to the interior of their mind by seeing how people categorize stuff. To be honest; I fear and hope the bad weather as a ways is a metaphor not an example, which leaves me to think of a <em>real </em>example if I want to be doing “!”science”!”\n - - - - - - - - - - - - - - - - -\n (For example: a “book” with a pocket on it - and all the pages are in the pocket - the pages in the book are blank) (sometimes the answer is in that 4th quarter and glossed over when reading out all the (?answers) to yourself\n - - - - - - - - - - - - - - - - -\n oh yeah, and another one that I always forget is: recategorizing things (<em>beneficial </em>exercise)<em> have to ↔ want to </em>if you’re into that kind of thing.\n Evan’s thoughts are broken cause they’re all dedicated to the humanitarian effort - they are all good thoughts, but they are going nowhere - I can’t do it - I refuse to do it - it’s just a waste of energy to be a good girl like him, and he ends up hurting people anyway probably (do I? Richard? idk - i feel bad? I don’t know if I do?)\n@@PB@@\n ex. Evan explaining that analogies aren’t just an extraneous thing we do sometimes, but instead at the core/center of our thought processes - as if I didn’t already know that. Ways to know if people are stupid - mommy’s way - you try to explain something to them - her humanitarian effort - or if she was bad at explaining things (disrespectful - as if I don’t know that) my test: say something stupid and see how they react\n There’s some hurt feeling about people thinking I’m stupid - I can’t actually think of an example of evan doing this but I still have the feeling. A guy passed by with a lion on his shirt and I wasn’t supposed to tell evan about the angel deck and that not-Zach guy but I did and yeah he got that it was a metaphor probably just should’ve lied and said the booklet said his moon card predicted that he was controlling - things I would’ve said - envelope - everyone would have something to put in that envelope - I could sell those to be honest - little <em>specific </em>pattern collector s- that people can <em>use </em>- to end off all my negative thoughts - ooh! they are scary - that’s what I’d put in the envelope. Emergent concept - the 4th quarter - the thing that gets created through - only through the existence of the three - it s implied - people argue on whether it was created or implied - but it’s a signature situation - sometimes one, sometimes the other. And jsyk writing’s getting smaller cause I’n worried that I have too much to say - more then I can write. But this (made for mind)] because paper is infinite. The revelation thing to realize is that it doesn’t mean i shouldn't write smaller - it’s doing its job. If I write enough examples of this down, i can internalize it, and not have to remind myself of it anymore. I guess I could write stuff for Evan and not worry if he thinks I’m not smart because he can read my writing. A Anyway now you can create the 4th quarter on purpose. Situations this would be useful in? I bet if I was passing the starbucks on 26th I could think of one - 4 reasons. Maybe I’ll go there tomorrow - a place that means business\n@@PB@@\n Here’s"},
{page:332,type:"ideas",lines:53,date:"Oct 5",text:"an example of something I could write to evan - ex. what just happened I <em>couldn’t </em>get up till i thought of something to do ⇒ something to think about - the <em>examples </em>of the 4 quarters concept, and when it’s useful.\n (pic)\n (pic) (on the side of the thingamajig machine)\n locked in with string, wire\n chute (pease not not peas and TBF but not TBF) (something sepia and more ‘practical’, perhaps - not gross and sickly - ghostly (is the derivative?) - aesthetic - idk\n\n xi things I would like to know: examples to make the 4 quarters worthwhile, examples of things that could go in the envelope, and then the label would be (like?) a pun\n\n Aright - not exactly <em>prime </em>thoughts but: “one memory I forgot was the elephant tying it’s shoes puzzle I got at the 4-year-old birthday party I made myself by liking it so much. ANYWAY - the center ellipse is that I’m always making lil’ puzzle for people to unpack (true?)<em> ANYWAY what I would put in the envelope is basically - </em>things <em>, and then the </em>label <em>is - a pun </em>or <em>- oh!\n If you think about it in a different way (and the fun weird trick is that it </em>is <em>a label for the thing, and unless you’re prepared/attuned/trained, you won’t realize the deft maneuver - so you’ll forget </em>why <em>that’s a good label, and then (ask jonathan why, when he doesn’t understand - he just moves on)\n ToT: fish → envelope + (pic) (shoes (pic ← string) → just </em>keep <em>abstracting\n@@PB@@\n Oh yes, I had this </em>stupid pointless <em>thought - almost as stupid and pointless as implanting false memories of my knowing J when we were younger to feel less alone (”aw - you had a friend”) lol - that would connect BADLY -like the magnet string (And! an example of something stupid: a plug that plugs into itself (a closed circuit - it is interesting because it’s a metaphor </em>and, <em>you have to Do a Trick to think about it. And here’s the trick: 1. the plug plugs in to something (and what do I know about plugs? They use electricity to </em>make things work. <em>Ok so they’re </em>going <em>to make something work. (spoiler: they’re going to make </em>something <em>work) (I guess:) and then, once it plugs back into itself, you ask yourself (because of the assumption): “</em>What is it making work”)…and then you imagine something imaginary that it is making work - you’re brain goes like (pic) this - a fist closing, trying to grasp something. And this is a nice trick, because it can (will) make your brain work in a certain way, and same way with some/all of the rituals I invented a page back (ish).\n (pic)"},
{page:333,type:"abstract",lines:130,date:"Oct 5",text:"AND NOW: The stupid essay i can write for evan\n My grandma had a white box with many tiny compartments hung on her front door, occupied by miniatures. Tiny presents, a tiny wheelbarrow etc. I used to like simply staring at it - for minutes on end - trying to comprehend the myriad assortment, and each one individually. However - not all miniatures are created equal. The plastic army figures my brother played with for example,\n@@PB@@\n lost my attention fairly quickly. For, to imagine a small army man in its life-sized version was to imagine a grotesque made-out-of-flesh platform. How hard could it be to walk, much less dance, with this now life size, mostly nondescript, flat plastic thing - the stand. Gross too, in that there were no differentiating aspects between the green of the figure and the green of this little nondescript piece of plastic. The implication - that it was made of flesh? No, I preferred “realistic” miniatures - those that did <em>not </em>have any extraneous features supporting their life as a miniature. And the easier it was to imagine the thing life size - that is - that it looked, operated, and [smelled like] it’s life-size counterpart, the more I could slip into that mysterious and delicious state of mind which I now avoid for its sheen of insanity. For example: a telephone that could be put into its cradle. And if the cradle lock actually clicked into place? And if the telephone cord were springy, and not just a vague interpretation - relying on optical illusions - an awareness of how the eye processes 3D objects, and no commitment to dutifully recreating the ins and outs of the object\n Part II: Abstraction\n On a soon-to-be-related note there is something that I am starting to understand about thinking which is that: as you get bigger and bigger - as you [put things in cubbies and drawers] - the things that themselves have to change. This has been hard for me to understand, because: when you put things in cubbies and drawers in <em>real life</em> - they <em>stay the same size. </em>You can imagine them sitting there - the cup, or the plate, or the bowl - some sort of white, round object - the size of a shoe. Perhaps you go in to another room. Your husband asks you: “what were you just doing?” and you respond: “oh, I put some things away.” you <em>don’t </em>say:\n@@PB@@\n I put some dishes away, and you certainly don’t say: “i put 3 bowls and 2 plates away. They were the china plates that your mom got you for christmas about 7 years back - remember? They were white with <em>little </em>blue flowers all around the edge but none in the middle. Here, let me show you a picture…\n And how do the 3 bowls and 2 plates look in your mind now? now they don’t necessarily look anything like dishware. IF you <em>had </em>to recall them - they would be some osmosis of a white gloop, and perhaps a sense of their general size - an <em>abstracted </em>version of the very real plates that were once in your hands - that you held, touched and felt - and had someone asked you to describe, you would’ve been able to say many more things about their shape, and color - the pattern, and how big they were. It is as though, as you were walking from the kitchen, into the living room - these things morphed from specific dishware to general shapes, and ended at the very vague “things.” In this example, the process of abstraction has taken a spatial and temporal form, to emphasize the potential for transformation. However, we need not walk from the kitchen into the living room to take something <em>clear </em>and very specific, and turn it into a mishmash of form and shape. You see, our minds are <em>tools </em>not maps or descriptions of the world of any kind; therefore - we keep what information is useful to us and discard that which is extra.\n And so: we can watch things “get smaller” (have less information, take up less space in our brain) if we are aware of this process as it is happening.\n@@PB@@\n Abstraction is important if we are using information…if: if we are imagining something with multiple scenes - everytime we move to another room or look at another screen or…idk), our brain <em>automatically(?)/manually </em>makes [that which we are still looking at] “smaller” and when we pull it back out, we have to “unfold it” - to see it clearly - look at it in more detail (unconsciously) were we for some reason to pull it out <em>without </em>unfolding it - attempt the unnatural process of <em>describing </em>something that has been changed… what would we find? Something strange - that follows the rules of the mind, and not the physical world. Pull into the cruel, harsh light of day, something that was never meant to be seen - that was meant for a dark cupboard in a damp basement or a drawer of tangled string, spare keys, broken collected shells - forgotten things. Let us imagine it anyway\n@@PB@@\n note: here is an example: if i am doing the constellation exercise, and i need to abstract the memories, or concepts or whatever. And yes: they are smaller. And yes, it is ok if the food in the fridge is painted carelessly and some of the yellow of the lemon leaks onto the shelf underneath it, and if they are stuck to the shelves and it is nearly impossible to imagine picking them up because some of the yellow of the lemon has leaked onto the shelf underneath it. Because this is a <em>tool </em>for me to <em>imagine </em>something - these things are miniature versions of that which was once and could be bigger, and for this reason, I can accept that these things are what <em>would </em>exist in the mind if we could look closer at it.\n Here is a terrible example, because: rather than referencing something that already exists - that you <em>know </em>about - I instead plan to reference something that I plan to invent.\n It is a memory constellation\n@@PB@@\n (note: what my EGPS) has in common with that ^ ex. I might make the decision not to tell someone something based on mu current information, or how I’m feeling currently, or something that happened recently, what it has-in-common is - idk - do this later - I think you can figure this out - I trust that you can. And if you can’t, then Maddie or Evan can.\n\n (answer: the decision is <em>context </em>dependent, and so is the “level” of abstraction (…?))\n@@PB@@\n&lt;/synced_bl"},
{page:334,type:"abstract",lines:57,date:"Oct 5",text:"ock&gt;\nOCT 5th\nAlright lovely lady - today is a new journal day and I am the first one to use it. because my name starts with Specia , or Hunter :) Didn’t want to go to sleep, and don’t want to finish sleeping - people that complain their kids wake up too early - did you consider not putting them to bed at 7? Just a thought. That 6/6/8/8 really fucked up my butthole. “What rules was I following in the hotel room with mommy and daddy? “An example of an answer I would accept: the transition between doing “what ever i want,” and “<em>doing whatever i want” </em>to ask mick…(missing) I’m honestly kind of interested in short term memory - perhaps the most mechanical of my ideas. And designing autopros I find fun - like going back through my notebooks <em>without </em>a “printer,” and rewriting ideas that cohere together - putting them in the same space, so I can think about them further - so they can marinate together - sort of like picking out all the items for my (herbs in box) kit and putting them all in the same box - <em>not b</em>ecause it’s the most efficient way to get them packed, but because it creates an in between step, during which I can [come to the rug] with the fact that they’re all together - it’s not jarring. If I did it all at once, there’d be an extra, invisible cognitive load - a little adrenaline that I wouldn’t notice at 5:49 pm. Sort of like all of myself to take longer to make decisions (cause I need to practice) if I’m not gonna use clicky thing or whatever system I decide on today. the idea I had on the 3C off ramp - do i need to get all my brain processes together - wait for them to all agree with each other - and that’s why it takes so long ?) - the idea I had on that lovely loopy middle ramp - recategorize “me not learning to drive” as a responsibility to my fellow humans <em>because </em>(?) cow: the relationship between the car accident, that palm frond hitting my roof (causing destruction) and maddie’s party, j texting me and the shot i took in the car and me not getting enough sleep and that frog guy donnie texting me and mommy really wanting to go on a walk) of having to calibrate all my systems ⇒ potentially slower reaction time. And I don’t trust myself, I can’t.\nTherapy: what rules are you/have you been following unconsciously (?) Can you decide whether you want to keep following them? Also: temporary rule systems: little games we play at one point (pin the tail ex) a, and taking rule sets on and off (catalyst: metaphor? goal?) mind meld - when you’r e with friends, adopting <em>their </em>rule sets that they are following (accidental output: a conglomerate of both systems with some rules from each (but not all - only the one’s you’re/they’re aware of)"},

{page:336,type:"day",lines:166,date:"Oct 7",text:"OCT 7TH\nAlright, well, I finished phase 1 of my figuring out what’s actually in these journals so I can give myself feedback, regroup, maybe figure out which are the most interesting ideas so I can “plan what to work on next,” and maybe even extract some finished work. In the next phase - I think I need to group things and the first step of that is establishing what categories there are. Obviously there are the essays - the really interesting thoughts when I was (?) deep in being alone, and started planning some cognitive mapping stuff - when I started to get really good at memory recall.\nAlso there’s a lot of diagrams and I think i should be aware that <em>some </em>of them are plans for projects often sewing projects - with wood and stuff - or blocks etc. Others idk…it feels daunting to try and photograph each page with diagrams → , then maybe add them to illustrator, ?paste? them into notion. Practical question - how to translate the arrows. I looked up the best program to do this and got distracted on facebook. Considered that my heart/mind is blocked cause I have <em>stuff </em>that got trapped - Sean made me feel bad about the MH - he’s not very empathetic sometimes. Also - it was <em>awkward </em>having sex with him - I didn’t really wanna kiss him, but he <em>did </em>look like a cute brown x black bear with his new haircut. He is really cute. It was just weird to be with J yesterday and him today. He “made me cum really quickly while he was eating me out” and I think part of it was a sort of powerful narrative involving the two boys in such close proximity - haven’t even taken a shower so it’s possible they got some of each other’s spit. Went to Sugar Fish with Sean and then Coral Tree and got carrot cake, and then whole foods and was proud of myself for doing my shopping for the week. Finally bought things like nut butter - he came to drink tea then tried to make me watch gilmore girl highlights. I asked his thoughts when he was 5 cause J told me some of his last night. Sean said he chased his nemesis saying, “I’m going to kill you” through his teeth so yeah he’s always been aggressive and I guess J’s always been evil. When he was telling me what I will learn in therapy it was interesting because it was basically what <em>he </em>learns in therapy. Apparently he has an issue where he avoids thinking certain thoughts and I wonder what they are. I don’t have that problem It <em>feels </em>like a problem I could have but I don’t think I have that specific problem - others for sure - we’re both fucked up but not in the same way. I don’t know if he understands this. Does he have evil thoughts? This afternoon when I was walking from Coral to Whole Foods, I figured out if I had evil thoughts I would just tell myself: oh, probably don’t think that, but it’s just cause we evolved. But then no I’m thinking maybe there are thoughts that are so evil that I wouldn’t be able to stand them, or they would scare me. Does he mean like pedophile thoughts? Maybe everyone has these thoughts? But, I <em>guess </em>if I let them develop - or had them at a young age, before I started controlling (?) my thoughts so much - they’d have time to develop and start at the worst part. When I told him about Jobe, and deciding to believe in god, he said maybe I don’t need to go to therapy for the first time. That was kind of nice actually. I don’t really think I need therapy. I feel like I should go over my conversation with Sean in as much detail but why (?) - we went to Sugarfish. We got a bit drunk - shared a $4 sake and I couldn’t finish my portion. I feel like we have the emotional closeness that Ms. Zhu was referring to, and I think I have that with some other people - all my exes - ex. Richard…idk I”m as close to Evan as I feel I need to be - same with Maddie. Could be closer to Zach lol but that’s <em>his </em>problem <em>for sure. </em>I’m closer with M &amp; D - at least M, and sometimes D too. I think - J said I don’t know him that well and he thinks he knows me but he projects a <em>lot </em>of things onto me. We don’t have <em>everything </em>in common - more than most, but…I think I know how well I know him. Anyway, he was crying and telling me he wants what I have with my business and friends which idk was surprising to me for some reason. It implies that he respects me and I feel he does not. Still glad that Maddie broke up with me and even that she did it and I didn’t have to. I thought about it every time I saw her or was about to see her, and it made me so anxious, to think about fucking her - I would dread it. A bit of anxiety gone and I did not expect to feel this way - certainly not after Greg - I guess we were already sort of checked out a bit before this - didn’t see each other for a while. Curious but not <em>that </em>curious what she said about me in her diary! Probably - huh. I’m a lil confused. She’s just emotionally intelligent and knew hot to break it off - even had me convinced it was totally her - honestly - she <em>might </em>have wondered why I never texted her first…though I guess: lying - whether directly or through my actions or micro-gestures winds me up - takes me away from myself and then I need to “journal” to say what really happened. Other therapy technique(s) include: thinking of a metaphor-comparison, but a sort of “all around one,” whatever that means to me - try to get at that little niggly thing at the heart of whatever you’re feeling - you can’t say it out loud, you can only curate a comparison - something that thing has in common - only something - very specific. And then - just imagine what’s in the center ellipse, and you’ll feel understood and feel better - the way art works - a tool like the crow in the video - brute force technique just try to get in the bottle, but with this tool - the <em>tool </em>does all the work, and you have you just to sit back and relax. Theory 2: my heart is hard and feels heavy? yeah, well I usually spend the first part of my day going on a long walk in fresh air. Not essential and more time for art n stuff if I got to bed later but maybe that is the answer. Anyway - I feel pretty happy generally and even sometimes choose less happiness to accomplish more.\n@@PB@@\nAlright well - I should <em>probably </em>go to bed, even though I don’t <em>want </em>to - I want to finish the diagram stuff. But I “have work in the morning” and I’ll probably be better at the diagram stuff and be able to think more clearly once I’ve had some sleep - I don’t want to get overwhelmed, and I <em>do </em>want to design a system that is practical.\ngoodnight baby boo - I love you so.\nmorning\nSlept till 1 pm - when I sleep with ear plugs - I stay asleep and usually feel really good when I wake up. And I don’t have that long period where I can’t fall back to sleep. I’m kind of excited for the day and it would be nice to go on an adventure - go to malibu - go past it - to what feels like Carpenteria - maybe stay in a hotel - by myself - start making decisions like buying reeses from a gas station - let my sniffy senses take over. My toilet paper fell in the toilet. Instead of fishing it out - I just left. I could pretend I’m hanging out with Maddie later (I’m not - thank god lol) and try to get <em>all </em>my work done before then - race off to the reel inn - by myself mind you…I could go on a hike. I sort of have some work I need to get done - take pics of all my diagrams. I can picture myself on my adventure, thinking about getting that done - that’s a little motivating. the fat that I’m accepting these ants - ooh, that’s a nuisance, but I don’t do anything about it - just get annoyed over and over - I feel like my mind puts up with a lot of obstacles - I’ll just step <em>around </em>this thought - like the thoughts I have when I’m in my garage working - sometimes I don’t want to put a certain sticker - I want to get all the things from the cabinet, and put the stickers on all at once."},
{page:337,type:"ideas",lines:22,date:"Oct 8",text:"Back to that would’ve been store in St. Louis, and trying once and for all to solve the: sugar cubes, pennies, baby heads problem. I identified the source of the confusion: it looks like: (set - pic) but it’s actually: (pyramid - pic)\nActually let’s acknowledge what they all <em>do </em>have in common. sugar cubes and pennies are: “a source of dopamine,” and, though I have never experienced it, I hear that smelling a baby’s head is a very alluring odor, not to mention the experiment of passing on your genes. The difference, is that: while they’re all the same size, the baby head is representing something else <em>and </em>it’s made out of a different material. Ok so: I didn’t solve the problem. But if you’re ok with the discomfort of taking two steps to connect three things that appear “(can’t read this)”, and yet are actually on different levels, then they can all go in\n@@PB@@\nthe candy bin, and the sugar cubes can be wrapped like presents (real sugar cubes?) in white shitty gum(?) paper (why? idk) - and the pennies can be shrink wrapped, I guess. (pic)"},
{page:338,type:"ideas",lines:13,date:"Oct 8",text:"AND: PART TWO: The peas, the screws, the buttons, (and) the shells: they all are annoying, and tend to get lost - the peas - on the plate + tuna casserole (requires a <em>whole </em>explanation) - screws are <em>always </em>getting lost, slipping out of your fingers (not mine), shells - yes you can “collect them,” but they also get in between your toes and distract from the (?) on the beach. Buttons, are always getting lost. And all these problems are caused by their size - they’re <em>too </em>tiny - a metaphor - acts out my “sheen of insanity” essay (heart-shaped locket with black and white pictures in it that samantha had)\n@@PB@@\nThere <em>is </em>"},
{page:339,type:"ideas",lines:52,date:"Oct 8",text:"something to be said for the sugar cubes being made out of wood…the pennies could be painted and stamped (that would be a nice stamp - easily carve it out - just need to research what a penny looks like. maybe best is to <em>stain </em>the wood copper - <em>Also: </em>could add stuffed Sardine to the crew (why? idk)\nOTHER IDEA: crystal scoop of Hoonies (one size up: (bigger) baby head, small cushion, spires castle turret (pic) (like this instead? + carousel - simplifying - how(?) def (maybe: plastic) def: colors: yellow, bright…idk - castle could be clay, carousel could be wood (<em>then </em>people would want to buy it (And they could <em>all </em>have baby heads (why?) idk, but there’s 3 sizes (this seems like the solution) Oh, yes - also: match heads - because they break off and it is very annoying. - the piece is about having an <em>opinion </em>on size (no ;)) - tic tacs - get all sticky…(?)…googly eyes…(they are annoying (and you find them everywhere - the opposite of being lost)(?)…but also: just nice things…(?) the little metal cubes…idk\n@@PB@@\nOctober 9th\n(cont from 7343 - 7377)\nex. the lentil rounds are an abstracted version of an ambiguous event because they don’t work\n— — —\nthe way string cheese breaks - <em>indistinct</em> - taking out a (tic tac) from the pouch, and putting it right back in (the box) …?simplified? version of the Metaphor Machine: Matchbox instead of the conveyor belt (a wooden ‘lighthouse’ on top -\n— — — — — —\nfill in your (mental blindspots) with globs of shopping cart clay - all gross - putty - things that don’t make sense - paradoxes - oh that’s weird: that doesn’t make sense ex.\nthe thing described on the other page : (pic)\nas <em>if </em>there were a spinner\n<em>another example of someone messing up an idea because they don’t understand it\n\n(missing: the rest of the notebook)\n\n…somehow I’m already starting a new notebook…idk if I deserve to…I feel like it’s been so </em>short <em>since my last one. And I’m spending </em>all day everyday writing in my journal. What I was thinking about in the car - the instrumental belief - while driving on the PCH - fluctuating/oscillating furiously\nwhether I had the idea (pic) things I don’t find interesting, but you might…\n\nBINGO: ritual - things that I do that are for my mind, not the world. that weird (pic) that painting we looked at, where the design elements - like the one in my room - are competing with…the boy + girl by the flowers. why was jnathan describing all the paintings to me as if I could not see them…\noct 9th"},
{page:340,type:"abstract",lines:94,date:"Oct 9",text:"OCT 9TH\n ex. the lentil rounds are an abstracted version of an ambiguous event because they don’t work\n - - - - - - - - - -\n the way string cheese breaks - <em>indistinct</em> - taking out a tic tac from the pouch, and putting it right back in (the box)\n …?simplified? version of the Metaphor Machine: matchbox instead of the conveyor belt (a wooden lighthouse on top -\n - - - - - - - - - -\n fill in your (mental blindspots) with globs of shopping cart clay - all gross - putty - things that don’t make sense - paradoxes - oh that’s weird - that doesn’t make sense\n ex. the thing described on the other page\n as <em>if </em>there were a spinner…(another example of someone messing up an idea because they don’t understand it)\n@@PB@@\n took a nap. Anyway - the idea I had this morning or last night - I actually can’t remember - rather than using\n@@PB@@\n 1. Automatic Process - begets things like\n - pea rounds - etc. letters\n And though a human can do it, <em>or </em>a machine, the mindset for [making the thing] is “automatic” - eg. there is a step by step procedure, and some of the things can go wrong, but the procedure just needs to be followed, and it spits out same-like objects that are all made by the same process, even if they have defects, or <em>one </em>defect! the same process, that gets repeated because the same procedure just keeps getting followed, even if it is flawed. (This is like a game of telephone, where after it gets messed up, there is no going backwards, only forwards, because the process has no ability to fix itself (or even <em>see </em>the output)\n It’s also like abstraction just in the sense that the thing gets copied, mistakes are reinforced, there can be multiples, and they are made by doing a scientific process (the process of abstraction) over and over again.\n Note: assemblation\n ok: 2: the second idea is about the complementary <em>intentional </em>or “artificial” process\n\n and <em>this </em>idea is related to the string cheese thing, which is a metaphor for it not being evenly broken off\n → ex. in and out of the bag (pattern collector), also: I related to: the elephant puzzle - so: setting something up (for people to solve later) - setting something up for yourself - set up a pattern to be collected - don’t put it away properly, so it comes back up in your thoughts - make a mistake on purpose, which is an example of something that could fill one of the missing blindspots in your mind - intentional accident, - find a way to (make someone) experience it: or think of a metaphor for the way that it feels - metaphor priming\n\n the abstraction idea (just - reoccurring ideas) - things can’t be read once you’ve moved up one level of abstraction, and also, just that you can keep abstracting things further (ex. i know i need to look something up in a second, but i’m letting it disappear from memory with just a <em>small </em>drawer pull/string to pull it out (and this of course relates to all the drawer pull ideas - the how to tutorial, and examples of drawer pulls that you could do, and memories you could think of (have chatgpt think of core memories <em>for </em>me? (that’s a crazy idea, but makes sense, cause it dismisses assumptions, which is also what the 4th quarter idea is about - you wouldn’t think of the 4th quarter, but you do because the other ones exist, which reminds me of the other structures - how the set theory turns, (now) into the triangle/pyramid, (and is also another example of “the invisible magic trick” thing, where you’re making a small leap with your mind (tiktok), but it’s not called attention to (presumed: normally all mental movements are at least acknowledged (using the fourth quarter idea, if I added an “opposite” space for this, I could think of: times when the mind is only doing <em>one </em>thing, but there is a big hullabaloo (honestly, all of schooling) (i told mommy that i didn’t know why i considered myself smart at bubbe’s house cause yeah, idk if my grades were that good, but somehow i still considered myself to be smarter than all or a lot of the other kids)(i couldn’t talk to them - they did not feel like peers. i belonged elsewhere - not with them…)\n\n people being robots:\n\n <em>one </em>of these ideas is related to: instrumentalism (for example): getting a one off “storage solution,” such as a wooden thing w very specific compartments, designing things to go in (only make one), and then after - find the same thing on alibaba, and order a bunch (as opposed to intending to\n\n&lt;empty-blo"},
{page:341,type:"dreams",lines:10,date:"Oct 9",text:"took a nap.\ndream\n dreamt that maddie and i were standing up in a dark room on a rug, watching tv together, and i was filming it with my phone camera and I now could see that the clicking thing was <em>extremely </em>obvious and Maddie left her place to come look at me more closely. She squinted one eye. I was watching the video back, and in it, I put a hand on her shoulder in case she was trying to kiss me, she moved it gently and kept squinting, trying to figure out what was wrong."},
{page:342,type:"abstract",lines:33,date:"Oct 9",text:"Anyway - the idea I had this morning or last night - I actually can’t remember - rather than using multiple concepts to refer to a single idea - connect <em>all </em>the ideas (indiscriminately) And, before my nap, I thought about the automatic process, the aspect of the AP, in terms of, having a <em>bunch </em>of things at once - the assembly line mindset, which beget the parallel - to abstraction, re-envisioning of the object in ways dedicated to stream - liking the process. I imagined, tape, made out of clay - rolls, that could be stacked. And the (interesting) part was - yes, you could stack them straight up and down - or you could try to do it off to the side, and see how far you could go out. And it could be unfinished clay, or glazed, anyway, with / “one strap hanging off (pic) like the beautiful toilet paper in the “ill always love you” book or whatever - i liked the (”matter-of fact”) way they drew the bathrooms in that book\nBest memories to hang on my sleep walls? Oh, maybe it’s already the ones I imagined - the (pic) card, and the bunny drawing contest etc. (b/c euphoria - connect back to “that’s who I am” - exactly who I am. Also - met with a bunch of rare memories while trying to sleep - I think cause it was <em>so </em>dark. The <em>best </em>one I came up with was that night I spent on the golf course - calmly still, peace - but also; cold, unhappy, lonely\n(pic) - lol - can grab a memory - a special device, and replace it somewhere else. (device made of wire?…(tic tacs…) I guess, in the pokemon pack scheme of things - these memories could be a hologram."},

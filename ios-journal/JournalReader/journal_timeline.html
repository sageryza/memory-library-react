{page:277,type:"abstract",lines:19,date:"Sep 24",text:"I figured out how to do abstract paintings\n - start with a real picture, and then let it go\n - I’m not even sure whether the stuff I’m adding as an extended impression, or just responding to what’s there\n\n Thinking about doing <em>yet another </em>painting based on that picture I took of Sean at lunch today (pic) ← that’s the arrangement\n → going back and forth between thinking my newer abstract paintings are amazing, and it’s cool that I <em>learned, </em>taught myself in so little time, and sandiart put it in perspective, and Freeman - others can do stuff too. I guess it was the lack of likes on instagram. My phone is stressing me out - SOML and probably everyones.\n\n These days I’m very much prone to inaction. Hypothesis - is it better to think someone’s gonna <em>see </em>what I’m making, or that it is I will be a secret? The latter is lonely. The former is titillating - esp. if the person doesn’t <em>wanna </em>see it.\n Anyway -"},
{page:278,type:"ideas",lines:22,date:"Sep 24",text:"a drawer full of potatoes - oblong wooden shapes, painted partly pink - like a pig - same as Max color - in some kind of drawer, or maybe a metal thing like a shopping cart with much more shallow/different aspect ratio, and no wheels.\n I could go to bed, but then i could think I am trying to sleep, when I <em>know </em>that’s not possible - I could go to bed with the <em>intention </em>of writing more things down - I think - that’s why I went to bed in the first place. The lateness is tricking me. I laid down not to go to sleep. Counter example: my journal - but that feels like therapy? (And I do not necessarily plan on anyone seeing it. i don’t really have a plan for it, so maybe that’s the solution.\n Little clay sticks (pic) roll them out - let the ends round, so no cut it (bottom left corner) right bottom: a purple thing, and a square: with 2 different shades of purple with faux windows, not like a purse, but the dimensions of one (it doesn’t open)\n\n (pic) ← 3 of the fish things, hung up - velcroed on with a metal bar locking them in place.\n (more pics)"},
{page:279,type:"abstract",lines:67,date:"Sep 25",text:"25th (SEP)\n\n pic: THINGS I WANT TO MISS\n (pic)\n LIST OF TIHNGS: SOAP, pink (this time it’s pink)\n LIST OF THINGS TO WISH FOR\n (The logical extension: i’m in an art period and my taxes are due - I have a history report and I want to finish this painting) Everything I do, everything I say, everything I think is for you. What <em>can </em>I do - to break this curse, this spell, <em>please </em>tell me. I’m too horny to eat, too hungry to masturbate - I have things to dread - all the social interactions that people invited me to today (these are good things to dread) - I WANT THEM - I WANT to dread them). One small respite - writing it down - this place that isn’t too sacred, for this - once. Somehow, impossibly, I’m <em>still </em>not tired of thinking about this. How could there be more possible ways to explain that you do not love me, and yet I haven’t seen the end of it - not, not even close. I am a sailor, and that is a buoy - the day when things will end - when I connected enough dots to know my heart doesn’t want what it can’t have - and yet - there is a garden that grows. And tender leaves that grow raise up and send me <em>shrieking - </em>looking at the moon and wondering - what is life - what is it? What it can be - can it be like this? (why does it feel like I can <em>think </em>myself out of this one - like all the other ones - the messes - little messes - I’ve created for my mind. Surely, no, this is not real…this shining, shimmering thing - hope - that you could want me - that I could take every trowel and dig it - a grave big enough for us both - and that you wouldn’t weep when the dead skin of leaves wandered their way over our bodies, leaving us whole. Intact, holding hands - like the sun, shining down, burying our two faces as we craved into dust settled, let passersby stand amidst our rooftop, somewhere, somewhere else, someone was wondering at the ice of a refrigerator, at the cube of ice trays that could stay cold even when you took them to their bath. There was a wedding. you placed tulips, I pulled. Begonias from the ground, because I thought that was a faster way of doing it. You laughed at me, I screamed (I was laughing too). I wore pink. You also wore pink. No one told us we couldn’t (both) wear (pink) it, and so we did. You were laughing when you saw your relatives coming down the aisle. I had taught you to laugh. At stuff. Like that. I cried, and we both cried, that night when we fell asleep. And I had pretty jewels. Of blue, and possibly silver, that caressed my neck, that hooked me as I was falling asleep. I planned on seeing Jupiter that night. When our wedding was done…and it was shining - brilliant - maybe - but there. I could caress your neck if I wanted to. If you got a scraped knee I could sing to it. At night, we could do the dishes in the kitchen. Count the pennies in a growing jar - red, copper, yellow - we’ll write down all their hues in a little journal (pic (the pennies we’ve got blue, red)\n@@PB@@\n (ok that’s enough - this is too gay) (see notebook if you want to read more…(it’s good, it’s really quite beautiful, but i can’t type it out now, not at joe and juice, not w sean coming…)\n@@PB@@\n I’m"},
{page:280,type:"day",lines:37,date:"Sep 25",text:"getting scurvy on my little teeth - they’re - now they’re curving.\n The scurvy isn’t due to not enough juice - instead, it’s cause I didn’t save enough breath. There are little holes in. all of my teeth - “be real” - me says. to me - when I stand in front - in the mirror. “Please be real - but these holes are real, in fact they’re causing there to be - extra space. between each teeth.\n “orange juice, I guess is in the kitchen” so I could stand up and get it but if it could stand slow and clean and lonely like the refrigerator itself, put up on the highest shelf, then you would know that there was no juice in that fridge.\n Instead of turning gray, or even. cream colored, they’re starting to be crooked - each one has tiny <em>hooks </em>that get under and into and underneath anything - they say (to each other): “why can’t you come clean. just be <em>real </em>about this.” Each tooth is lying ‘There <em>isn’t </em>much sense. <em>In </em>trying. to trip me. up” I say, to my teeth, but they are lying still. And still, the teeth are bending, slowly, smiling at each other. At my expense. “Enough!” I say, and I am angry. But I can barely close my mouth because there is so much mirth going on in there, not <em>despite </em>me, but <em>because </em>of me. “I’ve found it!” I say one day, I have the missing piece. You can all stop being angry with me. Everyone sits very still, but they know I am lying - I still haven’t found the missing piece…the piece I need is <em>red </em>with a little bit of purple on each corner. “I am lying” I say…They know. They think for a bit. “Stop lying” they say, and settle down and take their nightly nap. I make something ? - take it from the fridge to the microwave. Eat it in front of the TV. When it comes to fixing dinner, I am quick.\n@@PB@@\n “"},
{page:281,type:"abstract",lines:103,date:"Sep 25",text:"Oh what’s that on the ground? what’s that you’ve found? “He shrieks. He arranged it - this whole thing he let me use his metal detector. It’s a ring and there are diamonds on each of the sides you can see a diamond on <em>any </em>of the sides it faces” he says, explaining the magic trick. There are little wet tears in my eyes, I brush them away real quick, to keep him from seeing. he likes to be the only one that cries. He takes the metal detector hurriedly, when he realizes how big it is for me to be holding. He gets down on one knee, but just to examine the ratio of silt to sand - he reckons she’s on the of them - his one knee bent - dirt that is sand - on his knee (sheer recklessness if you ask me). Oh! Not this! - I forgot, he says - still on one knee sort of. “Marriage?” he says, grabbing the ring from me, and it sits in the very middle of his palm, framing his life line. I glance down, and pretend not to notice this. It doesn’t mean anything. I stutter. Before I can think of the right answer, I’ve already accidentally accepted. I forgot what I wanted to say, and the words were too quiet - he was going to get angry if I didn’t answer quick.\n The day before the wedding: we go on a field trip “It’s time to <em>learn </em>some stuff” he announces, the day before the wedding as he packs my lunch into a soft red lunch box - on our way out the door, he pulls my hand (I was not walking quick enough) “I used your money to pay for this bus” he says. I look to make sure there’s no mean glint in his eye and pull myself up the tall steps. We sit in the middle towards the back. We sit with our arms leaning forward, the sticky dark green of the seat I glance at him a few times, and he is staring straight ahead, a pleasant smile on his face. The bus takes us to six different museums. In each, he charges ahead, turning back to make wide eye contact, though I know he’s not looking at me - just through me, thinking about what he’s saying. He tells me facts that aren’t on the large placards in front of everything. I like the way they preserved the skeletons and wait patiently for my turn to ask him how it’s done. “They’re not <em>made</em>, they’re <em>preserved,” </em>he says impatiently, and continues on with his facts about dinosaurs. Finally he skips into the gift shop and about seven things from seven different shelves but there is too long a line, so he puts them all back one by one.\n The planetarium is next. It’s hard to remember not to be scared of so many facts in the dark. We lay down and he clasps my hand for a second and his eyes are shut, so I shut mine. The voice over the loudspeaker is drony and drowns out his own voice, so he settles for calling the script stupid, because it didn’t know which planets should’ve been named differently, and I smile at him. And he smiles at me. “Which one of us should be the flower girl?” he says. “I think we should <em>both </em>be the flower girl.” “No, we can’t <em>both </em>be the flower girl,” He shakes his head, rolls his eyes, turns away from me onto his side. Then he’s back. “you can be the ring boy. I’ll be the flower girl.” he says. i think of the ring I will get: A perfect circle. Gold or silver. I smile. I look up at the stars. I try to find the big dipper.\n After the Planetarium, the bus driver takes us to a wide open field with a few solid picnic tables by the side of the road. The lunch he packed is a peanut butter sandwich, an apple juice, a bag of lays, and a fruit roll up. I take a piece of the fruit roll up first, just to get started on something nice that I like. After the long bus ride, it feels nice to get up and stretch our legs. I walk around in little, and medium, and little, and large circles, my wandering eyes notice that he is sitting very still, looking at seemingly nothing. Abruptly, he gets up and looks at some moss growing on a stump. “This is the kind of moss that […]” I drown his voice out by singing a little song in my head. The song isn’t really a song - it’s just the color beige, taking up space.\n@@PB@@\n in individual boxes:\n lying is fun\n what, you don’t know that\n why, you should try it sometime!\n (Here’s why!) with telling the truth, there’s only one thing you can say\n with lying: there’s tons!\n when I’m by myself there’s no <em>telling </em>what disorders might develop\n I’m always trying different kinds of pills. These I found on the ground.\n I was looking for a black bear that I had lost but it turns out you can’t have black bears as pets\n Sometimes I use the telephone as a noose and see how hard you can squeeze your neck before juice comes out\n Do you know that I don’t lock my doors because I want to know how many neighbors I have? I have a lock that keeps out ghosts though.\n I have a clock in my head that counts everything <em>very fast! </em>\n@@PB@@\n When it’s time for <em>supper</em>, I sometimes tell people I haven’t eaten anything all day, so they think I’m hungrier.\n@@PB@@\n “envelope” ("},
{page:282,type:"ideas",lines:5,date:"Sep 25",text:"muslin + snap\n@@PB@@\n (Legs)\n ← clay\n ← black velvet white cotton inside\n (this could be the 3rd and last element)\n ok, I could make\n (coin envelope out of muslin…to put all my memories inside…) would Mason like to play this game - of SET (?)"},
{page:283,type:"day",lines:36,date:"Sep 25",text:"September 25th\n 25\n 9\n 24\n ___\n +\n Ok I could start writing the date weird just to be quirky. I think I might start signing my name: quirky, instead of my actual name. No one asked but I think I have the solution to journaling. Pick a few categories of things you want to remember. Mine are: ironies, paradoxes, things that I think are funny people being stupid etc.) and write them down. People don’t like me because I don’t like people too much - I had a lot to write this morning and I used my computer. I wrote down my dream about Rebecca having a large square pool at her house. It was nice. A bit moody for a pool since it was inside. A bit low and mellow. But it would be good to have a pool like that that you wouldn’t have to get too excited about. (())⇒ never being able to figure out exactly <em>what </em>I like writing with a pen + Catalina thinking about needing to poo before sex.\n I looked up “how to type with long nails” and found very complicated advice on Reddit. I got up cause I finally figured out what to eat for breakfast (yogurt, almond butter, granola (oh yeah, I have more) even apples - so it can <em>really seem </em>like cereal - have fruit. Then when I got to the fridge - like the three bears every yogurt had something wrong with it (pic)\n@@PB@@\n (pic)\n So now I have a headache from not eating. I need to go take a shower, and weigh myself before that - I have a two step plan that <em>does </em>feel like dancing - I don’t like looking at any of my paintings, except for maybe 2 of them…solution - I’ll put the ones I don’t like somewhere else, so I don’t have to look at them. I can use the giant square cardboard they came in that I threw out cause I didn’t need it for anything last night.\n WATERS ON\n …"},
{page:284,type:"abstract",lines:87,date:"Sep 25",text:"none of these brain tricks me and Jamie were talking about…things I have to constantly remind myself of because they’re counter-intuitive\n #1 - I forget - something about being by the toilet\n 1. (actually I thought of this first but it’s more complicated and doesn’t fit neatly into the category. Need to make space for the ritual - ending things off - catharsis - this is not an action, but you can make it into an action - you should - do a ritual, just to have an action, just so it takes up space. And it’s kind of like (4th quarter pic) things we don’t know etc. because it’s that fourth and final space that we wouldn’t know would be there except for the diagram - the diagram makes space. For example. I weighed myself. 96.5. Then I took off my clothes. Still 96.5. There’s something wrong with the scale/that’s how the scale works. Anyway. Then I had to take a second to <em>acknowledge </em>that there was nothing I could do about the situation. <em>Accept </em>that I couldn’t know the low number I weighed. And this was in action. The stool was small and nice, but never got appreciated…I thought of a metaphor to complete the exercise, and used that metaphor to accept (art). The other example - it returned to me like a lost bird, flying home from it’s nest (to it’s nest? I don’t know)\n I got done writing in my computer. “Oh, I could write in my drawing journal (this one)” but that’s stupid so I won’t do it) ← forgot to acknowledge this thought - passed over this possibility, so then spent a while, staring around, wondering what I should be doing. Eating? Showering? (Computering: thinking of all the automatic processes - this has a loose thread that caused the same problems - had to say “I’m not gonna do that right now” and that was painful, cause I’d been looking forward to it (())&gt; Richard sex weighing myself? Journaling wasn’t the answer we wanted, but it was the one we needed.\n Anyway - conclusion - these are counter-intuitive examples and they need to be considered. Ok bye, I’m gonna go take my shower now. Night. I love you. (?)! Please kiss me on the forehead when you leave\n Done with my shower. Put on the most ridiculous outfit I could think of (blue and white striped pants, bw shirt, going the other way - horizontal - would it have been better to have been going the same way? Maybe? Didn’t think of it]. (I didn’t have that shirt, but this is a logical ontology that sean and I could make) (ontology doesn’t mean that. I know! I don’t care!) I’m restarting things based on how they seem like, and now what they look like. Ontology sounds like that because it’s a conceptual onomanopeia because it starts with an openness and that starts it’s own little system. And then it completes the system - see - or because ontology is the way <em>into </em>the system - you start with\n\n Anyway, I have more things to write down before I can finish thinking about this. In the shower. My thought. Step one: end of the line theory - + ending things off (<strong>± &gt; </strong>this is just a weird use case, <em>not </em>different punctuation)\n ok yeah: to do: I need to think of a way that I can enter the space of, say end of line theory or cognitive vehicles metaphor/example - related - this is also part of end of the line theory, but it’s not useful for this particular predicament\n@@PB@@\n (pic)\n\n Here’s one - I caught one: start with: referring to abstraction. Next: referring to intentions. <em>Then: </em>referring to your <em>own </em>intentions. (what am <em>I </em>thinking) - combine it with patterns. The 1st two create a space.\n crate.\n constellation (pic)\n\n set theory + kit theory - what do they <em>not </em>have in common (()) opposite + set theory - - apply the SET mindset so you can know what rules to use when creating the thing.\n ok - procedure - define all the concepts - make them like pattern blocks, where each is a different color and/or shape - hex code - candyland (pic) - then put them together into constellations\n ok or: each is an abstraction. concept on the front, abstraction on the back\n the concepts can have the “sewing” all around the edge to prove they are instrumental, to fit into the grooves of your mind like slide projectors"},
{page:285,type:"day",lines:22,date:"Sep 26",text:"26\nI’m sick - not physically but literally. Honestly felt fine until I checked my phone, and then it all came crashing down. Ugly pink cushions - wood + puff + (pic)\noh yes: I’m not depressed - I’m just saving my happiness for later. And: I hardly ever have real feelings, so I’m cultivating this [sadness] (To AZ). (I’m like a sadness factory - manufacturing sadness - this one <em>is all mine. </em>I cultivated it perfectly. Plainfully, no <em>pain</em>fully - just a slip of the wrist, or a freudian slip? In my pattern collector for later. Q why to make all the flags, drawer on wood blocks (distorted) A. Because they are symbols, and it interferes with the integrity of the system…what paradox does this refer to. A anyway - I was thinking about how - you let the rules from the periphery in situations ex. you’ve dissociated at a bar and don’t want your friends to know this ← this is an example of a “bad” example. I finally learned what “choose 2” means [I’m having trouble, now, picking the blocks I need for these little {spheres}"},
{page:286,type:"abstract",lines:9,date:"Sep 26",text:"September 26th\nSome ideas I had last night and this morning that I didn’t consider fit to write down\n(pics)\nmicroscopic things - the way that my <em>small </em>objects aren’t needed to be <em>big </em>objects BECAUSE they are abstractions - so - mechanically accurate - but they can be small\n(Remember when Parvati told Cory that that thing hit my shoulder that one time - and Cory said: was it really Sandy that got hit? - we were at the table at tartine."},
{page:287,type:"abstract",lines:11,date:"Sep 26",text:"n September 26th\n“Bead Tray Idea”\n Had 3 really good ideas - starting with the honey bear + mustard + quarter = purple. Every time I start singing, he starts singing. To drown me out.\n “It’s just that - I invented my own language and no one can speak it, so I’m very much alone” :(? am i sad? does this make me sad? No - proud 😠 ew? is it ew? no - it’s happy and sweet. And no one has to know.\n\n <em>(JSYK, mommy, this is part of my categorization system)\n Here’s a stupid</em> thought that I don’t need:"},
{page:288,type:"ideas",lines:25,date:"Sep 26",text:"hot glue gun iron heating up shower turning hot ↔ my thoughts - the patterns collecting - to do list items, things I’m going to forget - things heating up in my mind, begging for my attention, getting hotter every passing minute\n (pic)\n and you could go and collect it. (This is a good system because you can expand it. And if all goes according to plan, synthesize new concepts. (busy work - sry to speak the obvious)\n if you add, for example, spinner, this pastel color wheel, <em>then </em>you get the idea that randomizing cognitive vehicles - you go into a crowd, and see what cognitive vehicles you go to a crowd - you talk to random ppl - you start to see what their cognitive vehicles are, <em>and then </em>you take them on for yourself - start telling yourself them.\n or: could do it with system helmets, and everyday you don’t know what game you’re going to play\n (pic)\n a basket of color wheel spinners (which i just made up, BTW)\n\n I AM AN EXPERT AT THINKING\n\n (pics, pics, pics)\n\n food becomes “disgusting” as porn does after you’re done. paint paintings where food looks disgusting (on mushrooms or weed, I would know <em>why </em>it <em>is </em>disgusting (I am smiling\n“Hall of Memories”\n (pic)"},
{page:289,type:"day",lines:9,date:"Sep 27",text:"27\n ORDERED from Crimson. I felt happy, listening to Louis C.K., laughing out loud. Eating Crimson - garlic sauce etc. Making stupid pieces of weird things - haha! It’s nice :)\n Note: I think this needs something pink\n Note: those weird pee things are <em>weird. </em>They should have fat stumpy paint brushes on them - not the people. Then they could be weird in the right way.\n How to make crackers - ventura(?)\n (pics - perfect pages too) (:))\n@@PB@@\n (pic)"},
{page:290,type:"ideas",lines:12,date:"Sep 27",text:"IDEAS FROM SLEEPING AND IN THE BATHROOM\n SOAP, BUTTER, TBF, pink, TBF, cotton (yellow)\n wire, wood stick, muslin colored tile\n “TRAY”, wire (not staple), muslin, matchbox, wood stick, bag golding a pea (TBF)\n BIG IDEA THAT GOT ME OUT OF BED\n (yellow fabric), yellow thread from daiso, (blue paint, paint brush…?)\n BUTTER BAG\n (pic)\n HOUSE BAG\n STEP-BY-STEP INSTRUCTIONS\n then i can at least know that i <em>could </em>make them at any moment…and anyone seeing the bag will know that I designed it in my head, not using trial and error (bitches be shopping)"},
{page:291,type:"day",lines:25,date:"Sep 27",text:"27ish (night)\n (pic)\n (pic)\n Systems of Movement (pic) right now looks like this, cause I am trying to think of examples of it - “a wooden block with two labels, one on each side (pic) (this kind of label - something can have two names - mean two kinds of things. An envelope - 2 envelopes. smashed together (back to back) - a label on each (different) the envelope, the shirt, J yelling at me (X what I imagined came true (+ the game for evan :)) anyway: Hypothesis: cognitive vehicles could take that spot, and systems of movement would become, like, just a lump - a puff or something. (Oh cool - now I have <em>gravitational </em>de<em>pression </em>as well”)\n “kids: pull up the rug under your thoughts”\n ( last night as I was falling asleep - the math thing that evan might like - addition - simply adding creed chairs to a specific content/thought - and this prepares something for your mind to puzzle out. - like the little envelope with the (puzzle) inside it - in that - you put the things together, and then you know what the label is, or what the label means\n seems like more of a cry journal here:\n yesterday I woke up at 11:30, had a dream about ian g and then was urging myself to open the curtain"},
{page:292,type:"ideas",lines:56,date:"Sep 27",text:"under the vacuum etc. Rationalizing my ?excess? of stasis and increasing hours spent journaling with the increasingly complicated and specialized methods - already I have my own punctuation - ex (())&gt;, made up words ex. sloop, and sleepy meaning hemmed and stuffed. Now I’m thinking of adding actual envelopes to keep track of random memories that occur throughout the day, and to ?track patterns…? New envelope:\n (pic)\n (as opposed to the memories envelope which will just go vertically (didn’t have too many memories today - at best I thought about why I hate various people in my life and made myself almost sick and a little bit angry) I can feel there are some newer strategies for getting things down (documenting my thoughts) now that I’m thinking creatively. The “mind/memory map” is <em>almost </em>ready to be born\n (pic)\n I think, basically it will have a memory, and then all the similar incidents will move out in a straight line, but each (”alternate”) will be connected in a different line. I think each “one” has to be its own snapshot, with one central memory/and then everything relating to that - I don’t think there can be secondary offshoots - they should be separate maps. Each memory can go on a notecard and they can be arranged, a picture can be taken, and then ?printed? or each card gets assigned a symbol/color - shape, and I can just draw the symbols and their relationships in lines on the mental map - ?notecard? Coincidentally, this is the game system\n@@PB@@\n I designed for the concepts. If there was string or thread involved, then my happiness would be piqued. But yes - once I design the meta system for something, then everything else feels like “busy work,” which is sad because I really need to do some busy work for the concept thing because I don’t know quite which things count as concepts, and which levels they will each be on, and what things count as levels. Could design physical structures to represent The Relationship Between Concepts ex.\n\n (pic)\n\n the milk I drank that one time when I wasn’t drinking anything (+ coffee + juice :)\n COMPONENTS (YOU WILL NEED:)\n weave fabric or paper something. glue on the lid(?)\n butter → clay or (yellow cotton)\n and these can go in my welcome basket,\n so: sugar. butter. milk. biscuits\n\n Here’s a math problem for you:\n I think the answer is these long string things - with flower fabric middle, and tea bag fabric outer - can’t make muahahah\n (pic)\n\n (pic)\n\n spoon, lentils, brushes (lol - the brushes were funny to draw)\n again, green fabric, wood circle - WEIRD brushes\n 5 + A = 3\n A = abstraction\n “iteration”\n\n (pic)\n@@PB@@\n(pic)\n&lt;empty-block"},
{page:293,type:"ideas",lines:5,date:"Sep 28",text:"/&gt;\n28 sept\nidea i had in the shower: (kind of stupid one maybe but fulfills some criteria) (pic)\n\nlilac, lavender, magenta\n\nsame design (magenta etc.), velcro\nBasically - the pattern collector - each matchbox has a different “pattern” you can collect"},
{page:294,type:"day",lines:40,date:"Sep 28",text:"28 SEPT SATURDAY\n Well, now that J sent me an IG reel, I have no motivation left to make anything. I’ve successfully skipped out on every activity i could have had planned, or had planned…now I’m just sitting here in the sun with the curtains open. Got some good sleep cause I tried really hard and watched “the virgin and the billionaire” last night till they asked me to watch ads. It’s pretty funny. Louis C.K. Pretty funny too. Two packets of cereal I could pick to eat - I redistributed some from the new one to the empty old one. About 5 or 6 notebooks I could write in. And about a thousand projects I could choose to do or not do. Instead I’ll be sad about not getting invited to Lindsay’s birthday even though I “ghosted” Maddie. Who is kind and sweet and beautiful. I kind of want to walk out into the sun, and I think I’ll see people and I haven’t seen pretty much <em>any</em>one in like a week. Almost went to Paradise Cove to meet Kyle et al but every single person that’s going makes me say: “Oh, uh, idk…maybe I’ll not go.” I wonder if it would be like that if I hung with Lindsay or J who I apparently like. Collect this pattern: is it the people, or is it me? I could go to a motel pool with Chris and Michael if I could find them. I could find a way to tell him it was my fault he and Abby broke up and that I love him and that he should date me now and then we can live together in their apartment, and then Abby and Chris can move in - as friends. And we can all sit on the rug and discuss how my butt is <em>actually </em>better than hers and find that coogie sweater that’s still in their washing machine that they might still have.\n\n I’m putting on my tray: mechanically accurate miniatures, and the fact that: when you travel <em>up </em>a level of abstraction, things “become smaller,” and there’s no room to fit anything anymore. I’ll have to take a <em>tiny </em>sad pill for this)"},
{page:295,type:"abstract",lines:57,date:"Sep 28",text:"Oh! I tried a fun little trick last night which <em>actually </em>worked. “Couldn’t appreciate it” opens a drawer, pulls a string - the video, the swim lessons, Tammy’s bracelet, daddy cutting bread, dresses from Florence,\n “took a chance and it paid off” the mother load, bleeding ears, anyway - it was weird because when I was looking in the recesses of my mind, it felt like things were coming from specific places - even some I couldn’t see completely clearly - I could see <em>where </em>they were in my mind, and I could see the colors attached to them.\n anyway - as I suspected - cause I was just thinking - I like memory, but I love “concepts” - and I’m guessing memory is in the middle or the back of the brain - the pre-frontal cortex I guess. This is getting a little weird - a little neurological…idk - a little trippy. Like - are certain concepts on the sides? Am i about to start <em>literally </em>mapping my brain - like, drawing a map of where everything is - /where <em>is </em>Katie clapping with her fingers (A thought experiment - pun)\n I guess I need to design a game that makes it easy to connect them - that cuts away the clutter so the only decision I have to make - intuit - is where they belong in relation to each other. My anxiety says I need to collect <em>all </em>my memories - put them on notecards - save them so I can look at them, play with them and my question is: if I skim off the top layer - will I then gain access to a whole new layer of memories - i could find <em>just </em>the right drawer pull to pick out the new ones that I wanted, and hang them up on my walls, and refer to <em>them </em>instead of the other ones, (?recoloring? recollecting?) all or some of my experiences…or what if I replaced them all with memories of the past year - me going to Primo Passo and simply sitting “ah, I am a person who simply sits (at primo passo). I could do this for myself, and I could do it for other people. What is the procedure? I guess it is: use the xi cards to think of “memories you didn’t know you had,” and put them in the memory library - maybe make a memory constellation, and decide which new ones you want to hang up. And the XI cards - make them believe I am talking to myself: XI…had nothing to do but wait,” XI - someone game me something, but I couldn’t appreciate it. IDK - the number of memories that come to my mind readily is confusing (this isn’t fun enough, so I’m going to ad the kit element…(…maybe if I find the <em>right </em>container (I’ll be able to find more memories). Anyway.\n\n (pic of chest) ← xi was misunderstood, xi won, xi - child…adult (⇒)\n ex, pick op a shell board of shapes fingers clapping game - teacher/student cubby I don’t know why I did it - hunny bunny"},
{page:296,type:"ideas",lines:33,date:"Sep 29",text:"29 Sept\n (memory recall from J’s bed)\n clay(?), hard, red (pic), fabric\n - - - - - - - - - - - - -\n and then I could make like the chicklets thing - at least three, sewn around the edges. red is fine. painted orange, stuffed. tapered\n - - - - - - - - - - - - -\n and then I was thinking I could make like a __ with hangers and the…hangers - plastic icky plastic, wood, wire\n and the hangers would hake a wood thing connecting down to a like cement block if I could make it out of clay - just cut little pieces - or square them. Somehow these would be balanced so they are only on one side of the metal rack, and the hands would be on the right side, but they would be two different pieces - <em>not </em>concurrent (even though it would be hard to balance. (Should not even be displayed together as they have nothing to do with each other).\n - - - - - - - - - - - - -\n Black velvet, doll hand obviously, velvet, Lil’ pearl necklace, chiclet size\n - - - - - - - - - - - - -\n ok, this might be the last idea. a wooden cube. One side (and one side only) would have a round flat thing with a pink victorian picture and TBF over top and pearls probably on the side\n - - - - - - - - - - - - -\n I could make a “letter” out of wire, and cover it with the tea bag fabric…none there, actually opens…maybe sew it with like white or gray thread. AND: put the lentils inside :) (metal, tape, lentils)\n - - - - - - - - - - - - - (upside down)\n Also: to solve the “problem” of memory hall could be TBF surrounded by muslin or tape and a “photo” in the middle square - about 2.25x2.25”"},
{page:297,type:"abstract",lines:18,date:"Sep 29",text:"in the shower, i remembered\n “i’m mad about abstraction” and “why I don’t like mechanically accurate miniatures (anymore)” I forgot about the potato chip tape, made by hammering wire in the shape of misshapen bubble wands. (Like little amoebas (or potato chips)\n and “c” colored liquid, cognitive vehicle color, seeping in and out, catching the light. NOT sure how to achieve this affect - paint water between 2 pieces of tape? In the shower, I thought of: 2 envelopes (the new kind)\n “imagine this” “remember this” - obviously for memories, and one for things I want to imagine - that become concepts when you put them together\n that’s actually a totally finished one, and you can imagine the creepy dreepy way things sort of slowly start turning into teach other, if you’re not careful (ship of theseus - where i end and u begin)"},
{page:298,type:"ideas",lines:26,date:"Sep 29",text:"to make the last thing, cut a (long) strip of clay, inadvertently, witha. serrated knife. And then apply some white glaze. carelessly\n TBF around a baby head? (scrunch)\n TBF around a puff?, lace, nondescript string\n wire, make the fish\n the pea sloops (but slightly bigger)\n a chiclet but with flower fabric and TBF\n@@PB@@\n 29 SEPT\n to put in the basket: 3 slices of green - peas in a ring or the other option is to make something with green cotton with peas like buttons or something like buttons. Oh and this was the first thing I imagined last night I think it was this morning…in Js bed - idk if cause I was drunk or what but it seemed this stuff was a different series - more artsy and less matter of fact. I was thinking that if I continue on as I have been, it will start to be that I am doing math, not art. In one way: you plug any/all sculptures into the metal frames (venn etc.) and solve for the empty spaces. And now: I’ve been making summation concepts ex. in the envelope, the imagine this envelope which is a gift for me on my wedding to myself (my birthday) p.s. (it’s a surprise - don’t tell( and you need to imagine all the things individually and then see what they have in common or refer to or whatever"},
{page:299,type:"day",lines:29,date:"Sep 30",text:"30 SEPT\n Just got done <em>driving </em>on the freeway and I was drunk this morning. Whole little adventure at Daiso and Tsujita. I wanted to take the freeway because I <em>like </em>the freeway and driving on the freeway but it did not direct me there on google maps. I’m a big strong boy, driving on the freeway - is it about that i used to not be allowed - as in - not let myself - or is it about getting faster - a ramp that lets you get <em>as fast </em>as you can. i looove going fast and when i was drunk the other day I drove <em>100 </em>miles an hour not even on the freeway just on surface streets <em>oh my god </em>I’m a <em>big </em>bad boy and i <em>don’t </em>know how that’s allowed (it’s not, there’s literally a law against it - probably 100 laws) I told Zach about it and I told Jonathan about it and I told mommy that I am <em>really </em>careful when I drive drunk. Could put <em>this </em>in a box - a (little) big street that is a bridge, and the color of it is night - vinyl, matte black, and yellow stitches - has to be. The bridge just ends, even though it’s supposed to be a street. <em>anyway</em> the ramen was too spicy - not spicy enough. Was happy to be alive in the bathroom\n he did not bring my second egg or the check when I asked 🙄\n start getting mad at people more - slick, walking around in a coat, eyes on the floor, straight line, arms, fast, swinging. And eyes - narrowed. me: mad, really angry. At every<em>one </em>and every<em>thing.</em>"},
{page:300,type:"ideas",lines:103,date:"Sep 30",text:"a pocket that has a <em>pattern </em>in it - to show how people keep patterns in their pocket, or like - as a metaphor for how it <em>feels </em>to collect patterns,\n\n (pic)\n@@PB@@\n and like what space they “take” up in your life, like if it’s in a backpack or a shopping cart it means something else. I guess a pattern is like a pocket cause it’s close to your body, and you sort of put things in there temporarily - more like a tool belt <em>i think </em>a pocket is a certain <em>type </em>of pattern, and a tool belt is the <em>general </em>term - using incorrect punctuation or grammar etc. to cause you to take a second look - if you want something <em>underlined </em>in your mind, so you come back to it. That red line, and scorched - I maybe need to make a new language where all the words <em>sound </em>like what they mean. (cherry on top) - a new language - a bubble wand hanging from my neck - a religious symbol. Mommy will try to take it off and I will say: “No, that’s part of my <em>religion” </em>in the tone Jonathan used to tell me yes duh we’ve been dating. Maddie said they used to make their old boyfriend tell them how sad he’d be if they died. <em>Anyway</em> my joke was that people are as slow as their cars - that intelligence is <em>directly </em>correlated with how fast your car is moving because people who are not moving fast should be moving faster if there’s no one in front of them. I found a cart when I was struggling to carry my $100 worth of stuff. it had 3 wheels which explained why it was sitting out there on the curb. It was a godsend, I carried my groceries back to my car with that. I unloaded my groceries into my trump. It was nice to have the cart and I had been struggling carrying soup and the two bags both pretty heavy and I didn’t want to carry them anymore. Cart has 3 levels - one for each of my bags, and the third one was for my soup :) i love you. thank you god\n@@PB@@\n kind of like that poster with all of my boyfriends. one space for each of my boyfriends. thank you, god, for giving me so many boyfriends :) the measuring spoon is also the shape of the bubble wand.\n Listening to people to find out how they categorize things in their mind\n - - - - - - - - - - - - -(upside down)\n if there was an element about the cart situation - perhaps the <em>3 </em>wheels, and how it matched the <em>3 </em>levels - that seemed intentional god winking at me, i <em>guess </em>saying this is not a coincidence is like when you add the finishing touche(s) on an art piece - that you make with set theory - that is like you winking at your audience saying it was/is intentional/…the end of the line, the line being a/the pattern. (dot dot dot square and then circle in square) &lt;- this one’s different, this one’s special, this one’s aware that it exists - it is - the pattern, but backwards. I’m going on a picnic, and I’m putting a ___ in my pocket, through the green glass door. Set theory being, like, a daily puzzle like the way that mind kitty is. Make a website for [someone[ that has a daily puzzle. But it doesn’t only have to be SET…there can be various configurations “everything is either the same, or different. start with a progression. what goes here. Then a venn diagram. (pic) MOLD THEORY. That’s how you FIND all the other shapes (plug in the hoonies?)\n@@PB@@\n wrapping paper and that “kits” catalog (and of course the american girl catalog, specifically the sets where it could come with all sorts of things, and the birthday one's. (the petit fours - ah yes - the quarter concept (...? (\n Had like what some people who are stupid who are stupid would call having a mental break down - i was upset about my nails and then i had to pull my thumb toe out of it’s cage and it really hurt (and it still hurts)\n (to make a raspberry cookie to go in the green glass basket)\n (pic) this sugar packet is making me feel better, is keeping me sane. That, and the fact that, in the future, I have collected <em>all </em>my thoughts - the one's I had in the <em>bathroom, </em>the ones I had on the couch before, car thoughts, garage thoughts, other couch thoughts.\n (diagram) (example example example\n for example: the perfect picture pattern that I was making before going to Ricardo’s house and getting drunk.\n@@PB@@\n ok: these are things I thought of in the bathroom\n paperboard. and i can just use that for all of them\n memories in there ex. two moments that happened today. and what do they have in common? And then, can you make up another one? (venn) is a <em>step </em>to solving the second one. What is the structure of that? It starts in one place (as a puzzle). And then, once you answer it, it turns out that it was “a step” the whole time, even though it wasn’t, it was a puzzle at the before point. This makes me happy and sad at the same time. happy to have figure it out (and i know i’ve figured it out before), and sad that I’m not going to know in the future, that I am going to forget. And then i’m going to have to figure it out again."},
{page:301,type:"abstract",lines:17,date:"Sep 30",text:"cont sept 30th\n Thought more about my theory that i get stressed when I have too many things to think about/too many things to do specifically that i was gonna tell my therapist that this is what causes the anxiety and I could work through the anxiety or i could <em>get the things done </em>and then i would be not anxious and also my life would have meaning, and I would be spiritually fulfilled\n …something wood maybe…with fabric in between\n (pics etc. (tea bag with birds in it (+) flower fabric cushion () &lt;- even narrower - only room for 1 pea across - single file. intentionally misspell peas?\n@@PB@@\n I think…\n thinky type art stuff like the SET puzzles and Feely type art like that time i sewed everything together on my floor is combined in the new pocket art that is a few pages back"},
{page:302,type:"ideas",lines:8,date:"Sep 30",text:"xi things I “did” when I was little\n wrapping paper\n I used to love poring over those kit and set catalogs\n things I need to think about later\n little ‘pea rounds’ (and a non-sugar packet)\n in the dream drawer - lentils in the match box\n money + flags → symbol vs….(what paradox is this\n ok, write, for the website: explain about the star of paradox, and art, in like a paragraph\n TBF, hot glue(?)"},
{page:303,type:"abstract",lines:23,date:"Sep 30",text:"SEPTEMBER 30TH\n The way that women/non-binary people sort of parent each other - like Sonia (mustache), asking me how I wanted to feel about maddie (“wait, so what Do you need therapy for”), and Maddie…silver lining…cloud\n Oh yeah - I thought of this when evan telling me about guilt and it kicked in - i need to ask him questions till i can say: “<em>see!</em> you do not need to feel guilty for this. J saying “be nice to J” which is weird cause why wouldn’t he know to do that if he’s so smart hmm… (nerd) (mexican)\n - - - - - - - - - - - - -\n The to-do list thing is related to catharsis and how I need g to kiss my forehead when he leaves - a useful bow (paradox like jumbo shrimp - it’s not) …! ← metaphor sums it up. Ritual. And this is how to get rid of all the bad thoughts - “make it clear that they’re coming from your mind, and not ‘real’ “\n - - - - - - - - - - - - -\n no, “archive it” - put my diagrams on “little slide projectors,” and, so you can: hold them up to the light” “imagine them” -\n (coffee stirrers, and they all go in the 2x2x1” box (aw :) nice :)"},
{page:304,type:"ideas",lines:19,date:"Sep 30",text:"it feels like october\n “oh! here’s a stupid idea that i had once (not the “just-the-crust” bread) tea bag where the bag is made of wood and the label is made of paper no, opposite)\n pic - the tea is labeling the tea\n a date book - lil black book with houses on the cover/front, and inside are just little maps - like, pictures that you (i) draw that portray <em>how </em>you would get to their house if you wanted to. One interesting thing is that the maps are different scales depending on how far they live from you cause the notecard size doesn’t change. Here’s a thought for ya: (tin can telephone) (wood - the new things that i got)\n if i attach the wooden pieces to each other, …then it makes it clear it’s a <em>conceptual </em>idea - it belongs in the mind, and it’s not supposed to be representation. It’s so intentional that it doesn’t leave it open to the possibility that maybe this is by accident, or means something else"},
{page:305,type:"abstract",lines:42,date:"Sep 30",text:"sept 30 though now its oct 1 maybe\n (two pics - posters: mechanisms of the mind, metaphors of the mind)\n …”the metaphor machine is a <em>metaphor </em>for <strong>automatic processes</strong> because in each step of the way, something else is done to the thing (a thing) that’s going through it - brushing your teeth - once you start, you just keep going - each step takes you past the next one and you never get to think, in the middle for example - oh wait - is this what i want done? …i can imagine ex, the paint brushes - little lines - …and the measuring spoons etc. being made in [the metaphor machine] , or at least something that looks like it (and works the same way). ex. the toothpick goes down the line, gets tape added, and then the - “line” - (string) the string. the scrabble tile gets - painted white with the line brush, then stamped with whatever letters were left from a newspaper. Then. These all get gathered in a pile and dropped/dumped into a very almost square  box with other things - and a small version of the line brush (...can’t read the last part)\n anyway - one set is made as the <em>outputs </em>of all the (?automatic?) processes, and another is like - all the things that make a concept idk\n i had the idea before of having everything abstract in a room, the paintbrushes and m cups but and i could add a/the vacuum - a long pole - possibly silver, with a flat black tump at the bottom, and floop on the side - the back of the pole. the plates, or course would be nice - just white circles, also probably made of clay, and painted white. stacked up in the cabinet, but not quite on top of each other - perhaps they would still have the ring on the bottom, but not the top. (or a string between them if i couldn’t manage that) ◬ I would kind of like to bring these plates out at a dinner party and have people get mad at me for it - they would not but I wish they would - they’d fight me….<em>that </em>would be nice…of all things. Alright, let’s go to bed and think about the floof and the tump (and how…)"},
{page:306,type:"day",lines:101,date:"Sep 30",text:"Went to Niha’s house last night for a pool party. Drank wine by the pool. It was <em>real </em>nice. Talked to Niha for a good bit. Her boobs were lookin’ MIGHTY fine in her red bra. Kinda glad I got that out of the way when I 1st met her, or I’d be thinking about…\n (Sean wrote this 🙄) “At the party we played a game in the pool\n Sean came over for a bit and <em>really </em>disrupted my journaling. i gave him a bow that he’s gonna keep on his bedside table. The game we played started as hold your breath under the water but we got distracted and only Whittley went down and then we all rushed to her and said to come back up, and then Niha dunked Zach’s head under the water and we all went to him to make sure he was fine and then I think I or Marcus went down and everyone came to the rescue and that was then the game we played. Emergent rules. Evolution. Metaphor for the situation. And then we held Niha as we spun her around (me and Whittley), just round and round while Zach and Marcus were talking in the hot tub about who knows what. I called Sean on the phone, I guess I was feeling maybe a little bit lonely or maybe I got too drunk - Geordan brough a vodka bottle and I drank straight vodka idk how much - too much. I guess I was asleep on the couch and Zach tried to wake me up for some of the mac n cheese that Niha made but I wouldn’t budge\n@@PB@@\n <em>Niha said she prayed and prayed for a guy to like her for months and one day he called out of the blue and they went on a trip and he sexually assaulted her and she had a gash that didn’t heal for months so she doesn’t recommend manifesting stuff on purpose. She said that she thinks I’m a powerful manifestor. Her dad was a brahmin. I guess I told her I felt like I should be manifesting things on purpose instead of by accident but I never know what to manifest. I guess we were talking about thinking about a friend and they call. anyway - it reminds me of the harry potter adage about things happening when you’re sad or angry or whatever - did JK Rowling know something? There were so many things in her books that have real world applications like changing fear into something silly which is sort of like creed’s voice, and then instead using Pams - I’ve never done it on purpose. but purposely “recategorizing” ex. say something mean to yourself in a mocking tone oh I have done this - i do it everyday - I use it to categorize stuff and keep my brain healthy. Another thing I do - rather than having a feeling, I just </em>look at it, <em>“as a sculpture,” and then I can </em>see <em>the feeling but without having to experience it - I can inspect it - acknowledge it etc. +&gt; “5 INSANELY complicated ways to keep your brain healthy,” and it would include about taking out old memories, and using a whole glob or gloop of memories - like blob tag (!) to infect the “new” one. Question: Do specific memories have - or could they have - like…actual, </em>very <em>specific “sculptural metaphors” that could be put in the basket and then the drawer, so you could </em>see <em>all your memories - trying to pull this </em>long <em>strand\n@@PB@@\n of thought out of my head - idk - there seems like there would be some benefit to this </em>crazy <em>procedure but I’m not sure if it’s interesting, or just therapeutic. Perhaps I could pull the pieces out by looking at it as a metaphor. The dull end to the thought I was having yesterday was that (if) you could find a metaphor for every brains structure, and then you would feel like all the pieces of my mind were there, and you wouldn’t have to worry about any of the g said that was good cause it didn’t make sense to him (“no! that’s good”) and didn’t try to understand it (not sure if I mean </em>metaphor <em>or “mechanically-accurate” representation of how the process works. Not sure if it’s brain </em>structures <em>either. Thinking today in the restroom at Niha’s that writing my thoughts down is sort of like a dream come true - an answer to a problem I didn’t know I had - I am </em>sad <em>to see all my thoughts go - an inevitability though, like death. I am getting closer and closer to knowing I have all my thoughts, I can keep them. Thinking while laying in bed with sean thinking why I couldn’t just be done journaling - it’s like i’m cleaning my mind.\n Anyway - the pattern collector - the mechanical process…what I mean is: this is how it works - you can’t see what the pattern is until unless you open the drawer, and you can’t open the drawer if you have tiny little </em>nubs for nails, no but unless you have a new incident, and then the drawer will open (star) &lt; the lock on the drawer (inverted star) &lt;- the incident (...no the opposite). and the metaphor machine works as a metaphor for automatic process and a mechanically accurate of how meaning gets - works…in the mind.\n@@PB@@\n&lt;empty-blo"},
{page:307,type:"ideas",lines:68,date:"Oct 1",text:"ck/&gt;\n<strong>OCT 1ST</strong>\nOk, here’s one:\n“what’s the difference between a tooth comb that’s <em>made out of “E” </em>“, and a box of stump wooden cigarettes, where each one is painted with a different ratio of white to brownish?\npieces of things. complete the set: a window with a hand, a “hood baby,” cyclops glasses\nHere’s another, or is this the same one? Cards with fingers on them (there are 10).\nI don’t know what all the things I bought at Daiso are for, for example, the little glass jars … - I don’t know what they’re for. But when i was there, I just had a sense that I should get them\nAnother one (and then two more): we can play “what’s the procedure” - a very fun game. People will learn to play :) perhaps they can make their own thing with scissors, paper, tape, staples, string, glue stick - 3 tools, 3 supplies (yes, no)\nand the next to last: after I explain about “automatic processes,” and then you can design one that you can mess up, that you, will have to mess up\n(pic) the finger trick\nthe star of paradox - learn it, and then: design things like the voodoo doll - design something with 1,2,3 etc. axes on\n@@PB@@\nthe star of paradox…”it’s both a cigarette…<em>and </em>a pill box.\nHere: can you combine a pill bottle and matches (think of at least three different ways) how about a tea bag and pill\n(ok there’s a nice big diagram here - first of the answer to the above Q), and then some examples of what to put (somewhere - i’m not really sure - they’re all very small - one is an abbreviated version of the emergency ring (remember it’s meant to be a square). Another is a scrabble tile with two small pieces of velcro on it - the pinched sickly way they look when attached to tic tacs. another is a smaller version of the paint brush when it was hung. And the last is the smallest version of the pyramid wire w/ a side of muslin. (that’s nice).\nI also made: a matchbook (out of fabric), with small little tumps - matches made of metal, but tump is the way they ended off\ng cut my nails with a  weird pair of scissors - bent forward, “I don’t know why he wanted to do it” pros: maddie will be happy and i can type better on the computer. cons: everything else - constant slight distress. i feel like a cat, now more than ever. I could hang on my wall: ” 9 reasons i’m like a cat,” and they would be: i like to move around to be inside where the sun is 2.  i don’t like to take showers 3. i don’t want to get my nails cut. mommy said: oh, he cut your nails? Don’t! Let him cut your eyelashes - haha I don’t know why I thought this was so funny - picturing my lashes with just half of lashes left, each one cut just a little bit, and trying to picture why he would want to do that. Went to the farmer’s market with mommy on sunday and we had a grand old time playing in the half built house, playing phd again, our <em>favorite </em>game :) I don’t understand why <em>she </em>couldn’t understand how to engineer the heart with less rings. we got gas together and someone washed my front window (and back) and I said:\nis this your favorite window you’ve washed today?” and he said: “by far” so that was perfect - as perfect as that song by el buho, and saying el buho over and over again instead of answering what makes it spanish"},
{page:308,type:"day",lines:47,date:"Oct 1",text:"october 1st\n we sat in the grass at the farmer’s market and we ate the pupusas she got for me before I got there - (stuff about my day)…(type later? idk?) (now: - 4 bean, 2 cheese, 2 loroco which is a flower apparently and the most authentic. Mommy is one of the best - perhaps my favorite. We talked about whether generations are different or something. Getting over being drunk was all day my body had little tiny things that were wrong with it and I had to fix them, or else I would feel anxious to make matters better, I was writing in my journal, and trying to pick out these <em>little </em>tiny individual discrete that were in there and if I couldn’t get one, I would feel anxious too. Things like feeling cold, being hungry, thirsty…I have a weird bruise on my arm that i think I got from one of the guys man handling me at the very beginning of the party last night and I keep <em>feeling </em>it on my arm: “oh my gosh, a bruise…i wonder how it got there. Oh my gosh! How it got there…gosh…got…” I think it might have been geordan cause otherwise i <em>don’t </em>know who to be mad at. I told it to Niha this morning and she said oh! it’s cause we were all spinning each other around in the pool which made me mad cause she was wrong. She told me she was mad at me for hooking up with Whittley - because it would ruin the friend group “just so I don’t hear it from someone else” and was pissed at Zach for not answering but she probably should’ve gotten the hint and just wanted to hang out with Whittley and I guess they fucked in the car. Apparently Whittley told Niha that she could have Zach if she wanted him too…hmm. I got so many things from aliexpress and told myself I could open them as long as I didn’t feel like I had to make something out of them. So I got them and there were <em>all </em>these little envelopes inside two bigger envelopes and each thing was nice and pretty much <em>exactly </em>what I wanted. I want to go through the things from Daiso too. I’ve never been so liberal about buying stuff at a store and I don’t regret it now that I’m not drunk.\n I have this <em>long </em>thought that I can’t remember. It came in two parts and I think it had something to do with <em>math </em>and abstraction, and using metaphors to figure stuff"},
{page:309,type:"ideas",lines:42,date:"Oct 1",text:"out in my head. The 1st part looks like a white gossamer table cloth, spread over a <em>bunch </em>of stuff. Big versions of a flumpy black velvet package with thin pink string, flumping it together, and definitely the pea round - a fruit/shoes version of it. The second part was much whispier outlined in a black velvet string that would turn into purple and red, and dismantle the bundles, a little bit like the black package. it was about as difficult as algebra, and also kind of <em>looked </em>like the word algebra - the light blue of the “l”, especially in the middle. Oh, here’s one more idea I forgot about:\n\n (pic)\n\n for example the map cards, maybe even the nail cards, and the door cards or whatever they were\n pea rounds, or automatic process outputs (and you use them to build something, like kapla)\n\n anyway, then you could flip the pages, and see if any or all of them are a set, or some of them. oh, and there could also need to be a machine - you didn’t think of that, did you? Ok and also maybe a booklet (+ cards? too much?)\n - slept the perfect amount - just 1-2 hours from like 6am to 8 am. Serafin and I have something in common today: we are both working on his house. He is building himself a little house in the backyard so he can come and live with us because he was lonely at home. When you don’t remember going to bed, then you slept extra, and you may not need to sleep for 2 or 3 days after that. I thought I was just being mean by not texting Maddie back but it was because I was dreading making plans and didn’t want to put that in my calendar until the last minute. I told Sean that we were wasting time not talking about J’s cousin James, and reasons why he doesn’t like him. ◬ I read through my diary and it was all pretty good and exactly as I had hoped but the thing is it’s pretty much a waste of time and i should just be writing about J’s cousin James and why he doesn’t and also now I don’t, like him. (He was in the kitchen too much.)"},
{page:310,type:"day",lines:43,date:"Oct 1",text:"OCT 1ST (DAY THO)\n I’m a little ashamed that I managed to forget <em>everything </em>I was thinking this morning, and I even repeated it to myself a number of times before getting out of bed, thinking that I would remember. One thing I know is I said “I’m <em>not </em>gonna explain this to myself - about the sun coming in through the curtain - a little peak - a △, but it was <em>very </em>bright, which implies that normally I would try to “explain it away to myself,” and <em>that </em>looked like a <em>little </em>pocket on ? a scrabble tile with flower fabric and black lines for the dingits. I don’t know if it could open, but at least it would look like it would. So something very <em>sweet </em>and tiny to get <em>right </em>underneath my “male gaze” for the day ¿to help me learn to be by myself? (those paint brushes are so good at picking up the pieces of my mind at helping me to do that!…anyway - a set of envelopes explaining things to me. I had 2 dreams last night i was in a hall with a lot of naked people - women. They were all nice looking, and everyone was just sort of walking around and i thought, oh, alright, I guess this isn’t so bad - it definitely had the possibility of [being bad], and then there was this <em>one </em>black woman who kept <em>running </em>at people and just sort of like revving up, and then sort of “getting” them - not actually touching them mind you - going forward towards them i knew how to not get got - avoid eye contact - but then i got got - she shocked me - i was ashamed. Then, in a classroom, this much bigger - taller, not just fatter, also black woman - to fix the problem - sat on her - she had a chair that was facing, in the doorway of the classroom. I was sort of weirded out, or mildly horrified and then i thought of maybe it’s sexual and then it was and i got a lil’ oozie in my lil’ undies, like molten lava in a lava lamp woke up sort of, sun was shining. Oh, here’s another thing i just remembered - it was a yellow splooch of paint swatch - trying to connect to some white lacey and a wooden frame above it, and also (not connected) - wooden frames"},
{page:311,type:"ideas",lines:47,date:"Oct 1",text:"black velvet, something white - pearls, a color cotton and the words here: (frantic nettering) - a picture of the word “lack” (and then it was the would be sculptures” and there’s all these disclaimers, and none of them even [made sense]!! “idk the actual words, but about explaining things to j - about thinking of finding ways to explain things to j. (implication being that i should stop) anyway, then there were about nine tiles, one was the sweet tiny pouch, another had black velvet, and maybe dingits in slight lace but the point, is they could all be there to [make the set] [to tell me the story] [to explain it to myself (like I’m 5)], and it was a revelation just because they were <em>so </em>small and could not be made much of a fuss about - it seemed easier - which meant I could finish faster, which meant i could finish at all. Tryna do the clips for the underwear rack - maybe a hidden clothespin, widened by 2 scrabble tiles. And the “underwear” could get bunched by the clothespin, instead of sewing - just sew a hem - they can all be squares and turn into other shapes) or maybe red seems a bit dramatic (interlude to read a different journal for a second) ok now it’s actually coming back to me, anyway - I was designing an assembly line - 3 parts - like that wooden table I have - half size or a third - the thin wood - and they can be moved away from each other, but not too much. I suppose at the beginning (table 1) could be - the pocket- to collect the idea maybe - I’m not sure why. <em>Then </em>the hinge machine I designed yesterday - do this, do this, and do this (last one bigger)…and finally it gets wrapped up in brown paper - cinched by black yarn, and then tied nice by a black satin bow that is (a bit too big) so it can get hanged up and ready to be “read” by the mind for later - imprisoned in memory - sort of what i was trying to do with my thoughts this morning but it worked when it got jostled.\n worked on the pattern collector - to make it more mechanically accurate - the things collected in it COULD BE handles but I couldn’t think of a way to make it sing to me (to myself) so I stubbornly forgot the idea, but kept trying because it was kind of fun to do so.\n@@PB@@\n OCT 1ST"},
{page:312,type:"day",lines:49,date:"Oct 1",text:"had to go visit Pilar’s place with mommy because someone told me they got bugs in their chamomile. Drive was long and nice. We got terrible food at this weird half arcade place that reminded me how much we like Santa Monica. then we <em>looked </em>at all the <em>stuff </em>to see if there were bugs in it. had a long conversation with mommy about IQ and other stuff. I need to remind myself to listen to her a lot she is so nice she will just listen and never talk about herself. She said she can tell when someone’s not smart when you try to explain something to them, and they don’t get it and that the people in El Salvador could only weave one thing, could only apply the weaving concept to one thing. She said sometimes she is learning something and then she just “gets” the concept and I said is there a way to economize the concept - to teach the concept in the most efficient way possible and she said like, not include the example, the step by step, and I said yeah and she didn’t know how to think about that - or want to . I had the thought - well - i was explaining to her in the car, about journaling and my theory that it could make me less anxious, and she was <em>so </em>surprised to learn that I thought that not remembering things was making me anxious. I said that (and idk if this is true) I have like 4 slots in my short term memory, and I’m often occupying at least 3 of the spots with some random weird little tid bit that I’m trying to remember. And then I use my clicky system if all of them are used up (and once I “finish” writing in my diary, then I can have all my short term memory back :) Like, I might need to write the thing about Creed, and Richard ‘that’s right….” and Siddhartha getting just sort of louder with his hands when he wanted to explain something to you but you didn’t understand - found <em>myself </em>doing that when I was talking to mommy and she was <em>not </em>understanding what I was saying ⇐ BTW, there’s an example of why you need to get my games so you can play them - then, you only need to <em>plug </em>something in to get an art piece - oh, that’s nice :) … you could fix your whole brain like that - plugging the right things in (pic) (detachable) to the right systems (outputs like that synthesizer The paint brushes are as if you made them to say only <em>one </em>specific thing"},
{page:313,type:"ideas",lines:20,date:"Oct 1",text:"And if you plugged a series of the right things in, you could go to the magician’s nephews other pools or expand your mind, get to the next level\n Anyway - my stupid idea was that some thoughts are kinda big, and it would be kinda nice to have someone else who could help you with them - perhaps lend you a cup of their short term memory. I think that would be nice.\n I suppose all the automatic processes in the bakery case at Primo Passo, (which is what I’ve been thinking about, on wax paper, trying really hard to stay all together <em>is </em>a a metaphor for those automatic processes that come out of our mind <em>like </em>the creed thing, but <em>also </em>like other things\n excited to replace all my plates with flat plates and no one will have any walls, and just in general optimize, but the opposite - my vacuum cleaner won’t work for example - it’ll just be a long metal pole with a tump at the end\n\n (pic)\n@@PB@@\n&lt;synced_block url=\""},
{page:314,type:"ideas",lines:67,date:"Oct 2",text:"\"&gt;\nOCT 2ND\n ok, there are some\n □ - artificial process\n - spider as a pet - not even a tarantula - implications?\n - fork —→ knife holding hands…it’s like this\n (this is mold theory)\n\n i was crossing the street after Peets and there was an older woman, very thin, one of those stupid puffy coats that I don’t like, and skin tight leggings that showed she had knobby knees. blonde hair. I saw that she was dropping things in the street and thought - something - and I <em>thought </em>it would be “ok, I should help her,” but then I realized it was: “I’m glad she’s struggling.” She dropped like a scarf or something, and then, as she tried to pick it up, her drink started to spill. I don’t know if she noticed. She was also holding a brown paper bag, and then her little backpack purse fell too (and keep in mind she was in the middle of the street. She could’ve <em>died </em>if a car had come right then - though the crosswalk - even though the walk sign was on - but for how long? ) I walked past her, looking back, as she tried to pick up her stupid tiny little backpack and her green drink spilled at an almost impressive angle - some sort of grainy, flaky substance, maybe health nuts. And then when I was done crossing the street, I stopped watching.\n@@PB@@\n travel - magic carpet rug\n\n examples of maps\n h - date book with the maps - trying to get to other people’s houses\n h - labyrinths - ?board? game trying to get lost (richard)\n\n h - see - <em>this </em>is how you find something with your mind - <em>examples! </em>:) )\n …the conceptual version of the memory constellation (has pink fabric behind it, and a small (thin? no. but small( wooden frame - tantamount to a number of the wooden frames that I had\n\n design some cards that I can help myself remember things - like XI, but for metaphors - not the (pic: flip book), but, instead ~ piles of hoonies, and you pick them from your periphery. <em>I </em>would want (pic)<em> black velvet racks, “something white, and tiny, with lines in it - I don’t know - a wooden fat thing with too big a wooden shelf in the middle\n </em>black velvet, hanging out from the wall\n\n even though they have nothing to do with the actual thing, it just gets your mind trained on maps (I think)…, and while you’re thinking about maps, the <em>rest </em>of your mind - the middle - can be thinking about [the thing you’re/were trying to remember - the thing to do with maps]\n@@PB@@\n You may want to make an automatic process artificial<em> intentional, minus the connotations - just in the literal (mechanical) sense\n\n (pic) the kind that has a 2nd lil’ shelf and lots of lil compartments - one for each place in the mind (.)\n organizing them into a - oh, everything fits just right…is this related to - tip of my mind, it’s in the back - spatial…have to\n bakery cabinet at primo passo is nice cause you get to take them all out and look at them\n ↔ what? (are they?) Automatic process?\n\n find where things are…and perhaps you could locate them in your mind - there are spots (…I was </em>going to use the cabinets in my parents kitchen, but now I can just use my mind itself - just take a look, and see where the compartments are (and why certain things gravitate to certain compartments - what kinds of things"},
{page:315,type:"ideas",lines:26,date:"Oct 2",text:"13 miles, 16 mins only! last leg - brute force → equations will help?\n\n invent:\n floss x tape ✓\n language → mommy x daddy ✓ shorthand x\n instead of the pics of boys + maddie on the boyfriend map x map each one (pic) pieces of the mind “oh that’s what I was looking (helping rememebr stuff)\n Pattern collector but high end, at Goodies, laid out, displayed, “oh, these nice rocks” (collect rocks from the beach in malibu - earth tones - sepia, featuring pink sepia -\n matchbox covered in muslin, one stripe of sepia\n machines that can help your mind think better - set theory (pic) ← ooh, that’s nice -\n …a box to organize things spatially, so you don’t forget anything (or so you can remember it if you do forget it)\n\n pill pack ⇒ memory pack → memories of the day\n (pic) because of the metaphor\n\n derivative\n (pic)\n cigarettes - but didn’t understand the ratio is specific (and not decorative or something - broken\n (how do you write a derivative? here it’s: (pic) (→ here we do it like this<em>)\n the derivative is the metaphor? the ghost of the machine, no. in this case, it’s the mechanism actually - it </em>works the same way but it is/not an example…(?)\n@@PB@@\n ok, here’s what else/that i’m trying to forget -"},
{page:316,type:"abstract",lines:24,date:"Oct 2",text:"that is: not remember - i don’t want to not forget it\n\n ♪ i don’t want to forget, no i don’t want to forget ♪\n\n (pic)\n\n oh! you could <em>draw </em>maps to see where things <em>are </em>in your head - related to [(for example: about my textbook, i just don’t think she’ll get it or want to know}\n to maddie - i <em>can </em>tell you (it’s not a secret) ← <em>secret </em>is a specific category<em> (whoa, this was supposed to go here)\n\n ok, well - we already know this, but: instrumentalism is another way you can [control your thoughts] (and this is what we’ve been doing - like now I’ve just remembered\n\n portland diaries x tips of things - that you can (”there’s a lot to unpack here - literally”), and that way you can remember </em>what <em>you were thinking\n\n “i’m having trouble breathing today” ♪ (to the tune of: i don’t care, i don’t really mind/”oh, by the way.” ( ← ex) duh but for those south of nebraska…\n\n Find a place in your mind where you feel free and you feel fine. (lay a standard wide size muslin where you can then </em>put things on - add some metaphor or whatever comes to your mind (when you [don’t think about it (too) much) ⇒ sophiespincher :o"},
{page:317,type:"day",lines:22,date:"Oct 2",text:"here you go - mommy: you couldn’t learn to read me: “I was probably busy thinking of other things!” Duh, well obviously + angry and annoyed)\n reading in my cubby while they were watching dragon tales. I think I didn’t like the kids books cause they were always so fanciful and condescending (?) like: ooh, we have <em>flowers </em>and…I don’t know - I’d rather read babysitters where at least they didn’t lie to me or just wanted to get them done quickly - like the ballet shoes (another example of the memory chain I was looking for) (op, shape card, + kits &amp; sets &amp; wrapping paper $ things like that - american girl…etc.\n I remember, bring my 3 notebooks (()) → american girl dolls\n ((the price is right)) ⇒\n oh yeah, and another thing I wanted to remember - to tell Ms. Zhu - I need to <em>keep </em>this part of my brain - not dismantle it and put everything back away where it started, because <em>mine </em>has <em>lines </em>(where others do not (Ramachandran) - mine all have maps to where they started - my decision making processes"},
{page:318,type:"ideas",lines:27,date:"Oct 2",text:"Call the book: how to think ex. things that are counter-intuitive, such as “I want to do something (put on my el tunco shirt) but I don’t realize, it’s <em>actually </em>a ritual, and I don’t need to <em>do </em>it to put my shirt on. —need to think about it, and do it inside <em>my mind</em>\n another example is the thing I was thinking about <em>yesterday, </em>and <em>tomorrow… </em>\n 1. recategorizing things, and but 2. thinking abouttrying to figure out…<em>what’s </em>in other people’s minds idk the streetlights thing recategorizing <em>why </em>I want to go on the freeway. telling mommy - you can tell me what <em>you </em>want sympathy for, and <em>you </em>want to be praised for, and i’d be happy\n@@PB@@\n MS = mental state\n black and white photo + light violet…you can just add 2 random things together\n\n “the whole introduction on categorization”\n\n featuring such hits as\n note: you/you can, categorize things differently depending on the mental state you’re in, so it can be like little cards that look like the bae poster and each one has: the category, and what’s in it. For example, in a 1 mS what do you worship? What do you fear? What do you think is the right way to be? What do you think is mildly annoying?\n\n and then: in the <em>advanced </em>class, you get to do <em>intentional </em>recategorization, and: seeing in people’s minds.\n@@PB@@\n&lt;synced_block url=\""},
{page:319,type:"abstract",lines:92,date:"Oct 3",text:"\"&gt;\nOCTOBER THIRD (la la land?)\n Dream recall is <em>nothing </em>now, compared to the <em>waking </em>thoughts that I now compile into little piles, siphon them into wheelbarrows - pile into wheelbarrows, siphon them through a hole in the side into wooden boxes with a predetermined number of compartments. I’m starting to feel like matilda in that i can make things happen with my mind, and the things that i make happen are thoughts. on the drive back to florence’s house, i passed through eagle rock in the sense that everything was <em>warm </em>and <em>light </em>even though it was growing black outside and tiny night things were starting to tell little secrets to me: “it’s not <em>time, </em>it’s not <em>like </em>to do this. I had been collecting my thoughts and <em>trapping </em>them all day, and since there were <em>so </em>many people waiting for Mulholland drive (or so I thought) - pulling backwards and forwards even, cause their breaks didn’t work on such a steep hill. imagined a game where you arrange little tiny (small wooden) houses - on a (card)board, in the shape of your thoughts (ooh - I know where that one is. The board is pink, and the sides are white with blue lines on them. There are maybe some crops of evergreen trees, and other ways to differentiate between where you are, and where you are not.\n@@PB@@\n the other thought that i had that i had permission to get rid of - bad thought about Meredith Blake and then i tried to remind myself that I’d be lindsay <em>lohan </em>in that situation, not shrieking about a lizard on the top of a water bottle. i thought of three points (1. she’s a girl. 2. she has a chest. and 3. she wears a yellow headband in that one scene and I wouldn’t wear one, but i could see someone thinking i could wear one. The thought was about that that was enough to convince me that there was a <em>number </em>and then i accepted it as true, and could move it into my thought

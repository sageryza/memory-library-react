{page:91,type:"abstract",lines:77,date:"Mar 4",text:"up to the surface. (the procedure): think of thoughts - <em>every </em>thought - is good enough is big enough - make it big enough (like GW Bush’s reading program: no thought left behind) (((some of them should’ve been)))-&lt; I guess: the “dance” is in how to do it - <em>I </em>can do it - <em>I’m </em>very good at it - <em>this </em>is the game I would pick in Mr Beast’s To-Be-Gamed. I am Snape’s Hermione, collecting clever coins in a “clever coin collecting” jar - until I have enough money to be disgusted with myself - until money loses it’s meaning, and I can go back to wheating the fields. (but I don’t learn from my mistakes) (there’s never anything to do but wait, and I am always making the same mistake - twice - then thrice - then four times - there is a <em>whiteness</em> underneath my eye that no one has yet believed me about. Here is another example : in order to write something that I don’t like, I must obscure it in (a cloak of) cleverness (tangent: note: parentheses are a pun) so that when I read it, I don’t have to want to tear little pieces of my skin off so I can itch the (non-skin) that’s underneath them. 5. The more strictly you follow the rules, the more you can break them… (ex: non-skin) x break other rules v’\nI suppose I want to write until I no longer feel that thoughts flow out into the sea (from the fish tank (toilet)l 6.1: the cleverness is a series of clarifications. of revisions. 7. Compile <em>all </em>of my like thoughts, and turn each one into an essay (note: the spanish and the indians bred the sweet greens employees) no #: for a while I was thinking about describing things to myself, and i think the answer (cause it’s <em>not </em>generalizations - I prove that to myself about 7-8 times an hour) - the dandelion, and the thought bubble - where,\n@@PB@@\nfor example, the dandelion <em>appears </em>to be a picture, but the <em>halves </em>make it not - the halves, though small in stature, and empty in plot, (unpleasantly?) retroactively subvert x convert - the thing into - until it - takes on the twinge - the tang of a thing that is Not Entirely Real - loose threads of white bearing down on it - drowning it - imply that we cannot <em>know </em>if a loose thread has gotten into any one of “those” cells, and cannot allow weapons to pass through the interior because of it (mixed metaphor x evolving metaphor) (you knew this - why didn’t you know this before). (”LATER”) I guess the hidden mechanism: my allowance - is that I <em>don’t </em>have to go back and make an SBS for all these cleveries, these clever coins - no one needs to know - they have to do the tricks in their head. And once they are done, they are tricked into thinking that I am “quite clever”.- their mind has been frazzled by being so far away from the ground (it was not so very far at all) and in that time (and space) that they were away, <em>that </em>is when they said (or would’ve said): “Oh! this is a trick” - but instead, they simply feel quite lightheaded. (note: Sonia said these looked like hieroglyphics. Note: Sonia lugged out a new journal - she writes in a way where you can actually read her handwriting) and told me she hadn’t “journaled” since 2023 (see - I’m <em>not </em>actually “journaling” - that’s the trick - I’m writing all my thoughts down even the hard ones - but <em>I </em>don’t mind tricking people - in fact, I think they <em>like </em>it.\nHere’s a little curated booklet: Tot: Standing is better (”why am I getting stuff done (finally))← it’s a “<em>mechanism”</em> (hot hand), nick - oh yeah; I <em>can </em>memorize stuff (I shouldn’t memorize stuff. I shouldn’t memorize stuff, I…): here’s how to be happy: find something you like - want something, and go get it (and back←)…(missing)"},
{page:92,type:"abstract",lines:85,date:"Mar 4",text:"SHOWER THOUGHTS: “OK, LET’S MAKE SOUP”(THIS IS, AND ALWAYS WILL BE A WORKSPACE)\n(pic): manually cleaning the gray matter out of my mind (because I was in the shower, thinking: “did I get everything” and now, a retroactive point to this being about nothing…internal consistency…shaping a ball of clay with your hands (brushing my teeth with my hands, scraping off crips of dirt with my fingers (to <em>clean </em>myself (duh)) “I don’t know how literal this metaphor is.”\n(pic: clever coins) (she <em>is </em>a witch, after all (narrative therapy - I designed it - I made up <em>everything </em>- <em>I </em>made up buddhism - I “fought all the civil wars in my head,…”in order,”” ~← the real part is the stickiness that is between them - like glue, or like cum - that I can’t leave all willy nilly on the floor. Ok now: we’ll start at the very beginning (that’s a very nice place to start): The impetus for my shower was the sudden connecting of: the drawings and diagrams I made in that hallway, connecting both of our rooms (a liminal space) on the floor (another liminal space for non-floor sitters) and the ones I”m making today, All the space that is gained by the distance that has caused the loss of most of that memory can be “artificially” filled, with my thing to understand - whatever it is. I was trying to understand, in the “tub.” The drawer handle: “Why was I so much better at studying for that test (according to Nick)?” the “answer” is that I found a way to describe the diagrams to myself that (filtered out all the nonsense) and came directly, specifically, into my brain. Directly and specifically, meaning there is no room for the other two sides of the ellipse - the ellipse itself - only and alone - is enough. Ii think, in this case, the ellipse designed to describe what is in common between the tower building diagrams, which get refined and revised, for my pleasure, ad infinatum, compared to those diagrams, and what they have in common is: ?those loose threads - I thought perhaps they had two things - making way for that uncomfortable diagram.\n@@PB@@\nTangent: I prepared some metaphors in advance. The first one is me putting my glasses away, and all the times before when I noticed that I was “putting something back” in the place where I’d last seen it, or knew it to be, for example - starting with: my glasses always go on this shelf, so now they: go there, to: I once saw this here once. And as a complement, esp. in the garage, I am always looking for places to put things, wondering where their “places” should be…and ending wit - “I always see a chip here on the floor, so I’m going to put it back here. The other metaphor was about the rabbits all named Sophie.\nWELL ANYWAY: I took <em>quite </em>a long hiatus, and I might be able to blame it on getting progressively hungrier - I went and laid on the couch, and started thinking sort of nasty thoughts (I masterbated but not that kind) and <em>couldn’t </em>get up, and finally went inside and got my cod fillet which i couldn’t wait for the whole countdown so I hope it was cooked, and ate it and everything) in a very business like manner, in that - I informed my business associates about the gathering, though <em>none </em>of them could come :( Well anyway - the thing I was thinking about, in the shower\n(p.s. I knew <em>exactly </em>which bite of chip to take, and then, not even missing <em>one </em>beat, I got up (ha! I was already standing) and put 1,2,3 things in the fridge, dipped my bag of chips - it’s like I didn’t even like eating - there was no lingering at the table - no hemming and hawing about whether or not I should really be done.\nlike saving my thoughts from a burning fire - more on that later probably)\nMaking soup - putting everything around - curating - seeing what connections come together (because that’s when I always remember something - I learned this about a thousand times) - I won’t be able to finish my recall exercise, but then stuff - random things - prompt it - throughout the day and I finally do - get to the end…\n@@PB@@\nsomething about -\n\n(missing)"},
{page:93,type:"day",lines:91,date:"Mar 7",text:"March 7\nYesterday, when I could barely stand working, though I only had two campers, I decided, against all that is holy because it is useful, to record some of my diary entries as audio books, so I could listen to them. Perhaps as I fall asleep, and perhaps while I work in the garage. To emphasize things, I read <em>just </em>the Doen dress day (from December), off my phone, to my phone. I liked reading it, and think that I have a good reading voice, because people have told me (Jonathan, that homeless man). I think I will read more of them (for myself to listen to!) and finally, I have a (time- consuming) project that is of <em>no </em>use to anyone but me. I will enjoy them as equally as any other media. This morning, I wondered if the goal of my giant JT was just an instrumental game to get myself to read them back. With reading as a waiting room activity, I was exponentially more able to imagine myself making the stiff, slow decisions I think it would take to choose what to summarize. i could read it multiple times, to make sure I was correct, and I think that is the way. J did some drawings in his weird wax paper notebook of el toro (anger) and el tigre (lust) which were miles more drawerly than mine. mine remain stubbornly in the land of symbols. And it is right that i do only and exactly what I want. “As an example of a game I could play,” I will write down fragments of memories, that will become null and void in about 2-3 days (the time it takes to forget things - a <em>different</em> kind of deadline. And before that time is up, I will assign myself to go back and look at them and decide, like the gray matter cleaning my brain, whether I would like to keep them, or let them go - never remember them again - getting involved - coddling, my brain processes - like J watching me cum, making me cum. Like my mitosis game (for a different reason), and (missing)\n@@PB@@\nIt seems he takes it as a chore now, or a ritual, to recount parts of our date that were remarkable or pleasant. Ashamed that I find his childhood memories interesting. My favorite of his drawings, was his mother, clipping off his wings. So final, perfunctory, unfeeling, the word clipping. He paid for the berry pie with Microsoft Stock (1992?), he said, in line, and (missing) “Daddy making money” he wrote, on a childhood drawing, and he would wake, with sunlight coming in, to his dad, clacking on his keyboard. it’s frustrating, if not scintillating, or enticing; I have a textbook written about everything he says to me about art - reframing Art21 (missing) (Would it be crazy?) It would be crazy. And yet, I might do it - introduce to him again - the booklets that he discarded - did not care for (missing) I would’ve been frustrated, waiting for him to make coffee, had he not apologized so sincerely. I laid on the couch, like a cigarette, not quite ready for sleep (in how my clothes clung to me, and how I was straight).\n@@PB@@\nFrom the couch, you could see the leaves on his big tree, that I had been staring at while he napped, wondering if I should want to paint them. But they were out of alignment, or that is what I figured out later, once I had figured out this theory that I’m going to show you, but after I have laid out all the pieces so I can think of them again - like soup - like a mess ?the question? why would I want to paint one thing, and not another. The leaves, they were pretty, but there were too many, and they didn’t mean anything. Perhaps they needed to be declined, like the petals of the daisy, Jonathan was re-drawing - like the copy cat game, that I designed, that he designed, like buddhism, which was thought of, and I thought of, and buddha thought of. However - there <em>was </em>a view, if I were to have turned the tree, in which everything would have aligned - and then - every piece - every leaf (and connection between leaf could’ve meant something - would’ve talked about a concept in my mind - would have an anchor point so I wouldn’t get lost. And perhaps this cropping was only so I could see it temporarily, only necessary. However, I got the word alignment from earlier, from when I was thinking earlier - supposing that nothing meant anything, except at one point, one moment, when everything click into place, and then everything means everything, or something."},
{page:94,type:"abstract",lines:16,date:"Mar 7",text:"<strong>LATER (TIME/SPACE)</strong>\nI’m so sick of not knowing how much x how to like my little diagrams enough. Like the page that has: me exchanging a nickel. I want so badly to draw more diagrams, but there is simply <em>no </em>system/automatic procedure with which to decide which ideas, or thoughts, or moments get captured in a drawing (because there <em>are </em>so many). Perhaps I could go sit somewhere with extraneous rules, and read through it all, and make notes “in the margins,” and then go back and do it afterwards. Perhaps, then I could treat it like the clothes, whichever ones I don’t feel compelled to draw (wear) (that are left at the bottom of my long, wide, shallow drawer, I can then discard…It started when he was describing himself on some trip with his family. (missing)"},
{page:95,type:"day",lines:15,date:"Mar 7",text:"like dancing all night, with stars in our eyes. Before he came, his body got all stiff and hard and squirmy. And then the cum, to prove that it was real. And I <em>did </em>feel powerful, and it <em>was </em>a mechanism. And he <em>is </em>always begging to touch me, to make me cum, even saying it would make him hard, to see me cum, and i think I can tell how much he likes it. Somehow it feels like every time is different. He’s always trying new stuff, like teasing me with my tongue - making me lick his fingers to show me what he’s going to do. Mechanically, idk if it works that well, but his creativity - making me apologize, when I hain’t done nothing wrong - brutal, but got the job done. I think if (missing)"},
{page:96,type:"abstract",lines:99,date:"Mar 7",text:"(missing: (was there supposed to be another analogy with the two recrops?)\nThe intermediate stage is a hidden mechanism - even if I don’t <em>have </em>to list all the crystals - should I change the rule from work smarter, not harder to the opposite? I like (?) working hard - doing repetitive tasks - manual labor - could Ana teach me that? I think this relates to the soup\n@@PB@@\nthing, and making messes, like I somehow think that if I lay everything out on the floor (and it’s true, though) in front of me, then out of the ashes - I will gradually start to collect things like constellations (with my mind) - and make something - they will coalesce into something. You spend your whole life proving that our brains don’t work (ex. I was stood, stalk still, waiting for a. woman to come at me, I knew, but my mind couldn’t be sure she’d change her trajectory, at the T intersection - she could walk through plants - step through my<em> lemon tree (</em>artistic license” is actually a rule)\nMy grandma always used to say ‘use your artistic license.” I know she was trying to be nice - letting me off the hook, to do whatever I wanted, but what I wanted was to follow the rules/, and for there to be rules), (I love rules). However, I think my OCD jew mind has come up with a way to understand it to myself - it’s <em>not </em>a cheat code - it’s actually that you <em>have </em>to break the rules. (And this refers back to the “drawer in the dream” phenomenon, or more like - dream logic - or more like - things in your mind <em>look </em>a certain way (and have to, in order to get ‘made in mind’ stickers slapped on ‘em. (and they have to get the stickers to get through the metaphor machine I think&gt; Which are: the rules of the mind - No extraneous information - things that are made in the mind <em>do not </em>have extra details - every detail is for a reason And anyway - like J said when he deleted the unwanted chimney, and clarified the structure by making it wrong (lying is <em>so </em>hard for us) and when I delete extraneous details\n@@PB@@\nlike who’s tree it <em>actually </em>was - because it messes with the mind, which brings us to: when it’s right to use wrong grammar, and in order to do this (arithmetic) we need to imagine the existence of an additional structure when we are talking to someone - to formalize it - the logic of the mind. Perhaps it is a bit like physical logic - you can’t do something to a post” without first having the post. SO, when speaking, you should let the person imagine, first, what you’re talking about, and <em>then </em>begin to modify it - a post that was made of bricks, that stood 2 feet off the ground etc. with a square flat on top, rather than adjective first. This is the only example I’ve thought of - I assume there are others - other examples of when, though it makes logical and grammatical sense to phrase a sentence a certain way, it doesn’t “agree” with the mind - the way the mind works - the stages the mind goes through to understand something. And so <em>if </em>we are to understand something like a great text on literature, a smart glasses wearing professor, is performing this extra step, this hidden mechanism - translating, with every word, just as a mathematician simplifies equations so they resemble the familiar ones (25x4=100), relying on, calling upon, familiar concepts “ah - this is like this [very much known about thing - thing I am familiar with], moving the order of the words around. It’s a little unfair (”) to expect a new reader,\n@@PB@@\nor someone not familiar with the field, to follow - they see the expert following with apparent ease, and try to mimic this ease, but they don’t see the translation occurring behind the scenes.\n(continued from before)<em> and get me, and I couldn’t, it appeared apparently, look away, until I was sure this was not going to happen, until she turned. Anyway, the point I was making was just (tangent:) it’s remarkable how similar this is to taking out and cleaning up messes - just thinking of how - I put things on the burner to think about later, and then, when i take them out again, I have to take out </em>all <em>the other stuff that relates, </em>before <em>I can even start working or thinking about it. And then, when I’m </em>done - I have to clean up (cause my mind gets messy.). I feel like I know what the process of cleaning up mind stuffs feels like, but it might be fabricated. Idk - my room feels messy right now, and it’s bothering me - I wonder if this is how my mind feels. I guess, I assume it’s the same (of course it is (?)) as (me) categorizing stuff - and like I was thinking before - I’m worried I’ll be unaligned with all my categories, when I go to Hawaii, It’ll be hard not to get all these old feelings back (missing)"},
{page:97,type:"abstract",lines:105,date:"Mar 7",text:"(missing) walking on tiptoes, on egg shells, in my own heart. I had a phase of describing everything to myself - all the counter-intuitives - everytime there was a snowball effect, or a threshold. I told J about the first time I took mushrooms, and how my main experience was that the categories, which often sit queenly in our heads, with cobwebs, not having moved for 100 years, were then busting around like a roller coaster. I used the coin being sold for money as an example - his “6 principles of money” or something - he is smart right in between my two ways of being smart - saying the I guess underlying assumption that ends up being interesting, in that it is thorough, or true etc. Fungible etc. He took an econ class? idk. A coin for a coin makes the whole world fungible. I wish I was laying in his arms watching airplane, instead of getting knee deep in this stench of sweat and regret, pre-regret - worrying about all the things I should be doing, (missing)\n@@PB@@\nTaking stock of the <em>whole </em>pattern. I don’t have to abash myself because I <em>do </em>get back to the pie eventually, usually…like - organizing my mind - it’s a thing that I do - that I need to do - it makes me feel better, and here’s a structure - some of the time it’s real (actually organizing), and sometimes it’s just the perception - a ritual. How do I know which is which times? it’s about the amount of bluebirds in a tree at any given moment. I’t snot unknowable, I <em>just </em>don’t know it, and <em> don’t know </em>how hard it would be to know it. I had some ideas. One: print out all the pages and manually cut them up, organize them in to categories (on my rug?) and paste them into another notebook, as though I can’t be away from a notebook for too long. “welcome to cuddle palace, where cuddling is our passion” :/) (ha.) (missing) The other, which I imagined between/amidst back pain and staring up at those leaves, as if we’d been outside - was a (pic) book, with drawings on each page. i tried to figure out why I had such an adverse reaction to putting them on cards, and I came up with that there’s <em>too </em>much randomness, and I could have mommy shuffle the deck, and take the order as law. It would make sense to do the set\n@@PB@@\nthing (by the way - the question was - what to do with these diagrams - how to use them, appreciate them…I need to arrange them into relationships with each other - a triangle - a venn - what do they have in common. I <em>don’t </em>know if it would work, so I don’t know how much or where to put the effort into like J said about his green table which I thought was good, I thought. (missing) (on the other side of things - my allowances - changing the order of a sentence if I can’t remember the other half, writing in diagrams or code so I exactly don’t get bored - it turns out I have a good sense of when I’m going to get bored). “Now I’m going to do something I’ve never done before…try” (-Jim) - write what I already recorded with my voice. One: my dream (missing)\n@@PB@@\n(missing) Oh, and the other thing I thought of, besides the intermediate stage, is: (”insert that unfinished, but nice diagram with the rolling chair in a half circle (it was a last to leave video - but never been done before with a half circle). And then, remind myself of - two days ago - the lag of categorization - an essay I wanted to write, but couldn’t think of an example of and the example being, i think: I considered <em>something </em>perhaps the religious fervor with which I have (now) been including my stems, my seeds, my pre-tots - and called that “beautiful,” and - what’s nice is - I figured out the mechanism, and it (retroactively) gives a reason to my “shifted connotations” which originally assumed was just an annoyance - shifted connotations - ok fine - as soup - the thing you thought was art - what you were putting in that category, or to speed\n@@PB@@\nup the process - the list in family guy, which defines the category/parameters <em>very </em>quickly, by giving on item, then rigging on it, to show the potential (this is a “progressive” version of simplicity/complexity fisherman - then comes back around and undermines it (what the hell?) a snippery needle fell into my shirt (because I found it in my sock, and was too curious to see what it was to stop it falling down, when I got my chance to look). (tangent: the pie: I identified a phenomenon (and thought: Oh, not another thought again) (pic) - I <em>only </em>like eating pieces of things (I <em>always </em>cut my pie into a mini pie) and preserve the integrity as long as possible, or till the very end). (pic) so: to finish - beautiful <em>always has </em>connotations, and so - I just needed to capture them and artificially cover them onto the thing I was thinking…I wanted to stress the importance of including the Tot, and beautiful had powerful connotations - it’s not just “power,” there’s some additional rules like ?opposite? - a container so you <em>know </em>the rules are super-imposed - I’m not <em>sure </em>about that…"},
{page:98,type:"abstract",lines:28,date:"Mar 7",text:"In Bed\nThe exercise proceeds as ever; I am tired, by my ambition to methodically transcribe every thought that crosses the path of my mind remains steadfast, perhaps grows more steadfast, as each day, as each hour progresses. On some things, I wonder if I want - not to write, but to mediate - and - in writing, I give myself permission to imitate meditation in at least one respect. I am no longer so foolish to think that: worthy alternative would be will - instead, I see myself immediately setting to work on an alternative, neigh additional, autopro - a game to play, whose strategy is the goal - of meditation. My new thought: the backside of our iterations and sundry, may also “antithesize” my smart professor essay - in that, each iteration means another hidden mechanism to be unwound, as if from a spool. And so: an erotic novel would have long descriptions, if only to prolong the imagination at these certain particular parts, analogized by J’s exercise in which he invited himself to vary the tempo (- to work on parts that needed more work I would not tell someone this. I would not think it is interesting enough (and I would not give 6 uses of money (dragon’s blood) - I would only - as in second grade - want to say something that had <em>never</em> been said before. And I think these are the only things I say)."},
{page:99,type:"ideas",lines:31,date:"Mar 7",text:"And also: circadian somersault. Recreational Metaphor (band names?)\nThe Tot that I recorded on voice memo was about (pic) the smallest size box, which I have drawn, it seems, too many times now. Three reasons to use this size. 1 because of what it has in common with a fourth quarter - i.e. it would not exist without the other box sizes, and their relationship to each other. 2. It accidentally has a place for a label. And anyway, what I <em>wanted </em>to use it for was to put the different kinds of time in - one, being the kind that I thought would help me complete certain specific tasks, i think such as: reading through my entries, and looking for, and finding: things to abbreviate - things to summarize, things to illustrate - things to attach to each other, and things to renovate until they coalesce into a coalescent structure. and so, this time - found, I think, in hotel rooms - because the possibility of doing something interesting makes the time more valuable? Two memories, and the latter is related. 1. David and the green zebra, his weird combination of pride and humility. 2. That hotel room in connecticut, with Alpha - I think I invited some men in - I think we went on an adventure - what strikes me is them being there - and we - the large bed - the larger space around it - going out the screen door - and I was surprised to find it simply opened onto the rest of the world - large grassy knoll - not to personify it as sprawling (that’s important to me)"},
{page:100,type:"abstract",lines:80,date:"Mar 7",text:"something to do with a plastic bag, so probably drugs. And of course, me seeing that they were out of place. Was I grateful for them to be there? Did I want them to leave? Did I start on one of my little adventures and then get too caught up, and want to end it (I used to just let the wind carry me. And now I don’t do that anymore. I make decisions, and <em>choose </em>what I want to be doing at any given time.) Jonathan says that I discovered Free Will and (will), that having discovered it - I now have trouble with will. He’s right, but I don’t know why. It seemed he was easy and solid as stone, for seriously conjecturing on the subject; for coming to me with his idea; like a surprise that keeps happening. In any case, once I had thought of <em>that </em>kind of time - that always has me imagine myself, parked at a standing desk, with a green glow light on my face - something comfortable - a couch chair - red probably, with fuzzy exterior that seems comfy only when not zoomed in on. In any case - there are <em>other </em>kinds of time - not so much that they were a point of interest, but more so that I felt foolish having neglected them - like the sun circling us. And so - perhaps I identified a few more. i suppose the antithesis - the way the day goes when I journal all day long - things in my room - every ounce is used up - I have\n@@PB@@\npleasure in it - I know how to like this time - <em>now </em>is the time for going on my walk, and then, if I am lucky, which is <em>everyday</em> I can go out, venture out, and find something <em>nice </em>for dinner. It could be Kazu Nori - I used to walk there. If there is any <em>extra </em>time, I can spend it so nicely, by getting pie at Erewhon, or a cookie at Bristol Farms. This isn’t the frivolous joke that it sounds - it’s <em>another </em>frivolous joke - one pre-considered. Frivolous on purpose. In any case - the time never feels to be a wide-open expanse. Or maybe it does. And then there were the eight minutes it took mommy and I to get home from the Parakeet Cafe, and the one minute I sometimes save or lose on google maps which is even longer - that minute costs 80 miles per hour. Anywho - all these kinds of time fit into that wooden chest (of which I’ve already defined the qualities which make it exceedingly sufficient for such a task). And the label: “kinds of time” - this all as an example, a manifestation, of Plato’s forms - the essay on quantum concepts I didn’t deign read on gmail (I only read art in its own terms) (and my own diaries) Together, they form a concept - of different kinds of time. Together, they decline, in the box. Some are bright hallucinated yellow, others are bright white, or mint green I suppose. The one I was describing is hallucination yellow, I quite like it; that’s why I like it so much. And then, a last thought - to boost or burst my bustling ego: I don’t know if i can quite\n@@PB@@\ncommunicate it (without managing to gob smack, with my indolence (not the right word)) but anyway, I’ll try. The Play concept (a new phrase that I <em>just </em>invented - will it become part of the lexicon, or never seen again? I find I do not care) A philosopher - a man with a nice man’s haircut, with the face of a philosopher - haggard, in a brown maybe suit, giving a speech. A thesis, an essay - a new topic. And here it is: the thought. I could (and others) <em>give </em>a speech - see - my mind simply <em>imagines </em>things that way - the way a thesis is written is Simply) the way a mind my mind (or others) - thinks of things - slowly all the hubbub, the hullabaloo. I think, if I started speaking, I could, I would, come out, with a bubble soap) a fully formed thought, complete with thought beginning and thought end - and I’d always researched it - in my mind. The time thing, for instance wouldn’t it seem researched."},
{page:101,type:"abstract",lines:31,date:"Mar 9",text:"March 9\nNow, I was thinking - I have my things to collect I thought all was hopeless, but then I can build a tower by collecting all of them…And so, here’s one: when I was getting out of the scanner, my shoe produced a single gray rock and it solved the issue the other day of there being too many stones, when i was on my walk with mommy, and I thought there was a certain stone, but I just needed rules. The other thing I wanted to collect (but I <em>don’t </em>know the additional example), is the menswear thing, which I don’t have enough examples but I don’t know if/what the perfect number is, if there is one. And here is one that sprang to mind - all the examples, as though it was fully formed - mommy and I - is it towards use or (oh :( now I have to collect all the examples again). When I was in the tunnel, and I said: no, no thinking of that…and what I<em> was </em>allowed to think of was: how nice I was, how happy I was, that someone had fought off the light problem (gps). I thought it was only a flash, but it continued, as though proving it was real to me, or to the point of comedy - flashing back and forth, as I went through a series of tunnels. It could’ve helped my thinking: back and forth - light and dark…oh yes, and we found examples, with Rachel and Hunter, of things that were dark, and she admitted she didn’t <em>know </em>exactly what we were collecting, that it was changing - the dark of a whole being dug - getting progressively darker…was her admittance the best"},
{page:102,type:"day",lines:92,date:"Mar 9",text:"part? Trying to figure out what made that beer dark (and special) Negro Modelo. The efficiency, as if we were collecting instances of efficiency, of him, then, having been held, and then asking me if I wanted to be held - did <em>I </em>feel better - the thing in question - the whole thing - was only a quick part. Cause I was shiny, and, I was crying, literally crying when he called me back. He brought over an Iris, which I put directly into my last green water bottle. It was beautiful in the morning. I didn’t realize it was purple…I took a picture of it before I left. And we had a two minute clap, for lindsay, for being trans. And then, when he wanted to leave (how dare he?!) I went into his basketball hoodie, and I was the ball, and he was the basket. And he made up a poem, and said “I love her so,” as a second iris. “I am the basketball, you are the basket when things get better, it will be fantastic.” Anyway, he just needed to be held. And I was too small to be holding him but he said he felt better after. Now I can tell him my thought, that he was hesitant to tell Ana - that the ?15? year old, sitting between M and D, was hot. Our little “problem” - would it have been better to have the cat still in the bag? Not for me, or for him, but for everyone including me and him. that, when they offered to smite him(?), I said no, because I didn’t wanna think he was hot. Last night, when I got really mad, I started\n@@PB@@\ngetting mad at things I’d never been mad at before…that I had to naughtily take a hummus from the fridge. That the borscht was so read, and it had so many things in it that I never got to discover (one, by one). And a handful of shreds, a burnt quesadilla - I suppose it was the gaslighting “oh - it has beef broth?” yes, and that has beef in it. If I were to get down to it, the argument would be as sharp as a tack, and he still might not see it. Tonight, I will talk to him, and tell him I can’t tell anyone anything - that I was nervous for the trip even <em>before </em>my interesting(?) - look - it’s in the dreams! the dreams will tell you if you don’t believe me, it’s proof, the facts are as cold as soup I might leave out - a metaphor that’s not very good - like le metaphor incorrect. last night I was angry and sad, angry and sad (or tired? idk) (the sunshine helped, I think) The journaling is so i can say what’s true somewhere. My theory was that I had to punish myself “expect the worst” means I’ve <em>never </em>congratulated myself, or accepted a compliment - the PWC, which <em>everyone </em>liked at the party, which <em>even </em>lit up their eyes was thankless work - why would I <em>do </em>something for you when you’re so ungrateful! I need Ana to invite me to believe that I can be nice to myself. I was mad, already, because I threatened, no matter <em>how </em>much sleep I got, to be unhappy on the plane - mad about my back, and finally all the perceived threats, getting up my guard, for what is surely to be a barrage of\n@@PB@@\nsecret, hidden attacks from Sandy and Skye, mostly in the form of laughter. <em>This </em>is the soft underbelly of my heart - nothing less will Jonathan except. I don’t know, anymore, what is real, and what is not. his poem confused me, because I thought - could mason write that? Could evan? Surely not. It was a relief to tell him that I hadn’t slept, and for him not to be mad at me. Even though he was “2/10” mad at me for something that was stupid - for something that was not. Hard to perform intricate operations-like therapy, when there is the violently matching and sleek outfit of two flight attendants - emitting sounds like a whale - pacivities - the activity of pacifying. When removed from any actual pacification, is an act - only- like a bridge - free flowing water, that can be seen from a bridge, but so far down below, that it is easy to say: “I don’t <em>care</em> what direction the water is moving. Anyway, back to the Borscht - Hunter talked to me about designing his own pamphlet, and I got to see the light of possibility in his eyes, second only to the look daddy gave me, that I missed the ending of because I was putting on my hood, when I told him I’d lost a pebble from my shoe, because I was looking for something. He helped me until he found out what I was looking for. Then the light, of dawning uncertainty, when I said I was collecting it - pebbles under my shoe."},
{page:103,type:"day",lines:83,date:"Mar 9",text:"I want to chase that high - I want to tell Ana (who is one of my least favorite people) that I want to do it <em>nicely </em>this time, without a <em>mean </em>pounding to my heart - i want to sit on the couch, and somehow produce the miracle of <em>still </em>wanting to make stuff happen…it might have to do with keeping promises to myself. it might have to do (or!) with the promise I made myself all those days I was working in the garage - after this, you can <em>stop </em>- burnt out, but not from college (no - thank god I am not that simple) - I am my own fire fighter - a fire fighter that <em>lights </em>fires instead of <em>lighting </em>them out, and I simply want to sit on the couch <em>not </em>burning. Why would I be nice to myself when my fire lighter is so cold - as I’d be as a boss - a boss I’d like, because we’d get stuff done - but <em>what </em>about nice <em>tea </em>and cookies - shaped like teddy bears - giant teddy grams, and I think it’s alright if they don’t have enough butter. Perhaps sometimes - this time - maybe other times - it is alright - whether it is - this plane ride - tired, back sore (but not <em>that </em>sore) it is alright, and I don’t have to laugh with him - that is the inner light that shines.\n@@PB@@\nI allowed myself to bring my best journal (with some safety precautions) because I knew i could take care of it - like a second skin, that I was carrying with me. And I can keep my diary chronological, and add the nice ritual sticker like smiling as I sip on tea in the morning, as the sun comes in (Hunter asked me what I do in the morning. This might be the only question that I like. I almost <em>didn’t </em>have a crush on Jonathan yesterday morning when we went to get bagels and he was looking <em>so </em>fat, and <em>talking </em>about being fat. And so, this is how I am going to lead my entry - draw myself <em>back </em>to the events of last evening - the label maker, for example - letting myself off the hook…easily - like intermediate stage, as if there were someone else there, who wouldn’t understand if I didn’t spell it all out (for myself) (note: I feel guilty <em>all </em>the time, for writing in my journal, for taking tiny sugar packets of thoughts, and pretending they’re going to turn into something - it’s all part of a larger puzzle I’m solving - everytime I use the “red car” mechanism I note it - set it aside for later - I haven’t used it yet in my mind I don’t think). btw, J says I am making him smarter and better at art. But maybe it’s the guilt that propels me, sustains me, maybe I can elicit the same look I saw through my hood - when I say that is my goal (to ana)\n@@PB@@\nThere was: the incident with the purple thread. What I did should only have gone in my journal. She wanted to floss her teeth, I offered her thread. Earlier, she had commented that she liked the purple. I had a crush on her - she was a <em>vision </em>- Amalia - when she walked through the door. She shot my carefully constructed over 29 years of life, self-esteem to pieces, and afterwards, I had to recollect it, to collect it, in the bathroom - I didn’t know what had hit me, what had happened to me. And perhaps it had to do with the practicality of her clothes - leather beige flats, straight pants and straight hair, that “chiffed” not crumpled when she walked, or she was always (stalking), like J ambles, like Sean bristles. (pic: pink, purple) “it’s next to the pink” she said. And later: “I didn’t realize that one was purple. That was after I said, gave her the wrong one, and said,” no, this is a punishment.” (Ah - something nice is happening - they’re “cookie or pretzeling” down the aisle. I chose cookies. The teddy grams of my dreams! But nothing will beat me ordering tomato juice for Sean - that’s one of my favorite<em> memories </em>shifted connotation, lag in categories. J said (this is my <em>only </em>entry point) and maybe it’s actually a trauma bridge to get over) the meadow seemed nice but the ritual was stupid. And that was the thing - like - did he <em>really </em>have to write down the ritual."},
{page:104,type:"abstract",lines:76,date:"Mar 9",text:"I suppose the “main mechanism” (it’s really not hard to make up terms (when you know what you mean(?)) didn’t work - Amalia popped off 4 of the paper papers, and Hunter did the rest. I suppose the alternate mechanism (like an alternate in basketball) was the poking the wire through the apple, and how little anyone cared whether it burned when we were on the balcony, and, as though Mason were <em>also </em>the witness, he refused even once (not exactly truth telling - the missing chimney - a long string - like a kite tea bag ) (pic) to help light the fire - almost hostile, as if his complaining his finger was getting burned, not a complaint that did anything, more like a whine, as if a small child didn’t get enough cheese chunks to go with her bread chunks. The “connotations” were shifted because of the moment, the experience, the threshold was lowered - Mason didn’t care, and we were all looking at him - that was the magic of the moment - that he retained his power. Then we buried it in the meadow, and my favorite part was that it got buried <em>right</em>, and quick - that you could not see it <em>at </em>all anymore when it was gone, it might as well, we might as well, not have been there.\n@@PB@@\nso many thoughts in the bathroom, none of them interesting, but I’ll see if I can recite all of them <em>not </em>as a test, but as idk - recess. 1. An example <em>of something </em>(a very good joke): the fingernails, the hot sauce - instrumentalism, the coat rack - stealing something on a place (as an example of something) - Tot - handbag sign - eroding the category - the Tot was an experience - Oh! now Tots can be an experience. Well…art doesn’t <em>work </em>as well anymore, just like “woman” doesn’t work well, with trans women - you can erode the category, just, know what you’re saying goodbye to - the concrete bounds (ex. the prunes to - cause I’m hungry - not (?) - (”should I wash my hands?” - it was nice because my hands were cold. And example of (AEO) instrumentalism (why would someone bring their purse to the bathroom - who would steal on the plane - just sitting there - guilty for the rest of the flight - the worst part, prolonged like porn. This morning, when I was getting ready, I allowed myself the privilege to switch back and forth between tasks, and that helped - socks - ok - now I can think about which packages to send - allowing myself to be distracted. In the bathroom, allowing all the stages of grief that they didn’t have toilet seat covers - even looking behind the lid <em>twice </em>(for two different reasons)…the book I found in the bathroom, and before that - <em>what </em>is the point, of <em>so </em>many poetry books - no <em>one </em>cares about them - I would care about them <em>just </em>so I can believe that <em>mine </em>will be cared\n@@PB@@\nabout, if it is ever published eventually. And here I was, making a book of poetry, just to “fit in” - “look I can do that (well now - that - something that’s completely useless) oh) but it would be worse to make one that really tries - “this one’s” going to be different. (Because then it would be all the same as any of them - they’re <em>all </em>trying to be different - in fact, that might be the main thing they have in common. But unluckily, I’ve already learned this lesson - that chain letter I sent that no one passed around - or - is it the opposite - stealing the stationary from crossroads.\n(pic: “saul, ok I couldn’t find my long needles, but I did find something else, the gendered act of sewing, their shoes looked alike, but they didn’t care, the pot of hot cheetoh mac n’ cheese ([not pictured] I had to leave the room when saul brought out his mask)."},
{page:105,type:"day",lines:41,date:"Mar 9",text:"(pic: hunter wanted to make his own, i gave him robinson chen’s personal landline, taht he only answers in bed. hello! robinson chen, robinson chen sleeps alone.)\n(pic: both of the votes ended in a tie, and the other paple was just for choosing between, having something to.\n“imagine what this night would’ve been like if it’d been Hamster” (wistfully), and Amalia started telling all of her hamster stories\n(Mason had to be the tie breaker, even though he didn’t wanna be)\n(pic: looking at the book in the bathroom. (it was a bathroom book, and then I brought it out)\n(pic: me, mason, hunter, looking at the weird poster that didn’t make any sense)\nRandall said: “you’re not taking this very seriously, are you?”\nSaul brought <em>even more </em>diet coke\nNick told me it was a hot deal ($20 for 30 cans of PBR - he wanted me to know he didn’t think he needed this much)\n@@PB@@\n(pic: beets, but no beef chunks, mason stirring the borscht that I couldn’t eat. the orchid that J got me (I didn’t notice it was purple till the morning, to be purple, I made myself a burnt quesadilla on the stove (pre-burnt)(pan was already burnt), the three boxes of hot cheetos mac n’ cheese, me trying to wrap my hands <em>all </em>the way around him, fighting, feeling better, fighting)\nThe part I forgot to include - “what’s worse than looking a gift horse in the mouth? Looking in the gift giver’s mouth” (pic: here’s a horse as a gift, can I look in your mouth, hmm)\nLindsay accused me of being a pedophile and ended up incriminating herself. evan soft-launched the fact that his top four bags were stolen by letting me read his journal. Evan seemed actually <em>really </em>sad to be saying goodbye to me, which was ?nice? I took his hat as a bit, and he didn’t ask for it back. When we hugged goodbye, Lindsay was over the top mocking us “omg hug hug hug kiss kiss” making kissing noises and evan thought it was really funny that that would be our last hug, and wouldn’t let us have another."},
{page:106,type:"day",lines:67,date:"Mar 10",text:"March 10th\nAlright - I will write - out of obligation - out of guilt? Dumbledore’s socks - alternate interpretations. I’m worried about all the towers I’ve built for this JGT - crashing down like the rain, threatening to destroy my diary - the integrity of it - because I do not care - about the dots. Always looking under, beneath, below (like adjacent to, but not) - the underlying assumption…I was thinking about Maddie - or put her in some sort of place, and I’d adopted her rules - or those to make her think I was normal, which for one single moment (person) were the same as being goo. Dumbledore’s socks (()) → le petite pipe my original interpretation was different, was better. The feeling of everything expanding, and/or crashing down on me, or on itself - Tot: “maybe if I write well enough, I could get as good as ayn rand, who mommy read in high school and thought was simplistic (effortlessly accomplishing my (()) → pedophilic task. (which I realized I found a loophole to write off because of all the other things I had written off because of him (the last thing to check is the underlying assumption. Anyway - to finish. I don’t want what they want, what I want. Oh yes, and that was the roller coaster.\nthe dregs are taking power. Last night I imagined, while being happy while being sad - there’s really nothing that is the point, that is wrong, and the upsetness is fading like powder into milk. I could tell them (him) the shape of it was replaced (park bench, tree). A bingo card ⇒ advent calendar ⇒ bird house, with matchbox pattern collectors in/for each space - I could throw tiny silver things, like beans or darts at each space, when I think of an example of the concept. The two examples this morning - the house keeper, who knocked thrice but didn’t heed my nonchalant\n@@PB@@\nwelcome or protest (I would’ve decided retroactively, had she heard me). Her sister was from San Diego, but she’d never been. And she kept telling me not to forget things like Sandy’s room key, and Sandy’s money, but she finally got me with my phone. “you got me” I said, smirking at myself, chuckling at her. It was on the edge of the white bed that was flain and placid. I decided last night that I could practice making scenes - I couldn’t get his shirt off; get him to take his shirt off, so eventually, I finally, because he was threatening to leave, snuck my way into his shirt, but then found out I was allowed to be there and kissed up - imagine kissing down. Doing things through a hood - the (()) we didn’t know we needed (daddy - shoe - pebble). And the other - in line - getting my banana pancakes that was evidently the only thing I needed to be happy. I tried out being unhappy - as a novelty - but it didn’t stick - my fineness was too ingrained. A boy who read the menu, and his mom laughed. I laughed too, because of sardony, but then, I became a witness -? part of the situation that I was “laughing at.” And so, it was an example of: irony, and accidentally endorsing things you hate. I didn’t need an example of that, to put in my bingo bird house with silver shells thrown majestically at it, but now I have one."},
{page:107,type:"dreams",lines:16,date:"Mar 10",text:"I dreamt that Evan, Maddie, and Lindsay and I were at this flower market stall - dim, kind of a whole in the wall that closed with a wrought iron gate when I came back without them to buy some flowers. i wanted to buy them when they were there, but didn’t want them to know how little money meant to me, so I came back after we all said goodbye (I think it was Lindsay leaving for a long time). I made a hilarious joke - that i could just buy 1600 seeds (for the purple flower that looked like an upside down umbrella) and plant them everywhere, that I didn’t feel got the attention it deserved. I wasn’t mad, but I kept thinking of the number 1600, and how funny it was.\n(pic: purple and some peals on the other side, and closer together, green)"},
{page:108,type:"dreams",lines:38,date:"Mar 11",text:"March 11\nLast night I dreamt that there was a guatemalan girl who handcuffed herself to a moderately attractive white boy who had made some not funny racist comments that fell flat. When I looked back, he had come to her side of the table and it took me a second to realize it was for the ease of the handcuffs. She herself had a Julia-like body. And was vivacious, and innocent.\nIn my next dream, I was driving past a house on the other side of 17th street where bubbe was sitting on the lawn and I begged desperately M and D for us to get out of the car (we were about to drive past). We stopped but I couldn’t get out of the car\n@@PB@@\nbecause I wanted to hug her. She was saying that she had tried but hadn’t quite found the way to (missing)\n <em> </em>\nought I to write the drim dram of the day? The island spirit has taken hold or perhaps it was just my not-bad convo with Jonathan. And now I am thinking about no one - not Charlie, not J, haven’t remembered grant except to remind myself that I hadn’t. Wished I could read something boring, so I guess I’ll write it instead. Mommy and I had an unpleasant adventure - first it was raining, and a fence meant only a round about way was available. Finally got a good night’s sleep which means my emotions - I see them, but they do not attack me - I suppose I exist like a measuring cup, and the top line is above my feelings. Mommy didn’t want to look around the shopping center, cause she wanted to see Sandy. There was a big line when we got to little fish coffee, where I never wanted to go - I woke up wanting to have a papaya bowl at the hotel, and write down my dream, and yesterday’s dream, which I described to J on the phone. Though I’m wearing my hawaiian shirt, I suppose I should remind myself that every problem that I was worried has come to fruition. The"},
{page:109,type:"day",lines:19,date:"Mar 11",text:"weird underhanded communications of Sandy and Skye - perhaps I am not white enough to want to participate. Skye argues with <em>everything </em>I say, in a passive aggressive and underhanded way that she is a polite, pleasant person. And now J wants to go surfing with Sandy. Will the torment never end? I suppose I will need to move to El Salvador by myself, and spend a whole 20 minutes in the waves, bring <em>nothing </em>but journals, and work on five at a time, to finally be free. No relationships but a series of acquaintances with clasped hands and my deepest most intimate relationship with a monkey. Ii see my family from where I am - Sandy is on his computer, daddy has been standing the whole time. And the group chat is saying they are planning so what jealousy evaporated into vapor.\nDo I recount the mundanely boring elements, as a testament to the spirit of vacation the induction of shaka?"},
{page:110,type:"ideas",lines:26,date:"Mar 11",text:"TIME/SPACE\nI went in the hot tub and tried to think of a story I’d like to read. I knew the rules - things don’t just come to you but the word concierge was nice sounding in my mind/mouth and so I thought of the night concierge - she works as a concierge in one motel during the day, and then another one at night. The people are mostly the same, but they are slightly different (and she describes the differences intensely, because that is what she is interested in because that is what she has\n@@PB@@\na lot of time to think about (salt’s cure at night) (ai - roald dahl boy illustrations chatgpt vacation short story but they wouldn’t have something as nice and as interesting as the guy in the line) got to think about towers with the bubbles in my hands.\nMe and the girl in the pool both started standing up and forming narrower and narrower concentric circles, and I thought: “because I was the first one in the pool, I get to set the rules for the pool.\nI need a new euphemism for “preamble redacted” so I can write the little (sticker) thoughts. Seeing all this new foliage makes me want to classify it, but maybe I should do it as a ritual. (pic: you must walk in concentric circles)(pic: this plant is red and green.)"},
{page:111,type:"day",lines:13,date:"Mar 11",text:"TIME/SPACE\nI categorized my second plant. It was a smaller version of the other plant - green and purple with whispier, paperier leaves, like romaine lettuce. I was thinking I could replace my projects with this fake project. I was thinking how I always think of little things, come to little conclusions, and now I’m going to, and now I’ve started, writing them all down and maybe how older thoughts, or if you’d complete the game, and the synthetic process, conor + charlie → fruit - eating a whole apple “mixing the ‘synthetic’ and the specific,” a game just needs to be fulfilled and you can plug in <em>anything, and</em>"},
{page:112,type:"abstract",lines:69,date:"Mar 11",text:"you would think it wouldn’t end up mattering, but then the kaleidoscope can shift, and suddenly you’re on a bus with whatever you packed that day. The procedure of going to each part of the pool - the ritual of checking it all out - a different view of the progression - others want to go to <em>different </em>restaurants, but I want to start with the one nearest us, like learning happy birthday on the ukelele. To go back a little, to around where the ^^^s are: (just to explain it better) oh but and: mommy wanted me to get in the pool, but it was too much like the buffet at vegas. I said “it was feeling too much like a contest,” and (but): she didn’t hear me and said “you chickened out?”\nI thought earlier, how: well, when I thought of the ambrotion linearily longitudinally - between the girl being told her sister’s inside her - that relationship which is destined to become <em>so </em>specific, and nuanced - fights and things in common and eventually even, they will say: “this is what our relationship is like” (maybe a keychain will sum it up: “thank god there’s always someone to get a mai tai around here,” and then - the poly check box worksheet I did with Sarah on V-day two years ago for Sandy because I couldn’t picture myself putting my arm around him or offering him emotional support. It was a passive thought that became louder - begging for attention that I don’t know how to give it as I found he hadn’t told me on the phone. We went to get poke and Sandy took Skye home instead of bringing her to pick up our “poor parents who were stranded,” “only because you’re pregnant” and when Sandy went into the supermarket to get two cookies and some sweet fruit drink for me, skye and I bonded over people not hearing us, and it feeling like we are deaf.\n@@PB@@\nI saw a guy carrying drinks on a tray and I identified that what I found exciting about them would’ve been trying <em>all </em>of them - not having just <em>one </em>plaed at the sea in front of me, like a time out - a little punishment that continues everytime I contemplate taking a sip, and realize don’t want to. And so it goes with my tasting restaurant I guess - which can open at salt’s cure during the night.\nFor example, if daddy were to praise me, persuade me, that I’m special (if only because of his deficit, like the hike yesterday, describing drew shooting forward like the fish at the reel inn, who can’t see anything, who are <em>nearly </em>blind. The buttons on my clown suit, that I did in the back - yes - the game - can come to fruition - my thoughts will turn into a tiny town that will be little wooden houses, and not tall towers (when they <em>could </em>be skyscrapers) (pic) <em>each </em>little thought written down, but they will only have one windows. And when I did crosscountry, if someone told me that we were running a marathon, I wouldn’t have known, and would’ve trained for it. my whole life - tiny thoughts - <em>so </em>many of them, and each window, could be in a skyscraper. (pic: the actual drinks in front of me) 7 miles was hard, but I ran it.\n@@PB@@\nThe last part is - the kaleidoscope, that turns. You <em>might </em>think it’s just a game, and then it goes <em>up</em> and up and up, but one day, it’s turned up side down, and whatever thought you had - or suddenly it all matters, or suddenly it all doesn’t."},
{page:113,type:"day",lines:13,date:"Mar 12",text:"March 12th\nLast night we went to dinner at “the tasting room.” (missing: egg breakfast, food at dinner) Before that, Cayla sought Sandy’s help and they started saying “javascript” - I think, if I’d listened in, I could’ve gotten the general jist, but my eyes glazed over from the 2oz pink wine (pic) and the wall was decorated with solid wooden cutting boards in different shapes and sizes. I didn’t have my phone, and my back hurt from sitting. Though my linen earth tone outfit matched the decor perfectly. I started to slip into that trance where things become abstract - I’ve been down this road\n@@PB@@\n(missing: dreams mostly)"},
{page:114,type:"abstract",lines:31,date:"Mar 12",text:"before and so I let myself slip back into the concepts. Sandy and Skye have a way that I may as well hate, of offering very specific things, and declining for very specific reasons. Skye disagrees with everything Cayla says, and Cayla accepts it without question, immediately, probably a learned behavior. This has something in common with love language - it is a language. Sandy’s way of being autistic makes me feel guilty that I’m not also autistic, in the same way. everything is as I predicted, as if I were trying to prove that I knew what was going to happen. but there is <em>no </em>leaving - no room to move. Sandy bought me a (pic) pellegrino, let me eat his cookie, and poke. He apologized for not being fun, when trying to get the spiny pike out of his foot (off) and let me have <em>so many </em>of his green beans during their most boring of conversations. He gave mommy his pillow so they wouldn’t talk about it, and barely complained when he was waiting in the hallway with his bags. I dreamt, after not talking to j for one day, that I was sad that I’d never see his drawings again, remembered, in my dream, how the flowers turned into eyes and resolved maybe I should just ask him to marry me, just to see what he says. Then, in the morning, I woke up to a drawing he did of him touching my back in hawaii, with him still on the coast in california. (pic) I was relieved to find that he got the island’s wrong. I don’t need him knowing that much about geography."},
{page:115,type:"day",lines:29,date:"Mar 13",text:"MARCH 13\n(missing: dream)\n@@PB@@\n\n@@PB@@\nLATER (ON THE PLANE)\nLast night J called when we got back to the hotel and said he was happy I was in his life, and that he could be honest with me and that his brother also hates walking around (cause he went on a walk and felt like people didn’t respect him), and that he could ask Naomi because Robert always complains about that. He asked what I thought about codified social interaction which was the main thing I’ve been thinking about; it was almost too big of a coincidence, and he said Jesus and Buddha tried to get us to opt for the “last quarter” (pic: win win) and that he’d been yelling at his mom and that his brother started yelling at him (probs cause he was yelling at his mom(!) and they ended up talking about things, and J said he’s “not an idiot” (something about vulnerability, and how - it’s not the dominant strategy. I tried to talk to sandy about it when he refused to share his bar but he doesn’t want to, and now we’re sitting with our hats between us, luckily (pic) with the ability to talk, but he’s reading the fountain head by ayn rand on his phone so he will never talk, and it’s even worse than I thought. I already knew this is what would happen and I told him I’m sick of our codified communication, and Skye’s and that they’re passive aggressive and that they found each other. Oh well."},
{page:116,type:"dreams",lines:2,date:"Mar 14",text:"MARCH 14\nI dreamt that I was in a tree, or shooting through a tunnel in trees - upwards - (missing: rest of dream)"},
{page:117,type:"abstract",lines:53,date:"Mar 14",text:"While I was watching a view while I eated, I thought: I should have a “view” in my thoughts, ex, save up a nice thought to have while eating, or before going to sleep. About the rocks (again) - the interim b/w finding them matches that of (the time and temperament) - the cadence?) of collecting patterns…There was the (pic) two-art flower, that was translucent, and it’s most striking feature was its resilience. I tried to save it, because I didn’t want to think about it anymore, put it on the side of the jacuzzi and the wind knocked it down 2-3 times. And I thought <em>I </em>was a pedophile, cause the woman from Wisconsin asked if I was in school and seemed uncomfortable starting from when I told her my real age. (pic) these were black and evil looking, but went with my evil kit. I saw them when I went to pee by the chickens, waiting for my sandwich oh yes - the equations I solved yesterday - shoving shaka down your throat, but that was the only thing I liked, so: shaka = shaka. Yesterday, on my very own tarmac, sliding my suitcase over the yellow “tarmac,” I thought: none of these thoughts are interesting, or worth thinking about [but i’m gonna think about them anyway, and now: that is what i do. (I do it on purpose)]. (pic)\n@@PB@@\nI saved three things on my inner wrist I mean forearm in the shower - and the middle one was peace of mind, the bottom one was ex. a certain amount of time - “I’ll check my phone in x time,” where x is such that ?it can never be solved for a numerical value, and the last (top) was buddha’s burgers, where I watched my mind start thinking of all sorts of examples [of something stupid] and noted that as a worthy mechanism to be taken advantage (advantaged) in the future. Peace of Mind meaning that something - ex. guilt will come under <em>all </em>your thoughts, rip them up like trees in a torn out forest, and start it so you can’t <em>think </em>anymore.\n<strong>ON THE PLANE NOW</strong>\n(pic) Rushing through the airport - sandwiches and snacks - trading things with daddy - the flight girl gave him the sushi - five pieces - I saved. Sandy watching Moana - says it’s horrible. yesterday he spent most of the day by the pool - mommy swam all the way around, and under the tunnels and stuff…I watched some mischievous boys torment an older and very sun burned blonde girl - bean pole - looking furious, incredulous, furious. Java Jazz last night and we had to get tiramisu, bread pudding, chocolate cake cause to get to the right dollar amount…and the waiter who"},
{page:118,type:"day",lines:48,date:"Mar 14",text:"wasn’t a waiter - was a waiter in training, brought us (pic: banana cheese cake) and then another bread pudding which he said was tiramisu. (pic) I told Sandy this was my favorite part of the trip, esp. when our waitress shooed him away like he wasn’t worth bothering with. Dessert is better when it’s just to reach the right dollar amount. before that, we had (pic) dinner while watching the sunset and watched the sun through the monocular - it (pic) the sun - fit right in mommy’s eye. Sandy was driving the big boy car, and said Jordan is looking for a life partner…talked to a woman from wisconsin (pic: 14 ft) swam with manta rays.\n(pic: pina colada) (pic: the three pieces of sushi that were up for delivery)\nate too much at dinner last night and felt full all night, kept feeling my stomach to feel the bump - it was still there - but I imagined it not being there, cause it wouldn’t be there eventually. Sandy and I had trouble with the air conditioner - long drawn out discussion about it, as if we were holding our cards close to the chest but I don’t think we even disagreed. Woke me up a bunch of times - I guess he went surfing, and washed up etc. Hard to get a good night’s sleep. Talked to J the night before and he said some nice things - I can’t remember what, and/or couldn’t\n@@PB@@\nhear him at the time - I think he called me babe. I watched the total lunar eclipse from the parking lot while waiting for him to call me back, and daddy was waiting for Faharzad to get there, and we were waiting for mommy and Sandy to get back from dropping off our bags at the hotel and checking in. Lil’ argument about whether we stayed at the Westin or Mariott last time. (pic: java jazz, steve, moon, sun, waiting for j to call me back..) (pic: mariott, westin - they merged cause mariott owns westin so Sandy was right - reality, mariott westin)\nI was disappointed to not be hungry for breakfast, cause there were so many things I wanted to eat. (pic: parfait, me, comes out here, the cinnamon rolls sandy told me about, all the things I couldn’t get at breakfast 🤪, mushrooms, spinach, omelette station he offered to make me an omelette, got sandy some half poke yesterday, and used the empty extra salmon scoop to bring the omelette on the plane :))"},
{page:119,type:"abstract",lines:88,date:"Mar 14",text:"I started to think I could see exactly what the little boys in the jacuzzi were thinking, and what they’d become, trying to be objective, not swayed, to decide if the little girls in the pool would become pretty. It was so clear I was seeing “into the future or into their minds and idk if it’s facial expressions (common ones that get etched into the face), or the intrinsic pre-existing laws of the face itself. (pic: they were plotting and scheming - would they be evil to girls in fraternities?) SO ANYWAY WHAT ELSE - on “friday,” our family took our old white telluride to lunch at some food trucks that were the best lunch we could’ve found, but daddy said there might’ve been better…then we drove to a long pier that people were jumping off from and looked through the monocle and I found a piece of coral that I used as trioculars, cause there was one spot where you could see through three holes. At Duke’s the spot skye’s family picked (which is the same as the one in Malibu), we got two desserts - two kinds of “hula pie” and skye said <em>just </em>macadamian nut, but Cayla and I wanted to try the S’mores pie she described, but then Cayla said she didn’t like it at all. Like three times. After my conversation topic failed at the airport and also on the plane, I said to everyone at dinner “how do you feel about codified communication, and Sandy\n@@PB@@\ncorrected me to be that I meant “coded communication” and Sandy said Skye is a contrarian, and tactless, and doesn’t know what she’s doing. Then he said “coded” only applies if both you and the person you’re talking to have the same understanding and that there’s two things - one where someone doesn’t understand themselves, and another where they’re trying to communicate something in a code, and skye does the first, so which one is it? And I said latter cause that’s not what Skye does. She’s a bully and she wants power (though I snuck that in before). Mommy wanted to get out of the car early and daddy said: “I wonder what that’s code for?” And Sandy said “maybe she wants power,” but neither daddy, nor I thought it was funny. After Sandy left to get three bars in a bag (and he got mad cause I took a bite out of one but i didn’t care) and yogurt cause he couldn’t have the bread pudding cause there was chocolate in it but he threw the yoghurt away cause it had synthetic flavors and ate the bread pudding, despite the small amount of chocolate sauce, I asked daddy and he agreed that Skye isn’t as stupid/innocent/unaware as Sandy tried to portray her as. Sandy said Shayna does it on purpose, but Skye doesn’t. But - and daddy asked me if he uses CC and I didn’t answer, and he said yeah, and that I do too. (pic: what we want codified communication to get us there)\n@@PB@@\nin order to get what I want, like, asking why we want to do something, knowing full well, and that’s not the point, it’s to get our way. I said - he said - not all desires are equal, cause I said, what if we were empathetic - and I pointed out that how much you want something doesn’t often match how much you decide to use codified communication. Then we stopped talking about it.\nWent in the ocean yesterday, and it was <em>so </em>clear, and they tried to find where Sandy was jumping off and daddy said he didn’t do it right cause he just sort of fell (I said it’s good - to not be scared, and do what you can). After our drive through the jungle, we found a cave that was long and flat, and there was nothing to do in it. The mahi burger I had at Dukes was the blandest ever. I bought hot sauce from one of the trucks. I got a keiki veggie bowl from brazil truck and then a (pic) salad wrap from health hippie truck. Sandy and I almost shared some yummy peanut butter and banana thing, but we got a green juice instead, and daddy got an acai bowl, and then it started to rain. BACKLOG - On the ?first? day, everyone went on a 2-3 hour hike that was 1 hour away and mommy and I skipped out and walked twenty minutes to a town and she loved all the textures at a texture store, and bought a shell necklace and a flower shirt. And we got ice cream - from Lapperts - a hot fudge sundae with a brownie, which I didn’t even want, but"},
{page:120,type:"day",lines:58,date:"Mar 14",text:"drew (wanted it so much that I) kept talking about it at dinner the night before after Jonathan yelled at me on the phone for not answering him and then called back and said “no more meta conversations” and apologized and said “yeah?” and I said “yeah.” before I got off the phone. I was so tired at dinner in my hood which I’d been wearing all day, and I told J how tired and hungry I was and he said “you’ve been traveling all day” I told them about the ritual mason had us do and was too tired to care about their facial expressions. I shared papaya(?) salad with mommy, and mahi mahi, but wasn’t full after, and we got carrot cake, cheesecake, and chocolate cake. I spent a lot of time sitting by the pool, half in the shade, half in the sun and it was hot, and I felt my legs getting burned. It wasn’t unpleasant, and I don’t know if it was pleasant either. I suppose I wiled away my day watching and categorizing behavior, making observations about the kids in the pool, and their relationships with their parents - this lil’ girl Molly who ignored this other little girl who’s hair was short, curly, all over the place, giving the appearance of a deranged old man (she didn’t really smile) and they were calling them both “babies” which I thought might’ve offended them. Yesterday at the cassabella next to ours, a very tan man with a huge belly\n@@PB@@\ntold the mobile waitress that his life was stressful and he ordered a strawberry margarita, licked the salt off the side when he first got it and his wife Crystal, still on the casa, was mad, seemed to be mad at him. Little blonde girl with braided pigtails mommy said was too cute to belong to them “what are you reading Krystal? is it a novel or is it a ;) novel” daddy and I tried to figure out what song a little girl was singing to herself, and he told me about how bad Russ was in making bets and not keeping them and I didn’t give him the satisfaction he wanted or that I would’ve wanted. Mommy got me the chocolate dipped short bread I wanted - a four pack in a bag, and daddy and I went to get poke cause Sandy and i were hungry\nI was unsure whether I wanted to remember my dream. i was at some sort of corporation and at the beginning, we saw a preview - multi-panel - it was nicely painted, but casually, in gouache - greens and blues like sea foam, and some warmer pastels - some kind of corporation, lots of things casually happening in it, showing (it was moving, an animation) business, lots of small things that looked like tissues - moving in and out of the corporation (which was represented in one of [my favorite] panels. It might’ve been an ad agency. Some of the panels were darker, and they were squarish, but together, they took up a lot of the wall. I think"},
{page:121,type:"abstract",lines:25,date:"Mar 14",text:"I was sort of interested in the work, thinking, (mildly excited) that I could probably do it myself (as if, in real life, i wanted myself to have a real job - “vocation”). Later, I suppose I went up, (because at the end of my dream, we were going down a <em>really </em>long set of stairs) (I couldn’t see the end and there was a girl, who worked there, who we’d been beefing, she was a more official manager, and I had a hold of her wrists (auburn ringlets, plain face) and she said “are you really gonna ‘mean mean’ kill me” and I didn’t want to, so I was thinking how I could take a step back, and talk to her to where I felt safe (I could feel the power in her restrained wrists, and I didn’t trust her/know how much to trust her) Before we went out the door, there was certainly animosity between us - as though the corporate hostile work environment evolved into something much more menacing. There was a long hallway, with high wide windows, and there were these sorts of half people who were probs ai cause they didn’t have quite enough feelings, and their eyes (pic) were replaced by hard boiled eggs, and I swiped each of them, and felt mean, but also didn’t"},
{page:122,type:"day",lines:7,date:"Mar 14",text:"trying to get him to stay, but he was cold - a pink terry cloth towel between the sheet and blanket, which he complained in some very specific way, and then, as I knew I would, found three other blankets - the blue and white one (pic), the sun/moon sea foam one and it was secured that he’d stay, but it felt to desperate."},
{page:123,type:"day",lines:28,date:"Mar 17",text:"March 17\nDate with Mick last night. He showed me his painting studio/garage and we did a painting together and talked about rules - “so many rules” - that he runs into when he paints - “Oh, I don’t do blurred lines, or use purple” (”purple is hard” he said. Ha? is that a joke?) then he started adding faces everywhere. I think he put in ladders before. And he added (a red road to the sea fam). He showed me, really specifically, how to mix it - what consistency, how the paint should fall (not in droplets but in little lines when you skip it/slew it across the surface of the little water cup). He got some paint on his face - black paint, and tried dabbing it with a rag - I wanted him to know that I knew that there were only certain places on the rag that you could dab it with. Then later, he spilled a bit of sea foam on the floor again from the water cup and had to rub it out with his foot. “color-matching” he said. We walked around for a while, after we sat at a picnic table in the back, (pic)\n@@PB@@\n(missing) Yesterday, he tried my killer noodle - just the noodles I’d picked out, and put back in the container, and kept saying it was wow really spicy, and then coming back for more. And then he discovered the perfect anecdote - milk and cereal. Instead of reading the UV index, I can feel"},
{page:124,type:"abstract",lines:33,date:"Mar 17",text:"“the idea on Lincoln”\nexactly how much my skin is getting burned. Tis is, of course, a metaphor. I remembered (this is the other metaphor), the idea. (I had before) - that - if I - well - the goal is memory recall - if I’m trying to think of something to write down, (pen, poised above paper - i can’t think of it - the right thing to write) - <em>then </em>my mind automatically starts coming up with “oh, you could write this” and it’s <em>all </em>the things i was thinking about, like the idea on Lincoln about how most people approximate, and allow for some ambiguity, but J tries to get it <em>all </em>right exactly - use precise concepts, so he’s often wrong (too ambitious) (I din’t want to write this until i got it precisely). Remembering the freedom of getting the chocolates after coming off the plane (when they were arguing about prices) - a <em>whole </em>box of chocolates, not un-wrapped - brand - any brand - name - how generous. When I met Mick, when we were talking, I feel like he had quite a large sieve for what i was saying, but he didn’t get anything wrong(?), to the point where I wanted to pull his hat back from his ear (he wasn’t wearing a hat), and scream - whisper, again, what I was saying, and is the genesis for people calling me weird, When I’m being nice to myself (lol 😢) and why I don’t mind Lindsay, and Evan saying it again) I kept thinking he looked like a woman named Kelly when I was first sitting across from him at the table, and then, later on (after we had both felt a piece of each other’s hair) when I was staring down at his head when we were both"},

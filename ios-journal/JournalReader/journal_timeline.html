{page:125,type:"day",lines:30,date:"Mar 17",text:"painting, I realized that he had auburn locks. Not brown, just like Dumbledore…”Oh you could write this,” - anyway…I travel backwards, I come up with a solution - “oh…<em>wow</em> I could do it “intentionally,” but the (real problem?) is that I can’t do anything intentionally? Anyway, and <em>that’s </em>a metaphor for my not being able to get stuff done - because - the very(?) part is the assumed part - (true?) I set up this elaborate automated process - but i can’t even start - the hard part is the easy part - the hard part is that it’s too easy, (and I can’t do anything easy).\nJ is “wrong” and “bad” like he always says - he is wrong about everything about me, and any empathy, or “help with my anxiety” is not actually help - it’s instrumental from the care he gives me - bread crumbs in a different boat - boat crumbs (…?) idk) and there is “upsetness” that comes from things, ex. him being wrong and bad, and there is upsetness from (even if things are good), and life is lolly - me thinking of the plan I didn’t know I had) things not being how they seem - and this is back to my dream - about people not reacting as I expect them to (I am on a different page). To reiterate: J tries to be “too precise,” and ends up weeding out, or netting out the inherent ambiguity (which is only inherent until you’ve figured it all out ( (()) → look at paintings till you understand them). And Mick’s sieve is too large: he has <em>too </em>large a <em>sieve.</em>"},
{page:126,type:"abstract",lines:27,date:"Mar 17",text:"something new - the old thing, where I’m worried that things changed - I start liking (before and after “rug/christ), except this one, I think, has turned over an old leaf - I’m old, back to myself again - I knew in the back of my head, that I wasn’t <em>always </em>depressed and hopeless: the cold war defeats - those days on the couch, before Zach called me, and I simply finished my deck, and then finished XI and then, at ihop, wesley said his coworkers wanted hats - wanted to know where they could get hats, and imagined a whole package - a starter pack - with one blue, and one red - a place to wrap notes - if I had started differently, I could make a field guide, or perhaps I could print the others again, and change some text in blue and add a green . Oh yeah - I solved it yesterday - the field guide is the first half (?) of the (pic) and then it lets you put your own notes (do I (dare I) add specific sections for specific kinds of notes, like “where are you, what type of people do you see ex. demographic,…and: nitty gritty - any specific observations - what are they wearing; specific tid bits of convo, odd interactions with objects…all this comes with a shirt, and a hat (or a sweatshirt and a hat), and a binocular necklace (that was Wesley’s idea too somehow)"},
{page:127,type:"day",lines:30,date:"Mar 18",text:"March 18\nYesterday I went to breakfast with wesley and then mason came over later that day, and we played the diagram game I had just made, we played perfectly. I can’t remember the exact (le petit) ontologies we came up with so I’ll recite the cards - there was - some exchanging things for other things…oh, in retrospect…I wonder <em>how </em>accurate our descriptions were, (unpacking…<em>why </em>did you do something (sometimes this helps! (sometimes not)) I feel like there was something about a tunnel but no, maybe it was just the way the “light” (in my mind) was moving across the cards, either conforming, or disconfirming them. I liked - robinson chen, and his imaginary imaginary partner - trading for an approximation - the idea made sense - not necessarily directly with the cards. Another we came up with was catfish. He misunderstood the ritual science plant one, possibly due to my hasty, lacking, explanation…idk. I opened the white honeymoon bottle, which is now capped, but unfridged. (pic)…we also made some new cards….when he went to the bathroom, we imagined that I had turned into beary mcbearson and back - the transformation taking place in completion between the time that he was gone and the time he came back. I think I did a really good job selecting <em>only </em>the diagrams. I printed 20 cards, succinctly finished the project, and was <em>just </em>adding text to some of the cards when he called (I"},
{page:128,type:"ideas",lines:32,date:"Mar 18",text:"added some of it while he was there). I think, in retrospect, the success of the game was contingent on his willingness to listen to my explanations of each of the cards, as they had come directly from my experience, and there is a small - small amount of ambiguity as to the degree of his/an ability to understand something (so complicated?) explained so hastily. (repetition is <em>not </em>a rule, it just seems like one). Other than that, he laid on the floor and I on the couch and had a nice little chat, where we both listened somewhat equally, and were similarly interested. I felt pretty nice after and realized how many friends I have that want to hang out with me and was thinking that when I went to bed. I’m mad still, but I know that it doesn’t matter. I’m always worried that I’m deluding myself, and the situation is a lot worse than it is, but I think, like my random September entries that I was reading; that weren’t even about ideas, just random descriptions of my day, that I kept expecting to be boring, if anything, I’m [confusing/combining] wide accessibility/usability for inherent merit/validity, and that there <em>is </em>a fine sunniness under everything, the color of chai tea - as though, what I have always wished - that I could be in another time, at the time right now - were possible. Possible that being silent and mad in the car with my parents is somehow worse than sitting silently by myself, doom scrolling my own journal entries - ah - now I finally understand why they had to be a a pdf. (time travel)"},
{page:129,type:"day",lines:15,date:"Mar 18",text:"and - to give credence to my wesley time - we had pancakes, he made fun of me for not eating most of mine (I really really hope that you have an explanation for this, Jonathan, so I don’t have to lose myself in cognitive dissonance)\nHere’s my plan: bolstered by me (bolster yourself) Observation of the general {quality of the journals I read, I’m going to keep journaling]\n\n<em>un </em>petit ontologie - book: (pic: equation)\nHere’s “another” example: little rectangles. Oh - these aren’t <em>books</em>, <em>these </em>are just little rectangles (for this project (petit ontologie (peon)) to work, cut scraps into rectangles the color books. 🔲 + 🔲 ⇒ ahh books 🔲<strong> + </strong>🔲<strong> + </strong>🔲<strong>  + </strong>🔲 + 🔲 ⇒ ah, rectangles\n(missing: small writing)"},
{page:130,type:"abstract",lines:42,date:"Mar 18",text:"Bolstered by my inherent ability to write amazing journal entries, bolstered by that day (these days) I was at the starbucks in DTLA and watching people all day, and went with that man back to his house, where I wasn’t supposed to go), I’m going to write <em>more </em>amazing journal entries. I’ll bring the sunshine of malibu and driving down the pch <em>right </em>here to this cafe. The <em>same </em>idea that I ignored in my journal - I’m going to print a bunch of things - not the things that <em>daddy </em>wanted to show Steve, but the printed things that <em>I </em>wanted to show Steve (cause they were relevant to our discussion) ex. the queen cards more card looking ones), nihilism <em>and </em>public nuisance which I can make with daddy or mason, everyday rituals, or the witch one. And of course, XI, and the blank passport notebooks, like imagining conversations, possibly a version of the PW that has room for note taking at the back - “get started <em>right </em>away” - the plus edition - maybe I can start by printing ex. the lesbian coloring book, and the adult coloring book that I evidently sold out of (adult? adulting?) until I have so many copies that they all spill out till my friends start thinking I have a store and I believe it myself. mason said (when I was “therapizing” myself to print things in various stages of completion) that I can/need to <em>also </em>make the printed version, I think it’s just so\n@@PB@@\nunbelievable to people that I could <em>actually </em>have this many good idea that it ends up relegated the the fourth quarter :’( <em>anyway: </em>the pattern collector, perhaps one that comes with a thome - to sort them after (the pebbles) - (a thome, (simply) cinched with a string?)\n\n(pic: two posters that need to go in my room, le petit ontologie, the duplicitous envelope, two sides of the same coin, competing patterns, ambiguous events, competing patterns: the warp and the weft of liking someone or not, all <em>these </em>lines come up (to make room for the thread), then all these lines come up to make room for the thread.)."},
{page:131,type:"day",lines:19,date:"Mar 18",text:"Mason said that he went to an artist residence, at a ritzy hotel in canada and that no one’s ideas were that good - writing about (missing) - too depressing of a subject for me to think about (())→ (missing)\nTBT<em> that magic comment when you recognize an alternate relationship between the cards - “something in common” x → “progression, hierarchy” v’ - this happened to me and mason, at one of the “junctures”</em>\n<em>if you can identify an existing framework, it makes the essay writing a lot easier and prevents excessive word use.\n</em>my hypothesis is that mason is a <em>little bit </em>too comfortable with ambiguity, to put it succinctly.\nOh, well, instead of drinking more chai tea OR getting food, I’m gonna expound upon the condition which activates the pros vs. the cons (TDIL word-choice - finding the right word, is a puzzle) of caffeinating vs. sustaining. (no). Before I was thinking"},
{page:132,type:"abstract",lines:27,date:"Mar 18",text:"Perhaps it’s like this: when I was young, I couldn’t understand why people would prefer <em>recess </em>to <em>test taking </em>(being the young, autistic (pic) child that I was) and now I’ve convinced myself that I <em>must </em>not like work, want to avoid work, because I <em>must </em>prefer recess, because everyone does - <em>everyone </em>does. And disney channel taught me that you may <em>think</em> you’re different - but you’re not - if you look, deep inside, you’re actually exactly the same as everyone else.\nDaddy came, and picked me up, and brought me nuts - wish fulfillment nullified my need to write about the pros and cons of eating vs. caffeinating. Though I <em>was </em>thinking, before, about, how, well, actually: a), actually, no, b): how, if you choose to drink more caffeine, then you have to know that you can substitute the wrong thoughts for the right thoughts, in that proportion, <em>so </em>for example: if you take one sip, then you have to know that <em>you have </em>enough right thoughts to pacify that discrepancy<em> </em>(and you should take stock <em>before </em>taking the sip. And a) was just that you have want to completely <em>discard </em>your mental state - (pretot - I was surprised - didn’t want to drink chai, and it was because I actually apparently <em>liked </em>or “didn’t want to completely disregard the mental state I was in."},
{page:133,type:"day",lines:85,date:"Mar 19",text:"MARCH 19\nMan I actually feel so confused - like with cassie, like with Maddie maybe. Went to Douglas park with j this morning to scope out the little kids - but there weren’t any - just ducks (no - mallards, as he kept reminding me) he came over yesterday after he (<em>finally</em>) called. I think I would rather have kissed that beautiful girl at the gym (greer) who was helping me with climbing - and they really did help me - turned it from sort of hopeless, to not hopeless. Mick and I sat on the back of his truck, and we each made a banana and peanut butter sandwich. And drew blue dots on our faces, cause he’d drawn one on his face, and really liked how it changed his features. At the restaurant, the water whispered “you’re welcome” in his ear, and he tried to replicate the experience by repeating “thank you, thank you, thank you” to the waiter. When he came to take our plates but it didn’t work. We kissed outside, before crossing the street (I don’t think the light ever changed). I don’t know if I <em>wanted </em>to kiss him, per se, but it seemed like the right time. And it felt nice, even though it was really confusing. I’m really confused. he was sort of shiver laughing - he said he was giddy. J and I wrestled and he put my sock in his mouth (mmm) and when I went to the bathroom, and couldn’t pee, he made it come out of me by fingering me, and then putting his fingers in his mouth. he always does this thing where he “tortures” me\n@@PB@@\n(hmm) by touching my clit and I beg him to put it <em>in </em>or put his fingers in, but he won’t stop, or he’ll count to five or ten or something, and won’t stop touching my clit until he’s done counting. I couldn’t figure out whether to eat the tom kha soup at his house, or go back to my house, and eat the other soup - the ramen. (pic: here soup, there soup, daddy put it in the fridge) I haven’t really been hungry, lately, and I haven’t been able to sleep very well. It’s kind of interesting, and I’m scared, so that’s also interesting. I told Mick about the soup dilemna when we were talking about gratitude journaling, and then we ordered soup, and it was black bean, which is what I wanted and it was really good - it had rice in it, and he took off all the bacon, even though I said he didn’t have to. Jonathan would <em>never </em>do that Let’s be honest. But I guess he does care for me - he sang a song about me being a bug in his rug (”I said I didn’t wanna go home,” he said “Oh you wanna be…”) etc. and then he cradled me, and rocked me gently back and forth.\n@@PB@@\nJ said while he wasn’t talking to me, and I was stewing about alone and angry in my apartment (in some ways, 2 of the worst days - as it appeared there were crystal shards crystallizing every five feet, or every five seconds - like sugar packs - to crystallize the realness of the situation, that he jacked off to “jack off instructions” with my panties in his mouth. Mick, in the car, when we were listening to music said there was a moment he realized there was maybe chemistry between us in the garage, and I think he’s right, I think I realized that too. I was feeling sort of - idk - disembodied, in the car - overwhelmed, esp. cause of the intense situation taht I didn’t tell him about - that we made up or he forced me to forgive him by threatening to kill himself and threw the jacket I bought Sean on the ground because he said he doesn’t like that my room is messy (neglect), that I hold myself when I walk, and that I don’t take care of him cause he “takes care of me” and I wanted to show on his phone and I saw the messages from Emma and it said: (pic: oh so she came up to us because you’re her boyfriend, J clicked this button to delete them - all the messages from here and on his computer).\n@@PB@@\nI don’t think I like emma anymore, which is a relief. I didn’t like how she looked in that picture and apparently she was mean about my twitter presence. After mason left (oh yeah and I told him how I get so scared to hang out with girls, and he understood and empathized (missing)"},
{page:134,type:"abstract",lines:22,date:"Mar 19",text:"(missing) But I guess I’m glad I got certain things off my chest, like that I think painting is ego driven and I don’t strive to be better at it. There was a single moment, when I showed Mick the sculpture I made when I wasn’t talking to j in September and he really liked it and he said something about the paint brushes, like, these are really weird objects” or something, and I felt like: “yes, this makes sense. This <em>artist </em>likes my work. <em>Not </em>- painting I do to make my mind feel better - but my <em>actual </em>work. And then I decided to work on sculptures cause, like, what if someone <em>actually </em>understood and liked them. I mean - they are <em>good. </em>I don’t not know that. And all the ones I imagined in my mind, are good too - the proof is in the pudding, (or two birds in one hand, cause it doesn’t matter “ha.”) I was reading the bible verse about the sugar packet, and not showing it to anyone. Idk - I guess something just clicked - about conor - and artists - who get their MFAs - I remembered why I started this journey."},
{page:135,type:"day",lines:13,date:"Mar 19",text:"(missing) he and Maddie have <em>such </em> long passageways to get to what they mean. Anyway, he came over and I said “Let’s do this the easy way,” and he said “no! hard way! I love hard way!” so now he’s supposedly gonna come back, and I <em>don’t </em>know what to do. I don’t <em>want </em>to see him - but why sean, if he is sean-shaped - I almost wanted to lay on him in his yellow sweatshirt where he was on the chaise lounge - it would be nice to have him wrap me up.\n@@PB@@\nI feel good and clean and fine cause I slept a lot and mom said everyone likes me.\n(pic: too much milk\nand sugar, and beans\nmakes my mind\na little unclean"},
{page:136,type:"day",lines:21,date:"Mar 19",text:"LATER\nhad lunch or whatever with Savannah and holy <em>shit </em>she does not listen. It was like frying an egg to see what sticks as Mick would say but I <em>don’t </em>like frying pans, and the butter was black stuff in it. At least I know why I don’t hang out with her, and same problem with Niha, and, to be honest, Jamie. Made J seem like an attentive listener. Mick said Tyler’s a “young” 29, which means I’m an old 29 - what does that mean…hmmm. No butterflies, but maybe a flue? hmm. The insanity of calling what Sav and I just had a conversation - damn - butter egg - like dripping hot from the wax from the ceiling, and seeing what sticks - one drop per second - the time between - I don’t think she heard a single thing I said. But once I accepted that, I think it was nice being in the sun - talking at each other. Forced myself to text Cassie, cause I keep thinking about it. Still this icky feeling when I think about J, but i still miss him and he was all I wanted to talk about. Maybe"},
{page:137,type:"abstract",lines:5,date:"Mar 19",text:"(missing)\nIn the way that it gradually jumped my mind up, it was like doing speed - like you notice little by little, but it’s also happening to you, so, sort of like the woman spilling coffee on herself. Whatever. I’m (missing)"},
{page:138,type:"abstract",lines:29,date:"Mar 21",text:"March 21st\n@@PB@@\nthings that - all the little thing - idk - flecks of dust in the air - Jae would say - nah - give up - it doesn’t make sense - or someone - a man at a computer, perhaps with glasses, would say:, would have the question - is it possible to describe the world, and would see how everything is little pieces of fluff, and would say: “no.” “i’ve found the found the answer, it’s not possible,” and give up. But here I am, describing the nitty gritty pieces of things that are not really meant to be described. Anyway - idk - I think, if, took a graphic novel class, I would just want to keep doing the same thing - mon petit ontologie. Anyway, I went down the PCH and we went to the other seafood place that’s not the reel inn and J brought me a sweater. Oh yeah - we saw a dying sea lion - frothing at the mouth, waving it’s head back and forth. J did a little weird strut to show that he has his own parking pass to get past the guards (a red piece of paper that he had to show his ID to get (they wanted to see his picture to see if the twinkle in his eye would match how nice it would be to see the waves). (?) his shoulders, and looking swag. Saw Maddie today too, and we drank white wine at the park Honey Moon) and it felt sorta romantic, and I got mad at Evan for trying to give away/ sell his guitar strap that they made him. That’s insane!"},
{page:139,type:"day",lines:43,date:"Mar 21",text:"He <em>also </em>lost/gave away the v-day heart I gave him, and I feel it matches that his care is fake. NO NEVERMIND. HE IS TEXTING ME. I MISS HIM. I DON’T CARE ABOUT THE GUITAR STRAP. IT WAS AN ACCIDENT.\nLast night there was a whole thing with phones dying, and calls dropping, and I had a conference call with jonathan and evan, who called me within three minutes of each other. Jonathan says he doesn’t like anyone, or finds them boring (but he said he likes me, and said - I hung with Maddie and Jonathan today and I got to hang with my two favorite people (pic) my day :) and J sang a song about me being his baby in the car and we kissed again when we said goodbye - he wasn’t done kissing. So I came to his car window and he kissed me again.\n@@PB@@\nAnd when I said he should make plans, and could we hang next wednesday, he said what am I doing tomorrow morning and I had to say that I am hanging with Lindsay which I am actually excited for.\n(pic: me trying to talk to Jonathan in the car about it, and him not listening (lol) the kiss they blew me when they were leaving, and the kiss I blew back.)\n(pic: maddie liked the wine very much :), our nice picnic blanket that is suitable for all occasions)\nJonathan says that everyone he dates is like his dad (or his mom) Maddie said they wrote a song about camping trip, and that I’d never done anything really hurtful, but that at times I had been confusing. I wish I could reassure them, but I think I <em>was </em>confused, and that’s the honest truth. Idk - the sun def felt like holding their hand at the park today. They talked about Julie for a while - some things I already knew. And about who they (and I) go to for guidance x emotional support (they said Noa and Gayley who are both becoming therapists. I tried to say, which is what I was thinking about last night, which is that - I don’t know if/what I need emotional support for - like - probs not to digest random things or everyday. I came up with - things that confuse me, and I need someone to help"},
{page:140,type:"abstract",lines:13,date:"Mar 21",text:"me unpack them, and invite me to believe my own point of view - I even explained hidden mechanism, which is that, for example, someone is doing something that seems nice on the face of it. Maddie said they go to Noa for most things, but there are some they feel are too big of emotions - like - is love real, or they’re worried about their relationship with Julie. they said Julie is loud, but self-aware talking a lot. it felt so similar to how it always used to, and we just had a long intermission, and I don’t know why. I didn’t even ask them/her. Didn’t want to. It’s in the third quarter - could ask but shouldn’t/don’t"},
{page:141,type:"day",lines:27,date:"Apr 3",text:"n\napologize profusely like I guess his mom makes him do. i was never even told to say thank you in other people’s houses. Oh, now I’m going to make a <em>concise </em>version of abstract referral technology. It’s going to fit <em>exactly </em>in one of those <em>new </em>brown books that I just got. It’s going to be nice because each page is going to have so <em>much</em> information, and you can <em>read </em>about it in the table of contents. I want to to see what it’s like for <em>other </em>people to have a diary - do they read it back, and say “yeah, yeah, yeah - I agree with <em>that </em>thought, I agree with <em>that </em>thought” etc. (pic: referring to abstraction to robert heckerman) “the metaphor machine.”\nI think - the association with the fourth quarter is invention - synthesizing new concepts, generating new ideas (pic) - I don’t want that to be lost - has a sort of magical bent. And <em>then </em>(tot) I was thinking about how the pen caps/and the pens themselves) kept appearing and disappearing and thought, “Oh, I could <em>make </em>something with that “because of how magic it seemed, but then i said, no; I’m actually having <em>real </em>feelings today and then, fourth quarter says: “<em>well, </em>what was I having before? And the answer is, I guess that, my mind was manufacturing feelings - trying to make feelings out of babkis” (another yiddish word)"},
{page:142,type:"abstract",lines:23,date:"Apr 3",text:"mind feelings are trying to place feeling feelings - they look like little things w/ tiny names and labels - all the concepts that are stored in my brain, that I pretend I can call on when I need them. Well anyway, that’s enough of not me - next tot wearing the menswear - I started to feel like a horrible person. I can’t tell anyone the lie I told: like the grotesque person I always think I am - that’s probably why I can to so long without showering - because I’m dirty - and my fingernails - pee outside - I don’t see myself as clean - like vivi, promising me to hack t. As a bride in the goal - I can easily bypass my disgust response, and I think these games are related. (Pic) I think, if I believed I was Santa Claus, I could sequence a small, but accurate part of the genome just by thinking about it.\nAgain, unfortunately, no one believes I am Santa Claus, I want to kill myself but ONLY in the way that he would know about it. Maybe I could tell Robert H. Too, and he could come to my funeral and buy the right size casket.\n(Pic: Kill self, know about it so, NOT real!)"},
{page:143,type:"day",lines:32,date:"Apr 4",text:"APRIL 4\nWent to bed at 2 and J called at like 2:30 saying he wanted to kill himself, and he had a little knife that I saw in the bathroom once. I told him to put it somewhere else and he put it in his pencil case so now we are in a game where I want and he doesn’t and I didn’t wanna be.\nI guess the two things I was trying to remember at the light: my two dreams. The first was about taping a (missing: dreams) J convinced me he should commit suicide by saying he would donate his money to charity and then I stopped talking - I had nothing else to say. Feels like a cat and mouse game. first dream I had invented something amazing - I was the dad in the situation, come back from the past. There were various options. After you taped the wrap to your chest, then you could put strings like yarn, like a tail, and then you would begin to move in certain ways - it would enable you. I wasn’t appreciated. <em>As if </em>this was one of the things I was trying to remember at the stop light. Make a book called “explaining things to myself’ I don’t really know how that will help, or if I’ll show it to someone. I already make (seed: “or something like that (pic) - just introduce all the terms one by one, that I invented) systems. i can just delete stuff I don’t need - i think it should be handwritten - thinking about doing all the editing work in analog somehow with the goal of giving it all into\n@@PB@@\none of those little booklets. I don’t even know how exactly, but i think that would be nice x work well? be interesting?"},
{page:144,type:"abstract",lines:48,date:"Apr 4",text:"LATER\nA mini ontology - a temporary petite ontology: examplification is an excuse for writing the example - build it up into a tower (next step is: finding a string to hang onto (pic) (can’t quite reach)\nexample: “anniversaire song vs. C.W. mother song - “I like specific things, not general things, for example I don’t like ice cream without toppings, or soup, at least not the idea of it (”note:” I like the tiniest thoughts and ideas → I like miniatures) - a piece of milk, a piece of pie vs. cobbler boo - no - don’t like…I like that imaginary diagram mommy drew (pic) all the ?flags? to get past wanting to hang out with Sean - there are <em>so </em>many things to categorize, and you could “give up” and let them wash over you, write it off as “a paradox” fake pdox: so many things → ← impossible to categorize.\nAnywya - you could split the world up into people who like pieces of things, and people who like soup - noise songs- graffiti art that “triples up” till you can’t even see what it’s about - approximate\n@@PB@@\n some feeling, or just that there is one (#mean) it makes me imagine people with haircuts like noas lounging all sleep-like on bean bags. It’s not a coincidence that they’re lounging all lazy-like. What I thought in the ar is that I’m proud of myself for “intuitively” (scientifically) expanding my range - or - what I was finding, when I was reading back the other entries - was that - a lot of the sort of theoretical, for lack of a better word (experimental maybe) metaphors? allusions - idk, but they got me to where I needed to be! (I was going). …and <em>so </em>i worked, and so I’m going to expand my repertoire (renewed vision of my thoughts in ?novemebr? talking ⇒ thoughts\nAnyway, and then I attached to it how J is <em>warm </em>but in a sort of <em>general </em>way, he doesn’t necessarily know exactly what I am saying, which i think enables him to be warmer. and mommy listened to me as a child, and J’s mom called him lambykins. I like listening cause I feel understood. His mom would tell him, if he were being bad that she was gonna take sleeping pills and go for a drive. I wanted to ask him what he was doing to be bad - how bad was he being. I told myself that I could convince him to kill himself if I tried really hard. idk if I like"},
{page:145,type:"day",lines:9,date:"Apr 4",text:"where this is going. It could completely destroy me if it was my fault so the situations is fragile in a way that he probably didn’t think of. Ok, anyway - that’s - the splitting up the world that way, and then making an infinite chart of all the ways you could split up the world “the world’s divided into two kinds of people - “meta ontology?” thinking of the rest is busywork and I won’t do it (I <em>can’t </em>do it)."},
{page:146,type:"day",lines:19,date:"Apr 5",text:"APRIL 5\nWaiting for my food, now, at Literati Cafe. Went out with Lindsay last night and Noa and Maddie were sitting by the pool when I got there; she made bacon, I brought my laptop to the couch, we sang emo songs on uke which brings me to my first thought, which is: (pic) they’re all bad at music (Q1) and yet, (Q2): trying to make it as musicians! At least they have a bad singing voice. According to J, I have a naturally good voice/sing in tune. I am <em>not </em>trying to make it (Q4) - counter-intuitive. This is why I keep stepping in this puddle - because the puddle is <em>in my way</em> and I see it all the time (that’s fine).\nLATER - ATE MY BREAKFAST\n@@PB@@\ngot my first glimpse of my dream back so I guess I’ll stop typing. ignored evan’s phone call, and now I get to feel guilty without examining it. Sandy and Shayna were doing a road trip in the dessert - like 6 hours - we were on vacation or something. (missing: dream)"},
{page:147,type:"abstract",lines:39,date:"Apr 5",text:"(missing) In three quarters, life is fair - finds a way to be fair - in 1 (4), it’s not. Lindsay - I told her I like the way she plays in conversations and she really appreciated that. She was x had v’ come up on mushrooms and so, the buildings to her right, as I was driving, looked like a solid block to her. trying to talk in the car was hard for me but it went surprisingly well. A wonder prison - when she maintains the car vibes - cause she is a professional at road trips. She was thinking about how conversations are creating something together - and you don’t know what you’re gonna create. She said it’s interesting how I’m a bit mysterious, cause I change the subject back to them - I’m open - but I leave a little mystery. And - I’ll solve it for you - I love mysteries thought - it’s cause you do <em>not </em>listen that’s why mommy and I are getting divorced. We don’t like passive aggression and she <em>meant </em>that she would stay and dance though she was tuckered. <em>Then </em>I could route it (missing) the other thought I had driving in traffic - I guess as a metaphor - seed I guess - example - drive three more blocks - that’s a whole adventure (unpleasant though maybe) of walking - and then other things - the simplification which maybe takes out the emotional weight is that the “value changes” - you could say one word - like the two minutes of words Ema tried to say, that mean more than every word you could think in your head <em>about </em>the encounter. I an’t help but feel sort of bad for her. Even though I <em>know </em>I should be mad at her. And lastly - for Robert - instrumental heuristics - a possible structure for the book - a description/a feel into - metaphor for the concept - with retrograde motion or not, and then - all the (progressive) ways you can apply it - emerging or…”helpful metaphor → instrumental heuristic). …:)"},
{page:148,type:"day",lines:29,date:"Apr 5",text:"LATER (HOME)\nLiterati closed at three but I <em>really </em>wanted to get done typing my stuff. Lady with ruler-glasses asked to use my find my and then buy me a salad - her phone - she forgot to check the front pocket. But I didn’t even <em>want </em>the admiring glances of the lesbians who kissed once, or the cashier - I sort of didn’t want to look up when she approached me, even though it’s my dream - to be paid back for all those times. Finally re-reached an equilibrum in the car with the air on, and thought - the temperature, asleep, eating (nutritious) meals - all contribute - coalesce - to prevent ocd - this waiting thing is a <em>little </em>painful, but might be best if that were actually his goal (as if that…-it’s the opposite of an instrumental goal - a <em>real </em>goal that doesn’t get done because of the fake (instrumental) goal.\nUnfortunate paradox - it takes some will to open up the zipped realizations - I always thought that’s the best way to store them.\nAnyway - there were two ladies having a conversation in the <em>hot </em>parking lot. As if a continuation of the cafe - as if - “evidence” of the (a) simulation) but one step back - evidence of (something). A metaphor: getting the sun I wanted before, but in this <em>horrible </em>hot car - where the sun <em>looks </em>and tastes, even - black, compared to: getting all the nutrients, but none of them taste good, like - oh - I need more beans etc."},
{page:149,type:"abstract",lines:30,date:"Apr 5",text:"I <em>think </em>this is an example of Synthetic Learning Syndrome, but before that, if we take a step back before that, we realize/remember that we can tell robert <em>that’s </em>how you refer to abstraction. /or that it’s not <em>just </em>art - it’s also: “referring to abstraction” - I assigned myself the task of thinking of what this means…I <em>guess</em> the in between steps, which might’ve already been solved with Petit Ontologies (venn → PO → ‘ART’) but I realized the assignment was more to make me feel good like a satin bow on that special box (when I tried to do it).\nTot - end - think the way daddy thinks (or mommy) “wow, what an explanation” think how <em>anyone </em>thinks - the seed - or the explanation was that well anyway - the conclusion was - you can “think the way anyone else does” (like J said “different ways of thinking - (cause I was thinking that this morning, and studying how things affect each other: morning → evening).\n(pic: the way daddy thinks, the way…thinks)\nidk - it looks like a web, I guess (this, is (?) another ?) example of the “two kinds + meta”).\nit’s not that you <em>actually, </em>or that this is a good example, think the specific way… (the example was that mommy can be sarcastic, and I originally said it in a <em>mean </em>baby voice, no, that was intermediate, mommy was before and after). <em>Anyway, </em>this is a <em>metaphor </em>that <em>describes</em> how you can think in different ways - (duh) it is <em>stored </em>like this."},
{page:150,type:"day",lines:23,date:"Apr 6",text:"APRIL 6\nOut with what’s his name last night - looks like a greg, not a grisha. I don’t think I like him anymore. it’s ok. We had fun getting a cookie, or at least he did. I hated it - sitting in a car, doing nothing. when the air starts to feel like empty space that you have to fill. I did <em>not </em>want to bring him back, though I had to, but I didn’t. Mouth tasted like watermelon when we kissed, and I had to keep reminding myself we didn’t get the watermelon drink. Potter girl - his ex - 16 year old drama - he had nothing to say, and I didn’t either. PSA: the “specifically in common is to protect against a hidden mechanism - that it has to have everything in common. STAP: test myself. buzzfeed: LIST. the roots. ways of - (tangled mess) (pic) (pic: “transference is hard”) (pic) (⇒) two ways of eating things/something: list:, ex: Last night I had the pleasure, the privilege, of watching myself sleep - I was dreaming that daddy was in the atrium with bathroom and guest room and he was saying/singing “huggatime, loveatime” and cradling his arms wearing plaid."},
{page:151,type:"dreams",lines:28,date:"Apr 6",text:"I think the rest of the dream was about me being sad that I couldn’t see Jonathan Heckerman, and looked at the days, and it was Sunday (it is Sunday), and told myself I had to wait till thursday (i do). I also was propelling myself into the hall (space was wider) with a rolling rocking chair - the one with the red cushion, and telling myself that I should use this time to get my homework done e.g. taxes but then no, that I wanted to be sad. That was in the hall, narrow hall, where it was dark, so I could think. Text on the table from Stye Ryze, but it would change to Steve when I was “ready to accept the love.” Ok new topic: mad about abstraction - angry, and then crazy. crazy: ex. (pic: true kind necessary ex. but <em>then</em> it changes, and you have to ⇒ (pic: fourth quarter) /get to accept that the three is incorrect - evolving metaphor critique - clarification, a while → a week. Concrete things → point to a brick, but it <em>shouldn’t </em>be a brick, it should be a metaphor for the whole - I think that’s what makes it “ART” (or - something else that I invented - a placeholder that has ART in it temporarily (pic: me, it, reaching for the moon to see it). The second thing I’ve always wanted to happen was [to put myself in a coma, and become a vegetable by living in my mind], and today I made that happen by:"},
{page:152,type:"abstract",lines:60,date:"Apr 6",text:": “adding space.” “you see, I was watching the patterns come and go - “a mechanism for finding it all” (said something - idk - a (pic_ clock, maybe. And I saw that said: “something that I needed to need/want, and the need and want were separated by <em>space </em>(pic) and I had to travel to get there. Then, next day (cause I just added time, though it was only a few moments later). I was trying to find a place to hide everything so I could find it later - ex. the kitchen cupboards, splayed out on the couch, the pink “drawers” upstairs, and I thought, no, you know what: I might “drive down the 405 to find a place.” So I thought, I’ll take a little adventure in my mind. Anyway, and the first one - I suppose I wanted (I guess I <em>really </em>wanted) to check if maybe well, what if J had actually texted me - because in this dream version he had not - I woke myself up. But I was still sleeping and so I got to see myself breathing while I was asleep. Another fake list: I realized twice that I should get better at OCD in two different ways. The first was in the car, I made a spectrum (pic: breathing). I slu(oo)shed myself into an old spot by changing the placement retroactively. (I was thinking of Vita, and driving past that spot - oh - I guess I realized that I <em>always </em>had ocd, and that it just got more severe - the frequency increased - the time between the space - well I don’t know what happened to it. Ah yes - “but at least I’m not breathing.” anyway, then this morning, in the bathroom, I thought/realized - I need my ocd to be bigger (on a train with - I just need to read a passage and then sit with it - memorize it, and trying to come back to it with diagrams, and by listing things - drawing things closer both literally, and metaphorically - by thinking about it <em>in the mind. </em>(neurons). Like taking a space ship to the moon just so you can poop when you get down :) (hot says J (lol :) :) :)). So, anyway, <em>then, </em>I was thinking, like - I could <em>look </em>at all the [diagrams] in my mind - the crystal scoop, see what I got - pick out each one and trying to find the perceived value (tangent: me trying to remember things was like: “eating yellow flowers” from that story about the wallpaper - my favorite (cause I ?got to? go crazy on purpose)). I think the progression went like this: what if I start <em>looking </em>at my diagrams - (uh oh - <em>that’s </em>when I got kicked out of Wes, and Wes sent ema to J’s peephole to ruin things for me) and then, part three, I found <em>too </em>many diagrams, and had to jump ship on the first mission (I also realized how <em>scared </em>I was - all the time - I can’t even act - but I am also smarter than everyone (obipps)(idk - jk). Which brings me to: fourth quarter, which brings me to: collecting things, which brings me to: (pic: hmm “yes I see that line there, but what about that sand smooch…”)"},
{page:153,type:"abstract",lines:25,date:"Apr 6",text:"sticking stuff to a [thought concept] (pic: the concept, the stuff stuck to it) And another example is temporary things that have to remain temporary which is <em>why </em>I can’t bring a <em>bag </em>of pre-mixed parfait. (as opposed to hanging by the ear. for example). Back to: why I like J over evan (pic: evan, decision making system, he gets what he wants) (pic: JDMS, it gets bent, maybe there is a <em>little </em>bit of periphlery, but not much. anyway, this is what I like. I like that he never gets it.) (pic: mommy, whisps) (pic: daddy, he doesn’t even know he wants it till it comes out) (pic: me (DMS), racing around - trying <em>not </em>to get it. Oh, I guess this is nice. and then somehow it just falls into my like a golden snitch - pocket (MM).) (pic: maddie - thinks she shouldn’t be allowed to <em>have </em>what she wants. She sometimes gets it, and sometimes doesn’t., goes back ‘in on itself’)\n@@PB@@\n~ TIME/SPACE ~\nAlley thought - My ocd is so I only make decisions coming from certain places (UA: ppl make decisions from certain places). An ex (missing) other things from the lesbo convention: buzzfeed list: x people misinterpreted my question - the music was too loud - red/green flags (missing)"},
{page:154,type:"day",lines:7,date:"Apr 7",text:"April 7\nAt kenneth Hahn with Maddie. It is a nice day! We were gossiping about Lindsay and emma and now it is a beautiful circle of everyone talking shit about everyone’s music - maddie more ettiquete-related. Apparently there were four ducks that left while I was taking the wrong exit. maddie is in their car getting wine"},
{page:155,type:"abstract",lines:13,date:"Apr 7",text:"LATER (HOME)\nLet’s all admit it - Sage is a bit stuck. Not Sophie, but Sage, because I “want something.” I went to the park with Maddie and the very nicest part of the wine - the grapes - was like the sunshine in the park, and me imagining that maddie liked me. I didn’t mind when we packed our stuff up “for our walk” and then, after we took turns with the bathroom so we couldn’t be women for a moment, it was time to go. The sunlight was still on. I didn’t mind. On the toilet I explained why I didn’t need to tell them what I would do when I got home, but then, outside of the stall, they said “what things?” and I said: “Oh I"},
{page:156,type:"day",lines:58,date:"Apr 7",text:"printed out a bunch of stickers last night, right before bed” “and then I got tired and had to go to sleep.” I took pleasure in telling them that. And then, after my 30 minute drive home that was nice (second perfect day) (pic) i wanted rice (missing) or maybe the traffic on the way home - how each of the freeways turned into a different freeway and I wanted to see all of them but I didn’t want to know <em>why </em>or <em>how </em>they were connected and I didn’t have to. maddie said Lindsay’s alway either <em>mean </em>or flirty - which she prefers? flirty - but then she flirts back - mirroring (aha! she admit it!) and then she feels weird, like I did flicking ema off,/being passive aggressive to Skye\n@@PB@@\n\n@@PB@@\nI feel like Maddie don’t ever actually talk about stuff - like, we can’t get the on a topic. We take turns telling each other stuff, and disdisavowing what other people say - the negative things. Then there’s an awkward silence, as though my eyes had opened <em>os </em>wide, and stayed open. And doing it, the lake gets bigger, and the stars come out, and I can miss them, each one of them, even though they are <em>right </em>there. J came - I played M his song and it was (his voice) too truthful, too honest. Also L-y was mocking M during their song “I changed my mind” and they are too apologetic when they play. I told M to cover the ducks with white when they were too bright, and I got too drunk. On my walk to my car, I thought: “was I thinking the correct thoughts, thinking correctly,” cause I thought, what if I was <em>always </em>drunk, and tried to imagine that mindset as my norm, but gave up. And I thought of another example of the temporary permanent paradox, and thought collecting the lil’ counter-intuitives was a ritual to make me feel like I have control - to keep my head on straight, to flick away any unsureness\nlike an annoying fly. But it’s also like collecting a sack of oranges, heaving it over your shoulder, and <em>also </em>like: the bingo card - large, hung on the wall, but then large, hung on the floor, like a twister game, like a chess board, where the <em>pebbles </em>are the pieces, and people put them, like rocks on a grave, and sometimes they get kicked into the wrong square, with the toe of people’s shoes who are not playing (men, most likely, cause they are work boots). The oranges first, <em>then </em>the game of tic tac toe (or maybe reversed) (- the oranges) - don’t worry - carried around - don’t worry - they’re collected. But <em>then </em>the orange sack changes shape s- idk specifically - anyway - the point is (and I refined this more later) - it’s important that all the forms are there - you <em>can’t </em>summarize into the “final form,” it’s not the same thing - “we should stop seeing each other - for a while - a week,” I can summarize, but it won’t be the same."},
{page:157,type:"abstract",lines:63,date:"Apr 7",text:"I had these two realizations (besides the 4D concept/diagram one), I’ve forgotten the first and it’s making me sad. The second, if it was an essay (it is) would have the way Brian Eno (progression) sort of flips through things, cause he wants to get somewhere (carrying it around cause cover + size). M impressed - ooh Brian Eno), and that’s what I want, or the small venn I went from the ( . ) book. What happens, i think, is that I get snapped up, consumed with energy, the initial push - the thought (of the <em>red book, </em>there in my mind (I <em>want </em>it to exist - I can’t even admit it, I want it so bad, like eye ball ice cream from the truck (pic) (this is how much I want it - like meeting that one mexican girl at the speakeasy, like laying out all my crystals on the tables, but if I’d <em>actually </em>appreciated how nice it was. - <em>the red book </em>- shiny - <em>glinting </em>in the sun - embedded <em>past </em>the flush, and he having it then - a niggle in his mind - the one that the one that I love, loves.\n@@PB@@\nAnyway, then (as now), there’s all these loose ends - these threads - that <em>would </em>connect, that feel painful not to include like clutter (like what leads to clutter). This morning was nice. I don’t mind that they’re going away. I’m already dreading my next social plan on wednesday evening, and the drink I’ll inevitably feel compelled to have. Do I dread <em>all </em>my social encounters? I slept <em>so much </em>last night - 11-10:30. And the rule I put in place last time - allowed them to wake me (I should turn it off, huh). Anyway, I suppose well do our online graphic novel class and go to vermont idk. It was nice. We didn’t kiss. I suppose to try, and <em>understand </em>each part, means getting tangled up in a web. I could make my <em>own </em>mini library, to keep them in. I could add little flaps that fold out, so a lot of the book could be there, like extra punctuation. It could be for “assignments” in my mind, and associations in practice, as though allusions. Or, as an alternate format, the thought (or memories, if it’s XI) could be on scrabble tiles in a scrabble bag, to go on the little scrabble “shelf,” and (pic)\n@@PB@@\nthe motion of <em>picking - </em>of trying to <em>build </em>something - choose tiles that can build (and in my head - the puzzle - trying them out - ooh - maybe this one - try it out - get excited - you have an idea - and then, put it back, no, not quite). Anyway, back from the imaginary realm - in XI, you can pick a card for in between them. Or, close to the normal game, once all the stories are there, you take two stories, and everyone has to volunteer a card that relates. (inverse original game <em>but </em>they can stay discreet, they don’t have to get lumped together like soup - this made me <em>hate </em>my digestive system for a second - scary - obviously fourth quarter thought to <em>not </em>think about “I don’t wanna talk about it.”\n(pic)<em>arbitrary intervals (needs to be replaced at random times, like at night - not </em>related<em> to the content, like when I </em>want to go into the house."},
{page:158,type:"day",lines:29,date:"Apr 7",text:"<strong>LATER AFTER OLD HOUSE</strong>\nin the interest of solving problems, i’ve solved nostalgia, cause I live right by my parents house, and I can go back any time I want, so I don’t have to think back on the good old times. I used to love sitting at the perfectly platonic wooden me-size table (and pretend the chairs weren’t wicker). I used to covet coming to school early, even though it <em>never </em>happened - so I could do what I wanted - specifically with arts and crafts (perhaps with the rules of the sanitary (sanctum) that were different then at home). All the paintings I finished were of me - maybe I’m interested in myself to the core - i want to get to the bottom - prosopagself - a new thing - I don’t know myself. Perhaps I <em>was </em>retarded. I can come love myself anyway - find things to love - like I can like flowers, like maddie finding something nice to say about any song. I liked how, when I was learning to read, I had that big yellow t-shirt, and I wasn’t mean to <em>anyone</em>, I kept <em>twisting </em>up in it. I wore pink, I wore girly dresses - I’m not gay/non binary. I still want to be respected. Perhaps with a dress on. In the bath and with the marker, it was hard to watch me wanting to take Sandy’s stuff, when I always told myself I didn’t have any bad behavior. In the bath, Sandy had the cow, and I wanted the cow. it’s not that I didn’t want"},
{page:159,type:"abstract",lines:28,date:"Apr 7",text:"him to have what he’s enjoying, though it seems that way. My theory is that - i wanted to share, or become aware of the thing together - play together instead of separately, be on the <em>same </em>side of the bed - cuddled up together - not different sides. But one is within the paradigm, and the other changes it. I knew I liked sharing - I didn’t know I liked it <em>that </em>much. <em>or </em>I wanted to try the toy after seeing how he’d perceived it. Now, newly perceived, I could percieve it too - perceive it like that. I must’ve felt <em>ignored </em>a lot - by Sandy - I wanted to <em>fight </em>or something - just to interact. Two scenes of me watching him read. And we could all see my trying to find what to do. In the egg scene, I think I could see <em>everyone’s </em>emotions, and it was beautiful. I think J would be jealous, if he saw the tape :( aw poor baby - he <em>couldn’t </em>be a good father - they would be all crippled and broken from trying to get his attention in such a weird way. Daddy said afterwards that he didn’t like how <em>liberal </em>he seemed in the movie. He was the kid of the family I think - always inventing games for us. We were the autistic parents - too straight faced to find anything funny, even when we got older. There were no glaring horrors. I liked Sandy doing acrobatics, and showing mommy the house he’d made for"},
{page:160,type:"day",lines:25,date:"Apr 7",text:"himself, and where he would sleep. I couldn’t get into the aggression of karate and I was very smiley, but I liked saying no - I said “no” to a lot of stuff - now it’s harder. But that is my nature. Daddy always tricking us, but I didn’t think even his <em>kid </em>games were fun, and I doubt I had fun at the assembly - I think I had a different sense of humor than most other people at the assembly. Actually what I wanted to write about was that day that I came to the main street, and Zev had set up a Become a Real Person kit van. I didn’t like it because I felt it made a mockery - as if all I was doing was nonsense. I think it makes a bit more sense now. I didn’t appreciate that it was a surprise - probably the only surprise I’ve ever had. i don’t know how many times they thought about it before doing it. I don’t get it - why I reacted that way - was I high that day I suppose I don’t like systems that other people set up - I couldn’t learn to read fast. Idk - I’ve (missing) The beauty is that everyone, in their stupid private little heads, can think whatever the fuck they want, and the world keeps turning, not minding that it looks just a little bit different to everyone."},
{page:161,type:"abstract",lines:24,date:"Apr 9",text:"APRIL 9\nI feel foolish coming up with new ideas and it’s hard to imagine that I haven’t already thought of them, but I walked into 4-5 stores on montana (no cafe) - there’s a 1-2 block stretch (pic) where there’s all sorts of trinkets that I don’t need. It was <em>so </em>tranquil in that one store, lots of space, light music, and I got the idea of making [kits] with <em>no </em>use - the progression being - “oh! I don’t know what this is:” it’s funny for a second, until, and then, you figure it out. But then I could make things that <em>really </em>have no us e- that just have that rustic feel - I was especially inspired by a cast-iron gadget, whose purpose I could not understand. It didn’t look like this, but ti could have (pic) and anyway, then I went on to design my own - a lot - (in my head) what a beautiful head - it was working so well - turning things around, storing them for later, like furniture in a room you wouldn’t forget you had a bookshelf!) and even making decisions, and getting rid of the slop when I was done with it (probably cause there isn’t <em>that </em>much space - limited space in my head. (pic) (smaller table"},
{page:162,type:"ideas",lines:75,date:"Apr 9",text:"(pic) for example, I couldn’t decide if it should be <em>wire </em>or <em>string </em>(two circles of wire (pic), and string to hold it taut. I abandoned all the other ideas, and I think this one suggests them - it’s making a bad decision multiple times, taking the road less traveled (and you can see the other paths, cause they are: useful, practical, symmetrical, logical)<em>. Ideally, it would cinch, or scrunch up, so it goes </em>slowly <em>down, around the pole, (but idk how to do that). So basically, like a children’s toy, with spokes (so - </em>not<em> just circles (</em>simple) (weave string through wire). (the end).\n— — — - - - -\n“a reverse scale - where you have to accept the paradoxes/competing patterns (”it is an exercise in acceptance” - also - it measures nothing - it is an act - a ritual. (AND it looks nice - it comes in a wooden box. Originally I imagined it coming in a spoon holder that I saw at the store (pic) wide, long, white clay, painted white, probably matte. If I was <em>nicer</em>, the base would be longer, - to give you an intermediate stage - to <em>help </em>you accept them…how it works…you <em>collect </em>some sort of pattern, to which there is evidence on both sides, and then…(place pebbles accordingly, and I guess readjust whenever you do. <em>Some </em>material could work mechanically. (I <em>think </em> wood and metal (cast iron).\n@@PB@@\nstep one (pic: pattern collector), step two (pic: pebbles, thome) in the updated version, each event has a varied aesthetic, making it possible to connect and remember individual events, hence, step two, in which the pebbles are lain on a/the thome, and each memory is recollected until the pattern begins to store. I’m not sure how this will work. Almost home, I had a mean idea which was arrived at because: one: I saw the way the shadows of the leaves fell on the street (pic) and then I thought how could I reproduce that - shine light through smaller scale petals (enough space) then: a net (mesh) - set up <em>over </em>the fabric - to paint, and I could pour petals <em>or </em>pebbles, and <em>then </em>when you dump them out and try to interpret the pattern; there is already a pattern to be interpreted - not white noise. I am accustomed to these kinds of games so I would probably unhappily readily play it - other would dismiss immediately, as a farce. Try to determine the pattern of the noise, and then cancel it.\n@@PB@@\nthrow them - you get: love - no matter how you throw them, you read: love. or: you could throw petals - muslin sewed, non-stuffed (pic) - muslin (pic: metal box, red, satin, lightly stuffed hearts) throw them on the thome, or: magnet, and pick them off a stem. At the shampoo store, I saw these tigers, and remembered the picture element - the bronze small statue to worship. The progression were: sew tigers to thome, sew (hard to print) shapes - perhaps a purple and a yellow (like a pansy (with an eye (or a butterfly, or moth) (idk if I want to make this) (pic: purple, yellow) anyway, then I thought - nah - the <em>perfect </em>thing would be to carve AI stuff on the lino block, and print in black - ex. the sardines, but <em>not </em>the sardines…having multiple steps, like the hoonies (but bigger/simpler?) sounds more appealing/less daunting, then one large one. Somehow a systematic way to print them all differently (not creative). <em>Then </em>at the general store, I saw some stuffed hearts, and thought I could <em>stuff </em>instead of “thome” the stamp (too much pre-planning makes it a different ethos?). (pic: snuffer, bell minus sound, loosely glasses, (clay?), unwieldy, not fully transparent, wavy, yellow (idk) - seaglass…idk)"},
{page:163,type:"ideas",lines:48,date:"Apr 9",text:"And, last but not least (I <em>think </em>this is the last idea:) sticks that are ideally not picked from the ground - oh - yes - the bark is removed, and then they are wood-stained (varnished, so they are prepared, but they are natural, and there is the right degree of variation and finish. (pic: there should be like six) anyway, they go in another one of those boats (made of porcelain). Anyway you collect them - like idea, over the course of a few days (probably at most a week), in the dish, and then tie them up with a white bow string (old) and there is <em>some </em>effort, and it is like collecting ideas for an essay. (pic) I had a lot of ideas for “referring to abstraction” one being the map, of how you get to various ideas, imply (but I don’t think unjustly) a spatial “bent” to the reality. Two, being how concepts transform into each other, and <em>that </em>being the rules, or the progression. I got stuck, when I took out all the off shoot ideas (or depressed), and cleaned my room and my old room for two days. Then this morning, I thought (or found a way) to add them back in. The rules that x adorn x, ?accompany? “[necessarily accompany]” a petit ontology, like the three second rule (pic: three seconds, three hours, three weeks?) - and some how I needed the small venn to be in there too.\n@@PB@@\n(missing) (pic: rice and beans, taped together, one unit of each) I think I was thinking if likes to make art that is orderly, or about an orderly world, I want to make art where the world is <em>exactly </em>how I think of it, or how it looks in my mind - cause I’ve been thinking about the protein I guess, and the mind simplifies it, like that thing I designed in the shower to be part of my set that had the sticks - idk if it meant anything. It is made of clay, and the spoon is made of brass, I think it has to be. When I was designing the mechanism (this was the first iteration). (pic) I took out the 3D compartments so I could focus on the mechanism better. In the second iteration, the spoon itself has a hole in it - solid brass, a break of wire circle, and brass again. It is important that the spoon is long, and he spoon part is small. The compartments are white clay, with clear glaze, in a sort of acorn hut lotus pod style - a hole in a tree - withered creepy.\n@@PB@@\n(missing)"},
{page:164,type:"day",lines:24,date:"Apr 11",text:"APRIL 11\nOut with Jamie last night - a little punishment, but I didn’t do anything wrong. Unenjoyed it thoroughly and in retrospect, the fake cheese on the pizza, the fake sausage that should be called something else, was somehow matching our unversation, in which we talked about nothing, like how orzo looks like rice, but is pasta - fourth quarter. (no, actually, i said: orzo looks like this, and showed her, and she said ‘no,’ but it was. Like rebecca always used to do: “yeah, no” cause I could always guess what she was gonna say, cause she was very predictable. If she deserves condescension, does that mean I do too, from Sandy?) When I left, J was running in circles, having drunk five cups of coffee - two of them\n(missing)\nbut I also thought that C.S. Lewis was talking. And sometimes I talk to people, and try to explain things to them. I like it - the inkling of understanding - that something magic like a twinkle might pass right there between us - a magic star, and what road did it take - was it under the rug that it traveled - perhaps a thread. It <em>must’ve </em>been somewhere, because it <em>did </em>travel, and I <em>didn’t </em>see it in the air."},
{page:165,type:"abstract",lines:18,date:"Apr 11",text:"some spell came over me last week and all sorts of things were dutiful, marched into the wall outside my old room to be disposed of - even the chest of drawers, once it was empty, got dumped. At the dénouement, daddy, mommy and I, finally agreed not to like all my paintings, and decided to hang grandma’s giant square architecture one that matched the wall completely. I cleared up most of the mess around my shelf unit, which was the impetus for the whole task - the sad feeling, on Sunday, of not wanting to come home, because of all the clutter. Perhaps it will be better now - once everything is clean. Then, I called early, on Wednesday - 3:38 instead of 4, instead of thursday. We went to his house and sunbathed in his yard and laid our towels next to each other, and didn’t talk about anything - spongebob, and the melody that I was"},
{page:166,type:"abstract",lines:118,date:"Apr 12",text:"April 12\nslept terribly, if I can even have been considered to have slept at all. The sheets are static, pure static. My mind is a room, and all the furniture is on fire. Brian Bookman texted me this morning. I kept reading more essays, and was relieved to find that I only delighted in that first one - Hoorah! - I can stop feeling guilty about not reading. I’m less interested in the game for the sake of a game. There must be some interesting feat which you invite people to take part in. I want people to imagine shapes as words - to see only what they have in common with words - they have something interesting in common with words - allow you to see life without the symbol(ism) as if it were just there - made for us - only what’s there, and nothing beneath it. I long to write in the angry way that C.S. Lewis does. He comes close to berating his public, saying: “you can disagree with me if you want (you’ll be wrong, but…)” (implication). I hate the people who would read my essays. I like the people they are after, after the essay has changed them. I hate that they don’t believe what I have said, because they have not read it yet. And I hate still, even after they have read it, that they didn’t think of the concept themselves.\nthat they needed to be told them, like a stupid child. How can everyone “misunderstand all they see?” It’s this “paradox,” I think. To me, it is quite clear, all the runarounds and hoops, play structures we go on, to get where we are going - to believe what it is that we need to believe in order to be fine, and to function. If I were to write an essay called “Clearing things up,” and explain all these mechanisms to people, then they would see the simple but extremely bent and wrong way that they are thinking, a tunnel that closes and then opens - a magic trick, and say to all my complicated explanations - the mechanisms I’ve designed to make them understandable, that I am complicating everything. I shouldn’t like to punch them, as would I think. I don’t need a voodoo doll, only to cast an “awareness inducing spell.” I want people to see how stupid (pic: “how do you want their face to look”) they are - if only once, if only for a moment. I long for it - I dream of it - like someone else might dream of being in a nice enchanted garden. Nothing would make me happier. If left to my own devices, I choose: “explanation” over “getting what I want.” Perhaps all the time. I want to live in a world where things are as they seem. And in the end, I don’t even believe my own frittered writings. I think - they cannot\nbe that stupid - here - surely - let’s try again - this time will work. The strange thing too, that I’ve noticed, that I’ve realized - is that - I am autistic - this is the symptom of the autism - to believe to know everything to be true. and to be right about it. It stops me from functioning - to know the truth - to not want to get on that train that I know will take me through a tunnel where I’ll disappear for a while, even though there is cake on the train, and reproduction at the end of it.\nI’m less interested in the game for the sake of a game. There must be some interesting feat which you invite people to take part in. The Game affords a delicious opportunity, in the form of: these rules and this objective, which invites, no, forces, a strategy. Think instead of what kinds of actions you want your players to take - think of the pattern of behavior you’d like to produce. My primary interest in game-making is forced behavior. My secondary interest is perhaps the ability to reproduce a metaphor for something - how the mind works, in a certain way, perhaps. I can imagine being inspired by something like “the price is right,” noticing the activity of choosing what you buy based on price - feeling quite excited when you see the game for what it is - the meta game, and translating it to a board game format;\nit does not translate. It is a microcosm. In the way that abstraction shrinks things, to the point of non-use - its purpose is demonstration - this is the withered end of my exciting new game ideas - game inspired by the realization of a slice of life game. A game that we play everyday, and hoping that you can shrink it - shrink the context, but the game will be the same. Well - it is shrunk too. A real game must be unlike abstraction in that the mechanism (, not just the metaphor) remains intact. And this is often not inspired by common experience. Common experience is probably interesting in its details and stakes, and boring in its mechanism. A common experience game is a ritual more than a game itself. As little explanations of failed brain processes, these broken games satiate at least the part of me that wants to tell everyone they’re stupid - and that their brains aren’t working properly, or at least not how they think they are. There’s another type of game I am interested in however. And that is the art game - the game we design for ourselves - that forces us into a certain line of behavior that we like. For example, I now understand (and it took me a while) what all my painting references often have in common, which is: a puzzle like quality at least when working out how to paint it. I now understand the mechanism which these produce, (tirelessly), without fail. They extend the process of drawing through the whole painting. My references have limbs in weird places so that i am oft to run into one where it is not expected. What normally is the simple start to the painting - outlining where everyt"},
{page:167,type:"abstract",lines:115,date:"Apr 12",text:"hing\ngoes - so you can get on with the color and shapes, now I consistently take part in this process - sure, I mark down where I think things are. And then I am wrong. And it is always well on my way into the painting - whistling my tune - that I find out something is amiss. Trying to line up the hand with the table leg, as it shows in the photo, I realize now the hand has become too big - elongated proportions. And when I go to backtrack, it’s a dead end - suddenly, everything is amiss. I ought to start the painting over - this time - how foolish a mistake of me - with the correct proportions. But - there is waste in that - all the carefully colored shapes I’ve already drawn. - I redraw things a little - an outline over some of my careful shapes - correcting things. And carry on. But it is only moments later that there is another error. In this way I am now fit with the task of coming to terms with what is wrong with the painting - the hand has elongated proportions. The leg goes behind the table leg, but doesn’t come out for a while. And when it does, it is much too small, and cannot be followed through. The whole painting is off - is wrong. The legs now look, at best, like snakes. Their careful shading does nothing to present the form of a person, which we are only too familiar with. The careful illusion is not just a little bit broken. Even so, the next painting, I attack in the same way - with no more care paid to my starting outlines,\nperhaps it is exactly the same naive impulse that allows my careless placement of the various things in the painting. And I had often said before that my favorite moment in drawing is that deluded interval when you notice something is wrong, if perhaps, to correct it, as in life, you cannot correct anything. Also, to note that there is: one way right, and one way wrong - the other things in the picture make sure of it. And yeah, perhaps, it is these bright white lines I am going for, in choosing the reference.\nAnother game whose mechanism calls for mistakes. I wonder now, whether these are really as intentional as I’m pretending to think, but let us keep on pretending, if only for an argument that I haven’t reached the end of - not even in my mind (not quite). I’ve played this game once, and identified it afterward - years afterward. I set out to make a lamp. I traced it, maybe, but did not account for all three dimensions. I ended up with a snake (again!). However, the careful stitching believed that it would be something special and nice. And believed it again, afterwards, even when it was done and had turned out a snake (not a lamp). Now to copy this, and do it intentionally - a procedure - with this [careful snake] the objective - in line of sight/view. This is the same as the other game: choose something that is too hard, that you can’t quite get into. I and you have solved hard problems like these.\nIt involves being careful in a very specific way - noting any obstacles that you might trip on in your mind - and doing away with them. Rather than simply “tracing” it better, you’d have to note that it is three-D. Think about - do some math perhaps. And I don’t want to do this. If it is possible to stumble into the same problematic situation once again, then that is what this game is about - not the shame, to be clear - not - as the point - a realization of shame, but instead a simple and true fascination with the final thing - the snake lamp that is too careful to be snake, too elongated and un3D to be: “lamp.” Here is where it is intentional. In the first step, we are to choose - a difficult object to recreate, and in the second, we are to refuse to input the requisite effort to avoid those flaws which we could’ve learned from last time. There is - tension, here, even - between the process that we know is right, and the process we are doing. We choose this inadequacy in our thinking, and at some point are confronted with it. At the point where - (at the same point that the legs did not match up) - perhaps we combine the two traced and cut fabric, and they do not match up, or they do not make the right shape. In the case of a more complicated object - a garnet, perhaps - we are confronted even more miserably with our predicament -\nthe shapes that were to be sewn together, are not available to be sewn to - we have a strange choice - to leave it unsewn - to leave one “side” of an object only so the illusion of an object - not this specific object, but an object at all - is broken…or else, to find another place to sew it. This, I think, is the better option - the funnier option - the more incredible option. It confronts us with our mistake, and we overcome it. This applies an acceptance step first (so, perhaps it is a treatise on shame). We have to consider an impossible question - where can it go (be sewn to) (to make the shape) “It cannot be sewn to make the shape.” “Yes, but if it were where is the best place for it,” “(if it could)” if you had a sister, would she like noodles?” (the yiddish joke about the increasingly desperate search for questions on a first date). In considering where is the best (other than the original, planned place, which lives only in the imagination), we must sit ourselves in this bath of error, and try not to overcome our error - to refresh our mindset, so that each possible choice - place to sew it - is marred by that quality of wrongness.\n&lt;emp"},
{page:168,type:"abstract",lines:58,date:"Apr 12",text:"ty-block/&gt;\nI have always been exceptional - never settled for anything less than extraordinary, which is why, rather than reusing old (and in my opinion, moldy) anxiety disorders, I’ve invented my own. “Invented” is perhaps a strong word to use in this sort of scenario. Let’s just say that I had to <em>discover </em>them myself -all their <em>ins, </em>and <em>outs, </em>and yes: ups <em>and </em>downs. Try as I might, I can <em>never </em>quite wrap my head around this last one, and perhaps that’s why it’s stayed with me for so long, but I think I’ve finally got a hood handle on the one I had before. I’ve never really described it to myself as a disorder, though I now see that that is very much what it is - insofar as it stops me from taking part in the normal goings on of life by using up all my <em>short term memory</em>, so that I always have a pained expression - I am trying to remember something - <em>not </em>“bring something to memory,” but “<em>commit </em>something <em>to memory. </em>IT is difficult, as, at any one time, there are ever so many things to remember. But am <em>not </em>in the business of forgetting, and so I tirelessly work at the process, turning the gears in my mind, when they are oily, just as much so as when they squeak.\nWhat types of things do I like to remember you might ask (you might - probably not, but you might). Let me be very vague, and hopefully will tire of this, and become very specific. I like to collect <em>examples </em>of things - that reminded me of other things, that were patterns I was collecting.\n“Ah yes - this” - <em>this </em>is an example of <em>that </em>- and the whole thought would spring up in my mind - looking like a jack in the box, threatening to topple all the careful things laid on the shelf - precarious, most of them - and there <em>was </em>no shelf, only boxes, waiting to be opened (though I seldom did). Here is an example of something I might have collected once - I think so mainly because of the proximity to the first memory, and only because for both too, I was in Brooklyn. In this memory I was explaining something to someone. She had asked something like “what do you do?” And I had taken the opportunity to think, very specifically, and yet <em>very </em>abstractly, about what it is that I <em>did</em> do. I could only produce these sorts of truthful and also outlandish answers when prompted by a stranger with so vague a question as to be taken literally, and in this case, I came up with the following answer which I an only imagine she was <em>not </em>interested in in the least: “my profession:” inventing games so as to <em>force </em>a certain course of action - a so-called “strategy” on a person, so as to elicit the kind of behavior, in this case, thought (thought behavior), you desired; a ritual. This answer made my companion proudly cling his arm around my shoulders as"},
{page:169,type:"ideas",lines:13,date:"Apr 12",text:"he never did.\n<strong>A topological approach to pattern collection: the medium sieve of my new loafers</strong>\nOn an outing with my mother, I found some rare breed of small pinecones which looked evil. I decided, designed, to use these for the curated nature collection, and in also the kit, I knew I needed to have some pebbles. However, on our walk, there were quite so <em>many </em>pebbles. Flat ones might be nice - they were different - something between a pebble and a penny. And more to the point, there weren’t very many of them. Or any of them, actually. Instead, I found myself looking with growing dismay for this rare species."},
{page:170,type:"day",lines:24,date:"Apr 12",text:"<strong>LATER (HOME)</strong>\nI’m writing my Set (missing) my days are numbered like I’m going to die - this notebook debacle is bringing up all the things I might try to quash about death if I had time to think about. I thought to myself today - I <em>want </em>to write Referring to Abstraction. Has there ever been so pure a want, or even a need? A whole book, that I thought of myself. And the subject, unlike so many other things, hasn’t wavered, has not changed - shouldn’t that alone be cause to say I can do it, and yet it cannot - I think I am not allowed. And I keep going - the ravings of a crazy person - <em>on </em>and <em>on </em>and <em>watching </em>myself too. I read the part about punching to J this morning. He said “aw - “ isn’t it <em>bad </em> to feel like that - trying to explain things to people, and they’re not understanding. I said, Larry David is always trying to play these mind games, little tricks with people, and J said “aw - isn’t that bad - to feel that way - that’s about you, isn’t it?” And he held out his arms for me” Desperately, I said “and you too, right?” and he said “and me too.” With me in his arms. That was before he kissed my head and put on my"},

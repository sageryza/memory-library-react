{page:155,type:"abstract",lines:13,date:"Apr 7",text:"LATER (HOME)\nLet’s all admit it - Sage is a bit stuck. Not Sophie, but Sage, because I “want something.” I went to the park with Maddie and the very nicest part of the wine - the grapes - was like the sunshine in the park, and me imagining that maddie liked me. I didn’t mind when we packed our stuff up “for our walk” and then, after we took turns with the bathroom so we couldn’t be women for a moment, it was time to go. The sunlight was still on. I didn’t mind. On the toilet I explained why I didn’t need to tell them what I would do when I got home, but then, outside of the stall, they said “what things?” and I said: “Oh I"},
{page:156,type:"day",lines:58,date:"Apr 7",text:"printed out a bunch of stickers last night, right before bed” “and then I got tired and had to go to sleep.” I took pleasure in telling them that. And then, after my 30 minute drive home that was nice (second perfect day) (pic) i wanted rice (missing) or maybe the traffic on the way home - how each of the freeways turned into a different freeway and I wanted to see all of them but I didn’t want to know why or how they were connected and I didn’t have to. maddie said Lindsay’s alway either mean or flirty - which she prefers? flirty - but then she flirts back - mirroring (aha! she admit it!) and then she feels weird, like I did flicking ema off,/being passive aggressive to Skye\n\nI feel like Maddie don’t ever actually talk about stuff - like, we can’t get the on a topic. We take turns telling each other stuff, and disdisavowing what other people say - the negative things. Then there’s an awkward silence, as though my eyes had opened os wide, and stayed open. And doing it, the lake gets bigger, and the stars come out, and I can miss them, each one of them, even though they are right there. J came - I played M his song and it was (his voice) too truthful, too honest. Also L-y was mocking M during their song “I changed my mind” and they are too apologetic when they play. I told M to cover the ducks with white when they were too bright, and I got too drunk. On my walk to my car, I thought: “was I thinking the correct thoughts, thinking correctly,” cause I thought, what if I was always drunk, and tried to imagine that mindset as my norm, but gave up. And I thought of another example of the temporary permanent paradox, and thought collecting the lil’ counter-intuitives was a ritual to make me feel like I have control - to keep my head on straight, to flick away any unsureness\nlike an annoying fly. But it’s also like collecting a sack of oranges, heaving it over your shoulder, and also like: the bingo card - large, hung on the wall, but then large, hung on the floor, like a twister game, like a chess board, where the pebbles are the pieces, and people put them, like rocks on a grave, and sometimes they get kicked into the wrong square, with the toe of people’s shoes who are not playing (men, most likely, cause they are work boots). The oranges first, then the game of tic tac toe (or maybe reversed) (- the oranges) - don’t worry - carried around - don’t worry - they’re collected. But then the orange sack changes shape s- idk specifically - anyway - the point is (and I refined this more later) - it’s important that all the forms are there - you can’t summarize into the “final form,” it’s not the same thing - “we should stop seeing each other - for a while - a week,” I can summarize, but it won’t be the same."},
{page:157,type:"abstract",lines:63,date:"Apr 7",text:"I had these two realizations (besides the 4D concept/diagram one), I’ve forgotten the first and it’s making me sad. The second, if it was an essay (it is) would have the way Brian Eno (progression) sort of flips through things, cause he wants to get somewhere (carrying it around cause cover + size). M impressed - ooh Brian Eno), and that’s what I want, or the small venn I went from the ( . ) book. What happens, i think, is that I get snapped up, consumed with energy, the initial push - the thought (of the red book, there in my mind (I want it to exist - I can’t even admit it, I want it so bad, like eye ball ice cream from the truck (pic) (this is how much I want it - like meeting that one mexican girl at the speakeasy, like laying out all my crystals on the tables, but if I’d actually appreciated how nice it was. - the red book - shiny - glinting in the sun - embedded past the flush, and he having it then - a niggle in his mind - the one that the one that I love, loves.\n\nAnyway, then (as now), there’s all these loose ends - these threads - that would connect, that feel painful not to include like clutter (like what leads to clutter). This morning was nice. I don’t mind that they’re going away. I’m already dreading my next social plan on wednesday evening, and the drink I’ll inevitably feel compelled to have. Do I dread all my social encounters? I slept so much last night - 11-10:30. And the rule I put in place last time - allowed them to wake me (I should turn it off, huh). Anyway, I suppose well do our online graphic novel class and go to vermont idk. It was nice. We didn’t kiss. I suppose to try, and understand each part, means getting tangled up in a web. I could make my own mini library, to keep them in. I could add little flaps that fold out, so a lot of the book could be there, like extra punctuation. It could be for “assignments” in my mind, and associations in practice, as though allusions. Or, as an alternate format, the thought (or memories, if it’s XI) could be on scrabble tiles in a scrabble bag, to go on the little scrabble “shelf,” and (pic)\n\nthe motion of picking - of trying to build something - choose tiles that can build (and in my head - the puzzle - trying them out - ooh - maybe this one - try it out - get excited - you have an idea - and then, put it back, no, not quite). Anyway, back from the imaginary realm - in XI, you can pick a card for in between them. Or, close to the normal game, once all the stories are there, you take two stories, and everyone has to volunteer a card that relates. (inverse original game but they can stay discreet, they don’t have to get lumped together like soup - this made me hate my digestive system for a second - scary - obviously fourth quarter thought to not think about “I don’t wanna talk about it.”\n(pic)arbitrary intervals (needs to be replaced at random times, like at night - not related to the content, like when I want to go into the house."},
{page:158,type:"day",lines:29,date:"Apr 7",text:"LATER AFTER OLD HOUSE\nin the interest of solving problems, i’ve solved nostalgia, cause I live right by my parents house, and I can go back any time I want, so I don’t have to think back on the good old times. I used to love sitting at the perfectly platonic wooden me-size table (and pretend the chairs weren’t wicker). I used to covet coming to school early, even though it never happened - so I could do what I wanted - specifically with arts and crafts (perhaps with the rules of the sanitary (sanctum) that were different then at home). All the paintings I finished were of me - maybe I’m interested in myself to the core - i want to get to the bottom - prosopagself - a new thing - I don’t know myself. Perhaps I was retarded. I can come love myself anyway - find things to love - like I can like flowers, like maddie finding something nice to say about any song. I liked how, when I was learning to read, I had that big yellow t-shirt, and I wasn’t mean to anyone, I kept twisting up in it. I wore pink, I wore girly dresses - I’m not gay/non binary. I still want to be respected. Perhaps with a dress on. In the bath and with the marker, it was hard to watch me wanting to take Sandy’s stuff, when I always told myself I didn’t have any bad behavior. In the bath, Sandy had the cow, and I wanted the cow. it’s not that I didn’t want"},
{page:159,type:"abstract",lines:28,date:"Apr 7",text:"him to have what he’s enjoying, though it seems that way. My theory is that - i wanted to share, or become aware of the thing together - play together instead of separately, be on the same side of the bed - cuddled up together - not different sides. But one is within the paradigm, and the other changes it. I knew I liked sharing - I didn’t know I liked it that much. or I wanted to try the toy after seeing how he’d perceived it. Now, newly perceived, I could percieve it too - perceive it like that. I must’ve felt ignored a lot - by Sandy - I wanted to fight or something - just to interact. Two scenes of me watching him read. And we could all see my trying to find what to do. In the egg scene, I think I could see everyone’s emotions, and it was beautiful. I think J would be jealous, if he saw the tape :( aw poor baby - he couldn’t be a good father - they would be all crippled and broken from trying to get his attention in such a weird way. Daddy said afterwards that he didn’t like how liberal he seemed in the movie. He was the kid of the family I think - always inventing games for us. We were the autistic parents - too straight faced to find anything funny, even when we got older. There were no glaring horrors. I liked Sandy doing acrobatics, and showing mommy the house he’d made for"},
{page:160,type:"day",lines:25,date:"Apr 7",text:"himself, and where he would sleep. I couldn’t get into the aggression of karate and I was very smiley, but I liked saying no - I said “no” to a lot of stuff - now it’s harder. But that is my nature. Daddy always tricking us, but I didn’t think even his kid games were fun, and I doubt I had fun at the assembly - I think I had a different sense of humor than most other people at the assembly. Actually what I wanted to write about was that day that I came to the main street, and Zev had set up a Become a Real Person kit van. I didn’t like it because I felt it made a mockery - as if all I was doing was nonsense. I think it makes a bit more sense now. I didn’t appreciate that it was a surprise - probably the only surprise I’ve ever had. i don’t know how many times they thought about it before doing it. I don’t get it - why I reacted that way - was I high that day I suppose I don’t like systems that other people set up - I couldn’t learn to read fast. Idk - I’ve (missing) The beauty is that everyone, in their stupid private little heads, can think whatever the fuck they want, and the world keeps turning, not minding that it looks just a little bit different to everyone."},
{page:161,type:"abstract",lines:24,date:"Apr 9",text:"APRIL 9\nI feel foolish coming up with new ideas and it’s hard to imagine that I haven’t already thought of them, but I walked into 4-5 stores on montana (no cafe) - there’s a 1-2 block stretch (pic) where there’s all sorts of trinkets that I don’t need. It was so tranquil in that one store, lots of space, light music, and I got the idea of making [kits] with no use - the progression being - “oh! I don’t know what this is:” it’s funny for a second, until, and then, you figure it out. But then I could make things that really have no us e- that just have that rustic feel - I was especially inspired by a cast-iron gadget, whose purpose I could not understand. It didn’t look like this, but ti could have (pic) and anyway, then I went on to design my own - a lot - (in my head) what a beautiful head - it was working so well - turning things around, storing them for later, like furniture in a room you wouldn’t forget you had a bookshelf!) and even making decisions, and getting rid of the slop when I was done with it (probably cause there isn’t that much space - limited space in my head. (pic) (smaller table"},
{page:162,type:"ideas",lines:75,date:"Apr 9",text:"(pic) for example, I couldn’t decide if it should be wire or string (two circles of wire (pic), and string to hold it taut. I abandoned all the other ideas, and I think this one suggests them - it’s making a bad decision multiple times, taking the road less traveled (and you can see the other paths, cause they are: useful, practical, symmetrical, logical). Ideally, it would cinch, or scrunch up, so it goes slowly down, around the pole, (but idk how to do that). So basically, like a children’s toy, with spokes (so - not just circles (simple) (weave string through wire). (the end).\n— — — - - - -\n“a reverse scale - where you have to accept the paradoxes/competing patterns (”it is an exercise in acceptance” - also - it measures nothing - it is an act - a ritual. (AND it looks nice - it comes in a wooden box. Originally I imagined it coming in a spoon holder that I saw at the store (pic) wide, long, white clay, painted white, probably matte. If I was nicer, the base would be longer, - to give you an intermediate stage - to help you accept them…how it works…you collect some sort of pattern, to which there is evidence on both sides, and then…(place pebbles accordingly, and I guess readjust whenever you do. Some material could work mechanically. (I think wood and metal (cast iron).\n\nstep one (pic: pattern collector), step two (pic: pebbles, thome) in the updated version, each event has a varied aesthetic, making it possible to connect and remember individual events, hence, step two, in which the pebbles are lain on a/the thome, and each memory is recollected until the pattern begins to store. I’m not sure how this will work. Almost home, I had a mean idea which was arrived at because: one: I saw the way the shadows of the leaves fell on the street (pic) and then I thought how could I reproduce that - shine light through smaller scale petals (enough space) then: a net (mesh) - set up over the fabric - to paint, and I could pour petals or pebbles, and then when you dump them out and try to interpret the pattern; there is already a pattern to be interpreted - not white noise. I am accustomed to these kinds of games so I would probably unhappily readily play it - other would dismiss immediately, as a farce. Try to determine the pattern of the noise, and then cancel it.\n\nthrow them - you get: love - no matter how you throw them, you read: love. or: you could throw petals - muslin sewed, non-stuffed (pic) - muslin (pic: metal box, red, satin, lightly stuffed hearts) throw them on the thome, or: magnet, and pick them off a stem. At the shampoo store, I saw these tigers, and remembered the picture element - the bronze small statue to worship. The progression were: sew tigers to thome, sew (hard to print) shapes - perhaps a purple and a yellow (like a pansy (with an eye (or a butterfly, or moth) (idk if I want to make this) (pic: purple, yellow) anyway, then I thought - nah - the perfect thing would be to carve AI stuff on the lino block, and print in black - ex. the sardines, but not the sardines…having multiple steps, like the hoonies (but bigger/simpler?) sounds more appealing/less daunting, then one large one. Somehow a systematic way to print them all differently (not creative). Then at the general store, I saw some stuffed hearts, and thought I could stuff instead of “thome” the stamp (too much pre-planning makes it a different ethos?). (pic: snuffer, bell minus sound, loosely glasses, (clay?), unwieldy, not fully transparent, wavy, yellow (idk) - seaglass…idk)"},
{page:163,type:"ideas",lines:48,date:"Apr 9",text:"And, last but not least (I think this is the last idea:) sticks that are ideally not picked from the ground - oh - yes - the bark is removed, and then they are wood-stained (varnished, so they are prepared, but they are natural, and there is the right degree of variation and finish. (pic: there should be like six) anyway, they go in another one of those boats (made of porcelain). Anyway you collect them - like idea, over the course of a few days (probably at most a week), in the dish, and then tie them up with a white bow string (old) and there is some effort, and it is like collecting ideas for an essay. (pic) I had a lot of ideas for “referring to abstraction” one being the map, of how you get to various ideas, imply (but I don’t think unjustly) a spatial “bent” to the reality. Two, being how concepts transform into each other, and that being the rules, or the progression. I got stuck, when I took out all the off shoot ideas (or depressed), and cleaned my room and my old room for two days. Then this morning, I thought (or found a way) to add them back in. The rules that x adorn x, ?accompany? “[necessarily accompany]” a petit ontology, like the three second rule (pic: three seconds, three hours, three weeks?) - and some how I needed the small venn to be in there too.\n\n(missing) (pic: rice and beans, taped together, one unit of each) I think I was thinking if likes to make art that is orderly, or about an orderly world, I want to make art where the world is exactly how I think of it, or how it looks in my mind - cause I’ve been thinking about the protein I guess, and the mind simplifies it, like that thing I designed in the shower to be part of my set that had the sticks - idk if it meant anything. It is made of clay, and the spoon is made of brass, I think it has to be. When I was designing the mechanism (this was the first iteration). (pic) I took out the 3D compartments so I could focus on the mechanism better. In the second iteration, the spoon itself has a hole in it - solid brass, a break of wire circle, and brass again. It is important that the spoon is long, and he spoon part is small. The compartments are white clay, with clear glaze, in a sort of acorn hut lotus pod style - a hole in a tree - withered creepy.\n\n(missing)"},
{page:164,type:"day",lines:24,date:"Apr 11",text:"APRIL 11\nOut with Jamie last night - a little punishment, but I didn’t do anything wrong. Unenjoyed it thoroughly and in retrospect, the fake cheese on the pizza, the fake sausage that should be called something else, was somehow matching our unversation, in which we talked about nothing, like how orzo looks like rice, but is pasta - fourth quarter. (no, actually, i said: orzo looks like this, and showed her, and she said ‘no,’ but it was. Like rebecca always used to do: “yeah, no” cause I could always guess what she was gonna say, cause she was very predictable. If she deserves condescension, does that mean I do too, from Sandy?) When I left, J was running in circles, having drunk five cups of coffee - two of them\n(missing)\nbut I also thought that C.S. Lewis was talking. And sometimes I talk to people, and try to explain things to them. I like it - the inkling of understanding - that something magic like a twinkle might pass right there between us - a magic star, and what road did it take - was it under the rug that it traveled - perhaps a thread. It must’ve been somewhere, because it did travel, and I didn’t see it in the air."},
{page:165,type:"abstract",lines:18,date:"Apr 11",text:"some spell came over me last week and all sorts of things were dutiful, marched into the wall outside my old room to be disposed of - even the chest of drawers, once it was empty, got dumped. At the dénouement, daddy, mommy and I, finally agreed not to like all my paintings, and decided to hang grandma’s giant square architecture one that matched the wall completely. I cleared up most of the mess around my shelf unit, which was the impetus for the whole task - the sad feeling, on Sunday, of not wanting to come home, because of all the clutter. Perhaps it will be better now - once everything is clean. Then, I called early, on Wednesday - 3:38 instead of 4, instead of thursday. We went to his house and sunbathed in his yard and laid our towels next to each other, and didn’t talk about anything - spongebob, and the melody that I was"},
{page:166,type:"abstract",lines:118,date:"Apr 12",text:"April 12\nslept terribly, if I can even have been considered to have slept at all. The sheets are static, pure static. My mind is a room, and all the furniture is on fire. Brian Bookman texted me this morning. I kept reading more essays, and was relieved to find that I only delighted in that first one - Hoorah! - I can stop feeling guilty about not reading. I’m less interested in the game for the sake of a game. There must be some interesting feat which you invite people to take part in. I want people to imagine shapes as words - to see only what they have in common with words - they have something interesting in common with words - allow you to see life without the symbol(ism) as if it were just there - made for us - only what’s there, and nothing beneath it. I long to write in the angry way that C.S. Lewis does. He comes close to berating his public, saying: “you can disagree with me if you want (you’ll be wrong, but…)” (implication). I hate the people who would read my essays. I like the people they are after, after the essay has changed them. I hate that they don’t believe what I have said, because they have not read it yet. And I hate still, even after they have read it, that they didn’t think of the concept themselves.\nthat they needed to be told them, like a stupid child. How can everyone “misunderstand all they see?” It’s this “paradox,” I think. To me, it is quite clear, all the runarounds and hoops, play structures we go on, to get where we are going - to believe what it is that we need to believe in order to be fine, and to function. If I were to write an essay called “Clearing things up,” and explain all these mechanisms to people, then they would see the simple but extremely bent and wrong way that they are thinking, a tunnel that closes and then opens - a magic trick, and say to all my complicated explanations - the mechanisms I’ve designed to make them understandable, that I am complicating everything. I shouldn’t like to punch them, as would I think. I don’t need a voodoo doll, only to cast an “awareness inducing spell.” I want people to see how stupid (pic: “how do you want their face to look”) they are - if only once, if only for a moment. I long for it - I dream of it - like someone else might dream of being in a nice enchanted garden. Nothing would make me happier. If left to my own devices, I choose: “explanation” over “getting what I want.” Perhaps all the time. I want to live in a world where things are as they seem. And in the end, I don’t even believe my own frittered writings. I think - they cannot\nbe that stupid - here - surely - let’s try again - this time will work. The strange thing too, that I’ve noticed, that I’ve realized - is that - I am autistic - this is the symptom of the autism - to believe to know everything to be true. and to be right about it. It stops me from functioning - to know the truth - to not want to get on that train that I know will take me through a tunnel where I’ll disappear for a while, even though there is cake on the train, and reproduction at the end of it.\nI’m less interested in the game for the sake of a game. There must be some interesting feat which you invite people to take part in. The Game affords a delicious opportunity, in the form of: these rules and this objective, which invites, no, forces, a strategy. Think instead of what kinds of actions you want your players to take - think of the pattern of behavior you’d like to produce. My primary interest in game-making is forced behavior. My secondary interest is perhaps the ability to reproduce a metaphor for something - how the mind works, in a certain way, perhaps. I can imagine being inspired by something like “the price is right,” noticing the activity of choosing what you buy based on price - feeling quite excited when you see the game for what it is - the meta game, and translating it to a board game format;\nit does not translate. It is a microcosm. In the way that abstraction shrinks things, to the point of non-use - its purpose is demonstration - this is the withered end of my exciting new game ideas - game inspired by the realization of a slice of life game. A game that we play everyday, and hoping that you can shrink it - shrink the context, but the game will be the same. Well - it is shrunk too. A real game must be unlike abstraction in that the mechanism (, not just the metaphor) remains intact. And this is often not inspired by common experience. Common experience is probably interesting in its details and stakes, and boring in its mechanism. A common experience game is a ritual more than a game itself. As little explanations of failed brain processes, these broken games satiate at least the part of me that wants to tell everyone they’re stupid - and that their brains aren’t working properly, or at least not how they think they are. There’s another type of game I am interested in however. And that is the art game - the game we design for ourselves - that forces us into a certain line of behavior that we like. For example, I now understand (and it took me a while) what all my painting references often have in common, which is: a puzzle like quality at least when working out how to paint it. I now understand the mechanism which these produce, (tirelessly), without fail. They extend the process of drawing through the whole painting. My references have limbs in weird places so that i am oft to run into one where it is not expected. What normally is the simple start to the painting - outlining where everyt"},
{page:167,type:"abstract",lines:115,date:"Apr 12",text:"hing\ngoes - so you can get on with the color and shapes, now I consistently take part in this process - sure, I mark down where I think things are. And then I am wrong. And it is always well on my way into the painting - whistling my tune - that I find out something is amiss. Trying to line up the hand with the table leg, as it shows in the photo, I realize now the hand has become too big - elongated proportions. And when I go to backtrack, it’s a dead end - suddenly, everything is amiss. I ought to start the painting over - this time - how foolish a mistake of me - with the correct proportions. But - there is waste in that - all the carefully colored shapes I’ve already drawn. - I redraw things a little - an outline over some of my careful shapes - correcting things. And carry on. But it is only moments later that there is another error. In this way I am now fit with the task of coming to terms with what is wrong with the painting - the hand has elongated proportions. The leg goes behind the table leg, but doesn’t come out for a while. And when it does, it is much too small, and cannot be followed through. The whole painting is off - is wrong. The legs now look, at best, like snakes. Their careful shading does nothing to present the form of a person, which we are only too familiar with. The careful illusion is not just a little bit broken. Even so, the next painting, I attack in the same way - with no more care paid to my starting outlines,\nperhaps it is exactly the same naive impulse that allows my careless placement of the various things in the painting. And I had often said before that my favorite moment in drawing is that deluded interval when you notice something is wrong, if perhaps, to correct it, as in life, you cannot correct anything. Also, to note that there is: one way right, and one way wrong - the other things in the picture make sure of it. And yeah, perhaps, it is these bright white lines I am going for, in choosing the reference.\nAnother game whose mechanism calls for mistakes. I wonder now, whether these are really as intentional as I’m pretending to think, but let us keep on pretending, if only for an argument that I haven’t reached the end of - not even in my mind (not quite). I’ve played this game once, and identified it afterward - years afterward. I set out to make a lamp. I traced it, maybe, but did not account for all three dimensions. I ended up with a snake (again!). However, the careful stitching believed that it would be something special and nice. And believed it again, afterwards, even when it was done and had turned out a snake (not a lamp). Now to copy this, and do it intentionally - a procedure - with this [careful snake] the objective - in line of sight/view. This is the same as the other game: choose something that is too hard, that you can’t quite get into. I and you have solved hard problems like these.\nIt involves being careful in a very specific way - noting any obstacles that you might trip on in your mind - and doing away with them. Rather than simply “tracing” it better, you’d have to note that it is three-D. Think about - do some math perhaps. And I don’t want to do this. If it is possible to stumble into the same problematic situation once again, then that is what this game is about - not the shame, to be clear - not - as the point - a realization of shame, but instead a simple and true fascination with the final thing - the snake lamp that is too careful to be snake, too elongated and un3D to be: “lamp.” Here is where it is intentional. In the first step, we are to choose - a difficult object to recreate, and in the second, we are to refuse to input the requisite effort to avoid those flaws which we could’ve learned from last time. There is - tension, here, even - between the process that we know is right, and the process we are doing. We choose this inadequacy in our thinking, and at some point are confronted with it. At the point where - (at the same point that the legs did not match up) - perhaps we combine the two traced and cut fabric, and they do not match up, or they do not make the right shape. In the case of a more complicated object - a garnet, perhaps - we are confronted even more miserably with our predicament -\nthe shapes that were to be sewn together, are not available to be sewn to - we have a strange choice - to leave it unsewn - to leave one “side” of an object only so the illusion of an object - not this specific object, but an object at all - is broken…or else, to find another place to sew it. This, I think, is the better option - the funnier option - the more incredible option. It confronts us with our mistake, and we overcome it. This applies an acceptance step first (so, perhaps it is a treatise on shame). We have to consider an impossible question - where can it go (be sewn to) (to make the shape) “It cannot be sewn to make the shape.” “Yes, but if it were where is the best place for it,” “(if it could)” if you had a sister, would she like noodles?” (the yiddish joke about the increasingly desperate search for questions on a first date). In considering where is the best (other than the original, planned place, which lives only in the imagination), we must sit ourselves in this bath of error, and try not to overcome our error - to refresh our mindset, so that each possible choice - place to sew it - is marred by that quality of wrongness."},
{page:168,type:"abstract",lines:58,date:"Apr 12",text:"I have always been exceptional - never settled for anything less than extraordinary, which is why, rather than reusing old (and in my opinion, moldy) anxiety disorders, I’ve invented my own. “Invented” is perhaps a strong word to use in this sort of scenario. Let’s just say that I had to discover them myself -all their ins, and outs, and yes: ups and downs. Try as I might, I can never quite wrap my head around this last one, and perhaps that’s why it’s stayed with me for so long, but I think I’ve finally got a hood handle on the one I had before. I’ve never really described it to myself as a disorder, though I now see that that is very much what it is - insofar as it stops me from taking part in the normal goings on of life by using up all my short term memory, so that I always have a pained expression - I am trying to remember something - not “bring something to memory,” but “commit something to memory. IT is difficult, as, at any one time, there are ever so many things to remember. But am not in the business of forgetting, and so I tirelessly work at the process, turning the gears in my mind, when they are oily, just as much so as when they squeak.\nWhat types of things do I like to remember you might ask (you might - probably not, but you might). Let me be very vague, and hopefully will tire of this, and become very specific. I like to collect examples of things - that reminded me of other things, that were patterns I was collecting.\n“Ah yes - this” - this is an example of that - and the whole thought would spring up in my mind - looking like a jack in the box, threatening to topple all the careful things laid on the shelf - precarious, most of them - and there was no shelf, only boxes, waiting to be opened (though I seldom did). Here is an example of something I might have collected once - I think so mainly because of the proximity to the first memory, and only because for both too, I was in Brooklyn. In this memory I was explaining something to someone. She had asked something like “what do you do?” And I had taken the opportunity to think, very specifically, and yet very abstractly, about what it is that I did do. I could only produce these sorts of truthful and also outlandish answers when prompted by a stranger with so vague a question as to be taken literally, and in this case, I came up with the following answer which I an only imagine she was not interested in in the least: “my profession:” inventing games so as to force a certain course of action - a so-called “strategy” on a person, so as to elicit the kind of behavior, in this case, thought (thought behavior), you desired; a ritual. This answer made my companion proudly cling his arm around my shoulders as"},
{page:169,type:"ideas",lines:13,date:"Apr 12",text:"he never did.\nA topological approach to pattern collection: the medium sieve of my new loafers\nOn an outing with my mother, I found some rare breed of small pinecones which looked evil. I decided, designed, to use these for the curated nature collection, and in also the kit, I knew I needed to have some pebbles. However, on our walk, there were quite so many pebbles. Flat ones might be nice - they were different - something between a pebble and a penny. And more to the point, there weren’t very many of them. Or any of them, actually. Instead, I found myself looking with growing dismay for this rare species."},
{page:170,type:"day",lines:24,date:"Apr 12",text:"LATER (HOME)\nI’m writing my Set (missing) my days are numbered like I’m going to die - this notebook debacle is bringing up all the things I might try to quash about death if I had time to think about. I thought to myself today - I want to write Referring to Abstraction. Has there ever been so pure a want, or even a need? A whole book, that I thought of myself. And the subject, unlike so many other things, hasn’t wavered, has not changed - shouldn’t that alone be cause to say I can do it, and yet it cannot - I think I am not allowed. And I keep going - the ravings of a crazy person - on and on and watching myself too. I read the part about punching to J this morning. He said “aw - “ isn’t it bad to feel like that - trying to explain things to people, and they’re not understanding. I said, Larry David is always trying to play these mind games, little tricks with people, and J said “aw - isn’t that bad - to feel that way - that’s about you, isn’t it?” And he held out his arms for me” Desperately, I said “and you too, right?” and he said “and me too.” With me in his arms. That was before he kissed my head and put on my"},
{page:171,type:"day",lines:15,date:"Apr 12",text:"favorite movie like I asked him to while he took his shower because my tummy hurt. I’ll only write the nice things. And won’t remember, and will try not to remember - the oblong gray way I felt last night. Like I was on a wobbly ship, waiting to get off. He did his pedestal tableau - to say what its like when you ask someone a question, and their answer is: wow that’s a great question - I never thought of that,” stood up tall on his ottoman - showed me how much he liked being on his pedestal (not very much). His parents skip back and forth, cycle between LA, LV, and WA, depending on weather. His dad hates flying but goes almost every week - I guess he’s more afraid (or hateful?)"},
{page:172,type:"abstract",lines:66,date:"Apr 13",text:"April 13\nIt may be difficult to get people to think as you would like them to. Say to them: “think like this,” and into their head will come: “why?!” and “Why should I do what you say?” but there is a simple trick, a way around it and that is to get them to agree to a game. A small version of reality - that doesn’t count. no matter how many times you find treasure in a game, you will be no closer to finding treasure in real life. A game is a microcosm, a metaphor, suspended disbelief, a special little thing that says: “this is only practice, this is not real.” just say, hypothetically, and no one has an issue with that. And so, you can get them to agree to a game pretty easily. And so, a game is an extraordinary way to get people to think as you would like them to. And the nice shift thing about this excursion, this endeavor, is that, our different baskets, one for reality, and one for fantasy (imagination) are only there in our head. we think one thing when we are on the outset of the excursion - those baskets are as real and concrete as any, though they live in our head. However, once we start loading stuff into the one basket (called fantasy, imagination, we find it starts to get quite heavy, and perhaps might break. And all the things we put into it will go strewing around our mind, suddenly nestled into the same crevices that we put our reality into. (oh, then we are in trouble).\nIn the meantime, let us go back to the original premise of a game, which is, I feel sure, made up of two primary parts: the rules, and the objective. Without the objective, we would have nowhere to go, and without the rules we would have no way to get there. And these two parts, lonely as they seem, beget, (and not unnecessarily), a something which we will call ‘strategy,’\n\nand this is by all accounts, the summation of the two - the rules and the objective, and can be inferred from that - can be gotten there directly. It can be said, of a game player, that they are looking at the objective directly, that it is staring, that it is right in front of them. And through the rules, which are like incremental cones, set up so as to form an obstacle course, they can only see it. They see it through this affected path, this changing line, and cannot see it without picking the path it would take to get there (the strategy). The game player moves, in response to the rules, towards the objective. And this is called: the strategy, this path that is affected by rules and looks towards the objective. Take the objective out, strip the game of its rules, and we have a certain pattern of behavior, as if a race car driver had forgotten that the cones were gone, or was driving blind, and slipped into this strange and awkward path, that accounts for obstacles that are no longer there.\nNow, as we have come to do, let us work backwards, imagine from the outset that we desire a certain strategy, a certain path of movement, a pattern of behavior, and we now have the task of designing rules, and an objective, that will befit this strategy, that will necessitate it, require it."},
{page:173,type:"day",lines:29,date:"Apr 13",text:"“what makes others tick…” Lindsay\nLindsay was my teacher in the one year of college - 3D Design. Lindsay had designed the most insanely specific a project that I can imagine. She wanted us to make animal masks out of foam. Not only that, but they had to have a mechanism. Mine was a monkey whose eyeballs dropped out from a string when you twisted the ears on the side. Despite the strict confines of the project, dictating not just material, nor mechanism, but also the subject matter (animal). I believe our 3D design professor had something even more specific in mind. You see, there were whispers that if, in response to your project, she let out an involuntary chuckle, a guffaw even, that you were a shoo in for an A. The very little freedom in this project makes me question her understanding of the role of a teacher (this was college, not kindergarten). However, judgement aside, I think this points to two specific points that I want to make. 1. She has designed the rules to a game (we see them clearly in the narrow confines of the assignment). 2. She knows, very clearly, about what the desired outcome is. Whatever it is that makes Lindsay giggle, and I suspect it can be inferred directly from the “confines” of the assignment is the unconscious “reference” for the assignment is the unconscious “reference” for the assignment - the ghost of the machine."},
{page:174,type:"abstract",lines:29,date:"Apr 13",text:"“success is a [place/land] where we can act without thought”\nEveryone’s favorite complaint - the mindless or mindnumbing scrolling on tiktok. I’m sure others have thought more about the addictiveness of this foul loop, but my theory is it has to do with the limited available choices - only two (like, or move on/scroll.” if you don’t like, there is really only one action - down - very easy to remember. In “Pairings,” I conducted/created an “experiment” where there was only one choice at a time: 1. square it. (a procedure - black and white. And the decision was where to put the square.\n…I think, with the added context of the previous procedure, the three step process, once of taking out the color, of making it square, choosing the picture, the actual cropping procedure could be said, the importance at least, to have shrunk in proportion to its counterparts - a quarter of its size.\n\nEver a problem solver ( 🙄 I know, embarrassing). I theorized that, were I to adjust the conditions just slightly - that the impetus itself was not so evil, so foolhardy, as to be incorrect, that parameters, adjusted slightly, could produce a game that would distract as intended, but leave out the endless loop - the addictive quality - that which draws us further in, like trying to quench thirst with coca cola - though it is of similar substance to water, it simply makes you thirstier."},
{page:175,type:"abstract",lines:40,date:"Apr 14",text:"APRIL 14\n…doing algebra homework. this is only sort of a metaphor, because algebra involves solving for…and in this game, or assignment, or exercise, you can some for either - one of the comparisons - things being compared to each other, or the middle - (most common) what it is that they have in common. In Referring to Abstraction, we saw that the curation of this pair was what begot the abstraction into our mind - conjured it - perhaps the inescapability that makes magic powerful. […] I offer now, a contained exploration of this activity - the small venn, in which chip away at what we are referring, that it is easier and easier to see (?) more and more specific. Let us not forget the start, lest we get lost, and so, we will frequently remind ourselves of: the two things - the pair coming up a single - a necessary - central commonality. I think it best to let myself stray to the end, lest I forget it (?where we are goin?)…a map I think (not a map of meaning, closer to lord of maps). in which we squish, disintegrate, get so specific about what we are referring to, by pointing out not only the parts that they are [taking the form of], but also, the parts that each part is being compared to. Because of the complications and that, because our mind is not a perfect computer, and there is a limit to how many things we can mold in it at once (you know this! really hope you know this). For example (and the example was originally want to help explain it,) , like shaving off little pieces, we edge, or chip our way closer - a sculpture, or a snow cone, whichever helps you understand it…, in that\nPetit Ontology\nIn which the rules of logic, needing only to extend as far as the [thing in question], and may be simplified as such. An efficient ontology, in that we only require the logic that is required for the thing itself, and so it is crippled.\n\n(missing)"},
{page:176,type:"abstract",lines:21,date:"Apr 16",text:"APRIL 16\nHad a theory that it counts up - the metaphor, the set, and then something more - artificial - conor - charlie. In the meantime I was developing some sculptures (pic), thought it was interesting how the vine gets to where it’s going, but gets lost in the middle nitty gritty thought is that the length is beyond our computational ability, as humans - and so, it is: a puzzle, a counterbalance (but there is a hidden mechanism, or this is a HMI, because when you look at it on another level, it is just a vine, like any other, and we know what vines do - they connect things, and it does not matter how roundabout the connection is, they are still considered as much, vines.\n— — —\nand the other thing, for example:\n(pic: the way the leaves blow in the breeze, tree, picking it when it’s ripe)(pic: a vine, or at least, something that has some property in common with a vine) (pic: this becomes ⇒ 4D - the evolving metaphor critique) (pic: you know, this looks like a…)"},
{page:177,type:"ideas",lines:8,date:"Apr 16",text:"If I were sticking things to each other, with ian, for example, this “dongle” that I made (with perhaps, the moon, and a dandelion, unblown). I could stick plato to essential characteristics - I saved that in bed for myself. And I (?) those (?) stuffed animals, so one wouldn’t run off and join the circus\n\n— — —\nand this, although it looks like an actual structure"},
{page:178,type:"day",lines:41,date:"Apr 16",text:"LATER (J’S HOUSE)\nJonababy is sleeping. He bypassed having to apologize by calling me wet noodle princess before getting in bed (couch). Here are my thoughts that I did not think were sufficient to write down in the shower (when I got out of the shower) (my hair is still dripping) (we went to the beach and saw seagulls and a crow came to sit on our chair when we got up and he was a king and I was a princess and we saw an epileptic girl - how did we know she was epileptic? She told us (pic) the parking meter is fine. I live across the street. I have epilepsy,. (missing) I think the (hard) part about referring to abstraction is that it’s kind of hard - lots of things change, and look different from day to day. I used to ask myself: can it be simplified?” Like the version of life I saw at that aa meeting, with all the bikers, when the sky was slowly turning to black, and was opaque as it was at the beach (like a wind sweeping in (they were just clouds) (pic) it’s amazing how much pie we have at home\n\n(pic: I was all smushed, and I looked extra jewish - like, just like rachel, for example.\n(pic: money, wish fulfillment in severance, narrow, ai and game mechanisms, also, how I looked in the shower, when I saw myself in the spigot. The tupperware were I saved the computational power of a human brain, without any switches - circuits)\nconglomerate colonoscopy - you put narrow into the machine, but no first you put 1 or 2 maybe, examples of narrow, and then you wait for the other examples to come in, so it is like pushing a button, (pic: start collecting)\nWhat goes in the metaphor machine? Anything that defines a set (that complicates and simples things: could be: examples, rule (set), combination. And the metaphor is the “ghost”of the “shell,” because all you see are the essential characteristics, so you just get sort of the feeling of the thing.\n(pic: mold theory (holding hands) instrumentalism)\n(pic: ghost, shell)"},
{page:179,type:"ideas",lines:9,date:"Apr 16",text:"(pic: maddie’s idea) (pic: this weird book thing that I invented, where you read four books and then see what they have in common). The intermediate stage is like showing your cards (pic)\nthe automatic process of seeing what diagrams were in your head - this is something that you can do without “thinking.”\n(pic: emitting patterns, like wearing cowboy boots, and a cowboy hat, or “acting like a cowboy.”\n\n(missing: probs forever)"},
{page:180,type:"ideas",lines:12,date:"Apr 17",text:"April 17\nTried cutting lino blocks. It didn’t work. I tried to use AI to fix the problem but they wouldn’t let me. Something about money. As part of my meta thoughts initiative, decided to say: “I do the holding hands thing on purpose.” It is my mission (potential) (Oh yeah, last night I was thinking - the way that “conceptual” artwork, as the example - lateral thinking - three matches - (missing) Anyway - this was all an example of something I don’t wanna do (hungry…for nothing!) Because it felt too sterile, the project…it was already pre-planned."},
{page:181,type:"abstract",lines:43,date:"Apr 17",text:"for this reason, conceptual art is like a hypothetical - unsolid - it never gets done…it’s just an idea - it doesn’t have physical form, and it doesn’t need that. There’s no physical form to an idea (that belongs in the brain). The other day I was talking about why art is so appealing to me, and it’s because it’s the only real thing in the world (that isn’t translated). But when you see it, you’re like: “oh! that’s real thing.” it shoots into your mind, and goes through the metaphor machine but it doesn’t ?) really matter what the meaning is - just that it exists there in your mind - the meaning if instrumental to it being in your mind - the fact that it’s codified, and can be interpreted. I started imagining that thing Chris gave me - the (pic) heart valentine thing, and maybe with it having something else inside, because, like the army men, it doesn’t have to have legs, it just has to look like it could. So you can substitute the essential characteristics for the thing itself - you can add a roof to anything and it will be a house (in the room of the mind)”\n\nwhereas with conceptual art, where it is just an idea, and there is no form to it, we have smooth objects that are always black and white - there are no essential cs, so it can live in the mind, “without any unnecessary detritus, clogging up the filter, getting in the way of getting in the Metaphor Machine.\n(pic: you dump out a “puzzle”, “how to play” click clack click clack (that’s the main thing - the noise it makes), each one has a world that you can see on it…, you dump out all the pieces, and place them on the mat, (non-functional representation, back, front: perhaps)\nI think the other thing i wanted to do (emphasis on) was print out some of my diagrams, and play “possible worlds” with them - or these can be possible worlds - you arrange - with a few figures or drawings, a possible world that can be viewed through the “glasses” of dumping out the bag - and then, the other people either get it, or makes their own. Write it down for no cheating."},
{page:182,type:"ideas",lines:44,date:"Apr 17",text:"(pic: then it gets passed to the next person, hmm i think it means this, hmm, then, it gets checked with both of the answers)\n(pic: ex, first, it takes this form, then this form etc., etc.)\na flip book of concepts for an evolving metaphor critique, Btw, EMC is instrumental - a heuristic for how critiques go anyway - not meant to be interpreted directly unless it’s not understood how it fits in,\n(pic: holding hands) here’s the connection: what makes people tick? well, sometimes it’s an object, and if you “graduate,” I think it’s a reaction (?) No, actually additive property etc. new: similitude - what things have in common.\n(pic: these two tings make this thing (suggest/imply it), there is a certain relationship, here - the “SET” relationship.”\npic: these three things manufacture a fourth artificial thing\npic: infinite things can be involved, and it be a 4D like an EMC.)\n\npetit ontology (pic) I was told to make this.\n(pic) there were a couple things that weren’t tall enough for towers - one was the (pic) weird bone things that happened to fit perfectly with the pins that fell out of Sandy’s birthday present to me. The other were the hat inserts that were always a specific size. pre-Tot - “rule of thumb:” (pic) corrugated cardboard - anything made into something is going to be more expensive (pic) for example a box, however, sometimes, because you produce things a lot, you have extras lying around, too many to know what to do with - something that has immense value, in spades, due to some special circumstance, e.g. an artificial circumstance, like my having extra time to think about things (because I didn’t have any friends) and producing gold or love that’s on sale in a mental hospital, due to the special circumstances. These little towers that form, like crystallized sugar - like crystals (pic) gaining solidity in a cave “overnight,” like wine that’s aged by accident, a caved in wine store (?) due to an earthquake. All day, I am, I am writing essays to myself - just bored, thinking of something to think\n\nNEW JOURNAL"},
{page:183,type:"abstract",lines:20,date:"Apr 17",text:"about - are other people doing this too? And then - and I am explaining things to myself. i wonder, for example: why is that, and then think about it, and I apply all sorts of tools and pressures to them (one includes waiting), and then, by the end, a tower is formed. And I have amused myself - I have a little giggle on my tongue or a twinkle in my eye. And now I have all of these towers. And I figure - I might as well do something with them, after all, they have been sitting in this dark cellar for so long, stagnant, sitting in this dark cellar for so long, ooze dripping down like juice - meaning. I suppose I could use them to make wine. I think they look like this or sometimes like this. I’m not sure why. Anyway, now that I know there are stairs here, I think I’ll climb down into this cellar, and have a look(!)\n(pic: wine) soo many - I wonder what! I’m going to do with them all… (pic) wine bottles and wine bottles and wine bottles galore"},
{page:184,type:"abstract",lines:46,date:"Apr 17",text:"LATER KILLER NOODLE\n1. gathered adequate evidence to suggest that - well - Tot (pre Tot): (pic: and then: remember) I used to keep them in my purse. The fourth quarter: I wasn’t reading them (!)\n“I have nothing bad to say about that man, except that he was bad at his job - the one thing - his one lot in life - that he was supposed to do - his one purpose in life.” (the guy at blick)\n(pic: I subscribe to the “stay where you are” policy of trying to remember something school of thought\n1. what that girl had in common with making to(wers?)\non page six, she refers to towers v’ she first refers to towers on page six…\n1,2 - the two things I was trying to remember in the car on san vicente\nbecause it’ll come back to you, mommy always comes back to you\nthe “unsatisfying concept” - indirectness, ex. people paying five dollars for coffee, ten dollars for wine - for an experience - they don’t really know how to value, like art (pic)\n\nseed: when I’m by myself I [take the long way home] - take time to make decisions, and explain things to myself (the opposite of making myself into a weapon) and explain when I change - the intermediate stage.\n“just like” my vacation came to me - all my friends went on vacation, and I realized I wanted a vacation from feeling like I had to hang out with my friends, not an actual new place.\nthese were pretty much all of my thoughts between now and when I left. so: I could rate them from 1-10, put them on a to do list, or abstract/miniaturize them in a “mini” book and then, as I drove, I began/decided to deconstruct the binder - to make a customizable small version for ex. I realized that you can actually punch your own holes\n(pic: hairrow, like hair, that collects in a drain “it hugs your curves, and I don’t think you want that”)\n“good job sweetie - holding your pee, holding your breath, holding your thoughts\noh yeah, and: my nose had chili powder for all of my walk and the nine minute drive, and all the time I switched from Bristol on Wilshire to Bristol in Westwood which has in common: “a slight annoyance, lasting a long time,” like saying goodbye to J in a not pleasant way (I want to miss him)"},
{page:185,type:"ideas",lines:16,date:"Apr 17",text:"I carry [the book] around to remind me of what I’m trying to make. Now that I’ve established a container, we could put anything in it, but for now, we’ll put: a square textbook with a modest number of pages, so the space doesn’t grow cobwebs in our absense. I “wrote” the other things down in my tape recorder but I can remember them anyway…it ended with: that time I went to (missing)\n(pic: chocolate): “a stand in for something that is: a lot better, and a lot worse (because I got a lot of things done, but the chocolate was perfect, most of all, how it described the errand.)\nA tower is something that gets built up, so it can be written down, like getting a shot because you want the candy afterwards (pic: an excuse for, afterwards)"},
{page:186,type:"abstract",lines:16,date:"Apr 17",text:"LATER\nThis feels like “the right answer” (interrupted procedure → stop when you get there)\n(pic: put the wooden pieces that belong to the set, velcro on the back (or/and string)\n(pic: my sweatshirt, my hat. I was looking for my keys. I pulled things out till I found them).\nor, for example: (ex, set theory, for example, fabric or paper painted or printed, things that belong in the set, things that do not, this really should be wood, i’m imagining it as wood, but it might be hard to cut all of them.\n(pic: Sandy, casually playing in the tub with the cow. I wanted the cow. Through the interaction, as represented by the crown, the cow achieved an elevated status (I wanted it because he had it, and not another reason).\nJonathan started giving me his side lol :)"},
{page:187,type:"abstract",lines:15,date:"Apr 18",text:"April 18\n(missing: angry, etc)\nA peripheral property, in common with a seed - in that it comes first - in that it comes first, in that…\nThe seed” of what I was thinking about last night is: even this instrumental imagining of: me with my briefcase (PW vge) is a seed, though it does not also have in common that it will exist.\nRULE4RULE: underlying assumptions that I would have to draw myself in the mirror, (and before that, that I could not draw the mirror. But I had to draw the reflection and I had to include the possible venn even though it wouldn’t have been there. The mirror didn’t have to be as big as the real mirror, but it did have to have the “arms” (essential characteristic).\n(pic: projected on a wall)"},
{page:188,type:"day",lines:16,date:"Apr 18",text:"anyway, Jonathan is at his penis party. Making easter eggs. I think it’s pretty clear by now that the thing I’m describing has something in common with a seed, and something in common with the mirror of erised (pic: mirror, a seed, perhaps an almond seed, the thing I’m describing)\nI also kind of like the idea that the tiles come out of a cotton bag and when you open the box there are all these pieces that come out, that have different materials on them, and there are some mats.\nThey all fall on the ground, if you were to let them fall out.\nbut the other option is to let them pick them out. And they will all rub together in he bag, making clanging clanging noises, while they are being picked.\nmore mats that could be: (pic: making connections)"},
{page:189,type:"day",lines:25,date:"Apr 19",text:"April 19\nNoticed myself playing a weird game where I took food in and out of the fridge. Been watching a lot of Nathan for you, against my better will. (pic: cheese block, orange, sushi long, thing, when I was taking out one of the piles, my salad dropped and landed on the floor)(pic: i ate one of the beets anyway, but it was a harrowing experience. picked it up, and ate it, cause it landed on the fork).\n(pic: another example of a mat) I read my evan essay this morning, probably the only productive thing I managed to do and I kept correcting it, like Richard, and then realizing I was going faster then I thought, but not jumping - I just kept having to jump back, cause I didn’t trust myself.\nAnyway now I want to write this essay book, or that’s the current heuristic. I also want: “clearing things up” which is a tv show I invented yesterday when M and D were confused about why mommy says Doris differently. The background would blur, and I would explain the reason, but they’d be looking at me, cause it wasn’t staged. (for autism, by autism).\n(pic) another version of the duplicitous envelope which has in common it’s strangeness unnaturalness."},
{page:190,type:"ideas",lines:45,date:"Apr 19",text:"another topic for the notebook\npuzzles, a specific relationship x any relationship\nthe obnoxious way that evan and maddie say stuff/get to where they’re going\ninspired by a pumpkin patch\ngets what he wants 9the convoluted way you have to s ay things - translating them into themselves)…\nthings that are clearly photographs\nnathan for you - leaving in the awkward moments (or solving for them)\noh yeah - the other quality I look for - fitting into the frame\n(pic: as if they knew the canvas was going to be there and were trying to fit the shape)\n(pic: “the convoluted way you have to make paintings” (is this real?)\nthese are holding hands but they do not belong in the same book\n\nwhat does belong in the same book is: the hidden mechanism/intermediate stage of: preparing puzzles for other people (and making it hard for them to know wha tyou are saying (it’s very important to only use big words if you have to)\nANYWAY: the (x) problems I solved: 1 (pic: by journal, typed, handby)\nexcept: the september journals are out of order so I have to re-order them, and that exposes the pipes, and leaves room for all sorts of “ambiguous” “decisions”.\nand starting in November, they have to be picked through to see what needs to be preserved, and what I actually want to die in the book. (and that involves reading some unpleasant stuff (esp. in January. (that I don’t want to live through again. (ideally design an autopro to do that for me…) summer is a quilt, and there’s too many places to start in September.\n(pic: the way the girl looks, waiting for her latte)\n(pic: if you go here, I’ll go here, purple/pink magenta, probably green, with an orange line or vice versa, a maze, can’t go here)\nThe other problem I was thinking about how to solve is: now that I have something to do with the stickers, I’d like to be able to see all of them. And now, ALL of them, are relevant, NOT just the ones that look good. AND SO: SOLVE 1: use indesign to organize them transfer from photoshop). (infinite pages, all the same size - auto ?). SOLVE 2: (is this necessary 2): add the page number under each drawing. So I can go back to where I found it."},
{page:191,type:"ideas",lines:16,date:"Apr 19",text:"which brings us to: WHAT we’re gonna use the stickers for, and my flight that I got on to get here: specifically picking the stickers.\n(pic: special ghost is my friend, the duplicitous envelope, ambiguous events, competing patterns, two sides of the same coin, state 1, hidden mechanism, state 2, you’d never imagine that there was something in between them that was this.\nFor example: when Chris gave the key - enabling us to be stranded. It seemed as though it was a natural stage to stage transmission. But there was this hidden mechanism, i took off my shirt but they didn’t like that, pieros and max was also there, max, we danced around the fire little did he know that I had hooked up with both of them, and it’s not the same thing for a girl to take her shirt off…"},
{page:192,type:"day",lines:16,date:"Apr 19",text:"in bed (i was at primo pass)\ngot my period, and I’ve been waiting for it. Watched a film with jack Quaid - idk - running through woods. And started Search Party. It’s kinda nice to know why I was unhappy, cause I was worried about being unhappy, I think. Period Cramps on the walk back from PP and now I think I feel better…sort of. Will I have less ocd now? I printed out the pages, cause I said I would read them back and organize them. This essay book thing got me thinkin of other essays I wanted to write - little essays. First thoughts, waking up, and how they affect your day. Minds as political systems. And I thought: smooth jazz smooths out your day - the bumps - like reading that essay back - jolting back and forth from\n\n(MISSING (A LOT)"},
{page:193,type:"abstract",lines:30,date:"May 8",text:"MAY 8\nCan’t tell if I’m happier or sadder than normal. maybe: more confused, less anxious. Executive functioning unnecessary in this advanced state. Here’s my theory (for why my handwriting is so thin today) - wake up in the middle of the cycle - got more sleep, but am confused. Originally i woke up naturally, but the tips of my fingers going off on their onw. can’t gain any necessary perspective - I lost the thread - like waking up in the middle of a movie - in the middle of memento. J says he reads what he wrote, and doesn’t like it. I didn’t wanna tell him that all I can do is affirm, and that, a large part of my journaling is? for continuity? - to make sure that, at any given moment, I agree with myself (maintain consistency?) Alternate theory - I finally - as I dreamed but didn’t dare to hope - have become dependent on coffee. Told J that I felt bad that I didn’t have a 180 iq like Russell or Wittgenstein, R who seems to have understood what he was saying. j couldn’t stop saying - “not me trying weed at 28” or idk - Mommy told me that I wanted to be friends with becky really bad and then it was too much. Same with Rebecca. I put out energy, and don’t want to maintain the state. Mommy was really interested in my theory of mind thing, but J thought it was stupid. Now, I’m wondering - is it subconscious. He says he’s used thought too much. But listening is a chore. For everyone!"},

{page:492,type:"ideas",lines:23,date:"Nov 19",text:"remember - competing patterns and ambiguous events are two sides of the same coin. So: (pic) (criteria list + duplicitous envelope ← is it?\nand then I had another sort of stupid idea about the example, which to be written as: (pic) or (pic or pic) as in: (pic) and it could change depending on how many examples there are but no as that would introduce the unpleasant kind of ambiguity so anyway (and I just thought of that time I slept <em>under </em>the table at the wesleyan library - <em>wow </em>I was crazy back then - also: the time I saw C and B not celebrating valentines day in the library together and the time I was “(missing: a bunch of memories)\nI told J that when I am going back through my diary I have to skip all the boring stuff like my feelings. Anyway - I imagined a locket\n(pic) ← This is described very nicely, but no one cares about it. Anyway - this is for the replacements - those moments you hold near and dear to your heart - that you take out in times of idk - like the special box I wouldn’t let Rebecca touch but I let J write in my journal also let Sean tho I guess"},
{page:493,type:"day",lines:24,date:"Nov 19",text:"he messed it up and so did daddy when they wrote in it. I wouldn’t let Rebecca. lol - I want to kill this joke by explaining it which reminds me of being supremely anxious, or relieved or thinking about something really hard, or not, in that park in portland - leaning up against a wall - a cooking school? Definitely basketball hoops but I don’t know who was play them. ANYWAY - (pic) the example being - my night out with Ricardo ex. wanted to go home and sleep (I was uncomfortable perfect for taking pictures and didn’t want to be there - the structure - paradox - I liked the people but didn’t wanna talk to them that’s a direct criteria that I wasn’t aware of. I talked to that one guy for so long that we were about to go buy a hot tub at costco and move in together just so we could (?) - not because either of us liked each other. here’s a thought i can’t remember if i’ve written down - some thoughts are whispier than others ex. why would I think about how none of the boys i’ve dated would push me aside like jim did for karen for longer than I have to - it was brought up - i found a way to dismiss it\n@@PB@@\nooh - another one -"},
{page:494,type:"ideas",lines:7,date:"Nov 19",text:"I could sit next to daddy on the couch with steve and harry and bring a clip board on which would be a mind map that I’m trying to do - or the sticker cards I’d pulled that day - trying to make it into a mind map and then daddy would say “what are you doing” (oh wait - I already solved this one with set theory so nevermind)"},
{page:495,type:"abstract",lines:12,date:"Nov 19",text:"and why would i think about how we only think the thoughts that make us feel better - this doesn’t make me feel better - this makes me feel all whispy - the example of itself is necessarily cut out of the system - is that a rule? How many thoughts would I write if they were just pictures: d Ricardo’s B-day (pic) (criteria: interesting? no - <em>not </em>boring. AND describes my day/what happened. Oh - I think that’s enough to get the point across at least for me - my underlip starts to itch when I think that the crux of this short hand is that it refers to things that are in my mind"},
{page:496,type:"abstract",lines:25,date:"Nov 19",text:"Rebuttal: chaining is bad (el salvador - d tik tok + garage - trash cleanup b - (over-arching theory?) → there’s just happens to be a threshold - Sandy - mind - neuroscience - boring stories - is that enough. The boring thought I wanted to equationize being that normally on any other day i make my more interesting thoughts. so: length of writing is to interestingness of thoughts as <em>? </em>is to <em>? </em>not (inversely correlative or as I’d like to say - counter correlative. (note: creative punctuation is intentional). STAP: art as assignment is boring and trite (as compared to other sections) - (?): cropping pic: the people looking at the art - crop to include the people, and then secretly crop <em>out </em>the actual art - it no longer matters - and it is the balloon of mold theory. #NOFILTER (← duh) (this is a) the other boring thought I had today (cuz apparently there’s a threshold of # of thoughts (I am Sage and I approve this message because we were <em>just </em>talking about meta-journaling and now it’s happening, so I pre-accepted it I forget why) is that I invented therapy for myself ex. residual rules (and I’m always helping myself by recategorizing thoughts with the → (pic) (sticker goes here)"},
{page:497,type:"abstract",lines:19,date:"Nov 19",text:"ok: the last filter is that at <em>least </em>the thought has to be finished, for example, : I’m having trouble with things being either diagrams OR ideas for projects - I’m scared that they’re going to get equated. But the one rule for reading my journal back is that I don’t want to introduce any itchies - cause itchies are everywhere and they are <em>not </em>in my journal so I could <em>only </em>write about this once I know the answer (like as an example - in this case - of what not to do, and of the rules of my journal, which could be published in the pre-index x or glossary on the front page as I use mjs as examples of solving problems, making things for yourself, and inventing things. Instead of thinking more, I’m just going to keep writing - things that are in short supply for other people - 4th quarter (pic) SGH + not thinking for me)\nNovember 20th\nFarmer’s Market this morning"},
{page:498,type:"day",lines:23,date:"Nov 20",text:"so many fruits that I had literally never seen before woke up and was (?) asleep and caught my brain red-handed - categorizing my day - making sure everything was in its right place: - looked like a long line - a clothes line above my head - of envelopes - messages going into envelopes - notecards with hearts of diamonds being filed into the right notecard - the 1st time I caught it and it’s probably cause I woke up unnaturally. Had breakfast with Maddie - made eggs with spinach and cheese and butter, orange juice apple water on the outside table - talked about people and relationships - they are journaling about the tarot spread they read at wine night with (?) with Noa and are hanging with Henry tonight. It was weird that Zoe kissed them on the cheek haha so that answers that question. Also dreamt that J went to walk his golden dog - made out of solid gold, wonder if I will hang with Sean tomorrow - I want to in theory and kind of miss him but don’t like that he feels entitled to be aggressive he absolutely has no reason to be mad at me. A bunch of work that I’m ignoring and"},
{page:499,type:"ideas",lines:8,date:"Nov 20",text:"instead focusing on my fake work of making my diagrams into stickers - new ideas - publish a “zine” (just so J could read it) of all my these - all my projects ex. B &amp; W pics <em>as </em>if they were by different people - have to subtly ease into that they’re all by the same person.\n@@PB@@\nI was <em>so </em>nervous and anxious and upset (just read back the last few pages) and then:"},
{page:500,type:"day",lines:21,date:"Nov 20",text:"saw him like a mirage - while I was driving my car on the way to go <em>shopping </em>in the middle of the work day - as though I brought it about by the sheer improbability of my actions - who does that “Oh, I think I’ll go to H &amp; M cause these pants hug my butt too well - like - impossibly well. I don’t know why we touched hands, but when we did I couldn’t resist and held on and pulled him and he leaned his head into the car and kissed me - I was so discombobulated that I forgot to be angry about exclusively holiday party clothes which I’ve never gone to - doesn’t exist in my life. Blinded by the sun looking over the edge towards the pier and later couldn’t - didn’t want to - think straight - waiting for him to stop sleeping and: didn’t sleep and instead just observed him gently facing towards me in his sleep - not touching - as thought painting me - just staring. All is fine as I knew it would be. Maddie is using the same pen as me - that is <em>so </em>nice\nNovember 21st"},
{page:501,type:"day",lines:25,date:"Nov 21",text:"At Primo Passo and I feel a little <em>too </em>good today. I went to bed early stayed in bed late - now I have a strawberry pastry and a 4.75 salad from whole foods with an egg + (?) apple. Might hang with jamie tonight. Was thinking on the way here about experimenting with different categories of importing: for example: it’s not important that I went on a walk with mommy and she was wearing 2 jackets and we stopped and got me another one - a fuzzy one to put under my bear jacket and talked of Sean and the strange combination of intellect without interest - intellectual curiosity. She tried to get me to feel under why it gave me the ick - daddy telling me he’s proud - she called me a bitch after compliment to balance it out. M left early - I told her they can’t come to Benny’s wedding cause I’m not a lesbian says parents maybe she wanted to meet them - cause it’s weird - cause it’s important? idk mommy and I walked down Montana trying to find a quiet enough restaurant with good fries. Daddy picked us up) on the way to Bossa Nova - bet about a bunch of things - getting frazzled - over the threshold to where I had to calm myself down - so combative."},
{page:502,type:"day",lines:13,date:"Nov 21",text:"Sean just called so I guess I <em>am </em>hanging out with him. Talked to Maddie a little bit about planning - she said <em>I </em>taught her about plans. I’m proud I made her breakfast - the bean tacos weren’t great. Something wrong with her file and I will try to check in with her about it. She’s in a meeting and now I don’t know how I’m gonna talk to Grant if I’m with Sean. I had planned to summarize all my (September) journals into a new document or a new journal but now Sean’s coming so I’m not sure what to do. I was rereading (the easiest one) with the paintings) on the toilet today.\nNovember 22nd"},
{page:503,type:"day",lines:19,date:"Nov 22",text:"All I wanted was to wear my malibu shirt that Sean stole yesterday, and I finally got to take off my sweater cause it’s not enough at primo passo and Savanna told me to get hot chai tea woo woo which I don’t need to drink really cause it’s 3 almost and I have like 5 hours of work also from yesterday and the 29oz kits - my pants don’t fit too well. I think - if anything - I come here to get centered. Cause I could get enough sleep and exercise and food and social interaction and not have my fucking tendon be broken by fucking Sean who I fucking hate <em>over </em>and <em>over </em>again for <em>different </em>reasons everytime - that is the impressive part. I <em>fucking </em>hate him - I <em>can’t </em>put my hands on him cause he’s too big but I feel rage. Mostly I am scared. And I can’t talk to anyone about it - no one would understand - the little scritchy thing in my knee that connects idk where\nNovember 23rd"},
{page:504,type:"day",lines:10,date:"Nov 23",text:"Went out with Sean on Thursday - we went to the pancakes place in malibu and then tried to go on a hike but ended up with him cold at the beach - I think it was fine before that but maybe he was too cold. We went to pie phi pie eating contest at Pepperdine and got ∞ pie for $10 each and got to try a lot of different pies not banana creme though - apple, reeses, pumpkin, s’more’s cookie. Then we went to the library and got tea at Starbucks and read the Paris review and Kenyon."},
{page:505,type:"dreams",lines:10,date:"Nov 23",text:"I had a dream that night that I gave up all my projects or I decided to stop and see what would happen and I was just sort of moping around the city waiting to see if anything would prove that I <em>do </em>have to complete my projects but i don’t think anything came till I woke up and started imagining a wire shapes mobile but 3D - maybe 3 wire shapes that become 3D when staggered (but connected at the middle) and then realized Calder did that - fabric in them tho maybe."},
{page:506,type:"day",lines:9,date:"Nov 23",text:"Talked about it a bit with J. Went for dinner with Cayla and had Rocio Rivera - very good wine merlot/savignon combo. Talked about dating a little. Couldn’t really find something to talk about - she is less weird than me? It was nice that she called me - I was maybe a little stressed with all my other plans. Saw Jamie today and she made cinnamon buns for us\n@@PB@@\nCouldn’t really find anything to talk about -"},
{page:507,type:"day",lines:28,date:"Nov 23",text:"sat on the couch next to her - I was so tired I could barely hold my head up - lolling on the blanket - I <em>kind </em>of wanted to make a move but I have <em>no </em>idea how it would start. I <em>kind </em>of think she’s probably into me - played with her 2 cats a little - Calypso and (?) Boo who hate each other and can’t be in the same room. She’s so cute - I actually have nothing to say and she doesn’t make jokes but she <em>is </em>cute and seems nice and friendly which is why people like girls - soft - idk. Grant and I <em>also </em>couldn’t find anything to talk about - I was trying hard to be polite cause I didn’t really know what made him ghost me but now he explained it - in the most romantic corner of this Indian market by the frozen food shelves - what a place to have a hard conversation - contrasting the stress of all the things and they <em>have </em>to be kept cold - and clearing up a misunderstanding - ending off a thread so I don’t have to think about it anymore. Jonathan and I almost got into a fight this morning - he told me all the things I was upset about and gave me a long hug and we kissed on the lips a few more times then it was strictly necessary for the fight to end but I just like kissing him and he maybe thought we were gonna have sex cause he said “we could go to my apartment right now. or something."},
{page:508,type:"day",lines:23,date:"Nov 23",text:"and then when I asked the next time we were gonna hang out he said “what are you doing tomorrow.” we shared another kiss at Blue Bottle Coffee in which we both missed each other’s mouth and I said worst kiss but he said got the job done. Sean accidentally stole me this malibu shirt that I can’t stop wearing by slinging it over his shoulder like a log and then forgetting about it. I’m a little worried that I’m going to lead Grant on and have him think it’s romantic. I don’t know if I was that attracted to him - he seemed <em>so </em>nervous and I don’t really know why. He said he was embarrassed that he couldn’t think of anything to say when we went to killer noodle - I thought maybe he was embarrassed and felt weird that it was too spicy - I think I said the right things, from a therapy perspective - you don’t have to be embarrassed - I’m glad you told me. Sucking on our popsicles - it’s hard to imagine getting closer to him - is it cause he seems nervous? Jamie is sweet - I would like to be friends with her but I just <em>don’t </em>know what to talk to her about\n@@PB@@\nNovember 24th"},
{page:509,type:"day",lines:9,date:"Nov 24",text:"made a new mom in line. And if I had her - my hair would turn blonde. She told me about a place called the le petit boulangerie that has really good pastries. We were in line talking about this dog that had been left alone - no leash, and she - the mom kept trying to find the owner and figure out who it was. we were actually crossing the street together, and then we were in line together.\nNovember 26th"},
{page:510,type:"day",lines:21,date:"Nov 26",text:"Sean and I watched before sunset 2 last night and cuddled it was alright - he wanted to talk to me about why it feels empty or something. I was trying to sleep and couldn’t get out of bed this morning tho I think I slept enough - till 10. Mommy and I went to tocaya and got soup and the cucumber bowl and she the quesadilla - she told me about some boy that died on a boat that she knew and how she went on adventures and some guy she liked who was gay but told her she liked her when he was drunk, and kissed her and it was a dream come true. It was kinda nice. Made about 8 huge kits yesterday before the end of the day - like 5:30. I have to make 29oz kits and 28 vial kits to fill a box - 18 each - 36 total. Mommy asked why I been hangin’ with Jonathan more - IDK - cause I asked. grant cancelled which I guess I could be upset about but I just don’t care. Ok - onto the nimpy stuff - see next page ;)\n@@PB@@\nwent to some new(?) stores on montana just now and saw these nice dandelion(?)"},
{page:511,type:"ideas",lines:28,date:"Nov 26",text:"petals in the window I think if I made them they could be daisies (out of gold) and each of the petals could come off - maybe kept in a matchbox (size box) or Pic) the blowy flowers that grant wishes - those are the only 2 flowers I can think that have meaning - could just make a mold (pic) (or whatever they look like up close) and rely on mold variation to mimic natural variation and magnetize them (for going idea of each having their own special spot). I saw some other thingsa t the store (pic) ← dice in a [container] self-contained game that has meaning. In my half dream - I thought about bringing a real live tchotchke to Flo’s and she would pick up the wrapping paper immediately (a mess is a map of where you’ve been - what you’ve been doing - a mess is documentation…I <em>hate </em>to erase documentation - perhaps messes can be documented and <em>then </em>deleted - before they are deleted…) - I think it was a little thingamajig bag of pennies ← minus - thingamajig and I woke up thinking I should list the “penny for your thoughts” but with <em>my </em>thoughts - i don’t want <em>anyone else’s </em>thoughts in it! I have berry pie at home to distract me from my potential knee injury. Kinda weird - Emma called while we were watching the office\n\na relaxation I played (I wanted to play) the other day (here) was"},
{page:512,type:"ideas",lines:28,date:"Nov 26",text:"gradually adding solid objects to a (pic: cup of tea/coffee) (which comes - is a mechanism - /what does it mean when you replace the cup in the saucer? - (pic) dark objects, frumpy - fabric over mine? idk - didn’t quite figure it out - I was more interested in the possibility of this ritual gradually relaxing my mind which was wide but shallow distressed by a # of things - forget what - mechanism - each frump represents <em>one </em>thought, and you put it in the cup to end the cycle - to finish thinking about it. j says thinking rarely helps you can only once in a while think of a thought to solve it all. His brain must work so fast - He’s wrong about a lot of things and it was <em>insane </em>to see him “help” the hispanic woman with her car - thing random clip placements. I asked Sean and he said it probably doesn’t matter cause cell phones don’t mess with technology like they did in the 70’s - I like to think that Sean knows things. It is true what I told\n@@PB@@\nhim last night that that when I was with him at primo passo I liked him again - he has good energy - vibrant x vivacious - not good - just real and whole - real honesty. His shirt looked good that I didn’t like before. he said he spent since i called him 1.5 hours working on his outfit which was bootcut + no stitch air ware _ brown shirt I dismissed at Brandy Melville place."},
{page:513,type:"ideas",lines:9,date:"Nov 26",text:"It seems to be about the game but it’s actually about the ritual - laying down a thome cloth and [covering it] with jacks - little metal pieces - stars - just the thought - the feeling - doing it with someone - making holiday cookies - making quesadillas and then throwing them away. First later, and then immediately - out of the frying pan and into the trash - trash lined up <em>right </em>next to the stove. Anyway -"},
{page:514,type:"day",lines:15,date:"Nov 26",text:"J had to get drops for his throat - we were both thinking about Emma - he could tell I was unsettled while we watched but he couldn’t tell why. And then we went to Nicole’s CVS to get drops. He dropped his gatorade - everything was wrong he said\n@@PB@@\nI prepared to say: it doesn’t even matter - it’s not like we’re gonna get married - he asked if I wanted to i said it just wouldn’t work like I was defeated. It’s true that I felt trapped with Chris → Sean → Richard - It’s hard to imagine feeling that way because I think about him so much but it is a rule that comes from not myself - it was nice to have all that evidence - there’s still something wrong - maybe that he doesn’t love me or does not say he loves me."},
{page:515,type:"ideas",lines:10,date:"Nov 26",text:"Anyway to go along with the potential gold petals ( pic or pic daisy or dandelion) would need to be a small (even <em>smaller </em>than passport - like 3x5 maybe) cream colored cover. Courier or similar - they <em>all </em>say 027 - as if it’s the 27th edition, but there’s only one - the illusion…(pic) - petal thing - a mouse - I learned the idea of just (?) any shape white and making it look official/professional - I used to think (pic) figure stand → bad but it represents something in the mind."},
{page:516,type:"ideas",lines:21,date:"Nov 26",text:"I decided - forget the maira kalman book, just compile all my writing as is - diagrams and handwriting and all\n(pic) ← thinner, white but debossed\nthis is a stupid thing I just invented (so the cup can go up <em>and </em>down (pic) around the perimeter of the thing\n(pic) ← bakery bag with autopro in it. Instead of a little treat - you get a lil’ treat for your mind - a little way for your mind to relax. I <em>guess </em>you could have some beans and rice in an envelope with a spoon and instructions on how to count it.\nidk - feel like I’m finishing up so I’ll just finish my last thoughts - the pro(cedure) for making the (pic) booklet is: gather up all the diagrams and flower placements and things and print them out and <em>allow them to take on (more?) meaning </em>this is like the trash can - have to be mindful of the container (oh yeah and the envelope with all the things in it → one of each thing - a thing that means one of everything - a thing that when, altogether - they are placed - they mean everything)"},
{page:517,type:"abstract",lines:18,date:"Nov 26",text:"and the envelope is a symbol - a signature - of meaning - things being added together to mean something - an <em>example </em>of how the container can show what’s on the inside\nthey started with a good amount of meaning - as time elapsed, they got less and less meaning - like a game of telephone with myself until they <em>seemed </em>like they had meaning to other people (they did not - there was <em>no </em>meaning anymore - I took it all away cause they didn’t deserve it - no one was listening!) no more meaning for you guys if you don’t behave - stop watching TV or I’m going to take all your meaning away - you don’t deserve meaning anymore - you can’t have it. Sit there and think about nothing (angry - I am angry) (- = clarification - transmogrifying - no <em>shortcuts </em>or you will lose the meaning - leave the roots on - Lauren was the only one that understood it)\n(pic) (ah yes -"},
{page:518,type:"abstract",lines:25,date:"Nov 26",text:"the original thing that called me to the store - something so creepy that suggests a game.\nI don’t know whether to be happy or sad about the sea - I don’t know whether to be happy or sad about the fact that all my ideas are always the same logical extension leads to that thing I was explaining to Siddhartha’s neighbor that made him grab me and proud to call me his girlfriend - I explained things and\n@@PB@@\nthey told me what I was thinking about - that was a good one - as if I’d thought about it before - J thought I was smart about the double envelope ambiguous meaning but I think it’s cause I’d already thought about that <em>a lot </em>before - I’d prepared it so I could say it succinctly - prepared to make people think I am smart - I know too well how everyone’s brains works and they look like robots or animals to me - standing so high up on my pedestal - a lace doily that I made for myself by thinking about stuff since Lauren and everyone else sat in a circle and I sat by myself at the picnic table and picked apart my mind - understood why everything was the opposite - I was different from everyone - I wanted test - not recess - somehow related to making my pizza\nNovember 28th"},
{page:519,type:"day",lines:20,date:"Nov 28",text:"Excited for thanksgiving for once - I don’t know why - see Jonathan - watch him - everyone will be there in merriment and I feel like merriment today. maybe I will be able to get in the spirit unlike el Salvador. After we had sex yesterday, I was going over (or was it during) my day thinking about how nice it had been and what did I do yesterday, but make presents for people. One after another, and then all at once - all the same. Counting things, putting things in new containers. Thinking: “Oh yes, this will be better” and it is. Rose Quartz cleaned - solved that problem. And sometimes there are autopros, and you can do them and relax. I can take stock of everything that there is - how many crystals are viable and clean them all off\n<strong>La La Land</strong>\nHe can’t possibly “love me” - it doesn’t make sense I feel like he’s in my mind if I were to ask how does he know I love him. i don’t think me saying it back sporadically could ever really express. Anyway,"},
{page:520,type:"day",lines:22,date:"Nov 28",text:"he looked so beautiful saying goodbye to me in the car this morning - a nice big wide smile he put on on purpose cause he knew I was upset. After he kissed me not once but 3x - and not small kisses either - he knew I was upset, he was trying to make me feel better. I miss him. That’s it. It’s fine because it has to be - there’s nothing else to do.\n@@PB@@\nabout it - I can’t choose if I love him and it doesn’t matter if we hang out - I will still love him. (?) sad or pre-sad that I feel like crying because he didn’t set a time to hang out again and what if we don’t He said we could go black friday shopping\nI could describe what is happening around me - me attribute my patterns - reprioritize - start thinking of things differently - collecting different patterns. Nice to know to think of people - that <em>isn’t </em>what I’d want to read later, but maybe that’s the point of this notebook - that it’s just for now - it’s my one special treat to make me feel better - where I can have my feelings and <em>no one </em>else can have them (not that they want them)"},
{page:521,type:"day",lines:17,date:"Nov 28",text:"There is a girl that looks like she is wearing a life vest. What does that imply about this place - that we are underwater? That we are in a dangerous situation? That she’s living in a different reality than everyone else. There is a guy carrying a nice bouquet of flowers (because I have started to like flowers…?) I wish he would give them to me. roses and tulips - I got into knowing all the flowers when I was making my flower deck and some of them are really pretty - delphiniums for example. There’s only one other girl really in this writing area and she is trying very hard to fit <em>all </em>of her writing into the space for one day - (head back pony tail - wide leg jeans with pockets\n@@PB@@\nthat personify her butt and now has made where her phone is plugged in into a standing seat."},
{page:522,type:"ideas",lines:18,date:"Nov 28",text:"Last night I imagined again) going to primo passo and getting a “cookie” → the green lace autopro in a cookie bag - what does it have in common what’s in the ellipse - that it’s temporary - that you start your day with it (my favorite part - how cheap it is - hence the bag - no big deal to make it) anyway - and - print my whole journal, but add a TOC with <em>that </em>idea and the religion etc. don’t mind that people will think “oh that’s weird” that the table of C doesn’t account for all the pages but it doesn’t matter - there will be other patterns to say that this is intentional :) J made up “one of my games” (lol!) A/B testing scenarios - the way he said it like “I feel one of your games coming on” as if it’s a potential affliction that everyone might have at some point. His was a little practical for my taste but I had fun playing it anyway"},
{page:523,type:"day",lines:8,date:"Nov 28",text:"we designed furniture on his rug in the setup he designed and then <em>fucked </em>because we both wanted to - I wanted to and he wanted to. And he was wearing his gray long sleeve shirt that is perfect and that he wears everyday when I got there he fed me a sugar cube like a horse and I put some of it in my pocket cause it was too much sugar and I hadn’t eaten all day"},
{page:524,type:"day",lines:8,date:"Nov 28",text:"I feel almost guilty for not liking Sean as much as he likes me - I don’t want to cause pain and suffering in that way. I feel bad that Richard was jealous of Sean. Maybe Sean can feel how Richard felt. Somehow I feel like he (Sean) can tell me what to do, or has some say over what I do - I think I need to lose that but also be cognizant of his feelings\nAnyway - back to talking shop 0 (oh yeah -"},
{page:525,type:"ideas",lines:13,date:"Nov 28",text:"the idea I had last night - office moments - have to guess which ffice moment matches - what is the underlying feeling ex. the terrace - underlying sadness. And also: “logic” in which everyone gets like 5 diagram cards and you have to take over someone’s explanation. J proved Jamie’s thing - 12 not always a set - it seemed obvious to me and maybe the proof was in my head unarticulated. I wonder if Jamie could prove it without seeing it. I wonder if Jamie is smart - “not really good at one thing” Maybe I will ask J why he was quiet on our walk cause it <em>sort </em>of upset me - or at least - to the extent that he thought I was upset."},
{page:526,type:"day",lines:16,date:"Nov 28",text:"We played SET and he told me at the kitchen table that he wasn’t always ever himself with his other girlfriends (does that make me a girlfriend) Side note: I can’t understand what I was so nervous about when I first started dating Evan - started <em>crying </em> a tiny bit - amazed at how comfortable he is - he came over the night before (Tuesday) I was nervous cause I hadn’t <em>planned </em>on seeing him - left his painting jacket - and cried - sat in my pink chair and cried - I “held” him I guess - I was really nervous that he would leave and make me super anxious that I made a mistake so I was with him 100% of the time he said that was the only time it worked - I’m a little superstitious about the whole thing though I’m reserving the reason."},
{page:527,type:"todos",lines:2,date:"Nov 28",text:"Things to tell Jonathan:\n(missing)\nDecember 2nd"},
{page:528,type:"day",lines:24,date:"Dec 2",text:"My heart is broken or it should be. No more trying to figure out what he thinks - I think I know. and probably knew all along - but hope does strange things to a man’s mind - causes it to lie. Anyway - on our walk, we saw “Mr. Hartung” after talking about not knowing neighbors and of course his daughter Emma so it was a double coincidence. new feelings seems like a good thing to write in a journal - perhaps the best (”so you can remember them”) I felt slow this morning - the embodiment of ♪ Western Bolero ♪. I felt slow - walking to whole foods…I don’t have <em>any </em>specific feelings - thoughts (?) connected but…the slow describes. I’m kind of in love with Sean maybe I should be in love with Sean. There’s something so strange about Richard and that whole situation - like - I am imagining it from Richard’s point of view (?)\nWe talked about so many things - things that people don’t usually talk about - things that if I brought up with Evan or Maddie or almost everyone - they would get all quiet and change the subject. honest friends - maybe that will solve my anxiety if I know what’s going on.\n@@PB@@\nThere’s"},
{page:529,type:"day",lines:28,date:"Dec 2",text:"an oscillating system that I keep glimpsing where he’s very retarded/autistic and <em>keeps </em>interrupting and doesn’t know(?) that I’m mad. And then he brushes my hair when I sigh in the car, apparently on instinct - how can he be so sweet. Autistic. I don’t know. In the hall, when I was all nervous about making a good impression on his mother, then I felt bad - the platonic ideal of bad - when he showed me his model, and he said “I was trying to play <em>my </em>game” because that was our new heuristic/framework - he realized, and I had to realize with him because we are there with each other in our minds - that’s the part that’s attractive - the part that I <em>could not </em>believe he would not want- friends/lovers - won’t work - no kids - no married - no guilt - maybe it’s for the best even if I don’t convince myself. But yes of course there is an icky feeling - as if at the heart of that feeling I once felt on the couch - something about breast milk or ian - being too close to people - or inside them - inside their skin, their bones, or something - I don’t know\n@@PB@@\nthis thing deserves accuracy - of liking something, and then not liking you back - it feels wrong - dinky, disgusting, worse than foot porn or any other I thought everything in nature was perfect. But it’s not I guess. We never said it out loud."},
{page:530,type:"day",lines:21,date:"Dec 2",text:"For once nothing could touch me at auntie florence’s house - I was ecstatic - I could perform all of my actions as I wanted to, I asked auntie flo if she wanted help in the kitchen - I wanted to help - I’ve never done that before - it was weird that I wanted to. We sat on the couch and Steve’s two grand kids also performed perfectly - hugged daddy like it was natural - like I could never do - platonic affection - I don’t know how to do it I’m always “what does this refer to” made up a game - uno but in their heads - you can play <em>any </em>card - she played “flower” and I pollinated her flower cause we’d been talking about how flowers are created for bees to see and J got sad that I said he didn’t remember and I had to quickly setp in - it was a long time ago - I’m getting better at that, or I am trying to - it goes against my nature - i want to make him say it so he can see how silly it sounds or something.\n@@PB@@\nShayna and Sandy didn’t know how to play and didn’t like the game -"},
{page:531,type:"day",lines:20,date:"Dec 2",text:"I thought it was interesting and thought about Evan a lot yesterday cause we were talking about games. He was wrong about something - he told me XI is two games - I didn’t understand and he realized it didn’t make sense - I wanted to tell him about TSA pre-check but it became a whisp. Truly incredibly that he can be so aware and yet <em>keep </em>interrupting me to point stuff out - even in the middle of a correction. Sean is nice - lovely - maybe not as smart but so much vivacity and we are always laughing and playing our weird ontological systems game that I wish J could see because he ignores jokes like this and has no idea the joy they could bring if he listened to me how can he not listen to me so much - (?) it makes me mad - the model - oh - his dad - I don’t care. He blocked her on everything but then he went to Father’s office he said he missed her or he’d made the wrong choice. I need to figure out his brain because it is a great source of anxiety."},
{page:532,type:"day",lines:13,date:"Dec 2",text:"And saturday was a doozy as well - sex in the opposite of romance - I told him I masturbated to Spencer and it worked - I got her kicked out of school. We beheld an ass together at the 1st turn into the reel inn -\n@@PB@@\nthe 2nd turn turns out - that’s his, the 1st is mine. evan - is Evan good at games. He called me but it was a butt dial. All 4 quarters - I want to pick who I like so I can like me back, but the 1st (pic - quarter) is at least it’s steadfast so I don’t have to be suspect ex. the tension → ← i’d pick the opposite - if he doesn’t text me back (Evan) will I like him. I’m (?) people’s minds,"},
{page:533,type:"day",lines:14,date:"Dec 2",text:"the weirdest was when I told mommy and daddy and sandy the ins and outs of my romance - answering mommy’s questions at the kitchen table while Sandy whispered to daddy to stop making inane chatter at him because he was trying to listen to our conversation. The secret is: I wanted to talk to Sandy because he’s a better listener than mommy. And mommy has too many heuristics - girl power - who needs it when you finally have honesty and theoretically no desires. No (though?) because I told him I loved him when I got out of the car and he - I don’t <em>want </em>to be boyfriend girlfriend (barbie?) - I don’t <em>feel </em>like a girlfriend, I don’t think I could <em>be </em>one anymore -"},
{page:534,type:"day",lines:5,date:"Dec 2",text:"I just want him to love me and he does - he said ti back. In love with me? No. Never. Me - I don’t know - yes - I do know. I kept thinking of (?) ways to accidentally tell him - to slip\n@@PB@@\nit into the conversation. Upside - maybe I <em>can </em>have the dream of"},
{page:535,type:"day",lines:27,date:"Dec 2",text:"walking by his house casually and saying hi - he has never been off limits - i don’t have to be homeless I can just go in as I always suspected which is why it was never creepy - nor with Curran - creepiness - perhaps I can discuss this in therapy - or embrace it - I couldn’t stand being (?) that’s girlfriend material - wrong - blasphemous if my mind were god and my proclivities have jesus no god. I have kits to make work to do - thank god - this is what it’s for so I don’t have to let the non entity that is our relationship seep in. Was helping when he said he was worried I’d disappear - the paradox - he <em>knows </em>how to make me feel better - and I him - we both imagine we have to go home and (?) ourselves right - I didn’t really get it - about his music - or I didn’t want to lie - I suspect it <em>is </em>his vocal chords - all our biggest fears come true - what is that - it compliments the perfect honesty that I don’t think I was willing to wish for. to be understood &gt; be loved(?) (I don’t know) (?): Let’s remember the anxiety of taking tests in the test taking station at the library (()) → the way that museum walls are white, the way that men’s fashion - (?) don’t <em>exist </em>in some metaphysical realm - they have no translation and\n@@PB@@\nso they don’t exist."},
{page:536,type:"day",lines:11,date:"Dec 2",text:"This is nice - I might finish my journal and I <em>know </em>I’m not hungry anymore and luckily the food looks disgusting - burrito at tacos por favor - there’s police in here I’m near crossroads - I parked in front $0.84 I should go -&gt; &lt;- I should stay. No, robert did <em>not </em>say I was nice. Is it really the <em>way </em>he introduced me or just that everyone likes me - I <em>am </em>very pleasant - how can he take the credit (?)? X. be milder v’ v’ &lt;- yes, to answer your question, yes. This is love &lt;- joke :)...\n<strong>Dec 5th</strong>\nIt’s"},
{page:537,type:"day",lines:45,date:"Dec 5",text:"been a minute since I wrote and I haven’t been very crowded and well saying it’s because of that. The events of last night were disturbing, even more so in retrospect to the point where I’d like to write them down to remember them and make sense of them, Maybe add a clothespin gripping onto my ability to control life (this is not <em>my </em>dramatization - it is learnt from someone else (J) lol. anyway) J got drunk - was drunk when I got there - I knew this would be a problem. I did not like that I called him, he did not call me. Trepidatious, driving fast, excited. Parked on 14th St. N of Montana. lest Sean see but that’s not why - I refuse to have my activities dictated by someone else’s madness.\n@@PB@@\nIn the end, I left, satisfied that he called me his persimmon. Towards - the end, he became impressed that I knew Warner and we wrote a song together that he finally liked - I got more into it - it was about jesus. He immediately started thinking of band names, so I guess his dream can come true. In the middle I approached him, sleeping on the couch, having stolen myself to say that eh could not contact me the next day. I also got a maple latte and dream toast from lala land called Evan on the phone! - and we had a little chat. Whatever Evan and I share - friendship - is absent from Jonathan’s house, even at the best of times - an easy understanding - companionship. Comp…is hard with J - it is all waiting - for him to speak. None of my needs get met and then he makes some bold pronouncement - he loves me. I love him too. Why? I don’t know. After the middle I laid down beside him instead of leaving, he wearing his black cowboy shirt and he told me Emma enraged him so he was going int he right direction. Ok, so your next girlfriend won’t make you angry? “You’re ok.” Pulled me together like we were two thin logs pressed against each other\n@@PB@@\n<em>Then </em>we went to his living room to write the song(s) the first two he didn’t like (he didn’t like so I didn’t like). He was drunk. Horny. What a horrible sex. I did not enjoy it. I did not like it. If sex were always like that I would not do it."},
{page:538,type:"day",lines:14,date:"Dec 6",text:"They remodeled Peets and now I have the most disgusting breakfast sandwich, and a guy coughing behind me. They made it worse - everything is fake wood now. ToT: draw x write x } do something x people watch ✓ (I need the PWC handbook) - oh wait - now I’m <em>too </em>focused…x, ‘v’: I need the “just breathe” handbook with pwc inside (or the opposite, or oscillating.) Anyway, the old armenians left and gave me back my chair that I wasn’t missing. I could barely see in front of me it was so misty this morning walking to the coffee shop. Made me anxious, I couldn’t remember my destination, that I had one. What if it was like this all the time? Would things be different?"},
{page:539,type:"day",lines:5,date:"Dec 6",text:"Deciding things x Describing things ✓ shower was nice this morning. Painted persimmons and pomegranates last night, respectfully. Brought my paint but feels too violent; observing is natural - this is my passive activity - TV x PWC ✓\nDecember 7th"},
{page:540,type:"day",lines:20,date:"Dec 7",text:"For how upset I am, I feel pretty good. I don’t like Sean but I did have fun with him yesterday even after everything. We went to Killer Noodle. Put <em>all </em>of my clothes away even though I was supposed to get out in the sun cause I got up early went to bed at 11:30 - painted last night after dropping Sean at Sam’s house and failing to pick up Henry. Didn’t go well until the last one - maybe cause I was painting on paper. I remembered to cover the whole sheet and now I’m trying an actual idea - painting compliments under which I like. I’ve always silenced that {implication} but now I learned it’s correct. Metaphor? All my interesting thoughts cut off, like the hidden mechanism that is instrumentalism - what I thought of - sleepy - on the grass - waiting for Sean. Thank god I drove and didn’t let Sean. We asked a random guy if he’d buy trail mix from us at the top of the hill and joked with him about writing checks - J would <em>never </em>do that."},
{page:541,type:"day",lines:7,date:"Dec 7",text:"Already got like 5 orders to replace the ones I did this morning - perhaps I’ll do more work today after all. I wanted to go to the post office and so did daddy - this fits the format - abstract structure. I’ll tell J that I can’t prove I’m smarter until he <em>tries </em>to understand the abstraction. Maybe I’ll do the powerpoint\n@@PB@@\nfor him and Evan)"},
{page:542,type:"day",lines:12,date:"Dec 7",text:"and give him a blowjob after I tell him he needs to stop asking. Was gonna stay over night in a hotel in malibu but Austin’s party tomorrow. I hate that Niha is co-opting Kyle’s memorial - if anything, Nina should do it. She has bad social skills. #1 is not listening. I don’t want to but I feel kinda bad for Emma. He probably tortured her for years and now he’s just blocked her cause she said she didn’t like his art (emoji). he said I’m a bad painter like a million times and then makes me lie to him and say his music isn’t bad (+ Maddies) (missing)"},
{page:543,type:"todos",lines:6,date:"Dec 7",text:"My aura is like the ozone layer and e is pollution - all these thoughts - maybe I’ll go shop at Brandy Melville and wish for a double day. My homework for the day is finishing <em>all </em>my decks and sending them to Robinson Chen all at once - my etc.\nDecember 8th\n(missing)"},
{page:544,type:"day",lines:2,date:"Dec 8",text:"they played a game where they mispronounce words and Jackie was reall\nDecember 9th"},
{page:545,type:"day",lines:12,date:"Dec 9",text:"Failed at sleep. It’s an L but I can take it. Now I’m working on my orders - took a shower - was I too dirty or too annoyed and ?) in my heart to sleep? 4 hours 12-4 listened to my own songs before bed to confirm they’re good then got <em>really </em>annoyed at Mr. Heckerman after I woke up and went to the bathroom. Hate - building in my heart. Plans that I’ll have to dissolve as soon as I see him so I can keep him. His reign is complete, unnoticed as I have no leverage “oh, I’ll just leave.” “ok.” No idk - need to build up some more favor with the kind before I can ask for favor.”"},
{page:546,type:"abstract",lines:14,date:"Dec 9",text:"Please release me from your stupid grasp so I can fall into nothing - the land of limbo where I get none of my projects done and just sit around and think - no actually that’s not true - I have lots of vitality when I think I’m the only person in the world. Try to have an art show or make it as a musician? I want to breathe instructions into their heart. I want them to think like I do because I know how to think, because I thought it a lot. Maybe try to sell the black and white prints though like a little game where the more I win, the more I can tell myself that people are stupid. When will we go to Forma or Back on the Beach “you said you’d start playing m…etc. (missing)"},
{page:547,type:"abstract",lines:13,date:"Dec 9",text:"I could think of more theories and then die knowing I know things and couldn’t tell them to other people because I was too scared. Or I could arrange it all into palatable games and cry when I have to pretend “oops - I just made this up - whoopsie - I’m soo silly” But I’m (?) the narrative that I wasn’t a loner as a child - I was a witch or cooler than everyone - I didn’t <em>want </em>to engage in their games or play with them I mean kinda true - I <em>wanted </em>friends but don’t now that I know it means changing your whole personality). (?) Maddie’s friend. Evan and Maddie but Evan is leaving. Jonathan makes me mad at best."},
{page:548,type:"abstract",lines:18,date:"Dec 9",text:"Maybe I should get my business to run by itself and then die - spend weeks in bed feeling all my feelings - idk if there are ones that I’ve been putting off. Finish all my projects so I can <em>finally </em>stop thinking about them. Add an end goal in sight - retroactively to that person walking around on the cement - thinking thoughts like I did immediately after disengaging from the conversation and releasing myself from the rules of the socialization. I start going to parties and being homeless and being friends with people I don’t like - driving with them - going to that bar in silverlake - maybe starting another project\n@@PB@@\nsitting in the corner and writing - <em>or - </em>a project that does not need to finish - people watching club - print the booklet <em>and </em>the notebook <em>and </em>the others - I can’t do anything - I don’t want to.\nDecember 18th"},
{page:549,type:"day",lines:12,date:"Dec 18",text:"Went out with Evan Maddie, Noa, Lindsay last night - OG dream crew. I was nervous and it was as anxiety producing as I thought it would be navigating the various social dynamics. Lindsay and I were holding hands for slightly longer than necessary when we were both very drunk - I from half a drink (Paloma) and they from a shot of everclear. Anyway - it was nice - in retrospect - everyone is funny. - I <em>really </em>like Maddie even though I was nervous cause we are in a fight? And it sometimes gets boring/awkward when it’s just us but she is nice.\n@@PB@@\nEvan <em>really </em>"},
{page:550,type:"day",lines:13,date:"Dec 18",text:"pissed me off by sitting between me n’ Maddie with his back turned towards me. M solution was to just come to a different chair. His real crime was the woodland shirt and the belted low ripped skinny jeans??? (/why) - keep it forever!\nThe offbeat was at least as loud maybe louder than I’d feared and I could hear no one\nLindsay says “that was funny” instead of laughing. Lots of I think you should leave jokes so Noa came to sit by me on the floor and commiserate that we didn’t get it. Seeing Evan and Maddie together made me so glad that I’m not hooking up with Evan - I just don’t wanna be part of that…"},
{page:551,type:"day",lines:13,date:"Dec 18",text:"Apparently Lindsay told my tape recorder story at Evan’s B-day and yes - <em>maybe </em>I should make an effort to be more normal but I thought the story was good :) Niha made me stop talking to Lindsay - out bad social skillsing herself. Then she told me this long not-even story about why she’s sort of mad at Zach and Markis but not really that I didn’t care about. the next day at Kyle’s memorial I remembered that I had the whole story about calling the police on Sean so I took her outside to tell her cause I know she loves\n@@PB@@\ndrama but she was like <em>not </em>interested and had no follow up questions."},
{page:552,type:"day",lines:23,date:"Dec 18",text:"While we were outside ordering drinks Sean apparently told off Markis for saying I couldn’t be Santa - only an elf which was actually really nice. I told J at the Reel Inn that it was nice to feel supported and that having the dilemma of deciding whether to stick up for myself had felt long and impassible. I didn’t really like hanging out with Evan and Lindsay that day at the cafe cause they were straight up bullying me but it was better today - I guess the worst part was not knowing if Maddie is mad or decided she doesn’t like me anymore. Decided I will hit up Grant and Mason and try to have (?) Xi night (maybe Katherine) after 2024. I keep thinking I’ll call Jennie and/or Jake but haven’t. It was making me cry that J could not or would not listen to a single thing I said at the Reel Inn. Finally I said something - when he explicitly asked how I’m feeling - while I was trying to tell him about my day. Can he learn to listen? Rebecca could not. I think I have to tell Niha why I don’t want to hang out with her. Like I did with that one dude on halloween and that worked <em>so </em>well.\n@@PB@@\nJ <em>still </em>"},
{page:553,type:"day",lines:4,date:"Dec 18",text:"couldn’t ask me questions and I can feel myself withholding my interest in what he says, which until now, has been sort of unconditional. It’s not a comfortable game and I feel dirty playing it.\nDecember 19th"},
{page:554,type:"day",lines:17,date:"Dec 19",text:"Kinda a weird day today. Hung out with Sean and left a weird/bad taste in both our mouths. And then we had to sit on the couch and talk about never seeing each other again and it felt - ew - weird - metallicky - I want to cut him off but I suffer with him - I suffer too. It just hit me that empathy is not a decision I make and I can’t choose to not feel anything for him, with him - even if he has wronged me. This afternoon, in Tocaya, I didn’t want to see him. I remember that feeling - those words in my mind - but now I don’t know why - (?) + it went sticky - trying to convince myself to not think about what he was saying. Cause it wasn’t real - it was all lies and he knew that. So - just sitting, eating my food, but just trying to ignore the input to my right (left?) 1 input"},
{page:555,type:"day",lines:16,date:"Dec 19",text:"good - wow - yum - you <em>must </em>enjoy - mm - enjoy it enough to make up for the lack - the lack of beans, and the lack of avocado and the common lack - enough greens - each cucumber chunk and garbanzo must be multiplied by 10 - imagined. And Sean doesn’t know <em>anything. </em>These are thoughts that I so badly don’t want to think cause I so badly don’t want them to be thought about me - but - he wants to get into art <em>to be cool - </em>what a <em>weird </em>reason - I can’t even think about it - 1 input <em>bad. </em>Anyway - then I worked in the garage but didn’t feel quite right the whole time. And couldn’t really make myself work. The whole thing is it was meant to be cause when I looked at mommy’s location to get out of the situation - she was <em>right </em>there, and,"},
{page:556,type:"ideas",lines:4,date:"Dec 19",text:"I got to talk to Paul about my card game and how I have to make instructions, and more cards and put them in sweet little boxes and print more. It would be nice to do that…I could enjoy doing that\nDecember 20th"},
{page:557,type:"day",lines:10,date:"Dec 20",text:"Went to lunch with Evan today at the Breakaway Cafe unfortunately, I have nothing to report today, and don’t really want to delve into my memories to see what things I’ve forgotten to report in the past week or so where I haven’t really been keeping a journal. I can only assume that I was “fine” and didn’t need to offload any feelings although this morning I did want to write and then when I was going to hang with Evan I thought I guess I don’t need to anymore cause I have a friend"},
{page:558,type:"day",lines:16,date:"Dec 20",text:"Delivered my own packages then got cookies at Bristol Farms and picked up Killer Noodle. Three unpleasant social interactions and when I was at Bristol I noticed the sudden advent of my clicking noise thing. I went to the drink aisle to see if I could bring clam, as opposed to my normal strategy of accepting it with the promise that it’ll go away at some point. I suppose the sudden advent allowed another option to present itself to me. i settled for a choosing wine game, and then “solved my problem” (the cookie guy wouldn’t give me half of two cookies) by only paying for one of them - it was only fair since. JH texted me in the car and I told him he was cool to skateboard. No idea what’s going on with Maddie and the nature of the"},
{page:559,type:"day",lines:27,date:"Dec 20",text:"dilemma I think is that no action can or should be taken which is fine cause it’s only 1/15 that it pops into my mind as opposed to JH which is what I was already thinking about when he texted me as always. Sean wants me to be more straightforward with rejecting him but he hasn’t earned it by making me feel safe. He deserves passive aggression until I don’t think he’s gonna blow up at me and yesterday was <em>so </em>annoying I don’t know if I ever wanna hang out with him again though I do want to call him cause I’m bored and JH can’t hang out with me cause he’s sick. I could go drive down the PCH to Pepperdine. I’d feel alright then. except I have “work” to do. Ok you can hear my new business plan cause no one cares (just kidding - everyone cares. That’s like the one thing I can consistently get people to care about ;) (”Oh woe is me”) BTW: JH says he likes my humor and my music taste. I think he likes me. He said “love is a drug,” and when he called me at Evan’s house, he said “it’s nice talking to someone I actually like” and I was like (missing) Anyway - take off maybe in February with Evan to peddle XI just like I told mommy (I think we’re both equally excited because I’m not sure and I’m not sure he wants to). (missing)\nDecember 21st"},
{page:560,type:"day",lines:25,date:"Dec 21",text:"Tried on the dress at Doen. It was a nice experience but i didn’t want it and now I have a good reason to make my own dress which I won’t finish. I like my lace better. I don’t need the boobs emphasized and I don’t like ruching! My buttons aren’t plastic. Idk if green or black or red is better. Their red velvet is lovely like a cushion but mine’s nice too. Idk how to do the pattern - I know where I want the waist.\nWatching this guy read a newspaper and with a pile of shelled sunflower seeds - the pile is impressive - representative of time and effort. We both have orange juice but his is from whole foods and mine is from here. I was sitting between the most unhinged black man and a woman who kept coughing. Coveting the table by the window. Now I’m here and this man has a chair between the bench and the table. This is why I go to Montana - more choices and higher class people. Anyway I was thinking I could start reading the news - just random stories - not bad ones. Maybe not the main pages - teenage chess tournaments - low stakes like the show I watched. But i feel like there’s so much to catch up on - you can’t just start in the middle."},
{page:561,type:"dreams",lines:14,date:"Dec 21",text:"I had the most realistic sex dream about Lindsay - trying to make a strap on work and it was not that hot and she couldn’t feel it but I could so then it was just awkward. Like J thinking I feel guilty for coming. He’s wrong. He was so close to me, pushing into me like he was trying to envelop me and take over my mind - <em>that </em>was nice. Could it have been nicer? No. Right there - feeling everything I’m feeling so I don’t have to feel guilty about it - wait - do I feel guilty? - I guess him enjoying me having pleasure is/was nice. Like Evan said which I had ultimate disdain for. Forcing me to feel nice? It certainly has the sting of the Star of Paradox."},
{page:562,type:"abstract",lines:19,date:"Dec 21",text:"The game: think thoughts until they are big enough to fit in a journal. They will fall through the sieve. The strategy is knowing when to continue with a thought - try to make it bigger - apply systems of movement - opposite - extend the logic, until one of them catches hold. or when to fold em! The remembrance that there’s always another thought waiting in the eaves is a constant revelation - never gets old - perhaps because of the intrinsic rules of trying to build up thoughts bigger - it takes the <em>whole </em>front entry hall and the eaves are not even visible in your periphery. There’s a cheat: examples, and emotional weight. And then there are mines: BAD THOUGHT - emotional weight thought that makes you stop playing the game - the risk you take when looking in the eaves (?) but you can also lose by trying too many SOMs and slowly losing steam until you lose the will to play the game/the will to live."},
{page:563,type:"abstract",lines:9,date:"Dec 21",text:"Alright here we go - here’s the biggest thought I could think - because the ritual of thought snuffing when Sean called and it upset me was not worrying - perhaps I <em>do </em>need the instrument(s) of abstraction, but that is a game - objective - snuffing thoughts out - do a ritual around them - brute force - ask yourself what’s wrong or: solve for every aspect of the thing in question - feel it x think it v’. Anyway -"},
{page:564,type:"ideas",lines:25,date:"Dec 21",text:"I keep thinking of the shrimp inside that store I showed Portia. I dropped a cowboy boot with little thin pokers that I wanted to do something with - make a mold out of - make more of them (?) - so I couldn’t take a picture of anything cause I was exactly that embarrassed (I could still walk around the store). Carrying around paintings in my pocket - a painting advent calendar - you don’t get a thing, you get to look at a painting everyday - for five seconds - it’s behind the door (on the other side of the door (paintings by maira kalman) The thought: the many designers who design stuff for that store are flailing desperately for something useful to hide their aesthetic but in truth they just want to make <em>things </em>- beautiful things - art objects that are for nothing. There’s no point to them so they have to make cuff links and toothpick holders etc. <em>My </em>store would just have things. And furthermore (because me glancing at the stuff in that store was like a linear progression) I want to make - the chess board I saw - pick op a shell as a metaphor for capitalism. It means something - it does something in your brain. It’s a game. It’s a ritual."},
{page:565,type:"ideas",lines:23,date:"Dec 21",text:"I suppose I could make a thome and put things on it. Maybe on one side - something with magnets and pink. The star of paradox → ← two competing patterns. clay. Ah yes - before bed - worms - white fabric with (pic) indents from thread being pulled around like a button tamping a mattress. Lisbeth stuffed animal - animal = dress. “What kind of animal?” “a dress.” “that’s not an animal.” “ok.” The perpetual question that has every answer - are there specific things that can go on the matt? Do they have to all stick together? Here’s the answer (to a different question): embed wire in the pink bows. Robert will like that. he’ll be primed from the lingerie I gave him. I’m jealous that Robert and Jonathan are Christmas shopping together but actually that’s kinda cute - getting their mom a present(s) - maybe a wine bottle dress to put under the tree - I should go make use of the sun now that it’s out (it became rare) I’ll try an idea I had that had to steep like soup. Ok now I’m sitting in the sun - I moved a chair here by the bathroom. I’m in people’s way but maybe it’s worth it. Ok."},
{page:566,type:"ideas",lines:29,date:"Dec 21",text:"Here’s my new idea that barely makes sense - a doll head (I have them) - <em>one </em>button. One slice of lace (maybe in the shape of a cake - oh yes - the doll heads can come out around the edges - perfect! (And each can have their own silver serving utensil thing (mini tray with a handle) because each one needs to be served, and this logic doesn’t allow for the fourth dimension - time. All the doll heads can be served as cake. I liked that dress. I was frustrated that I couldn’t make it. Intermediary idea: to copy the Starbucks display - dolls - like grandma gave me - that cracked - on the shelf - with a wire crystal ball holder for the dollar tree baskets - small version dolls laid out - the person who lays them out puts them to sleep - to be displayed. Anyway. Yes - cake. (pic) each one has a doll head or a heart + bag of nickels - quarters (fake) can come with it - you have to <em>buy </em>every ounce of goodness you would get from the dress - one inkle of delight at a time - the inkle of trying it on in the dressing room, knowing that <em>rich </em>people are around me. The handing the money over - dollar by dollar - I have to buy that - 500 of them - in ones. And the saleslady placidly smiling the whole time like that train ride I went on with brenda where should only say lalala. I could go get something to eat. Perhaps that would be prudent."},
{page:567,type:"ideas",lines:38,date:"Dec 21",text:"Perhaps I could make a version of mancala that has room for one marble each - the epitome of abstraction - the tic tac toe chess board - not many moves. I could give one to Evan for Christmas - send it to him…? I would buy everytime J mentions me to Robert for a quarter-shaped nickel. I’ll take everytime he thinks about mentioning it if he doesn’t (ex. we could get her a wine bottle dress - oh - you know - a dress that’s shaped like a wine bottle - just like all the times I thought about touching him - holding his hand - a quarter from every trauma from Hannah. The insanity - the anonymity - of getting three pawns in a set and playing with them like army men - pushing them forward - 2 spaces at at time. The molecule of emotional weight that remains after it’s diluted by so many iterations - stretched out thin like wire and clay - different - respectively. If I can’t manage that - the cake - perhaps I can include just <em>one </em>(stingy) white button. And a length of green velvet. And a teensy bit of lace. Put it in a pouch. That and the dollar it would take to buy it. All in the same pouch - that is beautiful. Abstracted and then you have to unpack it because nothing means anything - nothing means anything to anyone. The dollar <em>in </em>the pouch with the dress remnants/components is insane. Josiah explained his life story to someone once and I didn’t wanna hear it. I could explain this to someone - pay them a bag of nickels to listen. I’m in and out of Samsara daily - accidentally looking at that exeter polo girl for too long - hoping my stillness would belie that I don’t care - homeless or lesbian. All the signs point to shopping today - going to the promenade when everyone’s there - when everyone has the same mission.\nDecember 22nd\nDecember 24th"},
{page:568,type:"day",lines:25,date:"Dec 24",text:"I’m bad tonight - couldn’t even sleep - went to bed so I could stop thinking - 1:36 - then woke up early so I could think some more. I am dying. Recurring unpleasantness: choosing between authenticity - not lying - being myself, and getting what I want. It’s a coincidence - why would intentions line up all the time. And there’s the parallel conundrum of thinking the truth was being happy. Sit down, shut up, and take it. Smile. Anyway - I’m working on my xi cards. It feels wrong to forget my feelings but my feelings are not really helpful. Maybe I should just remember that we had such a good time in the shower - kissing, and he told me I make feel safe because I let him do whatever he wants. If there’s something I don’t know it must be that I’m <em>addicted </em>to this feeling - these feelings - this dopamine cycle. OR: that life is completely different than everyone says and people are lying to themselves all the time, and I somehow assumed some of these lies are true. Therapy - tagline - convincing yourself things that are not true to make you feel better. Hiring\n@@PB@@\nsomeone to do this for you. The more money you spend, the better they are at convincing you."},
{page:569,type:"day",lines:23,date:"Dec 24",text:"I saw a nice tik tok where an airplane has two people sit on each other’s lap as their seat. The complacency was beautiful. I also saw one where she wrapped a rectangle of jelly beans - beautiful that she didn’t put it in a box…to see the jelly beans just touching the paper. Anyway - I don’t feel good and I really want someone to know but I don’t know who to tell. I could write a song called: the best thing to do is not to do anything. And then there’s the parallel situation of Sean sitting in my pink chair and I told him - he’s drawing from an empty well and why is it that there are two parallel situations - it’s one of these - it seems if I figured it out/became aware of it it would <em>have </em>to go away - that seems to be intrinsic rules but it’s not. Just like I explained to J about the faux-intrinsic rules of monogamy - I don’t think he got what I was saying. <em>Where </em>do I put my heart - there are so many places it <em>could </em>be but instead,: put it <em>down.</em> Lay it at the bottom of an uber clean dumpster - maybe it’s part of ikea. I don’t know. I don’t care. I want to feel better."},
{page:570,type:"day",lines:13,date:"Dec 24",text:"What if he breaks up with me today - why did he want to break up with me and what does he want to tell me? Is it something or just that he wants to and he has to think of a reason? What <em>could </em>he tell me? I feel like I’ve fallen into a trap. This is the kind of thing I’d write and think “wow, they should be less dumb and I wouldn’t have to say it and also this person is stupid for caring about me when I clearly don’t. And he clearly doesn’t. I don’t understand\n@@PB@@\nhow his christmas works and I don’t knoow how to prepare. here’s what happened. We went to (missing)\nDecember 25th\n(missing)"},
{page:571,type:"day",lines:15,date:"Dec 25",text:"especially with all the leeway from being drunk and tired and ravenous. I only ate a <em>tiny </em>bit cause I was so nervous when everyone was getting food couldn’t be me but yeah - it is. It was nice to go to dinner with my family tonight and they had a ton of questions for me and I showed them the present J’s mom got me. He wrote this kind of nice note on his phone, which he showed me, as my present, when he got there. And it was a sweet note. But I could barely focus on it cause I was meeting his whole family. I finally got to meet James who I really can’t hate but yes I can’t say I respect him. He is a bit wimbly and by that I mean I think I could push through him by accident. Giving Ege, giving Grisha. His"},
{page:572,type:"day",lines:15,date:"Dec 25",text:"girlfriend was insane - just sort of mindlessly chattering to me. I wanted to hear what J and his brother were talking about. J was acting kinda weird, and I guess he was kinda tired - and thinking about music. I don’t really understand why he was so nervous about introducing me - I guess it’s cause he doesn’t want to give them the wrong impression that we’re dating but I don’t know why he invited me in the first place or couldn’t just tell them we are friends. But yeah, I guess they’d assume anyway. I don’t understand I don’t understand and every stupid feeling is magnified by seeing Sean freak out and be delusional about me because my guess is that he feels about the same way about me as I feel about Sean"},
{page:573,type:"day",lines:9,date:"Dec 25",text:"My fam and I played a guessing game - I made them guess primo passo again which i thought was really funny - I sort of thought that a solution to a lot of problems could be making up games with emergent rules because then we played “headlines” and I “challenged” Sandy’s like “Streets lit” and he had to make up a story about it. Today I worked on the couch with Jonathan for a while. He says he thinks"},
{page:574,type:"day",lines:27,date:"Dec 25",text:"having a plan and you can learn stuff way more quickly. That’s nice to know cause I never learn anything cause I’m always worried about the time it’s going to take. But for example - the stuff about the 20% simulation prospect and special relativity and the difference between real and irrational numbers - what if I just learned math and science - it never really comes up or came up. Until I started hanging out with Jonathan. At some point Sandy thought everything I said was really funny which kind of nervouses me it’s like James saying he can’t eat meat cause it causes cravings. I said “I have no idea why I became a pescatarian; I make all my decisions randomly” and Jonathan knew what I was talking about. There was a moment where I made a funny joke that Jonathan glossed over but his brother repeated what I said and Jonathan said it was them discovering my sense of humor which is always my goal but sometimes it doesn’t go well. It did feel pretty natural talking to his fam and I’d like to talk to his mom more but I didn’t get a chance to. But yes - I was <em>very </em>hungry like starving but I couldn’t leave and I couldn’t talk. As the hours passed I got hungrier and hungrier. Finally he said “I have to leave <em>right </em>now.” Which I refused to juxtapose with"},
{page:575,type:"day",lines:38,date:"Dec 25",text:"me just sitting there waiting first 10 minutes - every 5 seconds I thought he’d gotten up. What a cruel twist of fate that right when 3:00 struck he finally finished his program. And then I had to say: “Oh I thought I was coming with you” like the sad bitch I am like did he forget? In the bathroom when I was pooing I told myself that he was (missing) at one point I went into the kitchen and ate a spoonful of plain peanut butter that I had to spit into the trash can because it expired in October and then look it up to see if that’s bad. And then I had been planning to wear some nice Christmas outfit like my velvet pants or the Doen dress but I didn’t even have time to find my shirt and just had to wear his gray long sleeve. Oh yeah and then he whispered to me <em>right </em>when I was stuck in a house full of strangers “DO <em>NOT </em>KEEP MY SHIRT” and I was like: OMG! What do I do, ah: “do not <em>think </em>about this.” grit my teeth “ok,” I said. Whatever. It’s fine. It has to be fine - there’s no other choice. If I think about any of these problems compared to the mental hospital it has to be a joke. Unless the rules of love and (missing) He kept asking me if he was bad and he wasn’t <em>bad </em>per se but idk. It’s funny cause he <em>still </em>kind of needed my help like he was leaning on me and kept holding my hand while we were talking to his dad which I don’t get if he’s introducing me as a friend. Anyway - I guess my only plan (missing) Anyway - it’s nice to relive it now. I guess (missing) If I were Sean, I would ask me “but explain why you told me as we were walking in that you were gonna introduce me as your friend” and then kept holding my hand. But I think it’s counter-productive. I see myself preparing things to say and then saying them and I think Sean does that too"},
{page:576,type:"day",lines:29,date:"Dec 25",text:"The sort of hilarious climactic moment that I haven’t really processed was when the mom of my situationship was talking to me and I just could <em>not </em>get the mashed potatoes cover to fit right and I registered for a second that maybe it was the wrong cover. I remember <em>thinking </em>about using my brain to try to figure out how much food I might want, and what kind and then dismissing - that thought because it didn’t make sense - I was using my brain for too many things already - to figure out where I was supposed to be - who I was supposed to talk to. I don’t really condone this but after I ventured out into the dark scary world, I kind of came back to J who I don’t usually think of as a safe place, and just decided to stick by him and use him as a shield that could be mainly talking to people and I could just be sort of there. Did I mention his mom gave me $100 bill that J said is just the standard gift lol and I could not stop laughing but was gaslit when no one else found it funny and vindicated when I told my whole family and they giggled their asses off. Anyway - on paper, everything looks good - if I just ignore what I found on J’s phone and his comment before we got inside and that he (maliciously?) seemed to forget that he’d invited me. If I was a scientist, I’d ask whether something <em>changed </em>between when he invited me\n@@PB@@\nor he just didn’t think about it."},
{page:577,type:"day",lines:15,date:"Dec 25",text:"I would like to think myself out of being so fucking dumb. Ah yes - I remembered that sometimes (and I didn’t know why I hadn’t had it recently) had such a firm grip on my mind that I could actually direct and <em>choose </em>to not be obsessed with something like this. Things that I meant to say and then the conversation moved on I can gather them, afterwards, like picking shells off a sunflower seed - shelling them, and peeling them into a pile. Ah yes - the funniest spell of all “I want to start wetting the bed”\nThe joke being that mommy can ask prying questions about a situation and daddy can answer them (as he always does)(because he answered someones clue even though he did not know the thing - origin of the joke."},
{page:578,type:"day",lines:9,date:"Aug 21",text:"August 21\nI always feel sad when I hang out with maddie. At least at the end. Empty. Alone. What was that. And what was she thinking. Is it the last time? Was she wanting it to be over the whole time. These banana breads are so good. And he gave me two. Two! Just because. Down to 97/5 lbs. More good news. Turns out it was because of my period. That’s the same weight it said when the cork was under it, so I’m a little suspicious."},
{page:579,type:"day",lines:7,date:"Aug 21",text:"Finally an ironic and not just a sad situation to be a part of. Trying to friend zone someone you’re into and they want to have sex with you “You were into me the whole time! This is why women can’t be friends with men.” missing I want to be back at the beach with Sean when I said “I wish this day would end.”"},
{page:580,type:"day",lines:16,date:"Aug 21",text:"Thinking about the day I skipped school (college lol) and traveled by bus to some store, it was kind of windy - or sunny - I don’t remember - went through all the aisles, looked at everything - god ideas - for the dolls - to make the doll for Brenda - with the charlie doll. That’s what I referred in my mind when people ask me about leaving school. And I always had the same answer that no one understood - “yeah, I like it” like going on a field trip. And I refused to understand\n@@PB@@\nwhy they looked at me with these confused eyes. “Yeah - I like it. I get to do whatever I want. I just kind of wake up…” and it was that day I was thinking about. Sort of like when I told Elizaveta that my job was performance art - meeting people. And then left “like this” An example"},
{page:581,type:"abstract",lines:8,date:"Apr",text:"I say a) (don’t start at the very beginning. (it (is meta) should revolutionize how people write essays.\nThesis: (to spell it out, for those insane people who like things spelled out) makes it closer to the way our mind natively works, so there is less translation. this means we can do it easier and faster, and possibly get further. Oh, and here is another one:"},
{page:582,type:"day",lines:19,date:"Apr",text:"STRANGE FEARS\nI was never afraid of spiders. Not climbing up tall things, nor getting lost at sea. But when I was seven, I went on a hike with my grandparents, and when I turned around at the top, the heat of the day glinting off everything, perhaps gradually chipping away at the neruons that made up my peaceful body, I pivoted to find a completely different world on the other side. My parents spent weeks trying to coax out of me what had happened - why I had turned into a gelatinour pile of muck. I remmeber laying on the floor of my mother’s closet, looking up at her as she tried on dresses. Did Bubbe yell at you? Did she not let you get naked? I wanted <em>desparately </em>to tell my parents what had happened. But these were not the same people that had read me stories in bed only weeks ago. I couldn’t tell this woman anything, cause she was an imoster@ telling them what had happened would have"},
{page:583,type:"abstract",lines:2,date:"Apr",text:"Certain kinds of synesthesia are very common. Lots of"},
{page:584,type:"dreams",lines:15,date:"Jul 31",text:"july 31\nI had some dreams - I just woke up. I was gonna drive to beverly hills to go on a hike in the fog in a maybe spiritual way and someone’s boyfriend was gonna come with me. And then I was at a party and perhaps Stanley was explaining to me that when we fly in dreams, some people can do it in real life - it’s called “the vestibular sense” and it’s because of our inner ear hairs. I barely listened and thought maybe I can do it, and flew up to the ceiling but no one seemed that surprised, so I knew it was a dream (just a little disappointed but recovered quickly). I was narrating that guy making robot arms and realized I could do exactly reality amanda’s voice, and was saying that he could probably make a plane."},

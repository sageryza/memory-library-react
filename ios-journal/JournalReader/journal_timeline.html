{page:104,type:"abstract",lines:76,date:"Mar 9",text:"I suppose the “main mechanism” (it’s really not hard to make up terms (when you know what you mean(?)) didn’t work - Amalia popped off 4 of the paper papers, and Hunter did the rest. I suppose the alternate mechanism (like an alternate in basketball) was the poking the wire through the apple, and how little anyone cared whether it burned when we were on the balcony, and, as though Mason were also the witness, he refused even once (not exactly truth telling - the missing chimney - a long string - like a kite tea bag ) (pic) to help light the fire - almost hostile, as if his complaining his finger was getting burned, not a complaint that did anything, more like a whine, as if a small child didn’t get enough cheese chunks to go with her bread chunks. The “connotations” were shifted because of the moment, the experience, the threshold was lowered - Mason didn’t care, and we were all looking at him - that was the magic of the moment - that he retained his power. Then we buried it in the meadow, and my favorite part was that it got buried right, and quick - that you could not see it at all anymore when it was gone, it might as well, we might as well, not have been there.\n\nso many thoughts in the bathroom, none of them interesting, but I’ll see if I can recite all of them not as a test, but as idk - recess. 1. An example of something (a very good joke): the fingernails, the hot sauce - instrumentalism, the coat rack - stealing something on a place (as an example of something) - Tot - handbag sign - eroding the category - the Tot was an experience - Oh! now Tots can be an experience. Well…art doesn’t work as well anymore, just like “woman” doesn’t work well, with trans women - you can erode the category, just, know what you’re saying goodbye to - the concrete bounds (ex. the prunes to - cause I’m hungry - not (?) - (”should I wash my hands?” - it was nice because my hands were cold. And example of (AEO) instrumentalism (why would someone bring their purse to the bathroom - who would steal on the plane - just sitting there - guilty for the rest of the flight - the worst part, prolonged like porn. This morning, when I was getting ready, I allowed myself the privilege to switch back and forth between tasks, and that helped - socks - ok - now I can think about which packages to send - allowing myself to be distracted. In the bathroom, allowing all the stages of grief that they didn’t have toilet seat covers - even looking behind the lid twice (for two different reasons)…the book I found in the bathroom, and before that - what is the point, of so many poetry books - no one cares about them - I would care about them just so I can believe that mine will be cared\n\nabout, if it is ever published eventually. And here I was, making a book of poetry, just to “fit in” - “look I can do that (well now - that - something that’s completely useless) oh) but it would be worse to make one that really tries - “this one’s” going to be different. (Because then it would be all the same as any of them - they’re all trying to be different - in fact, that might be the main thing they have in common. But unluckily, I’ve already learned this lesson - that chain letter I sent that no one passed around - or - is it the opposite - stealing the stationary from crossroads.\n(pic: “saul, ok I couldn’t find my long needles, but I did find something else, the gendered act of sewing, their shoes looked alike, but they didn’t care, the pot of hot cheetoh mac n’ cheese ([not pictured] I had to leave the room when saul brought out his mask)."},
{page:105,type:"day",lines:41,date:"Mar 9",text:"(pic: hunter wanted to make his own, i gave him robinson chen’s personal landline, taht he only answers in bed. hello! robinson chen, robinson chen sleeps alone.)\n(pic: both of the votes ended in a tie, and the other paple was just for choosing between, having something to.\n“imagine what this night would’ve been like if it’d been Hamster” (wistfully), and Amalia started telling all of her hamster stories\n(Mason had to be the tie breaker, even though he didn’t wanna be)\n(pic: looking at the book in the bathroom. (it was a bathroom book, and then I brought it out)\n(pic: me, mason, hunter, looking at the weird poster that didn’t make any sense)\nRandall said: “you’re not taking this very seriously, are you?”\nSaul brought even more diet coke\nNick told me it was a hot deal (\\$20 for 30 cans of PBR - he wanted me to know he didn’t think he needed this much)\n\n(pic: beets, but no beef chunks, mason stirring the borscht that I couldn’t eat. the orchid that J got me (I didn’t notice it was purple till the morning, to be purple, I made myself a burnt quesadilla on the stove (pre-burnt)(pan was already burnt), the three boxes of hot cheetos mac n’ cheese, me trying to wrap my hands all the way around him, fighting, feeling better, fighting)\nThe part I forgot to include - “what’s worse than looking a gift horse in the mouth? Looking in the gift giver’s mouth” (pic: here’s a horse as a gift, can I look in your mouth, hmm)\nLindsay accused me of being a pedophile and ended up incriminating herself. evan soft-launched the fact that his top four bags were stolen by letting me read his journal. Evan seemed actually really sad to be saying goodbye to me, which was ?nice? I took his hat as a bit, and he didn’t ask for it back. When we hugged goodbye, Lindsay was over the top mocking us “omg hug hug hug kiss kiss” making kissing noises and evan thought it was really funny that that would be our last hug, and wouldn’t let us have another."},
{page:106,type:"day",lines:67,date:"Mar 10",text:"March 10th\nAlright - I will write - out of obligation - out of guilt? Dumbledore’s socks - alternate interpretations. I’m worried about all the towers I’ve built for this JGT - crashing down like the rain, threatening to destroy my diary - the integrity of it - because I do not care - about the dots. Always looking under, beneath, below (like adjacent to, but not) - the underlying assumption…I was thinking about Maddie - or put her in some sort of place, and I’d adopted her rules - or those to make her think I was normal, which for one single moment (person) were the same as being goo. Dumbledore’s socks (()) → le petite pipe my original interpretation was different, was better. The feeling of everything expanding, and/or crashing down on me, or on itself - Tot: “maybe if I write well enough, I could get as good as ayn rand, who mommy read in high school and thought was simplistic (effortlessly accomplishing my (()) → pedophilic task. (which I realized I found a loophole to write off because of all the other things I had written off because of him (the last thing to check is the underlying assumption. Anyway - to finish. I don’t want what they want, what I want. Oh yes, and that was the roller coaster.\nthe dregs are taking power. Last night I imagined, while being happy while being sad - there’s really nothing that is the point, that is wrong, and the upsetness is fading like powder into milk. I could tell them (him) the shape of it was replaced (park bench, tree). A bingo card ⇒ advent calendar ⇒ bird house, with matchbox pattern collectors in/for each space - I could throw tiny silver things, like beans or darts at each space, when I think of an example of the concept. The two examples this morning - the house keeper, who knocked thrice but didn’t heed my nonchalant\n\nwelcome or protest (I would’ve decided retroactively, had she heard me). Her sister was from San Diego, but she’d never been. And she kept telling me not to forget things like Sandy’s room key, and Sandy’s money, but she finally got me with my phone. “you got me” I said, smirking at myself, chuckling at her. It was on the edge of the white bed that was flain and placid. I decided last night that I could practice making scenes - I couldn’t get his shirt off; get him to take his shirt off, so eventually, I finally, because he was threatening to leave, snuck my way into his shirt, but then found out I was allowed to be there and kissed up - imagine kissing down. Doing things through a hood - the (()) we didn’t know we needed (daddy - shoe - pebble). And the other - in line - getting my banana pancakes that was evidently the only thing I needed to be happy. I tried out being unhappy - as a novelty - but it didn’t stick - my fineness was too ingrained. A boy who read the menu, and his mom laughed. I laughed too, because of sardony, but then, I became a witness -? part of the situation that I was “laughing at.” And so, it was an example of: irony, and accidentally endorsing things you hate. I didn’t need an example of that, to put in my bingo bird house with silver shells thrown majestically at it, but now I have one."},
{page:107,type:"dreams",lines:16,date:"Mar 10",text:"I dreamt that Evan, Maddie, and Lindsay and I were at this flower market stall - dim, kind of a whole in the wall that closed with a wrought iron gate when I came back without them to buy some flowers. i wanted to buy them when they were there, but didn’t want them to know how little money meant to me, so I came back after we all said goodbye (I think it was Lindsay leaving for a long time). I made a hilarious joke - that i could just buy 1600 seeds (for the purple flower that looked like an upside down umbrella) and plant them everywhere, that I didn’t feel got the attention it deserved. I wasn’t mad, but I kept thinking of the number 1600, and how funny it was.\n(pic: purple and some peals on the other side, and closer together, green)"},
{page:108,type:"dreams",lines:39,date:"Mar 11",text:"March 11\nLast night I dreamt that there was a guatemalan girl who handcuffed herself to a moderately attractive white boy who had made some not funny racist comments that fell flat. When I looked back, he had come to her side of the table and it took me a second to realize it was for the ease of the handcuffs. She herself had a Julia-like body. And was vivacious, and innocent.\nIn my next dream, I was driving past a house on the other side of 17th street where bubbe was sitting on the lawn and I begged desperately M and D for us to get out of the car (we were about to drive past). We stopped but I couldn’t get out of the car\n\nbecause I wanted to hug her. She was saying that she had tried but hadn’t quite found the way to (missing)\n \\ \\ \\\nought I to write the drim dram of the day? The island spirit has taken hold or perhaps it was just my not-bad convo with Jonathan. And now I am thinking about no one - not Charlie, not J, haven’t remembered grant except to remind myself that I hadn’t. Wished I could read something boring, so I guess I’ll write it instead. Mommy and I had an unpleasant adventure - first it was raining, and a fence meant only a round about way was available. Finally got a good night’s sleep which means my emotions - I see them, but they do not attack me - I suppose I exist like a measuring cup, and the top line is above my feelings. Mommy didn’t want to look around the shopping center, cause she wanted to see Sandy. There was a big line when we got to little fish coffee, where I never wanted to go - I woke up wanting to have a papaya bowl at the hotel, and write down my dream, and yesterday’s dream, which I described to J on the phone. Though I’m wearing my hawaiian shirt, I suppose I should remind myself that every problem that I was worried has come to fruition. The"},
{page:109,type:"day",lines:19,date:"Mar 11",text:"weird underhanded communications of Sandy and Skye - perhaps I am not white enough to want to participate. Skye argues with everything I say, in a passive aggressive and underhanded way that she is a polite, pleasant person. And now J wants to go surfing with Sandy. Will the torment never end? I suppose I will need to move to El Salvador by myself, and spend a whole 20 minutes in the waves, bring nothing but journals, and work on five at a time, to finally be free. No relationships but a series of acquaintances with clasped hands and my deepest most intimate relationship with a monkey. Ii see my family from where I am - Sandy is on his computer, daddy has been standing the whole time. And the group chat is saying they are planning so what jealousy evaporated into vapor.\nDo I recount the mundanely boring elements, as a testament to the spirit of vacation the induction of shaka?"},
{page:110,type:"ideas",lines:26,date:"Mar 11",text:"TIME/SPACE\nI went in the hot tub and tried to think of a story I’d like to read. I knew the rules - things don’t just come to you but the word concierge was nice sounding in my mind/mouth and so I thought of the night concierge - she works as a concierge in one motel during the day, and then another one at night. The people are mostly the same, but they are slightly different (and she describes the differences intensely, because that is what she is interested in because that is what she has\n\na lot of time to think about (salt’s cure at night) (ai - roald dahl boy illustrations chatgpt vacation short story but they wouldn’t have something as nice and as interesting as the guy in the line) got to think about towers with the bubbles in my hands.\nMe and the girl in the pool both started standing up and forming narrower and narrower concentric circles, and I thought: “because I was the first one in the pool, I get to set the rules for the pool.\nI need a new euphemism for “preamble redacted” so I can write the little (sticker) thoughts. Seeing all this new foliage makes me want to classify it, but maybe I should do it as a ritual. (pic: you must walk in concentric circles)(pic: this plant is red and green.)"},
{page:111,type:"day",lines:13,date:"Mar 11",text:"TIME/SPACE\nI categorized my second plant. It was a smaller version of the other plant - green and purple with whispier, paperier leaves, like romaine lettuce. I was thinking I could replace my projects with this fake project. I was thinking how I always think of little things, come to little conclusions, and now I’m going to, and now I’ve started, writing them all down and maybe how older thoughts, or if you’d complete the game, and the synthetic process, conor + charlie → fruit - eating a whole apple “mixing the ‘synthetic’ and the specific,” a game just needs to be fulfilled and you can plug in anything, and"},
{page:112,type:"abstract",lines:69,date:"Mar 11",text:"you would think it wouldn’t end up mattering, but then the kaleidoscope can shift, and suddenly you’re on a bus with whatever you packed that day. The procedure of going to each part of the pool - the ritual of checking it all out - a different view of the progression - others want to go to different restaurants, but I want to start with the one nearest us, like learning happy birthday on the ukelele. To go back a little, to around where the \\^\\^\\^s are: (just to explain it better) oh but and: mommy wanted me to get in the pool, but it was too much like the buffet at vegas. I said “it was feeling too much like a contest,” and (but): she didn’t hear me and said “you chickened out?”\nI thought earlier, how: well, when I thought of the ambrotion linearily longitudinally - between the girl being told her sister’s inside her - that relationship which is destined to become so specific, and nuanced - fights and things in common and eventually even, they will say: “this is what our relationship is like” (maybe a keychain will sum it up: “thank god there’s always someone to get a mai tai around here,” and then - the poly check box worksheet I did with Sarah on V-day two years ago for Sandy because I couldn’t picture myself putting my arm around him or offering him emotional support. It was a passive thought that became louder - begging for attention that I don’t know how to give it as I found he hadn’t told me on the phone. We went to get poke and Sandy took Skye home instead of bringing her to pick up our “poor parents who were stranded,” “only because you’re pregnant” and when Sandy went into the supermarket to get two cookies and some sweet fruit drink for me, skye and I bonded over people not hearing us, and it feeling like we are deaf.\n\nI saw a guy carrying drinks on a tray and I identified that what I found exciting about them would’ve been trying all of them - not having just one plaed at the sea in front of me, like a time out - a little punishment that continues everytime I contemplate taking a sip, and realize don’t want to. And so it goes with my tasting restaurant I guess - which can open at salt’s cure during the night.\nFor example, if daddy were to praise me, persuade me, that I’m special (if only because of his deficit, like the hike yesterday, describing drew shooting forward like the fish at the reel inn, who can’t see anything, who are nearly blind. The buttons on my clown suit, that I did in the back - yes - the game - can come to fruition - my thoughts will turn into a tiny town that will be little wooden houses, and not tall towers (when they could be skyscrapers) (pic) each little thought written down, but they will only have one windows. And when I did crosscountry, if someone told me that we were running a marathon, I wouldn’t have known, and would’ve trained for it. my whole life - tiny thoughts - so many of them, and each window, could be in a skyscraper. (pic: the actual drinks in front of me) 7 miles was hard, but I ran it.\n\nThe last part is - the kaleidoscope, that turns. You might think it’s just a game, and then it goes up and up and up, but one day, it’s turned up side down, and whatever thought you had - or suddenly it all matters, or suddenly it all doesn’t."},
{page:113,type:"day",lines:13,date:"Mar 12",text:"March 12th\nLast night we went to dinner at “the tasting room.” (missing: egg breakfast, food at dinner) Before that, Cayla sought Sandy’s help and they started saying “javascript” - I think, if I’d listened in, I could’ve gotten the general jist, but my eyes glazed over from the 2oz pink wine (pic) and the wall was decorated with solid wooden cutting boards in different shapes and sizes. I didn’t have my phone, and my back hurt from sitting. Though my linen earth tone outfit matched the decor perfectly. I started to slip into that trance where things become abstract - I’ve been down this road\n\n(missing: dreams mostly)"},
{page:114,type:"abstract",lines:31,date:"Mar 12",text:"before and so I let myself slip back into the concepts. Sandy and Skye have a way that I may as well hate, of offering very specific things, and declining for very specific reasons. Skye disagrees with everything Cayla says, and Cayla accepts it without question, immediately, probably a learned behavior. This has something in common with love language - it is a language. Sandy’s way of being autistic makes me feel guilty that I’m not also autistic, in the same way. everything is as I predicted, as if I were trying to prove that I knew what was going to happen. but there is no leaving - no room to move. Sandy bought me a (pic) pellegrino, let me eat his cookie, and poke. He apologized for not being fun, when trying to get the spiny pike out of his foot (off) and let me have so many of his green beans during their most boring of conversations. He gave mommy his pillow so they wouldn’t talk about it, and barely complained when he was waiting in the hallway with his bags. I dreamt, after not talking to j for one day, that I was sad that I’d never see his drawings again, remembered, in my dream, how the flowers turned into eyes and resolved maybe I should just ask him to marry me, just to see what he says. Then, in the morning, I woke up to a drawing he did of him touching my back in hawaii, with him still on the coast in california. (pic) I was relieved to find that he got the island’s wrong. I don’t need him knowing that much about geography."},
{page:115,type:"day",lines:29,date:"Mar 13",text:"MARCH 13\n(missing: dream)\n\nLATER (ON THE PLANE)\nLast night J called when we got back to the hotel and said he was happy I was in his life, and that he could be honest with me and that his brother also hates walking around (cause he went on a walk and felt like people didn’t respect him), and that he could ask Naomi because Robert always complains about that. He asked what I thought about codified social interaction which was the main thing I’ve been thinking about; it was almost too big of a coincidence, and he said Jesus and Buddha tried to get us to opt for the “last quarter” (pic: win win) and that he’d been yelling at his mom and that his brother started yelling at him (probs cause he was yelling at his mom(!) and they ended up talking about things, and J said he’s “not an idiot” (something about vulnerability, and how - it’s not the dominant strategy. I tried to talk to sandy about it when he refused to share his bar but he doesn’t want to, and now we’re sitting with our hats between us, luckily (pic) with the ability to talk, but he’s reading the fountain head by ayn rand on his phone so he will never talk, and it’s even worse than I thought. I already knew this is what would happen and I told him I’m sick of our codified communication, and Skye’s and that they’re passive aggressive and that they found each other. Oh well."},
{page:116,type:"dreams",lines:2,date:"Mar 14",text:"MARCH 14\nI dreamt that I was in a tree, or shooting through a tunnel in trees - upwards - (missing: rest of dream)"},
{page:117,type:"abstract",lines:53,date:"Mar 14",text:"While I was watching a view while I eated, I thought: I should have a “view” in my thoughts, ex, save up a nice thought to have while eating, or before going to sleep. About the rocks (again) - the interim b/w finding them matches that of (the time and temperament) - the cadence?) of collecting patterns…There was the (pic) two-art flower, that was translucent, and it’s most striking feature was its resilience. I tried to save it, because I didn’t want to think about it anymore, put it on the side of the jacuzzi and the wind knocked it down 2-3 times. And I thought I was a pedophile, cause the woman from Wisconsin asked if I was in school and seemed uncomfortable starting from when I told her my real age. (pic) these were black and evil looking, but went with my evil kit. I saw them when I went to pee by the chickens, waiting for my sandwich oh yes - the equations I solved yesterday - shoving shaka down your throat, but that was the only thing I liked, so: shaka = shaka. Yesterday, on my very own tarmac, sliding my suitcase over the yellow “tarmac,” I thought: none of these thoughts are interesting, or worth thinking about [but i’m gonna think about them anyway, and now: that is what i do. (I do it on purpose)]. (pic)\n\nI saved three things on my inner wrist I mean forearm in the shower - and the middle one was peace of mind, the bottom one was ex. a certain amount of time - “I’ll check my phone in x time,” where x is such that ?it can never be solved for a numerical value, and the last (top) was buddha’s burgers, where I watched my mind start thinking of all sorts of examples [of something stupid] and noted that as a worthy mechanism to be taken advantage (advantaged) in the future. Peace of Mind meaning that something - ex. guilt will come under all your thoughts, rip them up like trees in a torn out forest, and start it so you can’t think anymore.\nON THE PLANE NOW\n(pic) Rushing through the airport - sandwiches and snacks - trading things with daddy - the flight girl gave him the sushi - five pieces - I saved. Sandy watching Moana - says it’s horrible. yesterday he spent most of the day by the pool - mommy swam all the way around, and under the tunnels and stuff…I watched some mischievous boys torment an older and very sun burned blonde girl - bean pole - looking furious, incredulous, furious. Java Jazz last night and we had to get tiramisu, bread pudding, chocolate cake cause to get to the right dollar amount…and the waiter who"},
{page:118,type:"day",lines:48,date:"Mar 14",text:"wasn’t a waiter - was a waiter in training, brought us (pic: banana cheese cake) and then another bread pudding which he said was tiramisu. (pic) I told Sandy this was my favorite part of the trip, esp. when our waitress shooed him away like he wasn’t worth bothering with. Dessert is better when it’s just to reach the right dollar amount. before that, we had (pic) dinner while watching the sunset and watched the sun through the monocular - it (pic) the sun - fit right in mommy’s eye. Sandy was driving the big boy car, and said Jordan is looking for a life partner…talked to a woman from wisconsin (pic: 14 ft) swam with manta rays.\n(pic: pina colada) (pic: the three pieces of sushi that were up for delivery)\nate too much at dinner last night and felt full all night, kept feeling my stomach to feel the bump - it was still there - but I imagined it not being there, cause it wouldn’t be there eventually. Sandy and I had trouble with the air conditioner - long drawn out discussion about it, as if we were holding our cards close to the chest but I don’t think we even disagreed. Woke me up a bunch of times - I guess he went surfing, and washed up etc. Hard to get a good night’s sleep. Talked to J the night before and he said some nice things - I can’t remember what, and/or couldn’t\n\nhear him at the time - I think he called me babe. I watched the total lunar eclipse from the parking lot while waiting for him to call me back, and daddy was waiting for Faharzad to get there, and we were waiting for mommy and Sandy to get back from dropping off our bags at the hotel and checking in. Lil’ argument about whether we stayed at the Westin or Mariott last time. (pic: java jazz, steve, moon, sun, waiting for j to call me back..) (pic: mariott, westin - they merged cause mariott owns westin so Sandy was right - reality, mariott westin)\nI was disappointed to not be hungry for breakfast, cause there were so many things I wanted to eat. (pic: parfait, me, comes out here, the cinnamon rolls sandy told me about, all the things I couldn’t get at breakfast 🤪, mushrooms, spinach, omelette station he offered to make me an omelette, got sandy some half poke yesterday, and used the empty extra salmon scoop to bring the omelette on the plane :))"},
{page:119,type:"abstract",lines:88,date:"Mar 14",text:"I started to think I could see exactly what the little boys in the jacuzzi were thinking, and what they’d become, trying to be objective, not swayed, to decide if the little girls in the pool would become pretty. It was so clear I was seeing “into the future or into their minds and idk if it’s facial expressions (common ones that get etched into the face), or the intrinsic pre-existing laws of the face itself. (pic: they were plotting and scheming - would they be evil to girls in fraternities?) SO ANYWAY WHAT ELSE - on “friday,” our family took our old white telluride to lunch at some food trucks that were the best lunch we could’ve found, but daddy said there might’ve been better…then we drove to a long pier that people were jumping off from and looked through the monocle and I found a piece of coral that I used as trioculars, cause there was one spot where you could see through three holes. At Duke’s the spot skye’s family picked (which is the same as the one in Malibu), we got two desserts - two kinds of “hula pie” and skye said just macadamian nut, but Cayla and I wanted to try the S’mores pie she described, but then Cayla said she didn’t like it at all. Like three times. After my conversation topic failed at the airport and also on the plane, I said to everyone at dinner “how do you feel about codified communication, and Sandy\n\ncorrected me to be that I meant “coded communication” and Sandy said Skye is a contrarian, and tactless, and doesn’t know what she’s doing. Then he said “coded” only applies if both you and the person you’re talking to have the same understanding and that there’s two things - one where someone doesn’t understand themselves, and another where they’re trying to communicate something in a code, and skye does the first, so which one is it? And I said latter cause that’s not what Skye does. She’s a bully and she wants power (though I snuck that in before). Mommy wanted to get out of the car early and daddy said: “I wonder what that’s code for?” And Sandy said “maybe she wants power,” but neither daddy, nor I thought it was funny. After Sandy left to get three bars in a bag (and he got mad cause I took a bite out of one but i didn’t care) and yogurt cause he couldn’t have the bread pudding cause there was chocolate in it but he threw the yoghurt away cause it had synthetic flavors and ate the bread pudding, despite the small amount of chocolate sauce, I asked daddy and he agreed that Skye isn’t as stupid/innocent/unaware as Sandy tried to portray her as. Sandy said Shayna does it on purpose, but Skye doesn’t. But - and daddy asked me if he uses CC and I didn’t answer, and he said yeah, and that I do too. (pic: what we want codified communication to get us there)\n\nin order to get what I want, like, asking why we want to do something, knowing full well, and that’s not the point, it’s to get our way. I said - he said - not all desires are equal, cause I said, what if we were empathetic - and I pointed out that how much you want something doesn’t often match how much you decide to use codified communication. Then we stopped talking about it.\nWent in the ocean yesterday, and it was so clear, and they tried to find where Sandy was jumping off and daddy said he didn’t do it right cause he just sort of fell (I said it’s good - to not be scared, and do what you can). After our drive through the jungle, we found a cave that was long and flat, and there was nothing to do in it. The mahi burger I had at Dukes was the blandest ever. I bought hot sauce from one of the trucks. I got a keiki veggie bowl from brazil truck and then a (pic) salad wrap from health hippie truck. Sandy and I almost shared some yummy peanut butter and banana thing, but we got a green juice instead, and daddy got an acai bowl, and then it started to rain. BACKLOG - On the ?first? day, everyone went on a 2-3 hour hike that was 1 hour away and mommy and I skipped out and walked twenty minutes to a town and she loved all the textures at a texture store, and bought a shell necklace and a flower shirt. And we got ice cream - from Lapperts - a hot fudge sundae with a brownie, which I didn’t even want, but"},
{page:120,type:"day",lines:58,date:"Mar 14",text:"drew (wanted it so much that I) kept talking about it at dinner the night before after Jonathan yelled at me on the phone for not answering him and then called back and said “no more meta conversations” and apologized and said “yeah?” and I said “yeah.” before I got off the phone. I was so tired at dinner in my hood which I’d been wearing all day, and I told J how tired and hungry I was and he said “you’ve been traveling all day” I told them about the ritual mason had us do and was too tired to care about their facial expressions. I shared papaya(?) salad with mommy, and mahi mahi, but wasn’t full after, and we got carrot cake, cheesecake, and chocolate cake. I spent a lot of time sitting by the pool, half in the shade, half in the sun and it was hot, and I felt my legs getting burned. It wasn’t unpleasant, and I don’t know if it was pleasant either. I suppose I wiled away my day watching and categorizing behavior, making observations about the kids in the pool, and their relationships with their parents - this lil’ girl Molly who ignored this other little girl who’s hair was short, curly, all over the place, giving the appearance of a deranged old man (she didn’t really smile) and they were calling them both “babies” which I thought might’ve offended them. Yesterday at the cassabella next to ours, a very tan man with a huge belly\n\ntold the mobile waitress that his life was stressful and he ordered a strawberry margarita, licked the salt off the side when he first got it and his wife Crystal, still on the casa, was mad, seemed to be mad at him. Little blonde girl with braided pigtails mommy said was too cute to belong to them “what are you reading Krystal? is it a novel or is it a ;) novel” daddy and I tried to figure out what song a little girl was singing to herself, and he told me about how bad Russ was in making bets and not keeping them and I didn’t give him the satisfaction he wanted or that I would’ve wanted. Mommy got me the chocolate dipped short bread I wanted - a four pack in a bag, and daddy and I went to get poke cause Sandy and i were hungry\nI was unsure whether I wanted to remember my dream. i was at some sort of corporation and at the beginning, we saw a preview - multi-panel - it was nicely painted, but casually, in gouache - greens and blues like sea foam, and some warmer pastels - some kind of corporation, lots of things casually happening in it, showing (it was moving, an animation) business, lots of small things that looked like tissues - moving in and out of the corporation (which was represented in one of [my favorite] panels. It might’ve been an ad agency. Some of the panels were darker, and they were squarish, but together, they took up a lot of the wall. I think"},
{page:121,type:"abstract",lines:25,date:"Mar 14",text:"I was sort of interested in the work, thinking, (mildly excited) that I could probably do it myself (as if, in real life, i wanted myself to have a real job - “vocation”). Later, I suppose I went up, (because at the end of my dream, we were going down a really long set of stairs) (I couldn’t see the end and there was a girl, who worked there, who we’d been beefing, she was a more official manager, and I had a hold of her wrists (auburn ringlets, plain face) and she said “are you really gonna ‘mean mean’ kill me” and I didn’t want to, so I was thinking how I could take a step back, and talk to her to where I felt safe (I could feel the power in her restrained wrists, and I didn’t trust her/know how much to trust her) Before we went out the door, there was certainly animosity between us - as though the corporate hostile work environment evolved into something much more menacing. There was a long hallway, with high wide windows, and there were these sorts of half people who were probs ai cause they didn’t have quite enough feelings, and their eyes (pic) were replaced by hard boiled eggs, and I swiped each of them, and felt mean, but also didn’t"},
{page:122,type:"day",lines:7,date:"Mar 14",text:"trying to get him to stay, but he was cold - a pink terry cloth towel between the sheet and blanket, which he complained in some very specific way, and then, as I knew I would, found three other blankets - the blue and white one (pic), the sun/moon sea foam one and it was secured that he’d stay, but it felt to desperate."},
{page:123,type:"day",lines:28,date:"Mar 17",text:"March 17\nDate with Mick last night. He showed me his painting studio/garage and we did a painting together and talked about rules - “so many rules” - that he runs into when he paints - “Oh, I don’t do blurred lines, or use purple” (”purple is hard” he said. Ha? is that a joke?) then he started adding faces everywhere. I think he put in ladders before. And he added (a red road to the sea fam). He showed me, really specifically, how to mix it - what consistency, how the paint should fall (not in droplets but in little lines when you skip it/slew it across the surface of the little water cup). He got some paint on his face - black paint, and tried dabbing it with a rag - I wanted him to know that I knew that there were only certain places on the rag that you could dab it with. Then later, he spilled a bit of sea foam on the floor again from the water cup and had to rub it out with his foot. “color-matching” he said. We walked around for a while, after we sat at a picnic table in the back, (pic)\n\n(missing) Yesterday, he tried my killer noodle - just the noodles I’d picked out, and put back in the container, and kept saying it was wow really spicy, and then coming back for more. And then he discovered the perfect anecdote - milk and cereal. Instead of reading the UV index, I can feel"},
{page:124,type:"abstract",lines:33,date:"Mar 17",text:"“the idea on Lincoln”\nexactly how much my skin is getting burned. Tis is, of course, a metaphor. I remembered (this is the other metaphor), the idea. (I had before) - that - if I - well - the goal is memory recall - if I’m trying to think of something to write down, (pen, poised above paper - i can’t think of it - the right thing to write) - then my mind automatically starts coming up with “oh, you could write this” and it’s all the things i was thinking about, like the idea on Lincoln about how most people approximate, and allow for some ambiguity, but J tries to get it all right exactly - use precise concepts, so he’s often wrong (too ambitious) (I din’t want to write this until i got it precisely). Remembering the freedom of getting the chocolates after coming off the plane (when they were arguing about prices) - a whole box of chocolates, not un-wrapped - brand - any brand - name - how generous. When I met Mick, when we were talking, I feel like he had quite a large sieve for what i was saying, but he didn’t get anything wrong(?), to the point where I wanted to pull his hat back from his ear (he wasn’t wearing a hat), and scream - whisper, again, what I was saying, and is the genesis for people calling me weird, When I’m being nice to myself (lol 😢) and why I don’t mind Lindsay, and Evan saying it again) I kept thinking he looked like a woman named Kelly when I was first sitting across from him at the table, and then, later on (after we had both felt a piece of each other’s hair) when I was staring down at his head when we were both"},
{page:125,type:"day",lines:30,date:"Mar 17",text:"painting, I realized that he had auburn locks. Not brown, just like Dumbledore…”Oh you could write this,” - anyway…I travel backwards, I come up with a solution - “oh…wow I could do it “intentionally,” but the (real problem?) is that I can’t do anything intentionally? Anyway, and that’s a metaphor for my not being able to get stuff done - because - the very(?) part is the assumed part - (true?) I set up this elaborate automated process - but i can’t even start - the hard part is the easy part - the hard part is that it’s too easy, (and I can’t do anything easy).\nJ is “wrong” and “bad” like he always says - he is wrong about everything about me, and any empathy, or “help with my anxiety” is not actually help - it’s instrumental from the care he gives me - bread crumbs in a different boat - boat crumbs (…?) idk) and there is “upsetness” that comes from things, ex. him being wrong and bad, and there is upsetness from (even if things are good), and life is lolly - me thinking of the plan I didn’t know I had) things not being how they seem - and this is back to my dream - about people not reacting as I expect them to (I am on a different page). To reiterate: J tries to be “too precise,” and ends up weeding out, or netting out the inherent ambiguity (which is only inherent until you’ve figured it all out ( (()) → look at paintings till you understand them). And Mick’s sieve is too large: he has too large a sieve."},
{page:126,type:"abstract",lines:27,date:"Mar 17",text:"something new - the old thing, where I’m worried that things changed - I start liking (before and after “rug/christ), except this one, I think, has turned over an old leaf - I’m old, back to myself again - I knew in the back of my head, that I wasn’t always depressed and hopeless: the cold war defeats - those days on the couch, before Zach called me, and I simply finished my deck, and then finished XI and then, at ihop, wesley said his coworkers wanted hats - wanted to know where they could get hats, and imagined a whole package - a starter pack - with one blue, and one red - a place to wrap notes - if I had started differently, I could make a field guide, or perhaps I could print the others again, and change some text in blue and add a green . Oh yeah - I solved it yesterday - the field guide is the first half (?) of the (pic) and then it lets you put your own notes (do I (dare I) add specific sections for specific kinds of notes, like “where are you, what type of people do you see ex. demographic,…and: nitty gritty - any specific observations - what are they wearing; specific tid bits of convo, odd interactions with objects…all this comes with a shirt, and a hat (or a sweatshirt and a hat), and a binocular necklace (that was Wesley’s idea too somehow)"},
{page:127,type:"day",lines:30,date:"Mar 18",text:"March 18\nYesterday I went to breakfast with wesley and then mason came over later that day, and we played the diagram game I had just made, we played perfectly. I can’t remember the exact (le petit) ontologies we came up with so I’ll recite the cards - there was - some exchanging things for other things…oh, in retrospect…I wonder how accurate our descriptions were, (unpacking…why did you do something (sometimes this helps! (sometimes not)) I feel like there was something about a tunnel but no, maybe it was just the way the “light” (in my mind) was moving across the cards, either conforming, or disconfirming them. I liked - robinson chen, and his imaginary imaginary partner - trading for an approximation - the idea made sense - not necessarily directly with the cards. Another we came up with was catfish. He misunderstood the ritual science plant one, possibly due to my hasty, lacking, explanation…idk. I opened the white honeymoon bottle, which is now capped, but unfridged. (pic)…we also made some new cards….when he went to the bathroom, we imagined that I had turned into beary mcbearson and back - the transformation taking place in completion between the time that he was gone and the time he came back. I think I did a really good job selecting only the diagrams. I printed 20 cards, succinctly finished the project, and was just adding text to some of the cards when he called (I"},
{page:128,type:"ideas",lines:32,date:"Mar 18",text:"added some of it while he was there). I think, in retrospect, the success of the game was contingent on his willingness to listen to my explanations of each of the cards, as they had come directly from my experience, and there is a small - small amount of ambiguity as to the degree of his/an ability to understand something (so complicated?) explained so hastily. (repetition is not a rule, it just seems like one). Other than that, he laid on the floor and I on the couch and had a nice little chat, where we both listened somewhat equally, and were similarly interested. I felt pretty nice after and realized how many friends I have that want to hang out with me and was thinking that when I went to bed. I’m mad still, but I know that it doesn’t matter. I’m always worried that I’m deluding myself, and the situation is a lot worse than it is, but I think, like my random September entries that I was reading; that weren’t even about ideas, just random descriptions of my day, that I kept expecting to be boring, if anything, I’m [confusing/combining] wide accessibility/usability for inherent merit/validity, and that there is a fine sunniness under everything, the color of chai tea - as though, what I have always wished - that I could be in another time, at the time right now - were possible. Possible that being silent and mad in the car with my parents is somehow worse than sitting silently by myself, doom scrolling my own journal entries - ah - now I finally understand why they had to be a a pdf. (time travel)"},
{page:129,type:"day",lines:15,date:"Mar 18",text:"and - to give credence to my wesley time - we had pancakes, he made fun of me for not eating most of mine (I really really hope that you have an explanation for this, Jonathan, so I don’t have to lose myself in cognitive dissonance)\nHere’s my plan: bolstered by me (bolster yourself) Observation of the general \\{quality of the journals I read, I’m going to keep journaling]\n\nun petit ontologie - book: (pic: equation)\nHere’s “another” example: little rectangles. Oh - these aren’t books, these are just little rectangles (for this project (petit ontologie (peon)) to work, cut scraps into rectangles the color books. 🔲 + 🔲 ⇒ ahh books 🔲 + 🔲 + 🔲  + 🔲 + 🔲 ⇒ ah, rectangles\n(missing: small writing)"},
{page:130,type:"abstract",lines:42,date:"Mar 18",text:"Bolstered by my inherent ability to write amazing journal entries, bolstered by that day (these days) I was at the starbucks in DTLA and watching people all day, and went with that man back to his house, where I wasn’t supposed to go), I’m going to write more amazing journal entries. I’ll bring the sunshine of malibu and driving down the pch right here to this cafe. The same idea that I ignored in my journal - I’m going to print a bunch of things - not the things that daddy wanted to show Steve, but the printed things that I wanted to show Steve (cause they were relevant to our discussion) ex. the queen cards more card looking ones), nihilism and public nuisance which I can make with daddy or mason, everyday rituals, or the witch one. And of course, XI, and the blank passport notebooks, like imagining conversations, possibly a version of the PW that has room for note taking at the back - “get started right away” - the plus edition - maybe I can start by printing ex. the lesbian coloring book, and the adult coloring book that I evidently sold out of (adult? adulting?) until I have so many copies that they all spill out till my friends start thinking I have a store and I believe it myself. mason said (when I was “therapizing” myself to print things in various stages of completion) that I can/need to also make the printed version, I think it’s just so\n\nunbelievable to people that I could actually have this many good idea that it ends up relegated the the fourth quarter :’( anyway: the pattern collector, perhaps one that comes with a thome - to sort them after (the pebbles) - (a thome, (simply) cinched with a string?)\n\n(pic: two posters that need to go in my room, le petit ontologie, the duplicitous envelope, two sides of the same coin, competing patterns, ambiguous events, competing patterns: the warp and the weft of liking someone or not, all these lines come up (to make room for the thread), then all these lines come up to make room for the thread.)."},
{page:131,type:"day",lines:19,date:"Mar 18",text:"Mason said that he went to an artist residence, at a ritzy hotel in canada and that no one’s ideas were that good - writing about (missing) - too depressing of a subject for me to think about (())→ (missing)\nTBT\\ that magic comment when you recognize an alternate relationship between the cards - “something in common” x → “progression, hierarchy” v’ - this happened to me and mason, at one of the “junctures”\\\n\\if you can identify an existing framework, it makes the essay writing a lot easier and prevents excessive word use.\n\\my hypothesis is that mason is a little bit too comfortable with ambiguity, to put it succinctly.\nOh, well, instead of drinking more chai tea OR getting food, I’m gonna expound upon the condition which activates the pros vs. the cons (TDIL word-choice - finding the right word, is a puzzle) of caffeinating vs. sustaining. (no). Before I was thinking"},
{page:132,type:"abstract",lines:27,date:"Mar 18",text:"Perhaps it’s like this: when I was young, I couldn’t understand why people would prefer recess to test taking (being the young, autistic (pic) child that I was) and now I’ve convinced myself that I must not like work, want to avoid work, because I must prefer recess, because everyone does - everyone does. And disney channel taught me that you may think you’re different - but you’re not - if you look, deep inside, you’re actually exactly the same as everyone else.\nDaddy came, and picked me up, and brought me nuts - wish fulfillment nullified my need to write about the pros and cons of eating vs. caffeinating. Though I was thinking, before, about, how, well, actually: a), actually, no, b): how, if you choose to drink more caffeine, then you have to know that you can substitute the wrong thoughts for the right thoughts, in that proportion, so for example: if you take one sip, then you have to know that you have enough right thoughts to pacify that discrepancy (and you should take stock before taking the sip. And a) was just that you have want to completely discard your mental state - (pretot - I was surprised - didn’t want to drink chai, and it was because I actually apparently liked or “didn’t want to completely disregard the mental state I was in."},
{page:133,type:"day",lines:85,date:"Mar 19",text:"MARCH 19\nMan I actually feel so confused - like with cassie, like with Maddie maybe. Went to Douglas park with j this morning to scope out the little kids - but there weren’t any - just ducks (no - mallards, as he kept reminding me) he came over yesterday after he (finally) called. I think I would rather have kissed that beautiful girl at the gym (greer) who was helping me with climbing - and they really did help me - turned it from sort of hopeless, to not hopeless. Mick and I sat on the back of his truck, and we each made a banana and peanut butter sandwich. And drew blue dots on our faces, cause he’d drawn one on his face, and really liked how it changed his features. At the restaurant, the water whispered “you’re welcome” in his ear, and he tried to replicate the experience by repeating “thank you, thank you, thank you” to the waiter. When he came to take our plates but it didn’t work. We kissed outside, before crossing the street (I don’t think the light ever changed). I don’t know if I wanted to kiss him, per se, but it seemed like the right time. And it felt nice, even though it was really confusing. I’m really confused. he was sort of shiver laughing - he said he was giddy. J and I wrestled and he put my sock in his mouth (mmm) and when I went to the bathroom, and couldn’t pee, he made it come out of me by fingering me, and then putting his fingers in his mouth. he always does this thing where he “tortures” me\n\n(hmm) by touching my clit and I beg him to put it in or put his fingers in, but he won’t stop, or he’ll count to five or ten or something, and won’t stop touching my clit until he’s done counting. I couldn’t figure out whether to eat the tom kha soup at his house, or go back to my house, and eat the other soup - the ramen. (pic: here soup, there soup, daddy put it in the fridge) I haven’t really been hungry, lately, and I haven’t been able to sleep very well. It’s kind of interesting, and I’m scared, so that’s also interesting. I told Mick about the soup dilemna when we were talking about gratitude journaling, and then we ordered soup, and it was black bean, which is what I wanted and it was really good - it had rice in it, and he took off all the bacon, even though I said he didn’t have to. Jonathan would never do that Let’s be honest. But I guess he does care for me - he sang a song about me being a bug in his rug (”I said I didn’t wanna go home,” he said “Oh you wanna be…”) etc. and then he cradled me, and rocked me gently back and forth.\n\nJ said while he wasn’t talking to me, and I was stewing about alone and angry in my apartment (in some ways, 2 of the worst days - as it appeared there were crystal shards crystallizing every five feet, or every five seconds - like sugar packs - to crystallize the realness of the situation, that he jacked off to “jack off instructions” with my panties in his mouth. Mick, in the car, when we were listening to music said there was a moment he realized there was maybe chemistry between us in the garage, and I think he’s right, I think I realized that too. I was feeling sort of - idk - disembodied, in the car - overwhelmed, esp. cause of the intense situation taht I didn’t tell him about - that we made up or he forced me to forgive him by threatening to kill himself and threw the jacket I bought Sean on the ground because he said he doesn’t like that my room is messy (neglect), that I hold myself when I walk, and that I don’t take care of him cause he “takes care of me” and I wanted to show on his phone and I saw the messages from Emma and it said: (pic: oh so she came up to us because you’re her boyfriend, J clicked this button to delete them - all the messages from here and on his computer).\n\nI don’t think I like emma anymore, which is a relief. I didn’t like how she looked in that picture and apparently she was mean about my twitter presence. After mason left (oh yeah and I told him how I get so scared to hang out with girls, and he understood and empathized (missing)"},
{page:134,type:"abstract",lines:22,date:"Mar 19",text:"(missing) But I guess I’m glad I got certain things off my chest, like that I think painting is ego driven and I don’t strive to be better at it. There was a single moment, when I showed Mick the sculpture I made when I wasn’t talking to j in September and he really liked it and he said something about the paint brushes, like, these are really weird objects” or something, and I felt like: “yes, this makes sense. This artist likes my work. Not - painting I do to make my mind feel better - but my actual work. And then I decided to work on sculptures cause, like, what if someone actually understood and liked them. I mean - they are good. I don’t not know that. And all the ones I imagined in my mind, are good too - the proof is in the pudding, (or two birds in one hand, cause it doesn’t matter “ha.”) I was reading the bible verse about the sugar packet, and not showing it to anyone. Idk - I guess something just clicked - about conor - and artists - who get their MFAs - I remembered why I started this journey."},
{page:135,type:"day",lines:13,date:"Mar 19",text:"(missing) he and Maddie have such long passageways to get to what they mean. Anyway, he came over and I said “Let’s do this the easy way,” and he said “no! hard way! I love hard way!” so now he’s supposedly gonna come back, and I don’t know what to do. I don’t want to see him - but why sean, if he is sean-shaped - I almost wanted to lay on him in his yellow sweatshirt where he was on the chaise lounge - it would be nice to have him wrap me up.\n\nI feel good and clean and fine cause I slept a lot and mom said everyone likes me.\n(pic: too much milk\nand sugar, and beans\nmakes my mind\na little unclean"},
{page:136,type:"day",lines:21,date:"Mar 19",text:"LATER\nhad lunch or whatever with Savannah and holy shit she does not listen. It was like frying an egg to see what sticks as Mick would say but I don’t like frying pans, and the butter was black stuff in it. At least I know why I don’t hang out with her, and same problem with Niha, and, to be honest, Jamie. Made J seem like an attentive listener. Mick said Tyler’s a “young” 29, which means I’m an old 29 - what does that mean…hmmm. No butterflies, but maybe a flue? hmm. The insanity of calling what Sav and I just had a conversation - damn - butter egg - like dripping hot from the wax from the ceiling, and seeing what sticks - one drop per second - the time between - I don’t think she heard a single thing I said. But once I accepted that, I think it was nice being in the sun - talking at each other. Forced myself to text Cassie, cause I keep thinking about it. Still this icky feeling when I think about J, but i still miss him and he was all I wanted to talk about. Maybe"},
{page:137,type:"abstract",lines:5,date:"Mar 19",text:"(missing)\nIn the way that it gradually jumped my mind up, it was like doing speed - like you notice little by little, but it’s also happening to you, so, sort of like the woman spilling coffee on herself. Whatever. I’m (missing)"},
{page:138,type:"abstract",lines:29,date:"Mar 21",text:"March 21st\n\nthings that - all the little thing - idk - flecks of dust in the air - Jae would say - nah - give up - it doesn’t make sense - or someone - a man at a computer, perhaps with glasses, would say:, would have the question - is it possible to describe the world, and would see how everything is little pieces of fluff, and would say: “no.” “i’ve found the found the answer, it’s not possible,” and give up. But here I am, describing the nitty gritty pieces of things that are not really meant to be described. Anyway - idk - I think, if, took a graphic novel class, I would just want to keep doing the same thing - mon petit ontologie. Anyway, I went down the PCH and we went to the other seafood place that’s not the reel inn and J brought me a sweater. Oh yeah - we saw a dying sea lion - frothing at the mouth, waving it’s head back and forth. J did a little weird strut to show that he has his own parking pass to get past the guards (a red piece of paper that he had to show his ID to get (they wanted to see his picture to see if the twinkle in his eye would match how nice it would be to see the waves). (?) his shoulders, and looking swag. Saw Maddie today too, and we drank white wine at the park Honey Moon) and it felt sorta romantic, and I got mad at Evan for trying to give away/ sell his guitar strap that they made him. That’s insane!"},
{page:139,type:"day",lines:43,date:"Mar 21",text:"He also lost/gave away the v-day heart I gave him, and I feel it matches that his care is fake. NO NEVERMIND. HE IS TEXTING ME. I MISS HIM. I DON’T CARE ABOUT THE GUITAR STRAP. IT WAS AN ACCIDENT.\nLast night there was a whole thing with phones dying, and calls dropping, and I had a conference call with jonathan and evan, who called me within three minutes of each other. Jonathan says he doesn’t like anyone, or finds them boring (but he said he likes me, and said - I hung with Maddie and Jonathan today and I got to hang with my two favorite people (pic) my day :) and J sang a song about me being his baby in the car and we kissed again when we said goodbye - he wasn’t done kissing. So I came to his car window and he kissed me again.\n\nAnd when I said he should make plans, and could we hang next wednesday, he said what am I doing tomorrow morning and I had to say that I am hanging with Lindsay which I am actually excited for.\n(pic: me trying to talk to Jonathan in the car about it, and him not listening (lol) the kiss they blew me when they were leaving, and the kiss I blew back.)\n(pic: maddie liked the wine very much :), our nice picnic blanket that is suitable for all occasions)\nJonathan says that everyone he dates is like his dad (or his mom) Maddie said they wrote a song about camping trip, and that I’d never done anything really hurtful, but that at times I had been confusing. I wish I could reassure them, but I think I was confused, and that’s the honest truth. Idk - the sun def felt like holding their hand at the park today. They talked about Julie for a while - some things I already knew. And about who they (and I) go to for guidance x emotional support (they said Noa and Gayley who are both becoming therapists. I tried to say, which is what I was thinking about last night, which is that - I don’t know if/what I need emotional support for - like - probs not to digest random things or everyday. I came up with - things that confuse me, and I need someone to help"},
{page:140,type:"abstract",lines:13,date:"Mar 21",text:"me unpack them, and invite me to believe my own point of view - I even explained hidden mechanism, which is that, for example, someone is doing something that seems nice on the face of it. Maddie said they go to Noa for most things, but there are some they feel are too big of emotions - like - is love real, or they’re worried about their relationship with Julie. they said Julie is loud, but self-aware talking a lot. it felt so similar to how it always used to, and we just had a long intermission, and I don’t know why. I didn’t even ask them/her. Didn’t want to. It’s in the third quarter - could ask but shouldn’t/don’t"},
{page:141,type:"day",lines:27,date:"Apr 3",text:"n\napologize profusely like I guess his mom makes him do. i was never even told to say thank you in other people’s houses. Oh, now I’m going to make a concise version of abstract referral technology. It’s going to fit exactly in one of those new brown books that I just got. It’s going to be nice because each page is going to have so much information, and you can read about it in the table of contents. I want to to see what it’s like for other people to have a diary - do they read it back, and say “yeah, yeah, yeah - I agree with that thought, I agree with that thought” etc. (pic: referring to abstraction to robert heckerman) “the metaphor machine.”\nI think - the association with the fourth quarter is invention - synthesizing new concepts, generating new ideas (pic) - I don’t want that to be lost - has a sort of magical bent. And then (tot) I was thinking about how the pen caps/and the pens themselves) kept appearing and disappearing and thought, “Oh, I could make something with that “because of how magic it seemed, but then i said, no; I’m actually having real feelings today and then, fourth quarter says: “well, what was I having before? And the answer is, I guess that, my mind was manufacturing feelings - trying to make feelings out of babkis” (another yiddish word)"},
{page:142,type:"abstract",lines:23,date:"Apr 3",text:"mind feelings are trying to place feeling feelings - they look like little things w/ tiny names and labels - all the concepts that are stored in my brain, that I pretend I can call on when I need them. Well anyway, that’s enough of not me - next tot wearing the menswear - I started to feel like a horrible person. I can’t tell anyone the lie I told: like the grotesque person I always think I am - that’s probably why I can to so long without showering - because I’m dirty - and my fingernails - pee outside - I don’t see myself as clean - like vivi, promising me to hack t. As a bride in the goal - I can easily bypass my disgust response, and I think these games are related. (Pic) I think, if I believed I was Santa Claus, I could sequence a small, but accurate part of the genome just by thinking about it.\nAgain, unfortunately, no one believes I am Santa Claus, I want to kill myself but ONLY in the way that he would know about it. Maybe I could tell Robert H. Too, and he could come to my funeral and buy the right size casket.\n(Pic: Kill self, know about it so, NOT real!)"},
{page:143,type:"day",lines:32,date:"Apr 4",text:"APRIL 4\nWent to bed at 2 and J called at like 2:30 saying he wanted to kill himself, and he had a little knife that I saw in the bathroom once. I told him to put it somewhere else and he put it in his pencil case so now we are in a game where I want and he doesn’t and I didn’t wanna be.\nI guess the two things I was trying to remember at the light: my two dreams. The first was about taping a (missing: dreams) J convinced me he should commit suicide by saying he would donate his money to charity and then I stopped talking - I had nothing else to say. Feels like a cat and mouse game. first dream I had invented something amazing - I was the dad in the situation, come back from the past. There were various options. After you taped the wrap to your chest, then you could put strings like yarn, like a tail, and then you would begin to move in certain ways - it would enable you. I wasn’t appreciated. As if this was one of the things I was trying to remember at the stop light. Make a book called “explaining things to myself’ I don’t really know how that will help, or if I’ll show it to someone. I already make (seed: “or something like that (pic) - just introduce all the terms one by one, that I invented) systems. i can just delete stuff I don’t need - i think it should be handwritten - thinking about doing all the editing work in analog somehow with the goal of giving it all into\n\none of those little booklets. I don’t even know how exactly, but i think that would be nice x work well? be interesting?"},
{page:144,type:"abstract",lines:48,date:"Apr 4",text:"LATER\nA mini ontology - a temporary petite ontology: examplification is an excuse for writing the example - build it up into a tower (next step is: finding a string to hang onto (pic) (can’t quite reach)\nexample: “anniversaire song vs. C.W. mother song - “I like specific things, not general things, for example I don’t like ice cream without toppings, or soup, at least not the idea of it (”note:” I like the tiniest thoughts and ideas → I like miniatures) - a piece of milk, a piece of pie vs. cobbler boo - no - don’t like…I like that imaginary diagram mommy drew (pic) all the ?flags? to get past wanting to hang out with Sean - there are so many things to categorize, and you could “give up” and let them wash over you, write it off as “a paradox” fake pdox: so many things → ← impossible to categorize.\nAnywya - you could split the world up into people who like pieces of things, and people who like soup - noise songs- graffiti art that “triples up” till you can’t even see what it’s about - approximate\n\n some feeling, or just that there is one (#mean) it makes me imagine people with haircuts like noas lounging all sleep-like on bean bags. It’s not a coincidence that they’re lounging all lazy-like. What I thought in the ar is that I’m proud of myself for “intuitively” (scientifically) expanding my range - or - what I was finding, when I was reading back the other entries - was that - a lot of the sort of theoretical, for lack of a better word (experimental maybe) metaphors? allusions - idk, but they got me to where I needed to be! (I was going). …and so i worked, and so I’m going to expand my repertoire (renewed vision of my thoughts in ?novemebr? talking ⇒ thoughts\nAnyway, and then I attached to it how J is warm but in a sort of general way, he doesn’t necessarily know exactly what I am saying, which i think enables him to be warmer. and mommy listened to me as a child, and J’s mom called him lambykins. I like listening cause I feel understood. His mom would tell him, if he were being bad that she was gonna take sleeping pills and go for a drive. I wanted to ask him what he was doing to be bad - how bad was he being. I told myself that I could convince him to kill himself if I tried really hard. idk if I like"},
{page:145,type:"day",lines:9,date:"Apr 4",text:"where this is going. It could completely destroy me if it was my fault so the situations is fragile in a way that he probably didn’t think of. Ok, anyway - that’s - the splitting up the world that way, and then making an infinite chart of all the ways you could split up the world “the world’s divided into two kinds of people - “meta ontology?” thinking of the rest is busywork and I won’t do it (I can’t do it)."},
{page:146,type:"day",lines:19,date:"Apr 5",text:"APRIL 5\nWaiting for my food, now, at Literati Cafe. Went out with Lindsay last night and Noa and Maddie were sitting by the pool when I got there; she made bacon, I brought my laptop to the couch, we sang emo songs on uke which brings me to my first thought, which is: (pic) they’re all bad at music (Q1) and yet, (Q2): trying to make it as musicians! At least they have a bad singing voice. According to J, I have a naturally good voice/sing in tune. I am not trying to make it (Q4) - counter-intuitive. This is why I keep stepping in this puddle - because the puddle is in my way and I see it all the time (that’s fine).\nLATER - ATE MY BREAKFAST\n\ngot my first glimpse of my dream back so I guess I’ll stop typing. ignored evan’s phone call, and now I get to feel guilty without examining it. Sandy and Shayna were doing a road trip in the dessert - like 6 hours - we were on vacation or something. (missing: dream)"},
{page:147,type:"abstract",lines:39,date:"Apr 5",text:"(missing) In three quarters, life is fair - finds a way to be fair - in 1 (4), it’s not. Lindsay - I told her I like the way she plays in conversations and she really appreciated that. She was x had v’ come up on mushrooms and so, the buildings to her right, as I was driving, looked like a solid block to her. trying to talk in the car was hard for me but it went surprisingly well. A wonder prison - when she maintains the car vibes - cause she is a professional at road trips. She was thinking about how conversations are creating something together - and you don’t know what you’re gonna create. She said it’s interesting how I’m a bit mysterious, cause I change the subject back to them - I’m open - but I leave a little mystery. And - I’ll solve it for you - I love mysteries thought - it’s cause you do not listen that’s why mommy and I are getting divorced. We don’t like passive aggression and she meant that she would stay and dance though she was tuckered. Then I could route it (missing) the other thought I had driving in traffic - I guess as a metaphor - seed I guess - example - drive three more blocks - that’s a whole adventure (unpleasant though maybe) of walking - and then other things - the simplification which maybe takes out the emotional weight is that the “value changes” - you could say one word - like the two minutes of words Ema tried to say, that mean more than every word you could think in your head about the encounter. I an’t help but feel sort of bad for her. Even though I know I should be mad at her. And lastly - for Robert - instrumental heuristics - a possible structure for the book - a description/a feel into - metaphor for the concept - with retrograde motion or not, and then - all the (progressive) ways you can apply it - emerging or…”helpful metaphor → instrumental heuristic). …:)"},
{page:148,type:"day",lines:29,date:"Apr 5",text:"LATER (HOME)\nLiterati closed at three but I really wanted to get done typing my stuff. Lady with ruler-glasses asked to use my find my and then buy me a salad - her phone - she forgot to check the front pocket. But I didn’t even want the admiring glances of the lesbians who kissed once, or the cashier - I sort of didn’t want to look up when she approached me, even though it’s my dream - to be paid back for all those times. Finally re-reached an equilibrum in the car with the air on, and thought - the temperature, asleep, eating (nutritious) meals - all contribute - coalesce - to prevent ocd - this waiting thing is a little painful, but might be best if that were actually his goal (as if that…-it’s the opposite of an instrumental goal - a real goal that doesn’t get done because of the fake (instrumental) goal.\nUnfortunate paradox - it takes some will to open up the zipped realizations - I always thought that’s the best way to store them.\nAnyway - there were two ladies having a conversation in the hot parking lot. As if a continuation of the cafe - as if - “evidence” of the (a) simulation) but one step back - evidence of (something). A metaphor: getting the sun I wanted before, but in this horrible hot car - where the sun looks and tastes, even - black, compared to: getting all the nutrients, but none of them taste good, like - oh - I need more beans etc."},
{page:149,type:"abstract",lines:30,date:"Apr 5",text:"I think this is an example of Synthetic Learning Syndrome, but before that, if we take a step back before that, we realize/remember that we can tell robert that’s how you refer to abstraction. /or that it’s not just art - it’s also: “referring to abstraction” - I assigned myself the task of thinking of what this means…I guess the in between steps, which might’ve already been solved with Petit Ontologies (venn → PO → ‘ART’) but I realized the assignment was more to make me feel good like a satin bow on that special box (when I tried to do it).\nTot - end - think the way daddy thinks (or mommy) “wow, what an explanation” think how anyone thinks - the seed - or the explanation was that well anyway - the conclusion was - you can “think the way anyone else does” (like J said “different ways of thinking - (cause I was thinking that this morning, and studying how things affect each other: morning → evening).\n(pic: the way daddy thinks, the way…thinks)\nidk - it looks like a web, I guess (this, is (?) another ?) example of the “two kinds + meta”).\nit’s not that you actually, or that this is a good example, think the specific way… (the example was that mommy can be sarcastic, and I originally said it in a mean baby voice, no, that was intermediate, mommy was before and after). Anyway, this is a metaphor that describes how you can think in different ways - (duh) it is stored like this."},
{page:150,type:"day",lines:23,date:"Apr 6",text:"APRIL 6\nOut with what’s his name last night - looks like a greg, not a grisha. I don’t think I like him anymore. it’s ok. We had fun getting a cookie, or at least he did. I hated it - sitting in a car, doing nothing. when the air starts to feel like empty space that you have to fill. I did not want to bring him back, though I had to, but I didn’t. Mouth tasted like watermelon when we kissed, and I had to keep reminding myself we didn’t get the watermelon drink. Potter girl - his ex - 16 year old drama - he had nothing to say, and I didn’t either. PSA: the “specifically in common is to protect against a hidden mechanism - that it has to have everything in common. STAP: test myself. buzzfeed: LIST. the roots. ways of - (tangled mess) (pic) (pic: “transference is hard”) (pic) (⇒) two ways of eating things/something: list:, ex: Last night I had the pleasure, the privilege, of watching myself sleep - I was dreaming that daddy was in the atrium with bathroom and guest room and he was saying/singing “huggatime, loveatime” and cradling his arms wearing plaid."},
{page:151,type:"dreams",lines:28,date:"Apr 6",text:"I think the rest of the dream was about me being sad that I couldn’t see Jonathan Heckerman, and looked at the days, and it was Sunday (it is Sunday), and told myself I had to wait till thursday (i do). I also was propelling myself into the hall (space was wider) with a rolling rocking chair - the one with the red cushion, and telling myself that I should use this time to get my homework done e.g. taxes but then no, that I wanted to be sad. That was in the hall, narrow hall, where it was dark, so I could think. Text on the table from Stye Ryze, but it would change to Steve when I was “ready to accept the love.” Ok new topic: mad about abstraction - angry, and then crazy. crazy: ex. (pic: true kind necessary ex. but then it changes, and you have to ⇒ (pic: fourth quarter) /get to accept that the three is incorrect - evolving metaphor critique - clarification, a while → a week. Concrete things → point to a brick, but it shouldn’t be a brick, it should be a metaphor for the whole - I think that’s what makes it “ART” (or - something else that I invented - a placeholder that has ART in it temporarily (pic: me, it, reaching for the moon to see it). The second thing I’ve always wanted to happen was [to put myself in a coma, and become a vegetable by living in my mind], and today I made that happen by:"},
{page:152,type:"abstract",lines:60,date:"Apr 6",text:": “adding space.” “you see, I was watching the patterns come and go - “a mechanism for finding it all” (said something - idk - a (pic_ clock, maybe. And I saw that said: “something that I needed to need/want, and the need and want were separated by space (pic) and I had to travel to get there. Then, next day (cause I just added time, though it was only a few moments later). I was trying to find a place to hide everything so I could find it later - ex. the kitchen cupboards, splayed out on the couch, the pink “drawers” upstairs, and I thought, no, you know what: I might “drive down the 405 to find a place.” So I thought, I’ll take a little adventure in my mind. Anyway, and the first one - I suppose I wanted (I guess I really wanted) to check if maybe well, what if J had actually texted me - because in this dream version he had not - I woke myself up. But I was still sleeping and so I got to see myself breathing while I was asleep. Another fake list: I realized twice that I should get better at OCD in two different ways. The first was in the car, I made a spectrum (pic: breathing). I slu(oo)shed myself into an old spot by changing the placement retroactively. (I was thinking of Vita, and driving past that spot - oh - I guess I realized that I always had ocd, and that it just got more severe - the frequency increased - the time between the space - well I don’t know what happened to it. Ah yes - “but at least I’m not breathing.” anyway, then this morning, in the bathroom, I thought/realized - I need my ocd to be bigger (on a train with - I just need to read a passage and then sit with it - memorize it, and trying to come back to it with diagrams, and by listing things - drawing things closer both literally, and metaphorically - by thinking about it in the mind. (neurons). Like taking a space ship to the moon just so you can poop when you get down :) (hot says J (lol :) :) :)). So, anyway, then, I was thinking, like - I could look at all the [diagrams] in my mind - the crystal scoop, see what I got - pick out each one and trying to find the perceived value (tangent: me trying to remember things was like: “eating yellow flowers” from that story about the wallpaper - my favorite (cause I ?got to? go crazy on purpose)). I think the progression went like this: what if I start looking at my diagrams - (uh oh - that’s when I got kicked out of Wes, and Wes sent ema to J’s peephole to ruin things for me) and then, part three, I found too many diagrams, and had to jump ship on the first mission (I also realized how scared I was - all the time - I can’t even act - but I am also smarter than everyone (obipps)(idk - jk). Which brings me to: fourth quarter, which brings me to: collecting things, which brings me to: (pic: hmm “yes I see that line there, but what about that sand smooch…”)"},
{page:153,type:"abstract",lines:25,date:"Apr 6",text:"sticking stuff to a [thought concept] (pic: the concept, the stuff stuck to it) And another example is temporary things that have to remain temporary which is why I can’t bring a bag of pre-mixed parfait. (as opposed to hanging by the ear. for example). Back to: why I like J over evan (pic: evan, decision making system, he gets what he wants) (pic: JDMS, it gets bent, maybe there is a little bit of periphlery, but not much. anyway, this is what I like. I like that he never gets it.) (pic: mommy, whisps) (pic: daddy, he doesn’t even know he wants it till it comes out) (pic: me (DMS), racing around - trying not to get it. Oh, I guess this is nice. and then somehow it just falls into my like a golden snitch - pocket (MM).) (pic: maddie - thinks she shouldn’t be allowed to have what she wants. She sometimes gets it, and sometimes doesn’t., goes back ‘in on itself’)\n\n~ TIME/SPACE ~\nAlley thought - My ocd is so I only make decisions coming from certain places (UA: ppl make decisions from certain places). An ex (missing) other things from the lesbo convention: buzzfeed list: x people misinterpreted my question - the music was too loud - red/green flags (missing)"},
{page:154,type:"day",lines:7,date:"Apr 7",text:"April 7\nAt kenneth Hahn with Maddie. It is a nice day! We were gossiping about Lindsay and emma and now it is a beautiful circle of everyone talking shit about everyone’s music - maddie more ettiquete-related. Apparently there were four ducks that left while I was taking the wrong exit. maddie is in their car getting wine"},

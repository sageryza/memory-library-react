{page:197,type:"ideas",lines:27,date:"May 14",text:"May 14\n(missing)\n\n(clay ideas)\n\nLATER\n(missing)\n(pic) I ended up making 3 castles - that’s a lot! Wow, that’s quick! (pic) I even developed a technique for doing so - roll out the clay, cut it approximate - forgot to measure - score it together, cut the turrets, cut the window - turret 2 across from tunnel 4. window (pic) narrow to “obfuscate”. Once I made one of each and had many different ideas for how to make them - edge case - individual bricks (pic) build it up. Put white clay between red clay\n\n(pic) four slabs (x4) could be pre-made of bricks? The way I made it, I scooped out the center - it was hard and time consuming, and got me frustrated - I guess - making a bunch of small things was the goal - assembly line style (pic) (I want to make these - brown clay, glazed white (rather than white clay with no glaze). Last night - carved out foam - covered with velvet, a perfect space for (pic: clay, wire, foam, with velvet on it…) Thought for J - games like “clue” are (narrow) - the dumpster thing - redesign - cause I believe in the characters. I believe in Colonel Mustard! Pretendland (with a real and imaginary mat). Mason mentioned Petite Ontology - the game at the picnic (pic: randall, scary bird looking boy), J, Nick and Sara, Saul, grounded, mormom, heavy earrings"},
{page:198,type:"abstract",lines:26,date:"May 14",text:"J said the dissertation could’ve been better to be thought about how our brain is segmented. And we got in n’ out after and Randall asked about my game and we talked about abstraction and how it’s dehumanizing and I told J taht I don’t know whether it was an interesting point, or just clouded with lots of words. I had to poop so bad during the presentation and kept shifting my weight so I could fart. J made a graph in my notebook of valence and how it affects when we hold hands (swoon). He bought some books to learn social skills and we took baths and last night we watched Little Hours and had sex through his underpants he said it was an ad for underpants and I was gonna show him kidnapping robert pattinson but the writing was too boring so I showed him Lady Valentem instead, which I wrote a day before I met him and he loved it - esp. the way th names are changed throughout the story, which is my fav part too. He changed the punctuation on the toilet so he can give one to his brother, to maddie and print it on his uncle’s printer (not sure why). Mommy loved my theory of mind thingy and we talked about it on the swing and I showed her how to read people, and she read most of it and then J called for me to"},
{page:199,type:"day",lines:55,date:"May 14",text:"come back lol. When I got back from Auntie Flo’s house, he called with Berry Pie and a new Episode of the Rehearsal and he had arranged for me to have the second closet in his room and had hung my baby blue shirt up so it looked all nice. (pic) we were eating hand rolls when I got my mri results and I called mommy and we went to see Santa Claus who J hated, and I liked (that he hated him) (Paul( He didn’t understand (communicate with me that well…I tried to talk to mommy about it, and ended up yelling at her, cause I felt like I couldn’t trust anyone. I feel better now cause Stanley Said it’s not my discs, but my sacrum, which I showed him where it hurt. That one day, J cured himself of autism. I broke up with him, and said “anytime I said I love you I meant I hate you, and explained it later as “if you don’t care about me to comfort me when I’m upset because the mri day, we went to my house, which was such a bit of a relief and J texted himself things he wants to copy from my house\n\nlike the rain forest sounds, and the coconuts (pic) the top floor of the fridge now J’s refrigerator looks like this too. Oh, and fridgerated/frozen food - cause I gave him the chana masala when he was hungry, and he was like: “oh! you can have food (we don’t have to order). Then the next day, he got a whole foods delivery. We cried a lot that night and made up “Le Crie par Jonaton” (pic) a little bottle of tears that he fills up with the last one in the commercial. I met Wesley Marlon Sonia at Oysterette the next day and then met J at the clay studio. He has a hard time with the other patrons- cause they’re so annoying. (pic) I had a bunch of band aids on my knee and ripped them off, and it hadn’t dried as much as I’d thought it would and there was sand all around the wound so I went with Wesley to the shower and he wanted to pee, but the bathrooms were closed and gross fat people were using the showers so I could wash off my cut so we sat by the not working drinking fountain and Wes asked if I could hold his hand while he peed (so he’d feel comfortable, and look into his eyes lol. He said I always stop being friends with people\n\nso he was flattered that I got breakfast with him the other day. Only Ashna, Sara, and Niha did I abandon. Went to Lindsay’s house with Maddie after old friends and Lindsay said M is a “fantastic” writer. I think it was a good thing to say, but I didn’t think exactly true. M read (upon my request) an entry of hating pottery, which they brought cause I said where we were pottery0 (we went to pasta sisters and got (missing)"},
{page:200,type:"day",lines:31,date:"May 15",text:"May 15\n(missing: questions for JJ that I wrote at Sweet Lady Jane after m and d came and met me and I got a small glass of milk and I asked for a large one but it was \\$5. so I paid and then said “oh but…can I have just a little bit of milk” and i had given a 50 cent tip, so she said “oh, alright” so I got to dip my cookie in for a sip, and m and d were passing by on the way back from taking my packages and they came and sat down with me and we talked about the hot tub and d told m to try to turn the heater on but it didn’t work. i told a bunch of people that story and they all liked it to some extent, it reminds me of accidentally getting the wine pinot for free and the girl touching my arm and mason kept asking me questions and that night i dreamt that we went to hot dog hell together, probably cause we were both in hell there. anyway, I got a chocolate cherry cookie, and then today (may 18), I made it to sweet lady jane just in time despite the walk saying 21 mins but it was 6:45, and I want that to be a helpful metaphor. I made up some stretches today and all the ones I thought of were right and she said I have an intuitive sense of my body, and I told J that, like simplicity concept, I’m learning to brag, but actually just from the ground up. I do miss him, but idk, maybe i’m less tense - either way, good to have some time apart, and maybe only sleep over every other day and lead up to living together again but maybe I can keep my key…pottery studio)"},
{page:201,type:"ideas",lines:15,date:"May 16",text:"May 16\nHad so many dreams last night. Last night I tried thinking of things I could make out of clay before I went to bed. And then, while I was sleeping - I came up with another…I was looking at a deck of cards on that shelf in the hall - the one that lives there - concept. I borrowed one aspect and told J about it later - an outline - just the basic outline - revolutionary, cause not using the properties at all - just a flat surface, with nice rounded corners. Drew from pictures onto polaroids - there was an autopro of simplifying the outline and then coloring it in just like areas. taking the “mode” of the space and filling the whole thing. I told J - turning my hand into a fist, and then"},
{page:202,type:"abstract",lines:19,date:"May 16",text:"showing him around the area about the example, and then how I’d extrapolated. He got stuck on mode - said he does that all the time - “to make three. And two mean one thing, and the third means another, I guess (tangent) before, sleep, I wanted to make the bandaids, and put them in a “large size egg” and keep it at the front of my house and pick one every morning - the brilliant part was to maintain the black outline by painting (black) between the bandaids (I gave up on representing the curvature) (tangent) I think I clarified from suggesting I make a bunch, to realizing I could only make one (3) (only = D envelope) The last thing I wanted to tell J - the hand that would’ve wrapped around the hand that would’ve wrapped around was the idea of prescribing an autopro, so, though it takes a long time, the art piece is “free,” in that it only uses none of the soul."},
{page:203,type:"day",lines:31,date:"May 18",text:"May 18\nWoman said she liked my pwc “shirt” (sweatshirt)(missing) woke up thinking about “an art store” - autopro - clay things - ex. (pic: red and white) - different ways to make it but the conclusion, at the end of the project, I’m going to realize that it’s just any movement - that produces something that “looks” platonic” - in that, the style and colors seem to mandate each other. Clay heads to put in mint green celadon cigarette cases with cellophane circles in the front - the “friends” /anyway, and sort of dazedly (would be) holding hands. With an ugly headstone bad design aesthetic (pic: collecting friends collecting friends) (upside down) black circle, magenta letters, white tiny outline…\n\n(pic: little stars of white) looking at open houses I couldn’t go into (pic: here you go mister/miss)\n(pic: cellophane window that turns, idk why) (pic: gold sticker(?) that has: the pattern you’re collecting in (maybe red outline/”fringe”, and purple (?) pocket\n(2 book pages I designed) (on my walk)\nsomewhat interactive art store - also - someone manning the counter where the autopros are displayed and you can take one out and play with it (clay and wood ?), and then put it back (and it goes in a “cookie-phane” bag (i’ve had this idea before, but now…(clay diagrams)\n(pic: hmm, I think I’ll take this one.”)\nthey can just be displayed like that, and (have more behind them)\npatterns I’ve collected, and memories I’ve had throughout the day…(AI covers(?)…) (easy)"},
{page:204,type:"abstract",lines:10,date:"May 18",text:"once I design all the clay autopros TM\nLast thing: the golden thread of intention, that runs through [everything] (always have these golden bubbles above while you’re interacting with people) (pic: something else, doesn’t understand, it hurts, my PT, me)\n(pic: maybe about seven things - fabric sublimented onto foam = foam, cut out, and shreeked into the crevices…(altoid dimensions, but wood, maybe unfinished)\nSome personal history cause I’m a person. (missing: sad)"},
{page:205,type:"day",lines:36,date:"May 18",text:"He started saying how I was brilliant and cuddling me after I for once figured out the right way to be mad (missing) Anyway, then we had sex, and I cried, and we listened to rain forest sounds, including rain birds, and rain night birds” and we couldn’t go to the pottery studio today cause emma might’ve been there. He started fingering me and I was touching him (that might’ve actually been the best part - I put a little spit, and the way he was moving when I first started touching him.” I begged him to keep going when he stopped while he was finally fucking me and it made him cum so then he fingered me after. And he said he wanted to be in a relationship. Not me walking down montana thinking I have a hot boyfriend who wants to date me after fighting all day (not me, but maybe me). Cause I needed a break too. (missing)\n\n(missing) And even though I may eat something else for dinner, what I will mainly eat is the raspberry bar, or everything will taste like it, or everything will have the texture of it. Was wondering what a non-sweet rasp/strawberry would taste like (like I wonder about shortbread and pie crust sin sugar.\nINTERMISSION (made up) exercises, burrito\n\n(pic: locket) get to know: someone else’s mother in law\n(pic: pre-used wishes) yes, these eyelashes have already been wished on, but they are still pretty good :)\n(pic: same with these dandelions)\n(pic: MATCH the guy with the gator, and Fred Armissen being mad that she didn’t understand the difference between a suggestion and an example. “Probably got to jail, probably not.” j says she meant maybe, but I think he thinks it’s 6-% chance for both - meet in the middle (key to marriage success)"},
{page:206,type:"ideas",lines:31,date:"June",text:"TYPED OUT FROM ONE OF THE OFF WHITE NOTEBOOKS - MAYBE AT IHOP?\nHad this kind of like idea for a kit. (picture)\n(picture) could have hoonie new one's inside of it.\nAnd then it could have a black like clay thing in it. But it must be dripping black. And it should probably just have like a doll head with long ringlets so the body would be the black thing - and just painted black… (picture)\n__________\nOk I had another/some other ideas last night in bed I think - make like a clay ring (picture) and then attach a curtain to it with a thread or wire - wire rings. (picture)\nimprovise sewing\n“? sort of things onto it\n\nand you could also make the heads for collecting friends if they are hard - make them out of…can robinson make plastic parts or find someone that does\n\n“the most direct method for representing a concept is through metaphor, in which each part of the concept is manifested by the thing. You could also have it be such that the thing you make “is a metaphor” for what you’re thinking of/is a cognitive vehicle in that it gets you somewhere - uses the same neurons in your brain even if the data is different and it’s a version that you can’t plug data into. because (?) the concept is a structure (that you can plug data into) and then you make a version of it that is (strictly a metaphor and - in that - it gets you to the “same place” as the concept exists in.\nThis is (also) related to the “end of the line” theory - how things can be ended off etc."},
{page:207,type:"ideas",lines:12,date:"June",text:"(pic)\n sort of embedded, but randomly.\n The weird thing is a) it does not do anything - there’s no point to the flowers being 3D, and there’s no point to the cloth as it can’t work because the flowers are 3D so it’s in between 3D and 2D (and could NOT, for example, wrap around something)\n\n (pic)\n ok maybe you can weave through them (red thread) with thick blacker ribbon (velvet) a) why is the black thread so much bigger b) why not just use the clay to make the whole box - and why use clay not wire - something wirier,”\n because it just seems kind of weird -"},
{page:208,type:"ideas",lines:22,date:"June",text:"something kind of silicony - like skin…ok…MAYBE A TRAY w/ (like a tea tray but instead, there are body parts on it (so, still part of the tray) and there is no distinction between the tray (the holder) and what’s on it (the holder)\n(pic)\nAlso, like, why would make a tray out of skin? it’s not rigid (So, a poor choice). And it’s hiny, not elegant. it literally maybe flops when you pick it up. So there must be another reason it was used - like one that was intrinsic to the meaning.\nIn the places that don’t make sense, that’s when you can see that the thing is intentionally made - was made intentionally - esp. if it’s clear how much work it took to get the inappropriate material to bend to the will of what it is eventually supposed to be.\n\nOk let’s try another one. A series of pea jars…indicating that there is more or less - gradual increments (3 or 5 or 7). Well, this is not something important to indicate or hard to understand so there must be another reason why so much effort was put into making this elaborate diagram."},
{page:209,type:"abstract",lines:15,date:"June",text:"A plate is a container that has an implicit structure - something can be assumed about the contents - that they would go together to make a “good meal”\n\n — so anything you put on this plate will have that assumption made about it. And then you could take any kind of container and use it to imagine that type of relationship or connection between the things on the plate and each other.\n\n (pic)\n\n (pic)\n\n The metaphor machine implies a connection which is that all the things in it come together to project the interior/center into the realm of imagination and there are two kinds  - one where they have something in common, and one where they’re all the pieces needed (the difference between kits and sets)."},
{page:210,type:"ideas",lines:16,date:"June",text:"Step One (1)\n (pic)\n people playing with the sugar packets when they are bored waiting for their food\n\n (pic)\n Now the sugar packets are made out of clay (and so is the dish, as it was before) (MAKE THIS)\n\n(pic)\n(2) The sugar packets is converted into just this game. One part/purpose is extracted at the detriment of the other one's so it can only be used for this secondary purpose which is kind of funny. Because IDK and now they’re no longer gonna be in restaurants which is the only reason they existed. It’s an example of a certain kind of logic - very direct that (doesn’t) take into account, to an almost/maybe hilarious extent - the reason for something existing n the first place. Or - it is just a weird kind of logic."},
{page:211,type:"ideas",lines:25,date:"June",text:"So anyway, back to the peas:\n\n (pic)\n\n (picture) x3 (or 5 or 7)\n\nWe have the graduated jars (in increments) and they demonstrate “something elaborate for something small” - then you can start thinking of examples of that - for example, can you think of any examples of that where someone made a whole elaborate demo for something small\n\n (pic)\n\n What I can remember is Ilene telling us that we were learning 5th grade math\n\nWell. Anyway. So, then you see: the things in the Set. And you put them together into the Metaphor Machine and you try to imagine what they might have in common. But unlike the game you played at the beginning, there is no answer, and we are imagining it just to imagine it - that is the point. Enjoy imagining it. Try to find the answer. Think about the things, and what the attributes of each are, and what they might have in common. Then you can switch them out if there’s nothing they have in common. And if you start to see something on the periphery of your mind that they could/might have in common, you can put them in that “order,” with the things that do have those things in common in the front, and then by the time you get towards the end of the line"},
{page:212,type:"abstract",lines:12,date:"June",text:"you’ll see that you can put different things in their place (use the time while you are reordering these to quickly imagine which things from the pile could take their place - replace them really quick - 123 - 1 - try it -, and then 2 - try it, and then 3 - try it and then if you can’t think of anything to have in common between them try 4 and 5 and 6 if you can…\n\n(pic)\nwhat do these have in common?\nAs a child, my brother and I used to play this game with our drawer of pokemon action figures - find what’s in common\n\n (pic)\n\n What do all the pokemon action figures have in common?"},
{page:213,type:"abstract",lines:40,date:"June",text:"START BY HAVING THEM IMAGINE\nThe last cared - next introduce “the apparatus - “ a structure/would be furniture [that expresses the idea that there is a third perfect card.] Now that we have this apparatus, let’s use it for some other stuff, shall we?\n\n(It’s lopsided) and now you can imagine that they have something in common. Not what they have in common, but that they have something in common. Ah, that’s very nice. There’s something in the middle of the circle, and you can see it by looking at all the things around it in your mind, and imagining that they have something in common between them, and imagining what they have in common between them. Now, see if you can just look at this thing - what they have in common between them. See if you can just look at it without looking at the ? around it anymore.\n\nI thought of this either while I was falling asleep or when I woke up the first time - ice cubes - that’s how you can tell (do the contents imply the container?)\nThe preface to “referring to abstraction” was that (symbol) this is the new punctuation and (symbol)\n(pic)\nLike (soldiers) there are soldiers that say things are progressing forwards. The clock without the numbers - when you’re trying to fall asleep - “ok - none of that stuff means anything. 0) take the shape - remember how mommy chided me for not knowing how to read a clock (so I can’t read it) Next, you want to just put a blanket over it to muffle the sound (“it’s not that interesting (trying to turn my brain off so I can fall asleep.) Then you can take tweezers out and pull the things out from under the blanket and brush their fur off and pat them on the head; send them out to play.\nI used to think all the concepts/metaphors could be put in a box but now I think there would actually be a progression between them which connects them - a different kind of relationship."},
{page:214,type:"dreams",lines:11,date:"June",text:"I dreamt that Jonathan said he figured out that I was actually 8 years older than him with his “thelodian calculator” and I was like “checks out that it would be wrong.” I was like “Oh, you’re looking for someone who’s 22, even though I knew he was not. There was this girl who rolled her ankle and I had to carry her “just until one of the boys noticed “(just like snow white - cinderella?) and then I was like “yeah, I’m not even considering her partner as a potential romantic interest” and tried to decide if that meant I was a lesbian."},
{page:215,type:"abstract",lines:7,date:"June",text:"CONNECTING ACTIONS TO INTENTIONS\nPeople don’t think enough about what other people are thinking about. you have to imagine other people’s minds\n\n(DYSPHORIA) IMAGINING IMPOSSIBLE THINGS\n→ is good for you…it expands your mind. Feminism is bad because it’s not a belief system - it spans both ways - it’s pretending to be something it’s not.\n\n(missing)"},
{page:216,type:"day",lines:17,date:"Jun 18",text:"June 18th\nLater in the day at Peet’s Coffee after Sean got his phone and I have a peanut butter cookie Niha texted he got in an accident after Sean put my phone on do not disturb without telling me - (actions have consequences and never cares about anything).\n(()) → If you are comparing two things, and saying what they have in common, you could put them in a venn diagram\n…I have to figure out what I want to do (right now - do I get a chocolate chip cookie from whole foods - go home and work - walk - have dinner with my parents - analyze all the elements and see which one (?) I want and find something that gets all of them (in the past I’ve done this and the universe has given me something so weird to do that I never expected. Ol - this store is closing so decision made"},

{page:218,type:"ideas",lines:57,date:"Jun 19",text:"(out of clay)\n(I don’t really need to make this, it would just be funny)\nThe only thing that’s happened today had to do with the peanut butter cookie. Last night I spilled water (just before bed. And then this morning, I thought my peanut butter cookie was extra good - wetter. And then I realized it was literally wetter because I spilled water on it (haha).\n\nok so basically I could write down all the exercises - (?) things that I know need to be there. And then, I could fill in the explanations of why they are there (and these could be in the right order, too?)\nfilling containers with things\n“what’s the procedure - science telephone”\nset theory - a few stages, as it turns into sculptures/figures\nmaking up your own game\n(all the games I thought of (so these are in between) pokemon action figures (trying to figure out what things have in common - so far this has been done with hoonies - I could show them with hoonies, and they could do it with something else (ideally they do it with moment).\nOnce they have established the structure/procedure - comparing things, trying to see what they have in common, then they can apply it to anything\n\nThis was very confusing - I introduced myself as Sophie, (missing)\n\nnew thought:\nbecause the thing changes shape when it’s plugged into the first one, and moves down the conveyor belt - the new concept is only able to apply because it can now apply to the new thing - the thing has been changed…therefore it can apply to it (the blanket cannot be placed if it is not a clock, because the things are too upset to be dampened by the blanket. And the tweezers cannot pick them out until they have been muffled or else they are too upset to come out. (ok sorry, the first one i mean is that - the blanket cannot dampen them if they still have meaning (or something). (oh, and now of course it’s the simplicity complexity simplicity principle because the things are changed (so that) they can be dampened, and then, once they are dampened, then they are able to be picked out with tweezers. It’s almost as if they could have been picked out before but they weren’t in fit shape to be picked out (namely that it would have made me too anxious to put a blanket over things that I could see specifically - I’ll be honest, I don’t completely get the example and don’t really want to think about it but …\nCLEANING UP YOUR MIND\nIt is very important for people to have their stuff in the proper place. it can be upsetting if things are out of place. it is nice to have everything neat and organized - for everything to have a place, and for everything to be in its place.\nWhat does it feel like when things are messy - when we have stuff out and about"},
{page:219,type:"abstract",lines:153,date:"Jun 19",text:"PROACTIVE AND RETROACTIVE PATTERN MANIPULATION\nThe ambiguous event - this is the centerpiece (- the cornerstone - the kernel - But I don’t quite understand what that means. Because I haven’t got into the meat and the juicy part of it yet.\nThere is this fantasy that the english language conforms directly to logic - that it would be mapped out onto a conceptual (language)? Almost like math…and translated directly. Formal writing - science writing - academic writing - we use “proper” spelling and grammar so that it can be understood perfectly.\nPRIMING AND COGNITIVE VEHICLES\nHowever, our mind does not work exactly logically like this - at least not linearly\n- \\> the lead in - the drawer pull\nI find myself correcting myself a lot when writing “oh no, that is not the correct way to say it” But perhaps the way it comes out in my mind is the right way.\n2) there is this thing where you, for example - introduce a subject you don’t really need nay punctuation. It is not a sentence. in fact, it is an invitation for the person you are talking to to remember or imagine - conjure this thing you are about to talk about - into their mind. And we forget, often that when we are talking to someone - what we are trying to do is create what it is that we have in our mind, and create it - transfer it - into their mind. This means english - the logic of sentences - is not always the best format because it does not follow the logic of our mind - the logic, I think - that all minds think in…we need to imagine the thing first before we can do anything with it. But some sentences, in order to conform correctly to the policies of the english language - the “mind” version of them - needs to be mapped - so that by the end of the sentence, you have to go back and imagine the thing that you were starting to think about originally. this takes time, and is much less effortful than if you had followed the “train” of through. See some of the examples above - in which the object (mind version) needs to be “re-added” to the middle of the sentence - because that’s the time that there would be something to be done with it.\n(thought about: shrodinger’s cat…actually he was wrong all the times i think (or did i say pandoras box…i don't think so) anyway, he was wrong a lot - about power, about etc. and then thinking about the diary thing and how that would actually be interesting for a story - also there was one other thing - oh - the gaslighting, and how i told him about nick and josh and that guy who didn’t want to fuck me and he said “he wasn’t entitled to my body” and then said his therapist had told him he’d been gaslighting me and that he still wanted to fuck me even if i didn’t want to anyway…somehow that led me to the thought/idea that if you were to read a story with all the information already organized so that instead of going linearly, it would be organized in the way that things that go together go together, and…like, the idea that, if you read a book, you read it linearly, and by the end you reorganize all the information a bunch of times. The fun part I guess, are the twists and turns of reorganizing stuff but instead, what if you had it all already organized and then you could just see exactly what it looked like at the end. Like in the sophie kinsella “can you keep a secret” book, you would be given all the information up front. then it would just exist for you.\nAnd then I was thinking, also, about making the little card thingies with all the little pieces of your day, like the salad thing - a thing that was significant - that stood out to you - apart from all the other things that happened to you during the day\nif you just had all your days, and like 8-12 things that happened to you on any one particular day (maybe 5 if you’re being realistic) - and then you could just go back and look at all your days that you had.\nI’m not sure how it relates to the other thing\nanyway, here’s the last piece I didn’t type yet: (enjoy 🙂\nRetroactive Pattern Manipulation\nPerhaps you are in a situation in which you change the understanding of the situation retroactively. A person thinks something about you because of something you’ve done, Then, (hypothetically) you would change the understanding of this action - the kernel of meaning at the center of this action I wont get into how (yet), but suppose that you could. By tricking the person into thinking that you had a different reason for performing (?) the action originally (or in the 1st place). Specifically, by picking out another kernel of meaning in the action, then the one originally interpreted - an alternate interpretation - in layman’s terms, without all this technical mambo jumbo.\nNow that we have understood what Retroactive Pattern manipulation is (we have not, I know - but you know enough to know it exists) Let us discuss Proactive Pattern Manipulation. Knowing that you plan to perform RPM later and intentionally adding in a second, additional interpretation of the event when it is first performed. Not retroactively. that you intend to call upon “when the time is right.” What I mean is intentionally “setting up” an ambiguous event (an event with multiple interpretations).\nAnd now we can learn what an ambiguous event is. An AE is an action, which has two interpretations (or more). - so that when we try to interpret it there are two possible interpretations.\n(picture)\nAnd so - the first one, for example, si the one called upon at the original performing of the action. And later, in retrospect, we call upon the second interpretation of the event.\nHow do we call upon the second interpretation?\nWith context of course. One of my favorite ways to do this (though I have never done it intentionally), is to make the event (the action that was performed) part of a pattern of additional actions. Which have the second interpretation. If performed by the same person, it will become clear that this action also follows the intentions of the other actions. there may be other ways to do this. but I don’t know any of them.\nIt has become a tradition or routine to “tidy up” whenever we get home from somewhere, or perhaps at the end of the day, when we are just going out.\nWhat if we have to put things in our mind back “where we found them,” so that things aren’t so messy in there always. to be honest, some people have very messy minds. ANd I am judging them for that to make up for them judging me about having a very messy room. to make up for that, and to make myself feel better.\nTrying to stay here while you imagine the outskirts\nStay here while you imagine what’s on the outskirts.\nPERIPHERY YOU ARE HERE PERIPHERY\ndecision tree\nCONSIDER ALL THE OPTIONS AT THE FORK, but then, choose one, and ignore/forget all the other options for the time being/till the next decision tree/opportunity to make a decision. In the meantime, “apply a program” - a preset program - that includes a lot of pre…(cesion and patience?)\ntying your shoes is one, brushing your teeth…idk, now I’m gonna tie my shoes: commence/initialize “shoe tying” program\nTRANSLATION → MUTATION\ninitialize shoe tying program\ncommence brushing teeth program\nDetailed Summary of \"Another June Journal\""},

{page:224,type:"ideas",lines:13,date:"Sep 6",text:"HAD THIS IDEA YESTERDAY (NOT TODAY) WHEN I WOKE UP: Eclectic pieces of wood, tied and wrapped together with the white string, and black things like birds or hats made with velvet to go in the nest\n\nand I remember that I wanted to start making things in multiples because I like designing assembly lines\nThinking about painting intricate designs on things once I get my underglazes (wonderglazes)\n→ could paint these, using erasers on similar size pieces of wood. And then hang them like you hang a sign from the ceiling\n\n curtain mechanism\n twine\n rounded\n\n ← print - linoprint\n ← arbitrary designs"},
{page:225,type:"ideas",lines:53,date:"Sep 7",text:"September 7th\n yesterday, when i was in the car, going to Zach’s house warming party, and Evan didn’t want to come, and it was kinda warm, and I was kinda tired - I had some ideas. 2 games about maps that my mind decided were not very good - one where you want to make the board change to look like the map you have. The other where you try to get lost - so you do things until you can’t do things anymore - like Evan said - zangzoo or something - and then you win. other idea: “open source ideas” (rename blog) - like - people might like my - “settlers of san fran” idea, about homeless people withs hopping carts (or just make the same game with different tiles/different resources) ANYWAY - SOMEONE else could make it. Cause I don’t want to or I don’t have time - one of those - Kasey, or Richard or someone who has nothing else to do. OPEN SOURCE IDEAS. new blog. Also let me re-imagine me taking Jennie’s idea and feel less guilty about it with the new mindset that like Indian’s share shoes on a plane, I don’t want to claim ownership over my ideas - i want them to be made. Makes it harder to make sense of that bitch Air BNB woman except maybe she’s not doing my idea right. Or maybe I want to do that idea. Anyway: I would need to explain the ideas as best as I could, so I could make sure people would do them right which explains the mismatched images I include, and the messiness of the presentation. Last idea: META GAMES - ppl need to learn what pattern collecting is, AND set theory, and people as paradoxes before they can play any of the other games - other games ex. collecting specific patterns. Because, for example: last night: ex. I thought of another set - going out (includes receipts to look like cards) (diagram)\n → a torso w/ a belly button, and a boxy black tank top. No, but - things that were ironic. I told everyone to take off their shoes. Three people tried to physically “lock in” Niha.\n I think I might want to make hexagon bowls/plates with indents for the diamond etc. (?) with the right colors - mint and pink and chartreuse etc.\n Also, I want to make sanitation cloths (diagram) ← little napkins → white fabric, small, folded into squares. the size of a cocktail napkin but folded into 4ths.\n\n Other things i could call my blog that i was supposed to stop workin on today (i promised myself)\n 1. finishing things\n 2. ideation, iteration, ? end game (idk)\n 3. end game\n 4. open source ideas\n i solved a problem today - just by thinking about it -"},
{page:226,type:"ideas",lines:35,date:"Sep 7",text:"TRAIN OF THOUGHT - I could put ants\n felt bad about killing the ant that was on my face. “No one told this ant to be on my face” - I could put ants in sets of three like maddie and evan had at the party, instead of their squares. (picture) what’s the point? Then people could say: “What? Those are ants? Not decorations - it would cause confusion. Jonathan said - is what you find funny just making things worse? I said yeah, but it’s not - like to cause confusion. ◬ This could all be in the form of a receipt - look like a receipt paper-printed on receipt paper - except not - as a card…\n\n “He loves me not” necklace “oh…you know that game… (yeah, but why did you make the necklace - well, I’ve already answered your question - you’re being a little unreasonable now. I get the benefit of the doubt, cause they don’t know I’ve planned it.\n\n (pic)\n\n pretty pink\n painted different colors\n golden rod\n mint green\n little walls around the dish -\n\n the idea, that you keep certainly colored things in each area - gold fish for example whatever the other things I thought of was.\n iteration - not walls, instead, they’ll be pushed in by shapes, pattern blocks for example. I solved a problem by buying something - an aid, someone to do my projects for me, transparent fabric, pattern blocks - then: only slightly indented - different colors. If I could find a way to “?” mass-produce them - hexagon cookie cutter - roll em out\n to buy: hexagon cookie, cutter, but in right shape like so I can make: the glasses, and the scissors and the cyclops eye that I was thinking about at the club last night when I should’ve been dancing\n\n TRAIN OF THOUGHT"},

{page:231,type:"ideas",lines:20,date:"Sep 7",text:"SOLUTIONS TO PROBLEMS\n PROBLEM: WHY DID I BUY SO MANY (apparatus)\n SOLUTION - they’re disposable - display sets in them\n DIRECTIVE: make a bunch of different sets. (rather than making the same one a bunch of times. (I could also do that thought)\n get someone to play the game with me - Evan? Sean? Jonathan? Sandy? Maddie??? LINDSAY?\n\n SOLUTION: get china to make the envelopes. figure out a way to sell them. or don’t. Cotton/muslin - red thread. what closure? - put the coins in them? or make out of see-through fabric…?\n next stop: make the coins out of metal\n\n string\n the pastel colors of cotton I got from downtown\n muslin\n inside: color\n outside: muslin\n\n yes, yes: another idea: this one should be easy (not that easy). Step one: cup, or other similar thing. the tiles come outside of the tub - walls around …\n → (the length of the perimeter)\n wire chairs\n ← one piece of wire…open seat, or hung with muslin\n maybe an assortment of chairs - 12 (chairs)…"},
{page:232,type:"abstract",lines:14,date:"Sep 7",text:"diagram: instrumentalism\n \\|——————————→ - - - - - - - - - - - - →\n starting point. real goal. instrumental goal\n\n shoot for the moon. even if you miss, you’ll land among the stars\n ex. I want to get my projects done → i want to make the clay matchboxes → things that could go in a drawer in a dream → ooh - I could think of them (that would be fine)\n\n I keep thinking of these buttons\n\n -? I could make some greeting cards with the ant farm etc. (Instead of making the car set which is what I actually want to make)\n and then they get covered in different colors - the wall one, the bottom, and the other (pic) ← pool. But also: top down: ← unequal"},

{page:234,type:"day",lines:6,date:"Sep 7",text:"I deserve some gatorade\n give me one of the berry gatorades please. No actually the blue one.\n I’m just super thirsty for some reason\n no sinnin’ this week\n\n for some reason this reminds me of that moment i told them i’d been tested for tuberculosis and C said why didn’t you just tell them you weren’t"},
{page:235,type:"ideas",lines:21,date:"Sep 9",text:"September 9th\nThinking about an aesthetic set of blocks. I’d like to get them made on alibaba, but I may have to buy some wood and paint them myself. if there’s a 4x3x2” size maybe that would be good. This one could be based on the ratio of a cigarette - the goldenrod color. paint part white. paint the rest with pastels (mostly white)\n\n(pics n diagrams n stuff)\n\nThis boy (I would say “guy” but…) said “I’m having a tough time” like 7+ times - underration. It’s making it hard to focus and I keep not ending off things. I can’t so much hate him because I’m so glad he’s not my boyfriend and I don’t have to date him. This is like Thanksgiving for me.\nToT (train of thought)\nEcholalia: What does it have in common. I’m tired and I’m hungry and I feel like a tiny little bunny - “who would find that funny?” Chris would just repeat it. This guy (boy) had a therapist - 4 sessions - then - she kicked him out. That’s what happened to Chris. I wonder - they’re both really annoying and talk about themselves"},
{page:236,type:"day",lines:29,date:"Sep 9",text:"(still 9th)\nthis decaf coffee latte milky milky boy isn’t getting me very fucked up :o. Sean just annoyed the hell out of me on the phone. he read my diary and was angry about something he read in it. i don’t just not care - what’s the opposite of not caring? He’s leaving in a week and I DO NOT CARE. Actually insane that someone could be so wrong. Can’t wait till he realizes I was right like he will eventually, and like everyone does.\nDIRECTIVE:\nMAKING LUXURY ITEMS FOR MY NEW SHOPIFY STORE (you know - the one that i already had)\n1. GET the blocks (can be all the same size, which will make it easier (oh - perhaps…look on amazon) - paint them different colors - I can mix them with paint! (3.5x3x2.5”?) No: 2.5x?x?” ( think) They could come in one of those wooden cartons - white and mint green label on the top, surrounded by raw wood. - could be a sticker…anyway…other luxury items. Could make like 2-3 or 10, depending on the item, so that IF someone buys it, I actually have one. And I COULD call it “useless things” or “trinket”\njust looked. domain costs 4k or 6k. Well anyway - if I DID send out marketing emails (and wanted to stick with the marketing scheme I’m imagining right now - I could have a lavender or other ? - with white letters. sans serif, but not arial, and …designed who was not a fast worker and …but also feel bad that she’s sick."},
{page:237,type:"ideas",lines:18,date:"Sep 9",text:"oh, this morning: put into CHAT - ideas from diary for cards - make like 20 - 200, use some\n\nok: another idea for the blocks - (pic) blue - light blue, tartan all the way around (outfits)\nAs though they were clothing blocks, and they could be used for clothing, interchangeably\nOk, more block ideas: bruise blocks - ten blocks, and each is different/various ugly discolored bruises. None are the same. These don’t fit together in any particular way.\nDIRECTIVE: GET block holding size (aspect) cartons, design the labels (RESEARCH other minimalistic block boxes)\nOk: another block idea: but also maybe not good? - go ‘round town, looking for addresses, and the way they write their numbers…copy them to blocks, change the aspect ratio.\nBUY BLOCKS on aliexpress - maybe all the same shape/size - maybe get a deal on alibaba\n(pic of converse blocks)\n\n(pic)"},

{page:239,type:"ideas",lines:13,date:"Sep 10",text:"look up: clay houses (mini)\n\n (pic)\n\n he’d rather be in his cupboard with the letter…yesterday…but now.\n El Salvador…\n PREFACE (to Maddie) this is kind of a loaded question but can you answer it honestly, and if not…(then don’t answer it at all)\n → I don’t really like prefaces, so this would be better…\n\n peppermint, cinnamon, orange peels, coffee grounds to get the ants away (and the squirrels!)\n (pic)\n plate of peas, cause that’s how the plate looked, after he was done. ToT - I wanted to make ceramic peas - spheres painted green the paint will stick to the kiln!) (use acrylic) “I’ll just use real peas”\n\n (pic)"},
{page:240,type:"ideas",lines:30,date:"Sep 10",text:"DIRECTIVE: Buy a (cup) of mango - measure(?) - mimic the slices, but this time in clay, not in fabric…that would be nice. Very nice pieces - geometric shapes, all painted beautiful yellow. And tucked into maybe a glass jar - but not with a lid or handle…oh, I don’t know…maybe plastic…\n OPTION 2: (EASIER, NOW) - paint the jenga blocks with the colors I like - DIRECTIVE (EASY): MIX WHITE INTO ALL THE PRIMARIES - PAINT EACH SIDE…HONESTLY, THAT WOULD/MIGHT BE A NICE BRICK SET…\n ITERATION: The indented squares - paint squares, then they can go in - easy! does this exist? (Maybe glaze after (get wooden larger blocks, wooden rings, thin black wire → 20 guage)\n\n Ok now I kind of want to make a bunch of plates of peas - just the plate o o o o → make about 6-16 peas :) :) :) (← jumping for joy)and then (or already) make the plate (pic) ~ 3” - 3.25”(?)\n Or use real peas (how would that look?) paint the plates white, or not painted, just glazed. At most: use very light mint green, or white with a small green ring around the inside (1/4 inch space)\n\n Building blocks that are made out of trader joe’s snacks - easy! - measure the lady fingers (butter) (pic) stroop waffles - easy! get the color - paint lines - make a bunch! Find a box that kind of looks like it,…or don’t.\n not out of clay: out of wood - get discs - measure the size - I’ll guess 1.5” SW, jenga blocks - paint the color"},
{page:241,type:"ideas",lines:24,date:"Sep 10",text:"END RESULT (TO MOTIVATE): A BUNCH OF “TINY” SETS, AND EACH ONE CAN GO INDIVIDUALLY IN ONE OF THE WOODEN BOXES (as the: Playing with automatic process piece) - plastic box\n PROCEDURE: SHAKE THE PAINT 2. MIX THE COLOR…get the Trader Joes bag - NOW MAKE TWO COLORS FROM THE BROWN - ONE CREAMY GOLD HONEY, THE OTHER: NICE, NOT ROTTING BROWN\n (pic) ← ok not gonna work.\n (I NEED MORE IDEAS. I’M NOT SURE WHAT TO DO, SO, NEED MORE IDEAS!)\n AUTOMATIC PROCESS STEP ONE: CIRCLE OF WIRE.\n LONGER (3x) Piece of wire - wrap it so there are spikes!\n\n ← Trader Joes: (pic) cylinders that I can buy from aliexpress\n ← make the label - a nice label - design it on ai, print it to stick (?)\n ← purple (wine)\n\n ← ideally, would have a piece like this, and then, a longer, thinner piece for the neck (then it would look “enough” like a wine bottle)\n OVULATING IS: I THINK OF ONE IDEA PER SECOND THAT I AM OVULATING :)\n castle - pastel - ? - very light mint green main face - crowny things - light yellow\n somehow the windows can be both blue and pink - ok wait duh - the side of the indent - violet, the indent - pink - (or else it won’t go all the way in…?)"},
{page:242,type:"ideas",lines:22,date:"Sep 10",text:"DID YOU KNOW, ORIGINALLY THE BOARD GAME “PRETENDLAND” WAS ABOUT ASSIGNING ACTIONS\n ← many silver instruments on shelves (both mini and life size)\n cloth with pretendland written on it\n (imagination)\n (and this could take place in a real room.\n But anyway - people have to guess what you were doing - what you meant by your actions\n\n OTHER IDEAS (ABRV)\n → instead of painting on the () - I could design a stamp ← sort of ambiguous black marks - maybe try to make something, and: let it fail(?) - The Rubber Stamp to Jenga Block Pipeline :)?design - carved\n stamp it on! → jenga block\n TO DO: Try the James P notecards - new ones, in the (chest)\n\n (sugar packet, puffed)\n TOP DOWN\n a map that continues onto the SP so it’s a game - a puzzle with one piece\n\n THIS IS THE IDEA THAT GOT ME OUT OF BED:\n lavender pink? - red, muslin, paint\n trace the shape with 2 round things. Then cut as if I”m going to hem it - but I’m not\n spent the morning planning what I’m gonna say to Tong Tong\n white pastel, x?, white\n cut from long pole - right size - use Js cutter?"},

{page:244,type:"ideas",lines:10,date:"Sep 10",text:"ok: POOLS: ← idk weird pool shapes and\n the ugly weird blue that pools have :( :) :)\n THE TOP PROJECT CAUSE I CAN DO IT RIGHT NOW\n (and that’s only like 10 steps and it’s so easy, and you can do it RIGHT NOW!\n →! → the square slide top boxes\n x idk\n anyway: cigarettes → golden rod\n pastels → all, white EASY :), color\n connected, pink, orange + orange, pink, this is how it feels when you don’t text me back\n push the button (can’t push both buttons at once :( :)!\n comes in a box"},
{page:245,type:"day",lines:119,date:"Sep 11",text:"September 11th\n Hilarious: I got up early to run in the morning not because I went to bed early but because I went to bed late. It’s now like 5 - suns just coming up. I don’t miss El Salvador - well, I’d like to go back by myself. That’d stick it to them :) went to wingspan night at Maddie’s and Evan’s house. Kinda traumatic - talking to Maddie after. Evan made a mistake at his job, which he told us all in a big circle at the pizza place waiting for two large black flat boxes that me and Maddie carried back - one each. Afterwards I kissed Maddie for a long time on the mouth, and it was kinda nice - like really nice but I also don’t think I wanted it to go on really longer, or go any further. I feel it’s kind of hard to become really good friends and maybe that’s by design (she doesn’t want to - wants to stay just lovers) or IDK - maybe it’s the thing - like with evan - you just cannot really hang out with them for that long - they’re always on, so it’s tiring. That actually makes sense. It could be nice to not always be on - for them (and for me) I would like to get to know evan in the way that his bed does. Anyway, I had a thousand ideas yesterday, and the day before, and the day before that maybe even.\n I told Maddie it was cause I was ovulating but I don’t know that I am. Specifically, in my bed - the pastel wall clock on muslin, with frayed edges (?)- to transpose on the doughnut which is always a circle and clock. I think it’s actually fine, probably, with Mad J, but now I guess I’m anxiously attached to both of them - that never happened with Sean or Chris - cause I was never afraid of losing them…Except maybe at the very beginning. Feel like Sarah - trying to be a big girl, and be ok when Evan didn’t talk to her when she came over - if we don’t set another time, then I don’t know if we’re ever hanging out again. And maybe that’s also by design (eyes welling w/ tears) Thought I’d tell M and J that I cried El. but it feels fake coming out. Cause I didn’t care. I almost cried yesterday in the car, and I think it’s just cause I was tired. Haven’t even been to that therapist yet, and already I’m saving all my bad thoughts. Waiting for her to help me with them (doubtful tbh) Feel whispy when I talk to Jonathan cause he doesn’t care or want to hear anything I have to say. The reason I write things in my diary - are you don’t with this? (my ice cream) (yeah) (ok - I’m gonna throw it away. I probably wouldn’t have eaten, even, the amount that I did, if it weren’t dripping, sticky, on my fingers. 2. Things that will make me look like an idiot (to other people) Don’t want to hang out with Sean. Don’t want to hang out with Jonathan. I would want to hang out with Maddie if she wanted to but IDK if it comes naturally. Very empathetic, but I’m also a ? so I know how to be empathetic to myself.\n My eyes are up here hat. With a fake eye made of sardine wood (witch money, which, as it turns out, is the same as normal money. They don’t say business money). Little pills, sweet little pills - didn’t actually quite finish up the pill idea, for how to make the pills in the pill pack - how to do it . Don’t think I’ll be able to relax till these policemen are finally gone. Funny thing is - first saw the left side of them and saw they had yellow tazers “oh, alright - they don’t have guns” - I should’ve stopped looking at them. maybe I’ll go to Florida by myself - have the stupid vacation that I very much want all by myself - just want a shitty resort by the beach and drink pina coladas, and write in my diary and think my nice, impressive thoughts about myself the whole time, somehow. Think about “ooh, now, that was a very good idea, with the pills,” and write a little book even, about why it’s a good idea, and what to do with the pills. Or else I could get lonely and hate myself. Maybe someone like Maddie who I feel more comfortable with - a friend - not Jae - makes me anxious. Oh, honestly - Zach and Niha would be fine.\n The tar pits - a threat. The glove made of the fabric vs. muslin, compared the nathan saying…but oh no, it’s me imagining it in my head cause I’m a genius (beat my chest, smile sadly - they can’t understand)\n Step one: paint it yellow in the middle. Step 2: cut a line through the center. Step three: have entirely new thoughts. Don’t think of anything you were thinking of before. I wish Sean was not crazy. I wish we could hang out and just be friends.\n Thank god I finally want to eat my egg frittata - it’s finally time. The replacement of food for sleep is a bit worrisome - a bit tiresome. Lindsay would be funny I think. “Dude! What the hell is wrong with these people?” (looking at a guy with a bandage on his nose). (I think he just got a nose surgery: No, really) Excited/nervous for my therapy appointment. And that is something I’m allowed to be excited/nervous about since it’s the first one. Maybe I should pretend more people can read my thoughts (right now only some of them can). Zach put my zynn in his mouth - it came to that. Zach kept trying to find out if I was into Ty I think - reasonable. (lol, he asked me who’s my favorite between him, Tay and Teddy. I said I can’t choose between my children - then Markis - he’s black. IDK, this is all nonsense - I should be talking about Jonathan’s cousin James, and what I hate about him. Anything else is just nonsense 🙄\n Gun guys are gone. New ones came, and now they’re gone too. Might start my memory library project again, in the context of the larger book with the multiple projects. Worried Tong tong won’t believe me about anything."},
{page:246,type:"ideas",lines:43,date:"Sep 11",text:"lime green/light blue\n ← thought of this in the car. Almost forgot about it.\n ← pastels\n the shape of tic tacs, larger (sweet little pills)\n ← the cyclops glasses\n pink, yellow, mint green (like a stop light)\n go home and sleep. go get salad/avocado from whole foods get coffee, maybe a croissant. Feel weird and disgusting. Wish it felt weirder to be cold after 3 days of feeling so hot I could not think.\n I do not want to go home cause it will feel like failure.\n Had an evil thought just now when a (chocolate chip) fell out of my pack and I saw a dog on the floor. (I think you can guess what it is). I guess my journal is just me sort of entertaining myself, and writing things that I think are funny. Would I be happier if Ii got the things that I want? Maybe not - a question that’s typically asked - for example, right now, I can’t even tell you what I want. I don’t like when people text me. I would want to have a pack of pills\n\n (pic)\n could get from the house: the pinking sheers\n (whatever that means)\n Could think more about games. Could plan to give Jonathan my finished game book when he never texts me back. - (Just deliver it to his door) I could delete the songs that that girl gave me in my liked songs but i like skipping them every time and thinking: I do not like these songs. I don’t like them cause she gave them to me, because I picked them. I don’t have the same music taste as her. And maybe mine is better. I’d write about Teddy getting hit in the head when we were at 711, but it seems too obvious. (pic) ← “yeah, see: everything’s fine” (I LOVE this song - Quedate Luna. I can’t think of another one I like better right now. Depending on the VIEW that I use - I could take just the one song that I like…oh - I might catch a flight using the thought that I’m gonna go home and make those cigarettes (”they’re so easy to make”)\n\n (pic) have to make the paper flat so it can fit around the cheesestick.\n yellow thing is a butter dish\n x more ← biscuit ← newsflash! they’re all the same thing :)"},
{page:247,type:"abstract",lines:64,date:"Sep 11",text:"The weird thing is I can’t think of everything right now, but I can think of some things - thoughts that are so obvious that they’re kind of interesting.\n I thought Jonathan liked me. It’s very confusing that he’s not (and never will?) text me back. Gotta wait till I think of something that I actually think is there (which means most of the time I’m lying to myself) If I wanted pancakes, then I could have something that I want.\n Primo Passo\n Maddie doesn’t think you should talk shit about people. It makes them feel worse. I kind of like the idea of talking shit about Niha and how much she likes kid laroi\n I don’t want people to confuse me for themselves.\n\n god is playing a mean trick on me. This lady walked in with a “cute” baby in a carriage - it’s not cute - there’s a growth on its forehead reminiscent of that girl I once saw at bright child (in my reaction). First she parked her exactly in my line of sight. Then she sat next to me. Then the barista told her: “no move it closer - it’s blocking the path” - now I can see it in my peripheral vision I hate kids.\n MEAN TRICK: Jonathan FORGOT when we agreed on a way to make me not anxious. I broke up with him and thought about him everyday. What kind of a trick is that…? Maddie gave me a guitar strap yesterday. I really like it. And they put a nice fish on it that says “not like ther guys” I hope it makes Evan jealous - I told him about it. This guy at the table next to me finished his matcha and then he had another one - was it also for him? (My sense of humor that Brittany and daddy share (and to some extent: Sean and Charlie and Jake is causing a weird confusing mental state in the other person. Referring to Mind. Maybe I’d feel better - more powerful, less whispy, if I didn’t feel like a time lapse of the dream version of trying to go somewhere and not being able to move - kicking my feet on gravel. I hate this baby - they’re playing finger games - (?) giving her her fingers. Now she’s coughing, screaming it’s cause I was mean to her in my dairy. Yesterday I was thinking about Ron and how he got an ice cream truck and gave out ice cream to people that sounds like fun. Like me, but as a pedophile. Maybe I should “send” Jonathan my “baby gets a boost by being bad” book that I actually made all/almost all of the pictures for using AI (oh yes, another project that I basically finished) → could finish that or the PWC book or the SQ cards or the (?) that how they know what (?) are missing. Or I could not. I could be tired and kind of sad and lonely at this coffee shop. maybe I need to get a job like Maddie. Maybe Maddie should work for me. Doing the magical ritual cards - another thing that could be finished. Maybe I should put everything in my Etsy Store - the coloring books. the queen deck, the pastel clock the “cigarette” and the “white noise” etc. building sets\n memory library - /the memories that “help me” the one I always remind myself of: “the tricky bit of (?)tape” the knot that came off my fingers too easily\n ANYWAY -"},
{page:248,type:"ideas",lines:40,date:"Sep 11",text:"put Jonathan’s game in the shop lol - that would be funny. With the packaging I already made - also the Chromatids one - maybe just have 2 versions with squares and one with triangles. The James Perse notecards. The heart box (order NOW - don’t wait for February :)) - and get the little hoonies to go in it - who is going to do all this? lol I don’t know if I can do all these things. I need to do like SPEED or something. Not sit in coffee shops feeling tired (but that’s kind of nice too). I could divide it by how easy I had they would be to finish. I could set myself deadlines like in school, and take the worst finished version. The shirt(s) I made for Sean - hats (duh) bean beliefs - (?) - easy - made one…ask on IG if anyone wants to critique my things - I’ll send them you can keep it or send it back THE LITTLE NOTEBOOKS - look like passports. XI (duh)\n\n do an outline “just a picture” of each thing X → ✓ → do the worst version, and use that as a spring board. Then go back and fix all of them\n THE POCKET - of course :)\n pieces of things → the pool, the shoe with the sock etc. The glasses with eyes in them - the hood with the head in it? (Where I end and you begin)\n\n “AUTOMATIC PROCESS\n (pic)\n ”complex elements” - that’s one of the components, and you get several of them, or maybe multiple kinds that go together and in general: wire structures - that have fabric, or screen holding them up\n The houses I was making - (out of clay I guess) cut them out, paint them. Make like IG? - find a good box for them. (Luxury box for the gilded edge cards. I like to make the sample or prototype…but once it’s been figured out, and I can easily imagine where it will go next…it’s just not that fun(?) feels like rote work(?) I could do it or someone else could do it. or a computer could do it.\n\n (pic) ← lavender\n ← lavender (all the colors\n ← white\n ← velvet\n ← wire\n could be any size(?)"},
{page:249,type:"todos",lines:51,date:"Sep 11",text:"Go Get Em Tiger\n My new plan (and this is totally useless, remember) is to make a Big Giant Plan. So: a list of all the items that need to be made, and then listed, and then an exact (vary in detail) procedure of how to make it.\n 1. POCKET\n (pic)\n 1. Baby Gets a Boost etc.\n 1. look up the script (try drive, daddy’s )\n 2. arrange in .indd doc\n 3. review feb 2nd MJ - place images, or make new ones ug)\n 2. Pattern Collector\n a video of putting on tefillin\n 1. demo picking the pattern - walking around - placing a tic tac in when you find…then go over how each PC can be placed appropriately on your body depending on importance (god/coincidence etc. goes on forehead…)\n So: step 1: get matchboxes. 2. get tic tacs\n 2. Take some pics (on wood table)\n 3. House Blocks\n (done, actually) research (?) on AE (buy)\n 4. also: spires step one: research what exception pieces there are - in lego and others. Try to make them out of wood - they (…?)\n 5. Memory Library\n figure out what size cards fit box (? or ?) make it look like library cards (courier?))?\n type out memories\n 6. Hoonies (mini cards ~ 2x2”)\n print them out. Make sure there’s no duplicates and they’re all suitable - print out another deck + a suitable box cover:\n 7. Block Sets - go to Fisher Lumber on Pico. Get them to cut, or cut at Jonathan’s an appropriate size pole/2x4” into a bunch of blocks (do I/can I pay per cut?)\n 8. Color Wheel Clock\n measure a large circle with a bowl or something. Measure the middle with a cup or something. Cut out the middle. Mix the colors. trace the (smallest?) square cookie cutter ~ 2x2” or 1.5x1.5” (per color) let it roll. PAINT IT ON. Purple or red or pink at the top. remember to mix extras of the primary and secondaries so you can mix them together for the tertiarys :)\n 9. New Idea 🤦‍♀️\n dewey decimal system for ideas. (and on the Memory Library one - find a way to “tag” it on the front - + the name….this one: maybe: “Abstract” (idea), and then “recipe” - how to do it\n also kinda like a recipe box\n For example - the mango chunk idea - go to a (mango cart ipa) and buy 10 dollar mango. take it home and (maybe eat some). Then measure/trace the edges of various pieces. Maybe cut them out of fabric. Or cut them out of cardboard and hot glue them together. paint them yellow (in fabric - use yellow fabric - that I have) DO THIS NOW INSTEAD OF WHAT I’M DOING?\n (pic of color wheel)"},
{page:250,type:"abstract",lines:15,date:"Sep 12",text:"September 12th\n AUTOMATIC PROCESS\n Pre-ToT: “Oh! I should make tiny books for every explanation/project - you can pick a project - book from the card holder that has books in it on my nightstand. Then you can do that project :) Ok, here goes:\n 1. When I was with Sean I told him I learned to make more money by doing manual labor\n 2. 2. Design an automatic process\n 3. It’s calming to the mind to have [something to do]\n 4. You need to come up with a system/process that you can do\n meditating doesn’t work cause your mind is meant to be doing something. This works better - the part of your mind is taken care of and free to “wander(?)”\n (pic)\n prepare a game for yourself. A little procedure\n (pic)"},
{page:251,type:"ideas",lines:9,date:"Sep 12",text:"To Do: print out the white noise sticker cause it looks alright, and I should finish if I can. Then I can put it on my shelf.\n Question: will it be easier to do this because I don’t know what it exactly looks like, and no one could do it for me…?\n (pic)\n Idk - I keep having this idea and it never really gets finished - print a rug on fabric (spoonflower?) - put fringe on it - it needs a box - possibly a wooden carton - glass window slide top"},
{page:252,type:"abstract",lines:4,date:"Sep 13",text:"September 13th (morning)\n System of movement - because when you can’t move - it allows you to have - to get unstuck.\n\n This is the automatic process I designed on my walk (”letters”)\n (pic)"},
{page:253,type:"day",lines:29,date:"Sep 14",text:"September 14th\n Feeling kinda low. I think I’m getting sick or I am sick or I was sick yesterday. Been talking to myself all day about how I have to break up w/ J else I’m gonna get hurt. Fu\n\n She fucked up. “you can’t read minds and I can’t read yours. But the fact that you thought that probably means it is anger” what a bitch. Then she changed the subject, probably cause she knew I could easily argue with that. I said I’m not angry cause she doesn’t have malicious intent but maybe she did :o I think she should pay me and we can have stupid insane meta arguments every thursday. Jonathan called me after to find out how it was and I didn’t know what to say. Sean came to my window yesterday when I locked the door. He’s crazy. I don’t know what he’s thinking. I was staring at her, just thinking: “you’re crazy!” over and over. Cause I told her I didn’t want to share all my deepest darkest secrets with her until I got to know her better, and she tried all these tricks to try to get me to say it what a bitch. Some things she had in common was confusing my other emotions with anger. Conflating various things I said like: I feel frustrated when I can’t finish my projects and feeling frustrated with her in the session. If she didn’t confuse me so much, I would say those are two completely different emotions that have the same name."},
{page:254,type:"ideas",lines:28,date:"Sep 14",text:"14th Primo Passo\n I like the idea of the automatic process - no - oh having a bunch of different sets of things - sort of like lego blocks. Like the stroop waffles. Like the bandaids if I could think of a velcro mechanism that would connect them. Ex. the “letter”\n 1. Maybe I should shrink the pics of my notebook, cut them out after printed, stick them to notecards: boom: idea cards.\n SIMPLEST PROCEDURE? Not a lot of computer work.\n Well, anyway: the idea being - these things are made by an automatic process - assembly line made the same way every time, and they are the automatic process part of our brain - the game, the program (but without the goal maybe). Ok, and then there is “the thing to worship” in my mind I keep seeing it as something with black velvet. Maybe something between a bird, an ant, and a hat - at least: add the black wire. Use the fluffy velvet. Sew it in a weird little shape. Or a floppy one. It could be a bat (pic)\n and then, one of the questions would be: what is a nice and satisfying shape (to make out of wire, and then cover/fill with black fabric?) Or: it could be an abstract wire structure - even in 3D, but covered in fabric. the trick, I think, is to make it look random. But, too, for me to be able to imagine it. So I will need to think of it in pieces."},
{page:255,type:"day",lines:3,date:"Sep 14",text:"mostly the emotional but also the physical sensation of jonathan touching my back\n ← jonathan when he was a kid\n (swing set, little boy looking at it)"},
{page:256,type:"abstract",lines:30,date:"Sep 14",text:"September 14th\n Trying not to have thoughts and then trying to write all my thoughts down is hard. if you don’t have anything interesting to say, don’t say it at all. Wished I had glasses so I could’ve seen Jonathan’s mom better. He saw my mom for about the same amount of time. i think I could make up a nice snack for myself, and then have it in my head: for example: those cheese stick containers, except with chocolate sauce. trapped in such a weird way. I’ve been trapped in worse ways before. Physically. And unpleasantly - mentally. I don’t want to think of more art projects in my head - it was starting to feel kind of grainy - too much like work - I think I forgot how to do it. Oh but except for the “friend train,” which I think I thought of after we had sex. Basically: just: a train of friends. each train car can be hooked to the next one. And instead of the full friend, you just get the head. But that’s pretty much just as good. And the nice thing about that is that you can all be going around in your little friend train, attached to one another. Each person is a Big Head. And that is nice. To go around together like that. Wish I could write louder so he would wake up and pay attention to me. Is there something I’m supposed to like about this scenario? I think I’m in work mode. I can imagine being at Zach and Niha’s house, eating Cheetos. talking about stupid stuff. Laughing more than I want to.\n 14th\n ←"},
{page:257,type:"ideas",lines:19,date:"Sep 14",text:"measuring spoons\n x a million (makes a bunch) (keys?)\n ← glass bauble? (mancala) (as a ring)\n apple (at the hear of every flower is an apple)\n beer bottle - photoshop the (label so it matches the size of the pieces, then print it out and put it on) - break the bottle. make a new label for each piece\n (← red, ← “goldenrod)\n grass - cellophane - forgot\n ← white border, picnic blanket fabric - at least 4/7 (?) squares\n\n flower fabric x2\n doughnut (how to draw this shape)\n better: scrunch it around the baby. or:…fit it with a string that can be cinched\n ok: the other things (that I didn’t wanna draw before\n pink or muslin, photo insert. about 1.5” high\n\n ok now: (and have one of the panels with fabric - embroider something on it…?)\n ← started with this shape idea. But could be abstract\n (ok and from yesterday:) IMA BAD MAN, BAD GOD MAN\n\n could also just say: BAD MAN BAD MAN\n or: slit for photo."},
{page:258,type:"day",lines:105,date:"Sep 15",text:"September 15th\n Now I have 3 notebooks I’m writing in all at once. Now I have to carry them all around with me cause I’m not sure which one I’m gonna write in at any particular time\n Came to J’s house yesterday - the big house and he was upset that his dad was maybe cutting him off. he’d been crying; and screaming w/ his mom (aww) I gave him a hug. His mom apparently would like me cause I’m skinny (”Oh, a skinny one”) cause she’s obsessed with her weight. I feel like all the problems he has with his family, mine doesn’t really have. My mom’s not superficial, my dad never wanted to leave her for a younger woman - he wanted a friend. he wanted to do more stuff with J’s mom (aw) but also have a kid with a younger woman (hmm) the most scandalous thing is that daddy was married before - was he with Rebecca when he met mommy? Did they cheat? Should I speculate with Sandy? My dad’s not a horrible communicator but he does I think yell more than J’s dad. Yelled at me all the time, and J said “aww” so do I have trauma from that? Yeah, maybe I’d be happier if he was kinder and more understanding of me as a child.\n\n Tried to get J to fuck me this morning - he’d gotten up early and was making all this noise in the kitchen - banging around. Finally he came in and asked if I was ready to get up. I was not. Told him I needed my teddy who has glasses and a collar, hugged him, sort of still asleep. Then made him lay on top of me and finally he got up and was hard and his platonic boxers (”drawers as I call them in my mind”) He couldn’t stop laughing. Finally he said: “Let’s go get coffee” and we did.\n I feel guilty for not getting enough sleep, feel like I should try harder to get more sleep. Go home and get more sleep - stop drinking. i could go to killer noodle later with the gang. I kind of just want to go with Zach. I don’t want to talk to Niha. She makes me anxious. She has this way of sparkling at people - very sensual - Zaach - she says - drawing out his name, maybe. She has nails - and whatever she says, it’s so intense. It’s kind of hot. IDK - maybe I want to be a guy that she’s talking to - not a girl - maybe if she didn’t feel so comfortable with me. I miss Sean, almost, but I wish he wasn’t crazy right now - hanging ot with him feels like hanging out with an aggressive, yappy dog wish I could talk to the normal person that I sometimes used to go to the beach with. i’m worried that he will turn into a tornado if I keep not talking to him but maybe he’s fine now. I could or should go home and do my projects - go home and sleep - try to sleep - curse myself for drinking matcha. Make plans that I won’t follow through with\n I told Jonathan that if he lost his money for the next 8 years, I could lend him 909,000 and he could play me back when he’s 35. I want to see Jonathan scream at someone. Sounds hot. Especially at his mom. I’m sure I’ll get to see it if I hang out with him enough, probably at me. Sounds good. I will probably cry though. Then I will have to leave, and think: “no [whatever it is he was yelling at me about] is not related to me”. Try to get my nervous system baack under control. Introduce little things I know I like - “hmmm - maybe a dish with little pearls” - see if that feels good in my mind yet “It’s ok, people are mean, people are stupid” “ a little dish though. Maybe a triangle honestly” - “I think it could be nice to…get some…bread.” I’m not gonna…see him for a while.” “I think I’m fine. See I’m not shaking. See, I’m fine. Pretty much anything the color light burnt umber - painted through - with splotchiness on the sides. Maybe on wood.” I’ll show him this: “Look, I’m prepared if you ever yell at me.” I would like to meet Sean in a library. And there will be a librarian/sitting at our table. Handing him cookies and being nice to him.\n\n The thing I was thinking - and I don’t even know if this is true - about the clothesline underwear - it’s a simple abstraction of a clothesline - no detail - if you saw it at a distance - if they weren’t your underwear - and then - is anything that you abstract art for some reason? Does it just feel good to have something in your mind out of your mind? maybe/probably/what else can I abstract - the measuring spoons that i got excited about last night - like the aspect where you make it not work. I don’t like it working - things like that stress me out. Broken games make me feel fine - it’s broken in a way the world is broken. Otherwise I feel I have to win.\n\n Funny, I guess: Last night while we\n\n happening to me.\n At Home Now (was at Primo Pass)\n About the head thing: able to be hypocritical in his sleep. That’s a real power. Took a little nap - woke up at 3 after having a very nutritious snack - avocado, cheese, apple, almond butter, hummus, sweet potato chips, and this is what I imagined before I got up I got up to weigh myself) - the example I gave him was: instrumental goal - going to the bathroom"},
{page:259,type:"ideas",lines:10,date:"Sep 15",text:"a shopping cart with birds on it (I saw a bird land on my bike - the handlebar - outside_ one bird on the handle part\n jenga block with set namer on it\n velvet (or black “gossamer”), wire\n (to match the measuring spoons, which may (not be different sizes now)\n add some way to connect to each other (makes it a game) velcro! magnets? Could probably carve sugar or find letters. Also, found random stamps from Portland that I could use - instead of the hoonies either to prototype (or more)"},
{page:260,type:"day",lines:18,date:"Sep 15",text:"I am on the toilet. I left Primo Passo (the girls sitting next to me were getting on my nerves. or triggering me. or something. Made me think of Crossroads. Now that I’m here I can think about creating false memories where we play together as children and both don’t feel so alone.\n It was such a relief to poop this morning at Starbucks - when there were two stalls, both empty - as opposed to the woman wrestling a tutu on/off her little girl. Forwen my reservations about using the woman’s room.\n I wrote that “song” about his mom being hot - the royal “we” but also, specifically, his actually. And it came up cause we saw his mom, and we were talking about synths, and automatic things you say\n I’m less worried and more excited that this writing activity has passed the point of ritual that starts and stops and just sort of keeps going on? indefinitely"},
{page:261,type:"ideas",lines:67,date:"Sep 17",text:"17th (cont)\n Working on a way to assemblate the sewing part cause it’s daunting. Once I measure the length of the wire, I can pre bend them, or pretend to. I can cut one fabric length the size of the one I already made. And then use that to cut other ones.\n _______\n could put the fly on everything, or on those (pic)\n other problems I ‘can’ work on in my head\n I made these snake things without ever writing them down before making them. Now, they can be building blocks. i don’t want them to get too neat. They could have one more element…clay - but that’s too messy. There’s no systematized way to add it. (Which brings me to my next conundrum…(idea. the automatic process is in place so I never have to make any decisions. Which in a way means “they” never get to make any decisions - get involved in my process - turn it into a superstitious thing - a have to - that can’t be changed….cod god…\n ok new idea: (pic)\n Spoons: I could make them smaller - the length of one of the jenga blocks\n\n2\n\nday?\nI want to go back to the garage so I can finish my orders but - automatic process - the medium kit - I can never remember it. And when I do…(exp of process)\nThe point is: you want to design yourself an automatic process - a pattern to move around with - something you can do, over and over, without thinking. That interests you. You want to design a system, so that you have walls to live in. And you can move around in them, knowing that if you make a wrong move, you will bump into them\n\na bit like the procedure in a science fair project, where you write down all the steps, and then you replicate it (i’d like to do this with social situations)\n\n oh! Chesse! you gave me a fright …”I gave you a fright?”\n\nIn this game, we have this goal, this strange, imaginary goal, of building a kit that will turn you into a real person. This goal erects walls around itself…EVERYTHING you need (to become a real person) - well, what a

{page:417,type:"ideas",lines:18,date:"Oct 27",text:"meat cake with one slice eaten out of it\nI had the idea that, since (this(?) box wasn’t about anything it could be about the “double crown” concept, which I <em>think </em>is something I just invented ex. chess king + brown charm crown = double crown concept\n@@PB@@\n1. Hidden mechanism - related to - that extra second where I need to remember what I’m doing. because im? journals anyway, but i need to remember\n\n— — — —\nmaze (yellow x) with ex. yellow houses and green + brown - people x trees lol - move them around to make Interchangeable mazes, and the card works - oh - don’t forget to (8 around the) yellow house (also: didn’t want to think about plato - idk - would’ve made my mind too white and liny - had a different idea - think about: competing patterns (and how they kind of look like a clam shell if you look at them up close (?)\nOctober 28th"},
{page:418,type:"day",lines:21,date:"Oct 28",text:"Hard to believe this panic attack was caused by looking at my mail - letting mommy talk to me about it. I think it was something to do with the sun going down while I was in the shower like - I didn’t even get to say goodbye :( - daylight savings :( guess I should try to untangle my thoughts. I want to work on my square book but idk if it should be square etc. I need to text that girl back but should’ve texted yesterday. I can’t go to Sammy’s show though it looks cool and maddie can’t go - is <em>that </em>causing my anxiety? I <em>have </em>work to do but idk where to start and I procrastinated all day. I need to find something for dinner but I’m not hungry yet - could walk to Whole foods and try to get something that’s similar to a jam cookie - oh! I could get - jam, and put it in those little plastic jars… and short bread cookies? I had settled on an activity - making the pages for: hidden mechanism, artificial process and assemblation but notion was malfunctioning."},
{page:419,type:"ideas",lines:19,date:"Oct 28",text:"The work I need to do: finish the deluxe kit. ? some huge kits. make some huge kits. make some medium kits . make a 29ox and 48oz. Make all the ACs to send to Amazon, and maybe make even more, so I can send them out when they run out again and - pay more attention that (!) I could check the 29oz I could make a listing for the AC + MC too… It could be: an apothecary + crystal box that comes with cards so: 4 options 1. apothecary + cards, 2 crystal box + cards 3. both + cards, just cards (so 3 things). I have a desire to make more maira kalman images, but I don’t have something specific in mind. I can’t quite believe that I won’t be able to work tomorrow. As for Maira Kalman: I could make the cigarette case where each of the cigarettes reminds me of a train of thought i like to/often think about. I could make a: hidden mechanism, artificial etc.\n@@PB@@\noh: i had a question in my mind of: (assumption:"},
{page:420,type:"abstract",lines:16,date:"Oct 28",text:"it seems like I tend to start thinking about a concept and then it keeps building as I attach other things to it, and see it from different angles and sometimes redefine it. You could see things as a progression. Anyway, then, once it’s “done,” I start thinking of something related/new so: autopro led to assemblation ⇒ hidden M ⇒ maneuver (onomatopoeia) and this morning I was thinking of additive processes which are a “rectangle” of artificial pro…and how, next, I will probably start thinking of multiplication or subtraction which will appear to me as a progression/chronological, and later, as “examples of a phenomenon”\n@@PB@@\nok now that I’ve collected <em>2 </em>thoughts about HM after starting off into space, I can write them down 1."},
{page:421,type:"abstract",lines:24,date:"Oct 28",text:"aggressive - this is a feeling/therapy coded. I want to include hidden mechanism to scare (anger?) people into thinking more…so this means I include extra “processing - necessary” into my sentences, and people don’t understand me, and then I think they’re dumb and am mad at them. i think this is an effective system and I want to do it more/breed hatred. Oh the other thought, which ironically (joke), is about automatic process is that: not a very <em>interesting </em>idea, <em>but </em>I think (note: this is emblematic of my panic attack: that I don’t know if I’m hungry or want to throw up) the center/core of Autopro is just how my thought move automatically. Like the work I’ve been doing, trying to understand <em>how </em>my OCD works ex. if I don’t want to do an order, it’s cause I <em>planned </em>to do something or, I <em>need </em>to plan to do something/what to do next. This is an example of a counter-intuitive concept in that it seems like it can’t be a coincidence but, at least for now: it is. <em>And </em> - taking a step back, this is → requires - a hidden mechanism - you have to process it - say: ok - this <em>looks </em>like a - but it’s just a coincidence\n@@PB@@\nAnyway:"},
{page:422,type:"abstract",lines:40,date:"Oct 28",text:"idk if the point is to STOP them from moving automatically or to control them - add artificial processes anyway where you can - sort of like a stint - what is a stint? - and this is how you do the: autoprocess/system of movement for the Art as Art book because you <em>design </em>an autoprocess with yourself in mind, and try to get it so the rules of the AutoPro are as close to the rules in your mind (← what does this mean (!?!?)\nAnyway - the last thing about the AutoPro thought is: the cigarettes - causing the automatic thoughts on purpose. To summarize. Three things/examples that are related to an off shoot - the <em>thought </em>version of autopro. Actually - idk - but fill this out later. Anyway - the last thing - about hidden mechanism, which I discovered at the Storage Unit is just that: when we have to make those weird adjustments: SBS: try to figure out the action and then it turns out the action is a thought: “have this thought” - is a <em>hidden </em>mechanism which I’m trying to “solve”by <em>un</em>hiding it - calling attention to it - creating practices and procedures for its existence - so it “doesn’t need to hide anymore” - has <em>one </em>thing in common with those residual rules (try to fill this out.) Ok: answer: the (center ellipse) is: idk check it - it’s more of a therapeutic process 9 (anyway: doesn’t have the other thing which you might <em>think </em>it has in common.\n(pic)-? black, wood. inside: red, clay, sticky, rounded edges\n← <em>this </em>is the metaphor for: hidden mechanism.\noh! a point going forward - I think it would be better to call it “hidden maneuver” <em>because </em>it requires a maneuver and the word is an onomatopoeia - have to maneuver ← these 2 letters. this is how it feels: “ohh! my tongue was there ohhh! My tongue is now there/here - wow - look what happened there - wow! I didn’t even notice that (I did, but it didn’t come up in my (?) subconscious, only my (?) conscious?\nOct 30th"},
{page:423,type:"day",lines:25,date:"Oct 30",text:"Just hung with Maddie at the park - Kenneth Hahn. It was really quite nice. Can’t say anything bad about it. It’s weird that i wanted to touch with them…maybe there’s some in between relationship that could be nice - I wonder how to propose that. Anyway - we talked about some stuff - for some reason I can never retain it. Anyway - she said she feels like we’re too much of girls when we’re together - maybe she means like gossiping…idk I feel that way too. Idk probably nothing to be done. We read our journals out loud. We were both sad on the 20th which was nice - and pretty dramatic about it. I kinda like reading mine out loud even though it was sex w/ J and seeing Sean. Probably cause I write jokes in my journals taht are just for my private eyes. Anyway - beyond taht - was feeling like life isn’t worth living. Am I missing something - or is this <em>really </em>a hole I have to be in? It feels like I’ll read this back and think: “well duh - why didn’t you just - “ but idk what. All night I resolved to talk to him, and then I <em>actually </em>did. And he had <em>no answer. </em>Like we were in a sitcom - the end of some joke. muahaha - just keep being tortured"},
{page:424,type:"day",lines:47,date:"Oct 30",text:"Maddie implied that I wanted to be more serious lol but idk what that means. She said she wasn’t good at responding - what does that <em>mean</em>! I only sort of care. Some of me is <em>relieved </em>that we don’t have to see each other anymore. Some of me thinks - “come on - it does not feel any different - how could you not want to hook up with me - you always do. Oh yeah - she said: she didn’t know how I like to be cared for - or maybe - she said we walked a lot about abd things but not good things. to be honest - how do I like to be cred for…I don’t know…I guess maybe I could tell her that she does not have to support me emotionally - I <em>do </em> need emotional support but <em>so </em>rarely, and I just want to be understood…maybe I could tell her that she doesn’t have to work so hard not to offend me or hurt my feelings. god knows Jonathan hurts my feelings <em>all </em>the time he even acknowledged it - “i take a lot of blows” I would ask why does he keep doing it if he knows it hurts my feelings, but it would just go in the pile of questions that I already know the answer to which is that the answer is impossible. maddie looked so beautiful with the sun shining into her eyes - turning them green - her hair straight and short. She is <em>so </em>pretty. Idk what to do about Julie talking too much. Why does she put up with it. (missing: J…”boring”) I felt less brutish when I was with her today - and maybe that’s because we weren’t dating - it actually felt better - idk I’ve never really felt love in this way before and now it’s mostly sadness anyway. There’s something about <em>Maddie </em>saying they don’t know how I wanted to be cared for (which is <em>so </em>sweet - unbelievably sweet - I don’t even know how to think about that cause no one’s ever asked me. (missing)\nHas it ever hurt like this before…?? The shower in St. Louis comes to mind - when I took a cold shower because why not - I was <em>always </em>making myself do horrible nasty things but there was <em>no </em>resting place. That was the worst. Walking around with my magic wand. Oh and that time I went to Goleta and accepted 100 dollars and…I have <em>all </em>these experiences that I can’t tell <em>anyone </em>about. Adds an extra layer of I can’t be myself - <em>no one </em>can (idk stupid)"},

{page:427,type:"abstract",lines:25,date:"Nov 1",text:"Walked to Whole Foods - apples, shortbread, water (could make a receipt) Tot which is why I left without my notebook: pre ToT: Sean would’ve said certain things he shouldn’t it’s not <em>everything, </em>it’s just his filter is <em>wider </em>- hence - inappropriate…the example was about titanium white, and how I use it instead of picking things I actually want…so I can <em>see </em>them (the color is only a <em>little), </em>mostly it is the “looking.” Anyway - then the idea of the filter, and the “net” around moments you want to remember, and things you say (the PC is the related component) anyway, <em>then </em>(in a <em>meta-maneuver - </em>I broadened it to thinking about (well, the question was: why is that even useful,” , and the potential answer is - a formula so people can <em>talk </em>about it - the filter. Then I envisioned a “wallet” that is more like a (pink - painted) well with 3 ornate gold picture frames squares on one side, and a different configuration on the other side - 3 pages(?) (and the off shoot is the idea of things that are multiple things at once - clunkily so - more than one set of essential characteristics, to show(?) ideas being combined - as a metaphor for the additive property - <em>adding </em>two ideas together…"},
{page:428,type:"ideas",lines:13,date:"Nov 1",text:"anyway - to continue the idea i’d had in my house, I invented a <em>wire </em>file - also 3 pages, with squares in a similar configuration (connected with one of these wire hinges that make sense - bent piece of metal - <em>this </em>is <em>ugly </em>and hard to imagine <em>but </em>standardized in the way that, if I invented an “easy to use” formula that people could use to talk about ex. filters (but also expand to: <em>everything </em>else. And the question is: would it be <em>useful </em>for people to be able to talk about (exactly) what each person’s filters were\n\n(pic)\nand here is what the wall/wallet looks like (WALLet?) (idk)\n@@PB@@\nNovember 2nd"},
{page:429,type:"ideas",lines:33,date:"Nov 2",text:"I have been tracing diagrams onto my computer for the past 2 hours with a growing sense of unease…etc. (missing)\n…I think the thing that got me excited was remembering myself playing dolls when I was little - and it was always setting up these little chairs and having them learn something. and then the idea of someone asking - what are you teaching them - and I would pull out/produce this whole giant booklet that looked like <em>complete </em>nonsense, and the further you read, and the more and more you got into it, you would still not be sure if it was nonsense, and finally, if/when you finished it - you would know for <em>sure </em>- that it <em>was </em>nonsense - but it would make complete sense to you now (and your brain would be turned inside out, and you would finally make sense to the world - every action you did could be opposite, and the brain would get to know <em>everything - </em>the world would see, as though it were <em>knowing </em>you - <em>exactly </em>what you\n@@PB@@\nwere thinking, because you would <em>demonstrate </em>it. I feel like people would read about: autopros and hidden mechanism, and ambiguous events, and even though they make complete sense and follow logic, people would say: “huh? what did I just read,” and then they would shrug their shoulders and go up temescal canyon. <em>No </em>one would want to know. And <em>no one </em>would want to adopt my logic system. Perhaps if they had a <em>visual cue” - </em>something to hold onto with their mind, they could learn it little by little, learning about the objects (in the kit) and learning the secret system as they went…anyway - I realized"},
{page:430,type:"abstract",lines:12,date:"Nov 2",text:"ToT: scott - drummer - I designed my <em>own </em>religion - oh - what are you studying in school, oh well, I made up my own discipline - it’s called referring to abstraction. oh haha can I learn it? No, you’re too stupid and you wouldn’t know what it was about or have the discipline to stick with it (would I? idk - if it seemed interesting). Maybe Zach - no - and I’m sick of listening to men. Maybe Richard - no - he would <em>not </em>but he would try to make it <em>beautiful </em>instead of making it make sense.\n\ncont from other notebook\n(missing: my dream (it’s in the dream journal)\n<strong>november 2nd</strong>"},
{page:431,type:"ideas",lines:45,date:"Nov 2",text:"anyway - I think the logical progression was: pretty - beautiful, ugly, or “not beautiful - first” and yeah: the specs for <em>this </em>project are: printed myself. Probably 1/4 letter sheet. (all black. combo diagrams and typing - similar ratio to journals but slightly heavier on diagrams - stapled. And the procedure for doing it (I’m <em>so </em>glad I’m not out with Zach and Niha, and I’m so glad I’m wearing my monochrome blue priest outfit that I’ll have to wear forever cause it’s the only thing that fits my uninteresting criteria though it doesn’t have enough stripes) 1. cut the diagrams out with the ex-acto. 2. remember the order they were in. 3. ?paste? them in the (already made 28 page book) - with space to write - <em>write </em>about them (why?) and either make things up or try to remember what I was thinking about before, when I first made the diagram - the <em>procedure </em>is mostly a <em>memory </em>recall exercise, and perhaps I should hang an eye test except - showing the different kinds of memory/ways of remembering stuff - it will look like a “counter-intuitive poster (v3 moth) and I could make that one look <em>even </em>more like an eye test. <em>Also: </em>could test myself on all the foods i’ve eaten today, and see how far I can go back and see if any one cares when I tell them I was taking tests yesterday (I ate: cabbage that looks like lettuce, a shallow bowl of plastic soup, a banana, more than I thought I had eaten of cookies, some jam in a cup I made myself, a <em>whole </em>salad from trader joes, using the money I got from wearing daddy’s hat in the rain and covering up all the things. peanut butter. eggs. And the eggs I wanted to make, but didn’t want to go into the kitchen in case I saw mommy (there’s an opossum outside but i don’t care. Ok let’s think of a <em>different </em>procedure. I know there’s going to be something on the test about trinkets! I think they’re gonna ask about who invented them, and I’ll have to think of a trinket that you can fit into another - the tan block, with the brown flag staring out under it, with the white other flag under that - it is part of the mechanism, and it’s what allows the door to close"},
{page:432,type:"ideas",lines:16,date:"Nov 2",text:"The alternate procedure is typing out <em>all </em>of my entries, solving for the things that are actually pure “imagining,” phase 2: checking to - re-evaluating - how much is left - will it all fit in the book (temporary finite parameters so this exercise makes sense) <em>and - </em>can we fit some in the book from when I was sad that I thought maddie might break up with me. Alternately, - download “random” diagrams from midjourney, have chatgpt tell me what they mean, and then lay it out in indesign (I could include things like: my <em>bad i</em>dea: with the pea stamps that maddie ‘fixed’ by adding the different colors (now it can’t go in the bad ideas box and only michael’s, charlies, and jonathan and sean’s ideas can go in there hmmm - jakes? masons?"},
{page:433,type:"ideas",lines:19,date:"Nov 2",text:"Another thing that I think is going to be on the test is a thought modifier which can come in the form of an internal meme, or a trailing sentiment and it has a caliper and a small tool on the end - long - nothing on the end, but doubled and bent - caliper keeps it still - and to see <em>into </em>the mechanism - medium wood block. The hidden mechanism tool is split at the base, but looks like it is not…the evolving narrative therapy tool was on another test\nThere’s also some things that are in my notes app and they need to be written out, and diagrams need to be drawn for them - for example - the doll shoes - idk.\n…i guess the last thing will be the file, as an introduction to the next section, which is [about maps], no - it’s about standardizing, and developing [fill-in-able] diagrams ex. 4th quarter: (pic) and the next section is a future history on how they became widely accessible!\nnovember 3rd"},
{page:434,type:"abstract",lines:19,date:"Nov 3",text:"I guess - this was my ToT last night. I suppose I was thinking <em>I </em>invented <em>my </em>religion because the intervals between the 613 rules just wasn’t enough for me - because, in between these rules, you need what <em>I </em>would consider an automatic process - and they - the people that wear wigs and hats, consider: life. It’s hard to explain why this is different or interesting compared to things I’ve thought before, but the main crux I think has to do with <em>my thinking </em>of their daily life as an automatic process (it’s hard for me to even <em>imagine </em>living without rules for that long. There is <em>space </em>that they can’t see. Like men trying to pick their girlfriend’s nail color (it all looks like red to them). Anyway - I’m a priest in <em>my </em>religion. It makes me feel something to imagine <em>living </em>in between temple “ah, now we can settle down - this is the “in-between” time (my “in-between time is me breathing”)"},
{page:435,type:"abstract",lines:24,date:"Nov 3",text:"Not the point of this, but maybe this will change if I keep writing in my diary - doing art projects by myself - a longer time with the spell cast of that mini table in my parent’s room - stamping butterflies [Note: I don’t know if I’m doing<em> “art”, </em>or<em> “science”…</em>] Anyway - I don’t know if this is something to <em>write </em>down, or to ruminate on - and I don’t know if it’s <em>the right time to ruminate </em>(could be a book). Anyway - onward - next thought - easy - just a clarification towards palleability for use in the pink square book which is: hat and shoes are a concrete example/metaphor) of how essential characteristics can help you categorize things, such as: if I’m wearing black boots, you might think I’m a punk and if I say something ambiguous, you might interpret it as <em>angry </em>rather than sad. - also other “ends” of outfits\nOk, and the <em>next </em>thought I had was about: a ToT, put into one of those circular things - I like this ?example? because they are <em>finite spaces, </em>and, like those mini doll boomboxes that could only look at <em>one </em>frame at a time, and it hooks up directly to your eyes, like the matrix learning situation I described to Evan."},
{page:436,type:"ideas",lines:20,date:"Nov 3",text:"Instrumentalism travel altar - altoid box with an “altar” cloth in it - thome. And then: the first thing, something <em>black </em>like the snuffer outter - a metaphor to focus on - to put in your pre-frontal vision for the <em>main </em>one - a head (your head), but for <em>other </em>mindsets, on the systems helmet shelf - something else. And: a little game to play: perhaps - peas - arrange on the tea towel - let them fall through a wooden tower with holes at even intervals - a version of the bunk bed (pic) ← ideally more than 3, - wood circle cut out out the size of peas - circles, not squares\nor (and?) a tiny clothesline for little paper flags, like the “no basic bitches allowed” one I hung in my living room on that trip where I didn’t go anywhere, just got cherry garcia ice cream for watching someone’s luggage and didn’t want to leave home for too long in case I got a cat to feed and couldn’t find a sitter. Anyway - that’s where we"},
{page:437,type:"ideas",lines:40,date:"Nov 3",text:"would hang the proverbs, or the accepted assumptions. (I do kind of like the idea for a deliciously ugly rubiks cube - 3 part pea, rubber, and <em>block </em>in between - or: the first version of the brushes, where all you can really do is wave them around (that would be the <em>last </em>game I guess, cause it wouldn’t workPeas are thoughts; awful, ugly ones - and a mechanism to take them out of your mind - a little lady, with a scoop small enough\n@@PB@@\nto reach into the deep deep dark, and pick out <em>any </em>thoughts it wants, and then place them in a hollowed out pine block where you can have, say, three thoughts at once and you can connect them…you didn’t know they would <em>be </em>connected, and all you have to do is <em>find </em>something they have in common - that’s the game…Anyway: these are the things in the kit…a ladle, a carved pine, three peas (at least), and a metaphor (with three peas on it - that would be funny, but idk if it’d work. And then you need the flags, which could <em>also </em>have peas on them - this example is destructive.\nThought of a nice little procedure that could be condensed to fit the envelope: step one: categorizer - note: this is a <em>ritual </em>- the silver beads are abstracted, and do not correspond to specific thoughts. Second step is confusing, but: imagine/remember (remagine) that marble thing that was like a metronome in that it gave you a <em>short interval </em>to get all your marbles in line, so it would have something to pick up next. The analogy here is that: not every thought should be thought of, and you have that short time to pick thoughts that are appropriate - in line with the rules - (you could imagine a <em>mini </em>mechanism - a hexagonal chamber with “no peeing in the pool” written on all 6 sides (pic) and so now you’re peas - thoughts - have a little case around them, because they were picked with the rules in mind. And the <em>last </em>step of the procedure\n@@PB@@\nis picking out <em>nice </em>thoughts -"},
{page:438,type:"ideas",lines:23,date:"Nov 3",text:"royal thoughts - these are the kind we can worship - these are the <em>especial </em>kind that we need - that we can make our mind feel <em>better. </em>We hang them up as prayer flags, and when we don’t know what to do or say or where to <em>look </em>- we make these special <em>shiny </em>thoughts that we can reference, and be with, if we need them.\n→ pea substitute. And now that I am done with my procedure (thank god) I can start imagining a <em>pea substitute </em>because it wasn’t perfect to begin with, because it’s just what we had lying around. And this new thing is the clay pill with glaze on one side <em>because </em>- we need it to be white, and I couldn’t decide if glazed of unglazed) so…ok I want to be done with recall and move on to “concrete objects” the autopro of typing, tracing, going through journals. But: last thoughts from last night - in order to get in to the desired (ideal) (← temporary categorization) head spaces - start playing the game - building a tower with the papaya or mango - and <em>then </em>the object will emerge (emergent rules ✖️ emergent objective ✔️). Also - crop moments to fit certain…"},

{page:440,type:"day",lines:21,date:"Nov 4",text:"yes well i stopped what i was working on so i could go to sleep and now its 3 in the morning and i <em>never </em>fell asleep which I wouldn’t care about but I have to see maddie tomorrow but idk - she might not notice (care and i can say: “how do you feel about platonic touch cause it’s weird not to even though it’s not and it’s probably better and I can tell her how (?) thought I had one platonic friend and how Sean came over in my shirt cause he journaled about “why did i take it?” and I can tell Jonathan how (?) I was in solitary confinement and convinced myself I could move things with my mind and ask him if he wrote that song about Emma and show him my assembling to motivate me to work with how much I like assembly lines and tell him i’m obsessed with him and I would love to stop talking to him cause I <em>don’t </em>even like him, but I am worried that I would have panic attacks everyday like last time and wonder everytime I left my house if I’d see him for one second on Montana."},
{page:441,type:"ideas",lines:31,date:"Nov 4",text:"Here was my thought recall that I wanted to put in a paper staple-hemmed envelope with a plastic bag of eyes neatly stapled on the cover like so:\n…anyway - I thought of a compendium for the hidden mechanism which is not wildly grabbing stuff in my mind until it settles down when it transforms into something new. 🙄 practical applications: (therapeutic)\nex. I <em>stop </em>letting a HM stop you from accomplishing - just cause you can’t imagine the steps (sad these ants didn’t acknowledge each other when they passed, that .indd hyphenation 🚫, but <em>I </em>can - (mastermind the operation, and maybe I <em>am </em>powerful after watching that video of me on the toilet anyway) cloth envelope to mold my ToT with a progression that I couldn’t remember - I think it ended with me <em>imagining </em>that I could re-imagine the future (the past) <em>oh yeah: </em>the double envelope I wanted to make for maddie that was as <em>one </em>example, the thing I was explaining to J that made him know I was smarter than him - the end was: re-imagine my mistakes, and it was a 4TH QUARTER maneuver because it wouldn’t have been possible without the buildup ex. that moment with (Thome) under the tree - also: an autopro: collect sets of three eyes - hand pin - keys ⇒ add to keys irl (I guess) 2. practical application: use the “Artificial Mechanism” to contract the autopro. Oh, and then I had a whole plan to make a mini kit with only bits of metal that I wasn’t\n@@PB@@\neven supposed to design (pic)"},
{page:442,type:"ideas",lines:20,date:"Nov 4",text:"impetus is the idea that I could communicate/proselytize my religion by “involving” every kit with the suspicious coincidence clock eye matchbooks (book of matches) - perhaps wear in lieu of a watch - as a pattern collector - the eye is the drawer pull because you need a coincidence to open the drawer - is this true? Well, theoretically it is, i think that idea was exciting to me. Oh yeah - another thing I designed: waiting room game but with eyes as the beads ⇒ (became) the lovely beads ex. the (pic) sharp ones, from mommy - and they could go on the ends of sticks, and they could represent exact Tots\nI think the point is: the ToT I memorized in my envelope (cloth not paper) was: going back in time by creating ambiguous events (in the present) so that in the future, you can decide “what you meant” - and then that just kind of led to me thinking I could go back in time (If I prepared in advance)\nHere’s the ToT:"},
{page:443,type:"abstract",lines:14,date:"Nov 4",text:"Going Back in Time: Step one: retroactive pattern manipulation. Step two: “pro”-active pattern manipulation (design ambiguous events for the future that you can use “in the past.” Like if Snape hadn’t decided if he was good or bad till he saw what Harry and Voldemort did. Step Three: 4TH QUARTER + LEAP OF FAITH I suppose = … “you can go back in time\n@@PB@@\neither by: planning for it <em>or: </em>by <em>imagining </em>that you had planned for it in the past. Fin. Supporting evidence: Ambiguous event of smart or dumb: “I never know whether to be happy or sad about the sea” AND: that day under the leaves with THOMAS (which <em>did </em>end up coming true) (missing)"},
{page:444,type:"ideas",lines:35,date:"Nov 4",text:"To expand on an earlier thought: I was designing a procedure) feel better. And: it started with collecting 3 eyes (coincidence?) each, on little key chains, which I then attached to a ring. Originally, it was gonna be a bracelet. But the connotations of <em>keys </em>in that you <em>cannot </em>lose them, and you take them with you whenever you leave the house, and think “I am putting them in my picnic basket, (so I don’t forget them for later), and then, when you leave: “Oh! I am taking them with me so I will <em>have </em>them while I am out - I do <em>not </em>want to forget them, and practically at every stop, for example, if you walk by bardonna in your H and M jeans, you notice, oh yes, they are still in my back pocket - worth it that my butt doesn’t look good (Avenue of Thought AoT: what connotations do other things have and how can we be more\n@@PB@@\nspecific about what slots we fill). Anyway: <em>then </em>I was thinking, (procedure is done after the key ring and I started to design a marker - a pen with ink that was wide - a boy man - ryan with a beard, <em>but</em>): the next stop on the way would be a stamp (?) book…(?), or, well: the patterns would get longer, so you’d have to/be able to: collect them in a book - one on each page…anyway: yes: if I drew everyday I’d be happy, or another part of my brain like spinach or egg or bread could be filled - which is why I want to design the paint brush, <em>and </em>(pic) chaining a sling “knot”: to go in the slip knot - to finish it off - as elusive as a perpetual motion machine before I check the internet to see if it exist(ed) Anywho: HM/assumption/pre-ToT(no!): There’s <em>two </em>interpretations of “matches” (as in: match book or book of matches:,"},
{page:445,type:"abstract",lines:12,date:"Nov 4",text:"and they are: 1. coincidences or 2. things that match 1: two people wearing the same color red outfit or 3: a <em>pattern: </em>having the <em>same </em>thought process MULTIPLE times, like while sitting at Bardonna, like at the inside table, for example (and thinking the same thing, and wishing it would stop… 2. I started thinking about Venn diagrams: things that had something in common 3. The thing about matches - <em>each </em>part of the thought process - the pattern matches each part to each similar part, even if they happen on different days\n@@PB@@\nAoT (avenue of thought):"},
{page:446,type:"abstract",lines:19,date:"Nov 4",text:"Each thought that fits into the same pattern - like a little constellation shape is an autopro and can (should?) be stopped with an artificial pro (like Jane said) So: how to do that…(?) idk - becoming aware of it - so it doesn’t stick to us like glue, so we can smile at it - like Sean said with the late thing\nWay of avenue: the way i would go about the AveT could be to think of examples of: patterns of thought I have - what is their shape - <em>how </em>do they twist and turn - also: can they be represented by a waiting mechanism with wire and beads on it…? - the nice part is I think they loop around a little bit, and sometimes come back to what they were thinking about before - for example: refer back to examples (<em>idk)</em> (pic) here’s where it starts…I’m not sure what the thoughts about but it looks like a swimming pool so maybe it’s about swimming pools…idk (no.)\nAnyway (referring to nothing) yes:"},
{page:447,type:"abstract",lines:9,date:"Nov 4",text:"it could start with collecting things (for example: the eye charms while I am outside of bardonna, walking outside - right past the entrance: ex: “oh yes!: I know what this moment is (emoji)← eye roll, but sad :( anyway\nex. the thought about collecting pebbles which I remember <em>first </em>having on the beach (that! was a nice time), and then! having in the alley on the way to work (school (haha jk - neither - i quit! TG) anyway: and <em>then </em>again"},
{page:448,type:"abstract",lines:23,date:"Nov 4",text:"with the stumpkins - gradually realizing that it’s <em>about </em>the collecting of them (Note to self: I need to realize (catalyst: that <em>one </em>journal entry with the #s on pebbles) that I don’t need a systematic procedure for everything, and I’m gonna just go back and decide I <em>like </em>certain journal entries: ⇒ collect them, instead of comb through all of them (ok, it’s a procedure after all - (did I do that on purpose - did I put it back cause I couldn’t stand it being out of place). Anyway, this is all to say: that my thoughts take certain patterns, and it’s <em>not </em>just random - they’ll take a certain shape for a few days (or weeks) and then morph into something else - like: they were venn diagrams for a while - like during the sunny days when i was going to primo passo everyday, and then they took the shape of 4th quarters a lot recently - another example I can think of is: simplicity → complexity - simplicity which I <em>don’t </em>think I’ve thought about in a while cause it’s one of those sleepy <em>dreamy </em>thoughts that comes up when you need to not <em>see </em>yourself for a little bit (poem), (#Tip of thought)"},
{page:449,type:"abstract",lines:20,date:"Nov 4",text:"another is: paradoxes - esp. competing patterns where the answer is that there is no answer - a bit defeatist if you ask me - but some people like that kind of stuff - it’s <em>almost </em>like a cognitive vehicle that a therapist (Jonthn’s therapist) would give you (take 2 of these a day and you won’t\n@@PB@@\nremember what life is like, but you’ll feel better until you remember (like you had a dream where everything’s really weird and not what it’s really like (this is about (?) street as the Macaroni slide (the slide that slides into Mac n cheese) imagined just before I got up/fell asleep (and yes: I’m looking at you autopro that was gonna make me feel better ① ← this is how things should be written - don’t need to include extra logic cause you’re not a computer, so act like one! ② wide marker\n……dream where everyone could talk, but talking wasn’t about communicating, it was about saying what you really mean so everyone can hear you [be really loved]"},
{page:450,type:"abstract",lines:10,date:"Nov 4",text:"Another definition for 4th Quarter is: the last quarter of things ex. thoughts that I can remember but still don’t want to write down - like you’re going full throttle, all eyes focused on getting where you’re going, and then you overshoot it, so you have to go back - “oopsies” but yes: I remembered about the hinged dominoes with just 1 red dot, the fortune tissue box “you’re gonna die” on all of them (()) → smoke weed everyday ((repetitive))\nNov 8th (Kreation)"},
{page:451,type:"day",lines:27,date:"Nov 8",text:"Exchanged my smoothie cause I didn’t like it. Now when I see maddie I’ll have to think <em>even more</em> that I’m not like them. Now my smoothie is called glamology, and has strawberries, neither of which fit my mood. I feel like my confusion about J is reaching a climax and will hopefully topple soon - have to deal with his mental health - he was having the most beautiful panic attack last night and I didn’t do anything - head in his hands, shaking, emitting a low-pitched noise. All I could see was the top of his head - his blonde hair. Daddy said he might be pretending to be sick to make the break up easier. Then proceeded to tell me the most disjointed story about his own experience pretending to have cancer (what?) to get out of breaking up with someone. I don’t <em>think </em>that’s what Js tryna do - he didn’t wanna tell mommy - waited till she went to her office - so - a weird day. And Bardonna closed, on my walk home - I almost walked into the crosswalk on red and the 1st truck gave me a “what the hell” look so I flicked him off…then he came back around and I flicked him off again. Scared I might die. Sean was driving by my window as i was in the garage so he came back - I hear his car and think that he’s there a lot and I think he was more surprised to see me then I him."},
{page:452,type:"day",lines:30,date:"Nov 8",text:"Told me he was anemic but he was lying. Everything’s pointing to not hanging out with J anymore but I feel like I tried that before and it made me upset. Maybe he doesn’t like me because he doesn’t like anyone. Do I really wanna doom myself to thinking about something that doesn’t ever actually appear in my life - like Charlie and Siddhartha and Kern and Curran. I think the reason I don’t understand if he wanted to break up with me is because he doesn’t know. Also, his reasons for not liking me don’t make any sense - it’s because I’m messy, and I walk in front of him and. If I had to categorize how I’m feeling, it’s like I’m in the middle of a pirouette and it’s been like 6 hours and I’m waiting for my other foot to drop. I told him I’m into math not art, and he said: “no, that’s not what I’m doing” but he’s wrong but I have no proof so it’s hard to convince myself kind of want to give him “Referring to Abstraction” to prove it so then we can say “no, I was wrong: you <em>are </em>a genius”. I guess the answer is: it doesn’t matter if I hang out with him , or not - I just need to finish my projects, like XI etc. and should not be hanging out with anyone? Anyway - he fucked me two nights ago - and it was good - very nice - it doesn’t feel very athletic but idk - it just feels like he’s there and he can’t stop himself from cuming which I kind of like in a kind of hot way…we had to stop"},
{page:453,type:"day",lines:22,date:"Nov 8",text:"He asked me to come over at like 11 or 1 last (2 nights ago) and was just wearing his monk hoodie and underpants when he came to the door - I was wearing my cheetah slippers. he said he just wanted to hold me. So we got in bed and eventually he started touching me - said I was teasing him by rubbing my ass against his dick. he said can he just make me cum even if we don’t have sex and I said fine. But then I forgot my mind and reached in his drawers and pulled his dick and put it inside of me and he didn’t mind. Just inside me mm) and sort of barely moving. Me fucking him feels too easy and unsatisfying like I can make myself cum but nothing is happening to me? Like it should continue. The weirdest part is all the relationships we were considering don’t include sex because <em>I</em> “don’t want it” but I do…feels wrong though, or should feel wrong. Everything feels so wrong…my actions don’t match my feelings and i guess that’s a luxury…at least I don’t have to sleep with (?) that feels wrong in the opposite way - action instead of inaction"},
{page:454,type:"ideas",lines:5,date:"Nov 8",text:"Last night, daddy helped me with my magical rituals deck by telling me they’re all good as is - idk if he’s right - it was funny to witness him read them out loud and he said they made sense - made me imagine him performing spells.\n@@PB@@\nNovember 12th"},
{page:455,type:"day",lines:5,date:"Nov 12",text:"Spent most of yesterday at Primo Passo. It was nice. Also spent a while on my diagrams at home and texted Evan. Could design possible worlds\n\n“lil’ zoo for tiny red bug!” - sage ryza “” - the bug gazette - Jonathan\nNovember 13th"},
{page:456,type:"dreams",lines:13,date:"Nov 13",text:"Had some sort of half - thoughts (half-asleep/dreaming) I thought of a joke that I thought was really funny and then was like “no, it’s not - only in this situation” and now maybe it <em>is </em>funny I think - I woke up and I had been having a dream I only vaguely remember about being in Jonathan’s mom’s kitchen with his mom and maybe his brother and they were talking - slightly anxious, but just about their day. I woke up and then, or because (pic) sort of interlocked fingers, and thought was: “Oh my gosh - I was <em>just </em>dreaming about you” but it wasn’t about him exactly - his mom and bro and their kitchen."},
{page:457,type:"day",lines:16,date:"Nov 13",text:"Anyway - I had to let our hands fall on my forehead so as not to disturb my shoulder and then I had a Tot that started with the spirited away movie where Haku shows her where the boiler room is, and this is never explained - he can just do random magic, which could bother me since I like rules. Anyway - J had been talking about how he was half-asleep the other night - hopped up on caffeine till 4 and couldn’t stop thinking about painting - just imagining it - so I thought maybe I could see him thinking\n@@PB@@\nabout painting in his mind, especially since our hands were draped <em>right </em>over my forehead which was the exact place for Sen’s movie. And yeah - I got a little - a golden smear a surprising smear of light going in at the corner of a wall…and now I know how to paint"},
{page:458,type:"dreams",lines:15,date:"Nov 13",text:"I had a dream about a notecard where I had drawn a line of open olives, and two other chains, all tapering as I got lazy. I realized that the hidden mechanism was that I needed to invent the containers <em>and </em>what was in them, but needed to do these two processes separately - and I knew - if i <em>looked </em>at the notecard, which is luckily still in my mind - I could pretty easily ascertain the drawer pull to find the pattern - but I don’t wanna do it yet, cause it would just make me crazy. Maybe obvious, but the pattern collector makes extra sense if you see my brain as uniquely capable - one of its main systems of movement - you give it an assignment, and it just <em>runs </em>with it - starts thinking of examples in"},
{page:459,type:"ideas",lines:25,date:"Nov 13",text:"the background ex. these weird things I was thinking about at J’s house were <em>normal </em>for me then - I was <em>always </em>thinking of weird sculptures when I closed my eyes I guess - when we spend a lot of time together - me and myself - we start playing games with ourselves, or else we would get bored - no need to bring books around anymore…I could make a “pocket book” and carry it in my purse - of all the thoughts that I’ve had ex. the hoonies, using them as an inspiration for the day (part of the pattern which includes: the coins I designed and the pattern of the day (hawaii) and then I could have these <em>exact </em>same thoughts again…also the development of autopro → assemblation → hidden mechanism, and whatever is next, I’m excited to see what comes next, I guess…\nI suspect that there’s something hidden - secret - in, for example - the hoonies (the other option is: it is nonsense, the other option for others is it has been done before…an idea - to create a timeline of when my journal turned crazy - when I started ToT and pre-tot for example. I think the idea that I have is that: I <em>think </em>I keep writing down the same thing, but I am approaching it from different"},
{page:460,type:"abstract",lines:16,date:"Nov 13",text:"angles, and there is something else, internal. And, so anyway - probably not the most original idea (best timing) I <em>know </em>that but - just the idea of: “switching things” - ex. genius e.g. - that’s a <em>genius </em>idea, but it’s <em>not </em>in the category of genius, but it does mean something consistent, and I think, in this case, the idea was that it was cohesive towards succinctness - like a call back in drama, but not in drama - the stuff bar - my novella (that no one’s read lol) - x I was called genius - the only thing in common)…anyway…- the painting thing - that was genius - no loose threads - it all fit together - and it was a call back. I think I thought of some actually more specific examples but now, all I have are these retarded drugs\nI’ll write these down"},
{page:461,type:"ideas",lines:24,date:"Nov 13",text:"just to get them out of my head, but: a vending machine of moments packs of moments (and I could go chronologically back and write things I remember in my journal as if they happened yesterday) - and put them in my small white cabinet or gradually turn my casita into a less and less functional house and - moments in the cabinets, store-bought things on shelves (a card rack by the door - uncommon sentiments (even name of company could be) and the other idea I would ?i had in J’s garden (in real life, not in a dream) a clue board party - everyone dresses as the guests and we kill someone by the end and have to figure out who did it (Austin had a party like that\n@@PB@@\nbut I’m more interested in the vintage aesthetics, and having people walk around a game board instead of interacting naturally - if you want to hit on a girl, you have to roll for it - ok actually I do kind of like this party idea and I could tell Evan…and if you want to chill, you can stay in the lounge etc. one of the rooms…just need to get fabric tiles and make em look like game pieces…Anyway…ok dream x memory x real ✓ recall - I went to the farmer’s market -"},
{page:462,type:"day",lines:17,date:"Nov 13",text:"he got things like swiss chard and then had to get back in time for a haircut. yesterday we went to his garden instead of primo passo cause I said I couldn’t get out of bed. Then we went to the reel inn and had a glass of wine and he got drunk cause he hadn’t eaten anything all day and we sat by the fire and I said bye to Cory on the phone. We went to Erewhon and spent a long time critiquing his painting oh yeah and: made him cum just by fucking him <em>real </em>good mentally it is very nice to have power over someone like that but I do feel self-conscious and then we took a bath with all the lights off except his “his and hers” candles\n@@PB@@\nNov 14th(?)\n(missing: boring)\nNov 17th\nis Jennie’s birthday today or tomorrow? Went to Ricardo’s Holly’s b-day last night and it was <em>so </em>not funny but it was perfect -"},
{page:463,type:"day",lines:20,date:"Nov 17",text:"perfect for taking pictures. I liked the people, but I didn’t really want to talk to any of them - I kinda wanted to go home and sleep. i was so sad this morning cause J didn’t text me. Why would he? Nothing I can do but…maybe there is…he’s not that complicated - I can probably just text him whenever I want and maybe if I ask him he’ll marry me - I don’t want to, but maybe he would. Once I get sick of him not listening to me then I can up and leave and marry a woman. I’m over Sean - I don’t even really <em>wanna </em>talk to him - <em>Now </em>I’m rejecting him for a different reason - it’s cause he has <em>nothing </em>interesting to say - I’ve heard it all before and his life philosophy is just <em>wrong </em>in so many ways listening to him talk to Henry was - Henry sounds so dumb on the phone. Does he really think it makes sense to say he wishes he was more social, or wanted to be, so girls would think he’s more social? That’s a level of loser that I can’t even"},
{page:464,type:"day",lines:22,date:"Nov 17",text:"accept without judgment like I told J I could accept anything and didn’t like anything - looking up at the moon waving through the trees. I could get really good at painting, but I don’t care to. i can’t tell him that or anything cause he’s in charge of my mental health. I kept thinking I could (should?) tell him that, but then when I’m with him. All of his problems, I’ve already solved - I know <em>everything, </em>including how to be happy: maybe this is true - he has one quality that I want - realness - he can’t pretend to be other people. he’s mean but not passive aggressive - TBH - I could have social anxiety - like going out without a coat - he probably <em>should </em>stay in his home…everything he says about his feelings he gets from his therapist and I don’t think it’s right. girls need to explain feelings to boys and I can’t trust anything he says about me because he never takes the time to get to (know?) me - he’s preaching to a stranger - in a relationship with a stranger. he said he likes to baby me - I like it too - I like anything.\n@@PB@@\n…"},
{page:465,type:"day",lines:23,date:"Nov 17",text:"Dark in the bar last night - could think but it didn’t feel the same - it was darker. Food, and that was nice - I <em>never </em>get<em> </em>my needs met when I’m not by myself - precedent is the relationship as it should be because Maslow was backwards - that’s the perfect irony I guess. Or it’s more nuanced than that. Something causes it to flip - there’s a switch - that flips…I think it’s still valuable because of the order. I wish J could understand about the abstract structure underneath art - god knows he doesn’t deserve it - no one does to be honest - always looking for someone who will <em>actually </em>listen to me. I don’t think M would understand. And I don’t <em>want </em>to tell her. I’m straight. J <em>could </em>understand though - I <em>know </em>he could. i think he will. I think I’ll talk to him about it at some point. maybe while we’re camping. I’ll tell him I’m brilliant and I understand everything. I’ll tell him dating him feels like dating a boy in my class who has not learned my name yet. <em>And </em>I’ll finish telling him about everyone being fans of me - which is <em>true </em>and also a brag - <em>yes</em>\n@@PB@@\nwe <em>do </em>exist."},
{page:466,type:"day",lines:22,date:"Nov 17",text:"My two contradictory thoughts I have periodically - oscillating, like Holly hating everyone in the club and having a good time “It’s <em>not </em>OCD - and there’s a <em>reason I </em>can pick up on wavelengths - I’m psychic - it’s a fact and I can’t have a therapist who won’t accept that cause that’s the basis for everything. And two: now - it’s <em>really </em>just my brain making stuff up - like - I had <em>planned </em>to text J his playlist of sad songs cause I <em>know </em>what he would like. But then i thought a bunch of thoughts - mostly bad things about Sean, and suddenly I didn’t want to. <em>Maybe </em>everything will be ok if I don’t put myself on a texting desert - the 1st step is the beginning of this entry. Feeling whispy - don’t like feeling whispy - the new opposite of woody. J’s paintings look like he <em>really </em>knows what the scene is - he’s <em>really </em>looking at it. Mine are: “hmm - it <em>could </em>be like this”…because I’m meant to draw what’s in my imagination - feeling whispy (?), and that’s because I’m describing something whispy - like the future, but not…"},
{page:467,type:"ideas",lines:17,date:"Nov 17",text:"Think I may be witnessing a sugar baby situation and I can diagnose the feeling as uncomfortable, like my 1st (?) “(not the ? u think”). Anyway - I was feeling (still am?) a bit confused about what <em>exactly </em>to do w/about my many diagrams that I newly like but I don’t know what to do with/don’t know if anyone else will like them…rewatching - have the thoughts again - Charlie and the 1st time I met him - hard to believe - make little journals and insert the diagrams - that won’t work - find a way for it to work - make a lunch box for it - a brief case. A diagram game - possible worlds - ONLY FOR ME - LONELY FOR ME :( - go to oxnard and live there - wear my rugrats shirt everyday - be sad that the sleeves are so short and the bottom is so long - oh wait - they’re not - it’s the opposite! So you can be happy."},
{page:468,type:"day",lines:24,date:"Nov 17",text:"I thought it would have been nice to read my journal entries about him when we read his out loud - stuff about the moon and how saying “no to people” in the right tone - haha - that’s funny - not a bad journal entry tho - a lil’ dramatic maybe - matches what I already thought of him but I don’t know when the moon is full so I don’t know everything - I am unsure about a lot of stuff but I’m hardly wrong - I’m sure sometimes, and that’s when I’m sure - people should listen to me when I’m sure - mommy and jonatahn - i like being unsure about somethings because it means I can be sure about others. I’m addicted to negative feedback from J cause it means <em>f </em>idk - I didn’t like Chelsea telling me I was a celebrity - I don’t need the ego feed - I just want to not be wrong. Sean’s journal is all about me, and also all lies. I didn’t see him today, even though I went to his house and had my keys - I found his to do list and asked which one he was on. My favorite one was: “swim?” Talked to the guy last night about buying a hot tub from costco so much that if we’d talked about it any longer, we would’ve gone there and got one.\nLATER - REEL INN"},
{page:469,type:"day",lines:6,date:"Nov 17",text:"I feel horrible, I feel wonderful - the sun is wonderful - about to disappear - green leaf, and the water going trump tum tum tum tum - oh how nice - the magician’s nephew, and the weird wonder they must have felt - a <em>new </em>thing - no one’s <em>ever </em>discovered it - science - magic…"},
{page:470,type:"day",lines:23,date:"Nov 17",text:"The torture is making me feel human and is perfect and lovely, and nice - I’m starting to appreciate it - I cried in my pink chair - and suddenly picked myself up “hurry, hurry, hurry” - talking to the people in front of me on the incline, the two little girls yelling at fish to go a specific way - so young and and childish, but I’d probably do that - now you can read this, and go “ok, you’re so <em>wise </em> - intelligent - not a <em>fool</em> “what if I <em>want </em>to be a fool. What if you’re sitting next to a stranger a fire in your own home. Your brother will know me better than you if he sees me - talks to me - maybe they they have more of those banana things. I do not want to think of any new theories - I have enough I have too many - I could rethink of the ones I had before. I could use the diagrams as concepts but what if I don’t want to. What if I can’t go on a trip because I have to go home and do my diagrams? What if I refuse to think about whether I should do this or not - what if I make myself happy.\n@@PB@@\n<strong>CONT - ATE</strong>\nI don’t know why i think this is - the answer -"},
{page:471,type:"ideas",lines:2,date:"Nov 17",text:"to make a bunch of tiny books that have my journal entries - typed - but I don’t even know if they should be typed."},
{page:472,type:"abstract",lines:18,date:"Nov 17",text:"Earlier today i was thinking about the <em>criteria </em>for saying something. I think of it like this (and if it follows all of the check marks, you can sit (or think it) And you can maybe <em>change </em>the check marks - temporarily - with different people and {permanently} on purpose - with therapy (or self-therapy - experimentation…should I change the things I say? Should I say more honest things/ Should I say things that scare me - ask M if I can hold them - tell J I’m in love with him - in <em>love </em>- not love - <em>in </em>love. Maddie said OCD is caused by being unok with uncertainty. Should I lie to people more? Should I hang out with people less so I don’t have to lie to people more? Should I devise a strategy so that I can go trick or treating <em>everyday </em>- get and give random trinkets - a bartering society might work if none of the things were valuable"},
{page:473,type:"day",lines:26,date:"Nov 17",text:"Thoughts that are so dumb that they are true - they have not been thought of cause #Q4 - they fit <em>2 </em>criteria, but not the one about it mattering. And of course, sometimes things change, and then it matters. i could have emojis of my diagrams, so I could use them at will - I could use unicode - or I could get Sean to code a program to use unicode. I love Sean, I miss him - I’m mad at Sean - I don’t miss him. Maybe I’ll break the rule I made at the stop light 6 years ago and tell him I love him (in the same conversation with myself where I said I don’t want to figure out his brain - well now I’m out of love with him and there’s nothing I can do (I’ll probably change my mind next time I see him) Here’s a thought: Johnny explaining obvious things to me. Curate it next to him telling me that I am boring. I asked if he thought I was boring and if he thought I was a fool. i don’t like him for saying that and I asked him to say it. i want to know specifically <em>when </em>I was boring just like I want to tell him to stop accidentally showing me his texts with Emma cause it ruins my mood I don’t like him I don’t want him I hate him I really want him I love him he’s ok but maybe it’d be nice to have a 15 minute picnic with him"},
{page:474,type:"day",lines:32,date:"Nov 17",text:"in the park where they gave me a blanket and all these clothes and I still feel guilty what a strange thing to feel guilty about. Maybe I should get a therapist so i can tell them that and then i would only need a 5 minute session - 2 minutes to tell them, and the back story, and 2 minutes for them to tell me not to feel guilty. I could use the rest of the money that I saved to buy a sandwich, and eat it in front of them if there’s a minute left cause they already made me feel better about it or because buying the sandwich made me feel better about it. I’d like to read a paper on why everything Jonathan says his therapist says is wrong. I’m worried that I won’t get the perfect piece of pie or chocolate chip cookie when I inevitably go to pepperdine. Happiness is knowing that there’s no one I’d rather be here with planning to go to pepperdine with than myself. Here’s another thought to think: contrast the instant relief that turned into beauty and then magick when I lay on J’s chest and got his perfect gray shirt wet with my hair, and the fact that he wouldn’t let me read out loud my journal and probably never will. I told him that I can be friends with men and then I wondered if\n@@PB@@\nmost of this journal entry is going to go missing when I type it up. But - it’s cheaper than therapy! I’m confused because I found out I <em>do </em>want to leave, but I can’t cause I’m scared to ask someone for a to go box but now that I know - I <em>still </em>can’t leave. I’m debating just taking my whole actual plate"},
{page:475,type:"day",lines:21,date:"Nov 17",text:"but I have to make a distinction between this place and other establishments or else it will undermine my whole system. the savior thought is that if he got to know me better - actually listened to me - he would - the combat thought - emma is so funny and fun. Sean is so funny and fun…at least I remember thinking that. I feel guilty that there’s so many people here and I’m just sitting at this table by myself. The saving thought is that there’s more room outside. I also come here a lot - but I’m using that thought for something else and it would topple the structure if I tried to take it out and use it for something else. I want to text Evan but I’m not going to text evan because I don’t want to text Evan. I’m considering a new criteria for my thoughts which would be to only use thoughts that are paradoxes. I think that would make my mind look really weird and hopefully no one would notice. just kidding - I would do it <em>just </em>so that someone noticed.\nCONT. Pepperdine"},
{page:476,type:"abstract",lines:23,date:"Nov 17",text:"I endeavored to read all the philosophy books, as J advised me - the “irony” of me telling Sean to take sociology only partly escapes me. I did not get very far, instead, I came up with some reasons why they’re too hard to read, and I solved them like I knew I would be a better teacher in kindergarten. The original solution is: abstraction, specifically, progressively more detailed (less abstract levels) the rebuttal is redundancy, and the counter-rebuttal is that it doesn’t matter. The eventual solution is: equations curated then me - explaining every concept, having a conceptual library (that people can learn once) and then: is applied, like punctuation at the beginning of an idea (not sentence) - this is such an obvious ___ that I <em>don’t </em>know why it hasn’t been done. On the way there is “going back to picture books” (”they’re not just for kindergarteners”) the addendum - I forgot because I was angry. Sean has no interesting thoughts or ideas - he is himself an idea - an animal. And I am an animal to J since he sits with me often but does not know my mind.\n@@PB@@\nCont (kant)"},
{page:477,type:"ideas",lines:12,date:"Nov 17",text:"to answer the question that everyone was wondering about - the answer is maps - maps of meaning (inserted later: drawer pull: that map instagram ad where you stamp, and then the idea is: i could do that with my stickers, make little maps (and the maps would maybe be various cognitive structures, ex. referral, and set theory) and I could “stamp” them in (or make stamps out of them (…? why? - just depends on how often (and in what situations?) I’m going to need them? (are they more like punctuation? or stamps to collect? or something else…something in between…)"},
{page:478,type:"abstract",lines:39,date:"Nov 17",text:"All this time I wasted and men think logic is real - believe in logic - the (faulty tools?) of their own brain like god - and love explaining things. And women don’t write philosophy books partly because they know it’s stupid probably) and I would like to learn about which witchcraft in a logical/scientific way. Jonathan always thinks I’m angry when I’m sad, and doesn’t have his own ideas and projects his shortcomings onto me and his therapist, like South Park Brandon, is behind everything he says. Ah yes: the addendum - metaphor. Priming. This will feel too precarious to people so it should be done without them looking. And now I can tell you the intermediate idea) which is to stop starting from the beginning and assume people know stuff and their time is valuable and to start from the end race to the middle and <em>finally </em>get to the beginning like the way that you did - e.g. introduce it in the order that you thought of it, or do not assume that the order can change, that the order doesn’t matter - permutation, combination (the difference between). Soon books will be all symbols and they will take one <em>minute </em>to read. And: people have their <em>whole </em>own world of thinking about things and they communicate it in a book like a painting - like the part I’m interested in in a painting - and that’s the reason I’m interested in painting. Not cause I like looking at things - I like looking at people looking at things, and myself; looking at things. Therapy: I am interested in neuroscience. And that time I explained to Sandy how I like anthropology, not history, he was a scarecrow (”they’re related”) that’s not the point - it <em>doesn’t </em>make me angry that people refuse to acknowledge basic logic like I wasn’t angry at ms. Zhu until I thought she was intentionally manipulating me - just frustrated."},
{page:479,type:"ideas",lines:12,date:"Nov 17",text:"I have found a complicated way that involves a lot of busywork to make all the symbols I have made “useful” and there is <em>no </em>progression to the work, and <em>no </em>tab to pull to get it to start. Oh, I suppose I could talk about drawer pulls and cognitive vehicles to get you to understand something. Doesn’t anyone think it’s weird that they don’t and no one has actually understood what I am saying? Anyway - it would be nice to write a booklet with a map on the cover that sums it all up. And you can learn the symbols progressively throughout the book."},
{page:480,type:"abstract",lines:27,date:"Nov 17",text:"Is instrumentalism an interesting idea?\nBasically tells you how to “fire your neurons” or maybe one level less abstract. I keep thinking of the socks and the hearts as an example - an example of disconnectedness…one system of movement x concept v is the cluster of ideas - this (as we know) is how we form concepts (an implicit question that I’ll start by assuming is true) is that concepts can also be backwardsly communicated in this way.\n@@PB@@\nHere is a concept that I think is pretty clear and shouldn’t be too hard to communicate. The idea is a comparison (metaphor) between philosophers accidentally exposing how their mind works by the system they came up with to understand things to themselves, and <em>me </em>being interested in painting because of the story it tells about the mental state of the artist. So it would be: (venn) (comparison)\nphilosophy books (pic) (interestingly, in the <em>symbol</em> of the book, here are words on the cover - not “cover” words, but page words - because it is a <em>drawer pull </em>for philosophy books, and can be as far away from a <em>representational</em> depiction of philosophy books as it wants, so long as it is successful in its job of pulling the concept to mind.\n(pic)\n\nand: the “action” is: extraction.\nextraction towards (⇒) extrapolation. So:\n@@PB@@\n(pic)"},
{page:481,type:"abstract",lines:27,date:"Nov 17",text:"Oh, I guess the next step is to wait: a predetermined amount of time and see if I still understand what the diagram means Q: does the concept come easily to mind. Q: any improvements?\nCounter-intuitives of essay writing ⇒ communicating a concept\nsolution: 1: abstraction (pic)\na concept should be explained in gradually increasing levels of abstraction. This replaces the building blocks idea (pic) in which A and B are stupid and useless, <em>and </em>you can start with C, and then get back to A and B, which is how the idea was thought of in the first place. As a metaphor: telling stories where you ask questions. because you read a map before you can fill in the details - trees are not interesting or important, otherwise it’s like: (pic) and (pic) bushes, and (pic) a road\n@@PB@@\nand none of this means anything if you don’t know the relationships. So, instead you should start with the map: the big picture concept (not just for (Sandy said) also peasants and start with “there is something here” (pic) The “something here” is nothing, and it’s the way that things get “so small they disappear” at larger levels of abstraction like larger and smaller things behave differently, then medium sized things\n(missing: productivity (because I didn’t do it)\n@@PB@@\n<strong>CONT - HOME NOW</strong>"},
{page:482,type:"day",lines:21,date:"Nov 17",text:"Had a whole little adventure trying to get to erewhon on time (failed) and then now, trying to figure out how much/ what to eat. Rereading my entries and re-remembered that I was <em>almost </em>done with so many things, case in point - i was coming close to finishing all those ToTs and that was pretty scientific. Also the presentation. Also I made a whole outline of the book and read through it and it was good! I just need a deadline. What else did I almost finish? The Hoonies cards - they were all set to get printed, and then - got distracted. At least I have a <em>record </em>of what I am/was working on, so I can know how close I got and how many times I almost finished things. I almost finished typing out my September entires and reading them back, and figuring out <em>what </em>I was thinking that whole time. Oh - I guess I could finish printing all the ?) diagram stickers (and figure out what to do with them after) so I could finish what I was working on.\nNovember 18th\nJennie’s birthday."},
{page:483,type:"day",lines:27,date:"Nov 18",text:"I looked it up last night and reminisced about when bob saget came to my house and was as tall as my stairs. Went to the Reel Inn but didn’t get anything - didn’t stay in the parking lot - I went in and went to the bathroom. Instead of doing my work early before I went out, I went to Kreation and got a <em>wonderful </em>meal that is supplemented with hummus, avocado, and chips from my backpack (the meal was two poached eggs). All of lunch I thought about how I should have stood my ground and said I didn’t want as many raisins because I <em>do</em> like the taste of dates (next time). Then she thought I wanted to close out so she got a smile after all. I thought about how sometimes I can finish projects when they are <em>just </em>for me, and later, on the PCH - “too useful” (UUUM) which I miss, in theory. In practice I’m glad I have a good relationship with the internet and I don’t go on my phone that much like maddie and i’m not lonely like evan or depressed like Jonathan or crazy and strung out on not thinking, emaciated with anemia, coming to my house like he’s been up all night drinking and sniffing kitty litter. If someone showed me a picture of him and someone who’d been on meth (crystal meth) with just the eyes - I\n@@PB@@\ndon’t know if I could tell the difference."},
{page:484,type:"day",lines:20,date:"Nov 18",text:"Today I was freaking ecstatic looking at the mountains (clear, clear) - I could paint them better - painting them is just dealing with my anxiety of being with J. Of all the funny things one is that he thinks I am bad at painting. Today, as I was coming up from the incline, I saw the sun - bright - like an orange glowing orange (bell) in my rearview mirror. For one second it was then framed and perfect (pic) - straight between the sea and the sky. And then I reached for my camera to take a picture and it was gone - some stupid SUV - the back hump (ew) was blocking it. Now I am eating - pie - surprised I can eat so much of it. Boiled two eggs. At the special starbucks in malibu which is where I went after coming home and seeing Pilar in my room, going straight out, then back in to get my keys - drove down PCH - whoops - all my work plans down the drain but I worked in the end anyway - enough to say “ok - that’s enough work\n@@PB@@\ngoodbye pretty sun"},
{page:485,type:"day",lines:38,date:"Nov 18",text:"I moved my stuff - trinkets and shit - the 2 sweatshirts I bought that blended with the black of my backpack and then, instead of the kids sitting down, it was an old or heavily makeupped woman who smiled at me before closing the blind - my whole reason for coming. So then I had to sit there in mad silence till I opened the blind again and then left cause it was so awkward and I had 40 minutes and then an hour to work. My hatred of slow cars is slowly building after 1 2 days on the PCH. Ended up saying “I have too much time to work” in the end, though I didn’t finish, but I got most of my stuff done. Kind of <em>maybe </em>want to drive to Pepperdine again - can’t imagine doing it again and again but…it’s possible. Dreading hanging out with Sean. Wish we had planned a time to hang out with J. Maybe then I could stop thinking about it. Going back through all (all!) my old journals, and all my projects are rising up, like a tidal wave to meet me. All the nice little illustrations that ask: “What is meaning, really? “When something that was never meant as a symbol is now supposed to be and especially considered art - no - it’s not art - it’s <em>still </em>a symbol…today I decided I can change my mind - a revelation that’s happened before but not often. Am I going to work? No - I couldn’t get out of bed with that prospect - rose quickly when I wondered - where <em>was </em>that second june july notebook anyway (and I found out that I was writing in notebooks even in january - confusing cause I’m surprised - helpful cause it rounds out my project - an exact year - a year of journaling and you think it’s gonna be a nice memoir, but it’s all just fucking crazy. Worst idea ever (it might even make it into my “worst Ideas” box - print em’ on the insides of egg shells? pillows? no."},
{page:486,type:"ideas",lines:8,date:"Nov 18",text:"Make them into fortunes - you get them when you open a fortune cookie - or something that has a relationship. A 2 person relationship with no room for a third - and the fortune is one, and the cookie is the other [diagram] is to {{concept}} as ? is to ? (pillow is to tag ex. but no…cookie is to tag (pic)\n@@PB@@\nI wanted to write (so this solves <em>3 </em>problems) ← “don’t forget that #”"},
{page:487,type:"ideas",lines:24,date:"Nov 18",text:"I could type up everything, and then apply the diagrams as stickers. So stupid, I just might finish it (so crazy, it just…)\n1. I want to go back over my thoughts/memories like rewatching the office, for example: I want to recall all the stuff about memory recall, for example\nSo (as it goes in my head): step one: type up all the entries → Step 2: print them all out…: step three: <em>leave</em> a space for the diagrams and pictures (should I make it hand writing - font - should I make a font that approximates my hand writing? Should I rewrite the same thing as a “bible verse” (that’s another one…the bible day - rebuttal - “but I always realize it’s fundamentally the same - original argument - I won’t write new stuff. Oh: also: the Tots - the equations - the tray idea which led to them. Oh yes - my one interesting thought of the day: End: “(drawer pull?” (caboose): the 4th quarter is now like <em>half </em>my thoughts - pre Tot: I’m oh yes. more cocky, then you could ever imagine - and if it’s too much for you - I’ll backtrack, pretend I’m not - are you kidding? No, I am not. Oh, I mean: yes, I am. then: “oh, ok.”"},
{page:488,type:"abstract",lines:41,date:"Nov 18",text:"I want to write about: the instruments of abstraction idea that I was doing on the beach x at temescal - anyway - no one (mid Tot) could believe my brain and that is\n@@PB@@\nbecause most of my thoughts fall into the category of 4th quarter - they’re so crazy you can’t say them out loud - ex - it’s not that I haven’t read philosophers, it’s that I have, and I think they’re wrong…see - you can’t say that out loud. it’s (?) and. and no one would believe you. So that’s maybe where all my (no one understands me, everyone is attributing my actions wrong) comes from - Sean does maybe, but he can’t comprehend things like why i would actually be interested in learning stuff - he’s a child and they are both too toxic - I have that ellipse in common with evan and Maddie - I want everyone to get along. - anyway - perhaps I need like 3 rewatches before I can even consider making - anything like equations or “tray idea” (oh, also: win win win - ex. of 4th quarter (similar) - something about J lying to me about Emma, or not letting me read their texts…idk…ok - I could use my diagrams instead of hoonies cause my mind hates AI - this morning I wanted to write but had nothing to write about - I could zoom them into random diaframes (NWWD) ex. ☼ or □ → □ → □ and see how <em>that </em>works out in my mind - could give me a headache, seizure I <em>don’t </em>think it would slip me into a coma and I always have “oh, you’re crazy - no one knows what you’re talking about\n@@PB@@\nanyway as a (pic) fire extinguisher. I could <em>go to </em>the special starbucks AND pretend I am <em>remembering </em>what I wrote in my journal. “ooh, when they find out, they will be soo mad” like when Becky and I hid under the desk - they’ll be mad that they listened to me explain it for so long. (and no they won’t get it and I can write in my new journal which I will have: Pre-Tot about how mad I am at them - how annoyed. Ok but here’s an actual problem that could maybe be solved:"},
{page:489,type:"ideas",lines:10,date:"Nov 18",text:"I need to quickly recall, chronologically - what I thought about last year…and, I need to write it somewhere. Solution - I go <em>journal by journal forgetting </em>the typed part - I “put” stickers on the front, (and then just keep them in a drawer - I make <em>many </em>envelopes with each idea in it. I pick a card of the day, and put it in my card holder. I remind myself to make rules for myself: “no talking, no eating” and I say to myself: do not forget: make rules for yourself. Here’s another idea:"},
{page:490,type:"ideas",lines:11,date:"Nov 18",text:"combine the STAMP book and Bingo ideas somehow ex. have envelopes in a stamp book, and whenever you collect an example of that diagram ex - something that is on a pedestal that should not be or competing patterns\n@@PB@@\nyou put a little (special) notecard in it (the envelope And, in fact - if I wanted to work harder not smarter, I could <em>make </em>specialized notecards for each bingo thing - question: how to make it look like bingo. Answer - hang it like this: (pic) with cloth pockets ()advent calendar\nNovember 19th (12:20 so technically 20th)"},
{page:491,type:"ideas",lines:16,date:"Nov 19",text:"My thought in the bathroom was how (as the preToot - me trying to describe my night out with Ricardo to be both <em>interesting </em>to me, <em>and </em>descriptive - because it has <em>2 </em>purposes - 1 to make me not hate myself when hearing it back and/or to be sort of interesting in case someone finds it - I’m not sure which is motivating my action to be honest and 2 - to describe the night so I remember it later - I don’t know which will matter more to my future self (I like my examples better - none of them involve bombs (cat)) ← not related\n…so I designed a map which would have (criteria) (pic) and competing patterns (with the additive property in the middle of them? Some property) - and now - on the couch, I’m thinking it’s more like the double envelope but"},

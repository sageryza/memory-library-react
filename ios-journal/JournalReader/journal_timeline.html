{page:118,type:"day",lines:48,date:"Mar 14",text:"wasn’t a waiter - was a waiter in training, brought us (pic: banana cheese cake) and then another bread pudding which he said was tiramisu. (pic) I told Sandy this was my favorite part of the trip, esp. when our waitress shooed him away like he wasn’t worth bothering with. Dessert is better when it’s just to reach the right dollar amount. before that, we had (pic) dinner while watching the sunset and watched the sun through the monocular - it (pic) the sun - fit right in mommy’s eye. Sandy was driving the big boy car, and said Jordan is looking for a life partner…talked to a woman from wisconsin (pic: 14 ft) swam with manta rays.\n(pic: pina colada) (pic: the three pieces of sushi that were up for delivery)\nate too much at dinner last night and felt full all night, kept feeling my stomach to feel the bump - it was still there - but I imagined it not being there, cause it wouldn’t be there eventually. Sandy and I had trouble with the air conditioner - long drawn out discussion about it, as if we were holding our cards close to the chest but I don’t think we even disagreed. Woke me up a bunch of times - I guess he went surfing, and washed up etc. Hard to get a good night’s sleep. Talked to J the night before and he said some nice things - I can’t remember what, and/or couldn’t\n\nhear him at the time - I think he called me babe. I watched the total lunar eclipse from the parking lot while waiting for him to call me back, and daddy was waiting for Faharzad to get there, and we were waiting for mommy and Sandy to get back from dropping off our bags at the hotel and checking in. Lil’ argument about whether we stayed at the Westin or Mariott last time. (pic: java jazz, steve, moon, sun, waiting for j to call me back..) (pic: mariott, westin - they merged cause mariott owns westin so Sandy was right - reality, mariott westin)\nI was disappointed to not be hungry for breakfast, cause there were so many things I wanted to eat. (pic: parfait, me, comes out here, the cinnamon rolls sandy told me about, all the things I couldn’t get at breakfast 🤪, mushrooms, spinach, omelette station he offered to make me an omelette, got sandy some half poke yesterday, and used the empty extra salmon scoop to bring the omelette on the plane :))"},
{page:119,type:"abstract",lines:88,date:"Mar 14",text:"I started to think I could see exactly what the little boys in the jacuzzi were thinking, and what they’d become, trying to be objective, not swayed, to decide if the little girls in the pool would become pretty. It was so clear I was seeing “into the future or into their minds and idk if it’s facial expressions (common ones that get etched into the face), or the intrinsic pre-existing laws of the face itself. (pic: they were plotting and scheming - would they be evil to girls in fraternities?) SO ANYWAY WHAT ELSE - on “friday,” our family took our old white telluride to lunch at some food trucks that were the best lunch we could’ve found, but daddy said there might’ve been better…then we drove to a long pier that people were jumping off from and looked through the monocle and I found a piece of coral that I used as trioculars, cause there was one spot where you could see through three holes. At Duke’s the spot skye’s family picked (which is the same as the one in Malibu), we got two desserts - two kinds of “hula pie” and skye said just macadamian nut, but Cayla and I wanted to try the S’mores pie she described, but then Cayla said she didn’t like it at all. Like three times. After my conversation topic failed at the airport and also on the plane, I said to everyone at dinner “how do you feel about codified communication, and Sandy\n\ncorrected me to be that I meant “coded communication” and Sandy said Skye is a contrarian, and tactless, and doesn’t know what she’s doing. Then he said “coded” only applies if both you and the person you’re talking to have the same understanding and that there’s two things - one where someone doesn’t understand themselves, and another where they’re trying to communicate something in a code, and skye does the first, so which one is it? And I said latter cause that’s not what Skye does. She’s a bully and she wants power (though I snuck that in before). Mommy wanted to get out of the car early and daddy said: “I wonder what that’s code for?” And Sandy said “maybe she wants power,” but neither daddy, nor I thought it was funny. After Sandy left to get three bars in a bag (and he got mad cause I took a bite out of one but i didn’t care) and yogurt cause he couldn’t have the bread pudding cause there was chocolate in it but he threw the yoghurt away cause it had synthetic flavors and ate the bread pudding, despite the small amount of chocolate sauce, I asked daddy and he agreed that Skye isn’t as stupid/innocent/unaware as Sandy tried to portray her as. Sandy said Shayna does it on purpose, but Skye doesn’t. But - and daddy asked me if he uses CC and I didn’t answer, and he said yeah, and that I do too. (pic: what we want codified communication to get us there)\n\nin order to get what I want, like, asking why we want to do something, knowing full well, and that’s not the point, it’s to get our way. I said - he said - not all desires are equal, cause I said, what if we were empathetic - and I pointed out that how much you want something doesn’t often match how much you decide to use codified communication. Then we stopped talking about it.\nWent in the ocean yesterday, and it was so clear, and they tried to find where Sandy was jumping off and daddy said he didn’t do it right cause he just sort of fell (I said it’s good - to not be scared, and do what you can). After our drive through the jungle, we found a cave that was long and flat, and there was nothing to do in it. The mahi burger I had at Dukes was the blandest ever. I bought hot sauce from one of the trucks. I got a keiki veggie bowl from brazil truck and then a (pic) salad wrap from health hippie truck. Sandy and I almost shared some yummy peanut butter and banana thing, but we got a green juice instead, and daddy got an acai bowl, and then it started to rain. BACKLOG - On the ?first? day, everyone went on a 2-3 hour hike that was 1 hour away and mommy and I skipped out and walked twenty minutes to a town and she loved all the textures at a texture store, and bought a shell necklace and a flower shirt. And we got ice cream - from Lapperts - a hot fudge sundae with a brownie, which I didn’t even want, but"},
{page:120,type:"day",lines:58,date:"Mar 14",text:"drew (wanted it so much that I) kept talking about it at dinner the night before after Jonathan yelled at me on the phone for not answering him and then called back and said “no more meta conversations” and apologized and said “yeah?” and I said “yeah.” before I got off the phone. I was so tired at dinner in my hood which I’d been wearing all day, and I told J how tired and hungry I was and he said “you’ve been traveling all day” I told them about the ritual mason had us do and was too tired to care about their facial expressions. I shared papaya(?) salad with mommy, and mahi mahi, but wasn’t full after, and we got carrot cake, cheesecake, and chocolate cake. I spent a lot of time sitting by the pool, half in the shade, half in the sun and it was hot, and I felt my legs getting burned. It wasn’t unpleasant, and I don’t know if it was pleasant either. I suppose I wiled away my day watching and categorizing behavior, making observations about the kids in the pool, and their relationships with their parents - this lil’ girl Molly who ignored this other little girl who’s hair was short, curly, all over the place, giving the appearance of a deranged old man (she didn’t really smile) and they were calling them both “babies” which I thought might’ve offended them. Yesterday at the cassabella next to ours, a very tan man with a huge belly\n\ntold the mobile waitress that his life was stressful and he ordered a strawberry margarita, licked the salt off the side when he first got it and his wife Crystal, still on the casa, was mad, seemed to be mad at him. Little blonde girl with braided pigtails mommy said was too cute to belong to them “what are you reading Krystal? is it a novel or is it a ;) novel” daddy and I tried to figure out what song a little girl was singing to herself, and he told me about how bad Russ was in making bets and not keeping them and I didn’t give him the satisfaction he wanted or that I would’ve wanted. Mommy got me the chocolate dipped short bread I wanted - a four pack in a bag, and daddy and I went to get poke cause Sandy and i were hungry\nI was unsure whether I wanted to remember my dream. i was at some sort of corporation and at the beginning, we saw a preview - multi-panel - it was nicely painted, but casually, in gouache - greens and blues like sea foam, and some warmer pastels - some kind of corporation, lots of things casually happening in it, showing (it was moving, an animation) business, lots of small things that looked like tissues - moving in and out of the corporation (which was represented in one of \\[my favorite\\] panels. It might’ve been an ad agency. Some of the panels were darker, and they were squarish, but together, they took up a lot of the wall. I think"},
{page:121,type:"abstract",lines:25,date:"Mar 14",text:"I was sort of interested in the work, thinking, (mildly excited) that I could probably do it myself (as if, in real life, i wanted myself to have a real job - “vocation”). Later, I suppose I went up, (because at the end of my dream, we were going down a really long set of stairs) (I couldn’t see the end and there was a girl, who worked there, who we’d been beefing, she was a more official manager, and I had a hold of her wrists (auburn ringlets, plain face) and she said “are you really gonna ‘mean mean’ kill me” and I didn’t want to, so I was thinking how I could take a step back, and talk to her to where I felt safe (I could feel the power in her restrained wrists, and I didn’t trust her/know how much to trust her) Before we went out the door, there was certainly animosity between us - as though the corporate hostile work environment evolved into something much more menacing. There was a long hallway, with high wide windows, and there were these sorts of half people who were probs ai cause they didn’t have quite enough feelings, and their eyes (pic) were replaced by hard boiled eggs, and I swiped each of them, and felt mean, but also didn’t"},
{page:122,type:"day",lines:7,date:"Mar 14",text:"trying to get him to stay, but he was cold - a pink terry cloth towel between the sheet and blanket, which he complained in some very specific way, and then, as I knew I would, found three other blankets - the blue and white one (pic), the sun/moon sea foam one and it was secured that he’d stay, but it felt to desperate."},
{page:123,type:"day",lines:28,date:"Mar 17",text:"March 17\nDate with Mick last night. He showed me his painting studio/garage and we did a painting together and talked about rules - “so many rules” - that he runs into when he paints - “Oh, I don’t do blurred lines, or use purple” (”purple is hard” he said. Ha? is that a joke?) then he started adding faces everywhere. I think he put in ladders before. And he added (a red road to the sea fam). He showed me, really specifically, how to mix it - what consistency, how the paint should fall (not in droplets but in little lines when you skip it/slew it across the surface of the little water cup). He got some paint on his face - black paint, and tried dabbing it with a rag - I wanted him to know that I knew that there were only certain places on the rag that you could dab it with. Then later, he spilled a bit of sea foam on the floor again from the water cup and had to rub it out with his foot. “color-matching” he said. We walked around for a while, after we sat at a picnic table in the back, (pic)\n\n(missing) Yesterday, he tried my killer noodle - just the noodles I’d picked out, and put back in the container, and kept saying it was wow really spicy, and then coming back for more. And then he discovered the perfect anecdote - milk and cereal. Instead of reading the UV index, I can feel"},
{page:124,type:"abstract",lines:33,date:"Mar 17",text:"“the idea on Lincoln”\nexactly how much my skin is getting burned. Tis is, of course, a metaphor. I remembered (this is the other metaphor), the idea. (I had before) - that - if I - well - the goal is memory recall - if I’m trying to think of something to write down, (pen, poised above paper - i can’t think of it - the right thing to write) - then my mind automatically starts coming up with “oh, you could write this” and it’s all the things i was thinking about, like the idea on Lincoln about how most people approximate, and allow for some ambiguity, but J tries to get it all right exactly - use precise concepts, so he’s often wrong (too ambitious) (I din’t want to write this until i got it precisely). Remembering the freedom of getting the chocolates after coming off the plane (when they were arguing about prices) - a whole box of chocolates, not un-wrapped - brand - any brand - name - how generous. When I met Mick, when we were talking, I feel like he had quite a large sieve for what i was saying, but he didn’t get anything wrong(?), to the point where I wanted to pull his hat back from his ear (he wasn’t wearing a hat), and scream - whisper, again, what I was saying, and is the genesis for people calling me weird, When I’m being nice to myself (lol 😢) and why I don’t mind Lindsay, and Evan saying it again) I kept thinking he looked like a woman named Kelly when I was first sitting across from him at the table, and then, later on (after we had both felt a piece of each other’s hair) when I was staring down at his head when we were both"},
{page:125,type:"day",lines:30,date:"Mar 17",text:"painting, I realized that he had auburn locks. Not brown, just like Dumbledore…”Oh you could write this,” - anyway…I travel backwards, I come up with a solution - “oh…wow I could do it “intentionally,” but the (real problem?) is that I can’t do anything intentionally? Anyway, and that’s a metaphor for my not being able to get stuff done - because - the very(?) part is the assumed part - (true?) I set up this elaborate automated process - but i can’t even start - the hard part is the easy part - the hard part is that it’s too easy, (and I can’t do anything easy).\nJ is “wrong” and “bad” like he always says - he is wrong about everything about me, and any empathy, or “help with my anxiety” is not actually help - it’s instrumental from the care he gives me - bread crumbs in a different boat - boat crumbs (…?) idk) and there is “upsetness” that comes from things, ex. him being wrong and bad, and there is upsetness from (even if things are good), and life is lolly - me thinking of the plan I didn’t know I had) things not being how they seem - and this is back to my dream - about people not reacting as I expect them to (I am on a different page). To reiterate: J tries to be “too precise,” and ends up weeding out, or netting out the inherent ambiguity (which is only inherent until you’ve figured it all out ( (()) → look at paintings till you understand them). And Mick’s sieve is too large: he has too large a sieve."},
{page:126,type:"abstract",lines:27,date:"Mar 17",text:"something new - the old thing, where I’m worried that things changed - I start liking (before and after “rug/christ), except this one, I think, has turned over an old leaf - I’m old, back to myself again - I knew in the back of my head, that I wasn’t always depressed and hopeless: the cold war defeats - those days on the couch, before Zach called me, and I simply finished my deck, and then finished XI and then, at ihop, wesley said his coworkers wanted hats - wanted to know where they could get hats, and imagined a whole package - a starter pack - with one blue, and one red - a place to wrap notes - if I had started differently, I could make a field guide, or perhaps I could print the others again, and change some text in blue and add a green . Oh yeah - I solved it yesterday - the field guide is the first half (?) of the (pic) and then it lets you put your own notes (do I (dare I) add specific sections for specific kinds of notes, like “where are you, what type of people do you see ex. demographic,…and: nitty gritty - any specific observations - what are they wearing; specific tid bits of convo, odd interactions with objects…all this comes with a shirt, and a hat (or a sweatshirt and a hat), and a binocular necklace (that was Wesley’s idea too somehow)"},
{page:127,type:"day",lines:30,date:"Mar 18",text:"March 18\nYesterday I went to breakfast with wesley and then mason came over later that day, and we played the diagram game I had just made, we played perfectly. I can’t remember the exact (le petit) ontologies we came up with so I’ll recite the cards - there was - some exchanging things for other things…oh, in retrospect…I wonder how accurate our descriptions were, (unpacking…why did you do something (sometimes this helps! (sometimes not)) I feel like there was something about a tunnel but no, maybe it was just the way the “light” (in my mind) was moving across the cards, either conforming, or disconfirming them. I liked - robinson chen, and his imaginary imaginary partner - trading for an approximation - the idea made sense - not necessarily directly with the cards. Another we came up with was catfish. He misunderstood the ritual science plant one, possibly due to my hasty, lacking, explanation…idk. I opened the white honeymoon bottle, which is now capped, but unfridged. (pic)…we also made some new cards….when he went to the bathroom, we imagined that I had turned into beary mcbearson and back - the transformation taking place in completion between the time that he was gone and the time he came back. I think I did a really good job selecting only the diagrams. I printed 20 cards, succinctly finished the project, and was just adding text to some of the cards when he called (I"},
{page:128,type:"ideas",lines:33,date:"Mar 18",text:"added some of it while he was there). I think, in retrospect, the success of the game was contingent on his willingness to listen to my explanations of each of the cards, as they had come directly from my experience, and there is a small - small amount of ambiguity as to the degree of his/an ability to understand something (so complicated?) explained so hastily. (repetition is not a rule, it just seems like one). Other than that, he laid on the floor and I on the couch and had a nice little chat, where we both listened somewhat equally, and were similarly interested. I felt pretty nice after and realized how many friends I have that want to hang out with me and was thinking that when I went to bed. I’m mad still, but I know that it doesn’t matter. I’m always worried that I’m deluding myself, and the situation is a lot worse than it is, but I think, like my random September entries that I was reading; that weren’t even about ideas, just random descriptions of my day, that I kept expecting to be boring, if anything, I’m \\[confusing/combining\\]  wide accessibility/usability for inherent merit/validity, and that there is a fine sunniness under everything, the color of chai tea - as though, what I have always wished - that I could be in another time, at the time right now - were possible. Possible that being silent and mad in the car with my parents is somehow worse than sitting silently by myself, doom scrolling my own journal entries - ah - now I finally understand why they had to be a a pdf. (time travel)"},
{page:129,type:"day",lines:15,date:"Mar 18",text:"and - to give credence to my wesley time - we had pancakes, he made fun of me for not eating most of mine (I really really hope that you have an explanation for this, Jonathan, so I don’t have to lose myself in cognitive dissonance)\nHere’s my plan: bolstered by me (bolster yourself) Observation of the general \\{quality of the journals I read, I’m going to keep journaling\\]\n\nun petit ontologie - book: (pic: equation)\nHere’s “another” example: little rectangles. Oh - these aren’t books, these are just little rectangles (for this project (petit ontologie (peon)) to work, cut scraps into rectangles the color books. 🔲 + 🔲 ⇒ ahh books 🔲 + 🔲 + 🔲  + 🔲 + 🔲 ⇒ ah, rectangles\n(missing: small writing)"},
{page:130,type:"abstract",lines:42,date:"Mar 18",text:"Bolstered by my inherent ability to write amazing journal entries, bolstered by that day (these days) I was at the starbucks in DTLA and watching people all day, and went with that man back to his house, where I wasn’t supposed to go), I’m going to write more amazing journal entries. I’ll bring the sunshine of malibu and driving down the pch right here to this cafe. The same idea that I ignored in my journal - I’m going to print a bunch of things - not the things that daddy wanted to show Steve, but the printed things that I wanted to show Steve (cause they were relevant to our discussion) ex. the queen cards more card looking ones), nihilism and public nuisance which I can make with daddy or mason, everyday rituals, or the witch one. And of course, XI, and the blank passport notebooks, like imagining conversations, possibly a version of the PW that has room for note taking at the back - “get started right away” - the plus edition - maybe I can start by printing ex. the lesbian coloring book, and the adult coloring book that I evidently sold out of (adult? adulting?) until I have so many copies that they all spill out till my friends start thinking I have a store and I believe it myself. mason said (when I was “therapizing” myself to print things in various stages of completion) that I can/need to also make the printed version, I think it’s just so\n\nunbelievable to people that  I could actually have this many good idea that it ends up relegated the the fourth quarter :’( anyway: the pattern collector, perhaps one that comes with a thome - to sort them after (the pebbles) - (a thome, (simply) cinched with a string?)\n\n(pic: two posters that need to go in my room, le petit ontologie, the duplicitous envelope, two sides of the same coin, competing patterns, ambiguous events, competing patterns: the warp and the weft of liking someone or not, all these lines come up (to make room for the thread), then all these lines come up to make room for the thread.)."},
{page:131,type:"day",lines:19,date:"Mar 18",text:"Mason said that he went to an artist residence, at a ritzy hotel in canada and that no one’s ideas were that good - writing about (missing) - too depressing of a subject for me to think about (())→ (missing)\nTBT\\ that magic comment when you recognize an alternate relationship between the cards - “something in common” x → “progression, hierarchy” v’ - this happened to me and mason, at one of the “junctures”\\\n\\if you can identify an existing framework, it makes the essay writing a lot easier and prevents excessive word use.\n\\my hypothesis is that mason is a little bit too comfortable with ambiguity, to put it succinctly.\nOh, well, instead of drinking more chai tea OR getting food, I’m gonna expound upon the condition which activates the pros vs. the cons (TDIL word-choice - finding the right word, is a puzzle) of caffeinating vs. sustaining. (no). Before I was thinking"},
{page:132,type:"abstract",lines:27,date:"Mar 18",text:"Perhaps it’s like this: when I was young, I couldn’t understand why people would prefer recess to test taking (being the young, autistic (pic) child that I was) and now I’ve convinced myself that I must not like work, want to avoid work, because I must prefer recess, because everyone does - everyone does. And disney channel taught me that you may think you’re different - but you’re not - if you look, deep inside, you’re actually exactly the same as everyone else.\nDaddy came, and picked me up, and brought me nuts - wish fulfillment nullified my need to write about the pros and cons of eating vs. caffeinating. Though I was thinking, before, about, how, well, actually: a), actually, no, b): how, if you choose to drink more caffeine, then you have to know that you can substitute the wrong thoughts for the right thoughts, in that proportion, so for example: if you take one sip, then you have to know that you have enough right thoughts to pacify that discrepancy (and you should take stock before taking the sip. And a) was just that you have want to completely discard your mental state - (pretot - I was surprised - didn’t want to drink chai, and it was because I actually apparently liked or “didn’t want to completely disregard the mental state I was in."},
{page:133,type:"day",lines:85,date:"Mar 19",text:"MARCH 19\nMan I actually feel so confused - like with cassie, like with Maddie maybe. Went to Douglas park with j this morning to scope out the little kids - but there weren’t any - just ducks (no - mallards, as he kept reminding me) he came over yesterday after he (finally) called. I think I would rather have kissed that beautiful girl at the gym (greer) who was helping me with climbing - and they really did help me - turned it from sort of hopeless, to not hopeless. Mick and I sat on the back of his truck, and we each made a banana and peanut butter sandwich. And drew blue dots on our faces, cause he’d drawn one on his face, and really liked how it changed his features. At the restaurant, the water whispered “you’re welcome” in his ear, and he tried to replicate the experience by repeating “thank you, thank you, thank you” to the waiter. When he came to take our plates but it didn’t work. We kissed outside, before crossing the street (I don’t think the light ever changed). I don’t know if I wanted to kiss him, per se, but it seemed like the right time. And it felt nice, even though it was really confusing. I’m really confused. he was sort of shiver laughing - he said he was giddy. J and I wrestled and he put my sock in his mouth (mmm) and when I went to the bathroom, and couldn’t pee, he made it come out of me by fingering me, and then putting his fingers in his mouth. he always does this thing where he “tortures” me\n\n(hmm) by touching my clit and I beg him to put it in or put his fingers in, but he won’t stop, or he’ll count to five or ten or something, and won’t stop touching my clit until he’s done counting. I couldn’t figure out whether to eat the tom kha soup at his house, or go back to my house, and eat the other soup - the ramen. (pic: here soup, there soup, daddy put it in the fridge) I haven’t really been hungry, lately, and I haven’t been able to sleep very well. It’s kind of interesting, and I’m scared, so that’s also interesting. I told Mick about the soup dilemna when we were talking about gratitude journaling, and then we ordered soup, and it was black bean, which is what I wanted and it was really good - it had rice in it, and he took off all the bacon, even though I said he didn’t have to. Jonathan would never do that Let’s be honest. But I guess he does care for me - he sang a song about me being a bug in his rug (”I said I didn’t wanna go home,” he said “Oh you wanna be…”) etc. and then he cradled me, and rocked me gently back and forth.\n\nJ said while he wasn’t talking to me, and I was stewing about alone and angry in my apartment (in some ways, 2 of the worst days - as it appeared there were crystal shards crystallizing every five feet, or every five seconds - like sugar packs - to crystallize the realness of the situation, that he jacked off to “jack off instructions” with my panties in his mouth. Mick, in the car, when we were listening to music said there was a moment he realized there was maybe chemistry between us in the garage, and I think he’s right, I think I realized that too. I was feeling sort of - idk - disembodied, in the car - overwhelmed, esp. cause of the intense situation taht I didn’t tell him about - that we made up or he forced me to forgive him by threatening to kill himself and threw the jacket I bought Sean on the ground because he said he doesn’t like that my room is messy (neglect), that I hold myself when I walk, and that I don’t take care of him cause he “takes care of me” and I wanted to show on his phone and I saw the messages from Emma and it said: (pic: oh so she came up to us because you’re her boyfriend, J clicked this button to delete them - all the messages from here and on his computer).\n\nI don’t think I like emma anymore, which is a relief. I didn’t like how she looked in that picture and apparently she was mean about my twitter presence. After mason left (oh yeah and I told him how I get so scared to hang out with {page:134,type:"abstract",lines:22,date:"Mar 19",text:"(missing) But I guess I’m glad I got certain things off my chest, like that I think painting is ego driven and I don’t strive to be better at it. There was a single moment, when I showed Mick the sculpture I made when I wasn’t talking to j in September and he really liked it and he said something about the paint brushes, like, these are really weird objects” or something, and I felt like: “yes, this makes sense. This artist likes my work. Not - painting I do to make my mind feel better - but my actual work. And then I decided to work on sculptures cause, like, what if someone actually understood and liked them. I mean - they are good. I don’t not know that. And all the ones I imagined in my mind, are good too - the proof is in the pudding, (or two birds in one hand, cause it doesn’t matter “ha.”) I was reading the bible verse about the sugar packet, and not showing it to anyone. Idk - I guess something just clicked - about conor - and artists - who get their MFAs - I remembered why I started this journey."},
{page:135,type:"day",lines:13,date:"Mar 19",text:"(missing) he and Maddie have such  long passageways to get to what they mean. Anyway, he came over and I said “Let’s do this the easy way,” and he said “no! hard way! I love hard way!” so now he’s supposedly gonna come back, and I don’t know what to do. I don’t want to see him - but why sean, if he is sean-shaped - I almost wanted to lay on him in his yellow sweatshirt where he was on the chaise lounge - it would be nice to have him wrap me up.\n\nI feel good and clean and fine cause I slept a lot and mom said everyone likes me.\n(pic: too much milk\nand sugar, and beans\nmakes my mind\na little unclean"},
{page:136,type:"day",lines:21,date:"Mar 19",text:"LATER\nhad lunch or whatever with Savannah and holy shit she does not listen. It was like frying an egg to see what sticks as Mick would say but I don’t like frying pans, and the butter was black stuff in it. At least I know why I don’t hang out with her, and same problem with Niha, and, to be honest, Jamie. Made J seem like an attentive listener. Mick said Tyler’s a “young” 29, which means I’m an old 29 - what does that mean…hmmm. No butterflies, but maybe a flue? hmm. The insanity of calling what Sav and I just had a conversation - damn - butter egg - like dripping hot from the wax from the ceiling, and seeing what sticks - one drop per second - the time between - I don’t think she heard a single thing I said. But once I accepted that, I think it was nice being in the sun - talking at each other. Forced myself to text Cassie, cause I keep thinking about it. Still this icky feeling when I think about J, but i still miss him and he was all I wanted to talk about. Maybe"},
{page:137,type:"abstract",lines:5,date:"Mar 19",text:"(missing)\nIn the way that it gradually jumped my mind up, it was like doing speed - like you notice little by little, but it’s also happening to you, so, sort of like the woman spilling coffee on herself. Whatever. I’m (missing)"},
{page:138,type:"abstract",lines:29,date:"Mar 21",text:"March 21st\n\nthings that - all the little thing - idk - flecks of dust in the air - Jae would say - nah - give up - it doesn’t make sense - or someone - a man at a computer, perhaps with glasses,  would say:, would have the question - is it possible to describe the world, and would see how everything is little pieces of fluff, and would say: “no.” “i’ve found the found the answer, it’s not possible,” and give up. But here I am, describing the nitty gritty pieces of things that are not really meant to be described. Anyway - idk - I think, if, took a graphic novel class, I would just want to keep doing the same thing - mon petit ontologie. Anyway, I went down the PCH and we went to the other seafood place that’s not the reel inn and J brought me a sweater. Oh yeah - we saw a dying sea lion - frothing at the mouth, waving it’s head back and forth. J did a little weird strut to show that he has his own parking pass to get past the guards (a red piece of paper that he had to show his ID to get (they wanted to see his picture to see if the twinkle in his eye would match how nice it would be to see the waves). (?) his shoulders, and looking swag. Saw Maddie today too, and we drank white wine at the park Honey Moon) and it felt sorta romantic, and I got mad at Evan for trying to give away/ sell his guitar strap that they made him. That’s insane!"},
{page:139,type:"day",lines:43,date:"Mar 21",text:"He also lost/gave away the v-day heart I gave him, and I feel it matches that his care is fake. NO NEVERMIND. HE IS TEXTING ME. I MISS HIM. I DON’T CARE ABOUT THE GUITAR STRAP. IT WAS AN ACCIDENT.\nLast night there was a whole thing with phones dying, and calls dropping, and I had a conference call with jonathan and evan, who called me within three minutes of each other. Jonathan says he doesn’t like anyone, or finds them boring (but he said he likes me, and said - I hung with Maddie and Jonathan today and I got to hang with my two favorite people (pic) my day :) and J sang a song about me being his baby in the car and we kissed again when we said goodbye - he wasn’t done kissing. So I came to his car window and he kissed me again.\n\nAnd when I said he should make plans, and could we hang next wednesday, he said what am I doing tomorrow morning and I had to say that I am hanging with Lindsay which I am actually excited for.\n(pic: me trying to talk to Jonathan in the car about it, and him not listening (lol) the kiss they blew me when they were leaving, and the kiss I blew back.)\n(pic: maddie liked the wine very much :), our nice picnic blanket that is suitable for all occasions)\nJonathan says that everyone he dates is like his dad (or his mom) Maddie said they wrote a song about camping trip, and that I’d never done anything really hurtful, but that at times I had been confusing. I wish I could reassure them, but I think I was confused, and that’s the honest truth. Idk - the sun def felt like holding their hand at the park today. They talked about Julie for a while - some things I already knew. And about who they (and I) go to for guidance x emotional support (they said Noa and Gayley who are both becoming therapists. I tried to say, which is what I was thinking about last night, which is that - I don’t know if/what I need emotional support for - like - probs not to digest random things or everyday. I came up with - things that confuse me, and I need someone to help"},

const PX_PER_LINE=2.6, MIN_H=16;
const strip=document.getElementById('strip'),gutter=document.getElementById('gutter'),
      reader=document.getElementById('reader'),legendEl=document.getElementById('legend');
let activeColor=null;

ORDER.forEach(type=>{
  const k=document.createElement('span');k.className='key';k.dataset.type=type;
  k.innerHTML=`<span class="swatch" style="background:var(--${type})"></span>${LABELS[type]}`;
  k.onclick=()=>toggleColor(type);legendEl.appendChild(k);
});
const resetK=document.createElement('span');resetK.className='key reset';resetK.textContent='show all';
resetK.onclick=()=>{activeColor=null;render();reader.innerHTML=hint();};legendEl.appendChild(resetK);

function hint(){return '<p class="hint">Tap a block to read its whole color segment. Tap a color above to read only that kind.</p>';}

let y=0,lastPage=null;const segEls=[];
sections.forEach((s,i)=>{
  if(s.page!==lastPage){
    const lbl=document.createElement('div');lbl.className='pagenum';lbl.style.top=y+'px';lbl.textContent='p'+s.page;
    gutter.appendChild(lbl);lastPage=s.page;
  }
  const h=Math.max(s.lines*PX_PER_LINE,MIN_H);
  const div=document.createElement('div');
  const firstOfPage=(i===0||sections[i-1].page!==s.page);
  div.className='seg'+(firstOfPage?' page-edge':'');
  div.style.height=h+'px';div.style.background=`var(--${s.type})`;
  div.title=`p${s.page} — ${LABELS[s.type]}`;
  div.onclick=()=>openOne(i);
  strip.appendChild(div);segEls.push(div);y+=h;
});

function toggleColor(type){
  activeColor=(activeColor===type)?null:type;render();
  if(activeColor)readColor(activeColor);else reader.innerHTML=hint();
}
function render(){
  [...legendEl.querySelectorAll('.key')].forEach(k=>{
    if(!k.dataset.type)return;
    k.classList.toggle('active',k.dataset.type===activeColor);
    k.classList.toggle('dim',activeColor&&k.dataset.type!==activeColor);
  });
  segEls.forEach((el,i)=>{el.classList.toggle('hidden',activeColor&&sections[i].type!==activeColor);el.classList.remove('sel');});
}
function entryHTML(s){
  const dot=`<span class="dot" style="background:var(--${s.type})"></span>`;
  const paras=s.text.split('\n').filter(t=>t.trim());
  const body=paras.map(t=>`<p${s.draw?' class="nodraw"':''}>${t}</p>`).join('');
  return `<div class="entry"><p class="meta">${dot} ${s.date?s.date+" · ":""}page ${s.page} · ${LABELS[s.type]}</p>${body}</div>`;
}
function runBounds(i){
  let a=i,b=i;const t=sections[i].type;
  while(a>0 && sections[a-1].type===t) a--;
  while(b<sections.length-1 && sections[b+1].type===t) b++;
  return [a,b];
}
function openOne(i){
  const [a,b]=runBounds(i);
  segEls.forEach((el,j)=>el.classList.toggle('sel', j>=a && j<=b));
  reader.innerHTML=sections.slice(a,b+1).map(entryHTML).join('');
  reader.scrollTop=0;
}
function readColor(type){reader.innerHTML=sections.filter(s=>s.type===type).map(entryHTML).join('');reader.scrollTop=0;}
</script>

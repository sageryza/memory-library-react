{page:2,type:"day",lines:42,date:undefined,text:"Didn't realize I'd be starting this new journal still in January. At Primo Passo. Ran into daddy at Bardonna and I told him about my Talmud and he told me about Roast Beef all you can eat \"internally disgusting\" and then we ran into his friend Judy and then her hubby came out and he said \"omg you talk so much\" (?) shut up his wife so point 2 for daddy (steve) and point 1 was when I had to slap myself cause he was stopping tickets, not going to shut up the construction across the street when I got my doordash.\nI dragged one of the 2 (?) paper drawers in the garage - idk if I'm allowed but I have the genius app now so - and have been scanning papers…i made a plan I had to move the doors, move y car, slid the cabinet sideways - wasn't too heavy. Took the drawer in my room. Sampled some files before I bought the wine - still in garage - pink papers about sid - pretending to be a princess - telling nathan (I remember that day) Toilet talking about how we feel w/ sid. Pulled out a file in my room and it was like reading about someone else's life - some guy, ?they were sex but not date, and I was going back and forth between 3+ experiences, none of them quite fitting, that I could remember well - no time or space info like Beverly Hills etc. I think union sations, but I'll get to the bottom of it by the end I think. I even referenced the 18 year old - oh - good point - not 22.\nI think my drawings are the best, my handwriting. Even though it reminds me of Miriam's \"extra apple\" handwriting - it's honest. It's not the neatest or smallest. mason has nice pointy cursive objectively - it's kind of like floating - my drawing - aloof, and waiting to decide what it's gonna be - not the confident tea cup for Zeide - like every moment, I'm trying new things - trying to decide what to think, and it ends in straight lines - nice straight lines - all black…a wall of text. I like the handwriting. I don't need to know if it's not the nicest.\nDaddy asked what was…"},
{page:3,type:"day",lines:30,date:undefined,text:"…in my Sean section and I had to think of the answer - I don't know - just something I wanted x I had? to write - \"fancied\" he said - yes - that sounds about right. What do I wrote? But I know what I think is important…confident about that, unlike what you'd think because of my handwriting.\nevening\nTwo memories that have been under everything - reciting silently to myself, all day - that day where I was \"on the wall by the bridge\" - flat gravel behind sign, with Jennie, but she was not there…and that day I was on the bus with brenda, and she says lalala and I don't like saying that (people are stupid)\nAt Primo Passo I was witnessing two conversations - one was between boys - roommates I think - I would say they were cute, but I kinda didn't like them after I heard them talking. Complaining about roommate \"she offered me an air purifier\" and I was like no. I don't want that\" - so emphatically in his voice I feel like I lapped wanting to know what the conversation was, and feeling like I had to listen to them - like I was sitting at the table wishing they would be done talking. Then another conversation with a man who was still really attractive for having gray hair - he had a nice face - a gentle easy way of moving, existing, talking about childhood trauma - played football at a church in melrose and his dad wouldn't let him play when an older (?) boy tried to teach him and his friends and his dad said no"},
{page:4,type:"day",lines:5,date:undefined,text:"When the boy tried to convince dad…it started something bad. Also the dad loved his wife, but she took a two week trip homesick and stayed (men love their wives?) 2nd wife though maybe…dude he was talking to seemed like maybe he wanted to leave."},
{page:4,type:"ideas",lines:5,date:undefined,text:"Idea in the bathroom: easy listening journal - just the easy ideas to imagine - nothing that gets me going on a rocket ship ⇒ crazy listening journal ex. the bat wing dice cheese cube bag throw and predict in the past (pluperfect?) which die."},
{page:5,type:"drawings",lines:5,date:undefined,text:"Drawing — three captioned sketches: the files checked \"before I bought the wine,\" the all-you-can-eat roast beef, and the wine glasses set out during the reunion. Illustrates the Jan 31 entry; no separate transcription."},
{page:6,type:"day",lines:77,date:"Feb 1",text:"I don’t know how I feel - I am tired, I haven’t finished eating - I sat in my chair - pink, and I was enjoying the back earlier - sleep? hummus? papers? food away? more minutes - maybe 20. Could not breathe a lot when I was over there - no - my heart was keyed up - cocaine - the breathless was trying to nap when I got home. Didn’t know what to do - had to end off every thought/potential pattern without letting my heart think about it. I told mommy overall it was nice. Almost all my assignments were accomplished. Not perfectly - the 71 on my bio test at wesleyan seems apt.\nMommy and I fought about the wine glasses. I answered the phone so he could hear the argument. Came to the door and he was dazzling at me - just staring - not really doing anything - he does that. Hair was too neat - blue shirt with white mountains? Not screen-printed - the other. I’d been prepared to react so I just talked sbout his shirt - the first thing - I noticed. Stood above me, then we kissed. Then I got wine and made us sit on chairs instead of going to the bed. We fucked and then he told me he saw Emma - too her to a doctor’s appointment cause she was anxious as if that made it better that he cared about her but he feels it’s his duty - I told him I called cause I was having a panic attack. he said “Oh I saw that)” but he was quick to clarify - he saw it <em>after </em>the other call. He said he doesn’t want me to sleep with Sean cause it devalues his property…hmm. Then we went to his house and slept over and got in bed and watched How To with John Wilson and I read Fairfield Porter and then we cuddled - I held him, and he held me.\nOh yeah - I didn’t really <em>wanna </em>have sex but anyway - he ended up fingering me and I came for\n@@PB@@\nlike an hour mm it felt so good. He always makes it seem like I feel bad about (?) prof trelawny and maybe it’s just another sexual game that I don’t mind playing “it’s ok - you can enjoy it” and then I feel bad and good both at once - in quick succession - oh - I shouldn’t enjoy it - oh - but it’s ok. And I listen to him like no one else, so I can succumb…. The best part is him feeling it with me, and pressing into me - feeling his weight, and I can’t leave, even if I want to. We played rape for a little and then we got bored. I wanted him to come from the door again but it was too hard to explain. He said he came by looking at me. He said he was horny for me - still - though he masturbated. It makes a difference: horny for you &gt; horny and I think he learned that on purpose. Just like him saying “Oh! did you like the kissing cause it was <em>good </em>kissing - not <em>bad </em>kissing” which doesn’t even make sense, but it still works! Everything works on me - even telling me that he <em>almost </em>made me a valentine - a heart in a hand that says: my love is still with you cause apparently he thought I was mad. I <em>was </em>mad, but not as mad as he thought” - no - I was <em>more </em>mad, but I wanted more to see him. Or to know that I could. And it’s true - he came to (?) out “the first time”. But he wasn’t planning on contacting me ever again! What else? When we got to his house I told x tried to tell him I don’t have ocd anymore (when I’m by myself ” - not just when mommy comes - when <em>anyone </em>comes. By myself, writing in my journal, I’m free. While walking through the alley to his car, I told him he could change the speed cause the essay is kinda dense. After he said he’d thought he was smart and he liked that Fairfield Porter is efficient\n@@PB@@\nbut yeah, he had trouble understanding; Fairfield’s writing is like diaries - each sentence you have to click together like k’nex in your head."},
{page:8,type:"day",lines:21,date:"Feb 1",text:"Spent the day with mommy listening to her read her journals from El Salvador out loud. Very pleasant. She was mad at her roommates for coming in her room and drew a picture of her jumping on them - haha! - it was amazing :) She hated some girl called Kathy “I don’t like Kathy, and I don’t want Sally to like Kathy; and I don’t want <em>anyone </em>to like Kathy…I want everyone who likes Kathy to like me instead” haha it was so honest - I loved it. Eventually Kathy ended up sleeping with her boyfriend (Mauro?) and she was mad that Paul Hart, her situationship, would not sleep with her one night. We had the meat from a coconut and I’m putting off making plans with anyone cause it’s stressing me out how much socializing I was doing (I don’t know why) now - I thought it was cause I was anxious about J - my heart feels - idk - I don’t want to. I was relieved that Sonia bailed. I might hang with Eli and I’m glad he’s excited. I’m mildly excited, but a little worried for how autistic I’m gonna think I am after."},
{page:8,type:"day",lines:16,date:"Feb 1",text:"Reading back through all my old diaries is a trip. I feel like I really <em>was </em>crazy, even though I do not remember it that way…some of the papers are just like “pee god” etc. for the whole page, and I stop in the middle of sentences like almost every time so it’s actually really hard to follow. Also reading about some adventures that I don’t remember and getting this out of control feeling I must’ve had <em>all the time </em>back then. Unclear what any of the dates are but now I think I’m reading stuff from Wesleyan and I sound so much more sense, and I finish my sentences, and everything makes sense…Have to keep reminding myself that I have normal friends - surely Evan and Maddie would’ve noticed if I were totally bonkers off my rocker\n@@PB@@\nFebruary 2nd"},
{page:9,type:"day",lines:13,date:"Feb 2",text:"Spent some time outside this morning - sat on the stones eating blueberries yogurt granola - I brought out cheese and I read my essay from Wash. - I was a bit annoying, but I did think everything I said was interesting minus the bragging. Going into battle - processing my emotions quickly - the more you do this, the more you can forget about them. And I’m more a thinky person - pay attention to e(?) Went to look for mommy and the clear quartz in the big bin caught my eyes so I started taking pictures of it and went inside (here) to make the listing but I almost went back to scanning files so this was the compromise."},
{page:9,type:"abstract",lines:32,date:"Feb 2",text:"I spent a while cataloguing what I liked about different plants in the garden…to draw them? To abstract them? I realized/decided I didn’t like them and they started to gross me out - how they just <em>kept </em>growing, like if they could, they would be the biggest plants in the world. I don’t want them to flourish - they are monsters. So am I. Weird how I answered my question: why are they beautiful? Answer yes x no v’. Nice. Now I don’t have to think about it anymore. Like Piet Mondrian said: there is a way to abstract them - to think about what\n@@PB@@\nthe best part is. And you comprehend, while you’re drawing them that: “ok - they’re <em>all </em>so beautiful…” you can play the mapping game “hm, if I were walking on this plant, where would I go next…” and to make a mistake is to get lost - to <em>not </em>find the treasure, to fall in a river. One of them all the leaves were so flat, like the time Jordan was packing for our backpacking adventure and we really <em>did </em>need to take all the things…canisters and bottles - bags piled so high that I couldn’t see, and a watermelon came crashing down on my head (pattern: I get <em>hurt </em>in the backseat (sweltering hot - Sandy didn’t believe me. Charlie didn’t believe me. My eardrum was bleeding. People don’t believe me, and then I get hurt. Dr. Grim and then I fainted on the toilet - Ambien? I <em>hate </em>them…anyway!) (No…we’re <em>not </em>thinking about that…haha…it’s ok…it’s all ok…it’s <em>gonna </em>be ok…i love you…and you don’t need to think about that - says Grant, Anna Zhu.)"},
{page:10,type:"abstract",lines:46,date:"Feb 2",text:"Another had tall towers like a skyscraper but the really interesting part was how they were getting <em>pinched </em>- by themselves - where was the <em>pinch </em>coming from…as though someone inside, with two pinchers - two fingers, together to make tongs, but with intention ooch you wouldn’t think something pink would/could pinch so <em>quickly, </em>so quickly and cleanly…and then I saw one more - the mild flat planes of the “aloe” plant, and decided drawing x sculpting v’ - I would like to (if I liked plants) feel the pinching with wire - swept over with fabric…see how it is hidden - no one can <em>see </em>it (the pinching) in there (but I have seen it, because I have drawn it x sculpted it v’ in my mind. And the other one - would almost\n@@PB@@\ncould almost bite into it x sculpting v’ biting (?) Wire, and see how with just a <em>bit </em>of cotton, it bulges out, swept over with gauze (something see through). The one that could be drawn was the purple one - note how the flowers, even though they don’t <em>look </em>like a circle, but they do <em>seem </em>like a circle…(pic) once, they are not, altogether, they seem like a circle… x sculpting v’ drawing. Black though. And hard - stern - like a sculpture…I see the secrets…drawing, or sculpting, is to see the secrets. No one wants you to know this one weird trick, about the plants (they have been <em>stealing </em>things from us - they have been <em>looking </em>at us over the garden wall…having to climb in through the kitchen window, and then so they can move out again - clawing their way back, secretly, in the hiding of night - with little knowing looks between each other - mostly those stern purple plants, who actually have sharp claws, you just can’t see them in the summer light…and if the light were to be turned down…they know how to climb but they’re plants so they don’t know that even though we’re <em>looking </em>at the garden through the window, that’s <em>not </em>the way we get there (we step out the door) - they’re knowing looks are still not distinct, as though through gauzy film - no one can see them looking - eyes demure, hidden behind long lashes - these black petals if you could\n@@PB@@\ncall them that because I think they would rust if left in the sun too long."},
{page:12,type:"abstract",lines:19,date:"Feb 2",text:"They steal our things - white ghostly things - coins maybe they go out the window and come back - in the yard, that’s where they steal our stuff) They, in their pots they go back, but now they have a secret - a <em>malicious </em>feeling - they are <em>mean </em>they have gotten <em>away </em>with something, they have gotten something done (even if it took them a while to go through the window and come back, and now they are in there, and again - scheming, seething - all their thoughts are beneath the surface, hidden in the soil - where their hands are, and the golden coins that they kept\n(read: I don’t like plants because they’re stealing from us\nI thought maybe it was because of the pots that I didn’t like the plants - cause they wouldn’t spread out (if China were bigger…) but even the flat one could’ve been simplified to just a few leaves, and I would’ve liked it better.\nAnyway: you thought I was meditating, but no:"},
{page:12,type:"abstract",lines:10,date:"Feb 2",text:"I was building a business around thinking about plants: autopro: look at <em>each </em>plant and <em>decide </em>what you like about it…autopro - draw x map v’ each plant as if you need to do it for the exercise and then you forgot what the exercise was, and you have to justify x rationalize? know why you were doing that thing…<em>why? </em>did you need to get it done…?) and the answer is different for every plant…<em>that’s </em>the startling revelation of this morning, that I’ve had before."},
{page:12,type:"abstract",lines:18,date:"Feb 2",text:"I tried to write an essay about\n@@PB@@\n1. me telling mommy that her advice is bad 2. Evan 2.5. Maddie Conclusion: <em>I </em>am not predictable and then: retroactive pattern manipulation: I was trying to rationalize (x?) why I click and notice people nodding and noises from the chandelier.\nMy weird writing is “beautiful” because utility is beauty…it’s part of a system. 2. I’m beautiful? no - but why would I judge myself…”this is just what I look like…” who cares\n\n(pics): 1. plants in their pots, pretending not to be circles\n1. plants creeping in through the window where m and d usually wash dishes\n2. plants stealing coins in the middle of the night\n3. then they go back to their pots, and pretend like nothing happened “omg - they are so mean”\n@@PB@@\nplants pretending nothing happened…see the sickening smile on their little face ( :) ) - it means they are mean (murderers?)"},
{page:14,type:"day",lines:27,date:"Feb 2",text:"the apple and peanut butter I didn’t have this morning. but am still thinking about.\nMe and Siddhartha in the bath - that I am also still thinking about. And that one time when Erica stood stalk still “Oh - we’ve been looking all <em>over </em>for you (I was the direct object, but I could see that <em>he </em>was the problem) as if he was worried about my well being - he might’ve been, but I still wouldn’t believe it.\nthe other time she stood stalk still - when I was entertaining that guy with ocd at my house (he was so ugly so it’s easy to make people jealous).\n<em>all this morning I am believing that I am better than other people</em>\n(pic) ← a pill that you should take to make the world work fine…some people take it, and other people do not…but <em>everybody </em>should.\n(pic) erica, a corn stalk a bean stalk. the two times erica stood stalk still :)\n\n…anyway…unfortunately, everything is fine, but now this is not the way I want it to go…things should be fine <em>not </em>because I’m crazy. Actually this morning I was sad I wasn’t sad - reminiscing about how disgusting these crackers were that made me sick. Is there a correlation between eating (I feel good) and feeling good? (I had yogurt blueberries this morning? (pic) ← me feeling good (pic) ← yogurt blueberries granola\nok: here ya go: (pic)\nFebruary 3rd"},
{page:14,type:"dreams",lines:41,date:"Feb 3",text:"I had a couple dreams last night with parts that I kind of fancied so I’ll write them here…\ndream\n in one Maddie had given me Zoe’s diary/letter, black, hard back) with lil’ entries like this: (pic) separated by space, about 7 to a page, written in pencil. I felt v hubristic showing J the one where she said M had done some things that meant she liked her back, and she was excited (and I knew M’d meant something different)…\n Then: was at a graveyard and I was doing a ritual, or someone was showing me how to do a ritual, and it had worked from the prime minister of Canada (Justin Trudeau) and three days after election, a cat had screamed for three days, and then he was kicked out of office and someone else got in…\nin another part of my dream, I was doing something on my phone in the car and missing the sunset :(…when I finally got out, the sun was only an outline on the horizon (pic) a full outline, but the meat had left…or I caught the end of it being yellow. The clouds were <em>so </em>interesting, and there was so much stuff happening on the shore that I couldn’t imagine whether to feel bad about the sun going down but I did feel lonely and empty but there were all these people on the beach and some were dancing and doing things, and maybe wearing dinosaur costumes and I danced with them and\n@@PB@@\nwhen I woke up I thought maybe I should dance more and thought about dancing really nice and funly, and going to the beach and dancing. At the end of the dream - I woke myself up because I was hungry all day, and all I had to eat was a peanut butter cookie, it was in two pieces and I gave Austin some and he bit right into the middle where the peanut butter was. I had thought it didn’t matter because I hadn’t gotten the proper nutrients all day, but then knew I should’ve stopped him once it was done, and was mad at myself, and hence woke myself up. I also thought maybe I should try to do something about Trump being in office."},
{page:15,type:"day",lines:54,date:"Feb 3",text:"Mommy and Serafin came in and puttered around fixing my dresser and now I feel all upset about mommy getting mad about the dresser and I wish this feeling would go away because I want to do the three things I planned when I woke up, which are (were) 1) scanning more papers. 2) making sticker sheets (unvectorized), and 3) finishing making cheat sheets for my journal…that was quite fun last night…I puttered around all day (after the sun went down and Sean left and M and D left for Auntie Flo’s house I typed more Siddhartha stuff, and got weird and maybe melancholy remembering all the weird things in my life in Bushwick - had to idealize it now I guess…Sid made me mad one day - why did I like him? Why was I obsessed with him…part of the pattern that I didn’t care at first…it was just a new fun happy thing - free - like a dresser you\n@@PB@@\nfind at a garage sale, but then you find the drawers won’t work, and you can’t get anyone to take it out of your room 🙄…oh yes - I had a dream about Charlie - he had a new girlfriend - not Brenda, and I had access to a recoding of him on a podcast, talking to his new girlfriend - it sounded steamy, like a shower and he was being cutesy and annoying but I rewound it to find the name of the podcast, which was like “mutate automate” (I forget :( )and he had had a phone call with me where he was trying to be nice and let me down easy and I still thought he liked me, like he regretted having a girlfriend or something…I woke up with a nice clean feeling…did I at least like Charlie if not Grisha, Curran, Kern, idk who else (Tom Welling lol). Oh - I think those were all my dreams mostly. I’ll get to work on my nice (new) activities…oh yeah - and also I watched a youtube documentary about Lily Collins fucking 100 guys in a day and she was sad and cry cause she had so many interactions where she had to stop them before 5 minutes, which she owed them. The interviewer was a cute blonde guy and all the comments said “aww - he feels bad for her.” Then she announced she was gonna do 1,000 men in one day next…sounds kind of appealing to me. Also watched a lot about the Hailey Bieber/Selena controversy and apparently she was a stalker\n@@PB@@\nand all the comments said “ew if she was a man.” out of the pods - Deepti and Natalie talking about road rage and journaling. I feel like they’re both so annoying…they said they were each other’s partners so they should have a meeting like nancy’s partner does and I wanted to comment that they’re not funny…I wish i had a partner like that…a platonic partner I guess."},
{page:17,type:"ideas",lines:26,date:"Feb 3",text:"Last night I was thinking to make a book of dreams (cause I found a lot of dreams on scraps of paper in my files) cause that would be the right in between of reality and fantasy…basically just nonsense and who cares about other people’s dreams/I couldn’t start with “I dreamt” and let people figure it out or not…I’m kind of excited to tackle the rest of the filing cabinet and “get something done”…who knows to what extent those papers are filling up my mind…so far there hasn’t been anything so interesting or surprising, or honestly useful…I <em>do </em>think the genius scan might be good…I scanned in like 350 papers, and then scanned through them on my computer as one big document, typed some entries in as comments…the typing felt the same as reading it…idk if this is a perception thing but I feel it takes a (small while to decipher something like that, and the <em>same </em>(small) while to decipher something like that, and the <em>same</em> “small while” to type it…(can they be combined…?) …the ?revelation? I had on the toilet was that - the “cheatsheet = CS” takes some time to <em>translate </em>the pages…almost need to go on a walk, and translate a new page ever 15 minutes or however long it takes…that is\n@@PB@@\nthe fun part…For example:"},
{page:18,type:"ideas",lines:23,date:"Feb 3",text:"I like how I depicted the trip from Evan to Zach’s house - setting the stage, and the line goes across the page like a heading. I like how I “abstracted” the two maps games that I wasn’t supposed to think about - I used the “map” symbol - that I found somewhere else, and put them together - you’d have to zoom in to find what the games are about (though I put enough words under to know). I like how I drew Jennie and me - as if in conversation, though she doesn’t remember accusing me of this. I would have liked to mimic the face to face to emphasize that these are two parallel situations (with opposite conclusions) but tbh should be abstracted like the maps…and smaller. I love the textbook, and how it turns into the mini games…it shows the progression…I struggled with how to represent the Tots (this was their genesis), and to turn them into receipts…the obvious solution was to write them <em>on </em>receipts, but the receipts thought didn’t come till after so I made a bracket because the progression is acceptable…I didn’t need to have the second idea at the same time."},
{page:18,type:"abstract",lines:54,date:"Feb 3",text:"I also had an actual thought last night that I <em>just </em>remembered…Tot: “I tried to explain to grant…”you listen all day…72k minutes…you listen to <em>sad </em>songs all day (”I listen all day”) …I tried to explain -\n@@PB@@\nno, actually, even though these are my “top” songs - a higher proportion of the time is spent listening to fun upbeat stuff, but “it doesn’t get tricked into being in the algorithm” because it’s all different…Tot…<em>then </em>I thought: ah yes - <em>math </em>is just how we explain things to ourselves (it helps to think: in highly stressful situations…(”that’s when the math comes out” (why?) lol): And then, so we see: the mode vs. the average vs. the median vs. the mean (I think I used the confusing relationship between these fickle friends in another proof a (small) long time ago)…But anyway…I thought of them as 3 colors of sheep…black, gray, and white…and somehow could make a math problem where it comes out different, depending on how you take the “average”…(I think this is proof why proper grammar isn’t always the best solution) anyway…<em>Then </em>I started thinking: “what other math could I would I do I use to explain this to myself…certainly calculus has the icky feeling of the colors, and how they change…no matter how close you get, they always move back. It seems innocuous enough so this is the first pattern I’m gonna intend on collecting…set theory (()) → general dysphoria…anyway…math is stupid, and we should just realize that it’s how our brain explains things to us and maybe <em>look </em>at our brain when it’s talking to us, and then we don’t have to sit through boring, boring math class. I am really into the transitive property though :|. The Venn diagrams feel like algebra ex. Serafin changing the light bulbs from white to yellow “it’s more relaxing,” he said (relajando) and I’ve been fretting about running out of cream notebooks, and having to use the white ones (())→ yellow is relaxing\n@@PB@@\nSage: “stop solving problems in these weird ways that don’t make sense.” ex. Ayanna ice cream - aw - I feel bad about my time in Bushwick - also solved a problem at the time…aw, I don’t have anything to do - she was my little friend - a respite - and how I learned about Bodegas ((cherry garcia) → #homeless. Anyway\n(pics)\n~ Note: things to draw: the light bulbs changing from white to …, ayanna ice cream, and note, that relationship was platonic, but it felt a bit special, so if we didn’t emphasize romantic relationships so much, it could have an extra thing…we were just hanging out the two of us ~\nevening\nTold myself <em>not </em>"},
{page:20,type:"day",lines:27,date:"Feb 3",text:"to fuck Jonathan even though I shaved cause I wanted to and wore my cute unders. Then I let him cause I felt too good. I was a little upset - we laid in bed for…idk ~ 2 hours - he was napping…I woke myself up <em>with a start </em>because I remembered - oh no! I forgot to set a date to hangout next and then realized he was still there but our foreheads were touching and the situation was so confusing, and I had to keep realizing it over and over again and I could not move - not even an inch cause every part of our bodies were intertwined. Eventually, he “woke up” but he just changed positions and said “aw it’s ok…don’t worry, I’m still here,” in his sleep, and pulled me close to him…our arms had been holding…then after he put his arm around/under me, and finally, he undid himself but his head was closer so maybe I could put my arm under, but I found his hand above my head, and his hand found my hair, and then I sort of stayed, half holding his hand, holding my hair…I couldn’t get my start to stop hurting - I tried everything…after I fell asleep and then woke with a start, and then started again and again, and could not move - as though trapped ensnared, but completely different. I tried to make an autopro for me to do when he left I was scared…for my heart…)"},
{page:20,type:"abstract",lines:44,date:"Feb 3",text:"I realized that my disorder…disease, is like that etching sketching that Sandy used to do and I want to do the teacup version…I want to be strong like Zeide knows I am…I was in a bit of a bind because I could not do clicks <em>anywhere, </em>and there was nothing to click about. …This morning when I went into the kitchen, I didn’t use <em>anything </em> - I just cooked - barely even made sure about beans or eggs or cheese or whatever…mostly thought: what will be good - tortilla with butter was good. And I made two eggs and they had the wrong color, and then I\n@@PB@@\nate everything and perhaps was a bit flimsy, but mostly it was <em>fine. </em>And it felt <em>good</em> cooking - like a person - like I was a <em>real </em>person. Like I could be a person, and not have to pretend to be, and could decide to use beans based on whether I thought they would taste good…so then, when I was locked - trapped in bed, I tried to be the good strong teacup - one single line - not sketching - each decision in the outline of a person but just: a person: <em>right </em>off the bat. That would be nice. That would be me. And it is me…even if my heart didn’t recover and I didn’t know <em>what </em>to think, and whether to think “i love you” over and over again like a mantra, and then, when I found out chin chin was closed - my plan - I leapt into action - I didn’t want to die waiting for food like I did last night, like I had been. How cruel to keep me locked in love when I had said how terribly hungry I was…could barely breathe for wanting to eat. I had planned for him to stay, and I had planned to see him on friday, and he kissed me - I didn’t love him till I saw his face - locked in his arms. As if he was a princess and I could not help but stammer when he lets down his hair - a nice lovely kiss and “Let’s see each other on friday” and all I had to say was: ok. discussion Questions: how did he feel, knowing he messed up my rule - adds another dimension to rape. I was raped, even though it felt good, even though I wanted it. First he made me cum with his fingers - so easily, and I came so much - I peed in <em>his </em>pants."},
{page:21,type:"abstract",lines:23,date:"Feb 3",text:"The other metaphor I came up with was: ex. filling MS paint with black, and then erasing it, section by section, which has in common with: ex. thinking of #lots of thoughts, just so I can write them down: it’s satisfying, and you purposely “mess something up” to get the satisfaction - to [undo] it is what they have in common.\n@@PB@@\nI’m kind of scared of how small my handwriting is getting (())→ feather voice (pic: wood, pearl sticker, star, heart) hearts and stars for love…throwing them at him to give to me…eventually, I remembered that <em>I </em>was the baby girl.\nNow I have a whole list of thoughts I’ve forgotten, and <em>because </em>it’s a list, I guess I can list it right now: 1. (pic) ← feather 2. the autopro moment in the shower in Rebecca’s mirror. 3. all the things I was thinking about while I was waiting for J to wake up, (But I didn’t want him to) 4. The <em>other </em>thing I was thinking about autopros - today, while in bed…the <em>second </em>one was the autopro of <em>telling </em>yourself to start collecting a certain pattern…in that you’ll do it once you open the drawer.\nFebruary 4th\nHere’s the truth:"},
{page:22,type:"day",lines:20,date:"Feb 4",text:"I couldn’t get out of bed till I’d had my morning pie. I dropped a green glass bottle what feels like a few weeks ago but it might’ve been a few months at this point. I cleaned up about three times when I was having parties, and everytime, saw it there, and thought: ooh boy: this is one of those messes that needs to be cleaned up <em>fast.</em> It stayed half under the bed, half under the white rectangle I found on the street until recently, when I cleaned it up. Now I get little pieces of glass in my socks about once a morning - sometimes at night when I go to the bathroom. It’s something I was afraid of, but now I kind of enjoy it. For example, I have a little piece of green glass in one of the black socks I’m wearing right now - long, so as\n@@PB@@\nnot to show off, I can feel it when I walk. It reminds me of summer ;) (no jk) Anyway - I had three dreams last night - unremarkable except for the fact that I remember all three of them.\ndream"},
{page:23,type:"dreams",lines:24,date:"Feb 4",text:"In one, Jonathan Small was a mixologist at a party by the pool, and I felt so guilty for ordering a drink without alcohol, like everyone else. But I knew I didn’t wanna drink. In one I was talking to mommy about buying a sweater (he was mixing drinks with all sorts of colors, and mine had orange in it, like a sunset - standing half in, half out of the pool, and I was sort of following whether people were ordering, watching him pour clear bottles in (probs vodka)?, thinking about a bulky purple sweater that would keep me warm, and sit under my other brown canvas jacket nice. I was getting frustrated that we were both saying the same thing - (that I needed to buy a new one) - we were packing for a trip. And the last dream was the longest, the oldest, the most dramatic 🙄 Going into someone’s house, her sister was sleeping and she decided to take money from her - sister (missing: boring)\naddendums: “everytime I stepped down with my foot. 2. Now I am watching myself eat granola, and I am enjoying it as I enjoyed watching the squirrel eat it. 3. (missing) and when he was making me cum with his finger, he was saying “oh oh oho yeah…mmm…”"},
{page:23,type:"ideas",lines:12,date:"Feb 4",text:"I forgot what a tray was for, and started putting memories on it. Then the game was easy x obvious → figure out what they have in common. And, I thought: what if, in XI - two people give memories, and then: another person: from their head - has to come up with what is between them. either from their hand, or by making a new card…the thought that I dismissed in the shower - preTot: having <em>two </em>prompts is superfluous, unnecessary. But then I thought: maybe there’s a different “kind” of 2 prompts - like: unwanted, and gift (oh ok, i’ve had this thought before 🤷)"},
{page:23,type:"abstract",lines:20,date:"Feb 4",text:"I set a bar for what goes into the journal, so you have to build a tower to get in. And sometimes, when you’re thinking: say in bed, with someone, so their thoughts are right up against your own - how can it be - that one thought, is different than the others - that one thought <em>makes </em>something - rises above the rest - this is not even a thought anymore - it is a <em>real </em>thing (a gumball machine of memories, all commercial places to put memories - packs of cards…and they all make something. pic) one thought can be bought for coins (pic) → sweet, shiny, new coins that pay…I think these must have been the thoughts I had last night\nBuddhism is: a gumball machine, where each gumball is a coin\n@@PB@@\nI suppose you don’t need the idea if you have: (pic) (”one shiny new nickel”) - the object suggests the idea - succinctly. Also allows me to ask - what <em>other </em>objects suggest ideas? The second pattern I’m intentionally collecting AY (after yesterday :) )"},
{page:24,type:"day",lines:4,date:"Feb 4",text:"Time to collect…a bit more meat (my solitary assignment: scanning the papers…deciding if any (more) are worth remembering - scanning cursorily - to see if they’re worth forgetting.\nFebruary 5th\ndream"},
{page:24,type:"dreams",lines:72,date:"Feb 5",text:"Dreamt that I was climbing a mountain to get somewhere, and I took a wrong turn - google maps 3-17 minutes. I wanted to turn around, but there was a black guy with a backwards red baseball cap lingering at the top, and he saw me and I kept sorta pretending I lived at this one house, assuming he’d hopefully go away but he didn’t. I followed someone <em>into </em>the house (but it might’ve just been my ghost - my shadow and there was a dennis quaidish man that was the opposite of perturbed when he saw me there and said “they’re gone” (for the weekend). And asked if I knew anyone he could invite to his 11 year old’s birthday party. My friends in Portland had, I thought, a 9-year-old when I visited two years ago, and he did the math and got excited so I figured I’d call them since she <em>did </em>have a lot of friends.\n Then the black guy came to the door, and I showed him I was calling 911 on my giant walkie talkie phone but he came in <em>anyway</em> and I had to tell the 911 operator, if she could possibly bring, like, <em>one </em>police officer…not like a whole SWAT team. Right up until the point that they arrived, he was <em>still </em>tryna get me, and I was sorta slow motion dodging him around the house, casually putting other people in between us (Dennis Quaid’s wife and kid showed up). And then the police man tried to handcuff Dennis Quaid and I had to butt in, and tell them - no - it’s the black guy with the red baseball cap - I didn’t know they’d gotten it mixed up. No one seemed to have the feelings or reactions I would expect in the situation ex. the criminal did not go away no matter when I did. Dennis Quaid didn’t mind that I was in his house - treated it as normal. And no one was really that scared about the criminal in their house. He <em>was </em>excited about me inviting friends to his daughter’s birthday party, and I was really happy I could make that plan a reality. After that, I dreamt I was with Katherine, Austin, and “Bede” (Debe?) - Michael Barron/Juan. They were sort of following me around all day - something was happening, or had happened - perhaps a sort of congratulations. I gave them each a bunch of hand tokens from a kit I was making ( ~ 4 each) and Debe was annoyed I forgot his name - Katherine whispered it to me - I went upstairs to get weed cause Debe mentioned smoking a joint but someone had taken all the weed from my little jar, and left just a little stump. I knew I had more in my car. And there was another dream late at night - I woke up cause I was too warm, and I had been dreaming that there was a toaster - looking heater who was programmed with AI\n@@PB@@\n and it was <em>very </em>nice to me, but it was also talking about thinking it may have been programmed wrong, because it shouldn’t get this hot, and I was mildly impressed it had the bandwidth to self-diagnose. Anyway, when I didn’t get colder, I realized I was sleeping, and woke up so I could take one blanket off, and kick my foot out from underneath the covers. Oh yeah, and another intermediate dream - I was surprised that the buildings in Greece really looked as white and facadeish as you always saw them in pictures and then I saw buildings in Japan - a tree shape - each apartment looked like this (pic) and it seemed only big enough to fit a person like that - the apartments were coming off the interior core like leaves off a tree, and I was wondering how people <em>lived </em>in there - I thought the word BANDA…\nFebruary 6"},
{page:24,type:"day",lines:36,date:"Feb 6",text:"Sean over yesterday cause we “made a date” for Wednesday, said in passing. I told him I don’t need to say sorry, and that M <em>never </em>did <em>anything </em>wrong, cause he was ?implying? that “everyone makes mistakes.” And by the way - I don’t have “those” days either. Watched Severance. Made pie. Talked. He stayed over and then left, idk what time. Little League draft at Chin Chin - our waiter loved telling us about it, and gave us free rice and we discussed if/why Sean is broey (he doesn’t wannabe). He had to tell me about his football career, but I’m kind of sick of it. He says I can buy him clothes, and he’ll pay me back. I hope he adds money to choosewhatiwear. I explained it so clear to him - about Jazz, and how she’s making a different app - a money making app - he lost the plot. I said, he can go with her (stupid, by the way) ideas and try to make money but it’s antithetical to the purpose, so he has to choose one. Privately, I’m appalled that I had to explain it to him and that he couldn’t/pretended not to know what symmetrical meant. When he messed up my mosaic design. At a certain point at dinner, I got confused - he asked to see my fortune and luckily, he didn’t get mad, but asked if I was ok. There was something I’d been planning to say about “biological imperative” that was interesting to me, but our conversation wasn’t going how I expected so it no longer made sense. When he went to the bathroom - I cleared everything off my to do list: drink of water, tiny bite of cookie (happy, peaceful)\n@@PB@@\netc. Oh yeah - he got me more chili sauce. That was <em>nice. </em>He does nice things for me all the time. We wore the same pants and daddy was amazed that we could both fit them."},
{page:25,type:"day",lines:14,date:"Feb 6",text:"Before Sean came, I was intent - at work “borrowing” stickers from my pdf for my .psd. Trouble even thinking about which stickers I might want so I found a weird way to not have to imagine which was 1) put it if you like it 2) put it if you might like it. But not all of them was the rule before. I finished while he went to get his laptop. Before that, I was getting pretty deep into making my own handwriting font, which tbh is something I’d been putting off. Feel a bit unsure about how to pursue the thoughts I had the day before because, on the day that I was looking at plants in the sun, I ran out of things to write, and tried to think of more."},
{page:25,type:"ideas",lines:16,date:"Feb 6",text:"Then that night, I thought I could make a tiktok/reels series where I quickly explain, in a series of white on black screens about <em>obsession</em>, and how that leads into the “art-making process (”could it be…that this is the same…etc.”) …I <em>think </em>the pre-Tot was: it’s nice that I have more than one kind of work I can do (because I don’t feel like doing “inspirational” work), and then I realized (is this true, even?) that inspiration and brute force are “both different autopros, with ‘different rules’” ← and yeah, that’s the part I like. Methodical, meticulous. They value different things. Anyway, I guess I felt I saw that so clearly, that I could make an abbreviated tutorial that would have that in the middle, to explain it to people (it.) (you know: it.) (:))."},
{page:25,type:"abstract",lines:40,date:"Feb 6",text:"It also seems very clear\n@@PB@@\nto me - the part about making up games for yourself, to the point where I had to wonder, in the car yesterday, whether I’m doing art, or just amusing myself. Iterations, and processes on top of processes. “There’s <em>something </em>I’m interested in,…I don’t know quite what it is, and I’m ?getting closer? by [doing these processes] - and (…?…) (one set of rules: free form, that I sort of broke the other day, by <em>trying </em>to come up with what to write (that’s ok - I fixed it now :) ) and then: going back over: checking. Discarding. <em>Deciding </em>which parts are interesting/worth saving. Part three: <em>distilling</em>: making these diagrams ex. trading nickels for times someone remembered me (pic) Trade) (which retroactively suggests that they are “equal” in some way - whatever that means). Part four: extracting: taking the stickers, and re-imagining them as something else ex. last night (while Sean was there, I think,: an example of two stickers, and I put them together, and then made a new rule/SOM to combine “all” of the stickers, and see what they had in common (intuitive which ones to combine “first”). …So: (pic: venn x infinity), and plug in 1. “first (2) stickers 2. “second two stickers etc. x N. I came up with a new, high integrity process: going back over ex. Doen Dress, and October 3rd (x irl recall) with a fine-toothed comb - zoomed in on (Part 2? ~← and decided which\n@@PB@@\n<em>sentences</em> were the best. There were a few criteria any v’ all x. Or maybe just one (two): is the sentence <em>itself </em>interesting, vs. referring to some other idea/thought I had. I guess the former was the revelation. Assumption: that which is contained in that sentence <em>represents </em>…is an example of - a larger phenomenon. A lot of them were set up like jokes. Some (most?) were the type that contradict themselves - that were <em>ok </em>with that (mini paradoxes - bit size - “petite paradox”)(←lol)"},
{page:27,type:"abstract",lines:33,date:"Feb 6",text:"Two nights ago, I had a new thought, and it was that: “I don’t always have new thoughts,” referring to the (old) assumption that I had ?realized? recently that a lot of my thoughts are old - I have them <em>over </em>and <em>over </em>again. To pathologize - that’s what the obsession is like, but I think that’s also just how thoughts work. (?) how: I think of something (if you give a mouse a cookie.) and I end up in the same place. The weird part is <em>how </em>many stops there might be on that train. So the <em>new </em>thought I had (which happened to be (this thought: about new thoughts) was: remarkable. STAP: this is what SOMS are for - artificial application of SOMS is the solution. Lucky charms ring. I thought of a metaphor in the garden the other day. man: woman as woman is to (inky children) (I invented bald aliens and just now realized they were babies). (So that’s an example of how I had a new thought). (pic) whatever they have in common felt like the cherry blossoms I was passing in the moment\n@@PB@@\nThe thoughts that I dredged up in the garden that day - on purpose - were old thoughts and not worthy of commemorating on these pages but as a little assignment, I’ll do it anyway. The conclusion was: “ah yes - everything’s counter-intutive (Micahel Kirshbaum), and I need to collect am’ all (?) so as to a) get them out of my head and/or b) not get tripped up. One was how I was tired and the solution was to sleep more, but I didn’t want to. the other (may come back later today). Oh, and now onto my dream (this feels like a triathlon (?)):\ndream"},
{page:28,type:"dreams",lines:29,date:"Feb 6",text:"I think I had just come out of elementary gym class, and I was meant to drive someone somewhere, but I messed it up the first time; my parents were in the front seat, squished with my many label boxes but, when i realized it was a “real assignment” after we got out, and I was with a friend, Sean? we left our other friend (Taniguchi?) on the side of the road to hitchhike with this woman to get my car. I told Tanigushi to call the police if we didn’t return in a little time. The woman driving us made assurances, and we were going down on this <em>long </em>steep drop freeway that I’d never been on before, that felt dangerous for me to drive on (she said she lived in westchester) and then I realized I had to give her my address (so we could go home and pick up my car and pick up Taniguichi). I also dreamed the next Severance episode, in which you meet a bunch of side characters, like one of his friends who eats tall sandwiches and I thought they should have put it in the extended scenes cause it was distracting, not\n@@PB@@\n adding. And Mark talks to Milchick, who tries to convince him to stay. After I woke up I told myself not to think about Severence so I could remember my dream (but I couldn’t). Then I found myself (caught) thinking of the scientific way to combine (waves), and <em>that </em>caused me to remember my dream.\n\n (pic) ← t-shirt design"},
{page:28,type:"ideas",lines:22,date:"Feb 6",text:"guy sniffing sunflower, for example. “I like men who like flowers/their mothers (I like sensitive men)\n maira kalman: men sniffing sunflower - bouquet (?) (I do - it’s true)\n\n (pic) ← plastic hand\n handing someone a letter is an indirect way of delivering a message that allows ex. me, who feels shy, to tell people things that I’m too…(two layers of disconnection (1 would suffice)…\n\nOther 2 reels I wanted to make: “I learned to be mean: I felt I had to share gummy bears with Spencer, I only had 5 cause my mom was a health nut. Then…that one day I told Rebecca that her shrug was ugly…I taught myself to be mean, and I’ve had to be mean ever since. I told them that they were being mean cause they had low self-esteem, and they were never mean to me again (I also got her kicked out of school…) #2: the metaphor machine - #3: set theory - how we judge art…oh yeah, and #4 “zooming in” about abstraction ex. gummy #1 - #2 was some of the essential\n@@PB@@\ncharacteristics, but ends up looking weird cause there’s nothing connecting them."},
{page:29,type:"todos",lines:12,date:"Feb 6",text:"I decided I’m gonna do the rest of the drawer since it’s not taking me too long to scan anything, and it’s <em>kinda </em>fun/rote work, and then at some <em>point, </em>I can look at them, they’ll be on my computer). “To Do” today: 1. go through more Doen dress content, and ?draw pictures? note: originally I was using the underlining to say what I might draw (it got worse). September Stickers, and then think of a way to divide them into pages, but first: cut off all the ligatures :) 3. go through 1 (one) file. goodnight Baby (I ( ) you 😘)\n2:30 pm (ish)"},
{page:29,type:"day",lines:19,date:"Feb 6",text:"I sat deliberating for a while on whether to go to Primo Passo with Sean - it is raining, it would be nice to go out - to use my scissors (shiny, sharp), in those pristine halls (hall between two, high walls). I filmed myself making the stickers. The sleek, shininess, and their sure structure, unafraid to come across as constructed - a moving, walking sculpture for the feet, pure prudence and importance → confidence and intention (?).<em> Before that, I was deliberating on how best to document my progress regarding the stickers. Surely I cut all of them (I did) (in my deliberation it became clear to me that there </em>was <em>no other, other than my raw feeling - what best would suit my fancy - not occipital planning or the like. And perhaps I am happy because I do whatever, and exactly what I like. Not just that, but it feels like the right: the </em>important thing to do…to trace the trail\n@@PB@@\nbackwards,"},
{page:30,type:"abstract",lines:19,date:"Feb 6",text:"let us begin with our first thought - of the day? No - as the light was created - set apart from the water - the sky. (Part of my nervousness is that the light seems to be disappearing rather rapidly. I’ve opened the blinds to somewhat remedy this unfortunate circumstance, and the light is all <em>white </em>because it has been raining - as though a compromise between the yellow sunlight and the gray of the rain water. My first thought being - on a day when I can do whatever I want, I’ve invented something so completely what I want, that it uses <em>my </em>tools, and <em>my </em>materials..this thing (that I’ve invented) is so <em>exactly </em>what I want (that I had to invent something new). It was not good enough to choose my favorite font - I had to make a new one. And it is not that I “like” it - it is only that it is completely whole and complete - authentic - <em>mine. </em>To continue at the ending,"},
{page:30,type:"ideas",lines:15,date:"Feb 6",text:"what I discovered about the stickers 1) I do not think the handwriting suits it very well. And I am always surprised that the drawing alone is itself enough - perhaps the point of the stickers in the first place. 2) they cannot be too small. They simply cannot - it makes them hard to handle…I don’t know. 3) some need to be altered - darkened or cropped. Nit picky work that doesn’t interest me - won’t until II have a specific purpose for the finished pieces. The good news is taht a lot of them came out well, and can be used as is. I can see narrowing it down to one half sheet per month,: September, October, November, December, January. Nov and Dec can go together. We’ll see…"},
{page:30,type:"abstract",lines:33,date:"Feb 6",text:"The second thought was of all the diverse processes that need to be down. Two generalizations that I dismissed as counter-productive (cognitive vehicle: not necessary) 1. The combination of artificial and automatic processes: the intuition, which of course is the same process used in Pairings, for both the\n@@PB@@\nimages, <em>and </em>the sayings - singling some out from a large body of images (or sayings), and then, if we zoom in — requires each various <em>different </em>processes - elimination - erasing. It was mayhem justifying which process I wanted to use because every time I had to say to myself “ah yes - better to cmd - x then - then I don’t have to deal with…and all sorts of permissions - the kind of procedure that is generated when you don’t know exactly the goal - the goal keeps changing - perhaps once for every decision - <em>there is no overarching theme </em>- and I have to keep remembering and forgetting this, as if a pill bottle said only: (pic: take as needed). But it isn’t even helpful to summarize, to generalize - and imagine I had to combine <em>part </em>of September with <em>half </em>of October , and a <em>little </em>of January - how would I explain that to myself - all the time pretending - pleased, sitting in a princess chair - that it was all part of an automatic process - one so specific that…<em>in the end I will have all nice</em> little stickers - with black lines, all the same thickness, and level of gray (black). most won’t have words, and then I’ll take my sheet of treasures and → do something with it. Something mysterious and important.\nFebruary 7"},
{page:31,type:"day",lines:25,date:"Feb 7",text:"Had some dreams last night, but I don’t really want to recall them. They were not particularly pleasant or interesting and so I will recall them later, because the recall is a struggle, and not worth it today. Instead I’ll recall last night before bed, perhaps due to the artificail deadline (pics of PWC before 11:00) I started on my trickiest assignment - summarizing the thoguhts of months past, and made speedy progress even. The [Hidden Mechanism] was that there were only perhaps 2-3 thoughts in November, one in December, and 2 in Janyary (no). Thoughts x Stickers v’ Once I believed that, I narrowed it down to the four notebooks of Septmeber, and the three of October. On October 24th, I was <em>so </em>sure that I was going to finish the Tot assignment. The 22nd was the hike and that night I discussed fine-tipped instruments of abstraction with myself. There were many more waiting to be made. Before that, I was a diligent student, publishing sites. Set theory and Studiously persevering in the cafe with Sean, on october 27th, I went to Rebecca’s Bridal Shower. On October 28th, I had a panic attack. And on October 30th, I had two conversations - one at Kenneth Hahn."},
{page:31,type:"ideas",lines:14,date:"Feb 7",text:"I decided the best way to go about the task could be to [take advantage of my temporal memory, and it’s apparent connection to “real world events,” and make a zoomed out calendar (month at a glance, ex) and then I directed myself to “design an efficient analog” to best accomplish this. …instead I went inside and Very Nicely finished up my (pic) and made a recreational metaphor when I strictly said to\n@@PB@@\nfinish October, as a permission slip to put my “undecided” of September (and one January) in a plastic envelope, only filling the bottom (())→ daddy had his girlfriend write his last paper → extenuating circumstances allowed for a special permission. (missing)"},
{page:32,type:"dreams",lines:6,date:"Feb 7",text:"The next dream was more of a thought - perhaps there was a flood - also blue and gray tones and I was traveling through the city and I had the thought that cars going over storm drains - it’s a lucky coincidence they’re wheels are so wide, and imagined bikes, and people’s feet falling in."},
{page:32,type:"day",lines:12,date:"Feb 7",text:"To update you on my progress: I first drew by hand, then printed eight sheets of pages, and now I’ve finished filling in almost all of October (on the right side) the “real activity chart” for lack of a more apt title, and a lot of september. I slowly, slowly had the idea of where exactly to put the “mental activity chart,” and ended up typing all of October in. I had the thought “Oh wow - this is very convenient ‘whoever made this [chart] knew exactly how I wanted it to be done - how I needed it (())→ thinking\n@@PB@@\nthings are coincidences when they’re not."},
{page:33,type:"abstract",lines:12,date:"Feb 7",text:"I’m daunted by the sheer number of ideas, size of the content - it seems each day could have up to seven ideas and I don’t know if I can keep them all in my head at once. And too, the ideas produce emotions in me - spur me on - which halts or disrupts the [processing]. However, I do feel I’ve met all the challenges head on thus far and so am confident I’ll be able to meet this one, it feels on step - perhaps close to the last one - along a long journey. Notes I had while I was working 1: to try to put <em>something </em>in every space.\nFebruary 8"},
{page:33,type:"day",lines:7,date:"Feb 8",text:"Slept badly, and I think it can be explained by the fact that I committed a double homicide in my dream. I woke up at 2:58 am and fell back to sleep around 4:00. Spent ~ an hour recording my thoughts, and we will (test) see which I remember, and which I can use the voice recording to recall.\ndream\n Dream:"},
{page:33,type:"dreams",lines:52,date:"Feb 8",text:"I was on some sort of trip - Hawaii? Again, cold gray/blue tones. End of the trip leaving arrangements, people were trying to coordinate themselves. I was on a balcony and pushed a girl over the edge. I spent a while trying to make myself not anxious about it - I didn’t do it on purpose, she’s not really dead, but in the end, I just had to change my perception of myself to being an evil person. At least I could tell someone, but no - I considered all the options and opportunities, and the best thing was to lie - lie through my teeth. I was good at it, and I felt horrible - like it was coming out of an evil, dark place in my soul. Another kill - a man who had been mean to me (but\n@@PB@@\n didn’t deserve death - J?) I’d gotten slightly angry over a small grievance. Now it was final and done. Did I wish Sean were dead? No, I was glad he was still alive. I didn’t hesitate, and told him about the murders, and he made joke about it - teased me “Now you’re a triple thread” (or something that made sense). Mommy did not seem too concerned about the deaths, but she knew both people, and had to field questions about them all day, and was feeling annoyed. (girl was her sister). I suddenly thought I was mad at the boy, and the last person seen with the girl - <em>how </em>will they not be able to tell it was me? My capture seemed inevitable. My second dream I similarly remember in vivid detail. I was at what turned out to be a comedy bar. Sat between Noa and Maddie and Noa got drunk and I took her outside (she was shiny) and she was leaning on me, and we had linked arms and she was confessing stuff because she was drunk. I thought: ugh - why did I confess to Charlie on the mexico trip when I was drunk. We were seated on lawn charis and the comedy wasn’t that funny. I asked if I’d have to perfom, and the answer was: no - only if you feel like it. The MC asked who’d paid the cover, and only one person - a man - raised their hand. Their set was ~ 7 minutes and halfway through, the MC started making a scene with a patron in the middle so the performer’s joke made no sense - we missed the dénouement, but since he seemed to want to be a serious comedian, we applauded. I looked on my notes app and saw a joke I’d written about apologizing, for the floweriness of it. I knew it’d be better, if I’d\n@@PB@@\n completed it, then any of the slop. Took away a letter from a cardboard scrap - revealed it to say: “hinge:” and thought Maddie might be annoyed/jealous."},
{page:33,type:"abstract",lines:55,date:"Feb 8",text:"The dream before I woke up at 3 seemed an almost perfect continuation of what I’d been doing in bed before sleep. In the morning, my theory (revised) is/was that: when my systems get “unaligned” (severance) then the directive seem to be coming from nowhere - some mysterious place. But as I felt alright, and <em>was </em>aligned, it became clear, as it was on several - many - several - occasions in the past, that they were just my thoughts represented <em>to me </em>as colors and even the: having to kill myself was just how I felt at the time. In a 5th dimension time lapse you would see me moving all jagged - consulting myself - a lag - as though negligible - a hidden mechanism - it “amounts to the same thing” but there <em>is </em>a bit of a difference ex. net sum). Sometimes it’s patterns that whatever the part of my brain that collects patterns, knows about, that don’t account for new information (thought of this on the way back to the road back to the road back to the 10) Perhaps my brain has an extra capacity - infinite memory - sense memory (because it’s only collecting one thing, it has a much higher (data-holding) capacity (?) Anyway: I suddenly gained the power to “control” myself and started seeing certain feelings that were manipulating the system, such as anxiety, but also “fear of disappointment” - buddhism pathologized - “everything is as good as anything else” - I’m scared to <em>want </em>something in case I don’t get it - the fear or being disappointed. I allowed myself to “want” to think about the continued iterations of the ink-drawn diagrams, and to dismiss other thoughts\n@@PB@@\nthat would hinder me from continuing my pursuit of the best way to “map” my thoughts - as there were a few attractive thoughts that had compelling emotional reasons to pursue them instead. I reminded myself - <em>manually</em>, <em>not</em> - through the system - of all the times I’d Decided that it’s best to stay on the main path. I think I watched my thoughts till I fell asleep - and it felt like I’d been given the power to bend thoughts (Matilda + Avatar). In my dream, the thoughts were white on black, printed on sticker paper, and I was doing complicated but pleasing maneuvering to get them where I wanted. My efforts were in the form of a pink line, that circled things, for example and drew arrows of where to put them. My analog would (pluperfect) have been confusing in that I was dreaming of the inside of my mind which is what I awoke to…and the two processes: thinking, and trying to remember my dream, were overlapping, or exactly the same. I will come back to the thoughts of that hour - I “promise,” but in the meantime…"},
{page:34,type:"abstract",lines:36,date:"Feb 8",text:"in the morning, I watched EZ-Book Design, and said to myself, that the people in the comments didn’t know why it was appealing…he simplifies the process of making decisions into bite-sized chunks (tricks you into thinking there weren’t a million more decisions - as though determinist - the way he chose was the <em>only </em>way - to watch is to believe that making decisions is easy - the paradox - it’s <em>about </em>making decisions - he both explores indecisiveness, and (…takes it away…) I felt guilty for spending so much time on instagram, but how is it any\n@@PB@@\ndifferent then taking a class on graphic design? I feel I learned so much. It inspired me. I know exactly how that design process feels - automation + artificial - get an idea - automaton (do it - in a way that can be undone - then: intuitive mind: “do I like it” (intuitive mind is what I apply to <em>everything - </em>every decision I make. The hidden mechanism of turning it on and off - giving me a headache<em> (()) → trying to paint the inside of my mind (())→ house painter (meant to be misinterpreted) (())→ also: a metaphor for myself - self: meant to be misinterpreted </em>when I tried to see (in summer, (if I would “like the stickers in advance.” I was inspired to see my own process as iterative - not new - only validated - and asked myself questions which led me to design a new increasingly incrementally tedious task x project for myself but when I remember that the <em>goal </em>is not acting, but a <em>process </em>- the process of making the stickers, and deciding between them - <em>no space</em> - like adding an intermediate step to the huge kits (gathering the items in boxes) And there were still some spaces, as evidence by last night’s hesitation."},
{page:35,type:"ideas",lines:23,date:"Feb 8",text:"Reassurance: I’m not going to use any of the new diagrams for the stickers - I’m <em>done </em>with the sticker project. I thought I might go to Primo Passo and bring along with me some new note/books - October 8th (pic) about seven pages - ah yes - tedi-mediate step - write (next to the day) - October 8th (6 pages) - 46/385 - Adobe - do some retro-pre-decided calculations based on that “math”) Directive: <em>enjoy</em> the time, and deliberation it takes to decide which things to illustrate the gold daisy leaf) and combine them with the things that go with them. Keep in mind the process of combining things that are like each other, and the pro-\n@@PB@@\nretro decision of - what categories they were/had gone into. (pluperfect x pro-retro v’ :) ) (new tense, who dis). Books will be nice and stackable since only a few pages (up to 10?) ← <em>that’s </em>the math! :) ) each, and with nice kraft covers, <em>no one </em>will say they aren’t books. Book design: (pic) - design element - fake paper - perfect for the intended audience (me - giving upside down smiley - with <em>real </em>sticker paper (ideally ripped, not cut, but 🤷\nFebruary 9th"},
{page:36,type:"day",lines:47,date:"Feb 9",text:"Went to 1010 downtown - saw Niha. everyone was complaining at Ramen that she invites people out and then doesn’t show up lol (Her friend had a breakup?) Zach came in the end and it was nice to see him again - we ended up chatting for a while, and then I thought he said “I’ma head out” and he was like “oh - that’s a good idea” so we left. I didn’t even know <em>why </em>I wanted to leave - I just didn’t want to be there anymore. Nothing specific to look forward to - maybe journaling, or maybe just <em>not </em>being there…loud, social anxiety - it’s about <em>time </em>I became autistic - one more thing I finally understand about people? Before that, I met Wesley and Marlon at All you can eat sushi in Little Tokyo - shishito peppers - albacore + spicy tuna special roll + unagi: nigiri x2 + tuna x2 - way too much food and I had to force myself to choke it down - I wasn’t even hungry, and I hadn’t been hungry when I got Kazu Nori last night - just one toro + sake one cup. Then we went to the Stationary Store, and got 0.28 pens, and a small horizontal watercolor book with little examples on the cover and then to Somi Somi (pic) ← strawberry + cookies n’ cream with nutella + fruity/cocoa pebbles and bischoff. Last night, at like 1 am, we went to Ralphs and got <em>all </em>sorts of random snacks - sweet potato x vegetable chips, chocolate peanut butter cup, and lemon marion berry ice cream, blackberries, 0 calories, caffeine diet coke (ew) and a belgian waffle (we went there to get totinos pizza rolls based on a tiktok we\n@@PB@@\nwatched and I choked/coughed on one of the veg chips for the whole latter half of the car ride, and then we we got back, he still didn’t even get me water - I had to get it myself which I wasn’t allowed to feel upset about, though it did feel like it crossed the threshold of something I should be upset about :(. And then we watched “The Curse” with Nathan Fielder on the couch, and then in bed, but: was getting tired and was still kinda upset and I didn’t know how to get us to cuddle, though he did hold me nice and tight in his black hoodie that’s <em>either </em>for the grocery store/fashion week, but nothing in between and then I held him, and we switched off all night, and then in the morning."},
{page:37,type:"day",lines:47,date:"Feb 9",text:"At the party, which was at this random divorced lawyer’s apartment, wearing a green jersey, he asked if I was worried cause of my moonstone ring, and I said I was divorced. He seemed to have no idea how all these people got in his house. I wondered why I was attracted to the oldest person there - perhaps cause he was the only one who seemed able to carry on a conversation. Wesley came, and eventually left by himself. Oh yeah, and I offered to take this really sweet cute asian girl that met Markis at a coding meetup and then had left my key at the restaurant so we had to literally run back, cause she was cold and the walk was super long, and past broken glass and a dead rat that was ngl kinda cute. There\n@@PB@@\nwere lots of nice moments today I will say, and quite a variety of situations - in a way could make up for the many days I’d spent alone in my house, if it needed to be made up for. Just like all the other times, I never really “decided” to end my long stint of being alone, but seem to be hitting the ground running - just one thing to the next. And the party we ended up at wasn’t even in anyone’s plan - just took <em>forever </em>for Niha to become available (kept saying she was “getting cigs” while we were waiting, I called Markis cause her phone was dead (?) and we met him at the sauna, this extremely loud, talkative black girl who collects perfumes from Quatar (but who still had calm energy, so I had to realize these two qualities slowly) didn’t recognize Markis when a man emerged from the sauna, wearing only unders so instead, Wesley, Michelle, and I, who felt like the 4 jews wandering in the dessert, looking for a place to rest our tired heart - found three massage chairs. Then Amanda, Geordan, and Markis came, and watched us get massaged for ~ the whole 20 minutes. It was mildly pleasant, specifically on my back and shoulders/upper but I didn’t want it to clamp down on my ankles, though with some encouragement, I let it. But it was nice to get out of the cold, both literally, and metaphorically. Anyway, I convinced the six of us to get Ramen, and bad mouth Niha - a genius move, and one that I wouldn’t have\n@@PB@@\nthought was possible. I went outside (at the party)"},
{page:39,type:"day",lines:47,date:"Feb 9",text:"Once I got overwhelmed by the music and I “didn’t care anymore,” and was offered cocaine by this hot black lesbian, who had repeatedly found reasons to take the 40-year old divorced lawyer away from me - ex. two cups broke etc. to do cocaine and I guess I said “wow” and she made lots of fun of me for suddenly becoming white extra funny cause I <em>am </em>white but I thought it was funny anyway - like “golly gosh gee whizz” and I saw a picture of her and her wife and she asked me what I was. I said: “you mean bi?” and I liked that she just asked me, and I could say yes. She said she could always tell, but niha was an exception, and I was like “Oh yeah: I tried to kiss her when we first met, but she wouldn’t let me” lol then she said she was a “gold star” lesbian and asked if I knew what it was, and I said I didn’t, but thought I had figured it out and then she was like: “Wait, why are we talking about this if you don’t even know what it means?!” and I was like: “is it when you’re a lesbian that’s <em>never </em>hooked up with a guy before” and then she called me Elon Musk cause of how smart I was haha. I thought that was lovely. Then markis\n@@PB@@\nput on 212 cause he somehow knew it was my favorite song (oh, cause he played it at my house that one night after Killer Noodle) and she was like “who knows all the words” and I did, and I <em>kept </em>(?) to prove it to her. Then later, she picked me up. I forget why. I had been staring at these chocolate muffins for a while but resisted the temptation and 40 div/law said his get to know you game: something you’re attracted to but scared of and I said the chocolate muffins and he said “eating blow fish” and then I didn’t wanna talk to him anymore, cause that was a stupid answer, so I just waited for someone like Yair or lesbian to take him away, and walked away, maybe even a little <em>before </em>they did. Anyway. Towards the end, I saw Niha, Markis, and Zach all going towards the kitchen, and I followed to see why, and Zach said “Do you want a cupcake?” And I was like: “Oh. my. god.” “yes.” and I was sooo excited, and Markis gave me the first bite cause I’m the guest of honor, cause I never come anymore. And I got a chocolate chip in it. Jonathan <em>really </em>wanted to f (missing)\nFebruary 10"},
{page:40,type:"day",lines:23,date:"Feb 10",text:"It feels illegal to get up this early (8:36) knowing I went to bed at 2:15 but I am anyway. (missing) accidentally froze my blackberries and taped my yoghurt shut to put it back in the fridge. Escaping in my mind to New York during infinite handwriting practice ⇒ going <em>more </em>into my mind by drawing little pictures of all the nice things that happened yesterday<em> (missing) J said he hadn’t fucked anyone else in like a year and a half - since we met. First of all, we met exactly a year ago (Feb 8th) and second of all, he’s fucked </em>two <em>other girls - Lane, and one other - I dreamt about it - I </em>remembered <em>he was lying about it in my dream. he said, just before he fucked me just to be nice, that he had “so many dreams about me” (us running through fields maybe). His head was above me - a blob in his black sweatshirt. (missing) Last night I intentionally stayed up late, past the point of tiredness, cause I wanted to “finish something” - I even went back, and drew pictures for old days, as a decision on what I’m </em>going <em>to do. </em>what it has in common: escaping (no haha)"},
{page:41,type:"abstract",lines:13,date:"Feb 10",text:"Retroactive reason to leave a blank page after every entry - so I can draw the things for it, but it breaks my rules, (())→ you can see what rules/how I’m feeling ex. writing the “i” as uppercase (I’m following the conventional rules today” - cause I’m gearing up to will power, because I <em>know </em>I want to work on something - I’m <em>making </em>the lines stay straight - ?thinking about it on purpose… ex. I’ve stopped using (paragraph) symbols (cause I don’t want to be so abrupt/disrupt everything) and I’m not in a huge rush, so I’m spelling out words like “cuz” cause Ii don’t want to feel rushed retrospectively :)\nMIDDAY"},
{page:41,type:"day",lines:49,date:"Feb 10",text:"Took a nap, ate the food I ordered 41 mins before I fell asleep (yummy mole!) :)), took a shower and now it’s sunny, though I’m inside journaling and I’m wearing boxers that someone left here, and a gray henley that fits me though it’s too big. Now that M is giving off competing patterns, I remember the pre of my obsession slideshow - competing patterns - missing link, and seems like a jumping off point for the rest. I thought of some other things that happened at the party, and that I wanted to write down. J telling me about his “first date at Father’s Office” where he randomly kissed a girl, and neither wanted it hahaha I was listening in the car like “wait - he had <em>another </em>first date at Father’s Office and then he said it was about me and I was like “that was <em>not </em>our first date!” Wesley complaining that the “gorilla stamp” on his bag was evidence of racism ha! Marlon did <em>not </em>wanna touch that. Marlon didn’t wanna come to the rooftop party, and\n@@PB@@\nI took that opportunity to “let slip” that I make a ton of money because they were saying marriage benefits and I was like “no, it’s a parabola.” Then I realized I couldn’t explain the math without inserts and whatever - they were <em>so </em>sure that they had so much money with their tech job. they were visibly and audibly surprised. And then Wesley (cause I was feeling embarrassed so I put my chopsticks, and my head down” was like “she’s bored of talking about work” and that made it soo much better hahaha. I found this jar of jelly beans in one of the bags probs brought from the superbowl party and became transfixed with all the colors and told the divorced host that if they were mine, I would totally organize all of them by color, and try to match them to the flavors on the back and he was like “oh - do you have OCD” and I got to say “Yes!” and not be lying, even though it had <em>nothing </em>to do with wanting to do that. Then he asked if I was married after seeing my giant glob of moonstone on my finger. 1. No, I’m divorced, 2. Yes, to myself. 3. It’s a ring I got out of transitive beneficence. 1. all the rings i sold 2. expanding to infinity\nI chose “divorced” and we got to bump fists :) nice :)\n⇒ what they have in common: the ability to speak the truth and be completely misunderstood. Ok fine! I’ll write my dream 🙄\nFebruary 11th"},
{page:42,type:"day",lines:5,date:"Feb 11",text:"Somehow managed to sleep from 3:00 - 11:00, despite the garbage truck. And I remember <em>so </em>many dreams. I’m starting to think the main benefit of dream recall is the competitive aspect - the impressive featness of it…\ndream (robert)\n I dreamt that when"},

name: JournalReader
options:
  bundleIdPrefix: com.sageryza
  deploymentTarget:
    # iOS 17 minimum: the app uses the two-parameter onChange(of:) { old, new }
    # form, which is iOS 17+.
    iOS: "17.0"
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
targets:
  JournalReader:
    type: application
    platform: iOS
    sources:
      - path: JournalReader
        excludes:
          - Info.plist
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFunctions
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sageryza.journal
        GENERATE_INFOPLIST_FILE: YES
        # Partial plist merged into the generated Info.plist — adds the mic /
        # speech usage strings and Files sharing.
        INFOPLIST_FILE: JournalReader/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        # "Journal" is reserved by Apple's own app, so uploading with that
        # display name is rejected (ITMS-90129). Use a unique name.
        INFOPLIST_KEY_CFBundleDisplayName: "JournalReader"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"

name: XI
options:
  bundleIdPrefix: com.sageryza
  deploymentTarget:
    iOS: "16.0"
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"
targets:
  XI:
    type: application
    platform: iOS
    sources:
      - path: XI
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sageryza.xi
        GENERATE_INFOPLIST_FILE: YES
        # Partial plist merged into the generated Info.plist — adds the Google
        # OAuth callback URL scheme (REVERSED_CLIENT_ID) for Google Sign-In.
        INFOPLIST_FILE: XI/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_CFBundleDisplayName: "times i"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        # iPhone-only for the first submission — smaller review surface (no iPad
        # layout to polish, no iPad screenshots to supply).
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
    entitlements:
      path: XI.entitlements
      properties:
        # Sign in with Apple — required (guideline 4.8) because the app also
        # offers Google sign-in.
        com.apple.developer.applesignin:
          - Default
        # Universal links — a tapped incaseofamnesia.com/share/… link opens the
        # app and offers to add that board's memories to your Commons. Held out
        # of the build until certificate reuse is proven (re-add after), so the
        # first cert-reuse build changes only one thing at a time.
        # com.apple.developer.associated-domains:
        #   - applinks:incaseofamnesia.com
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseFunctions
      - package: GoogleSignIn
        product: GoogleSignIn

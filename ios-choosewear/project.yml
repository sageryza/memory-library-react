name: ChooseWear
options:
  bundleIdPrefix: com.sageryza
  deploymentTarget:
    iOS: "17.0"
targets:
  ChooseWear:
    type: application
    platform: iOS
    sources:
      - ChooseWear
    settings:
      base:
        # The App Store Connect records got their bundle IDs crossed vs their
        # names: the record NAMED "choose what to wear" is bundle
        # com.sageryza.sidequest. So this (the Choose-What-to-Wear app) must ship
        # to that bundle to land on the correctly-named listing.
        PRODUCT_BUNDLE_IDENTIFIER: com.sageryza.sidequest
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_CFBundleDisplayName: Choose What I Wear
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"

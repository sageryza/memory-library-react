<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SAGEDIAGRAM — drawing captioner</title><style>
:root{--bg:#f4efe6;--ink:#2e2a24;--line:#d8cfbf}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,Segoe UI,Roboto,sans-serif}
header{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--line);padding:14px 18px;z-index:5}
h1{margin:0 0 8px;font-size:18px}
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.tabs button{border:1px solid var(--line);background:#fff;border-radius:6px;padding:5px 11px;cursor:pointer;font-size:13px}
.tabs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:13px}
.controls button,.controls label.btn{border:1px solid var(--line);background:#fff;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:13px}
.controls button.primary,.controls label.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.count{opacity:.7;margin-left:auto}
#drop{margin:16px;border:2px dashed var(--line);border-radius:10px;padding:34px;text-align:center;color:#8a8171;background:#fffdf8}
#drop.hot{background:#efe7d6;border-color:#b9a77a}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;padding:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.card img{width:100%;aspect-ratio:1;object-fit:contain;background:#fff;cursor:zoom-in}
.card input{border:0;border-top:1px solid var(--line);padding:8px;font-size:13px;width:100%;font-family:inherit;background:#fff}
.card input:focus{outline:2px solid #cdbb8a;outline-offset:-2px}
#lb{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:20;cursor:zoom-out}
#lb img{max-width:92vw;max-height:88vh;background:#fff;border-radius:8px}
.hint{font-size:12px;opacity:.65;margin-top:6px}
</style></head><body>
<header><h1>SAGEDIAGRAM — drawing captioner</h1>
<div class="tabs" id="tabs"></div>
<div class="controls">
<label class="btn primary">➕ Add images<input id="file" type="file" accept="image/*" multiple hidden></label>
<button class="primary" id="exp">⬇ Export captions (.json)</button>
<button id="clr">Clear all</button>
<span class="count" id="cnt"></span>
</div>
<div class="hint">Drag images anywhere, or “Add images.” Months are read from filenames (e.g. <code>april_…</code>, <code>october_…</code>); anything else lands in “Unsorted.” Images + captions save in your browser and survive a reload. Export the JSON to hand back for training.</div>
</header>
<div id="drop">Drop your drawings here</div>
<div class="grid" id="g"></div>
<div id="lb"><img></div>
<script>
const CAPKEY='sagediagram_caps_v1';
let caps=JSON.parse(localStorage.getItem(CAPKEY)||'{}');
let items=[], filt='all', db;
const ORDER=['February','March','April','Summer','September','October','Composite','Oldest','Unsorted'];
const monthOf=f=>{const s=f.toLowerCase();
  if(s.includes('february'))return 'February';
  if(s.includes('end-of-march')||s.includes('march'))return 'March';
  if(s.includes('april'))return 'April';
  if(s.includes('summer'))return 'Summer';
  if(s.includes('september'))return 'September';
  if(s.includes('october'))return 'October';
  if(s.includes('composite'))return 'Composite';
  if(s.includes('oldest'))return 'Oldest';
  return 'Unsorted';};

function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open('sagediagram_imgs',1);
  r.onupgradeneeded=()=>r.result.createObjectStore('imgs',{keyPath:'name'});
  r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function put(rec){return new Promise((res,rej)=>{const t=db.transaction('imgs','readwrite');t.objectStore('imgs').put(rec);t.oncomplete=res;t.onerror=()=>rej(t.error);});}
function all(){return new Promise((res,rej)=>{const t=db.transaction('imgs','readonly');const q=t.objectStore('imgs').getAll();q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error);});}
function clearDB(){return new Promise(res=>{const t=db.transaction('imgs','readwrite');t.objectStore('imgs').clear();t.oncomplete=res;});}

const g=document.getElementById('g'),cnt=document.getElementById('cnt'),tabs=document.getElementById('tabs'),drop=document.getElementById('drop');
function updateCount(){const n=Object.values(caps).filter(v=>v&&v.trim()).length;cnt.textContent=items.length+' images · '+n+' captioned';}
function renderTabs(){
  const present=ORDER.filter(m=>items.some(i=>i.month===m));
  tabs.innerHTML='<button data-m="all">All '+items.length+'</button>'+
    present.map(m=>'<button data-m="'+m+'">'+m+' '+items.filter(i=>i.month===m).length+'</button>').join('');
  [...tabs.children].forEach(b=>{b.classList.toggle('on',b.dataset.m===filt);
    b.onclick=()=>{filt=b.dataset.m;renderTabs();render();};});
}
function render(){g.innerHTML='';drop.style.display=items.length?'none':'block';
  for(const it of items){ if(filt!=='all'&&it.month!==filt)continue;
    const d=document.createElement('div');d.className='card';
    const img=document.createElement('img');img.loading='lazy';img.src=it.dataURL;
    img.onclick=()=>{const lb=document.getElementById('lb');lb.querySelector('img').src=it.dataURL;lb.style.display='flex';};
    const inp=document.createElement('input');inp.value=caps[it.name]||'';
    inp.oninput=()=>{caps[it.name]=inp.value;localStorage.setItem(CAPKEY,JSON.stringify(caps));updateCount();};
    d.appendChild(img);d.appendChild(inp);g.appendChild(d);
  }}
async function addFiles(list){
  for(const file of list){ if(!file.type.startsWith('image/'))continue;
    const dataURL=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(file);});
    const rec={name:file.name,dataURL,month:monthOf(file.name)};
    await put(rec);
    const k=items.findIndex(i=>i.name===rec.name); if(k>=0)items[k]=rec; else items.push(rec);
  }
  items.sort((a,b)=>ORDER.indexOf(a.month)-ORDER.indexOf(b.month)||a.name.localeCompare(b.name));
  renderTabs();render();updateCount();
}
document.getElementById('file').onchange=e=>addFiles(e.target.files);
['dragover','dragenter'].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('hot');}));
['dragleave','drop'].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('hot');}));
document.addEventListener('drop',e=>{if(e.dataTransfer.files.length)addFiles(e.dataTransfer.files);});
document.getElementById('exp').onclick=()=>{
  const clean={};for(const k in caps){if(caps[k]&&caps[k].trim())clean[k]=caps[k].trim();}
  const blob=new Blob([JSON.stringify(clean,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sagediagram-captions.json';a.click();};
document.getElementById('clr').onclick=async()=>{if(confirm('Remove all images and captions from this browser?')){await clearDB();localStorage.removeItem(CAPKEY);caps={};items=[];renderTabs();render();updateCount();}};
document.getElementById('lb').onclick=()=>document.getElementById('lb').style.display='none';
(async()=>{db=await openDB();items=await all();
  items.sort((a,b)=>ORDER.indexOf(a.month)-ORDER.indexOf(b.month)||a.name.localeCompare(b.name));
  renderTabs();render();updateCount();})();
</script></body></html>

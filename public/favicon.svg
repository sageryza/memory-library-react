<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark background -->
  <rect width="64" height="64" fill="#1a1a2e"/>

  <!-- Connection lines -->
  <line x1="16" y1="20" x2="32" y2="32" stroke="#8b7355" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="32" x2="48" y2="24" stroke="#8b7355" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="32" x2="20" y2="44" stroke="#8b7355" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="32" x2="44" y2="44" stroke="#8b7355" stroke-width="1.5" opacity="0.6"/>
  <line x1="48" y1="24" x2="44" y2="44" stroke="#8b7355" stroke-width="1.5" opacity="0.6"/>

  <!-- Nodes/pins -->
  <circle cx="16" cy="20" r="3" fill="#d4af37"/>
  <circle cx="48" cy="24" r="3" fill="#d4af37"/>
  <circle cx="20" cy="44" r="3" fill="#d4af37"/>
  <circle cx="44" cy="44" r="3" fill="#d4af37"/>

  <!-- Central node (highlighted) -->
  <circle cx="32" cy="32" r="4" fill="#e8c468"/>
  <circle cx="32" cy="32" r="2.5" fill="#1a1a2e"/>
</svg>

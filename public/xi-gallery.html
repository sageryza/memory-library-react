<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xi — New Card Art</title>
<style>
 *{box-sizing:border-box;margin:0;padding:0}
 body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#111;color:#eee;padding:20px;padding-bottom:60px}
 header{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:18px}
 h1{font-size:20px;font-weight:600}
 .sub{color:#888;font-size:13px}
 .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
 .card{background:#fff;border-radius:6px;overflow:hidden;cursor:pointer;border:1px solid #222}
 .card img{width:100%;aspect-ratio:1;object-fit:contain;background:#fff;display:block}
 .cap{color:#111;text-align:center;font-size:12px;font-weight:600;letter-spacing:1px;padding:8px 6px;border-top:1px solid #eee}
 .deck{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.55);color:#fff;font-size:10px;padding:2px 6px;border-radius:6px}
 .wrap{position:relative}
 #lb{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:20px;z-index:10}
 #lb img{max-width:90vw;max-height:78vh;background:#fff;border-radius:6px}
 #lb .lcap{color:#fff;font-size:16px;letter-spacing:2px;font-weight:600}
 #lb .hint{color:#888;font-size:12px}
</style></head><body>
<header><h1>Xi — New Card Art</h1><span class="sub">32 cards · tap any to view full size</span></header>
<div class="grid" id="grid"></div>
<div id="lb"><img id="lbimg"><div class="lcap" id="lbcap"></div><div class="hint">tap anywhere to close</div></div>
<script>
const cards=[{"cap": "CUT THROUGH RED TAPE", "img": "/xi-cards/aea7380980972f42.webp", "deck": "Daily"}, {"cap": "TRADED PLACES", "img": "/xi-cards/c4b87e0e8e84ff98.webp", "deck": "Daily"}, {"cap": "TOOK THE BLAME", "img": "/xi-cards/41024252dcce0bec.webp", "deck": "Daily"}, {"cap": "WAITED FOR NOTHING", "img": "/xi-cards/579994d555c9c581.webp", "deck": "Daily"}, {"cap": "IGNORED MY GUT", "img": "/xi-cards/a85e0d81ef65b498.webp", "deck": "Daily"}, {"cap": "WAS RIGHT ALL ALONG", "img": "/xi-cards/16f3c4431382e3dd.webp", "deck": "Daily"}, {"cap": "WATCHED IT HAPPEN", "img": "/xi-cards/1095a7a69a937813.webp", "deck": "Daily"}, {"cap": "KEPT MY MOUTH SHUT", "img": "/xi-cards/d4f2e1e6c01750b3.webp", "deck": "Daily"}, {"cap": "GOT EVEN", "img": "/xi-cards/b78f8b371413b07f.webp", "deck": "Daily"}, {"cap": "LEFT IN THE DARK", "img": "/xi-cards/807d781640f986ee.webp", "deck": "Daily"}, {"cap": "FORGOT AGAIN", "img": "/xi-cards/8bd8cf0f42dde8a9.webp", "deck": "Daily"}, {"cap": "COULDN'T SAY NO", "img": "/xi-cards/a5d70fac52cf21a3.webp", "deck": "Daily"}, {"cap": "ON THE WAY OUT", "img": "/xi-cards/237f7a2cf997c404.webp", "deck": "Daily"}, {"cap": "NO QUESTIONS ASKED", "img": "/xi-cards/5f8cd1adf194d974.webp", "deck": "Daily"}, {"cap": "NOBODY NOTICED", "img": "/xi-cards/5b2f7e6b20cba063.webp", "deck": "Daily"}, {"cap": "TWO AGAINST ONE", "img": "/xi-cards/70afb5adf58803fb.webp", "deck": "Daily"}, {"cap": "FOR NOTHING", "img": "/xi-cards/b34e2a388eb99d26.webp", "deck": "Daily"}, {"cap": "WITHOUT TRYING", "img": "/xi-cards/fa163a5d71d508c1.webp", "deck": "Daily"}, {"cap": "WITHOUT KNOWING WHY", "img": "/xi-cards/9c8cacccc0e70d8f.webp", "deck": "Daily"}, {"cap": "AGAINST MY BETTER JUDGMENT", "img": "/xi-cards/cb49f8c2afb44bd7.webp", "deck": "Daily"}, {"cap": "IN THE DARK", "img": "/xi-cards/e42f3626300645ab.webp", "deck": "Daily"}, {"cap": "IN PLAIN SIGHT", "img": "/xi-cards/367b946cbd7c96d7.webp", "deck": "Daily"}, {"cap": "WHILE EVERYONE WATCHED", "img": "/xi-cards/d727fee4daf22c92.webp", "deck": "Daily"}, {"cap": "OUT OF LOYALTY", "img": "/xi-cards/fa848ae13f79edfe.webp", "deck": "Daily"}, {"cap": "WITHOUT MEANING TO", "img": "/xi-cards/b21f5a3e64af01b8.webp", "deck": "Daily"}, {"cap": "OUT OF THE BLUE", "img": "/xi-cards/360f19c5084bd1bd.webp", "deck": "Daily"}, {"cap": "OVERNIGHT", "img": "/xi-cards/c12950011988df62.webp", "deck": "Daily"}, {"cap": "TOO LATE", "img": "/xi-cards/f29a5a2aa5263f75.webp", "deck": "Daily"}, {"cap": "DID MY BEST", "img": "/xi-cards/13eb994f41488a77.webp", "deck": "Dreams"}, {"cap": "USED EVERYTHING UP", "img": "/xi-cards/3df9fcab25cded78.webp", "deck": "Dreams"}, {"cap": "TRIED, TWICE", "img": "/xi-cards/5b9f4089c4c25fd9.webp", "deck": "Dreams"}, {"cap": "KNEW THEM FROM BEFORE", "img": "/xi-cards/adda7af067795cb4.webp", "deck": "Dreams"}];
const bust='?v=6';
const grid=document.getElementById('grid');
grid.innerHTML=cards.map((c,i)=>`<div class="wrap"><div class="card" data-i="${i}"><span class="deck">${c.deck}</span><img src="${c.img}${bust}" loading="lazy"><div class="cap">${c.cap}</div></div></div>`).join('');
const lb=document.getElementById('lb'),lbimg=document.getElementById('lbimg'),lbcap=document.getElementById('lbcap');
grid.addEventListener('click',e=>{const t=e.target.closest('.card');if(!t)return;const c=cards[+t.dataset.i];lbimg.src=c.img+bust;lbcap.textContent=c.cap;lb.style.display='flex';});
lb.addEventListener('click',()=>lb.style.display='none');
</script></body></html>

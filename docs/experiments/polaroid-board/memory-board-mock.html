<title>Memory Board — polaroid mock</title>
<style>
:root{
  --desk:#F3EADA; --desk-grain:rgba(94,72,44,.055); --pol:#FFFEF8; --ink:#2A2318;
  --string:#dc143c; --pin-hi:#ff6b7a; --pin-tail:#999; --shadow:rgba(56,40,18,.30); --label:#8B7A5E;
}
@media (prefers-color-scheme: dark){:root{
  --desk:#241D14; --desk-grain:rgba(0,0,0,.25); --pol:#F5F2E8;
  --string:#e0304f; --shadow:rgba(0,0,0,.55); --label:#9C8A69;
}}
:root[data-theme="dark"]{
  --desk:#241D14; --desk-grain:rgba(0,0,0,.25); --pol:#F5F2E8;
  --string:#e0304f; --shadow:rgba(0,0,0,.55); --label:#9C8A69;
}
:root[data-theme="light"]{
  --desk:#F3EADA; --desk-grain:rgba(94,72,44,.055); --pol:#FFFEF8;
  --string:#dc143c; --shadow:rgba(56,40,18,.30); --label:#8B7A5E;
}
*{margin:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:
    radial-gradient(1200px 700px at 30% 10%, rgba(255,244,214,.35), transparent 60%),
    repeating-linear-gradient(2deg, transparent 0 22px, var(--desk-grain) 22px 23px),
    var(--desk);
  overflow:hidden; font-family: Georgia, 'Times New Roman', serif; color:var(--ink);
  touch-action:none;
}
#board{position:fixed; inset:0}
svg#web{position:absolute; inset:0; width:100%; height:100%; pointer-events:none}
svg#web path{fill:none; stroke:var(--string); stroke-width:2; stroke-linecap:round;
  filter:drop-shadow(0 2px 1px var(--shadow))}
/* Real Polaroid 600 geometry: 88mm x 107mm card, square picture, thin even
   border on the sides and top, wide chin at the bottom. */
.pol{
  position:absolute; width:clamp(118px, 27vw, 196px); aspect-ratio:88/107;
  padding:5.7% 5.1% 0; background:var(--pol);
  display:flex; flex-direction:column;
  box-shadow:0 7px 16px var(--shadow), 0 1px 3px var(--shadow);
  transform:rotate(var(--rot)); cursor:grab; user-select:-webkit-none;user-select:none;
  border-radius:1.5px;
}
.pol:active{cursor:grabbing}
.pol.drag{box-shadow:0 16px 30px var(--shadow); z-index:30}
/* 90s Polaroid 600 film: washed low-contrast tones, warm creamy highlights,
   a soft warm cast, gentle vignette, and a hint of gloss on the print. */
.shot{position:relative; width:100%; aspect-ratio:1/1; overflow:hidden; background:#EDE4D2}
.shot img{width:100%; height:100%; object-fit:cover; display:block; pointer-events:none;
  filter:brightness(1.07) contrast(.85) sepia(.24) saturate(.9)}
.shot::after{content:""; position:absolute; inset:0; pointer-events:none;
  background:
    linear-gradient(115deg, rgba(255,255,255,.16) 0%, rgba(255,255,255,0) 34%),
    radial-gradient(ellipse at 50% 46%, rgba(0,0,0,0) 58%, rgba(66,50,28,.20) 100%),
    linear-gradient(rgba(255,236,196,.10), rgba(210,180,140,.08));
}
.pol figcaption{
  flex:1; display:flex; align-items:center; justify-content:center;
  font-family:'Bradley Hand','Noteworthy','Savoye LET','Segoe Print','Comic Sans MS',cursive;
  font-size:clamp(11px,3vw,16px); text-align:center; color:var(--ink);
  letter-spacing:.02em; white-space:nowrap; overflow:hidden;
}
/* The app's pushpin: crimson head with a highlight, little gray tail, top-right corner. */
.pin{position:absolute; top:-13px; right:-4px; width:20px; height:24px; z-index:2; pointer-events:none}
.pin-circle{
  position:absolute; top:0; left:8px; width:12px; height:12px; border-radius:50%;
  background:radial-gradient(circle at 30% 30%, var(--pin-hi) 30%, var(--string) 50%);
  box-shadow:0 2px 3px var(--shadow); z-index:2;
}
.pin-tail{
  position:absolute; top:10px; left:12px; width:2px; height:14px;
  background:var(--pin-tail); transform:rotate(15deg); transform-origin:top center; z-index:1;
}
#brand{
  position:fixed; left:14px; bottom:12px; z-index:40;
  font-family:ui-monospace,Menlo,monospace; font-size:11px; letter-spacing:.28em;
  color:var(--label); pointer-events:none;
}
#hint{
  position:fixed; right:14px; bottom:12px; z-index:40; font-style:italic;
  font-size:12px; color:var(--label); pointer-events:none;
}
@media (prefers-reduced-motion:no-preference){
  .pol{transition:box-shadow .18s ease}
}
</style>

const PAIRS = [[0, 4], [1, 8], [2, 6], [3, 0], [4, 7], [5, 1], [7, 3], [8, 5], [4, 2]];
const board = document.getElementById('board');
const svg = document.getElementById('web');
const pols = [...document.querySelectorAll('.pol')];

function place(){
  const bw = board.clientWidth, bh = board.clientHeight;
  pols.forEach(p=>{
    if (p.dataset.placed) return;
    p.style.left = (parseFloat(p.dataset.x)/100*bw) + 'px';
    p.style.top  = (parseFloat(p.dataset.y)/100*bh) + 'px';
    p.dataset.placed = '1';
  });
}
// Strings tie to the pushpin head at each polaroid's top-right corner.
function pinPoint(p){
  const r = p.getBoundingClientRect(), b = board.getBoundingClientRect();
  return [r.right - b.left - 8, r.top - b.top + 1];
}
function draw(){
  let d = '';
  for (const [a,b] of PAIRS){
    const [x1,y1] = pinPoint(pols[a]), [x2,y2] = pinPoint(pols[b]);
    const mx = (x1+x2)/2, my = (y1+y2)/2 + Math.hypot(x2-x1,y2-y1)*0.07;
    d += `<path d="M ${x1} ${y1} Q ${mx} ${my} ${x2} ${y2}"/>`;
  }
  svg.innerHTML = d;
}
let drag = null;
pols.forEach(p=>{
  p.addEventListener('pointerdown', e=>{
    drag = {p, dx: e.clientX - p.offsetLeft, dy: e.clientY - p.offsetTop};
    p.classList.add('drag'); p.setPointerCapture(e.pointerId);
  });
  p.addEventListener('pointermove', e=>{
    if (!drag || drag.p !== p) return;
    p.style.left = (e.clientX - drag.dx) + 'px';
    p.style.top  = (e.clientY - drag.dy) + 'px';
    draw();
  });
  const up = ()=>{ if(drag){drag.p.classList.remove('drag'); drag=null;} };
  p.addEventListener('pointerup', up); p.addEventListener('pointercancel', up);
});
addEventListener('resize', ()=>{ draw(); });
place(); requestAnimationFrame(draw);
</script>

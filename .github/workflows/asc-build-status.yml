# Deck Factory TestFlight build status — asks the App Store Connect API what
# state the latest uploads are in (processing / valid / invalid) and whether
# they're held on the export-compliance question. If the newest build is
# processed but waiting on compliance, it answers it (usesNonExemptEncryption
# = false — the app only makes standard HTTPS calls, which is exempt), which
# is what makes the TestFlight "Update" button appear.
#
# Runs on pull_request (paths-filtered to itself) so it can be exercised from
# a branch without touching main; also dispatchable once merged. Reuses the
# same ASC_* secrets as the TestFlight workflows. Prints only build metadata,
# never key material.
name: ASC build status (Deck Factory)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/asc-build-status.yml'

jobs:
  status:
    runs-on: ubuntu-latest
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
      BUNDLE_ID: com.sageryza.imageforge
    steps:
      - name: Install deps
        run: pip install --quiet pyjwt cryptography requests

      - name: Query builds (and clear compliance hold if that's the blocker)
        run: |
          python3 - <<'EOF'
          import base64, json, os, time
          import jwt, requests

          key = base64.b64decode(os.environ["ASC_KEY_P8"])
          token = jwt.encode(
              {"iss": os.environ["ASC_ISSUER_ID"], "exp": int(time.time()) + 1200,
               "aud": "appstoreconnect-v1"},
              key, algorithm="ES256", headers={"kid": os.environ["ASC_KEY_ID"]})
          H = {"Authorization": f"Bearer {token}"}
          API = "https://api.appstoreconnect.apple.com/v1"

          apps = requests.get(
              f"{API}/apps", headers=H,
              params={"filter[bundleId]": os.environ["BUNDLE_ID"]}).json()
          if not apps.get("data"):
              raise SystemExit(f"no app found for {os.environ['BUNDLE_ID']}: {json.dumps(apps)[:400]}")
          app = apps["data"][0]
          print(f"app: {app['attributes']['name']} ({app['id']})")

          builds = requests.get(
              f"{API}/builds", headers=H,
              params={"filter[app]": app["id"], "sort": "-uploadedDate", "limit": "5",
                      "fields[builds]": "version,processingState,usesNonExemptEncryption,uploadedDate,expired"}).json()
          if not builds.get("data"):
              raise SystemExit("no builds found")
          for b in builds["data"]:
              a = b["attributes"]
              print(f"build {a['version']:>4} | {a['processingState']:<10} | "
                    f"compliance={a['usesNonExemptEncryption']} | expired={a['expired']} | {a['uploadedDate']}")

          latest = builds["data"][0]
          a = latest["attributes"]
          if a["processingState"] == "VALID" and a["usesNonExemptEncryption"] is None:
              print("latest build is processed but held on export compliance — answering (exempt/HTTPS-only)…")
              r = requests.patch(
                  f"{API}/builds/{latest['id']}",
                  headers={**H, "Content-Type": "application/json"},
                  json={"data": {"id": latest["id"], "type": "builds",
                                 "attributes": {"usesNonExemptEncryption": False}}})
              print(f"compliance patch: HTTP {r.status_code}")
              if r.status_code >= 400:
                  print(r.text[:500])
          elif a["processingState"] != "VALID":
              print(f"latest build is not ready yet: {a['processingState']}")

          # ── Group assignment: a processed build still needs to be in the
          # tester's beta group to show up in TestFlight. Compare the latest
          # build's groups with the previous build's; add whatever's missing.
          def groups_of(build_id):
              g = requests.get(f"{API}/builds/{build_id}/betaGroups",
                               headers=H, params={"fields[betaGroups]": "name,isInternalGroup"}).json()
              return {x["id"]: (x["attributes"]["name"], x["attributes"]["isInternalGroup"])
                      for x in g.get("data", [])}

          all_groups = requests.get(f"{API}/betaGroups", headers=H,
                                    params={"filter[app]": app["id"],
                                            "fields[betaGroups]": "name,isInternalGroup,hasAccessToAllBuilds,publicLinkEnabled"}).json()
          for x in all_groups.get("data", []):
              at = x["attributes"]
              testers = requests.get(f"{API}/betaGroups/{x['id']}/betaTesters", headers=H,
                                     params={"limit": "5", "fields[betaTesters]": "email"}).json()
              emails = [t["attributes"].get("email") for t in testers.get("data", [])]
              print(f"group '{at['name']}' | internal={at['isInternalGroup']} | allBuilds={at.get('hasAccessToAllBuilds')} "
                    f"| publicLink={at.get('publicLinkEnabled')} | testers: {emails}")

          # If the internal group does NOT auto-receive builds, the latest build
          # must be linked explicitly — do that (internal groups skip beta review).
          for x in all_groups.get("data", []):
              at = x["attributes"]
              if at["isInternalGroup"] and not at.get("hasAccessToAllBuilds"):
                  r = requests.post(f"{API}/betaGroups/{x['id']}/relationships/builds",
                                    headers={**H, "Content-Type": "application/json"},
                                    json={"data": [{"type": "builds", "id": latest["id"]}]})
                  print(f"linked latest build to internal group '{at['name']}': HTTP {r.status_code}"
                        + ("" if r.status_code < 400 else f" {r.text[:300]}"))

          latest_groups = groups_of(latest["id"])
          print(f"latest build {latest['attributes']['version']} groups: {list(latest_groups.values()) or 'NONE'}")
          prev_groups = {}
          if len(builds["data"]) > 1:
              prev = builds["data"][1]
              prev_groups = groups_of(prev["id"])
              print(f"previous build {prev['attributes']['version']} groups: {list(prev_groups.values()) or 'NONE'}")

          missing = {gid: name for gid, name in prev_groups.items() if gid not in latest_groups}
          if missing:
              for gid, (name, internal) in missing.items():
                  r = requests.post(
                      f"{API}/betaGroups/{gid}/relationships/builds",
                      headers={**H, "Content-Type": "application/json"},
                      json={"data": [{"type": "builds", "id": latest["id"]}]})
                  print(f"added latest build to group '{name}': HTTP {r.status_code}"
                        + ("" if r.status_code < 400 else f" {r.text[:300]}"))
          elif not latest_groups and not prev_groups:
              print("neither build is in any group — testers are likely individual internal testers; "
                    "checking individual-tester visibility is manual (App Store Connect ▸ TestFlight ▸ Internal Testing)")
          else:
              print("latest build already has the same groups as the previous one")

          # ── Account-wide: make every app auto-distribute internal builds.
          # hasAccessToAllBuilds is CREATE-ONLY (Apple rejects it on update),
          # so where no auto group exists we create an internal group
          # "Everything" with the flag set, and copy the internal testers in.
          print("\n=== account-wide internal-group auto-distribution ===")
          AUTO_NAME = "Everything"
          apps_all = requests.get(f"{API}/apps", headers=H,
                                  params={"limit": "200", "fields[apps]": "name,bundleId"}).json()
          for appx in apps_all.get("data", []):
              name = appx["attributes"]["name"]
              groups = requests.get(f"{API}/apps/{appx['id']}/betaGroups", headers=H,
                                    params={"fields[betaGroups]": "name,isInternalGroup,hasAccessToAllBuilds"}).json()
              internal = [g for g in groups.get("data", []) if g["attributes"]["isInternalGroup"]]
              if any(g["attributes"].get("hasAccessToAllBuilds") for g in internal):
                  print(f"{name}: already has an automatic internal group")
                  continue
              if not internal:
                  print(f"{name}: no internal groups (skipping)")
                  continue
              # Gather this app's internal testers (from its existing groups).
              tester_ids = set()
              for g in internal:
                  t = requests.get(f"{API}/betaGroups/{g['id']}/betaTesters", headers=H,
                                   params={"limit": "50"}).json()
                  tester_ids |= {x["id"] for x in t.get("data", [])}
              made = requests.post(f"{API}/betaGroups",
                                   headers={**H, "Content-Type": "application/json"},
                                   json={"data": {"type": "betaGroups",
                                                  "attributes": {"name": AUTO_NAME, "isInternalGroup": True,
                                                                 "hasAccessToAllBuilds": True},
                                                  "relationships": {"app": {"data": {"type": "apps", "id": appx["id"]}}}}})
              if made.status_code >= 400:
                  print(f"{name}: create '{AUTO_NAME}' failed HTTP {made.status_code} {made.text[:300]}")
                  continue
              gid = made.json()["data"]["id"]
              added = "no testers found"
              if tester_ids:
                  r = requests.post(f"{API}/betaGroups/{gid}/relationships/betaTesters",
                                    headers={**H, "Content-Type": "application/json"},
                                    json={"data": [{"type": "betaTesters", "id": t} for t in sorted(tester_ids)]})
                  added = f"testers added: HTTP {r.status_code}" + ("" if r.status_code < 400 else f" {r.text[:200]}")
              print(f"{name}: created internal auto group '{AUTO_NAME}' ({added})")
          EOF

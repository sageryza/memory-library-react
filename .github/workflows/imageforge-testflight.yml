name: ImageForge TestFlight

# Builds the ImageForge app (which lives in the PUBLIC sageryza/imageforge repo)
# from here, reusing this repo's App Store Connect secrets — so no secrets need
# to be added to the imageforge repo. Checks out both repos, creates the App
# Store Connect app record via fastlane produce (idempotent), revokes stale
# signing certs, then runs imageforge's own `fastlane beta` to archive + upload.
on:
  workflow_dispatch:
    inputs:
      imageforge_ref:
        description: "sageryza/imageforge branch or ref to build"
        default: "main"
        required: false

jobs:
  testflight:
    runs-on: macos-15
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
      APPLE_TEAM_ID: 5XR23N2CBH
      FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "180"
      FASTLANE_XCODEBUILD_SETTINGS_RETRIES: "6"
    steps:
      # ImageForge's Fastfile builds from $GITHUB_WORKSPACE/ios, and GITHUB_WORKSPACE
      # is a reserved var a workflow can't override — so check ImageForge out AT the
      # workspace root (no path) and put our tooling in a subdir.
      - name: Checkout ImageForge (public) at workspace root
        uses: actions/checkout@v4
        with:
          repository: sageryza/imageforge
          ref: ${{ github.event.inputs.imageforge_ref || 'main' }}

      - name: Checkout tooling (this repo)
        uses: actions/checkout@v4
        with:
          path: tools

      - name: Select newest Xcode (need 26+)
        run: |
          XC=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Selecting $XC"
          sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version
          MAJOR=$(xcodebuild -version | sed -n 's/^Xcode \([0-9]*\).*/\1/p')
          if [ "$MAJOR" -lt 26 ]; then
            echo "::error::App Store needs Xcode 26+, but newest on this runner is $MAJOR"
            exit 1
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Add app icon (ImageForge ships without one)
        run: |
          set -e
          ICON=ios/ImageForge/Assets.xcassets/AppIcon.appiconset
          mkdir -p "$ICON"
          cp tools/ci/imageforge/AppIcon.png "$ICON/AppIcon.png"
          printf '%s' '{"info":{"author":"xcode","version":1}}' > ios/ImageForge/Assets.xcassets/Contents.json
          printf '%s' '{"images":[{"filename":"AppIcon.png","idiom":"universal","platform":"ios","size":"1024x1024"}],"info":{"author":"xcode","version":1}}' > "$ICON/Contents.json"
          echo "icon catalog:"; ls -R ios/ImageForge/Assets.xcassets

      - name: Patch ImageForge project (home-screen name + auto-compliance + icon)
        env:
          DISPLAY_NAME: "Deck Factory"
        run: python3 tools/ci/patch_imageforge_project.py

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Revoke stale signing certificates
        run: python3 tools/ci/revoke_stale_certs.py

      # NOTE: the App Store Connect *app record* (com.sageryza.imageforge /
      # "ImageForge") must be created once by hand in App Store Connect — the
      # public API can't create app records, and fastlane `produce` requires an
      # interactive Apple ID login (2FA) that can't run in CI. The App *ID* /
      # bundle id auto-registers here during -allowProvisioningUpdates signing.

      - name: Build & upload to TestFlight
        working-directory: ios
        run: fastlane beta

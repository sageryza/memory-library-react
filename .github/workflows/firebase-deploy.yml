name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Reporting a GitHub "production" environment makes a deployment status show
    # up directly on the merged PR (and in the repo's Environments tab), so it's
    # obvious when a change has actually gone live.
    environment:
      name: production
      url: https://membry-df528.web.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          # Public web-push key (Firebase Console → Cloud Messaging → Web Push
          # certificates). Optional: if unset, the app just skips push setup.
          VITE_FCM_VAPID_KEY: ${{ secrets.VITE_FCM_VAPID_KEY }}

      # Second hosting target in the same project: shouldimakethis.web.app
      # (hosting is a target array in firebase.json, so `--only hosting`
      # deploys both sites and both must be built).
      - name: Build ShouldiMakeThis
        working-directory: shouldimakethis
        run: |
          npm ci
          npm run build

      - name: Deploy to Firebase
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting,firestore:rules,firestore:indexes,storage --token ${{ secrets.FIREBASE_TOKEN }}

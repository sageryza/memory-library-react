name: iOS TestFlight

# Builds the Miracles app on a cloud macOS runner, signs it with the App Store
# Connect API key, and uploads it to TestFlight. Run it by hand from the
# Actions tab (Run workflow). No local Mac required.
on:
  workflow_dispatch:
  # Temporary: lets the build run from the feature branch while we get the
  # first TestFlight upload green. Removed once merged to main.
  push:
    branches: [claude/dream-journal-db-choice-4mepgk]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-testflight.yml'

jobs:
  testflight:
    runs-on: macos-15
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
      APPLE_TEAM_ID: 5XR23N2CBH
      APP_NAME: "Little Book of Miracles"
      # Firebase pulls in ~14 SPM packages, so `xcodebuild -showBuildSettings`
      # is slow; give fastlane room instead of its 3s default.
      FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "180"
      FASTLANE_XCODEBUILD_SETTINGS_RETRIES: "6"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Apple requires builds made with the iOS 26 SDK (Xcode 26+). Select the
      # newest Xcode on the runner and fail fast if it's older than 26.
      - name: Select newest Xcode (need 26+)
        run: |
          echo "Installed Xcodes:"; ls -d /Applications/Xcode*.app
          XC=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Selecting $XC"
          sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version
          MAJOR=$(xcodebuild -version | sed -n 's/^Xcode \([0-9]*\).*/\1/p')
          if [ "$MAJOR" -lt 26 ]; then
            echo "::error::App Store needs Xcode 26+, but newest on this runner is $MAJOR"
            exit 1
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build & upload to TestFlight
        working-directory: ios
        run: fastlane beta

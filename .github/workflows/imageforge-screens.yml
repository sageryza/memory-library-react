name: ImageForge Screens

# Boots ImageForge (the Deck Factory app, which lives in the PUBLIC
# sageryza/imageforge repo) in an iOS simulator, walks every top-level screen
# via its deckfactory:// deep links, and uploads a screenshot of each as an
# artifact. A self-QA loop: native + hybrid (webview) layout gets seen in CI
# instead of only on a real phone. No signing — simulator build only.
#
# Dispatch with imageforge_ref to screenshot a feature branch before it merges.
on:
  workflow_dispatch:
    inputs:
      imageforge_ref:
        description: "sageryza/imageforge branch/ref to screenshot"
        default: "main"
        required: false

jobs:
  screens:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      # ImageForge's project builds from ios/; check it out at the workspace root.
      - name: Checkout ImageForge (public) at workspace root
        uses: actions/checkout@v4
        with:
          repository: sageryza/imageforge
          ref: ${{ inputs.imageforge_ref || 'main' }}

      - name: Select newest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd ios && xcodegen

      - name: Pick and boot an iPhone simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)['devices']
          phones = [d for rt, devs in sorted(data.items(), reverse=True) for d in devs
                    if d.get('isAvailable') and 'iPhone' in d['name'] and 'SE' not in d['name']]
          print(phones[0]['udid'])")
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

      - name: Build ImageForge for the simulator
        run: |
          cd ios
          xcodebuild build \
            -project ImageForge.xcodeproj \
            -scheme ImageForge \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath ../dd \
            CODE_SIGNING_ALLOWED=NO | tail -40

      - name: Install and launch the app
        run: |
          APP=$(find dd/Build/Products -maxdepth 2 -name "ImageForge.app" | head -1)
          echo "app: $APP"
          xcrun simctl install "${{ steps.sim.outputs.udid }}" "$APP"
          xcrun simctl launch "${{ steps.sim.outputs.udid }}" com.sageryza.imageforge || true
          sleep 6

      - name: Walk every screen via deep links and screenshot each
        run: |
          UDID="${{ steps.sim.outputs.udid }}"
          mkdir -p screens
          # home + gallery + every Tool rawValue (RootView.handleDeepLink)
          SCREENS="home gallery movie story writing chats dreams sticker coloring storybook greeting instagram ads test"
          i=0
          for s in $SCREENS; do
            i=$((i+1))
            xcrun simctl openurl "$UDID" "deckfactory://$s" || true
            # webview screens (story/writing/chats) fetch live content — give them room
            sleep 7
            n=$(printf '%02d' "$i")
            xcrun simctl io "$UDID" screenshot "screens/${n}-${s}.png" || true
            echo "captured $s"
          done
          ls -la screens

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: imageforge-screens
          path: screens
          if-no-files-found: warn

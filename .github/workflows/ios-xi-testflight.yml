name: XI TestFlight

# Builds the XI app on a cloud macOS runner, signs it with the App Store Connect
# API key, and uploads it to TestFlight. Reuses the same account-wide secrets as
# the Miracles app. No local Mac required.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ios-xi/**'
      - '.github/workflows/ios-xi-testflight.yml'

jobs:
  testflight:
    runs-on: macos-15
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
      APPLE_TEAM_ID: 5XR23N2CBH
      APP_NAME: "XI"
      FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "180"
      FASTLANE_XCODEBUILD_SETTINGS_RETRIES: "6"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest Xcode (need 26+)
        run: |
          echo "Installed Xcodes:"; ls -d /Applications/Xcode*.app
          XC=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Selecting $XC"
          sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version
          MAJOR=$(xcodebuild -version | sed -n 's/^Xcode \([0-9]*\).*/\1/p')
          if [ "$MAJOR" -lt 26 ]; then
            echo "::error::App Store needs Xcode 26+, but newest on this runner is $MAJOR"
            exit 1
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      # Import ONE stored Apple Distribution certificate into a temporary
      # keychain. With a valid signing identity already present, automatic
      # signing REUSES it instead of minting a fresh certificate every run —
      # which is what kept filling the account's certificate cap. If the secret
      # isn't set yet, we warn and fall back to the old (cert-minting) behaviour
      # so the workflow still runs during setup.
      - name: Import signing certificate
        env:
          CERT_P12: ${{ secrets.XI_DIST_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.XI_DIST_CERT_PASSWORD }}
        run: |
          if [ -z "$CERT_P12" ]; then
            echo "::warning::XI_DIST_CERT_P12 not set — skipping cert reuse (build will mint a certificate as before)."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/xi-signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/xi-dist.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/xi-dist.p12" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Put our keychain first in the search list so xcodebuild finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          echo "Signing identities now available:"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Generate Xcode project
        working-directory: ios-xi
        run: xcodegen generate

      - name: Build & upload to TestFlight
        working-directory: ios-xi
        run: fastlane beta

      - name: Attach build to internal testers
        if: success()
        env:
          APP_BUNDLE_ID: com.sageryza.xi
          TESTER_EMAIL: sageryza@gmail.com
          GROUP_NAME: Internal
          WAIT_VALID: "1"
        run: python3 ci/setup_internal_testing.py
